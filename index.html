  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미국·이란 60일 휴전 양해각서 잠정 합의…호르무즈 해협 봉쇄 해제 임박`,
  metrics:[`미국 봉쇄 기간 4월 13일~5월 29일`,`우회 선박 118척·운항 불능 5척`],
  summary:`미국과 이란이 60일짜리 휴전 양해각서(MOU)를 잠정 합의하며 본격적인 핵협상 단계로 이행했다. 트럼프 대통령은 5월 31일 백악관 상황실 회의에서 최종 결정을 보류했으나, 외교 채널을 통해 협상 안이 사실상 마지막 조율 단계에 들어간 것으로 전해졌다. 미국은 4월 13일부터 5월 29일까지 이란 항구를 동시 봉쇄해 상선 118척을 우회시키고 5척의 운항을 불능화하는 강도 높은 압박을 가했다. 이란은 2월 28일 미국·이스라엘의 핵시설 공습과 알리 하메네이 최고지도자 사망에 대응해 호르무즈 해협 봉쇄로 맞섰으나, 경제 타격이 누적되며 협상 테이블에 응했다. 트럼프 대통령은 핵물질 농축 한도와 사찰 범위 관련 조항을 강화하라고 협상단에 요구한 것으로 알려져 합의 발표는 다소 늦춰질 수 있다. 톰 배럭 주터키 미국대사는 시리아·이라크 특사로 임무가 확대되며 광역 중동 평화안 조율을 맡았다. 이스라엘은 같은 날 레바논 남부와 이스라엘 북부를 굽어보는 12세기 보퍼트 성을 점령했다고 발표해 휴전 분위기와 별개로 지상 충돌은 이어졌다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`이란과 오만 사이의 좁은 바닷길로, 너비가 가장 좁은 곳은 약 33km에 불과하다. 전 세계 해상 원유 수송의 약 20%가 이곳을 지나기 때문에, 봉쇄되면 글로벌 유가가 즉각 치솟는다.`}],
  history:`이란 핵협상은 2015년 JCPOA(포괄적 공동행동계획) 체결과 2018년 트럼프 1기 행정부의 일방 탈퇴를 거치며 오랜 기간 교착돼 왔다. 2026년 2월 미-이스라엘 연합의 핵시설 공습은 사실상 군사적 해법 시도였고, 이란의 호르무즈 봉쇄로 글로벌 에너지 위기가 촉발됐다.`,
  players:`미국 트럼프 행정부, 이란 임시 지도부, 이스라엘 정부가 직접 당사자다. 카타르·오만이 중재자 역할을 맡고, EU·중국·러시아도 이해당사자로 참여한다. 한국·일본·인도는 에너지 수입국으로 협상 결과에 민감하다.`,
  current:`60일 휴전 MOU는 본 협상의 시간표를 확보했다는 의미가 크다. 다만 핵물질 잔량 처리, IAEA 사찰 권한, 미국·EU 제재 해제 순서 등 핵심 쟁점이 모두 남아 있다.`,
  outlook:`6월 중순 1차 본협상 라운드가 카타르 도하에서 열릴 예정이며, 호르무즈 해협 정상화 시점이 글로벌 유가와 해운 물동량에 직접 반영된다. 협상 결렬 시 유가 재급등이 불가피하다.`,
  sources:[{title:`Trump yet to make final determination on Iran deal - Fox News`,url:`https://www.foxnews.com/live-news/trump-iran-war-peace-talks-hormuz-may-31`},{title:`Blockade diplomacy and other geopolitical updates - World Economic Forum`,url:`https://www.weforum.org/stories/2026/05/blockade-diplomacy-and-other-geopolitical-stories-to-know-this-month/`},{title:`2026 Strait of Hormuz crisis - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_Strait_of_Hormuz_crisis`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`헝가리 총선, 오르반 16년 집권 종료…페테르 마자르 차기 총리 EU 친화 노선 예고`,
  metrics:[`오르반 총리 집권 기간 16년`,`Fidesz 정당 패배·신임 총리 교체`],
  summary:`헝가리 총선에서 빅토르 오르반 총리의 16년 집권이 막을 내렸다. 오르반이 이끈 민족주의·친러시아 성향의 피데스(Fidesz)당이 야권 후보 페테르 마자르가 이끄는 신생 정당에 패배하며 정권 교체가 확정됐다. 마자르 차기 총리는 오스트리아 등 중부 유럽 국가들과의 협력 강화, EU와의 관계 정상화를 공약으로 내세웠다. 오르반 정부는 우크라이나 지원에 반대하고 러시아 가스 의존도를 유지해 EU 내 갈등의 핵심 요인이었다. 이번 정권 교체는 EU 27개국 가운데 친러 진영의 입지 약화를 의미하며, 우크라이나 지원과 러시아 제재 패키지 논의에서 만장일치 통과 가능성을 높인다. 마자르 정부는 즉시 EU 결속 기금 동결 해제 협상을 재개할 것으로 알려졌다. 다만 헝가리 내 보수층 반발과 의회 다수당 협상 과정에서 정책 추진 속도는 다소 늦어질 수 있다. 동유럽 정치 지형 전반에 도미노 효과가 미칠지 주목된다.`,
  keyTerms:[{term:`피데스(Fidesz)당`,explanation:`1988년 청년 자유주의 정당으로 출발해 오르반 총리 체제에서 강한 민족주의·반이민·친러시아 노선으로 전환한 헝가리 우파 집권당이다. EU 내에서 법치주의·언론자유 후퇴 논란을 이끈 대표 정당으로 꼽혀 왔다.`}],
  history:`오르반은 1998~2002년 1차 집권 후 2010년부터 4연속 총선 승리로 장기 집권해 왔다. 헌법 개정, 언론·사법부 통제, 반이민 정책으로 EU와 마찰을 빚었고, 우크라이나 전쟁 발발 후 러시아 가스 의존을 유지해 EU 결속 기금이 동결됐다.`,
  players:`오르반의 피데스당과 페테르 마자르의 신생 야권 연합이 정면 대결했다. EU 집행위원회와 폰데어라이엔 위원장은 마자르 측에 협력 메시지를 보냈고, 미국·러시아도 결과를 주시하고 있다. 이웃 국가 오스트리아·슬로바키아·체코의 친러·반러 지형도 영향 받는다.`,
  current:`헝가리 정권 교체는 EU 27개국의 우크라이나 지원·러시아 제재 만장일치 통과 가능성을 끌어올린다. 동시에 결속 기금 동결 해제로 헝가리 경제에는 호재로 작용할 전망이다.`,
  outlook:`6~7월 신임 총리 취임과 내각 구성, EU와의 결속 기금 협상이 본격화된다. 8월 EU 정상회의에서 헝가리의 입장 변화가 첫 시험대에 오른다.`,
  sources:[{title:`Blockade diplomacy and other geopolitical updates - World Economic Forum`,url:`https://www.weforum.org/stories/2026/05/blockade-diplomacy-and-other-geopolitical-stories-to-know-this-month/`},{title:`This Month in Geopolitics: May 2026 - Deutsche Bank Research Institute`,url:`https://www.dbresearch.com/PROD/IE-PROD/PROD0000000000626668/This_Month_in_Geopolitics:_May_2026_.pdf`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`삼성전자 7월 와이드폴드 출시 임박, 초기 출하량 상향…폴더블 시장 재공세`,
  metrics:[`출시 시점 2026년 7월`,`초기 출하량 당초 계획 대비 상향 조정`],
  summary:`삼성전자가 2026년 7월 출시 예정인 신형 폴더블 스마트폰 와이드폴드의 초기 출하량 계획을 당초보다 상향 조정한 것으로 31일 확인됐다. 와이드폴드는 기존 갤럭시 폴드 시리즈보다 가로 화면이 한층 넓어진 신규 라인업으로, 멀티태스킹과 영상 시청 경험을 차별화 포인트로 내세운다. 폴더블 시장에서 중국 화웨이·아너의 추격이 거세지자 삼성은 출하량 확대를 통한 시장 지배력 재확보 전략을 택했다. 출하 확대는 디스플레이·힌지·배터리 등 공급망 부품사에 긍정적 신호로 해석된다. 7월 갤럭시 언팩 행사에서 정식 공개될 예정이며, 가격대와 사양 일부가 이미 부품 협력사를 통해 외부로 새어 나오는 분위기다. 시장에서는 와이드폴드가 폴더블 점유율 회복의 분기점이 될지 주목하고 있다. 동시에 AI 온디바이스 기능 강화 여부가 판매량을 좌우할 핵심 변수로 꼽힌다.`,
  keyTerms:[{term:`폴더블`,explanation:`화면이 접히는 스마트폰을 말하며, 폼팩터(기기 형태) 혁신의 대표 사례다. 평소엔 일반 폰처럼 쓰다가 펼치면 태블릿 크기 화면이 되어 멀티태스킹·영상 감상에 유리하지만, 가격과 내구성이 약점으로 지적돼 왔다.`}],
  history:`삼성전자는 2019년 갤럭시 폴드를 세계 최초로 출시하며 폴더블 시대를 열었다. 이후 매년 폴드·플립 라인업을 업데이트해 왔으나, 2024년부터 화웨이·아너 등 중국 업체가 더 얇고 저렴한 폴더블을 내놓으며 격차가 좁혀졌다. 와이드폴드는 그 대응으로 기획된 새 폼팩터다.`,
  players:`삼성전자(완제품)와 삼성디스플레이(OLED), LG이노텍(카메라 모듈), 비에이치·KH바텍(부품 협력사)이 핵심 공급망이다. 화웨이·아너·오포는 직접 경쟁자이고, 애플은 2027년 폴더블 진입설이 돈다.`,
  current:`AI 온디바이스 기능 강화와 한층 얇아진 힌지가 핵심 판매 포인트다. 7월 출시 직전 출하량 상향은 사전 수요가 예상보다 강하다는 신호로 받아들여진다.`,
  outlook:`7월 갤럭시 언팩 직후 본격 시장 반응이 가시화되고, 4분기 실적부터 판매 효과가 반영된다. 화웨이의 8월 신제품 출시와의 정면 대결이 폴더블 점유율 재편을 가른다.`,
  sources:[{title:`2026년 5월 31일 오늘의 주요 뉴스 - 오늘의 클릭`,url:`https://www.cliktoday.com/2026/05/20260531-today-news.html`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`AI가 해킹 산업화 가속…다크웹서 공격 도구·관리자 계정 거래 폭증`,
  metrics:[`해킹 도구·관리자 계정 다크웹 거래 폭증`,`랜섬웨어 피해 규모 급증세`],
  summary:`인공지능(AI)이 사이버 공격의 속도와 효율성을 끌어올리면서 해킹이 사실상 산업 생태계로 비대화되고 있다는 경고가 잇따른다. 한국정보보호산업협회와 사이버보안 업계는 5월 31일 발표한 동향 분석에서 취약점 공격과 랜섬웨어 피해 규모가 폭증하고 있다고 진단했다. 다크웹에서는 AI 기반 피싱 자동화 도구, 침투 후 권한 상승 스크립트, 기업 관리자 계정과 VPN 접근 권한 등이 활발하게 거래되는 것으로 파악됐다. AI 모델이 정교한 사회공학 메시지를 자동 생성하면서 비전문가도 손쉽게 표적형 공격을 시도할 수 있게 된 점이 핵심 변화다. 한국 기업의 경우 클라우드·SaaS 의존도가 빠르게 높아지면서 공격 표면이 확대되고 있다. 정부는 AI 보안 가이드라인 개정과 주요정보통신기반시설 점검 범위 확대를 예고했다. 보안 업계는 사람 중심 방어에서 AI 대 AI 방어 체계로의 전환이 불가피하다고 진단한다. 기업 입장에서는 임직원 계정 관리와 외주 인력 권한 통제가 우선순위로 부상했다.`,
  keyTerms:[{term:`랜섬웨어`,explanation:`기업·기관의 컴퓨터 파일을 강제로 암호화한 뒤 돈을 내야 풀어주겠다고 협박하는 악성 프로그램이다. 최근에는 데이터를 훔쳐낸 뒤 공개하겠다고 협박하는 이중 갈취 방식이 일반화돼 피해 규모가 폭증하고 있다.`}],
  history:`2017년 워너크라이 사태 이후 랜섬웨어는 기업 보안 위협의 핵심으로 자리잡았다. 2022년 이후 챗GPT 등 생성형 AI의 등장은 공격자 진입장벽을 크게 낮춰, 비전문가도 쉽게 사회공학 공격을 자동화할 수 있는 환경을 만들었다.`,
  players:`한국에서는 과학기술정보통신부·KISA·국정원이 대응 컨트롤타워이며, 안랩·SK쉴더스·이글루코퍼레이션 등 보안 기업이 민간 방어를 담당한다. 공격자는 러시아·북한 연계 조직과 비국가 행위자가 혼재한다.`,
  current:`AI 도구의 보편화로 공격 빈도와 정교함이 동시에 증가하면서, 정부는 보안 가이드라인을 정비하고 기업은 제로트러스트 체계 도입을 가속화 중이다.`,
  outlook:`6월 중 과기정통부의 AI 보안 가이드라인 개정안 발표가 예상되고, 7월부터 주요 공공기관 대상 모의 침투 점검이 확대된다. 하반기 보안 예산 증액 논의가 본격화될 전망이다.`,
  sources:[{title:`2026년 5월 31일 오늘의 주요 뉴스 - 오늘의 클릭`,url:`https://www.cliktoday.com/2026/05/20260531-today-news.html`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`동아시아 5월 폭염 기록 경신…일본 100건·중국 127곳 최고기온 갱신`,
  metrics:[`일본 5월 신기록 100건 이상 경신`,`중국 127곳 5월 최고 최저기온 신기록`],
  summary:`동아시아 전역에 전례 없는 5월 폭염이 덮치면서 일본과 중국에서 각종 기온 기록이 무더기로 경신됐다. 일본 기상청에 따르면 5월 한 달 동안 전국 관측소에서 100건이 넘는 기온 신기록이 작성됐고, 중국에서도 127개 관측소가 5월 최고 최저기온(밤 최저기온이 가장 높았던 날) 기록을 갈아치웠다. 전 지구 평균 해수면 온도 이상치는 2026년 들어 역대 두 번째로 높은 수준이며, 5월 24일에는 같은 날짜 기준 사상 최고치를 기록했다. 남아프리카 피터마리츠버그에서는 30일 밤 사상 유례 없는 우박 폭풍이 도시 일부를 두꺼운 얼음으로 덮었다. 농학 전문가들은 기후변화가 예측 불가능한 극단 기상을 일상화하고 있다고 진단한다. 한국 기상청도 6월 평년보다 높은 기온과 국지성 호우가 잦을 것으로 전망했다. 전력 수요 급증과 농작물 피해, 온열질환 응급 환자 증가가 동시에 예상돼 정부는 폭염 대응 종합대책을 6월 초 가동한다. 우간다는 기후 충격에 대응해 18억 달러 규모 수자원 비상 계획을 발표하며 개도국 적응 비용 부담을 부각시켰다.`,
  keyTerms:[{term:`폭염`,explanation:`비정상적으로 높은 기온이 며칠 이상 이어지는 현상으로, 한국에서는 일 최고기온 33도 이상이 이틀 넘게 이어질 때 폭염 경보를 발령한다. 온열질환·전력대란·농작물 피해를 동시에 일으키는 대표적 기후 재해다.`}],
  history:`산업화 이후 지구 평균기온은 약 1.2도 상승했고, 2023년 이후 매년 역대 최고치가 갱신되고 있다. 동아시아의 5월 평균기온도 1990년대 대비 2도 안팎 상승해 본격 여름이 시작되는 시점이 앞당겨졌다.`,
  players:`기상 관측은 각국 기상청과 WMO(세계기상기구)가 담당한다. 한국에서는 행정안전부와 보건복지부가 폭염 대응 컨트롤타워이며, 한국전력은 전력 수급 안정을 책임진다. 농림축산식품부는 작물 피해 모니터링을 맡는다.`,
  current:`기록적 5월 폭염은 본격적 6~8월 여름이 한층 더 극단적으로 전개될 것임을 예고한다. 글로벌 식량가격·전력가격 변동성도 함께 확대된다.`,
  outlook:`6월 초 한국 기상청 여름철 전망 발표와 행안부 폭염 종합대책 시행이 예정돼 있다. 11월 COP31 기후정상회의에서 적응 재원 논의가 본격화된다.`,
  sources:[{title:`26th May 2026 Today's Round-Up of Climate News - Climate and Economy`,url:`https://climateandeconomy.com/2026/05/26/26th-may-2026-todays-round-up-of-climate-news/`},{title:`Top 10 Climate Catastrophes to Watch in 2026 - Voices.earth`,url:`https://voices.earth/insights/top-10-climate-catastrophes-to-watch-in-2026/`}]
}]
},{
  tag:`2026-05-31`,
  label:`2026년 5월 31일 (일)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`한국은행 기준금리 2.50% 8연속 동결, 원/달러 1,500원대 장기화`,
  metrics:[`기준금리 2.50% (8연속 동결)`,`원/달러 1,517.2원 (6거래일 연속 1,500원 위)`],
  summary:`한국은행 금융통화위원회는 5월 28일 기준금리를 연 2.50%로 동결하며 8연속 동결을 이어갔다. 위원 7명 중 5명이 동결, 2명이 인상 소수의견을 내며 매파적 동결 신호를 보였다. 원/달러 환율은 1,517.2원에 마감해 6거래일 연속 심리적 저항선인 1,500원을 웃돌며 약세를 지속하고 있다. 한은은 동시에 2026년 성장률 전망을 2.6%로 상향 조정해 내수 회복 기대를 반영했다. 그러나 인플레이션 재상승 압력과 외환시장 불안이 맞물리면서 일부 이코노미스트는 7월과 10월 연속 인상으로 연말 3.00% 도달 가능성을 제기한다. 정책당국은 지정학적 리스크와 환율 방어 사이에서 운신 폭이 좁아지고 있다.`,
  keyTerms:[{term:`매파적 동결`,explanation:`금리를 그대로 두지만, 위원회 안에서 올려야 한다는 목소리가 함께 나오는 상황. 동결이라도 시장은 다음엔 인상 가능성이 크다는 신호로 해석한다.`}],
  history:`한국은행은 2024년 하반기 통화 완화에 나선 뒤 2.50%까지 내려왔지만, 2025년 말부터 원화 약세와 수입물가 상승이 이어지면서 추가 인하 여력이 사라졌다. 2026년 들어 연준이 금리를 묶어두면서 한미 금리 차가 다시 벌어졌고, 이는 원화 매도 압력의 핵심 배경이 됐다. 호르무즈 해협 사태로 국제 유가가 다시 치솟은 점도 인플레이션 재점화 우려를 키웠다.`,
  players:`이창용 한은 총재가 이끄는 금통위 7인이 결정 주체이며, 이번에는 2명이 인상 소수의견을 내며 분열을 드러냈다. 기획재정부와 외환당국은 1,500원대 환율 방어를 위해 구두개입과 미세조정을 반복하고 있다. 시장에서는 KB·삼성·NH 등 국내 증권사 리서치센터와 외국계 IB(JP모건·골드만삭스)가 인상 시점 전망에서 엇갈리고 있다.`,
  current:`원화가 6거래일 연속 1,500원을 넘어선 가운데, 한은이 동결을 택하면서 인상 카드만 남았다는 인식이 시장에 굳어졌다. 외환 변동성과 자본 유출 우려가 동시에 부각되는 분기점이다.`,
  outlook:`다음 금통위는 7월 10일로 예정돼 있으며, 6월 미 연준 회의 결과와 호르무즈 휴전 협상 진전이 판단의 분수령이 될 전망이다. 환율이 1,520원을 돌파하면 당국의 실개입 가능성도 거론된다.`,
  sources:[{title:`Bank of Korea holds policy rate steady at 2.50%, ups 2026 growth outlook to 2.6% - KED Global`,url:`https://www.kedglobal.com/central-bank/newsView/ked202605280001`},{title:`South Korea holds rates, reveals hawkish split within board - CNBC`,url:`https://www.cnbc.com/2026/05/28/south-korea-holds-rates-reveals-hawkish-split-within-board.html`},{title:`Economists see no Bank of Korea rate cut in 2026 amid weak won, housing concerns - KED Global`,url:`https://www.kedglobal.com/economy/newsView/ked202602220003`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미·중 무역위원회 신설…중국, 美 농산물 연 170억 달러·보잉 200대 구매 합의`,
  metrics:[`중국의 美 농산물 구매 약속: 연 170억 달러`,`보잉 항공기 초기 구매: 200대`],
  summary:`트럼프 대통령의 5월 중순 베이징 방문 결과를 바탕으로, 미·중 양국은 무역과 투자를 상시 관리하는 보드 오브 트레이드와 보드 오브 인베스트먼트 신설에 합의했다. 중국은 미국산 농산물을 연 170억 달러 이상 구매하고 보잉 여객기 200대를 초기 발주하기로 했다. 양국은 일부 품목 관세를 원칙적으로 상호 인하한다는 방침을 밝혔으나, 백악관 요약문에는 구체적 관세 인하가 빠져 시장 신뢰가 흔들렸다. 중국은 쇠고기·가금류 등 농산물 비관세 장벽도 일부 완화했다. 이번 합의는 디테일보다 분위기 위주라는 평가가 지배적이지만, 양국이 무역 협의를 제도화한 점은 의미가 크다. 한국 수출기업에는 미·중 수요 회복 신호와 함께 관세 협상 표준이 바뀔 가능성이 변수로 떠올랐다.`,
  keyTerms:[{term:`보드 오브 트레이드`,explanation:`미국과 중국이 무역 분쟁이 터질 때마다 정상회담을 따로 잡는 대신, 양국 대표가 모이는 상설 협의체를 만들어 일상적으로 협상하자는 새로운 기구. 한국 식 표현으로는 미·중 무역위원회에 가깝다.`}],
  history:`2025년 트럼프 2기 출범 직후 미국은 대중 평균 관세를 두 자릿수까지 끌어올렸고, 중국도 농산물·반도체에 보복관세로 응수하며 양국 교역이 급감했다. 그 결과 미국 농가와 보잉이 직격탄을 맞았고, 중국 역시 첨단 부품 조달난을 겪었다. 양국은 2025년 말부터 협상 채널을 재가동했고, 5월 트럼프 방중에서 가시적 결과물을 도출했다.`,
  players:`도널드 트럼프 미 대통령과 시진핑 중국 국가주석이 정상 차원에서 합의했고, 실무는 USTR과 중국 상무부가 맡았다. 보잉, 카길, ADM 등 미국 농업·항공 기업이 최대 수혜자로 꼽힌다. 한국·일본·EU는 미·중이 자체 거래에 몰두하면 동맹 시장은 후순위로 밀린다고 우려한다.`,
  current:`보드 오브 트레이드 출범으로 무역 분쟁이 정상회담이 아닌 상설 협의체에서 다뤄지게 된 것이 핵심 변화다. 관세 인하 누락은 시장에 실제 변화는 제한적이라는 해석을 남겼다.`,
  outlook:`6월 중 양국은 보드 첫 회의 개최를 조율할 예정이며, 한국 정부도 USTR과의 별도 관세 협상 일정을 6~7월에 잡고 있다. 보잉 200대 인도 일정에 따른 항공·부품 공급망 재편도 주목된다.`,
  sources:[{title:`What did Xi and Trump agree to in China? From a board of trade to Boeing planes - CNN`,url:`https://www.cnn.com/2026/05/18/china/xi-trump-trade-agreements-china-visit-intl-hnk`},{title:`Fact Sheet: President Donald J. Trump Strikes Deal on Economic and Trade Relations with China - White House`,url:`https://www.whitehouse.gov/fact-sheets/2025/11/fact-sheet-president-donald-j-trump-strikes-deal-on-economic-and-trade-relations-with-china/`},{title:`President Trump's State Visit to China Delivers Historic Deals - USTR`,url:`https://ustr.gov/about/policy-offices/press-office/press-releases/2026/may/president-trumps-state-visit-china-delivers-historic-deals-and-greater-market-access-american`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`美 증시 5월 강세장 마감…나스닥 +8%, 연준 연내 동결 확률 74.5%`,
  metrics:[`5월 나스닥 상승률: +8%`,`연내 금리 동결 확률: 74.5% (인상 확률 14.9%)`],
  summary:`뉴욕 증시는 5월을 사상 최고치 부근에서 마감하며 기술주 주도의 강세를 이어갔다. 나스닥은 한 달간 8% 급등했고, S&P500의 1분기 순이익률은 13.4%로 팩트셋 집계 이래 최고치를 기록했다. 선물시장은 연준 기준금리가 연말까지 동결될 확률을 74.5%로 반영했으며, 인상 확률은 한 달 전 0.8%에서 14.9%로 급등했다. 노동시장은 실업률 4.3%로 안정세지만, 경제활동참가율은 2021년 9월 이후 최저로 떨어져 고용시장 냉각 신호도 동시에 나왔다. IEA는 호르무즈 사태 영향으로 2분기 글로벌 석유 수요가 일평균 150만 배럴 감소할 것이라고 경고했다. 강한 기업 실적과 약한 고용 지표가 함께 나타난 점은 매파적 동결을 정당화하는 동시에 연준의 다음 행보를 더 어렵게 만들고 있다.`,
  keyTerms:[{term:`매파적 동결`,explanation:`연준이 금리를 그대로 두지만, 그 이유가 경기가 식어서가 아니라 물가 압력이 여전히 강해서임을 강조하는 상황. 시장은 인하가 멀어졌다는 의미로 받아들여 채권 금리와 달러가 강세를 보인다.`}],
  history:`2025년 연준은 인플레이션 둔화를 근거로 두 차례 금리를 내렸지만, 2026년 들어 유가 급등과 임금 상승률 반등으로 디스인플레이션 흐름이 끊겼다. 호르무즈 사태가 결정적 변수였다. 4월까지만 해도 연내 인하 확률이 우세했으나, 5월 들어 매파적 동결 기조가 시장 컨센서스로 굳어졌다.`,
  players:`제롬 파월 연준 의장과 FOMC 위원 19명이 정책 결정 주체이며, 시장은 CME 페드워치 선물 가격으로 기대를 측정한다. S&P500 지수에 포함된 빅테크 7종(매그니피센트 7)이 상승장을 견인했고, 엔비디아·MS·메타가 5월 시가총액 신고가를 갈아치웠다.`,
  current:`기업 실적은 사상 최고 수준이지만 고용시장은 식어가는 엇갈린 신호가 매파적 동결을 정당화하는 명분이 됐다. 동시에 인상 확률이 한 달 새 14배 가까이 뛴 점이 위험 신호다.`,
  outlook:`6월 18일 연준 FOMC 회의에서 점도표가 공개되며, 5월 PCE 물가지표가 6월 27일 발표된다. 호르무즈 협상 결렬 시 유가 재폭등으로 인상 압력이 확대되는 시나리오가 가장 큰 리스크다.`,
  sources:[{title:`May 2026 Economic and Market Update: New Highs and Old Risks - Crestwood Advisors`,url:`https://www.crestwoodadvisors.com/may-2026-economic-and-market-update/`},{title:`Global Economic Outlook: May 2026 - S&P Global`,url:`https://www.spglobal.com/market-intelligence/en/news-insights/research/2026/05/global-economic-outlook-may-2026`},{title:`Weekly Global Economic Update - Deloitte Insights`,url:`https://www.deloitte.com/us/en/insights/topics/economy/global-economic-outlook/weekly-update.html`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`6·3 지방선거 사전투표 둘째날…전국 누적 22%대, 역대 최고 페이스`,
  metrics:[`5월 30일 오후 5시 누적 사전투표율: 22.16%`,`참여 유권자: 595만 9,952명 / 전체 4,464만 9,908명`],
  summary:`제9회 전국동시지방선거 사전투표 둘째 날인 5월 30일, 전국 누적 사전투표율은 오후 5시 기준 22.16%를 기록하며 2022년 같은 시각 대비 1.54%포인트 높은 페이스를 이어갔다. 오전 9시 13.35%로 출발해 오전 10시 14.29%, 오후 1시 17.50%까지 가파른 상승세를 보였다. 지역별로는 전남이 31.1%로 17개 시·도 중 유일하게 30% 선을 돌파했고, 대구는 10%대 초반으로 가장 낮은 참여율을 기록했다. 595만 9,952명이 이번 사전투표율 집계에 포함되며 역대 지방선거 최고 사전투표율 가능성이 거론된다. MBC 여론조사에서는 서울·대구가 접전, 부산은 전재수 후보가 오차 범위 밖 우세로 나타나 본투표 결과 예측이 한층 복잡해졌다. 이재명 대통령 취임 후 첫 전국 단위 선거라는 점에서 정권 중간평가 성격도 짙다.`,
  keyTerms:[{term:`사전투표율`,explanation:`선거일 전에 미리 투표한 사람의 비율. 사전투표율이 높을수록 본투표일을 포함한 최종 투표율도 함께 오르는 경향이 있어, 정치권이 누가 더 결집했는지를 가늠하는 지표로 본다.`}],
  history:`지방선거 사전투표 제도는 2013년 도입돼 첫 적용된 2014년 지방선거에서 11.49%를 기록한 뒤 꾸준히 상승했다. 2022년 8회 지방선거에서는 20.62%로 마감했다. 2026년 9회 지방선거는 이재명 정부 출범 후 첫 전국 단위 선거여서 여당과 야당 모두 동원력을 총력 가동해 왔다.`,
  players:`이번 선거는 광역단체장 17명, 기초단체장 226명, 광역·기초의원, 교육감을 한 번에 뽑는다. 더불어민주당과 국민의힘이 양강 구도를 형성했고, 서울·부산·인천·대구·경기 등 5대 광역단체장 결과가 정권 평가의 핵심 척도가 될 전망이다. 중앙선관위가 투·개표를 총괄한다.`,
  current:`사전투표율이 역대 최고를 갈아치울 가능성이 커지면서 양당 모두 우리 지지층이 더 많이 결집했다는 해석 전쟁에 돌입했다. 전남과 대구의 양극화된 지역별 참여율은 정당 지지층 결집 강도를 그대로 보여준다.`,
  outlook:`본투표는 6월 3일 오전 6시~오후 6시에 진행되며, 같은 날 밤 출구조사 결과가 공개된다. 최종 결과는 6월 4일 새벽에 확정될 예정이며, 결과에 따라 6월 임시국회 정국 주도권이 갈린다.`,
  sources:[{title:`6·3 지방선거 둘째날 사전투표율 오전 9시 13.35% - 서울신문`,url:`https://www.seoul.co.kr/news/politics/local-election2026/2026/05/30/20260530500009`},{title:`지방선거 둘째날 사전투표율 낮 1시 17.50%…전남 30% 돌파 - 서울신문`,url:`https://www.seoul.co.kr/news/politics/local-election2026/2026/05/30/20260530500018`},{title:`6.3 지방선거, 사전투표율 역대 최고 기록 - MBC 뉴스데스크`,url:`https://www.youtube.com/watch?v=Hc93gTC4COc`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`美·이란 휴전 60일 연장 잠정합의…이란 트럼프가 외교 배신 반발 격화`,
  metrics:[`휴전 연장 기간: 60일`,`유가(브렌트유): 89달러→109달러 (4월 중순 대비)`],
  summary:`미국과 이란 협상단은 휴전을 60일 연장하고 이란 핵 협상을 새로 시작하는 양해각서(MOU) 초안에 잠정 합의했다. 동시에 미국은 이란 항구 봉쇄를 해제하고 호르무즈 해협 봉쇄를 풀어 운항을 재개한다는 내용이 담겼다. 그러나 5월 30일 이란 혁명수비대(IRGC) 모흐센 레자에이 사령관은 트럼프가 또다시 외교를 배신했다며 봉쇄 지속 시 군사 공격 가능성을 시사했다. 같은 날 싱가포르 샹그릴라 대화에서 피트 헤그세스 미 국방장관은 필요시 이란 공격을 재개할 능력은 충분하다고 공개적으로 압박했다. 브렌트유는 사태 격화 속 109달러까지 치솟아 4월 중순 89달러 대비 약 22% 상승했다. 글로벌 원유·LNG 공급망과 한국 정유·해운업계의 운임이 동시 출렁이고 있다.`,
  keyTerms:[{term:`호르무즈 해협 봉쇄`,explanation:`전 세계 원유 해상 수송의 약 20%가 지나가는 페르시아만 출구를 군사적으로 막아 통과를 차단하는 행위. 이란이 봉쇄하면 유가가 급등하고, 미국이 이란 항구를 봉쇄하면 이란 원유 수출이 끊긴다.`}],
  history:`2026년 2월 이스라엘과 이란 간 충돌이 미국 개입으로 확대되며 미·이란 단기 전쟁으로 비화했다. 4월 1차 휴전이 성립됐지만 이란이 호르무즈 일대 기뢰 부설로 위협하자 미국이 이란 항구를 해상 봉쇄했다. 5월부터 카타르·오만 중재로 60일 연장 협상이 진행돼 왔다.`,
  players:`미국 측은 트럼프 대통령, JD 밴스 부통령, 헤그세스 국방장관, 마이클 월츠 NSA가 핵심이며, 협상은 스티브 위트코프 특사가 담당한다. 이란 측은 알리 하메네이 최고지도자, 페제시키안 대통령과 IRGC 레자에이 사령관이 강경 입장을 주도한다. 카타르·오만·중국이 중재 라인이며, EU는 핵 검증 절차에 관심을 두고 있다.`,
  current:`MOU 잠정합의에도 IRGC가 공개적으로 군사 옵션을 꺼내든 점, 헤그세스 장관이 같은 날 공격 재개 발언으로 응수한 점이 휴전 자체를 흔들고 있다. 유가가 한 달 만에 22% 뛴 것이 합의 결렬 시 충격을 가늠케 한다.`,
  outlook:`60일 휴전 연장이 6월 첫째 주 내로 공식 서명되지 않으면 봉쇄 충돌이 재발할 가능성이 크다. 핵 협상 1차 회의는 7월 초 빈 또는 무스카트에서 열릴 것으로 알려졌다.`,
  sources:[{title:`Live updates: US military ready to resume combat in Gulf if needed - CNN`,url:`https://www.cnn.com/2026/05/29/world/live-news/iran-trump-war-news`},{title:`US More Than Capable Of Resuming Strikes Against Iran, Hegseth Says - RFE/RL`,url:`https://www.rferl.org/a/iran-war-us-hormuz-oil-blockade-gulf-israel/33640284.html`},{title:`US and Iran reach tentative agreement though Trump hasn't signed off on it - CNN`,url:`https://www.cnn.com/2026/05/28/world/live-news/iran-war-us-news`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`샹그릴라 대화 개막…中 군사 현대화·美 우선순위 의구심 정면충돌`,
  metrics:[`참가국: 40개국 이상`,`美 인도태평양 추가 전력: 항모전단 2개·전략폭격기 12대`],
  summary:`아시아 최대 안보 포럼인 샹그릴라 대화가 5월 30일 싱가포르에서 개막했다. 핵심 의제는 중국의 급격한 군사 현대화와 인도태평양 공세, 그리고 미국이 중동 위기에 묶인 사이 동맹 방위 공약을 지킬 수 있는지에 대한 의구심이다. 피트 헤그세스 미 국방장관은 첫날 연설에서 미국은 인도태평양에서 후퇴하지 않는다고 강조하며 항모전단 2개와 B-21 전략폭격기 12대 추가 배치를 예고했다. 중국 측은 동중국해·남중국해에서의 방어 작전이 정당하다고 반박했다. 한국·일본·필리핀은 미·중 충돌 시나리오에 대비한 별도 3자 협의를 진행한 것으로 전해졌다. 호주·인도는 쿼드 강화를 요구하며 미국의 약속 이행을 압박했다. 이번 회의는 미국이 이란 협상과 인도태평양 안보를 동시에 끌고 갈 수 있을지 시험대다.`,
  keyTerms:[{term:`샹그릴라 대화`,explanation:`영국 IISS가 주관해 매년 싱가포르 샹그릴라 호텔에서 열리는 아시아 최대 정부 간 안보 회의. 미·중 국방장관, 아시아 각국 국방·외교 수장이 한자리에 모여 분쟁 위험을 직접 토론하는 자리다.`}],
  history:`샹그릴라 대화는 2002년 시작돼 미·중 국방장관이 공개적으로 맞서는 거의 유일한 다자 무대로 자리잡았다. 2022년부터는 대만해협·남중국해가 매년 핵심 의제였고, 2026년에는 호르무즈 사태로 미국의 자원 분산 우려가 처음으로 전면에 등장했다.`,
  players:`주최는 영국 국제전략문제연구소(IISS), 미 국방장관(헤그세스), 중국 국방부장, 일본 방위상, 한국 국방장관, 호주·필리핀·인도네시아 국방장관이 핵심 발언자다. 동남아 국가들(ASEAN)은 미·중 사이에서 균형을 추구하는 입장을 유지한다.`,
  current:`미국이 중동 전선에 묶인 상황에서 인도태평양 공약을 어떻게 입증할지가 회의 최대 쟁점이다. 헤그세스 장관의 항모·폭격기 추가 배치 발표가 동맹국 우려를 진정시킬지 주목된다.`,
  outlook:`회의는 6월 1일까지 진행되며, 첫날 양자 회담(미·한, 미·일, 미·필) 결과가 잇따라 발표된다. 6월 중순 G7 정상회의에서 인도태평양 의제가 후속 논의될 전망이다.`,
  sources:[{title:`Asia defense summit opens amid doubts over U.S. priorities - NPR`,url:`https://www.npr.org/2026/05/29/g-s1-124788/asia-defense-summit-opens-amid-doubts-over-u-s-priorities`},{title:`US More Than Capable Of Resuming Strikes Against Iran, Hegseth Says - RFE/RL`,url:`https://www.rferl.org/a/iran-war-us-hormuz-oil-blockade-gulf-israel/33640284.html`},{title:`Blockade diplomacy and other geopolitical updates - World Economic Forum`,url:`https://www.weforum.org/stories/2026/05/blockade-diplomacy-and-other-geopolitical-stories-to-know-this-month/`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`서울 서소문고가 철거 중 붕괴 3명 사망…30일 새벽 철도 운행 재개`,
  metrics:[`사망 3명·부상 3명`,`철도 운행 재개 시각: 5월 30일 오전 5시`],
  summary:`5월 26일 오후 2시 31분경 서울 서소문고가도로 철거 작업 도중 충정로역 방향 최우측 상판과 거더, 비계 일부가 한꺼번에 무너져 3명이 사망하고 3명이 다쳤다. 사망자는 시공사 흥화건설 소속 60대 감리단장과 60대 현장소장, 50대 외부 안전진단 전문가로 모두 안전관리 라인의 핵심 책임자였다. 사고 당일 새벽 슬래브에 2.9cm 단차가 발견돼 작업이 일시 중단됐고, 오후 2시 안전진단을 재개하던 중 거더가 끊어진 것으로 추정된다. 이재명 대통령은 사고 수습과 부상자 치료에 만전을 다하고 원인을 엄정 조사하라고 지시했다. 30일 오전 5시 계획대로 철도시설 복구가 완료돼 열차 운행이 재개됐다. 도심 노후 인프라 철거 공사 전반의 안전관리 체계가 도마에 오르며 국토부가 전국 점검에 들어갔다.`,
  keyTerms:[{term:`거더`,explanation:`교량 상판을 떠받치는 수평 주들보로, 다리 무게 대부분을 견디는 핵심 구조물. 거더 하나가 끊어지면 그 위 상판은 곧장 무너지기 때문에, 철거·보수 공사에서 가장 위험한 작업 단계로 꼽힌다.`}],
  history:`서소문고가도로는 1970년대 도심 동맥으로 건설됐으나 노후화와 도시미관 문제로 2025년 말 철거가 결정됐다. 비슷한 시기 서울시 내 1970~80년대 건설 고가 8곳이 순차 철거 일정에 올랐다. 한국은 1994년 성수대교 붕괴 이후에도 정자교(2023년) 등 인프라 사고가 반복돼 노후 SOC 안전관리가 만성 과제로 지목돼 왔다.`,
  players:`발주처는 서울시, 시공사는 흥화건설, 감리는 별도 용역업체, 안전진단은 외부 전문기관이 맡았다. 사고 직후 경찰·국토부 항공·철도사고조사위원회·서울시 합동조사단이 꾸려졌다. 행정안전부는 전국 노후 교량 철거 현장에 대한 일제 점검을 지시했다.`,
  current:`사망자 전원이 안전관리 책임자였다는 점이 안전 시스템이 작동 중인데도 사고가 났다는 충격을 키우고 있다. 30일 철도 재개로 교통은 정상화됐지만 사고 원인 규명은 이제 시작 단계다.`,
  outlook:`1차 합동조사 결과는 6월 둘째 주 발표가 유력하며, 흥화건설에 대한 영업정지·형사책임 절차가 뒤따를 가능성이 크다. 서울시는 6월 중 남은 7개 고가 철거 공정 전면 재검토를 예고했다.`,
  sources:[{title:`서울 한복판 고가차도 무너져 3명 사망·3명 부상 - MBC`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6825381_37004.html`},{title:`서소문고가도로 붕괴 사고 - 나무위키`,url:`https://namu.wiki/w/%EC%84%9C%EC%86%8C%EB%AC%B8%EA%B3%A0%EA%B0%80%EB%8F%84%EB%A1%9C%20%EB%B6%95%EA%B4%B4%20%EC%82%AC%EA%B3%A0`},{title:`도미노처럼 상판 와르르 서소문고가 철거 중 붕괴 - 네이트 뉴스`,url:`https://news.nate.com/view/20260526n35896`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`구글 제미나이 3.5 플래시 공개, 앤트로픽은 밀라노 오피스 신설로 EMEA 확장`,
  metrics:[`나스닥 5월 상승률 +8% (AI주 주도)`,`앤트로픽 해외 거점: 6곳(런던·도쿄·벵갈루루·싱가포르·서울·밀라노)`],
  summary:`구글은 연례 개발자 콘퍼런스 I/O 2026에서 제미나이 3.5 플래시를 공개했다. 플래그십 모델 수준의 추론 성능을 유지하면서 응답 속도를 대폭 끌어올려 플래시 라인업의 패러다임 전환이라는 평가를 받았다. 앤트로픽은 5월 27일 밀라노 오피스 개소를 발표해 런던·도쿄·벵갈루루·싱가포르·서울에 이은 여섯 번째 해외 거점을 확보했다. 48시간 사이 유럽 2개 도시에 동시 진출하며 EMEA(유럽·중동·아프리카) 전략을 본격화한 것이다. 앤트로픽이 자체 개발한 프런티어 모델은 최근 금융·인프라 레거시 시스템에서 수십 년 묵은 취약점을 자동으로 찾아내는 능력을 입증했다. 미국 빅테크의 AI 자본·연구개발 집중은 5월 나스닥 8% 상승의 핵심 동력이었다. 한국 정부·기업도 자체 파운데이션 모델과 데이터센터 투자 재편 압박을 받고 있다.`,
  keyTerms:[{term:`프런티어 모델`,explanation:`현존하는 AI 모델 중 가장 앞선 성능을 가진 최첨단 대형 모델을 부르는 말. 구글 제미나이 시리즈나 앤트로픽 클로드 시리즈처럼 막대한 비용을 들여 만든 최전선 모델만 이렇게 분류된다.`}],
  history:`2023년 챗GPT 등장 이후 AI 시장은 OpenAI, 구글, 앤트로픽 3강 구도로 재편됐고, 2025년부터는 모델 성능 격차보다 기업·정부 도입 속도가 승부처가 됐다. 앤트로픽은 2025년 6월 서울 오피스를 열며 한국 진출을 가속화했다. 5월 27일 밀라노 오피스 신설은 EMEA 시장 본격 공략의 신호탄이다.`,
  players:`구글(순다르 피차이 CEO, 데미스 허사비스 딥마인드 CEO), 앤트로픽(다리오 아모데이 CEO), OpenAI, 메타, xAI가 글로벌 5강이다. 한국에서는 네이버 하이퍼클로바X, 카카오, LG AI연구원, 삼성 가우스 등이 자체 모델을 운용 중이다. 엔비디아·TSMC·SK하이닉스·삼성전자가 인프라 공급망의 핵심이다.`,
  current:`구글의 제미나이 3.5 플래시는 빠른 모델도 추론을 잘 한다는 새 기준을 제시했고, 앤트로픽의 거점 확장은 기업 영업력이 차세대 승부처임을 보여준다. 두 흐름이 동시에 시장 변동성을 키웠다.`,
  outlook:`6월 OpenAI 연례 개발자 행사와 메타 커넥트 일정이 줄지어 잡혀 있다. 한국에서는 6월 중 정부 국가 AI 컴퓨팅 인프라 1차 사업자 선정이 예정돼 있어 빅테크 협력 구도가 바뀔 수 있다.`,
  sources:[{title:`100 things we announced at Google I/O 2026 - Google Blog`,url:`https://blog.google/innovation-and-ai/technology/ai/google-io-2026-all-our-announcements/`},{title:`AI News Today - May 30, 2026: 11 Biggest Stories - BuildFastWithAI`,url:`https://www.buildfastwithai.com/blogs/ai-news-today-may-30-2026`},{title:`6 AI breakthroughs that will define 2026 - InfoWorld`,url:`https://www.infoworld.com/article/4108092/6-ai-breakthroughs-that-will-define-2026.html`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`대서양 해류 약화 증거 새로 확인…하반기 엘니뇨 재발 가능성 경고`,
  metrics:[`칠레 2025~2026 산불 시즌 피해 면적: 전년 대비 +193%`,`아르헨티나 추부트 산림 소실: 3만 헥타르`],
  summary:`기후과학자들이 북대서양 광범위한 해역에서 대서양 자오선 역전 순환(AMOC) 약화의 강력한 증거를 새로 확인했다고 발표했다. AMOC가 정체되면 유럽 한파, 동아시아 여름 폭우, 적도 강수대 이동 등 글로벌 기후 패턴이 동시다발로 흔들린다. 동시에 기후 모델은 2026년 하반기 엘니뇨 재등장 가능성을 높게 보고 있어, 가뭄·작황 붕괴·전염병 확산 위험이 동반될 수 있다. 칠레는 2025~2026 산불 시즌 동안 3,000건 이상의 화재로 피해 면적이 전년 대비 193% 늘었고, 아르헨티나 파타고니아 추부트주에서도 산림 3만 헥타르가 소실됐다. 미 워싱턴주에서는 화학물질 탱크 파열로 11명이 실종·사망 추정되며 컬럼비아강 오염이 확산됐다. 한국 기상청은 7~8월 평년보다 높은 강수 변동성을 예고하며 장마 전선 변화를 주시하고 있다.`,
  keyTerms:[{term:`대서양 자오선 역전 순환(AMOC)`,explanation:`대서양에서 따뜻한 물은 북쪽으로, 차가운 물은 남쪽 깊은 바다로 흐르며 지구의 열을 순환시키는 거대한 컨베이어벨트. 이 흐름이 약해지면 유럽 한파, 아시아 폭우, 해수면 상승 등 전 지구 기후가 출렁인다.`}],
  history:`AMOC 약화 가능성은 2018년 네이처 논문에서 처음 정량적으로 제기된 뒤, 2023~2025년 모니터링 데이터가 누적되며 실제로 둔화 중이라는 합의에 가까워졌다. 엘니뇨는 2023~2024년 강하게 발생했다가 2025년 라니냐로 전환됐고, 2026년 하반기 재발 시 단기 사이클이 가속화된다.`,
  players:`AMOC 연구는 영국 국립해양학센터, 독일 알프레드베게너연구소, 미국 NOAA가 중심이다. 엘니뇨·라니냐 진단은 NOAA CPC와 호주 기상청, WMO가 발표한다. 칠레·아르헨티나 산불 대응은 양국 국가산림청과 UN OCHA가 협력한다.`,
  current:`단일 이상기후가 아니라 해양 순환·엘니뇨·극단 산불이 동시에 진행되는 점이 위험을 키운다. 식량·에너지·해운 전반에 동시 충격을 줄 수 있는 시나리오가 처음으로 현실화 단계에 들어섰다.`,
  outlook:`6월 초 NOAA가 엘니뇨 공식 진단을 업데이트할 예정이며, 9월 WMO 기후 회의에서 AMOC 위험에 대한 권고문이 나올 가능성이 있다. 한국은 7월 장마 패턴이 1차 시험대다.`,
  sources:[{title:`Climate emergencies photos of 2026 so far - Greenpeace International`,url:`https://www.greenpeace.org/international/story/82686/climate-emergencies-photos-of-2026-so-far/`},{title:`Earth & Climate News - ScienceDaily`,url:`https://www.sciencedaily.com/news/earth_climate/`},{title:`Disaster Risk Reduction and Open Data Newsletter: May 2026 - CODATA`,url:`https://codata.org/disaster-risk-reduction-and-open-data-newsletter-may-2026-edition/`}]
}]

  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피 8476 사상 최고치 경신, 삼성전자 시가총액 2000조원 돌파`,
  metrics:[`코스피 8476.15 (+3.55%)`,`삼성전자+우선주 시가총액 2000조원 돌파`],
  summary:`코스피지수가 5월 29일 전일 대비 290.86포인트(3.55%) 상승한 8476.15에 마감하며 또다시 사상 최고치를 경신했다. 같은 날 삼성전자와 우선주 합산 시가총액이 2000조원을 돌파해 한국 증시 역사상 처음으로 단일 종목군이 이 선을 넘었다. 코스피 강세는 미국-이란 종전 기대감과 글로벌 위험선호 회복에 따른 외국인 매수세 유입이 결정적이었다. 메모리 반도체 슈퍼사이클과 AI 인프라 투자 확대도 지수 상승을 뒷받침했다. 다만 코스닥지수는 2.68% 떨어진 1074.8로 마감해 대형주와 중소형주 간 양극화가 심화됐다. 원달러 환율은 전일 대비 5.0원 오른 1507.9원에 주간거래를 마쳐 원화 약세 흐름은 지속됐다. 시장 일각에서는 단기 과열 우려와 차익실현 매물 출회 가능성을 경고하고 있다.`,
  keyTerms:[{term:`시가총액`,explanation:`회사가 발행한 주식 전체의 시장 가치를 의미하며, 주가에 발행 주식 수를 곱해서 계산한다. 시가총액 2000조원 돌파는 한국 명목 GDP의 약 80%에 해당하는 거대한 규모다.`}],
  history:`2024년부터 시작된 AI 반도체 슈퍼사이클이 한국 대표 수출 기업들의 실적을 끌어올리며 코스피는 2025년 하반기부터 사상 최고치 행진을 이어왔다. 2026년 들어 미국 빅테크 AI 투자 확대와 외국인 자금 유입이 본격화되면서 지수가 8000선을 돌파했다. 5월 들어서는 미-이란 정전 기대감으로 위험자산 선호가 강해져 추가 랠리가 펼쳐졌다.`,
  players:`외국인 투자자가 매수 주체로 부상한 가운데 삼성전자·SK하이닉스 등 메모리 반도체 대형주가 지수 상승을 주도하고 있다. 한국거래소와 금융감독원은 시장 과열 모니터링을 강화했고 한국은행은 통화·환율 안정에 신경을 쓰고 있다. 연기금과 개인 투자자는 차익실현 매도세로 돌아서고 있다.`,
  current:`단일 종목군 시가총액 2000조원 돌파는 한국 자본시장의 새 이정표이자 반도체 의존도 심화를 동시에 보여준다. 코스피·코스닥 디커플링과 원화 약세는 시장의 구조적 양극화를 시사한다.`,
  outlook:`6월 FOMC 점도표와 한미 정책금리 흐름, 미-이란 정전 최종 타결 여부가 단기 변수다. 2분기 실적 시즌 진입과 함께 차익실현 매물 압력도 커질 전망이다.`,
  sources:[{title:`코스피 사상 최고치 경신 - 한국경제`,url:`https://www.hankyung.com/`},{title:`Finance & Forex Weekly Recap: May 25-29, 2026 - Babypips`,url:`https://www.babypips.com/analysis/weekly-market-recap-may-25-29-2026`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`한국은행 기준금리 2.50% 8회 연속 동결, 신현송 신임 총재 첫 회의`,
  metrics:[`기준금리 2.50% 동결 (8회 연속)`,`4월 소비자물가 상승률 2.6%`],
  summary:`한국은행 금융통화위원회는 5월 29일 기준금리를 연 2.50%로 동결하며 8회 연속 동결 결정을 이어갔다. 이번 회의는 지난달 취임한 신현송 신임 총재가 주재한 첫 통화정책 결정회의로 시장 컨센서스에도 부합했다. 4월 소비자물가 상승률이 2.6%로 3월(2.2%)보다 오르며 2024년 7월 이후 최고치를 기록한 점이 동결 결정의 핵심 배경이 됐다. 중동 지정학 리스크에 따른 국제유가 변동성과 1500원대를 위협하는 원화 약세도 금리 인하 여력을 제약했다. 한은은 가계부채와 부동산 시장 안정 등 금융안정 측면도 신중하게 고려했다고 밝혔다. 이날 결정으로 한미 정책금리 격차는 1.25%포인트 수준에서 유지됐다. 시장에서는 하반기 인플레이션 흐름과 외환시장 안정 여부가 인하 재개의 변수가 될 것으로 본다.`,
  keyTerms:[{term:`기준금리`,explanation:`중앙은행이 시중 은행에 자금을 공급할 때 적용하는 핵심 금리로, 예금·대출·채권 등 모든 시중금리의 기준이 된다. 기준금리를 동결하면 시중 금리도 큰 변화 없이 유지된다.`}],
  history:`한국은행은 2025년 5월 기준금리를 2.75%에서 2.50%로 0.25%포인트 인하한 이후 1년 넘게 동결 기조를 이어오고 있다. 인플레이션 재반등과 환율 변동성이 추가 인하의 발목을 잡아왔다. 신현송 총재는 2026년 4월 이창용 전 총재 후임으로 취임했다.`,
  players:`신현송 한은 총재와 6명의 금통위원이 정책 결정을 주도하며, 기획재정부와 금융위원회가 거시 정책 공조를 한다. 미국 연준의 정책금리 결정이 한국의 외환·자본 흐름에 직접적인 영향을 미치는 외부 변수다.`,
  current:`고환율·고물가·금융안정 사이의 트레이드오프가 갈수록 커지면서 통화정책 운신의 폭이 좁아지고 있다. 새 총재의 첫 회의에서 보수적 시그널이 확인된 점이 시장의 관심을 끌었다.`,
  outlook:`다음 금통위는 7월에 예정돼 있으며 6월 미국 FOMC 결과와 5~6월 물가지표가 인하 재개 시점을 결정할 핵심 변수다. 원달러 환율이 1500원을 안정적으로 하회해야 인하 논의가 본격화될 것으로 관측된다.`,
  sources:[{title:`한국은행 기준금리 동결 - 한국은행`,url:`https://www.bok.or.kr/portal/main/main.do`},{title:`South Korea Interest Rate Decision - Investing.com`,url:`https://www.investing.com/economic-calendar/interest-rate-decision-473`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미국 PCE 인플레이션 둔화·1분기 GDP 1.6%로 하향 조정`,
  metrics:[`미국 1분기 GDP 1.6% (기존 2.0%에서 하향)`,`5월 PCE 전월비 시장 예상치 하회`],
  summary:`미국 5월 개인소비지출(PCE) 인플레이션이 전월 대비 시장 예상치보다 다소 둔화된 것으로 발표됐지만 근원물가 압력은 여전히 높은 수준을 보였다. 같은 날 발표된 1분기 GDP 성장률은 종전 2.0%에서 1.6%로 하향 조정돼 경기 모멘텀 둔화 가능성이 제기됐다. 개인소비지출 증가율도 전월보다 식어 미국 가계의 소비 여력이 약화되고 있다는 신호로 해석된다. 이러한 PCE 인플레이션 둔화와 성장률 하향 조정은 연방준비제도의 추가 금리 인하 기대감을 자극했다. 다만 끈적한 근원물가는 연준의 정책 결정에 부담 요인으로 남아있다. 채권시장에서는 10년물 국채 수익률이 소폭 하락하며 안전자산 선호가 일부 반영됐다. 시장은 6월 FOMC 회의에서의 정책 신호와 점도표 변화를 주시하고 있다.`,
  keyTerms:[{term:`PCE 인플레이션`,explanation:`미국 연방준비제도(연준)가 가장 중시하는 물가지표로, 가계가 실제 지출한 상품·서비스 가격을 측정한다. 소비자물가지수(CPI)보다 가중치 변화를 잘 반영해 연준의 금리 결정에 직접 영향을 미친다.`}],
  history:`미국 경제는 2022~2024년 고금리 시기를 거친 뒤 2025년부터 점진적 금리 인하 기조에 들어섰다. 2026년 들어서는 관세·임금 압력 등으로 인플레이션 재반등 우려가 있었으나 1분기 들어 둔화 신호가 나오기 시작했다.`,
  players:`연방준비제도(파월 의장)와 FOMC 12명 위원이 정책 결정을 주도하며, 백악관·재무부는 재정·통상 정책으로 거시환경에 영향을 준다. 글로벌 채권시장과 달러 지수도 핵심 반응 지표다.`,
  current:`성장률이 1.6%로 하향 조정된 가운데 PCE도 둔화되며 스태그플레이션 우려는 완화되고 금리 인하 명분은 강해졌다. 다만 근원물가 끈적임이 정책 운용을 어렵게 만든다.`,
  outlook:`6월 17~18일 FOMC 회의에서 정책금리 결정과 점도표가 공개될 예정이다. 7월 발표 예정인 6월 PCE와 비농업 고용지표가 다음 단계 정책 방향을 가를 핵심 변수다.`,
  sources:[{title:`Financial Markets Daily Report 29 May 2026 - CaixaBank Research`,url:`https://www.caixabankresearch.com/en/publications/financial-markets-daily-report/29-may-2026`},{title:`May 2026 Economic and Market Update - Crestwood Advisors`,url:`https://www.crestwoodadvisors.com/may-2026-economic-and-market-update/`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`6·3 지방선거 사전투표 첫날 투표율 11.60% 역대 최고`,
  metrics:[`사전투표 첫날 투표율 11.60% (지방선거 역대 최고)`,`전남 사전투표율 전국 1위`],
  summary:`6월 3일 실시되는 제9회 전국동시지방선거 및 보궐선거의 사전투표가 5월 29일부터 전국에서 시작됐다. 사전투표 첫날 투표율은 11.60%를 기록해 사전투표 제도가 도입된 2014년 이후 지방선거 첫날 기준 역대 최고치를 갈아치웠다. 전남이 가장 높은 참여율을 보였고 수도권을 비롯한 대부분 지역에서 평균을 웃도는 흐름이 확인됐다. 더불어민주당과 국민의힘은 결집 효과 해석을 두고 엇갈린 평가를 내놓으며 막판 표심 잡기 공세를 이어갔다. 윤석열 전 대통령의 한덕수 위증 사건 1심 무죄 판결 등 정치권 변수도 부각되고 있다. 5월 30일 오후 6시까지 사전투표가 진행된 뒤 6월 3일 본투표가 치러진다. 본투표일 출구조사 결과에 따라 광역단체장 17곳의 판도가 가려질 전망이다.`,
  keyTerms:[{term:`사전투표`,explanation:`선거일 이전에 미리 투표할 수 있도록 만든 제도로, 별도의 부재자 신고 없이 전국 어느 사전투표소에서나 본인 확인만 거치면 투표할 수 있다. 2013년 도입돼 투표율 제고에 큰 기여를 해왔다.`}],
  history:`2022년 윤석열 정부 출범 이후 정치적 양극화가 심화된 가운데, 2024년 총선과 2025년 정치 격변기를 거치며 지방권력 지형이 다시 한 번 시험대에 올랐다. 이번 지방선거는 차기 대선 전초전 성격이 강하다는 평가가 많다.`,
  players:`더불어민주당과 국민의힘이 17개 광역단체장 자리를 두고 정면 대결하며, 조국혁신당·진보당 등 군소정당도 일부 지역에서 변수를 만들고 있다. 윤석열 전 대통령 관련 사법 일정도 보수 진영 결집 변수로 작용한다.`,
  current:`역대급 사전투표율은 양 진영의 위기감과 결집력을 동시에 반영하며 본투표 흐름의 가늠자가 되고 있다. 수도권·충청권 박빙 지역의 결과가 전체 판세를 좌우할 핵심 변수다.`,
  outlook:`5월 30일 사전투표 둘째 날 누적 투표율과 6월 3일 본투표 결과가 차기 정국 구도에 직결될 전망이다. 출구조사 발표는 6월 3일 오후 6시 직후 예정돼 있다.`,
  sources:[{title:`[오늘의 정치일정] 5월 29일(금) - 뉴스핌`,url:`https://www.newspim.com/news/view/20260528001316`},{title:`2026년 5월 29일 오늘의 주요 이슈 - 오늘의 클릭`,url:`https://www.cliktoday.com/2026/05/20260529-today-news.html`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미국-이란 정전 60일 연장 잠정 합의, 호르무즈 해협 재개통 임박`,
  metrics:[`정전 연장 기간 60일`,`글로벌 원유 수송의 약 20% 통과하는 핵심 길목`],
  summary:`미국과 이란 협상팀이 5월 28일 정전 협정 연장에 잠정 합의했으며 도널드 트럼프 대통령의 최종 승인을 기다리는 중이라고 다수 외신이 보도했다. 합의안은 정전을 60일간 추가 연장하고 호르무즈 해협을 통한 자유 항행을 보장하는 내용을 담고 있다. 트럼프 대통령은 이란이 고농축 우라늄을 인도하고 핵무기 추구를 포기할 것을 협상의 전제로 요구해왔다. 이란 파르스통신은 호르무즈 해협이 여전히 이란의 관할 아래 있다고 주장하며 미국 측 발표에 일부 반박 입장을 내놨다. 협상 중에도 양측은 페르시아만 일대에서 새로운 표적을 향한 산발적 군사 행동을 지속해 정전이 불안정한 상태임을 시사했다. 합의가 최종 체결되면 글로벌 유가 안정에 큰 영향을 줄 것으로 전망된다. 시장은 합의 임박 보도에 즉각 반응해 국제유가가 약세를 보이고 위험자산이 강세를 나타냈다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`페르시아만과 인도양을 잇는 좁은 해협으로, 전 세계 원유 수송의 약 20%가 통과하는 글로벌 에너지 안보의 핵심 길목이다. 이란이 봉쇄 카드를 거론할 때마다 국제유가가 출렁이는 이유다.`}],
  history:`2026년 초 이란 핵 시설을 둘러싼 미국·이스라엘과 이란 간 무력 충돌이 본격화되면서 호르무즈 해협 봉쇄 위기가 발생했다. 5월 들어 양국은 카타르·오만 중재로 협상 채널을 가동해 1차 정전에 이어 연장 협상을 진행 중이다.`,
  players:`도널드 트럼프 미 대통령과 이란 페제시키안 대통령이 정상 채널에서 최종 결정권을 행사하며, 카타르·오만이 중재 역할을 하고 있다. 이스라엘과 사우디아라비아는 합의 내용에 따라 지역 정세에 핵심 영향을 받는다.`,
  current:`정전 연장 합의가 임박했지만 우라늄 농축·해협 관할권 문제 등 핵심 쟁점에서 양측 입장차가 여전히 크다. 산발적 군사 충돌이 합의 이행의 위험 요인이다.`,
  outlook:`트럼프 대통령의 최종 서명 여부가 단기 변수이며, 합의 이후 60일간 핵 협상 본 의제에서 진전이 있을지가 관건이다. 호르무즈 통항이 정상화되면 국제유가는 추가 안정세를 보일 전망이다.`,
  sources:[{title:`US, Iran Negotiators Reach Tentative Deal - RFE/RL`,url:`https://www.rferl.org/a/iran-war-us-hormuz-oil-blockade-gulf-israel/33640284.html`},{title:`May 28, 2026 - US and Iran reach tentative agreement - CNN`,url:`https://www.cnn.com/2026/05/28/world/live-news/iran-war-us-news`},{title:`U.S. and Iran work toward deal to extend ceasefire - Washington Post`,url:`https://www.washingtonpost.com/world/2026/05/24/us-iran-near-deal-extend-ceasefire-reopen-hormuz/`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`러시아 드론, 루마니아 아파트 추락…NATO 동부전선 긴장 고조`,
  metrics:[`민간인 부상 2명`,`루마니아, 러시아 영사 추방 및 영사관 폐쇄 결정`],
  summary:`러시아 드론이 5월 29일 루마니아 동부 한 아파트에 추락해 주민 2명이 부상하는 사건이 발생했다. 루마니아 외무부는 즉각 이를 국제법의 중대한 위반으로 규정하고 콘스탄차 주재 러시아 영사를 페르소나 논 그라타(외교적 기피 인물)로 지정해 추방하며 영사관 폐쇄를 발표했다. NATO 가맹국 영토가 직접적으로 피해를 입은 이번 사건은 동맹 차원의 즉각적인 규탄과 안보 협의를 촉발했다. 에스토니아·리투아니아·라트비아·핀란드 등도 최근 수개월간 자국 영공 침범 사례를 잇따라 보고하고 있어 동부 전선 전반의 긴장이 고조되고 있다. 같은 기간 우크라이나에서는 28일 하루 동안 189건의 교전이 있었고 러시아군 누적 손실 인원은 약 136만 명으로 집계됐다. 군사 전문가들은 의도된 도발 가능성과 우발적 사고 가능성을 모두 열어두고 있다. NATO는 5조 발동 여부와 별도로 대응 수위를 단계적으로 끌어올릴 가능성을 시사했다.`,
  keyTerms:[{term:`NATO`,explanation:`1949년 결성된 북대서양조약기구로 미국·유럽 32개국이 참여하는 집단방위 동맹이다. 한 회원국이 공격받으면 모든 회원국이 함께 대응하는 5조 조항이 핵심이며, 우크라이나 전쟁 이후 동부 전선 방위가 최우선 과제로 부상했다.`}],
  history:`2022년 러시아의 우크라이나 침공 이후 NATO 동부 회원국들의 영공·국경 침범 사례는 꾸준히 증가해왔다. 2026년 들어 라트비아 정부 붕괴 사태도 드론 사고가 도화선이 되었으며, 동부전선의 안보 위기가 동맹 차원의 화두로 부상했다.`,
  players:`NATO 사무총장과 미국·독일·프랑스 등 핵심 동맹국, 동부전선의 폴란드·루마니아·발트 3국이 직접 당사자다. 러시아 측은 우발 사고를 주장하지만 NATO는 의도성 가능성을 검토하고 있다.`,
  current:`회원국 민간 거주지가 직접 피해를 입은 첫 사례에 가까워 5조 발동 논의가 본격화될 가능성도 거론된다. 동부 전선 추가 병력 배치 압력이 커지고 있다.`,
  outlook:`6월 중 예정된 NATO 외무장관 회의와 7월 정상회의에서 동부 방공 강화·대러 제재 추가 등이 논의될 전망이다. 러시아의 후속 대응 수위가 단기 긴장의 향방을 좌우할 변수다.`,
  sources:[{title:`NATO states slam Russia after drone crashes in Romania - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/5/29/nato-states-slam-russia-after-drone-crashes-in-romania`},{title:`The Russia-Ukraine War Report Card, May 20, 2026 - Russia Matters`,url:`https://www.russiamatters.org/news/russia-ukraine-war-report-card/russia-ukraine-war-report-card-may-20-2026`}]

  headline:`서소문 고가차도 붕괴 수사 본격화, 경찰·노동부 7곳 동시 압수수색`,
  metrics:[`사망 3명·부상 3명`,`압수수색 7곳·인력 53명 투입, 11시간 소요`],
  summary:`서울경찰청과 고용노동부는 5월 29일 오전 9시부터 서소문 고가차도 붕괴 사고와 관련해 서울도시기반시설본부, 시공사 흥화건설, 감리업체 수성엔지니어링 등 7곳에 대한 동시 압수수색에 나섰다. 압수수색은 경찰 33명과 근로감독관 20명 등 총 53명이 투입돼 11시간 만인 오후 8시 종료됐다. 수사의 초점은 업무상 과실치사상 혐의와 중대재해처벌법·산업안전보건법 위반 여부에 맞춰져 있다. 사고는 5월 26일 발생해 작업자 3명이 숨지고 3명이 부상하는 인명피해로 이어졌다. 경찰은 공사 계획과 실제 작업의 일치 여부, 안전관리 절차 이행 실태를 집중 분석할 방침이다. 서소문 고가차도 잔여 구조물의 철거 공사는 29일 0시부터 시작돼 31일 새벽 5시까지 완료될 예정이다. 노동계와 시민사회는 반복되는 건설 현장 인명사고에 대한 구조적 대책 마련을 요구하고 있다.`,
  keyTerms:[{term:`중대재해처벌법`,explanation:`사업장에서 사망 등 중대한 산업재해가 발생했을 때 사업주와 경영책임자를 형사처벌할 수 있도록 한 법으로 2022년 1월 시행됐다. 안전 의무 위반이 확인되면 1년 이상 징역이나 10억원 이하 벌금에 처할 수 있다.`}],
  history:`한국에서는 2022년 광주 화정 아이파크 붕괴, 2023년 분당 정자교 붕괴 등 대형 인프라 사고가 반복되며 시민 안전에 대한 사회적 경각심이 높아져왔다. 2022년 시행된 중대재해처벌법은 경영자 책임을 강화했지만 사고 빈도는 크게 줄지 않았다.`,
  players:`서울경찰청 광역범죄수사대와 서울지방고용노동청이 수사를 주도하며, 발주처인 서울도시기반시설본부와 시공사 흥화건설, 감리업체 수성엔지니어링이 수사 대상이다. 서울시는 안전 관리 책임을 두고 비판에 직면해 있다.`,
  current:`압수수색이 본격화되며 수사의 향방이 책임자 사법처리 단계로 빠르게 진행되고 있다. 철거 공사 잔여 작업도 동시 진행돼 추가 안전사고 우려가 제기된다.`,
  outlook:`6월 초 1차 수사 결과 발표와 함께 책임자 소환 조사가 이뤄질 전망이다. 시민단체는 서울시 차원의 인프라 안전 전수조사와 공공발주공사 안전기준 강화 입법을 요구하고 있다.`,
  sources:[{title:`서소문 고가 붕괴 7곳 압수수색 11시간 만에 종료 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202605292005555889`},{title:`서소문 고가 붕괴 수사 확대 - 한국경제`,url:`https://www.hankyung.com/article/2026052973831`},{title:`노동부, 서소문 고가차도 붕괴사고 시공사 압수수색 - 헤럴드경제`,url:`https://biz.heraldcorp.com/article/10758419`}]

  headline:`삼성전자·SK하이닉스 HBM4 양산 본격화, 1분기 사상 최대 실적`,
  metrics:[`SK하이닉스 1Q 영업이익 37.6조원 (+405.5%)`,`SK하이닉스 HBM 시장 점유율 목표 70%`],
  summary:`SK하이닉스가 2026년 1분기 매출 52조 5763억원, 영업이익 37조 6103억원으로 창사 이래 최대 실적을 기록했고 영업이익 증가율은 전년 동기 대비 405.5%에 달했다. 삼성전자도 같은 기간 영업이익이 8배 이상 급증하며 메모리 슈퍼사이클 정점을 함께 통과하고 있다. 양사 모두 AI 가속기용 HBM4 수요 폭증에 힘입어 실적 성장이 본격화됐다는 평가다. 삼성전자는 2월부터 최고 11.8Gbps 속도의 HBM4 양산 출하를 시작했고 올해 HBM 매출을 전년 대비 3배 이상 늘릴 계획이다. SK하이닉스는 세계 최초로 HBM4 개발을 완료하고 엔비디아 차세대 루빈 플랫폼 물량을 상당 부분 확보하며 시장 점유율 70%를 목표로 생산을 극대화하고 있다. 다만 갈륨·희귀 가스 등 핵심 소재 공급망이 중국·중동 지역에 집중돼 있어 지정학적 리스크가 변수로 작용한다. 글로벌 반도체 시장 규모는 AI 붐을 동력으로 2026년 1조 달러 시대 진입이 예상된다.`,
  keyTerms:[{term:`HBM4`,explanation:`고대역폭메모리(High Bandwidth Memory) 4세대 제품으로 AI 가속기에 필수적인 초고속 메모리다. 이전 세대 HBM3E 대비 2배 대역폭과 40% 향상된 전력 효율을 제공해 엔비디아 차세대 GPU에 탑재된다.`}],
  history:`2023년 엔비디아 H100 GPU의 폭발적 수요를 기점으로 HBM이 AI 반도체의 핵심 부품으로 부상했다. SK하이닉스는 HBM3·HBM3E에서 시장을 선점했고 삼성전자는 후발주자로 추격 중이다. 2024~2025년부터 글로벌 빅테크의 AI 투자가 본격화되며 HBM 시장이 폭발적으로 성장했다.`,
  players:`SK하이닉스와 삼성전자가 글로벌 HBM 공급의 90% 이상을 차지하며, 마이크론이 추격 중이다. 엔비디아·AMD·구글·메타가 주요 고객사이며, 중국은 갈륨 수출 통제로 공급망에 영향력을 행사한다.`,
  current:`HBM4 양산 본격화로 매출 구조 자체가 한 단계 점프하고 있으며, 양사 모두 사상 최대 실적을 갈아치우는 중이다. 다만 지정학 리스크와 미국 관세 정책이 변수다.`,
  outlook:`2분기 실적 발표와 함께 엔비디아 루빈 GPU 양산 일정이 단기 모멘텀을 좌우할 전망이다. 하반기 HBM4E 개발 진행 상황이 차기 경쟁의 핵심 변수가 된다.`,
  sources:[{title:`삼성·SK하이닉스 사상 최대 실적인데 공급망은 지뢰밭 - 글로벌이코노믹`,url:`https://www.g-enews.com/article/Global-Biz/2026/05/202605111358133679fbbec65dfb_1`},{title:`AI 붐이 만든 1조 달러 시대, 2026년 반도체 시장 폭발적 성장 - 테크월드`,url:`https://www.epnc.co.kr/news/articleView.html?idxno=400056`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`구글 제미나이 3.5 플래시 공개, OpenAI 프론티어 거버넌스 발표`,
  metrics:[`구글 I/O 2026 공식 발표일 5월 29일`,`Gemini 3.5 Flash, 코딩·에이전트 벤치마크 Gemini 3.1 Pro 능가`],
  summary:`구글이 5월 29일 연례 개발자 콘퍼런스 I/O 2026에서 새 AI 모델 제미나이 3.5 플래시를 공개하며 차세대 AI 경쟁의 막을 올렸다. 제미나이 3.5 플래시는 플래그십 모델급 지능을 플래시 시리즈 특유의 속도로 제공하며 코딩과 에이전트형 작업 벤치마크에서 이전 세대 제미나이 3.1 프로를 능가한다고 발표됐다. 같은 날 구글은 검색·지메일·유튜브 전반에서 작동하는 통합 쇼핑 카트 유니버설 카트도 함께 선보였다. OpenAI는 같은 날 프론티어 거버넌스 프레임워크를 공개하고 미국 정부와 협력하는 로잘린드 바이오디펜스 프로젝트의 접근 범위를 확대했다고 밝혔다. 카카오·OpenAI·일레븐랩스 등은 AI 생성 콘텐츠 식별을 위한 SynthID 워터마크 기술을 확대 적용하며 콘텐츠 출처 표시 산업 협력에 동참했다. 모델 성능 경쟁과 안전·거버넌스 강화 흐름이 동시에 진행되며 빅테크의 AI 전략이 다층화되는 모습이다. 시장은 차세대 AI 모델 출시 주기 단축과 에이전트형 AI 상용화 속도에 주목하고 있다.`,
  keyTerms:[{term:`제미나이 3.5 플래시`,explanation:`구글이 출시한 차세대 AI 모델로, 대형 플래그십 모델 수준의 지능을 빠른 속도로 제공하는 것이 특징이다. 코딩과 자율 작업(에이전트) 성능이 이전 세대 대비 크게 향상돼 실제 업무 자동화에 강점이 있다.`}],
  history:`2022년 ChatGPT 등장 이후 글로벌 AI 모델 경쟁이 본격화됐고, 2024~2025년에는 멀티모달과 에이전트 기능이 핵심 차별화 요소로 부상했다. 2026년에는 안전·거버넌스 이슈가 동시 부각되며 모델 성능과 책임 있는 AI가 함께 강조되고 있다.`,
  players:`구글·OpenAI·앤트로픽·메타가 글로벌 빅테크 4강 구도를 형성하고 있으며, 카카오·일레븐랩스 등 한국·유럽 기업도 협력 생태계에 합류하고 있다. 미국 정부는 바이오디펜스 등 안보 영역에서 AI 활용을 본격화하고 있다.`,
  current:`모델 출시 주기가 6개월 미만으로 단축되고 있으며, 단순 챗봇을 넘어 에이전트형 AI가 실생활 서비스에 침투하기 시작했다. 워터마크 표준화 등 안전 인프라 정비도 함께 진행 중이다.`,
  outlook:`OpenAI의 차기 모델 공개 일정과 앤트로픽의 클로드 차세대 버전 발표가 단기 관전 포인트다. 미국·EU의 AI 거버넌스 규제 입법 진척이 글로벌 시장 구도에 영향을 줄 전망이다.`,
  sources:[{title:`100 things we announced at Google I/O 2026 - Google Blog`,url:`https://blog.google/innovation-and-ai/technology/ai/google-io-2026-all-our-announcements/`},{title:`OpenAI News - OpenAI`,url:`https://openai.com/news/`},{title:`OpenAI Release Notes - May 2026 Latest Updates - Releasebot`,url:`https://releasebot.io/updates/openai`}]
}]

  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`美 4월 PCE 물가 3.8% 급등에도 나스닥·S&P500 사상 최고치 마감`,
  metrics:[`근원 PCE 전년대비 3.8%`,`5년물 국채입찰 금리 4.182%`],
  summary:`28일 발표된 미국 4월 PCE 물가는 전년 대비 3.8% 상승해 약 3년 만에 최고치를 찍었지만, 뉴욕 증시는 나스닥과 S&P500이 나란히 사상 최고치로 마감했다. 시장은 인플레이션 우려보다 이란 전쟁 휴전 가능성 보도(이후 오보 판명)와 기업 실적 호조에 더 강하게 반응했다. 같은 날 5년물 국채 입찰은 4.182%에 낙찰돼 직전 3.955%보다 크게 뛰며, 투자자들이 재정적자 확대에 대한 보상을 더 요구하고 있음을 보여줬다. 와시 의장의 연준은 6월 회의에서 금리 동결과 추가 인상 압력 사이의 갈림길에 섰다. 베스트바이·달러트리·아질런트는 실적 호조로 급등한 반면 시놉시스는 GAAP 실적 우려로 5% 하락했다. PCE 결과는 향후 통화정책 경로의 핵심 변수가 될 전망이다.`,
  keyTerms:[{term:`PCE 물가`,explanation:`PCE는 개인소비지출 물가지수로 연준이 가장 중시하는 인플레이션 지표다. 소비자물가지수(CPI)보다 폭넓은 지출 패턴을 반영하기 때문에 금리 결정의 핵심 잣대로 쓰인다.`}],
  history:`연준은 2022년부터 고강도 긴축으로 인플레를 4%대 이하로 끌어내렸지만, 2026년 들어 이란 전쟁과 관세 리스크가 겹치며 인플레가 다시 가속됐다. PCE는 연준이 CPI보다 더 신뢰하는 지표로 정책 결정의 최우선 기준이다.`,
  players:`연준(와시 의장)이 통화정책을 결정하고, 미 재무부는 국채 발행으로 시장 금리에 영향을 준다. 월가 대형은행과 헤지펀드, 기업 실적 등이 시장 방향을 좌우한다.`,
  current:`PCE가 3년 최고치를 찍었음에도 증시가 사상 최고치를 경신한 것은, 시장이 휴전 기대와 AI 실적 모멘텀에 베팅하고 있음을 보여준다. 다만 펀더멘털과 가격의 괴리는 변동성 확대 위험을 키운다.`,
  outlook:`6월 연준 FOMC에서의 금리 결정과 5월 고용·CPI 지표가 다음 분기점이다. 휴전이 무산되면 유가·인플레가 동시 급등하며 시장이 급격히 재조정될 가능성이 있다.`,
  sources:[{title:`Stock Market Today (May 28, 2026): Nasdaq, S&P 500 set new record - TheStreet`,url:`https://www.thestreet.com/stock-market-today/stock-market-today-dow-jones-sp-500-nasdaq-updates-may-28-2026`},{title:`Global Economy Briefing — May 28, 2026 - Rio Times`,url:`https://www.riotimesonline.com/global-economy-briefing-may-28-2026/`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피 8180선 후퇴…한은 총재 «환율 쏠림 단호 대처» 발언`,
  metrics:[`코스피 8180선 마감`,`5월 소비자심리지수 106.1(+6.9p)`],
  summary:`28일 코스피는 중동 지정학 리스크 확산과 한국은행의 금리 인상 시사가 겹치며 8180선으로 후퇴 마감했다. 코스닥도 2%대 급락하며 외국인 매도가 이어졌다. 신현송 한국은행 총재는 같은 날 5월 통화정책방향 기자간담회에서 «환율 쏠림에 대해서는 단호하게 대처하겠다»고 밝히며 외환시장 개입 의지를 강하게 시사했다. 5월 소비자심리지수는 106.1로 전월 대비 6.9포인트 올랐지만, 이란 전쟁발 유가 불안이 한국 경제 전망을 흔들고 있다. 삼성전자·SK하이닉스는 지난 1년간 각각 436%, 1000% 급등해 AI 반도체 수요로 지수를 견인해왔다. 한은이 환율 방어와 물가 안정 사이에서 어떤 카드를 꺼낼지가 다음 통화정책 회의의 최대 관전 포인트다.`,
  keyTerms:[{term:`환율 쏠림`,explanation:`외환시장에서 거래가 한 방향, 주로 원화 약세 쪽으로 과도하게 집중되는 현상이다. 한은 총재가 이 표현을 쓰면 시장 개입이 임박했다는 강한 경고 신호로 읽힌다.`}],
  history:`원·달러 환율은 2026년 들어 이란 전쟁과 미 금리 동결 기조로 1450원대까지 치솟았다. 한은은 그간 점진적 개입을 선호해왔으나, 단방향 쏠림이 심해지면서 톤이 강해졌다.`,
  players:`한국은행, 기획재정부, 외국인 투자자, 삼성전자·SK하이닉스 등 대형 수출주가 핵심 플레이어다. 신현송 총재의 발언 한 마디가 환율·증시 단기 방향을 좌우한다.`,
  current:`AI 반도체 호황으로 펀더멘털은 견조하지만, 환율 방어 비용과 가계부채 부담 사이에서 한은의 운신 폭이 좁다. 금리 인상은 부동산·내수에 부담, 동결은 환율 추가 약세 위험이다.`,
  outlook:`6월 통화정책방향회의의 기준금리 결정과 외환당국의 실제 시장 개입 여부를 주시해야 한다. 이란 전쟁 전개에 따라 외환·증시 변동성이 다시 폭증할 수 있다.`,
  sources:[{title:`한국은행 통화정책방향 기자간담회 - 한국은행`,url:`https://www.bok.or.kr/portal/main/main.do`},{title:`코스피 일일 동향 - Investing.com`,url:`https://kr.investing.com/indices/kospi`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`델 1분기 매출 438억 달러 88% 급증…서버 부문 181% 폭발`,
  metrics:[`매출 \$43.84B (+88% YoY)`,`데이터센터·서버 +181% YoY`],
  summary:`델 테크놀로지는 1분기 매출 438억 4천만 달러를 기록해 전년 대비 88% 급증했다고 28일 발표했다. 조정 주당순이익은 4.86달러로 시장 예상을 큰 폭으로 상회했다. 매출 폭증의 핵심 동력은 AI 서버 수요로, 데이터센터·서버 부문이 전년 대비 181% 성장했다. 엔비디아 H100·B100 GPU를 탑재한 AI 인프라 구축에 빅테크가 막대한 자금을 투입하면서 델·슈퍼마이크로 등 서버 제조사가 직접 수혜를 입고 있다. 이는 미 빅테크 4사의 2026년 합산 캐펙스가 4000억 달러를 돌파할 것이라는 전망과도 맞물린다. 다만 일부 분석가는 AI 투자 사이클의 정점이 가까워지고 있다는 신중론도 제기하고 있어, 사이클 지속 여부가 향후 IT 하드웨어 업종의 핵심 변수다.`,
  keyTerms:[{term:`AI 서버 수요`,explanation:`AI 모델을 학습·추론시키는 데 필요한 고성능 GPU 서버에 대한 폭증하는 기업 수요다. 엔비디아 칩과 함께 델·슈퍼마이크로 등 서버 제조사의 매출을 끌어올리는 직접 동력이다.`}],
  history:`2023년 챗GPT 열풍 이후 빅테크의 AI 인프라 투자가 시작됐고, 2024~2025년을 거치며 캐펙스 규모가 매년 두 배씩 커졌다. 델은 PC 사업 의존 기업에서 AI 서버 강자로 체질 전환에 성공했다.`,
  players:`엔비디아(GPU), 델·슈퍼마이크로·HPE(서버), 마이크로소프트·구글·메타·아마존(고객)이 핵심 축이다. 한국의 삼성전자·SK하이닉스도 HBM 메모리 공급으로 이 사슬에 깊이 연결돼 있다.`,
  current:`델 실적은 AI 캐펙스가 정점이 아니라는 강한 시그널이다. 하지만 일부 빅테크가 자체 칩 개발을 가속하면서 서버 수익성 향배에 불확실성이 커지고 있다.`,
  outlook:`6월 엔비디아 GTC 후속 발표, 빅테크 2분기 실적에서의 캐펙스 가이던스가 다음 분기점이다. AI 수요 둔화 시그널이 나오면 관련 종목 전반의 멀티플 조정이 불가피하다.`,
  sources:[{title:`Dell Q1 FY27 Earnings - Reuters`,url:`https://www.reuters.com/business/dell-earnings/`},{title:`Stock Market Today (May 28, 2026) - TheStreet`,url:`https://www.thestreet.com/stock-market-today/stock-market-today-dow-jones-sp-500-nasdaq-updates-may-28-2026`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`윤석열 전 대통령 위증 혐의 1심 무죄…내란특검 징역 2년 구형 뒤집어`,
  metrics:[`1심 선고 무죄`,`특검 구형 징역 2년`],
  summary:`서울중앙지방법원 형사합의32부는 28일 윤석열 전 대통령에 대한 위증 혐의 1심에서 무죄를 선고했다. 윤 전 대통령은 한덕수 전 국무총리의 내란 재판에 증인으로 출석해 허위 증언한 혐의로 기소됐으나, 재판부는 기소 내용 전부에 대해 무죄로 판단했다. 내란 특검팀은 결심 공판에서 윤 전 대통령에게 징역 2년 실형을 구형한 바 있어, 이번 판결은 특검 수사 전반에 적지 않은 충격을 줬다. 12·3 비상계엄 관련 일련의 재판 흐름에 변수가 생겼으며, 특검은 즉시 항소 방침을 시사했다. 야권은 사법부 결정 존중을 강조한 반면 여당은 정치 보복 수사라며 거세게 반발했다. 항소심에서의 쟁점 정리와 본 내란 재판 결과가 6·3 지방선거 직후 정국의 최대 변수로 떠올랐다.`,
  keyTerms:[{term:`위증 혐의`,explanation:`법정에서 증인이 선서한 뒤 거짓 진술을 했다는 혐의다. 윤 전 대통령의 경우 한덕수 전 총리 내란 재판에서 한 증언이 사실과 다르다는 주장이 핵심 쟁점이었다.`}],
  history:`2024년 12·3 비상계엄 선포 후 윤 전 대통령은 탄핵·파면됐고, 2025년 들어 내란 혐의 본 재판이 시작됐다. 한덕수 전 총리도 함께 기소돼 별도 재판이 진행 중이며, 이번 위증 사건은 그 재판의 부산물이다.`,
  players:`내란 특검팀(특별검사), 윤 전 대통령 변호인단, 서울중앙지법, 더불어민주당·국민의힘이 정치적 충돌의 당사자다. 사법부 독립성과 특검 수사의 정당성이 동시에 시험대에 올랐다.`,
  current:`위증 무죄 판결은 본 내란 재판의 핵심 증거·증언 신뢰성에도 파장을 줄 수 있다. 6·3 지방선거를 6일 앞두고 보수층 결집 신호로 작용할 가능성이 거론된다.`,
  outlook:`특검의 항소 제기 및 항소심 일정, 내란 본 재판 1심 선고 시점이 향후 정치 일정의 최대 변곡점이다. 본 재판 결과는 차기 대선 구도까지 영향을 미칠 수 있다.`,
  sources:[{title:`윤석열 전 대통령 위증 혐의 1심 선고 - 연합뉴스`,url:`https://www.yna.co.kr/`},{title:`오늘의 정치일정 5월 28일 - 뉴스핌`,url:`https://www.newspim.com/news/view/20260528000025`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`美, 이란 남부 새 공습…테헤란, 美 드론 격추하며 전면 보복 시사`,
  metrics:[`전쟁 개시 2026.2.28~`,`전쟁 4개월째 격화`],
  summary:`미국이 28일 이란 남부에 새 공습을 단행하면서 2월 28일 시작된 미·이스라엘 대 이란 전쟁이 4개월째 격화되고 있다. 테헤란은 같은 날 미군 무인기 1대를 격추하고 전투기를 향해 미사일을 발사하면서 보복할 권리를 보유한다고 경고했다. 이란이 호르무즈 해협 봉쇄를 유지하면서 한국 HMM 나무호 피격을 포함해 글로벌 해운·원유 공급망에 충격이 누적되고 있다. IMF는 이번 전쟁이 글로벌 부채 수준 급등을 촉발할 수 있다고 경고했고, 셰브론 CEO는 재고·매장량 압박으로 유가 추가 상승이 불가피하다고 진단했다. 호르무즈 해협 봉쇄가 장기화할 경우 글로벌 경기 침체 시나리오가 현실화될 수 있어, 휴전 협상 진척 여부가 시장의 최대 관전 포인트다. 28일 뉴욕 증시 급등도 잠시 떠돌았던 휴전 보도(이후 오보 판명)에 반응한 것이었다.`,
  keyTerms:[{term:`호르무즈 해협 봉쇄`,explanation:`세계 원유 해상 수송의 약 20%가 통과하는 핵심 해상 통로를 이란이 군사적으로 차단한 조치다. 봉쇄가 길어질수록 유가 급등과 글로벌 공급망 충격이 기하급수적으로 커진다.`}],
  history:`2026년 2월 28일 미·이스라엘이 이란 핵·군시설을 공습하고 하메네이 최고지도자 등 다수의 이란 고위 인사를 표적 제거하면서 전면전이 시작됐다. 이란은 미사일·드론 대응과 호르무즈 봉쇄로 맞섰다.`,
  players:`미국·이스라엘·걸프 동맹국 대 이란·후티·헤즈볼라가 직접 교전 당사자이며, 중국·러시아가 외교적 중재를 시도 중이다. 한국은 HMM 나무호 피격으로 직접적 피해를 입었다.`,
  current:`봉쇄 장기화로 원유·LNG 운임이 사상 최고치를 경신했고, 글로벌 인플레가 재가속했다. 휴전 시도는 양측 강경 노선으로 번번이 무산되고 있다.`,
  outlook:`6월 UN 안보리 긴급회의, 도하·오만에서의 비공식 협상 채널이 분기점이다. 이란 내부 정권 안정성과 미 대선 정국 향방도 변수다.`,
  sources:[{title:`2026 Iran war - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_Iran_war`},{title:`Middle East News - Al Jazeera`,url:`https://www.aljazeera.com/middle-east/`},{title:`정부 호르무즈 나무호 화재 미상비행체 타격 - MBC뉴스`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6821325_37004.html`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`6·3 지방선거 D-6 «깜깜이 기간» 돌입…서울·대구·경남·전북 4곳 경합`,
  metrics:[`경합지 4곳`,`5월 4주차 무당층 19.7%`],
  summary:`6월 3일 제9회 전국동시지방선거를 6일 앞두고 28일 0시부터 여론조사 공표가 전면 금지되는 «깜깜이 기간»에 돌입했다. 현재 서울·대구·경남·전북 4곳이 경합지로 분류되며, 선거 초반에는 경북을 제외하고 민주당이 우세였으나 경합지가 늘어나는 추세다. 5월 넷째 주 무당층은 19.7%로, 선거 직전 무당층이 20%에 가까운 것은 매우 이례적인 흐름이다. 국민의힘 지지율은 지난 대선 직전 대비 8.4%p 낮은 수준에서 정체되며 불완전 결집 현상을 보이고 있다. 부산 북구 갑은 4월 20일 이후 21건의 여론조사가 쏟아지며 최대 격전지로 부상했다. 같은 날 윤석열 전 대통령 위증 무죄 판결이 보수층 결집을 자극할지가 변수다. 남은 기간 중도층 표심, TV 토론회, 투표율이 최종 당락을 가를 핵심 요인으로 꼽힌다.`,
  keyTerms:[{term:`깜깜이 기간`,explanation:`공직선거법에 따라 선거일 6일 전부터 여론조사 공표·보도가 전면 금지되는 기간이다. 유권자가 최신 판세 정보 없이 투표해야 한다고 해서 «깜깜이»라는 이름이 붙었다.`}],
  history:`공직선거법은 1994년 제정 이후 여론조사 결과가 막판 표심에 과도하게 영향을 주는 것을 막기 위해 선거일 직전 6일간 공표 금지 조항을 유지해왔다. 9회 지방선거도 같은 규칙이 적용된다.`,
  players:`더불어민주당, 국민의힘, 조국혁신당, 무소속 후보들이 각 광역단체장·교육감·기초의원 자리를 두고 경쟁한다. 중앙선거관리위원회가 공표 금지를 감독한다.`,
  current:`윤 전 대통령 무죄 판결이 보수 결집의 트리거가 될지, 민주당 우위 흐름이 굳어질지 갈림길이다. 무당층 20%에 육박하는 상황은 결과 예측을 매우 어렵게 만든다.`,
  outlook:`6월 1일 마지막 TV 토론회와 사전투표(5/30~31), 6월 3일 본투표가 분기점이다. 결과에 따라 차기 대선 구도와 정부·여당 국정 운영 동력이 크게 흔들릴 수 있다.`,
  sources:[{title:`6·3 지방선거 여론조사 28일부터 깜깜이 - 아주경제`,url:`https://www.ajunews.com/view/20260526144956618`},{title:`여론M 보수 결집이라는데 국민의힘 지지율은 제자리 - MBC뉴스`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6825112_37004.html`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`오픈AI, 80년 미해결 기하학 난제 자율 풀이…AI 과학 발견 시대 개막`,
  metrics:[`80년 미해결 난제 해결`,`Anthropic 2분기 매출 109억 달러 전망`],
  summary:`오픈AI는 5월 말 자사의 범용 추론 모델이 80년간 수학자들이 풀지 못했던 기하학 난제를 자율적으로 해결했다고 발표했다. 이는 AI가 단순히 인간 지식을 학습·재조합하는 수준을 넘어 자율적 수학 발견을 수행한 첫 사례로 평가된다. 같은 시기 Anthropic은 2분기 매출이 전년 동기 대비 두 배 이상 늘어난 109억 달러, 영업이익 5억 5900만 달러로 첫 흑자 분기를 기록할 전망이다. Anthropic은 또 스페이스X와 월 12억 5천만 달러 규모의 컴퓨팅 파트너십을 2029년까지 확대해 일론 머스크의 콜로서스 슈퍼컴퓨터에 접근권을 확보했다. AI 빅3는 올해 IPO를 추진 중이며 합산 기업가치가 수조 달러에 달할 것으로 추산된다. AI가 과학·공학·의학에서 인간이 풀지 못한 문제를 풀어내는 시대의 본격 개막이 임박했다는 평가다.`,
  keyTerms:[{term:`자율적 수학 발견`,explanation:`AI가 인간이 제시한 풀이를 모방하지 않고 스스로 새로운 수학적 증명을 도출하는 행위다. AI가 단순 도구를 넘어 과학적 발견의 주체로 올라설 수 있다는 강한 신호로 평가된다.`}],
  history:`2023년 챗GPT 등장으로 LLM 시대가 열렸고, 2024~2025년 오픈AI o1·o3 시리즈가 추론 능력을 비약적으로 끌어올렸다. 수학·과학 벤치마크에서 인간 박사급 수준에 도달한 모델이 잇따라 등장했다.`,
  players:`오픈AI(MS 후원), Anthropic(아마존·스페이스X 후원), 구글 딥마인드가 추론 모델 경쟁의 빅3다. 학계의 수학자들은 검증자로, 빅테크는 인프라 공급자로 참여한다.`,
  current:`AI가 인간 미해결 난제를 풀어낸 첫 공식 사례라는 점에서 과학 연구 방법론 자체의 패러다임 전환 신호로 해석된다. 동시에 «AI 발견»의 검증·소유권 논쟁도 본격화될 전망이다.`,
  outlook:`AI 빅3의 IPO 일정과 추가 추론 벤치마크 결과, 신약·재료과학 등 응용 분야로의 확장이 다음 관전 포인트다. 미 정부의 AI 규제 강화 움직임도 변수다.`,
  sources:[{title:`Two hours that changed AI - Axios`,url:`https://www.axios.com/2026/05/21/ai-news-cycle-openai-anthropic-spacex`},{title:`AI Updates Today (May 2026) - llm-stats`,url:`https://llm-stats.com/llm-updates`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`서소문고가도로 철거 중 붕괴…3명 사망·3명 부상, 60년 노후 시설`,
  metrics:[`사망 3명·부상 3명`,`1966년 건설(60년 노후)`],
  summary:`5월 26일 오후 2시 31분경 서울 서대문구 서소문고가도로 철거 작업 도중 상판과 거더, 건축 비계 일부가 붕괴해 3명이 숨지고 3명이 다친 사고의 후속 조사가 28일까지 이어지고 있다. 사망자는 감리단장, 현장소장, 외부 전문가로 확인됐다. 새벽 콘크리트 상판 절단 작업 도중 2.9cm 단차의 침하 현상이 발견됐고, 오후 정밀 안전진단을 진행하는 과정에서 추가 붕괴가 발생했다. 서소문고가도로는 1966년 건설 후 60년간 큰 보수 없이 사용된 D등급 노후 시설이다. 사고 여파로 경의선 서울∼수색 KTX 운행이 중지되고 경부·호남·장항선이 조정 운행 중이다. 경찰은 서울시로부터 사고 전후 CCTV를 확보해 안전관리 책임 규명에 착수했고, 전국 노후 인프라 전수 점검 필요성이 다시 도마 위에 올랐다.`,
  keyTerms:[{term:`침하 현상`,explanation:`구조물 일부가 자체 무게나 외력으로 가라앉으며 변형되는 현상이다. 2.9cm라는 작은 단차도 노후 고가에서는 붕괴의 전조 신호가 될 수 있어 즉시 정밀진단 대상이 된다.`}],
  history:`서소문고가도로는 1966년 박정희 정부 시기 서울 도심 교통 확충 사업의 일환으로 건설됐다. 2019년 정밀 안전진단에서 시설물 안전등급이 D등급으로 격하됐고, 2025년 철거 결정이 내려졌다.`,
  players:`서울시(발주처), 시공·감리 업체, 경찰·국토부·국가안전대진단팀이 사고 책임 규명에 나섰다. 코레일·SRT는 운행 차질 복구를 담당한다.`,
  current:`철거 작업 중의 붕괴는 시공 안전관리 절차의 허점을 드러냈다. 전국 D·E등급 노후 시설 1만 개가 넘는다는 통계가 알려지며 인프라 노후화 공포가 확산되고 있다.`,
  outlook:`정부의 노후 인프라 전수 점검 발표 시점과 추경 편성 여부, 경의선·경부선 정상화 일정이 관전 포인트다. 6·3 지방선거 막판 안전 이슈로도 부상할 수 있다.`,
  sources:[{title:`서울 한복판 고가차도 무너져 3명 사망·3명 부상 - MBC뉴스`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6825381_37004.html`},{title:`서소문 고가차도 붕괴 현장에서 6명 구조 - YTN`,url:`https://www.ytn.co.kr/_cs/_ln_0103_202605261653361429_005.html`},{title:`서소문고가도로 붕괴 사고 - 나무위키`,url:`https://namu.wiki/w/%EC%84%9C%EC%86%8C%EB%AC%B8%EA%B3%A0%EA%B0%80%EB%8F%84%EB%A1%9C%20%EB%B6%95%EA%B4%B4%20%EC%82%AC%EA%B3%A0`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`과학계, 해수면 상승 가속화 메커니즘 완전 규명…열팽창이 최대 요인`,
  metrics:[`열팽창 기여도 최대`,`페로브스카이트 태양전지 효율 34% 돌파`],
  summary:`28일 사이언스데일리는 세계 과학계의 발표를 인용해 해수면 상승 가속화 현상의 원인을 완전히 규명했다고 전했다. 가장 큰 요인은 따뜻해진 바닷물의 열팽창이며, 빙하와 극지방 빙상 융해가 추가 기여를 빠르게 늘리고 있다. 같은 시기 발표된 후기 백악기 퇴적층 연구는 빙하가 없는 온실기조차도 지구 기후가 짧은 시간 척도에서 격렬하게 요동칠 수 있음을 보여줬다. 한편 페로브스카이트 탠덤 태양전지가 변환효율 34%를 돌파해 기존 실리콘 셀(약 24%)을 크게 앞섰고, 해양 알칼리화 같은 해양 기반 탄소 제거 기술도 야외 시범 운영 단계에 진입했다. 미국 이타카에서는 한 묘지 산책 중 약 550만 마리에 달하는 지중 벌 집단이 발견되며 도시 생물다양성에 대한 관심도 커졌다. IPCC는 2050년까지 해수면이 최대 0.7m 상승할 가능성을 경고했으며, 연안 도시들의 적응 비용이 천문학적으로 늘어날 전망이다.`,
  keyTerms:[{term:`해수면 상승 가속화`,explanation:`지구온난화로 바닷물이 팽창하고 빙하·빙상이 녹으면서 해수면이 단순 선형이 아니라 가속 곡선으로 올라가는 현상이다. 부산·인천·뉴욕·도쿄 등 연안 대도시의 침수 위험을 키운다.`}],
  history:`1900년대 이후 해수면은 약 20cm 상승했고, 2000년대 들어 상승 속도가 두 배 이상 빨라졌다. 과학자들은 그 원인을 열팽창·빙하 융해·지하수 유입 등으로 추정해왔지만 정량적 기여도 분해는 어려웠다.`,
  players:`NASA·NOAA(미국), ESA(유럽), IPCC, 한국 기상청·국립해양조사원 등이 위성·부이 관측을 담당한다. 도시 단위에서는 베네치아·뉴욕·자카르타가 적응 모델로 주목받는다.`,
  current:`이번 연구로 정책 결정자들이 «어디에 얼마를 투자해야 하는지» 정량 근거를 확보했다. 해양 알칼리화·페로브스카이트 등 완화·적응 기술도 상용화에 빠르게 다가서고 있다.`,
  outlook:`2026년 11월 COP31 기후정상회의와 IPCC 7차 보고서가 다음 분기점이다. 한국 부산·인천 등 연안 도시의 침수 적응 예산 편성 여부도 주시할 사안이다.`,
  sources:[{title:`ScienceDaily - Top Environment News`,url:`https://www.sciencedaily.com/news/top/environment/`},{title:`Global Warming News - ScienceDaily`,url:`https://www.sciencedaily.com/news/earth_climate/global_warming/`}]
}]

  tag:`2026-05-28`,
  label:`2026년 5월 28일 (목)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`SK하이닉스 시가총액 1조 달러 돌파… 코스피도 8400선 첫 안착`,
  metrics:[`SK하이닉스 시총 1,680조 원 (약 1조 1,200억 달러)`,`코스피 8,447.69 사상 최고치`],
  summary:`SK하이닉스가 27일 장중 14.9% 급등하며 한국 기업 사상 처음으로 시가총액 1조 달러를 돌파했다. 종가는 9.3% 상승으로 마감했고 시총은 1,680조 원에 달해 삼성전자·마이크론에 이어 세계 메모리 3사가 모두 1조 달러 클럽에 진입했다. 같은 날 코스피 지수도 8,447.69로 사상 최고치를 다시 썼다. 엔비디아·구글·AMD 등 AI 빅테크의 주문이 폭증하면서 HBM(고대역폭 메모리) 2026년 물량은 이미 완판됐고 2027년까지 공급 부족이 이어질 전망이다. AI 데이터센터 수요가 메모리 슈퍼사이클을 견인하며 반도체주 랠리가 한국 증시 전체를 끌어올리는 구조다. 다만 ETF 시장에서는 삼성전자·SK하이닉스 단일 종목 레버리지 ETF 18개가 상장 첫날 일제히 변동성 완화장치(VI)에 걸리는 등 과열 신호도 동시에 나타났다.`,
  keyTerms:[{term:`HBM`,explanation:`HBM은 D램 여러 장을 수직으로 쌓아 데이터 전송 속도를 극대화한 메모리 반도체야. 엔비디아 같은 AI 가속기에 반드시 들어가는 핵심 부품이라 AI 붐의 가장 직접적인 수혜를 보고 있어.`}],
  history:`HBM은 2013년 SK하이닉스가 세계 최초로 개발한 차세대 메모리 규격이다. 한동안 비싼 가격과 제한적인 수요로 시장에서 외면받았지만 2022~2023년 챗GPT 등장 이후 AI 가속기 수요가 폭발하며 핵심 부품으로 부상했다. 2024~2025년부터 SK하이닉스가 엔비디아의 사실상 단독 공급사 지위를 굳혔고 삼성전자가 추격에 나선 형국이다. 2026년 들어 AI 자본 지출 경쟁이 가속화되며 메모리 슈퍼사이클이 본격화됐다.`,
  players:`SK하이닉스는 HBM3E와 차세대 HBM4 양산을 주도하는 1위 공급사다. 삼성전자는 DS(반도체)부문 위주로 추격 중이며, 미국 마이크론도 일부 물량을 확보하고 있다. 수요처는 엔비디아, 구글, AMD, 메타 등 AI 인프라에 매년 수백억 달러를 쏟는 빅테크들이다. 한국 정부 입장에서도 반도체는 수출의 약 20%를 차지하는 핵심 산업이라 이번 랠리는 거시 지표에도 직접 영향을 준다.`,
  current:`27일 SK하이닉스의 시총 1조 달러 돌파는 한국 기업 사상 처음이며, 코스피가 8000선을 돌파한 지 한 달여 만에 8400선까지 뚫렸다. 단기적으로는 ETF 과열 등 거품 우려도 커지면서 금융당국이 단일종목 레버리지 상품에 대한 규제 검토에 들어갔다.`,
  outlook:`7월 발표될 SK하이닉스 2분기 잠정 실적과 엔비디아 차세대 GPU 베라 루빈 양산 일정이 다음 분수령이다. 하반기에는 HBM4 본격 양산 진입 여부와 미국 마이크론의 추격 속도가 시장 방향을 결정할 전망이다.`,
  sources:[{title:`SK Hynix Joins \$1 Trillion Club After Samsung, Micron on AI Chip Boom - U.S. News`,url:`https://money.usnews.com/investing/news/articles/2026-05-26/sk-hynix-joins-1-trillion-club-after-samsung-micron-on-ai-chip-boom`},{title:`South Korea Stocks Halt Again, SK Hynix Market Cap Breaks \$1 Trillion Mark - TradingKey`,url:`https://www.tradingkey.com/analysis/stocks/more/261929590-sk-hynix-hbm-ai-nvidia-market-cap-samsung-strike-memory-shortage-adr-listing-tradingkey`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`삼성전자 임금협상 73.7% 찬성으로 가결… DS부문 특별경영성과급 신설`,
  metrics:[`조합원 찬성률 73.7% (투표율 92.4%)`,`임금 6.2% 인상 + DS부문 영업이익 12% 성과 배분`],
  summary:`삼성전자 노사가 27일 임금협상 잠정합의안을 73.7% 찬성으로 가결하며 전면 파업 위기를 가까스로 피했다. 투표율은 92.4%로 역대 최고 수준이었고, 합의안은 기준 인상률 4.1%에 성과인상률 평균 2.1%를 더해 총 6.2% 임금 인상을 담았다. 핵심은 반도체(DS)부문에 한해 영업이익의 약 12%를 배분하는 특별경영성과급 신설이다. 의무 보유 자사주 지급으로 핵심 인력의 SK하이닉스·마이크론 이탈을 막는 락인(Lock-in) 장치도 함께 마련됐다. AI 메모리 인재 쟁탈전이 격화되는 가운데 삼성이 보상 체계를 경쟁사 수준 이상으로 끌어올린 셈이다. 파업이 현실화됐다면 글로벌 메모리 공급망에 직접 충격이 갔을 수 있어 시장은 안도하는 반응을 보였다.`,
  keyTerms:[{term:`특별경영성과급`,explanation:`특별경영성과급은 사업부 단위로 영업이익에 연동해 추가로 지급되는 보너스야. 이번엔 반도체(DS)부문에만 한정해 영업이익의 약 12%를 배분하는 방식이라 같은 회사 안에서도 부서별 보상 차이가 크게 벌어지게 돼.`}],
  history:`삼성전자 노조는 2019년 결성 이후 매년 임금협상에서 진통을 겪었고 2024년에는 창사 첫 파업까지 벌였다. 2025년부터는 AI 메모리 수요 폭증으로 SK하이닉스의 성과급이 삼성을 크게 웃돌면서 핵심 엔지니어 이탈이 본격 문제가 됐다. 2026년 임금협상은 처음부터 단순 임금 인상이 아닌 인재 유지 패키지가 핵심 쟁점이었다.`,
  players:`노조는 전국삼성전자노동조합(전삼노)이 협상을 주도했고 사측에선 인사·DS부문 경영진이 카운터파트로 나섰다. 외부 변수로는 HBM 공급 자리를 두고 SK하이닉스, 미국 마이크론과의 인재 경쟁이 직접적인 압박 요인이었다. 정부와 산업계도 파업 시 한국 수출 1위 기업의 생산 차질을 우려해 협상 추이를 예의주시했다.`,
  current:`이번 합의는 한국 산업계 처음으로 사업부별 차등 성과 배분 모델을 명문화했다는 점에서 분기점으로 평가된다. 6.2% 인상률 자체보다 DS부문에 쏠린 추가 보상이 다른 부문과의 형평성 논란도 남길 가능성이 있다.`,
  outlook:`조합원 비준 절차가 마무리되는 5월 말 이후 임금이 소급 적용된다. 7~8월 발표될 삼성전자 2분기 실적과 DS부문 영업이익이 특별성과급 규모를 결정하는 첫 시험대가 된다.`,
  sources:[{title:`Samsung Wage Deal Boosts Stock to New High, Risks Remain - TradingKey`,url:`https://www.tradingkey.com/analysis/stocks/more/261930577-samsung-samsung-strike-sk-hynix-micron-memory-chip-memory-tradingkey`},{title:`하이닉스 넘는 성과급 꺼낸 삼성…AI 메모리 인재전쟁 불붙나 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202605211445345448`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`S&P500·나스닥 또 사상 최고… 마이크론 19% 폭등에 연내 금리인하 기대 후퇴`,
  metrics:[`S&P500 7,519.12 (+0.61%), 나스닥 26,656.18 (+1.19%)`,`마이크론 +19%, 2년물 국채 입찰 4.071% (직전 3.812%)`],
  summary:`26일(현지 시각) 뉴욕 증시에서 S&P500과 나스닥이 각각 7,519.12와 26,656.18로 다시 사상 최고치를 갈아치웠다. 러셀2000도 처음으로 2,900선을 돌파했다. 메모리 반도체 마이크론이 UBS의 100%+ 상향 보고서에 19% 폭등하며 장중 시가총액 1조 달러를 넘어섰고, 이것이 지수 전체를 끌어올렸다. 다만 다우는 헬스케어·에너지주 약세에 0.23% 하락했다. 같은 날 2년물 국채 입찰 낙찰 금리가 4.071%로 직전 3.812%에서 크게 튀어 오르면서 채권 트레이더들이 연내 금리인하 기대를 사실상 접었다. 일본에서는 BoJ 근원 CPI가 2.8%로 시장 예상치 1.7%를 크게 웃돌아 추가 정상화(금리 인상) 가능성도 부각됐다.`,
  keyTerms:[{term:`2년물 국채 입찰`,explanation:`2년물 국채 입찰은 미 재무부가 2년 만기 국채를 시장에 파는 절차야. 낙찰 금리가 직전보다 크게 높아진다는 건 투자자들이 단기적으로 연준이 금리를 안 내릴 거라고 본다는 신호로 읽혀.`}],
  history:`미 연준은 2024년부터 인플레이션 둔화에 맞춰 금리 인하 사이클에 들어갔지만, 2025~2026년 들어 관세 충격과 AI 투자 붐이 물가 상방 압력을 다시 키우며 인하 속도가 늦어졌다. 2026년 초만 해도 시장은 연내 2~3차례 인하를 기대했지만, 4월 이후 고용·물가 지표가 단단해지면서 기대가 점차 후퇴해 왔다.`,
  players:`주요 행위자는 미 연준 의장과 FOMC 위원들, 미 재무부 입찰을 소화하는 채권 딜러, 그리고 AI 반도체주를 중심으로 위험자산을 사들이는 글로벌 펀드들이다. 일본은행(BoJ) 역시 2.8%의 근원 CPI 발표로 정상화 압력을 받으면서 글로벌 채권시장에 동조 압박을 주고 있다.`,
  current:`위험자산은 사상 최고치를 찍고 채권 금리는 동시에 튀어 오르는 비대칭 장세가 진행 중이다. 이는 AI 자본 지출이 거시 지표를 압도하는 새로운 국면을 보여준다.`,
  outlook:`6월 FOMC 회의와 미국 5월 CPI 발표(6월 중순)가 가장 큰 분수령이다. 6월 BoJ 회의에서 추가 금리 인상 시그널이 나오면 엔 캐리 트레이드 청산 압력이 글로벌 자산시장에 충격을 줄 수 있다.`,
  sources:[{title:`Global Economy Briefing — May 27, 2026 - Rio Times`,url:`https://www.riotimesonline.com/global-economy-briefing-may-27-2026/`},{title:`Samsung, SK hynix Surge in Pre-Market on Micron Rally - Seoul Economic Daily`,url:`https://en.sedaily.com/finance/2026/05/27/samsung-sk-hynix-surge-in-pre-market-on-micron-rally`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`트럼프, 이란 협정 대부분 합의 발표… 호르무즈 해협 재개방 임박`,
  metrics:[`60일 휴전 연장 + 호르무즈 해협 재개방 합의 직전`,`이란 우라늄 농축 일시 동결 + 동결 자산 일부 해제 검토`],
  summary:`도널드 트럼프 미국 대통령이 26~27일 이란과의 평화 협정이 사실상 마무리 단계에 들어갔다고 밝혔다. 핵심 골자는 60일 휴전 연장, 호르무즈 해협 재개방, 이란의 원유 수출 재개, 그리고 우라늄 농축 일시 동결이다. 트럼프는 이스라엘 및 걸프 동맹국과 통화를 마치고 27일 백악관에서 내각회의를 열어 최종 조율에 들어갔다. 다만 이란이 보유한 농축 우라늄 처리와 동결 자산 수십억 달러 해제 문제는 여전히 합의 직전 단계의 걸림돌로 남아 있다. 미국은 항구 봉쇄와 추가 제재 카드를 동시에 흔드는 봉쇄 외교로 압박을 이어가고 있고, 이란은 호르무즈 해협 봉쇄 가능성을 협상 레버리지로 활용하고 있다. 협상이 타결되면 4년 가까이 이어진 사실상의 미-이란 군사 충돌 국면이 일단락된다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`호르무즈 해협은 페르시아만과 인도양을 잇는 좁은 바닷길이야. 전 세계 해상 원유 운송의 약 20%가 이곳을 지나가서, 이란이 봉쇄하면 글로벌 유가가 즉시 급등하는 전략적 요충지야.`}],
  history:`미국과 이란의 갈등은 2018년 트럼프 1기 정부가 이란 핵 합의(JCPOA)에서 탈퇴한 시점부터 본격화됐다. 2025년 트럼프 재집권 이후 이스라엘의 이란 핵시설 타격, 미국의 동참, 이란의 호르무즈 봉쇄 시도가 이어지며 2026년 초까지 사실상 전쟁 상태였다. 5월 들어 양측 모두 출구를 모색하면서 막판 협상 단계에 진입했다.`,
  players:`미국은 트럼프 대통령과 국무·국방 라인이 직접 협상을 주도하고 이스라엘이 옵저버 역할을 맡았다. 이란 측에서는 최고지도자 하메네이의 재가를 받은 외교부가 협상장에 나서고 있다. 사우디아라비아, 카타르, 오만 등 걸프 국가들이 중재자로 움직이고 있고, 원유 수입국인 한국·일본·인도·중국은 호르무즈 재개방을 강력히 원한다.`,
  current:`협상은 합의문 서명 직전 단계지만 우라늄 처리와 자산 동결 해제 같은 민감 항목에서 막판 진통이 남아 있다.`,
  outlook:`6월 첫 주 내 합의 서명 발표 가능성이 거론된다. 합의 시 국제유가는 단기 하락 압력을 받고, 결렬되면 호르무즈 봉쇄 재현으로 유가가 다시 급등할 수 있다.`,
  sources:[{title:`Trump says Iran deal reopening Strait of Hormuz largely negotiated - CNBC`,url:`https://www.cnbc.com/2026/05/23/us-iran-war-talks.html`},{title:`What's inside the Iran deal Trump is close to signing - Axios`,url:`https://www.axios.com/2026/05/24/iran-deal-strait-hormuz-sanctions-nuclear`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`러시아, 키이우에 극초음속 미사일 포함 대규모 공습… 사망자 속출`,
  metrics:[`미사일 90발 + 드론 600여 발 동원 (5월 24일)`,`최근 2주 키이우 공습 사망자 최소 24명, 주거건물 30여 곳 파손`],
  summary:`러시아가 24일 키이우에 미사일 90발과 드론 600여 발을 동원한 대규모 공습을 감행했다고 우크라이나 공군이 발표했다. 이 공격에는 4년 전쟁 기간 통틀어 세 번째 사용되는 오레시니크 극초음속 탄도미사일까지 동원돼 도시 전체에 충격을 줬다. 키이우 시내 약 30개 주거 건물이 파손됐고, 같은 주 키이우 아파트 단지 공습에서는 최소 24명이 숨졌다. 우크라이나도 보복으로 모스크바 인근 랴잔 정유시설과 주거지를 타격해 무력 충돌이 양국 수도권으로 확산되는 양상이다. 트럼프는 러시아 전승절(5월 9일)에 맞춰 사흘 휴전을 발표했지만 그 직후 다시 격렬한 교전이 재개된 상황이다. 미-이란 협상 진전과 달리 러-우크라이나 협상은 출구가 보이지 않는 교착 상태다.`,
  keyTerms:[{term:`오레시니크`,explanation:`오레시니크는 러시아가 2024년 처음 실전 사용한 중거리 극초음속 탄도미사일이야. 마하 10 안팎의 속도로 날아와 기존 방공망으로 요격이 거의 불가능해서 게임 체인저로 불려.`}],
  history:`러시아의 우크라이나 침공은 2022년 2월 시작돼 5년차에 접어들었다. 2024년 말부터 러시아가 오레시니크 같은 신형 무기를 투입하고, 우크라이나는 장거리 드론으로 러시아 본토를 직접 타격하는 양상으로 전쟁의 성격이 바뀌었다. 2025년 말 트럼프 행정부의 휴전 압박이 있었지만 단기 휴전에 그쳤다.`,
  players:`러시아는 푸틴 대통령과 국방부, 우크라이나는 젤렌스키 대통령과 군 총참모부가 직접 작전을 지휘한다. 미국 트럼프 행정부는 군사 지원을 줄이는 한편 협상 압박에 무게를 두고 있고, 유럽(독일·프랑스·폴란드)이 우크라이나 군사·재정 지원의 핵심 축으로 부상했다. 헝가리는 최근 마자르 신정부 출범으로 EU 대러 정책의 변수로 떠올랐다.`,
  current:`양측이 수도권 직접 타격에 나서면서 민간인 피해가 급증하고, 트럼프식 단기 휴전 시도가 다시 실패한 직후라는 점에서 분기점이다.`,
  outlook:`6월 중 미국·유럽이 추진하는 차기 평화회담 일정과 헝가리 신정부의 EU 대러 정책 전환이 변수다. 우크라이나의 추가 본토 타격과 러시아의 보복 강도도 단기 관전 포인트다.`,
  sources:[{title:`Russia uses hypersonic Oreshnik missile in mass attack on Kyiv - NPR`,url:`https://www.npr.org/2026/05/24/nx-s1-5833050/russia-uses-hypersonic-oreshnik-missile-in-mass-attack-on-kyiv`},{title:`Damage in every district of Kyiv — Russian ballistic missile, drone attack - Kyiv Independent`,url:`https://kyivindependent.com/russian-attack-may-24-2026/`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`6·3 지방선거 D-7… 서울시장 여론조사서 민주당 정원오, 오세훈 시장에 우위`,
  metrics:[`6월 3일 제9회 전국동시지방선거 (D-7)`,`최신 여론조사: 정원오 후보 오세훈 현시장 대비 오차범위 밖 우위`],
  summary:`다음 달 3일 치러지는 제9회 전국동시지방선거가 일주일 앞으로 다가왔다. 시·도지사, 시·군·구청장, 광역·기초의원, 교육감을 한꺼번에 뽑는 전국 단위 선거로, 이재명 정부 출범 1년 시점에 치러지는 첫 중간평가다. 27일 발표된 서울시장 여론조사에서는 더불어민주당 정원오 후보가 현직 시장인 국민의힘 오세훈 후보에게 오차범위 밖 우위를 보였다. 같은 날 국회에서는 78주년 국회 개원기념식이 열렸고 배현진 의원 등이 정치 현안 관련 기자회견을 여는 등 여야 모두 본격 선거 모드로 전환했다. 여당이 승리하면 중앙정부·국회에 이어 지방권력까지 장악하는 일당우위 구도가 굳어지고, 보수 야권은 반대로 2027년 총선까지 험로가 예상된다. 부동산·민생·검찰개혁 등 이재명 정부 핵심 정책에 대한 사실상 신임투표 성격을 띤다.`,
  keyTerms:[{term:`전국동시지방선거`,explanation:`전국동시지방선거는 4년마다 같은 날 전국의 광역·기초단체장과 지방의원, 교육감을 한꺼번에 뽑는 선거야. 대통령 임기 중간쯤에 치러지기 때문에 현 정부에 대한 중간평가 성격을 갖게 돼.`}],
  history:`전국동시지방선거는 1995년 처음 도입돼 4년 주기로 치러져 왔다. 이번은 9회째이며, 2025년 6월 대선으로 출범한 이재명 정부가 1년 만에 맞이하는 첫 전국 단위 선거다. 통상 집권 1년차 지방선거는 여당에 유리한 것으로 분석돼 왔다.`,
  players:`여당 더불어민주당은 정원오 등 차세대 후보를 전면에 내세웠고, 국민의힘은 오세훈 서울시장 등 현직 시장·도지사를 중심으로 방어선을 친다. 조국혁신당, 개혁신당 등 군소정당도 일부 지역에서 변수다. 중앙선거관리위원회가 선거 사무 일정을 관장한다.`,
  current:`여론조사상 여당 우위 흐름이 이어지지만 1주일 동안 변동성이 크다. 부동산 정책과 검찰개혁 후속 입법, 막판 안보 이슈가 변수가 될 수 있다.`,
  outlook:`6월 3일 오후 6시 투표 종료 후 출구조사, 자정 무렵 윤곽이 잡힌다. 17개 광역단체장 결과는 곧바로 2027년 총선과 정계 개편 시나리오에 직접 반영된다.`,
  sources:[{title:`오늘의 국회일정 5월 27일 - 법률신문`,url:`https://www.lawtimes.co.kr/news/articleView.html?idxno=221180`},{title:`서울시장 후보 지지율 현황: 2026 지방선거 - PUM 정치`,url:`https://www.p-um.net/p/politics/election/2026/cmoqmo0nq011l01ahpvbgwexy`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`오픈AI–엔비디아 1,000억 달러 초지능 동맹… 10GW 컴퓨팅 인프라 구축`,
  metrics:[`엔비디아 → 오픈AI 단계별 최대 1,000억 달러 투자`,`10기가와트(GW) 규모 AI 컴퓨팅 인프라`],
  summary:`오픈AI와 엔비디아가 차세대 AI 모델 학습·운영을 위해 최소 10기가와트 규모의 AI 컴퓨팅 시스템을 함께 구축하는 전략적 파트너십을 체결했다. 엔비디아는 1GW가 가동될 때마다 단계적으로 자금을 집행하는 방식으로 오픈AI에 최대 1,000억 달러를 투자한다. 첫 1GW 시스템은 2026년 하반기 엔비디아의 차세대 베라 루빈(Vera Rubin) 플랫폼 위에서 가동된다. 오픈AI는 별도로 1,220억 달러 규모의 역대 최대 펀딩 라운드를 8,520억 달러 기업가치로 마무리했고, 아마존(500억) 엔비디아(300억) 소프트뱅크(300억)가 주요 투자자로 들어왔다. 월 매출 26억 달러, 챗GPT 주간 활성 이용자 9억 명을 기록 중이며 연내 기업공개(IPO) 가능성도 시사했다. 양사는 이 인프라가 초지능(superintelligence)으로 향하는 컴퓨팅 토대라고 명시해 AI 인프라 경쟁의 규모를 또 한 번 끌어올렸다.`,
  keyTerms:[{term:`초지능`,explanation:`초지능(superintelligence)은 거의 모든 영역에서 인간의 지능을 뛰어넘는 AI를 가리키는 개념이야. 지금의 챗GPT 같은 수준을 한참 넘어선 가상의 단계지만, 빅테크들이 공식 목표로 내세우면서 천문학적 인프라 투자 경쟁의 명분이 되고 있어.`}],
  history:`오픈AI는 2015년 비영리로 출범했지만 2019년 마이크로소프트에서 10억 달러를 받으며 영리 자회사를 두는 구조로 바뀌었다. 2022년 챗GPT 출시 이후 폭발적 성장과 함께 컴퓨팅 비용이 급증했고, 2024~2025년부터는 거대 인프라 파트너십을 잇따라 체결했다. 엔비디아는 AI 가속기 시장을 사실상 독점하며 시가총액 세계 1위 자리를 굳혔다.`,
  players:`오픈AI는 샘 알트만 CEO가 자본 조달과 인프라 계약을 직접 챙기고 있다. 엔비디아는 젠슨 황 CEO가 베라 루빈 등 차세대 플랫폼 로드맵을 제시하며 클라우드·AI랩에 자본을 재투입하는 전략을 쓴다. 아마존·소프트뱅크 등 추가 투자자, 그리고 전력·데이터센터 부지를 둘러싸고 미국·중동·아시아 정부들이 간접 행위자로 등장한다.`,
  current:`10GW는 미국 평균 가정 약 700만 호의 동시 전력 수요와 맞먹는 규모로, 단순 칩 구매를 넘어 전력망·부지·인력까지 동시에 잠그는 인프라 전쟁의 새 국면이다.`,
  outlook:`2026년 하반기 첫 1GW 가동 시점과 오픈AI의 IPO 발표 시기가 다음 분수령이다. 미국 정부의 AI 인프라 보조금·전력망 승인 속도도 단기 변수다.`,
  sources:[{title:`OpenAI and NVIDIA Announce Strategic Partnership to Deploy 10 Gigawatts - NVIDIA Newsroom`,url:`https://nvidianews.nvidia.com/news/openai-and-nvidia-announce-strategic-partnership-to-deploy-10gw-of-nvidia-systems`},{title:`Latest AI News and Breakthroughs - Crescendo AI`,url:`https://www.crescendo.ai/news/latest-ai-news-and-updates`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`가자지구 구호 활동 한국인 2명 무사 귀국… 이스라엘군 나포 후 송환`,
  metrics:[`한국인 활동가 2명(김아현·김동현) 송환`,`방콕 경유 인천공항 입국 완료`],
  summary:`가자지구에서 구호 활동을 펼치다 이스라엘군에 나포됐던 한국 국민 2명이 26~27일 사이 무사히 귀국했다. 김아현 씨와 김동현 씨는 태국 방콕을 경유해 인천공항으로 들어왔고, 외교부와 주이스라엘 한국대사관이 송환 절차를 조율한 것으로 알려졌다. 두 사람은 국제 활동가 그룹과 함께 가자지구 봉쇄선을 우회해 인도주의 물자를 전달하다 이스라엘 해군에 의해 나포됐다. 이번 사건은 한국 정부가 처음으로 가자지구 사태에 자국민이 직접 휘말려 외교 협상에 나선 사례다. 이스라엘은 같은 시기 레바논 헤즈볼라 공격 강도를 높이고 있고, 사우디 메카 성지순례(하지) 시즌 안전을 둘러싼 긴장도 커지고 있다. 한국 정부는 가자·레바논 일대에 대한 여행경보 단계를 추가로 상향하는 방안을 검토 중이다.`,
  keyTerms:[{term:`가자지구 봉쇄선`,explanation:`가자지구 봉쇄선은 이스라엘이 가자지구를 둘러싸고 설정한 해상·육상 차단선이야. 모든 사람·물자가 이스라엘 통제 아래에서만 드나들 수 있어서, 국제 구호단체들이 이 선을 뚫고 직접 물자를 전달하려다 종종 나포되곤 해.`}],
  history:`가자지구 봉쇄는 2007년 하마스의 가자 장악 이후 본격화됐고 2023년 10월 7일 하마스의 이스라엘 공격 이후 사실상 전면 봉쇄로 강화됐다. 이후 인도주의 물자 반입을 둘러싼 국제 사회의 마찰이 끊이지 않았고, 국제 NGO와 활동가들이 해상 운송으로 봉쇄선을 시험하는 사례가 늘었다.`,
  players:`한국 정부(외교부, 주이스라엘 대사관)와 이스라엘 외무부·국방부가 직접 협상 당사자다. 활동가 측에서는 국제 인도주의 단체들이 한국 시민단체와 연결돼 움직였다. 미국과 EU는 이스라엘에 인도주의 통로 확대를 압박해 왔고, 사우디·이집트는 라파 국경 운영에 관여한다.`,
  current:`한국 국적자가 가자지구 봉쇄선 충돌의 당사자가 된 첫 사례라는 점에서 외교적 무게가 크다. 정부의 여행경보 추가 상향과 가자 인근 활동에 대한 보호 기준 논의가 본격화될 전망이다.`,
  outlook:`외교부가 6월 중 가자·레바논 일대 여행경보 추가 상향 여부를 발표할 가능성이 있다. 이스라엘-헤즈볼라 전선이 격화되면 추가 자국민 위험 사건도 배제할 수 없다.`,
  sources:[{title:`2026년 5월 27일 오늘의 주요 뉴스 - 오늘의 클릭`,url:`https://www.cliktoday.com/2026/05/20260527-today-news.html`},{title:`World roundup: May 26 2026 - Foreign Exchanges`,url:`https://www.foreignexchanges.news/p/world-roundup-may-26-2026`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`전 세계 강 80%에서 용존산소 감소… 기후변화가 조용한 질식 주범`,
  metrics:[`분석 강 21,000곳 중 약 80%에서 용존산소 감소`,`수십 년에 걸친 지속적 하강 추세`],
  summary:`사이언스데일리 등 과학 매체들이 26~27일 보도한 글로벌 분석에 따르면 21,000개 이상 강 시스템 중 약 80%가 수십 년에 걸쳐 용존산소가 꾸준히 감소하고 있는 것으로 나타났다. 연구진은 이를 강이 조용히 질식하고 있다고 표현했다. 가장 큰 요인은 기후변화로 인한 수온 상승이며, 따뜻해진 물은 산소를 머금는 능력이 떨어진다. 도시화·농업 유출수 증가도 이를 가속하지만 분석상 기후 신호가 가장 지배적이었다. 같은 시기 호주-남극 사이 매쿼리 섬에서는 폭우 강도가 과거 대비 크게 증가했다는 별도 연구도 발표돼, 남극해 일대의 급격한 기후 전환 징후가 동시에 보고됐다. 또 다른 연구는 인류가 이미 지구가 지속 가능하게 부양할 수 있는 한계를 넘었을 가능성을 제기했다. 강의 산소 감소는 어류 폐사·식수원 악화·생물다양성 붕괴로 직결돼 즉각적인 정책 대응 압박이 커지고 있다.`,
  keyTerms:[{term:`용존산소`,explanation:`용존산소(DO)는 물속에 녹아 있는 산소의 양이야. 물고기와 수중 생물이 숨 쉬는 데 직접 쓰이기 때문에 이 수치가 떨어지면 강은 점점 죽은 물에 가까워지게 돼.`}],
  history:`강의 용존산소 감소 문제는 2000년대 초부터 일부 선진국 강에서 관찰됐지만 글로벌 차원의 데이터는 부족했다. 2020년대 들어 위성·자동 관측망 데이터가 축적되면서 처음으로 21,000여 곳을 동시 비교한 메타 분석이 가능해졌다. 기후변화 정부간 협의체(IPCC)도 최근 보고서에서 담수 생태계 산소 감소를 주요 위험으로 명시했다.`,
  players:`유엔환경계획(UNEP), IPCC 등 국제기구와 미국·유럽·중국의 환경 연구기관이 데이터 공유 네트워크를 구축하고 있다. 농업·축산업 정책이 큰 영향을 주기 때문에 각국 농림부·환경부가 직접 이해당사자이며, 한국에서는 환경부와 국립환경과학원이 4대강 산소 모니터링을 맡고 있다.`,
  current:`이번 글로벌 분석은 강 산소 감소가 일부 지역 문제가 아니라 사실상 거의 모든 대륙에서 동시에 일어나고 있는 구조적 현상임을 처음으로 보여줬다.`,
  outlook:`6월 유엔 해양·담수 정상회의에서 본 연구가 정책 권고의 핵심 근거로 인용될 전망이다. 한국 환경부도 7~8월 4대강 여름철 산소 변동 데이터 발표를 앞두고 있어 비교 검증이 예상된다.`,
  sources:[{title:`Rivers Losing Oxygen - ScienceDaily`,url:`https://www.sciencedaily.com/news/earth_climate/environmental_issues/`},{title:`26th May 2026 Today's Round-Up of Climate News - Climate and Economy`,url:`https://climateandeconomy.com/2026/05/26/26th-may-2026-todays-round-up-of-climate-news/`}]
}]

  tag:`2026-05-27`,
  label:`2026년 5월 27일 (수요일)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피, 사상 첫 8000선 종가 돌파… 26일 8047.51에 마감`,
  metrics:[`코스피 종가 8047.51`,`5월 외국인 누적 순매도 약 20조2000억원, 13거래일째 매도 우위`],
  summary:`26일 코스피 지수가 사상 처음으로 종가 기준 8000선을 넘어선 8047.51에 마감했다. 기관 투자자의 순매수가 지수 상승을 이끌었으며, 외국인은 13거래일째 매도 우위를 이어갔다. 외국인 순매도 누적 규모는 5월에만 약 20조2000억원에 달했다. 반도체와 AI 관련주 강세가 지수 상승을 견인했고, 원·달러 환율은 1,517원 안팎에서 고공행진을 이어가는 디커플링 현상이 나타났다. 시가총액 대비 외국인 매도 비중이 0.34%로 2월(0.47%), 3월(0.81%)보다 낮아 증시 이탈 신호로 단정짓기 어렵다는 평가다. 코스피 8000선 돌파는 한국 증시가 글로벌 시장 판도에 새 변수가 됐음을 상징한다.`,
  keyTerms:[{term:`디커플링`,explanation:`일반적으로 함께 움직이는 두 지표가 서로 다른 방향으로 가는 현상. 여기서는 코스피가 사상 최고치를 찍는데도 원·달러 환율이 동시에 치솟아, 평소 같으면 외국인이 매수해야 할 상황과 정반대로 매도가 이어진 점을 가리킨다.`}],
  history:`코스피는 2024년 5000선을 처음 돌파한 이후 반도체 수출 호조와 AI 투자 열풍을 등에 업고 약 2년 만에 8000선까지 빠르게 올랐다. 같은 기간 미국 빅테크의 한국 반도체 의존도가 커지며 외국인 자금 유입과 기관 매수가 번갈아 지수를 끌어올렸다. 5월 옵션만기일 전후로 일부 변동성이 확대되면서 단기 조정도 동반됐다.`,
  players:`삼성전자, SK하이닉스 등 반도체 대형주가 시장을 주도했고, 국민연금과 자산운용사 등 국내 기관이 5월 매수 주체로 부상했다. 반면 외국인은 차익 실현과 환율 부담을 이유로 13거래일 연속 매도세를 보이고 있다. 개인 투자자는 차익 실현과 추격 매수가 혼재된 흐름이다.`,
  current:`종가 기준 8000선 첫 돌파는 코스피가 단순한 신흥시장이 아닌 글로벌 핵심 시장으로 재평가되는 분수령으로 평가된다. 다만 환율 디커플링과 외국인 매도가 동시에 진행돼 단기 변동성 우려도 커지고 있다.`,
  outlook:`6월 미국 FOMC 결과와 5월 미·중 회담 후속 조치가 단기 방향타가 될 전망이다. 6월 3일 지방선거 결과에 따른 경제 정책 변수도 단기 변수로 꼽힌다.`,
  sources:[{title:`코스피, 기관 사자에 첫 8000선 마감 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202605261629507467`},{title:`꿈의 8천피 돌파… 세계 증시 판도 흔든 한국 - 뉴스핌`,url:`https://www.newspim.com/news/view/20260515000195`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`케빈 워시, 美 연준 신임 의장 취임… 인플레·중동전 동시 부담`,
  metrics:[`美 5월 미시간대 소비자심리지수 최종치 48.2, 2022년 6월 저점 부근`,`FOMC 4월 의사록 다수 위원 추가 긴축 가능성 언급`],
  summary:`케빈 워시가 클래런스 토머스 연방대법관 주재로 신임 미국 연방준비제도(Fed) 의장에 취임했다. 워시 의장은 중동 분쟁에서 비롯된 유가 상승과 그에 따른 인플레이션 압력이라는 도전에 직면해 있다. 5월 미국 미시간대 소비자심리지수 최종치는 48.2로 2022년 6월 저점 부근까지 떨어졌다. FOMC 4월 의사록은 다수 위원이 인플레이션이 2% 목표를 계속 웃돌 경우 추가 긴축이 적절할 수 있다고 봤다. 시장은 워시 체제의 매파 색채와 매크로 충격을 동시에 가격에 반영하고 있다. 신임 의장의 첫 발언은 곧 발표될 6월 FOMC 직전에 집중될 것으로 보이며, 글로벌 채권시장은 워시 취임 직후 단기 금리 변동성이 확대됐다.`,
  keyTerms:[{term:`매파`,explanation:`중앙은행이 물가 안정을 우선시해 기준금리 인상이나 긴축 통화정책을 선호하는 성향. 워시 의장은 과거 발언에서 인플레이션 억제를 강조해 매파로 분류되어 왔으며, 시장은 그의 취임으로 추가 긴축 가능성을 더 진지하게 받아들이고 있다.`}],
  history:`미국 Fed는 2024~2025년 인플레이션 둔화 국면에서 점진적 인하 기조를 유지해 왔으나, 2026년 초 중동 분쟁 격화로 국제유가가 다시 뛰면서 인플레이션 재가열 우려가 부각됐다. 전임 의장이 임기를 마치며 매파 성향의 워시가 후임으로 지명됐다. 워시는 부시 행정부 시절 Fed 이사를 지낸 전직 투자은행 출신이다.`,
  players:`케빈 워시는 트럼프 행정부와 가까운 매파 인사로 분류되며, 재무부 베센트 장관과 정책 조율을 강화할 것으로 예상된다. 시장은 골드만삭스·JP모건 등 주요 IB의 새 금리 전망에 민감하게 반응 중이다. 의회 민주당은 Fed 독립성 약화 가능성을 경계하고 있다.`,
  current:`5월 소비자심리지수가 사실상 사상 최저권에 머물고 인플레이션 기대가 상승하는 가운데 신임 의장이 첫 통화정책 회의를 앞두고 있어, 시장은 워시의 첫 메시지를 매우 민감하게 받아들이고 있다.`,
  outlook:`6월 FOMC와 워시 의장의 첫 기자회견이 가장 큰 단기 이벤트다. 7월 발표될 2분기 GDP 속보치와 6월 CPI도 통화정책 경로의 핵심 변수로 작용할 전망이다.`,
  sources:[{title:`Stocks Up Early on Iran Talks, Warsh to Take Oath - Schwab`,url:`https://www.schwab.com/learn/story/stock-market-update-open`},{title:`Global Developments on May 26, 2026 - Everything Briefing`,url:`https://everythingbriefing.substack.com/p/may-26-2026`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`EU집행위, 유로존 2026년 GDP 성장률 0.9%로 하향… 인플레 3%로 상향`,
  metrics:[`유로존 2026년 GDP 성장 전망 0.9%`,`유로존 2026년 인플레 전망 3.0%, 영국 실업률 5%로 급등`],
  summary:`유럽연합(EU) 집행위원회가 2026년 유로존 경제성장률 전망을 0.9%로 하향 조정했다. 동시에 같은 해 인플레이션 전망치는 3%로 상향했다. 영국 또한 같은 시점에 발표된 통계에서 실업률이 5%로 예상치 못한 급등을 보였고, 구인공고는 5년 만에 최저로 떨어졌다. 유럽 각국 경기는 중동발 에너지 가격 상승과 미·중 통상 마찰로 동시 압박을 받고 있다. ECB는 이미 인플레이션 재가열 위험을 경계하며 추가 인하에 신중한 입장으로 돌아섰다. 유럽 시장은 스태그플레이션 가능성을 일부 가격에 반영하고 있으며, 일본 닛케이가 3% 넘게 반등하는 등 글로벌 증시 흐름과의 디커플링도 부각된다.`,
  keyTerms:[{term:`스태그플레이션`,explanation:`경기 침체(stagnation)와 인플레이션(inflation)이 동시에 일어나는 현상. 성장률이 떨어지는데 물가는 계속 오르는 상태로, 중앙은행이 금리 인상·인하 어느 쪽도 마음껏 쓰지 못해 정책 선택이 매우 어려워진다.`}],
  history:`유로존은 2022~2023년 러시아발 에너지 충격으로 인플레이션이 두 자릿수까지 치솟았고, 2024년 들어 완만한 회복세를 보여 왔다. 그러나 2025년 말부터 중동 분쟁 재점화와 미·중 무역 충돌이 겹치며 경기 회복세가 흔들리기 시작했다. ECB는 그동안 신중한 인하로 균형을 잡아왔다.`,
  players:`EU 집행위와 ECB가 정책 조합을 두고 미세조정에 들어갔고, 독일·프랑스·이탈리아 등 핵심 산업국이 제조업 부진을 호소하고 있다. 영국 노동시장 약화는 유럽 전반의 수요 둔화 신호로 해석된다. IMF·OECD 등 국제기구도 유럽 전망을 일제히 낮추고 있다.`,
  current:`성장 둔화와 인플레이션 상승이 동시에 진행되는 전형적 스태그플레이션 신호가 나타나면서, ECB의 통화정책 선택지가 매우 좁아졌다.`,
  outlook:`6월 ECB 회의와 7월 유로존 2분기 GDP 속보치가 정책 방향을 가를 분기점이 될 전망이다.`,
  sources:[{title:`Global markets weekly update - T. Rowe Price`,url:`https://www.troweprice.com/personal-investing/resources/insights/global-markets-weekly-update.html`},{title:`Latest News & Updates - Bloomberg`,url:`https://www.bloomberg.com/latest`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`한국 국방부, 핵추진잠수함 개발 기본계획 공식 발표… 2030년대 중반 진수 목표`,
  metrics:[`2030년대 중반 첫 핵추진잠수함 진수 목표`,`원자로 핵연료로 저농축 우라늄 사용, 40년 프로젝트`],
  summary:`안규백 국방부 장관이 26일 경남 창원시에서 열린 제1회 미래국방전략위원회에서 대한민국 핵추진잠수함 개발 기본계획을 공식 발표했다. 한국 정부는 2030년대 중반 첫 핵추진잠수함을 진수하고, 2030년대 후반 실전 배치를 추진하기로 했다. 잠수함은 국내 기술 기반으로 설계·건조하며, 원자로 핵연료로 저농축 우라늄을 사용한다. 설계부터 운용, 정비, 핵연료 관리, 해체까지 전 과정을 한국 내에서 체계적으로 진행하는 것이 핵심 원칙이다. 안 장관은 앞서 이달 미국을 방문해 핵잠 협력과 전작권 전환 의제를 한미 간 조율한 바 있다. 전작권 전환 시점은 10월에 결정될 예정이다.`,
  keyTerms:[{term:`전작권`,explanation:`전쟁이 났을 때 한국군을 최종적으로 지휘·통제할 권한. 현재는 한미연합사령부를 통해 미군 사령관이 행사하는데, 이 권한을 한국군으로 넘겨받는 문제가 수십 년째 한미 동맹의 핵심 의제다.`}],
  history:`한국의 핵추진잠수함 보유 논의는 김대중 정부 시절부터 단속적으로 제기됐으나 한미 원자력협정 제약으로 매번 무산됐다. 2020년대 들어 북한 잠수함발사탄도미사일(SLBM) 위협 강화와 중국의 해양 활동 확대로 필요성이 다시 부각됐고, 2026년 들어 한미 협상으로 본격 추진 동력이 생겼다.`,
  players:`안규백 국방부 장관과 한국 합동참모본부, 한국형 원자로를 개발해온 한국원자력연구원이 주축이다. 미국은 핵연료 공급과 기술 협력 방식을 두고 한국과 협상 중이며, 의회·해군장관·상원 군사위원장 등이 핵심 우호 라인이다. 야당 일부는 한미 원자력협정 개정 절차를 둘러싸고 견제 움직임을 보이고 있다.`,
  current:`기본계획 발표로 한국형 핵잠수함은 처음으로 공식 사업 단계에 진입했다. 동시에 진행 중인 전작권 전환 협의가 10월 결정을 앞두고 있어 한미 안보 의제가 한꺼번에 분기점에 도달했다.`,
  outlook:`10월 전작권 전환 결정과 미국 의회의 한미 원자력협정 개정 동의 여부가 사업 추진 속도를 좌우할 전망이다. 6·3 지방선거 이후 국방 예산 편성도 변수다.`,
  sources:[{title:`한국 국방부, 핵추진잠수함 개발 공식화 - VOA`,url:`https://www.voakorea.com/a/south-korean-defense-ministry-formalizes-nuclear-powered-submarine-development-052626/8154076.html`},{title:`K핵잠 40년 프로젝트 가동, 전작권 전환시기 10월 결정 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202605261819328533`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`러시아, 키이우 외국인 대피 경고… 미·러 주도 평화협상 사실상 결렬`,
  metrics:[`러시아군 4주간 우크라 영토 약 178㎢ 순손실`,`전쟁 4년 이상 지속, 사망자 수십만 명`],
  summary:`러시아 정부가 25~26일 키이우에 거주하는 외국인, 외교관, 국제기구 인원들에게 대피를 권고하며 우크라이나 수도에 대한 체계적 타격을 예고했다. 특히 드론 설계·생산·프로그래밍 시설을 표적으로 삼겠다고 명시했다. 마르코 루비오 미 국무장관은 미국 주도 평화협상이 더 이상 결실을 보지 못하고 사실상 종료됐다고 밝혔다. 4월 21일부터 5월 19일까지 4주간 러시아군이 점령했던 우크라 영토 약 178㎢를 순손실하는 등 군사적 후퇴가 외교 카드 사용을 압박하는 모양새다. 푸틴 대통령은 종전 의지를 시사하면서도 승리는 우리의 것이라는 입장을 굽히지 않고 있다. 협상은 영토 문제로 다시 멈춰 섰다.`,
  keyTerms:[{term:`평화협상`,explanation:`전쟁 당사국들이 휴전·종전 조건을 정하기 위해 마주 앉는 외교 절차. 우크라이나 전쟁의 경우 미국이 중재해 왔지만 러시아가 점령지 유지를 고집하면서 진전을 보지 못하고 있다.`}],
  history:`러시아는 2022년 2월 우크라이나 전면 침공을 개시한 이후 4년 넘게 전쟁을 이어 왔다. 미국 트럼프 행정부는 2025년 출범 후 협상 중재를 자처해 여러 차례 휴전안을 제시해 왔지만 영토 문제로 번번이 좌초됐다. 러시아는 5월 9일 전승절 연설에서 종전 가능성을 시사한 바 있다.`,
  players:`미국 루비오 국무장관과 러시아 라브로프 외무장관이 주요 협상 라인을 형성해 왔고, 우크라이나 젤렌스키 대통령과 푸틴 대통령은 신뢰 부족으로 정상회담 성사가 번번이 불발됐다. 유럽연합과 영국·독일·프랑스는 협상 참여 비중 확대를 요구하고 있다.`,
  current:`미국이 협상 종료를 공식화하면서 군사적 압박이 다시 외교를 대체하는 국면에 들어섰다. 러시아의 키이우 대피 경고는 4년 전쟁에서 가장 직접적인 수도 타격 위협으로 평가된다.`,
  outlook:`6월 키이우 대규모 공습 여부와 미국의 추가 제재·무기 지원 결정이 다음 분기점이다. NATO 정상회의에서 유럽 참여 방안이 논의될 전망이다.`,
  sources:[{title:`Russia tells Marco Rubio U.S. citizens should leave Kyiv - CNBC`,url:`https://www.cnbc.com/2026/05/26/russia-ukraine-war-rubio-trump-lavrov-kyiv.html`},{title:`Leave Kyiv: Why Russia's latest Ukraine threat is a major escalation - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/5/26/leave-kyiv-why-russias-latest-ukraine-threat-is-a-major-escalation`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미·이란 핵 협상 막판 진전… 이스라엘은 단독 공습 가능성 시사`,
  metrics:[`이란 핵 시설 다수 가동 중단 압박 지속`,`이스라엘 10월 총선 앞두고 안보 의제 부상`],
  summary:`미국과 이란이 핵 협상에서 막판 진전 조짐을 보이는 가운데, 이스라엘은 단독 공습 가능성을 거듭 시사하고 있다. 이란 시장은 합의 타결에 베팅하는 분위기지만, 거리와 지도부 내부는 의견이 엇갈린다. 이스라엘 정부는 미국의 협상 진전과 별개로 역내 위협, 특히 핵 관련 시설을 계속 타격하겠다는 입장이다. 가자 지구에서는 미국이 안정 유지를 우선하는 가운데 하마스가 평화위원회와의 무장해제 협상을 시간 벌기에 활용하고 있다. 헤즈볼라의 드론 공격이 늘면서 이스라엘 북부 사령부는 교전 상태를 선언했다. 10월 이스라엘 총선이 다가오면서 안보 의제가 정치 쟁점으로 부상하고 있다.`,
  keyTerms:[{term:`단독 공습`,explanation:`동맹국의 동의나 공동 작전 없이 한 국가가 독자적으로 적국 시설을 폭격하는 것. 이스라엘이 미국의 만류에도 이란 핵 시설을 단독으로 타격할 수 있다고 시사하면서, 미·이란 협상의 가장 큰 불확실성 요인이 되고 있다.`}],
  history:`미국과 이란은 2018년 트럼프 1기 행정부의 핵협정(JCPOA) 탈퇴 이후 군사적 긴장이 누적돼 왔다. 2026년 들어 2026 이란 전쟁으로 불릴 정도의 직접 충돌이 발생한 뒤, 양국은 협상 테이블로 복귀했다. 이스라엘은 그동안 이란 핵 시설 단독 공격을 여러 차례 검토해 왔다.`,
  players:`트럼프 미 대통령과 이란 최고지도자, 네타냐후 이스라엘 총리가 핵심 변수다. 사우디·UAE 등 걸프국가들은 미·이란 합의를 지지하는 쪽이고, 헤즈볼라·하마스 등 친이란 무장세력은 독자 행동을 지속하고 있다. 중국과 러시아도 합의 조건에 영향력을 행사하려 한다.`,
  current:`시장과 일부 외교가는 합의 가능성을 점치지만, 이스라엘의 단독 공습 시사가 가장 큰 불확실성이다. 가자·레바논 전선이 동시에 가열되며 협상 환경이 흔들리고 있다.`,
  outlook:`6월 중 미·이란 합의 발표 여부, 이스라엘의 이란 추가 타격 여부, 10월 이스라엘 총선이 줄줄이 분기점이다.`,
  sources:[{title:`Could Israel sabotage US-Iran deal? - Al Jazeera`,url:`https://www.aljazeera.com/video/newsfeed/2026/5/25/could-israel-sabotage-us-iran-deal`},{title:`Middle East Overview: May 2026 - ACLED`,url:`https://acleddata.com/update/middle-east-overview-may-2026`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`OpenAI, 사상 최대 1220억 달러 펀딩 마감… 엔비디아와 10GW 인프라 동맹`,
  metrics:[`OpenAI 펀딩 1220억 달러, 기업가치 8520억 달러`,`주간 활성 이용자 9억 명, 월 매출 26억 달러`],
  summary:`OpenAI가 사상 최대 규모인 1220억 달러 펀딩 라운드를 마감하며 8520억 달러의 기업가치를 인정받았다. 아마존이 500억, 엔비디아가 300억, 소프트뱅크가 300억 달러를 투자했다. 챗GPT 주간 활성 이용자는 9억 명을 넘어섰고, 월 매출은 26억 달러에 도달했다. OpenAI는 올해 내 기업공개 가능성도 시사했다. 동시에 엔비디아와의 전략적 파트너십을 통해 차세대 AI 인프라를 위한 최소 10기가와트(GW) 규모의 엔비디아 시스템을 도입하기로 했다. 1단계는 2026년 하반기부터 엔비디아 베라 루빈 플랫폼 기반으로 가동된다. 미국 전력망 부담과 AI 빅테크 자본 집중 우려가 동시에 커지고 있다.`,
  keyTerms:[{term:`기업공개`,explanation:`비상장 회사가 증권시장에 주식을 처음 공개하고 일반 투자자들이 매매할 수 있게 만드는 절차. OpenAI가 IPO 가능성을 언급한 것은 거대한 AI 자본 수요를 외부 시장에서 충당하려는 신호로 해석된다.`}],
  history:`OpenAI는 2022년 말 챗GPT 출시 이후 매년 기업가치를 빠르게 끌어올려 왔다. 마이크로소프트와의 독점적 클라우드 협력에서 출발해 2024~2025년 들어 아마존·소프트뱅크 등으로 자본 다변화를 진행했다. 엔비디아와는 GPU 공급 관계에서 자본 동맹 관계로 확장됐다.`,
  players:`샘 올트먼 OpenAI CEO와 젠슨 황 엔비디아 CEO, 손정의 소프트뱅크 회장이 핵심 인물이다. 마이크로소프트는 기존 최대 투자자였지만 이번 라운드에서 상대적으로 비중이 감소했다. 미국 규제 당국과 EU AI법 시행 주체도 빅테크 자본 집중을 주시하고 있다.`,
  current:`단일 AI 기업 펀딩으로는 사상 최대 규모이며, 엔비디아-OpenAI 수직 결합이 글로벌 AI 공급망 구조를 재편한다는 평가가 나온다. 미국 전력 인프라 부담이 본격적인 정치 이슈로 떠올랐다.`,
  outlook:`하반기 IPO 추진 여부, 미국 전력망 증설 정책, 베라 루빈 플랫폼 가동 실적이 다음 단계 분기점이다.`,
  sources:[{title:`OpenAI and NVIDIA Announce Strategic Partnership to Deploy 10GW - NVIDIA`,url:`https://nvidianews.nvidia.com/news/openai-and-nvidia-announce-strategic-partnership-to-deploy-10gw-of-nvidia-systems`},{title:`Nvidia embraces AI investor, topping \$40 billion in equity bets - CNBC`,url:`https://www.cnbc.com/2026/05/09/nvidia-embraces-ai-investor-topping-40-billion-in-equity-bets-2026.html`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`콩고·우간다 에볼라 확산… WHO 대응 속도 못 따라가, 사망 220명`,
  metrics:[`의심 사망자 220명`,`병원 공격으로 봉쇄 작업 차질, 백신 접종 지연`],
  summary:`세계보건기구(WHO) 사무총장 테드로스 아드하놈 게브레예수스가 콩고민주공화국과 우간다에서 발생한 에볼라 확산 속도가 보건 대응을 능가하고 있다고 경고했다. 의심 사망자는 220명으로 늘었다. 콩고 동부 분쟁 지역에서는 무장세력의 병원 공격이 이어지며 봉쇄와 백신 접종에 차질이 빚어지고 있다. 우간다 국경 지역에서도 의심 환자가 늘어나면서 국경 차단 조치가 검토되고 있다. WHO는 추가 백신 공급과 인력 파견을 긴급 요청했지만, 분쟁 상황이 가장 큰 변수로 꼽힌다. 인근 르완다·부룬디 등으로의 에볼라 확산 우려도 커지고 있다.`,
  keyTerms:[{term:`에볼라`,explanation:`에볼라 바이러스로 인한 출혈열 감염병. 치명률이 매우 높고 환자의 체액 접촉으로 빠르게 퍼지며, 의료 인프라가 약한 분쟁 지역에서 한 번 확산되면 봉쇄가 매우 어렵다.`}],
  history:`콩고민주공화국은 1976년 에볼라가 처음 보고된 곳으로, 이후 십여 차례의 발병이 반복돼 왔다. 2018~2020년 동부 지역 발병 당시 무장세력 공격으로 봉쇄에 실패한 전례가 있다. 우간다도 2022년 발병 경험이 있어 국경 통제 체계는 일부 갖춰져 있다.`,
  players:`WHO와 콩고·우간다 보건 당국이 일선 대응을 맡고 있고, 미국 CDC·EU·게이츠 재단 등이 자금과 백신을 지원해 왔다. 콩고 동부 무장세력 M23 등이 의료시설을 공격하는 행위가 대응을 어렵게 한다. UN 평화유지군도 일부 안전 확보 임무를 수행 중이다.`,
  current:`의심 사망자가 220명을 넘어 1년 전 발병의 정점을 빠르게 추월하면서, 국제적 보건 비상사태(PHEIC) 재지정 여부가 거론되고 있다.`,
  outlook:`6월 WHO 비상위원회 소집 여부, 우간다 대선 일정에 미칠 영향, 인접국 르완다·부룬디로의 확산 여부가 분기점이다.`,
  sources:[{title:`Global Developments on May 26, 2026 - Everything Briefing`,url:`https://everythingbriefing.substack.com/p/may-26-2026`},{title:`Latest News & Updates - Bloomberg`,url:`https://www.bloomberg.com/latest`}]

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모닝 브리핑</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sidebar-w: 240px;
    --bg: #FAFAF7;
    --paper: #FFFFFF;
    --accent: #6B7A8F;
    --accent-soft: #E8ECEF;
    --line: #EAE8E3;
    --line-strong: #D8D5CE;
    --text: #2D2A26;
    --text-mid: #6B655D;
    --text-sub: #A09889;
    --radius: 10px;
  }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 15px; line-height: 1.65; font-weight: 400;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }

  /* ── Layout ── */
  #app { display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar {
    width: var(--sidebar-w); flex-shrink: 0;
    background: var(--bg); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #sidebar-header {
    padding: 36px 20px 24px;
    border-bottom: 1px solid var(--line);
    text-align: center;
  }
  #sidebar-header h1 {
    font-size: 19px; font-weight: 700; color: var(--text);
    letter-spacing: -0.4px; line-height: 1.3;
  }
  #sidebar-header p {
    font-size: 12px; color: var(--text-sub); margin-top: 6px;
    letter-spacing: 0.3px;
  }
  #date-list { overflow-y: auto; flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
  .date-item {
    padding: 11px 14px; cursor: pointer; border-radius: 8px;
    transition: background 0.15s, color 0.15s;
    background: transparent;
    text-align: center; font-size: 13px; font-weight: 500; color: var(--text-mid);
    letter-spacing: 0.1px;
  }
  .date-item:hover { background: var(--accent-soft); color: var(--text); }
  .date-item.active {
    background: var(--accent-soft); color: var(--text); font-weight: 600;
  }

  /* ── Main ── */
  #main { flex: 1; overflow-y: auto; background: var(--paper); }
  #content { max-width: 760px; margin: 0 auto; padding: 56px 40px 80px; }

  .brief-header { margin-bottom: 36px; }
  .brief-header .bh-eyebrow {
    font-size: 11px; color: var(--text-sub); margin-bottom: 8px;
    letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;
  }
  .brief-header h2 {
    font-size: 30px; font-weight: 700; letter-spacing: -0.7px;
    color: var(--text); line-height: 1.25;
  }

  /* ── Category Tabs ── */
  .cat-tabs {
    display: flex; gap: 0; margin-bottom: 36px;
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; background: var(--paper); z-index: 10;
  }
  .cat-tab {
    padding: 12px 20px 14px; cursor: pointer; font-size: 14px; font-weight: 500;
    color: var(--text-sub); border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: inherit; letter-spacing: -0.1px;
    margin-bottom: -1px;
  }
  .cat-tab:hover { color: var(--text-mid); }
  .cat-tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 600; }

  /* ── Sources (collapsible) ── */
  .sources-toggle {
    background: transparent; border: 1px solid var(--line-strong);
    padding: 8px 14px; border-radius: 6px; font-size: 12.5px; font-weight: 500;
    color: var(--text-mid); cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
    font-family: inherit; margin-top: 12px;
    transition: background 0.15s, border-color 0.15s;
  }
  .sources-toggle:hover { background: var(--accent-soft); border-color: var(--accent); }
  .sources-toggle .arrow { transition: transform 0.2s; font-size: 9px; color: var(--text-sub); }
  .sources-toggle.open .arrow { transform: rotate(180deg); }
  .sources-body { display: none; margin-top: 12px; padding-left: 4px; }
  .sources-body.open { display: block; }

  /* ── Story Card ── */
  .story { margin-bottom: 40px; }
  .story-top { margin-bottom: 18px; }
  .story-headline {
    font-size: 19px; font-weight: 700; line-height: 1.45;
    letter-spacing: -0.4px; color: var(--text);
  }

  .metrics { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .metric-chip {
    background: var(--accent-soft); border: none;
    border-radius: 6px; padding: 7px 12px;
    font-size: 12.5px; font-weight: 500; color: var(--text-mid);
    line-height: 1.4;
  }

  .summary {
    font-size: 15px; line-height: 1.8; color: var(--text); margin-bottom: 20px;
    letter-spacing: -0.1px;
  }

  /* ── Background ── */
  .bg-box {
    background: var(--bg); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 22px 24px; margin-bottom: 14px;
  }
  .bg-box-title {
    font-size: 11px; font-weight: 600; color: var(--text-sub);
    text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 16px;
  }
  .bg-section { margin-bottom: 16px; }
  .bg-section:last-child { margin-bottom: 0; }
  .bg-section-label {
    font-size: 12.5px; font-weight: 600; color: var(--text); margin-bottom: 6px;
    letter-spacing: -0.1px;
  }
  .bg-section-text { font-size: 14px; line-height: 1.75; color: var(--text-mid); }

  /* ── Sources ── */
  .source-item {
    display: flex; align-items: flex-start; gap: 10px;
    margin-bottom: 8px; font-size: 13px;
  }
  .src-num {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent-soft); color: var(--text-mid);
    font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .source-item a { color: var(--text-mid); text-decoration: none; line-height: 1.55; }
  .source-item a:hover { color: var(--text); text-decoration: underline; }

  .story-divider { border: none; border-top: 1px solid var(--line); margin: 36px 0; }

  .empty { color: var(--text-sub); font-size: 14px; padding: 60px 0; text-align: center; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 3px; }

  /* ── Mobile Toggle ── */
  #sidebar-toggle {
    display: none;
    position: fixed; top: 14px; left: 14px; z-index: 50;
    background: var(--paper); border: 1px solid var(--line-strong);
    width: 40px; height: 40px; border-radius: 10px;
    cursor: pointer; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(45, 42, 38, 0.08);
  }
  #sidebar-toggle span {
    display: block; width: 18px; height: 2px; background: var(--text);
    position: relative;
  }
  #sidebar-toggle span::before,
  #sidebar-toggle span::after {
    content: ''; position: absolute; left: 0; width: 18px; height: 2px; background: var(--text);
  }
  #sidebar-toggle span::before { top: -6px; }
  #sidebar-toggle span::after { top: 6px; }

  #sidebar-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(45, 42, 38, 0.4); z-index: 40;
  }
  #sidebar-backdrop.open { display: block; }

  /* ── Mobile Responsive ── */
  @media (max-width: 768px) {
    #sidebar-toggle { display: flex; }
    #sidebar {
      position: fixed; left: 0; top: 0; bottom: 0;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 45; width: 260px;
      box-shadow: 0 0 24px rgba(45, 42, 38, 0.12);
    }
    #sidebar.open { transform: translateX(0); }

    #content { padding: 64px 20px 60px; max-width: 100%; }
    .brief-header h2 { font-size: 22px; }
    .story-headline { font-size: 16px; }
    .summary { font-size: 14.5px; line-height: 1.75; }
    .bg-section-text { font-size: 13.5px; }
    .metric-chip { font-size: 12px; padding: 6px 10px; }
    .bg-box { padding: 18px 18px; }
    .cat-tab { padding: 11px 14px; font-size: 13.5px; }

    .quiz-card { padding: 28px 24px 24px; }
    .quiz-q { font-size: 17px; }
    .quiz-choice { font-size: 14px; padding: 13px 16px; }
  }

  /* ── Quiz Overlay ── */
  body.quiz-active #app {
    filter: blur(6px) saturate(0.85);
    pointer-events: none;
    transition: filter 0.3s ease;
  }
  #quiz-overlay {
    position: fixed; inset: 0;
    background-color: rgba(250, 250, 247, 0.55);
    background-image:
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0) 0,
        rgba(255,255,255,0) 5px,
        rgba(45,42,38,0.04) 5px,
        rgba(45,42,38,0.04) 6px
      ),
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0) 0,
        rgba(255,255,255,0) 22px,
        rgba(45,42,38,0.025) 22px,
        rgba(45,42,38,0.025) 23px
      );
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 24px;
  }
  #quiz-overlay.hidden { display: none; }

  .quiz-card {
    background: var(--paper); border-radius: 16px;
    padding: 36px 36px 32px; width: 100%; max-width: 440px;
    box-shadow: 0 16px 48px rgba(45, 42, 38, 0.18);
  }
  .quiz-eyebrow {
    font-size: 11px; color: var(--text-sub); letter-spacing: 1.5px;
    text-transform: uppercase; font-weight: 500; margin-bottom: 12px;
  }
  .quiz-q {
    font-size: 19px; font-weight: 700; color: var(--text);
    line-height: 1.5; letter-spacing: -0.3px; margin-bottom: 24px;
  }
  .quiz-choices { display: flex; flex-direction: column; gap: 8px; }
  .quiz-choice {
    background: var(--paper); border: 1px solid var(--line-strong);
    padding: 14px 18px; border-radius: 10px; font-size: 14.5px; font-weight: 500;
    color: var(--text); cursor: pointer; text-align: left;
    font-family: inherit; transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .quiz-choice:focus { outline: none; }
  .quiz-choice:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  @media (hover: hover) {
    .quiz-choice:hover { background: var(--accent-soft); border-color: var(--accent); }
  }
  .quiz-choice:active { transform: scale(0.99); }
  .quiz-choice.wrong {
    background: #F5E6E0; border-color: #C9947F; color: #8A4A30;
    animation: shake 0.4s ease;
  }
  .quiz-choice.correct {
    background: #E3EDE2; border-color: #7A9077; color: #2E4A2C;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .quiz-feedback {
    margin-top: 20px; text-align: center; font-size: 14px; font-weight: 500;
    color: var(--text-mid); min-height: 22px;
  }
  .quiz-feedback.right { color: #2E4A2C; }
  .quiz-feedback.wrong { color: #8A4A30; }

  .quiz-close-btn {
    margin-top: 18px; width: 100%;
    background: var(--text); color: var(--paper); border: none;
    padding: 13px 20px; border-radius: 10px; font-size: 14px; font-weight: 600;
    font-family: inherit; cursor: pointer;
    transition: background 0.15s;
  }
  .quiz-close-btn:hover { background: #1a1815; }
  .quiz-close-btn.hidden { display: none; }
</style>
</head>
<body>
<div id="quiz-overlay">
  <div class="quiz-card">
    <div class="quiz-eyebrow">잠깐, 정답을 맞춰야 들어갈 수 있어</div>
    <div class="quiz-q" id="quiz-q"></div>
    <div class="quiz-choices" id="quiz-choices"></div>
    <div class="quiz-feedback" id="quiz-feedback"></div>
    <button class="quiz-close-btn hidden" id="quiz-close">닫기</button>
  </div>
</div>

<button id="sidebar-toggle" aria-label="메뉴"><span></span></button>
<div id="sidebar-backdrop"></div>

<div id="app">
  <nav id="sidebar">
    <div id="sidebar-header">
      <h1>모닝 브리핑</h1>
      <p>일별 세계 뉴스 요약</p>
    </div>

    <div id="date-list"></div>
  </nav>
  <main id="main">
    <div id="content"></div>
  </main>
</div>

<script>
const BRIEFS = [{
  tag:`2026-05-12`,
  label:`2026년 5월 12일 (화요일)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미국 4월 CPI 오늘 발표 — 헤드라인 +3.7%YoY 예상, 이란 유가 충격·임대료 기술 보정 겹쳐 인플레 재점화 공포`,
  metrics:[`4월 CPI 예상: 헤드라인 +0.6%MoM / +3.7%YoY, 코어 +0.3%MoM / +2.7%YoY`,`S&P 500 7,300대 유지 — CPI 서프라이즈 시 금리 인하 기대 2027년 이후로 후퇴 가능`],
  summary:`미 노동통계국(BLS)이 5월 12일 오전 8시 30분(동부 시간) 4월 소비자물가지수(CPI)를 발표한다. 시장 컨센서스는 헤드라인 CPI가 전월 대비 +0.6%, 전년 동기 대비 +3.7%로 3월 수치를 상회할 것으로 전망한다. 이란 전쟁으로 촉발된 유가 급등(브렌트유 \$104 수준)과 지난해 정부 셧다운 기간에 누락된 임대료·OER 지수의 기술적 반영이 겹쳐 상방 압력이 강하다. 코어 CPI는 전월 대비 +0.3%, 전년 대비 +2.7%로 예상된다. 예상치를 크게 웃도는 서프라이즈가 나올 경우 연준의 금리 인하 기대는 2026년 하반기 이후로 더욱 밀릴 수 있다. 5월 15일 케빈 워시 신임 Fed 의장 인준 표결과 맞물려 통화정책 불확실성이 금융시장 변동성을 키울 것으로 예상된다. S&P 500은 7,300대를 유지하고 있으나 CPI 결과에 따라 즉각 조정이 나타날 수 있다. 특히 AI 반도체 관련주와 고밸류에이션 성장주가 금리 기대 변화에 가장 민감하게 반응할 전망이다.`,
  history:`2026년 들어 미국 인플레이션은 이란 전쟁 이전 +2.3~2.5%대에서 유가 충격으로 3월 CPI가 전년 대비 +3.4%를 기록하며 급등했다. 연준은 2025년 하반기 인하 기조로 전환하려 했으나 이란 전쟁 발발 후 동결을 유지해왔다. 파월 전 의장은 임기 종료 전까지 '인플레이션이 충분히 둔화되지 않았다'는 입장을 고수했다.`,
  players:`케빈 워시 신임 연준 의장 후보는 매파적 성향으로 분류돼 금리 인하보다 인플레이션 관리를 우선할 것으로 예상된다. 트럼프 행정부는 빠른 금리 인하를 원하지만 워시 후보의 독립성이 변수다. 시장 참여자들은 이번 CPI를 Fed 정책 방향의 결정적 선행 지표로 주목하고 있다.`,
  current:`이란 휴전 협상 재결렬 우려와 맞물려 브렌트유가 \$104 수준을 유지하면서 4월 에너지 가격이 CPI를 끌어올릴 확률이 높아졌다. 정부 셧다운 기간에 누락된 임대료 데이터의 기술적 반영이 추가 상방 압력으로 작용할 전망이다.`,
  outlook:`CPI가 +3.7%를 웃돌 경우 금리 인하 기대가 2027년 초까지 밀릴 수 있다. 워시 신임 의장 인준 이후 첫 FOMC(6월)에서 발표될 점도표가 정책 방향의 최종 가늠자가 될 전망이다.`,
  sources:[{title:`Economists Expect Another Hot Inflation Reading in the April CPI Report — Morningstar`,url:`https://www.morningstar.com/economy/economists-expect-another-hot-inflation-reading-april-cpi-report`},{title:`What to Expect From the April CPI Report — Kiplinger`,url:`https://www.kiplinger.com/investing/economy/cpi-report-april-2026-what-to-expect`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`베센트-허리펑 서울 무역협상 오늘 개막 — 트럼프-시진핑 베이징 정상회담 '선행 딜' 마무리 작업`,
  metrics:[`미중 서울 협상: 2026-05-12~13, 베이징 정상회담(14~15일) 직전 최종 실무 조율`,`예상 패키지: 보잉 항공기·농산물 대규모 구매 + 미중 무역위원회(Board of Trade) 원칙 합의`],
  summary:`스콧 베센트 미 재무장관과 중국의 허리펑 국무원 부총리가 5월 12~13일 서울에서 최종 무역 실무 협상을 진행한다. 이 회담은 14~15일 베이징에서 열리는 트럼프-시진핑 정상회담에서 양 정상이 서명할 '패키지 딜'을 사전에 확정하기 위한 작업이다. 중국은 보잉 항공기·미국 농산물 대규모 구매와 함께 '무역 위원회(Board of Trade)' 설립에 원칙 합의할 가능성이 높다. 미국은 이란·러시아와의 중국 관계 차단, AI·반도체 기술 수출통제 완화를 협상 카드로 활용하려 한다. 중국은 대만 문제에서 미국의 공식 양보를 이끌어내고 희토류 수출 협력을 통해 전략적 레버리지를 높이려는 전략이다. 협상 결과는 전 세계 60개국 이상의 정상들이 촉각을 곤두세우며 주시하고 있다. 전문가들은 포괄적 합의보다는 '부분 합의+후속 협의 로드맵' 제시 가능성이 높다고 분석한다. 정상회담 결렬 시 대만 해협 리스크와 반도체 공급망 불안이 금융시장에 즉각 반영될 수 있다.`,
  history:`미중 무역 갈등은 트럼프 1기 이후 관세 전쟁, AI·반도체 패권 경쟁으로 심화됐다. 트럼프 2기 출범 후 한국 부산 정상회담에서 관계 안정화 신호를 보낸 데 이어, 이번 베이징 회담이 2년차 첫 방중으로 관계 재설정의 전환점으로 주목받는다. 이란 전쟁 기간 중국의 이란 원유 수입 지속이 미국의 핵심 불만 사항으로 부상했다.`,
  players:`베센트 재무장관과 허리펑 부총리는 미중 경제·무역 협상의 양측 수석 대표다. 트럼프는 무역 패키지 딜을 협상 지렛대로 활용하려 하고, 시진핑은 대만 문제에서 미국의 양보를 최우선 목표로 삼고 있다. 한국은 이번 서울 개최로 미중 협상의 중간 기착지로서 외교적 존재감을 높이고 있다.`,
  current:`서울 회담이 보잉·농산물 구매 규모, 관세 조정폭, 희토류 협력 패키지 등 핵심 수치를 최종 확정하는 자리가 될 전망이다. 양측 모두 '빠른 딜'을 원하는 만큼 즉각 서명 가능한 항목 위주로 좁혀질 가능성이 높다.`,
  outlook:`14~15일 베이징 정상회담에서 합의에 서명하면 대만 해협 긴장 완화, 반도체 수출통제 일부 완화, 이란 전쟁 관련 중국 협력 강화 등의 후속 효과가 기대된다. 결렬 시 달러 약세, 반도체주 급락, 아시아 증시 전반에 충격이 예상된다.`,
  sources:[{title:`China, US confirm Seoul trade talks days before Trump-Xi summit in Beijing — South China Morning Post`,url:`https://www.scmp.com/news/china/diplomacy/article/3353067/china-us-confirm-seoul-trade-talks-days-before-trump-xi-summit-beijing`},{title:`Bessent, He set to finalise Trump-Xi summit plan — DAWN.COM`,url:`https://www.dawn.com/news/1999286`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`삼성전자 노사 협상 이틀째 결렬 — 5월 21일 18일 총파업 초읽기, 글로벌 HBM 공급망 리스크 급부상`,
  metrics:[`노조 요구: 영업이익 15% 성과급 배분·상한 폐지 상시화 (2026 Q1 영업이익 57.23조원)`,`파업 돌입 시 연 영업이익 40조원 이상 감소 추정, 글로벌 HBM 공급 차질 우려`],
  summary:`삼성전자 최대 노조와 사측이 5월 11~12일 이틀간의 사후조정 협상에서 끝내 합의에 실패했다. 핵심 쟁점은 영업이익 15% 성과급 배분과 상한 폐지의 '상시화' 여부다. 사측은 13% 일회성 지급을 제안했으나 노조는 매년 보장을 요구하며 맞섰다. 노조는 5월 21일부터 18일간 총파업에 돌입하겠다는 입장을 재확인했다. 삼성전자는 2026년 1분기 57조 원의 영업이익을 기록하며 전년 동기 대비 크게 회복했는데, 노조는 이를 근거로 충분한 배분 여력이 있다고 주장한다. 파업이 현실화될 경우 3~4만 명의 노동자가 참여해 HBM(고대역폭 메모리) 등 AI 반도체 생산에 직접 차질이 빚어질 수 있다. 글로벌 AI 인프라 투자 붐 속에 HBM 공급 부족이 심화되는 상황에서 삼성의 생산 중단은 전 세계 AI 칩 공급망을 흔들 변수로 작용할 수 있다. 정부는 추가 중재를 검토 중이며, 5월 15일까지 합의 도출이 안 될 경우 자동 파업 수순이 될 것으로 보인다.`,
  history:`삼성전자는 그간 임금·성과급 협상에서 노조와 수차례 갈등을 겪어왔다. 2025년에는 소규모 파업이 발생했으나 최종 합의로 마무리됐다. 2026년은 AI 반도체 수요 폭증으로 영업이익이 급증하면서 노조의 분배 요구가 더욱 강해졌다.`,
  players:`전국삼성전자노동조합은 조합원 3만~4만 명 규모로 국내 최대 제조업 노조 중 하나다. 사측 경영진은 '성과급 상시화'가 장기적 원가 경쟁력을 해친다는 입장이다. 정부는 반도체 공급망 안정을 위해 중재 역할에 나서고 있다.`,
  current:`협상 결렬 후 양측 입장 차이가 뚜렷이 드러났다. 파업까지 남은 시간이 9일뿐이어서 추가 협상 여지가 매우 제한적이다. 사후조정 결렬은 법적으로 파업 개시의 길을 열어준다.`,
  outlook:`5월 21일 파업 돌입 여부가 최대 분수령이다. 파업 시 HBM 공급 차질로 엔비디아·AMD 등 글로벌 AI 칩 수요자에게 직접적 영향이 예상된다. 협상 타결 시 삼성전자 주가와 코스피 반등 모멘텀이 강화될 수 있다.`,
  sources:[{title:`Samsung Electronics Labor Talks End Day One Without Deal — Seoul Economic Daily`,url:`https://en.sedaily.com/finance/2026/05/11/samsung-electronics-labor-talks-end-day-one-without-deal`},{title:`Samsung Labor Dispute: Potential 18-Day Strike Threatens Global Chip Supply — Ubergizmo`,url:`https://www.ubergizmo.com/2026/05/samsung-labor-dispute/`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`트럼프 14~15일 베이징 정상회담 임박 — 대만 독립 반대 공식화 압박·이란·AI·희토류 전방위 협상`,
  metrics:[`트럼프 베이징 도착: 2026-05-13(수) 저녁, 시진핑 정상회담: 14~15일`,`세계 60개국 이상 정상 촉각 — 무역·안보·에너지 질서 전반에 영향 예상`],
  summary:`도널드 트럼프 미국 대통령이 13일 저녁 베이징에 도착해 14~15일 시진핑 중국 국가주석과 역대급 의제의 정상회담을 갖는다. 중국 측은 대만 문제를 가장 중요한 의제로 명시했으며, 시진핑은 트럼프에게 대만 독립 반대 공식 표명, 무기 판매 제한, '하나의 중국' 지지 언급을 압박할 것으로 예상된다. 트럼프 측은 이란·러시아와의 중국 관계 차단, AI·반도체 기술 통제, 희토류 공급 확대, 보잉·농산물 구매 패키지 등을 협상 카드로 활용한다. 12~13일 서울에서 진행 중인 베센트-허리펑 실무 협상이 정상회담 의제를 사전 정리하는 역할을 맡고 있다. 세계 60개국 이상의 정상들이 회담 결과를 예의주시하며 무역·안보·에너지 질서 전반에 미칠 영향을 분석하고 있다. 브루킹스, CSIS, CFR 등 주요 씽크탱크들은 극적 합의보다는 '관계 안정화+부분 합의+후속 로드맵' 수준에 그칠 가능성이 높다고 전망한다. 회담 결렬 시 대만 해협 긴장 재고조와 반도체 공급망 충격이 즉각 금융시장에 반영될 우려가 있다.`,
  history:`미중 관계는 반도체·AI 패권 경쟁, 대만 해협 긴장, 무역 갈등을 축으로 구조적 대립이 이어졌다. 트럼프 2기 출범 후 한국 부산 정상회담(2025년)에서 대만 문제를 의도적으로 배제했으나, 이번 베이징 회담은 대만을 공식 의제에 포함시켜 성격이 달라졌다. 이란 전쟁 중 중국의 이란 원유 수입 지속이 미국의 새로운 핵심 불만 사항으로 부상했다.`,
  players:`트럼프는 중간선거를 앞두고 '중국 딜' 성과가 필요하며, 시진핑은 대만 문제 진전과 희토류 협력을 통한 전략적 이익을 추구한다. 대만은 자국 운명이 결정될 수 있는 회담을 긴장 속에 주시 중이다. 한국·일본·유럽은 반도체 공급망과 대중 무역 정책 변화에 촉각을 세우고 있다.`,
  current:`서울 실무 협상에서 보잉·농산물 구매 규모가 거의 확정 단계에 이른 것으로 알려졌다. 희토류 공급 협력 패키지가 마지막 순간 부상하며 협상 구도가 복잡해졌다.`,
  outlook:`대만 해협 안정화, AI 반도체 수출통제 완화, 이란 전쟁 중국 협력 강화가 핵심 결과물로 거론된다. 합의 수준에 따라 글로벌 기술주·방산주·원자재 가격이 즉각 반응할 것으로 예상된다.`,
  sources:[{title:`Trump-Xi Summit Is About More Than Trade, Taiwan, Chips — Bloomberg`,url:`https://www.bloomberg.com/opinion/features/2026-05-10/trump-xi-summit-is-about-more-than-trade-taiwan-chips`},{title:`Trump-Xi Summit in Beijing: Managing the World's Most Important Relationship — CSIS`,url:`https://www.csis.org/analysis/trump-xi-summit-beijing-managing-worlds-most-important-relationship`},{title:`US-China relations: What to expect from the Trump-Xi summit — World Economic Forum`,url:`https://www.weforum.org/stories/2026/05/what-to-expect-trump-xi-summit-china-us/`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`영국 스타머 총리 지방선거 참패 후 정치 생존 위기 — 노동당 1,100석 이상 상실·Reform UK 약진`,
  metrics:[`노동당: 5,000여 석 중 1,100석 이상 상실 / Reform UK 1,400석 이상 획득`,`웨일스·선덜랜드 등 전통 노동당 텃밭에서 Reform에 지방정부 탈취`],
  summary:`영국 키어 스타머 총리가 이끄는 노동당이 5월 초 지방선거에서 사상 최악의 참패를 당했다. 136개 지방의회 5,000여 석을 놓고 치른 이번 선거에서 노동당은 1,100석 이상을 잃었고, 나이절 파라지가 이끄는 극우 포퓰리즘 정당 Reform UK는 1,400석 이상을 얻으며 약진했다. 에섹스 카운티, 런던 헤이브링, 잉글랜드 북부 선덜랜드 등 전통 노동당 텃밭이 Reform에 넘어갔다. 웨일스에서는 수십 년간 노동당의 심장이었던 지역에서 플라이드 쿰루(Plaid Cymru)가 최다 의석을 차지했다. 스타머 총리는 사임 요구를 거부하며 '결과를 무겁게 받아들인다'고 밝혔으나, 당내 백벤치 의원들 사이에서 지도부 교체 목소리가 높아지고 있다. 선거 참패 원인으로는 저성장 경제, 이스라엘 대사 엡스타인 연루 논란, 반유대주의 '국가 비상사태' 선언 등이 꼽힌다. 스타머의 정치적 생존이 불투명해지면서 영국의 대서양 횡단 외교 정책 방향에도 불확실성이 커졌다.`,
  history:`스타머는 2024년 총선에서 보수당을 대파하며 14년 만에 노동당 집권을 이끌었다. 그러나 집권 이후 경제 성과 부진과 사회 갈등 심화로 지지율이 지속 하락했고, 2025년 지방선거에서도 손실을 입은 바 있다. Reform UK는 브렉시트 이후 반이민·반엘리트 노선으로 지지층을 급격히 확대해왔다.`,
  players:`나이절 파라지 Reform UK 대표는 이번 선거를 발판으로 2029년 총선 도전을 공식화했다. 스타머는 내각을 유지하며 '변화 속도'를 높이겠다고 약속했으나 당내 불만이 고조 중이다. 보수당은 Reform에 우파 표를 빼앗기면서 독자 회복이 어려운 상황이다.`,
  current:`지방선거 참패는 스타머에게 정치적 교정 기회이기도 하지만 신임 투표 가능성도 열어두게 했다. Reform의 지방의회 통치 경험 확대가 총선을 앞두고 더 큰 변수로 작용할 전망이다.`,
  outlook:`스타머가 의미 있는 경제 개선 성과를 제시하지 못할 경우 향후 12개월 내 당내 도전에 직면할 가능성이 있다. Reform UK의 부상은 유럽 전반의 극우 포퓰리즘 트렌드와 맞닿아 있어 EU·NATO 협력에도 잠재적 영향을 미친다.`,
  sources:[{title:`Keir Starmer's party lost big in U.K. local elections. Here's what comes next — NPR`,url:`https://www.npr.org/2026/05/10/nx-s1-5817491/uk-elections-keir-starmer-resign-reform-green`},{title:`UK's Starmer battles for political survival amid calls for exit timetable — Al Jazeera`,url:`https://www.aljazeera.com/news/2026/5/11/uks-keir-starmer-faces-likely-challenge-following-labours-election-defeat`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`한국 개헌안 표결 불성립 후 정국 교착 — 국민의힘 불참·재상정 무산, 6월 지방선거 연동 국민투표 불투명`,
  metrics:[`개헌안 표결(5/7): 국민의힘 불참 → 의결 정족수(191표/재적 286석) 미달 불성립`,`재상정 예고(5/8) 후 국회의장 당일 철회 — 6월 지방선거 동시 국민투표 사실상 무산`],
  summary:`이재명 대통령이 공고한 대한민국 헌법 개정안이 5월 7일 국회 본회의 표결에서 국민의힘의 전면 불참으로 의결 정족수를 채우지 못해 불성립됐다. 재적 286명 중 191명 이상이 참여해야 하는 가결 요건을 충족하지 못한 것이다. 우원식 국회의장은 5월 8일 재투표를 예고했다가 같은 날 재상정하지 않겠다고 번복하면서 개헌 추진이 동력을 잃었다. 이번 개헌안의 핵심은 12·3 내란 사태 재발 방지를 위한 계엄 통제 강화와 5·18 정신의 헌법 수록이었다. 국민의힘은 절차적 문제와 내용에 반대하며 표결을 거부했다. 더불어민주당 등 여야 6당이 6월 지방선거와 동시에 개헌 국민투표를 치르려 했으나 이 일정이 사실상 무산됐다. 개헌 추진 실패는 여야 간 극한 대치 구도를 더욱 굳히는 계기가 됐으며, 정치 불안이 외국인 투자 심리에도 영향을 미칠 것으로 우려된다. 차기 개헌 시도 시점과 방식은 현재로서 불투명하다.`,
  history:`한국은 1987년 헌법 개정 이후 39년째 같은 헌법 아래 있다. 2024년 12·3 계엄 사태와 탄핵 정국을 거치면서 계엄 통제 강화를 골자로 한 개헌 논의가 급물살을 탔다. 이재명 정부 출범 이후 개헌을 조기 추진했으나 여야 합의 도출에 실패했다.`,
  players:`이재명 대통령과 더불어민주당·6개 야당 연대는 6월 지방선거 동시 국민투표를 목표로 개헌을 추진했다. 국민의힘은 '졸속 개헌'이라며 절차와 내용 모두에 반대했다. 우원식 국회의장은 중재자 역할을 시도했으나 결정적 순간에 재상정을 철회하며 물러섰다.`,
  current:`개헌 불성립으로 여야 갈등이 극단으로 치달았고, 정기국회 이전에는 추가 개헌 시도가 사실상 어렵게 됐다. 6월 지방선거를 앞두고 개헌 실패가 각 당의 선거 전략에 영향을 미칠 전망이다.`,
  outlook:`6월 지방선거 결과에 따라 개헌 추진의 동력이 재점화될 수 있다. 다만 국민의힘의 협력 없이는 개헌 의결이 불가능한 구조여서, 정치 협상을 통한 새로운 접근이 불가피할 전망이다.`,
  sources:[{title:`'5·18 정신 수록' 39년 만의 개헌‥국힘 불참으로 끝내 '불성립' — MBC뉴스데스크`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6820749_37004.html`},{title:`2026년 5월 8일 오늘의 주요 뉴스 — 오늘의 클릭`,url:`https://www.cliktoday.com/2026/05/20260508-today-news.html`}]

  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`MV 혼디우스 크루즈선 한타바이러스 집단감염 — WHO 7명 확진·3명 사망, 미국인 귀환 격리 모니터링`,
  metrics:[`WHO 공식 집계: 확진 7명·추정 2명·사망 3명 (탑승자 23개국 147명)`,`미국인 17명 군 항공기로 네브래스카 연방 격리시설 이송, 1명 양성(무증상)`],
  summary:`네덜란드 탐험 크루즈선 MV 혼디우스(MV Hondius)에서 발생한 안데스 바이러스(Andes virus) 집단 감염이 국제 보건 위기로 번지고 있다. 4월 1일 아르헨티나 우수아이아를 출발한 이 선박에는 23개국 147명(승객 88명·승무원 59명)이 탑승했으며, 4월 11일부터 감염자가 속출했다. WHO는 현재까지 7명 확진·2명 추정·사망자 3명을 공식 집계했다. 스페인 카나리아 제도 테네리페 항구에 입항한 후 각국 정부와 군이 승객들을 자국으로 송환하기 시작했다. 미국인 17명은 군 항공기로 네브래스카 연방 격리시설로 이송됐으며, 이 중 1명이 양성 반응을 보였으나 무증상이다. 안데스 바이러스는 설치류 배설물로 전파되는 한타바이러스의 일종으로, 사람 간 전파가 드물지만 안데스 변종은 드물게 인간 간 전파 사례가 보고돼 감시가 강화됐다. CDC는 공식 경보(HAN)를 발령하고 귀국 승객의 잠복기 모니터링을 지시했다. 이번 사태는 남극·남미 탐험 크루즈 여행의 생물 안전 리스크를 부각시켰다는 점에서 의미가 있다.`,
  history:`안데스 바이러스는 주로 칠레·아르헨티나 남부에서 설치류(실바나 쥐)를 통해 전파된다. 과거 사례에서도 드물게 사람 간 전파가 확인됐으나, 이번처럼 크루즈선이라는 밀폐 공간에서 집단 발생한 사례는 매우 이례적이다. WHO는 선박 출항 당시부터 역학 추적을 소급해 조사 중이다.`,
  players:`MV 혼디우스 운항사(네덜란드 오션와이드 익스페디션)와 WHO·CDC·각국 보건당국이 대응에 나섰다. 스페인은 테네리페에서 선박 검역을 담당했고, 미국·프랑스 등이 자국민을 긴급 송환했다. 네브래스카 연방 격리시설(미 유일의 고위험 격리 병동)이 미국인 격리를 맡았다.`,
  current:`귀국 승객 전원이 잠복기(1~5주) 모니터링 대상이다. 양성 확인자 중 무증상 케이스가 있어 지역사회 전파 가능성은 낮지만 배제할 수 없다. WHO는 추가 사례 신고를 요청하며 모니터링을 지속하고 있다.`,
  outlook:`잠복기가 최대 5주인 만큼 6월 초까지 추가 확진자 발생 가능성이 있다. 이번 사태를 계기로 국제 탐험 크루즈에 대한 생물 안전 기준 강화 논의가 촉발될 것으로 예상된다. 항바이러스제(리바비린)의 치료 효과가 제한적이어서 조기 발견과 격리가 핵심 대응 수단이다.`,
  sources:[{title:`Where did the hantavirus outbreak start, and where has it spread? — Al Jazeera`,url:`https://www.aljazeera.com/news/2026/5/11/where-did-the-hantavirus-outbreak-start-and-where-has-it-spread`},{title:`Hantavirus cluster linked to cruise ship travel, Multi-country — WHO`,url:`https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON599`},{title:`Americans On Cruise Ship With Hantavirus Outbreak Return To US — iHeart/WEBN`,url:`https://webn.iheart.com/content/2026-05-11-americans-on-cruise-ship-with-hantavirus-outbreak-return-to-us/`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`구글·MS·xAI, 미 정부에 AI 모델 출시 전 사전 검토권 부여 — 트럼프 AI 감독 체계 본격 가동`,
  metrics:[`사전 검토 대상: 구글 Gemini·MS Copilot·xAI Grok 등 주요 상업 AI 모델`,`OpenAI 연간 매출 \$250억 돌파·2026년 말 IPO 추진, 구글 클라우드 1분기 +63% 성장`],
  summary:`구글, 마이크로소프트, 일론 머스크의 xAI가 미 정부에 자사 AI 모델의 공개 출시 전 사전 접근·평가권을 부여하기로 합의했다. 트럼프 행정부가 추진하는 AI 감독 체계의 일환으로, 해당 기관이 모델의 보안 취약점과 역량을 사전 검토한 뒤 공개 승인 절차를 거치는 방식이다. 이는 바이든 행정부 시절 AI 안전 행정명령과 달리 '국가 경쟁력 강화' 관점에서의 감독으로, 중국 AI와의 패권 경쟁을 의식한 조치로 해석된다. 한편 OpenAI는 연간 매출이 \$250억을 돌파하며 2026년 말 IPO를 추진 중인 것으로 알려졌고, 구글 클라우드는 1분기 AI 수요 급증으로 전년 대비 63% 성장을 기록했다. AI 인프라 투자는 미국 GDP의 약 2%에 달하는 규모로 성장해 단일 산업 섹터로서는 전례 없는 규모가 됐다. 애플은 카메라 탑재 AI 에어팟 생산 테스트에 들어가는 등 하드웨어 AI 경쟁도 격화되고 있다. 이번 정부 AI 사전 검토 협정은 자율 규제와 정부 감독의 절충 모델로 평가받으며, 향후 국제 AI 거버넌스 논의의 기준이 될 것으로 예상된다.`,
  history:`바이든 행정부는 2023년 AI 안전 행정명령을 통해 강제적 모델 보고 의무를 부과했다. 트럼프 2기는 이를 폐지하고 산업 친화적 자율 규제 체계로 전환했으나, 국가 안보 차원의 사전 검토는 유지했다. AI 패권을 둘러싼 미중 경쟁이 심화되면서 정부의 AI 역량 파악 필요성이 커졌다.`,
  players:`구글·MS·xAI는 정부 협력을 통해 규제 리스크를 줄이고 공공 조달 시장 진출 기회를 확보하려 한다. 트럼프 행정부는 AI 기업들의 자발적 협력을 유도해 중국 AI 대비 미국 모델의 안보 우위를 확보하는 데 집중한다. OpenAI는 이번 협정에 직접 참여하지 않았으나 IPO 준비 과정에서 규제 환경을 예의주시하고 있다.`,
  current:`이번 협정은 법적 의무가 아닌 자발적 협력 형태여서 실효성 논란도 있다. 다만 주요 빅테크가 동시에 참여하면서 사실상의 업계 표준이 될 가능성이 높다.`,
  outlook:`미국의 AI 사전 검토 모델이 EU AI Act와 함께 국제 AI 거버넌스의 두 축으로 부상할 전망이다. 14~15일 트럼프-시진핑 정상회담에서 AI·반도체 기술 통제가 논의될 경우 이 감독 체계가 협상 카드로 활용될 수 있다.`,
  sources:[{title:`Microsoft, Google and xAI will let the government test their AI models before launch — CNN Business`,url:`https://www.cnn.com/2026/05/05/tech/microsoft-google-xai-government-test-ai-models`},{title:`Trump admin moves further into AI oversight, will test Google, Microsoft and xAI models — CNBC`,url:`https://www.cnbc.com/2026/05/05/ai-oversight-trump-google-microsoft-xai.html`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`한국 4월 수출 +48% 역대 최고 — AI 반도체 수요 폭증·SK하이닉스 HBM 독주, 삼성 파업 리스크가 변수`,
  metrics:[`한국 4월 수출: 전년 동기 대비 +48% 역대 최고, 반도체 수출 +173% 폭등`,`SK텔레콤 AI 인프라 수조원 투자 선언, KT 2027년까지 AI·로봇 1.2조원 확정`],
  summary:`한국의 4월 수출이 전년 동기 대비 48% 급증하며 사상 최대치를 기록했다. 반도체 수출이 173% 폭등한 것이 핵심 동력으로, AI 데이터센터 구축 수요가 고대역폭 메모리(HBM)와 DRAM 공급을 풀 가동하게 만들었다. SK하이닉스는 엔비디아·AMD 등에 HBM3E를 독점 수준으로 공급하며 주가가 전일 11% 이상 급등했고, 코스피 지수는 역대 최고치인 7,822.24를 경신했다. 삼성전자는 1분기 57조 원의 영업이익을 기록하며 회복세를 보였지만, 노사 협상 결렬로 파업 가능성이 커지면서 HBM 공급 차질 우려가 부상하고 있다. SK텔레콤은 AI 네이티브 전략을 발표하며 수조 원 규모의 AI 인프라 투자를 선언했고, KT도 2027년까지 1조 2,000억 원의 AI·로봇 사업 투자를 확정했다. 한국 정부는 AI 기본법 시행을 계기로 한국 AI 기업들의 글로벌 진출을 제도적으로 지원하고 있다. 삼성전자 파업과 지정학적 리스크(미중 갈등·대만 해협)가 반도체 공급망의 잠재적 취약 요소로 지목된다.`,
  history:`한국은 세계 메모리 반도체 시장의 70% 이상을 점유하는 글로벌 1위 생산국이다. 2025년 AI 인프라 투자 붐이 시작되면서 HBM·DRAM 수요가 폭발적으로 늘었고, 한국 반도체 기업들이 최대 수혜자가 됐다. 2026년 코스피는 AI 반도체 랠리를 타고 연초 대비 30% 이상 상승하며 역대 최고치 경신 행진을 이어가고 있다.`,
  players:`SK하이닉스는 HBM3E 독점 공급자 지위로 엔비디아·AMD에 핵심 부품을 납품한다. 삼성전자는 HBM 시장 후발 주자로 기술 격차를 빠르게 좁히고 있으나 파업 변수가 발목을 잡는다. 미국 AI 빅테크(엔비디아·구글·마이크로소프트)가 한국 반도체의 주요 수요처다.`,
  current:`AI 반도체 수요가 공급을 초과하는 상황이 지속되면서 한국 기업들의 가격 교섭력이 사상 최고 수준이다. 삼성 파업이 현실화될 경우 HBM 공급 공백을 SK하이닉스 단독으로 메우기 어려워 전 세계 AI 인프라 구축에 지연이 발생할 수 있다.`,
  outlook:`2026년 하반기에도 AI 데이터센터 투자가 지속될 것으로 예상돼 한국 반도체 수출 호조가 이어질 전망이다. 삼성 파업 결과와 트럼프-시진핑 정상회담 결과(반도체 수출통제 완화 여부)가 향후 방향의 핵심 변수다.`,
  sources:[{title:`South Korea Q1 growth surges past forecasts on semiconductor export boom — CNBC`,url:`https://www.cnbc.com/2026/04/23/south-korea-economic-growth-surpassed-estimates-in-q1-thanks-to-chips.html`},{title:`AI chip boom sends Korea exports to record highs, supply crunch deepens — Digitimes`,url:`https://www.digitimes.com/news/a20260501VL208/exports-demand-shipments-infrastructure-chips.html`},{title:`South Korea's telecom giants unveil full-stack AI strategies at WIS 2026 — Digitimes`,url:`https://www.digitimes.com/news/a20260424PD221/south-korea-telecom-infrastructure-6g-ai-2026.html`}]
}]

  tag:`2026-05-11`,
  label:`2026년 5월 11일 (월요일)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`트럼프, 이란 역제안 전면 거부 — 브렌트유 4% 급등 \$104 돌파, 이번 주 CPI·Fed 의장 인준 주목`,
  metrics:[`브렌트유 +4% → \$104.01/bbl, WTI +2.7% → \$97.97/bbl (협상 결렬 우려)`,`S&P 500 7,300대 유지, 코스피 4.32% 급등 7,822.24 역대 최고 경신`],
  summary:`이란이 미국의 종전 제안에 '호르무즈 해협 주권 인정 + 전쟁 배상금'을 역으로 요구하는 역제안을 제시하자, 트럼프 대통령이 소셜미디어에 '전혀 받아들일 수 없다(TOTALLY UNACCEPTABLE)'고 강경 반응하며 협상 결렬 우려가 커졌다. 이에 국제 유가가 즉각 반응해 브렌트유는 4% 올라 배럴당 \$104.01, WTI는 2.7% 오른 \$97.97을 기록했다. 반면 지난 5월 초 미-이란 협상 기대감 속에 급락했던 유가가 재차 \$100선을 넘어서며 인플레이션 재점화 경계감이 높아지고 있다. 글로벌 주식시장은 혼조세를 보였다. S&P 500은 7,300대를 유지했고, 한국 코스피는 반도체 랠리에 힘입어 4.32% 급등해 역대 최고치인 7,822.24를 경신했으며 SK하이닉스는 11% 이상 급등했다. 이번 주 최대 이벤트는 5월 12일(화) 미국 4월 CPI 발표(헤드라인 +3.7%YoY 예상)와, 5월 15일 파월 의장 임기 종료에 따른 케빈 워시 신임 Fed 의장 인준 표결이다. 유가 재급등이 CPI 서프라이즈를 유발할 경우 금리 인하 기대가 다시 후퇴할 수 있어 시장 변동성 확대가 예상된다.`,
  history:`2026년 3~4월 미국의 대이란 군사 행동 이후 이란은 호르무즈 해협을 실질적으로 봉쇄하며 전 세계 원유·LNG 공급량의 약 20%가 묶였다. 유가는 한때 배럴당 \$130대까지 치솟았고 글로벌 인플레이션이 재점화됐다. 4월 초 임시 휴전 합의 이후 유가가 \$94~\$101선으로 급락했으나, 항구적 종전 협상은 줄곧 난항을 겪었다.`,
  players:`트럼프 행정부는 최대 압박을 유지하면서 종전 협상을 주도하려 하며 군사 옵션 재개 가능성도 열어두고 있다. 이란은 핵 주권 보장·제재 해제·배상금 수령을 목표로 협상 조건을 높이고 있다. 파키스탄은 양측 메시지 전달 채널 역할을 하고 있으며, 중국은 이란 최대 원유 수입국으로서 해협 재개에 경제적 이해관계가 크다. 산유국들과 해운업계는 호르무즈 재개 시점을 예의주시하고 있다.`,
  current:`이란의 역제안은 미국이 수용하기 어려운 조건(호르무즈 주권+배상금)을 포함해 협상이 사실상 원점으로 돌아갔다는 평가가 나온다. 트럼프가 강경 입장을 유지하면서 군사 옵션 재개 가능성이 다시 부각되고 있고, 이것이 유가 급등의 직접 원인이 됐다.`,
  outlook:`5월 12일 CPI 발표에서 유가 급등의 영향으로 헤드라인 수치가 예상치를 웃돌 경우 금리 인하 기대가 크게 후퇴할 수 있다. 5월 15일 케빈 워시 Fed 의장 인준 여부도 통화정책 방향 가늠자가 된다. 이란 협상이 완전 결렬될 경우 유가 재차 \$115~\$120 시나리오까지 열려 있다.`,
  sources:[{title:`Oil jumps 4% as Trump rejects Iran's response to ceasefire proposal — Euronews`,url:`https://www.euronews.com/business/2026/05/11/oil-jumps-4-after-trump-rejects-irans-response-to-ceasefire-proposal`},{title:`Markets dip as US-Iran ceasefire goes nowhere, leaving Trump with a military option to reopen Hormuz — Fortune`,url:`https://fortune.com/2026/05/10/markets-dow-futures-crude-oil-prices-us-iran-ceasefire-trump-military-option-strait-of-hormuz/`},{title:`Asia markets live updates: Nikkei, Kospi, Hang Seng — CNBC`,url:`https://www.cnbc.com/2026/05/11/asia-markets-today-live-updates-nikkei-kospi-hang-seng-sensex-csi-300-iran-hormuz.html`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`러-우 3일 휴전 붕괴 — 양측 16,000건 이상 위반 상호 비난, 전선 교전 전면 재개`,
  metrics:[`러시아 주장: 우크라이나가 24시간 내 16,071건 휴전 위반 저질렀다`,`우크라이나 주장: 러시아 60차례 공격 감행, 민간인 1명 사망·15명 부상`],
  summary:`트럼프 대통령이 중재한 러시아-우크라이나 3일 휴전(5월 9~11일, 러시아 전승절 기념)이 사실상 붕괴됐다. 러시아 국방부는 우크라이나가 24시간 내 드론·포격으로 크림반도, 벨고로드주, 쿠르스크주 등에서 총 16,071건의 휴전 위반을 저질렀다고 주장했다. 우크라이나는 반박하며 러시아가 60차례 공격을 감행했고 민간인 1명이 사망하고 15명이 부상했다고 밝혔다. 젤렌스키 대통령은 러시아가 휴전을 준수하지도, '지키려는 노력조차 하지 않는다'고 강하게 비난했다. 양측은 대규모 도시 공습은 소강상태를 보였으나 전선 교전은 완전히 재개됐다. 앞서 부활절 등 여러 차례 합의된 임시 휴전이 모두 실질적 성과 없이 붕괴된 전례가 반복됐다. 한편 푸틴은 별도 회견에서 전쟁이 '끝나가고 있다'고 시사하며 제3국에서 젤렌스키와 만날 의향을 내비쳐 상반된 신호를 보냈다.`,
  history:`러시아는 2022년 2월 우크라이나를 전면 침공했고, 4년 이상 이어진 전쟁은 교착 상태에 빠졌다. 트럼프 2기 행정부 출범 이후 미국은 적극적인 중재자로 나섰으나 부활절·러시아 연방 기념일 등 여러 차례 합의된 임시 휴전은 모두 실패했다. 양측 간 근본적 불신이 해소되지 않은 채 미봉적 휴전만 반복되고 있다.`,
  players:`트럼프 대통령은 빠른 종전을 공약으로 내세운 만큼 중재 실패가 정치적 부담이 되고 있다. 푸틴은 '협상 용의'를 시사하면서도 실제 교전을 멈추지 않는 이중 전략을 구사하고 있다. 젤렌스키는 실질적 안전 보장 없이는 어떤 휴전도 용납할 수 없다는 입장이다. 유럽 동맹국들은 미국의 지원 지속 여부에 촉각을 세우고 있다.`,
  current:`휴전 붕괴는 종전 협상이 여전히 요원함을 재확인시켰다. 러-우 양측의 상호 비난이 외교적 모멘텀을 완전히 소진시키는 분위기이며, 트럼프의 다음 중재 시도가 어떤 형태가 될지 불확실하다.`,
  outlook:`5월 14~15일 트럼프-시진핑 베이징 정상회담에서 러시아-우크라이나 전쟁 중재 문제도 의제로 다뤄질 가능성이 있다. 푸틴의 '만남 의향' 발언이 단순한 외교적 제스처인지 실질적 신호인지가 단기 최대 관전 포인트다. 휴전 추가 합의 실패 시 유럽 에너지·곡물 가격 불안과 방산 지출 확대 압력이 지속될 전망이다.`,
  sources:[{title:`Russia and Ukraine accuse the other of ceasefire violations — Al Jazeera`,url:`https://www.aljazeera.com/video/newsfeed/2026/5/11/russia-and-ukraine-accuse-the-other-of-ceasefire-violations`},{title:`Russia and Ukraine accuse each other of violating U.S.-brokered ceasefire — CBS News`,url:`https://www.cbsnews.com/news/russia-ukraine-accuse-each-other-ceasefire-violations/`},{title:`Russia and Ukraine accuse each other of violating U.S.-brokered three-day ceasefire — PBS NewsHour`,url:`https://www.pbs.org/newshour/amp/world/russia-and-ukraine-accuse-each-other-of-violating-u-s-brokered-three-day-ceasefire`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`트럼프-시진핑 베이징 정상회담 5월 14~15일 확정 — 대만 최우선 의제, 이란·AI·희토류·무역도 논의`,
  metrics:[`정상회담 일정: 2026-05-14(목)~15(금), 베이징 — 트럼프 13일 저녁 도착 예정`,`세계 60개국 이상 지도자가 회담 결과를 촉각 주시 중 (CNBC 보도)`],
  summary:`미국과 중국이 도널드 트럼프 대통령의 베이징 방문 일정을 5월 14~15일로 공식 확정했다. 트럼프는 13일 저녁 베이징에 도착해 14일 시진핑 주석과 첫 공식 정상회담을 갖는다. 중국 측은 대만 문제를 가장 중요한 의제로 명시했고, 미국도 이를 수용해 대만 해협 안정화 여부가 핵심 관전 포인트가 됐다. 시진핑은 트럼프에게 대만 독립 반대 공식 표명과 무기 판매 제한을 압박할 것으로 예상된다. 이 밖에도 중국의 이란·러시아 관계, AI·반도체 기술 통제, 희토류 공급 확대, 농산물·보잉 항공기 구매 계약 등 광범위한 의제가 다뤄진다. 싱가포르부터 브뤼셀까지 60개국 이상의 정상들이 이 회담의 결과를 예의주시하고 있으며, 무역·안보·에너지 질서 전반에 영향을 줄 것으로 관측된다. 전문가들은 회담이 劇的 합의보다는 '관계 안정화'에 초점을 맞출 가능성이 높다고 분석한다.`,
  history:`미-중 관계는 반도체·AI 패권 경쟁, 대만 해협 긴장, 무역 갈등을 축으로 구조적 대립이 심화돼 왔다. 트럼프 2기 출범 이후 양측은 관세 협상과 갈등을 반복했고, 지난해 한국에서 열린 미-중 정상회담에서는 대만 문제가 의도적으로 배제됐다. 이번 베이징 회담은 트럼프 집권 2년차 첫 중국 방문으로, 관계 재설정의 전환점으로 주목된다.`,
  players:`트럼프는 무역 패키지 딜(중국의 농산물·보잉 구매)과 이란·러시아 관계 차단을 협상 카드로 활용하려 한다. 시진핑은 대만 문제에서 미국의 양보를 이끌어내고 희토류 수출 협력을 활용해 전략적 레버리지를 높이려 한다. 대만은 자국의 운명이 결정될 수 있는 회담을 긴장 속에 주시하고 있다. 한국·일본·유럽 등 동맹국들은 반도체 공급망과 대중 무역 정책 변화를 우려하며 촉각을 곤두세우고 있다.`,
  current:`이란 전쟁 중 중국이 이란과의 관계를 어떻게 유지하고 있는지가 트럼프의 핵심 문제 제기 사안이다. 회담 직전 희토류 공급 협력 패키지가 부상하면서 미-중 간 거래 성사 가능성도 제기되고 있다.`,
  outlook:`회담 결과는 대만 해협 긴장 수위, 반도체·AI 수출통제 완화 여부, 이란 전쟁 해법에 직접적 영향을 미친다. 양측 이해관계 충돌이 크고 국내 정치 압박도 있는 만큼 劇的 합의보다는 부분 합의 + 후속 협의 로드맵 제시 수준에 그칠 것이라는 전망이 우세하다. 회담 결렬 시 대만 해협 및 반도체 공급망 충격이 금융시장에 즉각 반영될 수 있다.`,
  sources:[{title:`From Singapore to Brussels, world leaders eye Trump-Xi summit from afar — CNBC`,url:`https://www.cnbc.com/2026/05/11/trump-xi-summit-beijing-global-leaders-iran-war-taiwan-strait-of-hormuz-.html`},{title:`US-China relations: What to expect from the Trump-Xi summit — World Economic Forum`,url:`https://www.weforum.org/stories/2026/05/what-to-expect-trump-xi-summit-china-us/`},{title:`Taiwan tops Beijing's agenda for Trump-Xi summit — The Standard HK`,url:`https://www.thestandard.com.hk/china/article/330674/Taiwan-tops-Beijings-agenda-for-Trump-Xi-summit`}]
}]
}];

 하는 편"], "correct": 2}, {"q": "복이가 평소 즐겨 마시는 차 종류는?", "a": ["페퍼민트", "캐모마일", "얼그레이"], "correct": 0}, {"q": "복이가 최근 게임할 때 주로 플레이하는 플랫폼은?", "a": ["PC", "콘솔", "모바일"], "correct": 1}, {"q": "복이가 일할 때 집중력 최고조인 시간대는?", "a": ["오전", "오후", "늦은 밤"], "correct": 2}];

let current = null;
let currentCat = null;
const CAT_ORDER = ['경제', '정치', '기타 이슈'];

function renderSidebar() {
  const list = document.getElementById('date-list');
  list.innerHTML = '';
  BRIEFS.forEach((b, i) => {
    const el = document.createElement('div');
    el.className = 'date-item' + (i === 0 ? ' active' : '');
    el.dataset.tag = b.tag;
    const parts = b.tag.split('-');
    const short = parts[1] + '/' + parts[2];
    el.innerHTML = b.tag;
    el.addEventListener('click', () => showBrief(b.tag));
    list.appendChild(el);
  });
}

function showBrief(tag) {
  current = tag;
  document.querySelectorAll('.date-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tag === tag);
  });
  const brief = BRIEFS.find(b => b.tag === tag);
  if (!brief) return;

  // 카테고리별 그룹핑
  const grouped = {};
  brief.stories.forEach(s => {
    if (!grouped[s.category]) grouped[s.category] = [];
    grouped[s.category].push(s);
  });
  const availableCats = CAT_ORDER.filter(c => grouped[c] && grouped[c].length);
  if (!availableCats.length) return;

  // 기본 카테고리 결정
  if (!availableCats.includes(currentCat)) currentCat = availableCats[0];

  renderContent(brief, grouped, availableCats);
}

function renderContent(brief, grouped, availableCats) {
  const content = document.getElementById('content');
  let html = `<div class="brief-header">
    <div class="bh-eyebrow">Morning Brief</div>
    <h2>${brief.label}</h2>
  </div>`;

  // 탭
  html += '<div class="cat-tabs">';
  availableCats.forEach(c => {
    const cls = c === currentCat ? 'cat-tab active' : 'cat-tab';
    html += `<button class="${cls}" data-cat="${c}">${c}</button>`;
  });
  html += '</div>';

  // 선택된 카테고리 기사들
  const stories = grouped[currentCat] || [];
  stories.forEach((s, idx) => {
    if (idx > 0) html += '<hr class="story-divider">';
    html += `<div class="story">
      <div class="story-top">
        <div class="story-headline">${s.headline}</div>
      </div>`;
    if (s.metrics.length) {
      html += '<div class="metrics">';
      s.metrics.forEach(m => { html += `<div class="metric-chip">${m}</div>`; });
      html += '</div>';
    }
    html += `<div class="summary">${s.summary}</div>`;

    const bgSections = [
      ['역사적 맥락', s.history],
      ['핵심 플레이어', s.players],
      ['현재 구도', s.current],
      ['향후 전망', s.outlook],
    ].filter(([, v]) => v);

    if (bgSections.length) {
      html += '<div class="bg-box"><div class="bg-box-title">배경 스토리</div>';
      bgSections.forEach(([label, text]) => {
        html += `<div class="bg-section">
          <div class="bg-section-label">${label}</div>
          <div class="bg-section-text">${text}</div>
        </div>`;
      });
      html += '</div>';
    }

    if (s.sources.length) {
      html += `<button class="sources-toggle" data-toggle="srcs-${idx}">출처 ${s.sources.length}개 보기 <span class="arrow">▾</span></button>`;
      html += `<div class="sources-body" id="srcs-${idx}">`;
      s.sources.forEach((src, si) => {
        html += `<div class="source-item">
          <span class="src-num">${si+1}</span>
          <a href="${src.url}" target="_blank">${src.title}</a>
        </div>`;
      });
      html += '</div>';
    }
    html += '</div>';
  });

  content.innerHTML = html;

  // 탭 클릭 핸들러
  content.querySelectorAll('.cat-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      renderContent(brief, grouped, availableCats);
    });
  });

  // 출처 토글
  content.querySelectorAll('.sources-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const body = document.getElementById(btn.dataset.toggle);
      const isOpen = body.classList.toggle('open');
      btn.classList.toggle('open', isOpen);
    });
  });

  document.getElementById('main').scrollTop = 0;
}

if (BRIEFS.length > 0) {
  renderSidebar();
  showBrief(BRIEFS[0].tag);
} else {
  document.getElementById('content').innerHTML = '<div class="empty">브리핑 데이터가 없습니다.</div>';
}

// ── Quiz Gate ──
function renderQuiz() {
  const q = QUIZ[Math.floor(Math.random() * QUIZ.length)];
  document.getElementById('quiz-q').textContent = q.q;
  const feedback = document.getElementById('quiz-feedback');
  feedback.textContent = '';
  feedback.className = 'quiz-feedback';
  const closeBtn = document.getElementById('quiz-close');
  closeBtn.classList.add('hidden');

  const choicesEl = document.getElementById('quiz-choices');
  choicesEl.innerHTML = '';
  q.a.forEach((text, idx) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-choice';
    btn.textContent = text;
    btn.addEventListener('click', () => {
      const allBtns = choicesEl.querySelectorAll('.quiz-choice');
      if (idx === q.correct) {
        btn.classList.add('correct');
        allBtns.forEach(b => b.disabled = true);
        feedback.textContent = '정답!';
        feedback.className = 'quiz-feedback right';
        closeBtn.classList.remove('hidden');
      } else {
        btn.classList.add('wrong');
        feedback.textContent = '땡! 다른 문제로 갈게.';
        feedback.className = 'quiz-feedback wrong';
        allBtns.forEach(b => b.disabled = true);
        btn.blur();
        setTimeout(() => {
          if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
          renderQuiz();
        }, 900);
      }
    });
    choicesEl.appendChild(btn);
  });
}

document.getElementById('quiz-close').addEventListener('click', () => {
  document.getElementById('quiz-overlay').classList.add('hidden');
  document.body.classList.remove('quiz-active');
});

document.body.classList.add('quiz-active');
renderQuiz();

// ── Mobile sidebar toggle ──
const sidebar = document.getElementById('sidebar');
const backdrop = document.getElementById('sidebar-backdrop');
function toggleSidebar(open) {
  sidebar.classList.toggle('open', open);
  backdrop.classList.toggle('open', open);
}
document.getElementById('sidebar-toggle').addEventListener('click', () => toggleSidebar(!sidebar.classList.contains('open')));
backdrop.addEventListener('click', () => toggleSidebar(false));
// 날짜 클릭하면 모바일에서 자동으로 닫히게
sidebar.addEventListener('click', e => {
  if (e.target.classList.contains('date-item') && window.innerWidth <= 768) {
    toggleSidebar(false);
  }
});
</script>

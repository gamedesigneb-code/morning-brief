  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미-이란 휴전 살얼음판…호르무즈서 드론·미사일 교전에 협상 교착`,
  metrics:[`휴전 4월 8일 합의→4월 21일 무기한 연장`,`미군, 이란 드론 4대 격추·레이더 기지 타격`],
  summary:`2026년 미-이란 전쟁의 휴전이 살얼음판을 걷고 있다. 이란 외무장관 아바스 아라그치는 4일 전쟁 종식 협상에서 가시적 진전이 없다고 밝히면서도 미국과의 소통 창구는 열려 있다고 말했다. 다만 이스라엘이 헤즈볼라를 겨냥해 레바논 수도 베이루트를 공격할 경우 미-이란 분쟁이 전면 재개될 것이라고 경고했다. 최근 이란이 호르무즈 해협 방향으로 드론을 발사하자 미군이 드론 4대를 격추하고, 이란 고루크와 케슈름섬의 해안 감시 레이더 기지를 타격하며 긴장이 다시 고조됐다. 양측은 지난 4월 8일 파키스탄 중재로 2주간 휴전에 합의했고 트럼프 대통령이 4월 21일 이를 무기한 연장했지만, 이란은 최근 중재국과의 휴전 연장 논의를 중단한 상태다. 협상 의제에는 호르무즈 해협 항행 자유, 이란 핵·탄도미사일 프로그램, 제재 완화, 재건과 장기 평화협정이 포함돼 있다. 레바논 휴전 문제가 협상의 핵심 걸림돌로 떠올랐다. 전 세계 원유와 LNG의 약 20%가 지나는 호르무즈 해협의 불안정이 글로벌 에너지·금융시장의 최대 변수로 남아 있다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`페르시아만과 외해를 잇는 좁은 바닷길로, 전 세계 원유와 가스의 약 5분의 1이 이곳을 통과한다. 막히면 국제 유가가 급등한다.`}],
  history:`미국과 이란은 2025~2026년 핵·제재를 둘러싼 갈등 끝에 2026년 전면전에 돌입했다. 4월 8일 파키스탄 중재로 2주 휴전에 합의했고 트럼프 대통령이 21일 이를 무기한 연장했지만, 산발적 교전이 이어지며 휴전이 흔들리고 있다.`,
  players:`미국과 이란이 직접 당사자이며, 파키스탄이 중재국 역할을 맡고 있다. 이스라엘과 헤즈볼라의 레바논 전선, 호르무즈 해협을 지나는 원유 수출국과 수입국들이 모두 이해당사자다. 트럼프 대통령과 아라그치 외무장관이 협상 전면에 서 있다.`,
  current:`협상에 가시적 진전이 없고 호르무즈에서 드론·미사일 교전이 재발하면서 휴전 붕괴 위험이 커진 분수령이다. 레바논 휴전 이행 여부가 전체 협상의 향방을 가른다.`,
  outlook:`이스라엘의 베이루트 공격 여부와 이란의 협상 복귀 시점이 최대 관전 포인트다. 휴전이 깨지면 호르무즈 해협 봉쇄와 국제유가 100달러 돌파 시나리오가 현실화될 수 있다.`,
  sources:[{title:`Iran says no tangible progress made in talks - CBS News`,url:`https://www.cbsnews.com/live-updates/iran-us-war-talks-no-progress-israel-lebanon-hezbollah/`},{title:`US strikes Iranian radar sites after drones fired toward strait - ABC7`,url:`https://abc7ny.com/live-updates/iran-war-peace-talks-oil-prices-lebanon-strait-of-hormuz/19212967/`},{title:`2026 Iran war ceasefire - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_Iran_war_ceasefire`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`엔비디아, OpenAI에 최대 1,000억 달러 투자…10기가와트 AI 인프라 구축`,
  metrics:[`엔비디아, OpenAI에 최대 1,000억 달러 투자`,`엔비디아 시스템 10기가와트 배치`],
  summary:`엔비디아와 OpenAI가 차세대 AI 인프라 구축을 위한 대규모 전략적 파트너십을 발표하며 AI 패권 경쟁이 새 국면에 접어들었다. 양사는 OpenAI의 차세대 모델을 학습·운영하기 위해 최소 10기가와트 규모의 엔비디아 시스템을 배치하기로 했다. 엔비디아는 시스템이 단계적으로 깔리는 데 맞춰 OpenAI에 최대 1,000억 달러를 투자할 계획이다. 첫 단계는 엔비디아의 차세대 베라 루빈 플랫폼을 활용해 2026년 하반기 가동을 목표로 한다. OpenAI는 이를 슈퍼인텔리전스 배치로 가는 길이라고 설명했다. 이와 함께 OpenAI는 2024년 챗GPT 출시 이후 최대 규모의 메모리 업그레이드인 드리밍 V3 아키텍처를 미국 플러스·프로 사용자에게 풀기 시작했고, EU에는 사이버보안 특화 모델 GPT-5.5-Cyber 접근권을 제공하기로 했다. 천문학적 자본이 소수 빅테크에 집중되면서 AI 인프라 투자 과열과 거품 우려도 함께 커지고 있다. 이번 협력은 칩-모델-데이터센터를 수직 결합하는 AI 생태계 재편의 신호탄으로 평가된다.`,
  keyTerms:[{term:`AI 인프라`,explanation:`AI 모델을 학습시키고 돌리는 데 필요한 반도체, 데이터센터, 전력 같은 기반 설비를 말한다. 성능 좋은 AI를 만들려면 막대한 규모가 필요하다.`}],
  history:`2022년 챗GPT 등장 이후 AI 모델 경쟁이 가열되면서 연산을 책임지는 엔비디아 GPU 수요가 폭발했다. 엔비디아와 OpenAI는 사실상 칩 공급자와 최대 수요자 관계를 맺어왔고, 2026년 들어 투자 결합으로 동맹을 한층 강화했다.`,
  players:`AI 칩 1위 엔비디아와 생성형 AI 선두 OpenAI가 핵심 주체다. 막대한 자본지출을 예고한 아마존·마이크로소프트·구글·메타 등 빅테크가 경쟁 인프라를 구축하고 있고, EU 등 각국 규제당국도 AI 거버넌스를 두고 개입한다.`,
  current:`칩-모델-데이터센터를 수직 결합하는 초대형 투자가 발표되며 AI 인프라 패권 경쟁이 정점에 이른 시점이다. 동시에 자본 집중에 따른 거품 논란도 본격화됐다.`,
  outlook:`2026년 하반기 베라 루빈 플랫폼 기반 첫 단계 가동과 드리밍 V3 메모리 기능의 확산이 관전 포인트다. AI 전력 수요 급증과 규제·반독점 이슈가 변수로 떠오를 전망이다.`,
  sources:[{title:`OpenAI and NVIDIA Announce Strategic Partnership to Deploy 10GW - NVIDIA`,url:`https://nvidianews.nvidia.com/news/openai-and-nvidia-announce-strategic-partnership-to-deploy-10gw-of-nvidia-systems`},{title:`NVIDIA Kicks Off Next Generation of AI With Rubin - NVIDIA`,url:`https://nvidianews.nvidia.com/news/rubin-platform-ai-supercomputer`},{title:`AI News Today – June 5, 2026: 9 Biggest Stories`,url:`https://www.buildfastwithai.com/blogs/ai-news-today-june-5-2026`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`국산 AI 반도체 생태계 확장…리벨리온·딥엑스 해외 진출로 AI 주권 시동`,
  metrics:[`해외 수출 계약 3,000만 달러 이상`,`국산 NPU 기반 공공 서버 잇단 출시`],
  summary:`엔비디아 의존을 줄이려는 한국의 국산 AI 반도체 생태계가 빠르게 확장되고 있다. 추론에 특화된 국산 AI 반도체가 국내 거대언어모델과 결합되면서 토종 기술 기반의 AI 서비스 생태계가 성장하는 모습이다. 리벨리온과 딥엑스 등 국내 AI 반도체 기업은 통화요약 서비스와 로봇 분야에 칩을 적용하며 실제 산업 현장 활용을 넓히고 있다. 이들은 영국·대만·베트남·중국 등 해외 시장에서 3,000만 달러 규모 이상의 수출 계약을 체결하며 글로벌 진출을 본격화했다. 인프라 측면에서도 KT클라우드가 국산 반도체 기반 공공 전용 NPU 서버를 출시하고, 삼성SDS도 국산 NPU 기반 AI 서버 구축을 추진하고 있다. 이는 엔비디아 GPU 쏠림을 줄이고 자체 AI 주권을 확보하려는 정부와 산업계의 전략이 맞물린 결과다. 정부도 AI 반도체 실증·상용화 기회를 대폭 확대하는 지원책을 내놓았다. 다만 글로벌 빅테크와의 성능·생태계 격차를 좁히는 것이 과제로 남아 있다.`,
  keyTerms:[{term:`AI 주권`,explanation:`AI에 필요한 반도체·모델·데이터센터를 외국에 의존하지 않고 스스로 갖추는 능력을 말한다. 핵심 기술을 남의 손에 맡기지 않으려는 전략이다.`}],
  history:`AI 붐으로 엔비디아 GPU 품귀와 가격 급등이 이어지자, 각국은 특정 기업 의존의 위험을 절감했다. 한국은 리벨리온·딥엑스 등 토종 팹리스를 육성하며 추론 특화 NPU로 틈새를 공략해왔다.`,
  players:`리벨리온·딥엑스 등 국산 AI 반도체 기업이 주역이고, KT클라우드·삼성SDS가 국산 칩 기반 서버 인프라를 구축한다. 정부는 실증·상용화 지원으로 생태계를 뒷받침하며, 글로벌 강자 엔비디아가 경쟁 상대다.`,
  current:`국산 칩이 실제 서비스·로봇에 적용되고 해외 수출 계약까지 나오면서 AI 주권 전략이 가시적 성과를 내기 시작한 전환점이다. 공공 부문 NPU 서버 도입이 확산되고 있다.`,
  outlook:`추가 해외 수주와 국내 거대언어모델과의 결합 확대가 다음 관전 포인트다. 글로벌 빅테크와의 성능·소프트웨어 생태계 격차를 얼마나 빠르게 좁히느냐가 관건이다.`,
  sources:[{title:`AI반도체 실증·상용화 기회 대폭 확대 - 대한민국 정책브리핑`,url:`https://m.korea.kr/news/pressReleaseView.do?newsId=156744252&pWise=mSub&pWiseSub=C6`},{title:`K-반도체가 열어갈 AI 강국의 미래 - 대한민국 정책브리핑`,url:`https://www.korea.kr/briefing/pressReleaseView.do?newsId=156734391`},{title:`AI 수요 폭발에 반도체 산업 지형 변화 - ESG코리아뉴스`,url:`https://esgkoreanews.com/news/view.php?no=18091`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`이재명 정부, 지선 직후 부동산 강공…다주택 양도세 중과 유예 종료`,
  metrics:[`다주택 양도세 중과 유예 5월 9일 종료 선언`,`규제지역 다주택자 양도세 부담 2~3배 증가`],
  summary:`이재명 정부가 6·3 지방선거 직후 부동산 시장에 대한 강공 드라이브를 예고하며 불로소득 차단을 핵심 정책 기조로 내세웠다. 정부는 지난 5월 9일 다주택자 양도세 중과 유예 종료를 선언하며 다주택 매물 유도에 승부수를 던졌다. 중과 유예가 끝나면 규제지역 다주택자의 양도세 부담은 2~3배로 늘어난다. 앞서 금융위원회는 4월 17일부로 다주택자와 임대사업자가 보유한 수도권·규제지역 아파트 담보대출의 만기연장을 원칙적으로 금지하는 가계부채 관리 방안도 시행했다. 무주택자라면 소득·자산과 무관하게 신청할 수 있는 기본주택 공공임대는 올 상반기 3기 신도시 시범단지부터 입주자 모집이 시작된다. 정부는 불로소득 공화국에서 반드시 탈출하겠다며 규제 의지를 거듭 밝혔다. 다주택자 세 부담 강화와 대출 옥죄기가 동시에 진행되면서 시장에서는 매물 출회와 거래 위축이 엇갈릴 전망이다. 고금리·고환율 국면과 맞물려 부동산 정책의 파급력이 한층 커지고 있다.`,
  keyTerms:[{term:`양도세 중과`,explanation:`집을 여러 채 가진 사람이 집을 팔아 얻은 차익에 세금을 더 무겁게 매기는 제도다. 다주택자가 집을 내놓도록 압박하는 효과를 노린다.`}],
  history:`한국은 집값 급등기마다 다주택자 규제와 완화를 반복해왔다. 이재명 정부는 출범 이후 불로소득 차단을 핵심 기조로 삼아 다주택 규제를 강화하는 방향으로 정책을 틀었다.`,
  players:`이재명 대통령과 기획재정부·금융위원회·국토교통부가 정책을 주도한다. 다주택자와 임대사업자가 규제 대상이고, 무주택 실수요자와 청약 대기자가 기본주택 등 공급 정책의 수혜 대상이다.`,
  current:`지방선거 직후 정부가 규제 고삐를 죄겠다는 신호를 분명히 하면서 부동산 시장이 정책 변곡점에 들어섰다. 양도세 중과 부활과 대출 규제가 동시에 시행되는 시점이다.`,
  outlook:`양도세 중과 종료에 따른 다주택 매물 출회 규모와 3기 신도시 기본주택 입주자 모집 결과가 관전 포인트다. 고금리·고환율과 맞물려 거래 위축과 가격 변동이 어떻게 나타날지가 관건이다.`,
  sources:[{title:`불로소득 공화국 반드시 탈출…지선 뒤 부동산 강공 드라이브 예고 - MBC뉴스`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6826852_37004.html`},{title:`이재명 정부 부동산 정책: 2026년 기준 분석 - TEAM GO GETTER`,url:`https://teamgogetter.com/2026gov/`},{title:`이재명 정부 부동산 정책 분석: 장특공제·양도세 - 홈두부`,url:`https://homedubu.com/7878/`}]
}]

  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`브로드컴 AI 반도체 전망 실망에 주가 15% 폭락, 반도체株 흔들`,
  metrics:[`브로드컴 주가 약 15% 급락, 시총 약 3,200억 달러 증발`,`3분기 AI 매출 가이던스 160억 달러로 시장 기대치 172억 달러 하회`],
  summary:`브로드컴이 2분기 실적에서 주당순이익 2.44달러, 매출 221억9000만 달러로 시장 기대를 대체로 충족했지만 주가는 하루 만에 약 15% 폭락했다. AI 반도체 매출이 전년 동기 대비 두 배 이상 늘어난 108억 달러를 기록했음에도, 회사가 연간 AI 칩 매출 목표 1000억 달러를 상향하지 않은 점이 투자자들을 실망시켰다. 특히 3분기 AI 매출 가이던스를 160억 달러로 제시했는데, 이는 시장 기대치인 172억 달러를 밑돌았다. 이 여파로 시가총액 약 3200억 달러가 증발하며 초대형주 역사상 최대 규모의 단일 종목 손실 중 하나로 기록됐다. 반도체 업종 전반이 흔들렸고 크라우드스트라이크 등 다른 기술주도 동반 약세를 보였다. 다만 다우지수는 875포인트가량 급등해 사상 최고치를 새로 쓰는 등 시장은 칩에서 다른 업종으로 순환매가 진행됐다. AI 투자 열기가 정점에 다다랐는지에 대한 시장의 경계심이 커지고 있다.`,
  keyTerms:[{term:`가이던스`,explanation:`기업이 다음 분기나 연간 실적이 어느 정도 나올지 스스로 내놓는 전망치다. 실제 실적이 좋아도 이 전망이 시장 기대에 못 미치면 주가가 떨어질 수 있다.`}],
  history:`브로드컴은 맞춤형 AI 칩과 네트워킹 반도체를 앞세워 엔비디아에 이은 AI 수혜주로 부상했다. 2024년 이후 AI 데이터센터 투자 붐을 타고 주가가 가파르게 올랐다. 시장은 매 분기 AI 매출이 기대 이상으로 늘기를 기대해 왔다. 그만큼 눈높이도 계속 높아진 상태였다.`,
  players:`브로드컴 CEO 혹 탄은 연간 AI 칩 매출 1000억 달러 목표를 유지했다. 구글, 메타 등 빅테크가 자체 AI 칩을 브로드컴과 함께 설계하는 핵심 고객이다. 엔비디아와는 경쟁이자 보완 관계다. 월가 투자자들은 AI 매출 성장세 둔화 신호에 민감하게 반응했다.`,
  current:`실적 자체는 나쁘지 않았지만 전망이 기대를 밑돌면서 AI 거품 논란이 다시 불거졌다. 하루 만에 3200억 달러가 증발한 것은 AI 랠리의 취약성을 보여준 사건이다.`,
  outlook:`다음 분기 실적과 빅테크의 AI 설비투자 발표가 분기점이 된다. AI 수요가 계속 두 배씩 늘지, 둔화될지가 반도체주 향방을 가를 전망이다.`,
  sources:[{title:`Broadcom stock plunges on weak software sales, unchanged AI chip forecast - CNBC`,url:`https://www.cnbc.com/2026/06/03/broadcom-avgo-earnings-report-q2-2026.html`},{title:`Broadcom Slides After AI Chip Outlook Disappoints Investors - Bloomberg`,url:`https://www.bloomberg.com/news/articles/2026-06-03/broadcom-outlook-disappoints-investors-seeking-ai-fueled-blowout`},{title:`Stock market today: Dow jumps 875 points to record high after Broadcom stumble - Yahoo Finance`,url:`https://uk.finance.yahoo.com/news/stock-market-today-dow-jumps-nasdaq-sinks-after-broadcom-earnings-flop-230054846.html`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`한국 5월 수출 877억 달러 역대 5월 최대, 3개월 연속 800억 달러 돌파`,
  metrics:[`5월 수출 877.5억 달러, 전년 동월比 53.2% 증가`,`3개월 연속 월 수출 800억 달러 상회`],
  summary:`산업통상자원부에 따르면 2026년 5월 한국 수출이 전년 동월 대비 53.2% 증가한 877억5000만 달러로 집계됐다. 이는 역대 5월 중 최대 실적이며 최근 3개월 연속 월 수출액이 800억 달러를 넘어선 기록이다. 반도체 호황과 AI 관련 수요 급증이 수출을 강하게 끌어올렸다. 다만 전년 5월 수출이 부진했던 데 따른 기저효과도 증가율을 키운 것으로 추정된다. 수출 호조에 힘입어 무역수지도 흑자 기조를 이어가고 있다. 한국은행은 이런 수출 강세를 반영해 2026년 성장률 전망을 2%에서 2.6%로 상향 조정한 바 있다. 강한 수출은 원화 약세 압력을 일부 완충하는 요인으로도 작용하고 있다. 다만 미-이란 충돌 등 지정학 변수가 향후 교역 환경의 불확실성으로 남아 있다.`,
  keyTerms:[{term:`기저효과`,explanation:`비교 대상이 되는 지난해 같은 시점 수치가 유난히 낮으면, 올해 수치가 평범해도 증가율이 매우 크게 나타나는 현상이다. 53.2%라는 높은 증가율을 그대로 받아들이기 어려운 이유다.`}],
  history:`한국 수출은 코로나 이후 반도체 경기에 따라 큰 부침을 겪었다. 2023~2024년 메모리 불황으로 부진했다가 AI 붐과 함께 회복세로 돌아섰다. 2026년 들어 HBM 등 고부가 반도체가 수출을 주도하고 있다. 수출은 한국 GDP의 큰 비중을 차지하는 핵심 성장 엔진이다.`,
  players:`삼성전자, SK하이닉스 등 반도체 기업이 수출 증가를 견인한다. 산업통상자원부가 매월 수출입 동향을 발표한다. 미국과 중국이 최대 수출 시장이며, 한국은행은 수출 흐름을 보고 성장률 전망을 조정한다. 자동차, 선박 등도 주요 품목이다.`,
  current:`3개월 연속 월 800억 달러 돌파는 반도체 슈퍼사이클이 본격화됐음을 보여준다. 다만 높은 증가율에는 기저효과가 섞여 있어 추세를 신중히 봐야 한다.`,
  outlook:`하반기에도 AI 반도체 수요가 수출을 떠받칠지가 관건이다. 미-이란 충돌에 따른 유가와 물류비, 환율 변동성이 변수로 작용할 전망이다.`,
  sources:[{title:`5월 수출 전년 대비 53% 늘어난 877.5억달러, 3개월 연속 800억달러 - 머니투데이`,url:`https://www.mt.co.kr/economy/2026/06/01/2026060108534570515`},{title:`지표서비스 수출입 동향 - e-나라지표`,url:`https://www.index.go.kr/unity/potal/main/EachDtlPageDetail.do?idx_cd=1066`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`한국은행 기준금리 2.50% 8회 연속 동결, 물가·환율 부담에 신중 기조`,
  metrics:[`기준금리 연 2.50%, 8회 연속 동결`,`2026년 물가 전망 2.7%, 성장 전망 2.6%로 상향`],
  summary:`한국은행 금융통화위원회는 2026년 5월 28일 기준금리를 연 2.50%로 유지하기로 결정했다. 이는 8회 연속 동결로, 지정학적 위험과 원화 약세, 인플레이션 재발 사이에서 균형을 잡으려는 신중한 기조를 반영한다. 한은은 2026년 인플레이션 전망을 2.7%로 상향했고 2027년에는 2.3%로 둔화할 것으로 봤다. 반도체 수출 호조를 근거로 2026년 성장률 전망은 2%에서 2.6%로 끌어올렸다. 5월 소비자물가가 전년 동월 대비 3.1% 오르는 등 물가 압력이 다시 커진 점도 금리 인하를 주저하게 만든 요인이다. 미국과의 금리 차, 환율 변동성도 통화정책 운신의 폭을 제약하고 있다. 시장은 하반기 인하 시점과 물가 경로를 주시하고 있다.`,
  keyTerms:[{term:`기준금리`,explanation:`한국은행이 정하는 나라의 대표 금리로, 시중 대출·예금 금리의 기준이 된다. 올리면 돈줄을 죄어 물가를 잡고, 내리면 경기를 살리는 효과가 있다.`}],
  history:`한국은행은 2022~2023년 고물가에 대응해 금리를 빠르게 올린 뒤, 2024년부터 인하 사이클로 전환했다. 이후 물가와 환율, 성장 사이에서 줄타기를 하며 동결을 거듭해 왔다. 2026년 들어 물가가 다시 들썩이며 인하 명분이 약해졌다. 미국 연준의 정책 방향도 주요 변수다.`,
  players:`이창용 총재가 이끄는 금융통화위원회가 금리를 결정한다. 미국 연준과의 금리 차가 환율과 자본 흐름에 직접 영향을 준다. 정부는 경기 부양을 위해 금리 인하를 선호하는 경향이 있다. 가계부채 부담도 주요 고려 사항이다.`,
  current:`8회 연속 동결은 물가 재상승과 환율 불안 속에서 한은이 인하를 서두를 수 없는 상황임을 보여준다. 수출 호조로 성장 우려는 다소 덜어진 상태다.`,
  outlook:`다음 금통위와 7월 물가 지표가 분기점이다. 물가가 안정되고 환율이 진정되면 하반기 인하 가능성이 거론될 전망이다.`,
  sources:[{title:`한국은행 기준금리 추이 및 통화정책방향 결정회의 - 한국은행`,url:`https://www.bok.or.kr/portal/singl/baseRate/list.do?dataSeCd=01&menuNo=200643`},{title:`South Korea Interest Rate Decision - Investing.com`,url:`https://www.investing.com/economic-calendar/interest-rate-decision-473`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`6·3 지방선거, 정권 안정론 우위 속 여야 희비…서울시장 오세훈 수성`,
  metrics:[`민주당 추미애, 경기지사 15.67%p차 승리로 헌정사 첫 여성 광역단체장`,`민주당 서울 25개 구청장 중 17곳 석권`],
  summary:`2026년 6월 3일 제9회 전국동시지방선거가 치러졌다. 이재명 대통령 당선 1년 만에 실시된 선거로, 더불어민주당은 8년 만에 여당으로서 지방선거에 임했다. 전반적으로 정권 심판론보다 정권 안정론에 힘이 실린 결과로 평가된다. 민주당 추미애 후보는 경기지사 선거에서 국민의힘 양향자 후보를 15.67%포인트 차로 누르고 헌정사상 첫 여성 광역단체장이 됐다. 반면 서울시장은 국민의힘 오세훈 후보가 49.08% 득표로 정원오 민주당 후보를 꺾고 수성에 성공했다. 민주당은 서울 25개 구청장 중 17곳을 차지하며 기초단체 권력을 대거 탈환했다. 부산·대구·강원·전북 등은 막판까지 접전을 벌였다. 한편 송파·강남 등 일부 투표소에서 투표용지가 조기 소진돼 투표가 지연되는 혼선도 빚어졌다.`,
  keyTerms:[{term:`전국동시지방선거`,explanation:`전국의 시·도지사, 시장·군수·구청장, 지방의원을 같은 날 한꺼번에 뽑는 선거다. 4년마다 치러지며 현 정부에 대한 중간 평가 성격을 가진다.`}],
  history:`지방선거는 1995년 본격 부활해 4년 주기로 실시돼 왔다. 통상 집권 1~2년 차에 치러져 정권에 대한 중간 평가로 여겨진다. 2026년 선거는 이재명 정부 출범 1년 만에 열렸다. 민주당이 8년 만에 여당으로 맞은 첫 지방선거라는 점에서 주목받았다.`,
  players:`여당 더불어민주당과 제1야당 국민의힘이 격돌했다. 경기지사 추미애, 서울시장 오세훈이 대표 격전지 후보였다. 이재명 대통령의 국정 지지율이 선거 전반의 배경으로 작용했다. 개헌을 둘러싼 여야 대립도 쟁점이었다.`,
  current:`정권 안정론이 우세했지만 서울시장을 야당이 지키며 여야가 명분을 나눠 가졌다. 향후 국정 동력과 개헌 논의의 향방을 가늠할 분수령이다.`,
  outlook:`선거 결과를 토대로 이재명 정부의 개헌·정책 추진력이 시험대에 오른다. 야권 재편과 차기 정국 주도권 다툼도 본격화될 전망이다.`,
  sources:[{title:`6.3 지방선거 개표 속속, 여야 성적표는 - YTN`,url:`https://www.ytn.co.kr/_ln/0101_202606032332578964`},{title:`당선 결과 6·3 지방선거 2026 - 뉴탐사`,url:`https://election2026.newtamsa.org/result/`},{title:`제9회 전국동시지방선거 - 위키백과`,url:`https://ko.wikipedia.org/wiki/%EC%A0%9C9%ED%9A%8C_%EC%A0%84%EA%B5%AD%EB%8F%99%EC%8B%9C%EC%A7%80%EB%B0%A9%EC%84%A0%EA%B1%B0`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이스라엘-레바논 휴전 합의, 헤즈볼라 무장 중단 조건부…중동 긴장 일부 완화`,
  metrics:[`휴전 기대에 국제유가 96달러 부근에서 하락 전환`,`이스라엘 남부 레바논 공습으로 최소 8명 사망(레바논 보건부)`],
  summary:`미국 중재로 이스라엘과 레바논이 휴전에 합의했다고 6월 3일 블룸버그 등이 보도했다. 이스라엘은 베이루트 남부 교외를 공격하지 않기로 했고, 헤즈볼라는 이스라엘에 대한 공격을 중단하기로 했다. 휴전은 헤즈볼라의 완전한 사격 중단과 레바논 남부에서 모든 헤즈볼라 대원 철수를 조건으로 한다. 다만 휴전 합의와 같은 날 이스라엘의 레바논 남부 공습으로 최소 8명이 숨지는 등 긴장은 완전히 가시지 않았다. 휴전 기대에 국제유가는 배럴당 96달러 부근에서 하락 전환했고 미 국채 금리도 진정됐다. 소비 관련주가 오르는 등 위험자산 심리가 일부 개선됐다. 그러나 이란이 휴전은 레바논까지 포함돼야 한다고 주장하며 협상의 변수로 남아 있다.`,
  keyTerms:[{term:`헤즈볼라`,explanation:`레바논에 기반을 둔 이슬람 시아파 무장정파이자 정치세력으로, 이란의 지원을 받는다. 이스라엘과 오랜 적대 관계로 중동 분쟁의 핵심 당사자다.`}],
  history:`이스라엘과 헤즈볼라는 2024년 이후 국경에서 충돌을 반복하며 전면전 우려를 키워 왔다. 이란-이스라엘 갈등이 격화되면서 레바논 전선도 함께 달아올랐다. 미국은 확전을 막기 위해 휴전 중재에 나섰다. 이번 합의는 그 연장선이다.`,
  players:`이스라엘과 헤즈볼라가 직접 당사자이며 미국이 중재자로 나섰다. 이란은 헤즈볼라의 후원국으로 협상에 영향력을 행사한다. 레바논 정부와 보건부가 피해 상황을 집계한다. 사우디 등 중동 주요국도 사태 추이를 주시한다.`,
  current:`휴전 합의에도 같은 날 공습으로 사상자가 발생해 합의의 지속성에 의문이 남는다. 이란이 레바논 포함을 고집하면서 미-이란 협상과도 얽혀 있다.`,
  outlook:`헤즈볼라의 철수와 사격 중단 이행 여부가 휴전 유지의 관건이다. 미-이란 협상 진전과 추가 공습 여부가 향후 며칠간 분수령이 될 전망이다.`,
  sources:[{title:`Israel and Lebanon Agree to Ceasefire Deal as US and Iran Trade Strikes - Bloomberg`,url:`https://www.bloomberg.com/news/articles/2026-06-03/us-says-israel-lebanon-agree-ceasefire-if-hezbollah-also-stops`},{title:`2026 Israel–Lebanon ceasefire - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_Israel%E2%80%93Lebanon_ceasefire`},{title:`Iranian attacks on Kuwait airport, Bahrain condemned - CNN`,url:`https://www.cnn.com/2026/06/02/world/live-news/iran-trump-israel-lebanon-war-intl-hnk`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미국-이란 무력 충돌 격화…이란, 쿠웨이트·바레인 미군기지·호르무즈 선박 타격`,
  metrics:[`이란, 쿠웨이트·바레인 미군기지 및 호르무즈 인근 선박 공격`,`미-이란 충돌에 국제유가 약 96달러로 반등`],
  summary:`미국과 이란의 무력 충돌이 6월 초 다시 격화됐다. 이란은 미국의 공습에 대한 보복으로 쿠웨이트와 바레인의 미군기지, 그리고 호르무즈 해협 인근 선박을 겨냥했다고 밝혔다. 이란 외무장관 아바스 아라그치는 이스라엘·미국과의 전쟁이 레바논에서도 끝나야 비로소 끝날 것이라고 언급했다. 트럼프 대통령은 최근 공습에도 미-이란 휴전이 여전히 유효하며 협상이 잘 진행되고 있다고 주장했다. 이란의 공격은 중동 주요국들의 규탄을 받았다. 이 여파로 S&P500 지수는 1년 만의 최장 연속 상승 흐름을 멈췄고 국제유가는 다시 96달러 부근으로 올랐다. 전 세계 원유의 상당량이 지나는 호르무즈 해협의 안전이 최대 변수로 떠올랐다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`이란과 아라비아반도 사이의 좁은 바닷길로, 전 세계 해상 원유 물동량의 약 5분의 1이 지난다. 이곳이 막히면 국제유가가 급등할 수 있는 전략적 요충지다.`}],
  history:`미국과 이란은 핵 문제와 중동 패권을 놓고 오랜 적대 관계를 이어 왔다. 2026년 들어 이스라엘-이란 갈등이 미국 개입으로 확대됐다. 미국의 공습에 이란이 역내 미군기지를 보복 타격하며 전선이 넓어졌다. 휴전과 충돌이 반복되는 불안정한 국면이다.`,
  players:`미국과 이란이 직접 충돌 당사자다. 쿠웨이트, 바레인 등 미군기지가 있는 걸프 국가들이 사정권에 들었다. 트럼프 대통령과 이란 외무장관 아라그치가 협상과 대립의 전면에 있다. 이란은 레바논 휴전을 협상 조건으로 연계하고 있다.`,
  current:`역내 미군기지와 호르무즈 선박 타격은 충돌이 걸프 전역으로 번질 위험을 보여준다. 유가 반등과 증시 조정으로 글로벌 시장에도 충격이 번졌다.`,
  outlook:`호르무즈 해협의 봉쇄 여부와 추가 보복 가능성이 최대 관심사다. 미-이란 협상이 이어질지, 전면전으로 비화할지가 향후 유가와 시장을 좌우할 전망이다.`,
  sources:[{title:`Iranian attacks on Kuwait airport, Bahrain condemned by Middle East countries - CNN`,url:`https://www.cnn.com/2026/06/02/world/live-news/iran-trump-israel-lebanon-war-intl-hnk`},{title:`Asian Stocks Set to Fall on Fresh US-Iran Clashes, Markets Wrap - Bloomberg`,url:`https://www.bloomberg.com/news/articles/2026-06-03/asian-stocks-set-to-fall-on-fresh-us-iran-clashes-markets-wrap`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`삼성·SK하이닉스 HBM4 양산 본격화…AI 메모리 슈퍼사이클 진입`,
  metrics:[`SK하이닉스 2026년 HBM4 점유율 목표 70%`,`삼성전자 올해 HBM 매출 전년比 3배 이상 확대 전망`],
  summary:`삼성전자와 SK하이닉스가 AI 가속기용 HBM4 양산을 본격화하며 메모리 슈퍼사이클에 올라탔다. SK하이닉스는 세계 최초로 HBM4 개발을 완료하고 엔비디아 차세대 루빈 플랫폼 물량을 상당 부분 확보, 2026년 HBM4 점유율 70%를 목표로 생산을 극대화하고 있다. 삼성전자는 2월부터 최고 속도 11.8Gbps HBM4 양산 출하를 시작했고 올해 HBM 매출을 전년 대비 3배 이상 늘릴 전망이다. AMD는 차세대 AI 가속기용 HBM 4세대 주공급사로 삼성전자를 지명했다. 업계는 2026년 세계 반도체 시장이 사상 처음 연 매출 1조 달러 시대에 진입할 것으로 본다. AI 투자 열기에 힘입어 HBM은 한국 메모리 산업의 핵심 성장 동력으로 자리 잡았다. 다만 브로드컴 사례처럼 AI 수요 둔화 우려는 잠재 위험 요인으로 남아 있다.`,
  keyTerms:[{term:`HBM`,explanation:`여러 개의 메모리 칩을 수직으로 쌓아 데이터를 초고속으로 주고받게 만든 고대역폭 메모리다. AI 연산에 필수적이어서 삼성·SK하이닉스의 최대 효자 제품이 됐다.`}],
  history:`HBM은 AI 연산에서 대량의 데이터를 빠르게 처리하기 위한 핵심 부품으로 부상했다. 2023년 챗GPT 열풍 이후 엔비디아 GPU 수요가 폭발하며 HBM 품귀가 시작됐다. SK하이닉스가 초기 시장을 주도했고 삼성이 추격하는 구도였다. 세대가 HBM3에서 HBM4로 넘어가며 경쟁이 다시 가열됐다.`,
  players:`SK하이닉스와 삼성전자가 양강 구도를 이룬다. 엔비디아, AMD가 최대 고객이며 차세대 AI 가속기 물량 확보가 관건이다. 미국 마이크론도 경쟁에 가세하고 있다. 한국 정부는 반도체를 전략 산업으로 지원한다.`,
  current:`HBM4 양산 개시는 메모리 슈퍼사이클의 본격화를 알리는 신호다. 한국 수출과 증시를 떠받치는 핵심 동력으로 작용하고 있다.`,
  outlook:`엔비디아 루빈 플랫폼 출시와 빅테크 AI 투자 규모가 HBM 수요를 좌우한다. AMD 공급 확대와 삼성의 점유율 회복 여부가 향후 관전 포인트다.`,
  sources:[{title:`2026년 시장 전망, HBM이 이끄는 메모리 슈퍼사이클에 주목 - SK hynix Newsroom`,url:`https://news.skhynix.co.kr/2026-market-outlook/`},{title:`AMD 잭팟에 웃는 삼성, HBM4로 SK하이닉스 독주 균열 - 글로벌이코노믹`,url:`https://www.g-enews.com/article/Global-Biz/2026/05/202605080644316380fbbec65dfb_1`},{title:`AI 붐이 만든 1조 달러 시대, 2026년 반도체 시장 폭발적 성장 - 테크월드`,url:`https://www.epnc.co.kr/news/articleView.html?idxno=400056`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`AI 모델 경쟁 격화…클로드 오푸스 4.8·GPT-5.5·제미나이 3.5 신모델 쏟아져`,
  metrics:[`클로드 오푸스 4.8, 코드 결함 검토 누락 가능성 전작比 4배↓`,`엔비디아 코스모스 3, 첫 완전 개방형 멀티모달 모델 공개`],
  summary:`2026년 6월 초 빅테크들의 AI 모델 경쟁이 한층 뜨거워졌다. 오픈AI의 GPT-5.5 인스턴트, 구글의 제미나이 3.5 플래시, 앤트로픽의 클로드 오푸스 4.8 등 신모델이 잇따라 성능 기록을 새로 썼다. 클로드 오푸스 4.8은 자동 코드 검토에서 결함을 놓칠 가능성이 전작보다 4배 낮아진 것으로 알려졌다. 구글의 이미젠 3 나노·프로는 영상 파일을 프롬프트로 활용해 맥락을 반영한 이미지를 만들어내며, WPP·쇼피파이 등이 마케팅·상거래에 도입했다. 엔비디아는 코스모스 3에서 시각 추론·세계 시뮬레이션·행동 생성을 하나로 묶은 첫 완전 개방형 멀티모달 모델을 공개했다. 텍스트를 넘어 이미지·영상·행동을 아우르는 경쟁이 새 국면에 접어든 것이다. 모델 성능과 활용처가 빠르게 확장되며 산업 적용도 가속되고 있다.`,
  keyTerms:[{term:`멀티모달`,explanation:`텍스트뿐 아니라 이미지·영상·소리 등 여러 종류의 정보를 한꺼번에 이해하고 다루는 AI 방식이다. 사람처럼 보고 듣고 말하는 데 가까워지는 핵심 기술이다.`}],
  history:`2022년 챗GPT 등장 이후 빅테크들은 더 크고 똑똑한 AI 모델 경쟁에 뛰어들었다. 처음에는 텍스트 위주였으나 점차 이미지·영상·음성을 함께 다루는 방향으로 진화했다. 오픈AI, 구글, 앤트로픽이 선두 그룹을 형성했다. 모델 출시 주기가 빨라지며 성능 격차도 좁아졌다.`,
  players:`오픈AI(GPT), 구글(제미나이·이미젠), 앤트로픽(클로드)이 모델 경쟁의 핵심이다. 엔비디아는 칩과 함께 코스모스 같은 모델도 내놓는다. WPP, 쇼피파이 등 기업이 실제 서비스에 AI를 적용한다. 이용자와 개발자가 빠르게 확대되고 있다.`,
  current:`신모델이 동시다발로 쏟아지며 멀티모달과 자동화 능력이 빠르게 고도화되고 있다. 코드 검토, 마케팅, 상거래 등 실제 산업 적용이 본격화하는 국면이다.`,
  outlook:`물리 세계를 다루는 멀티모달·로봇용 모델로 경쟁이 확장될 전망이다. 성능과 안전성, 비용 효율을 동시에 잡는 모델이 시장을 주도할 것으로 보인다.`,
  sources:[{title:`Top AI News for June 2026: Breakthroughs, Launches & Trends - AIapps`,url:`https://www.aiapps.com/blog/ai-news-breakthroughs-launches-trends-must-read/`},{title:`AI News Briefs Bulletin Board for June 2026 - Radical Data Science`,url:`https://radicaldatascience.wordpress.com/2026/06/01/ai-news-briefs-bulletin-board-for-june-2026/`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`생성형 AI로 25배 빠른 기후모델 등장…과학·헬스케어 AI 활용 가속`,
  metrics:[`생성형 기법 결합으로 기후모델 실행 속도 약 25배 향상`,`딥러닝 시스템 마이코BCP, 결핵균 세포 변화 조기 탐지`],
  summary:`AI가 과학·의료 연구의 속도를 빠르게 끌어올리고 있다. 연구진은 생성형 AI 기법과 물리 기반 데이터를 결합해 기존보다 약 25배 빠르게 작동하는 기후모델을 선보였다. 마이코BCP라는 딥러닝 시스템은 결핵균 세포의 미세한 변화를 탐지해 치료법 발굴 속도를 높이는 데 쓰이고 있다. 또 빛 기반 정보를 생성·제어·판독하는 기능을 하나의 소자에 담은 초소형 광칩이 개발돼 초고속·저전력 컴퓨팅의 도약 가능성을 열었다. 네이처 등은 양자컴퓨팅과 mRNA 치료제를 2026년 주목할 기술로 꼽았다. 생성형 AI가 콘텐츠 생성을 넘어 기초과학과 신약·기후 연구의 도구로 본격 확산되고 있다는 평가다. 데이터·연산 자원의 효율화가 향후 과학 연구의 판도를 바꿀 전망이다.`,
  keyTerms:[{term:`생성형 AI`,explanation:`기존 데이터를 학습해 글·이미지·예측값 등 새로운 결과물을 만들어내는 AI다. 이제는 그림이나 글뿐 아니라 기후 예측, 신약 후보 발굴 같은 과학 연구에도 쓰인다.`}],
  history:`AI는 처음 이미지 인식·번역 등 좁은 분야에서 출발했다. 딥러닝과 생성형 모델이 발전하며 적용 범위가 과학 전반으로 넓어졌다. 기후·생명과학은 방대한 연산이 필요해 AI의 효율 개선 효과가 특히 크다. 2020년대 들어 연구 현장 도입이 급증했다.`,
  players:`대학·국책연구소와 빅테크 AI 연구팀이 협력해 모델을 개발한다. 네이처, 사이언스 등 학술지가 주요 성과를 발표한다. 제약·헬스케어 기업이 신약 개발에 AI를 활용한다. 각국 정부도 AI 과학 연구에 투자를 늘리고 있다.`,
  current:`기후모델 25배 가속과 결핵 진단 등은 AI가 실제 연구 생산성을 크게 높이고 있음을 보여준다. 광칩 같은 하드웨어 혁신도 컴퓨팅 효율 도약을 예고한다.`,
  outlook:`양자컴퓨팅, mRNA 치료제 등 차세대 기술과 AI의 결합이 주목된다. AI 기반 과학 연구가 신약·기후 대응 속도를 얼마나 단축할지가 관전 포인트다.`,
  sources:[{title:`Seven technologies to watch in 2026 - Nature`,url:`https://www.nature.com/articles/d41586-026-00188-6`},{title:`Latest AI breakthroughs News June 2026 - blog.mean.ceo`,url:`https://blog.mean.ceo/latest-ai-breakthroughs-news-june-2026/`}]
}]

  tag:`2026-06-04`,
  label:`2026년 6월 4일 (목요일)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`한국 5월 수출 877억달러로 역대 최대… 반도체가 169% 폭증하며 견인`,
  metrics:[`5월 수출 877.5억달러(+53.2%)`,`반도체 수출 371.6억달러(+169.4%)`],
  summary:`산업통상자원부가 6월 1일 발표한 5월 수출입 동향에서 수출액이 전년 동월보다 53.2% 늘어난 877억5000만달러를 기록하며 월간 기준 사상 최대치를 갈아치웠다. 핵심 동력은 반도체로, 단일 품목 수출이 371억6000만달러로 1년 전보다 169.4% 급증해 역대 최고 실적을 새로 썼다. D램과 낸드 가격이 큰 폭으로 오른 가운데 미국과 중국 빅테크가 인공지능(AI) 인프라 구축을 위한 대규모 설비투자를 이어가면서 메모리 반도체 수요가 폭발한 영향이다. 수입은 608억달러로 20.8% 늘었고 무역수지는 269억5000만달러 흑자를 냈다. 1~5월 누적 무역흑자는 1019.1억달러로, 5개월 만에 기존 연간 흑자 기록을 넘어섰다. 이는 한국 경제가 반도체 슈퍼사이클이라는 외부 호재에 크게 기대고 있음을 보여주는 동시에, 특정 품목 의존도가 지나치게 높아지는 리스크도 함께 키운다는 점에서 주목된다. 정부는 연간 수출 1조달러 시대 진입 가능성까지 거론하고 있다.`,
  keyTerms:[{term:`반도체 슈퍼사이클`,explanation:`반도체 가격과 수요가 몇 년 주기로 크게 오르는 대호황 국면을 뜻한다. 지금은 AI 투자 붐으로 메모리 반도체 수요가 폭증하면서 한국 수출이 사상 최대치를 기록하는 배경이 되고 있다.`}],
  history:`한국 수출은 반도체 경기에 따라 출렁여 왔는데, 2023년 메모리 불황으로 큰 타격을 입은 뒤 2024년부터 회복세로 돌아섰다. 2025년 들어 생성형 AI 확산으로 고성능 메모리(HBM)와 D램 수요가 폭발하면서 반도체 가격이 가파르게 올랐다. 이 흐름이 2026년 들어 더욱 강해지며 수출 기록을 연달아 경신하고 있다.`,
  players:`삼성전자와 SK하이닉스가 메모리 수출을 주도하고, 산업통상자원부가 매월 통계를 집계해 발표한다. 수요 측에서는 엔비디아·마이크로소프트·구글 등 미국 빅테크와 중국 AI 기업들이 대규모 반도체를 사들이고 있다. 한국 정부는 수출 호조를 경기 부양의 핵심 카드로 삼고 있다.`,
  current:`5월 수출이 877억달러로 역대 최대를 찍으며 반도체 의존도가 사상 최고 수준에 이르렀다. 전체 수출 증가분의 상당 부분을 반도체 단일 품목이 책임지는 구조가 뚜렷해졌다.`,
  outlook:`하반기 메모리 가격 추이와 미국의 대중 반도체 규제, AI 투자 지속 여부가 변수다. 정부가 제시한 연 수출 1조달러 달성 가능성도 6~7월 실적에서 가늠할 수 있다.`,
  sources:[{title:`5월 수출 877억달러 역대 최대 행진…반도체 수출 169%↑ - 머니투데이`,url:`https://www.mt.co.kr/economy/2026/06/01/2026060109263438042`},{title:`반도체 호황에 5월 수출 53% 급증한 877억 달러 역대 최대 - MBC`,url:`https://imnews.imbc.com/news/2026/econo/article/6826653_36932.html`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피, 종가 기준 사상 첫 8800선 안착… 삼성전자 시총 2000조 돌파`,
  metrics:[`코스피 종가 8801.49(+0.15%)`,`장중 최고 8933.62·삼성전자 시총 2000조 돌파`],
  summary:`6월 2일 코스피가 전 거래일보다 13.11포인트(0.15%) 오른 8801.49에 마감하며 종가 기준 처음으로 8800선에 올라섰다. 장 초반에는 94.81포인트 급등 출발해 장중 8933.62까지 치솟으며 8900선을 사상 처음 넘기도 했다. 5월 수출 호조와 반도체 슈퍼사이클 기대가 지수를 끌어올렸고, 삼성전자 시가총액은 사상 처음으로 2000조원을 돌파했다. 다만 외국인은 18거래일 연속 순매도를 이어가며 약 6조6000억원어치를 팔아치워, 지수 상승을 개인과 기관 매수세가 떠받치는 구도가 뚜렷했다. 미국 금리 인상 우려와 엔비디아 관련 모멘텀 약화로 장중 변동성도 컸다. 코스피가 단기간에 8000선을 넘어 신고가 행진을 이어가면서 과열 논란과 함께, 외국인 자금 이탈이 지속될 경우 조정 가능성에 대한 경계감도 함께 커지고 있다.`,
  keyTerms:[{term:`시가총액`,explanation:`주식 한 주의 가격에 발행된 주식 수를 곱한 값으로, 그 기업의 전체 몸값을 뜻한다. 삼성전자 시가총액이 2000조원을 넘었다는 건 한 회사 가치가 그만큼 커졌다는 의미다.`}],
  history:`코스피는 오랫동안 박스권에 갇혀 코리아 디스카운트라는 저평가 꼬리표를 달고 있었다. 그러나 2025년 정부의 밸류업 정책과 반도체 경기 회복이 맞물리며 상승 동력을 얻었다. 2026년 들어 수출 호황과 AI 투자 붐이 겹치면서 지수가 단숨에 8000선을 돌파했다.`,
  players:`삼성전자와 SK하이닉스 등 반도체 대형주가 지수 상승을 주도한다. 외국인 투자자는 차익 실현에 나서며 순매도를 이어가는 반면, 개인과 기관이 적극적으로 매수해 지수를 방어하고 있다. 한국거래소와 금융당국은 과열 여부를 예의주시하고 있다.`,
  current:`코스피가 종가 기준 처음으로 8800선에 안착하고 삼성전자 시총이 2000조원을 넘으면서 증시가 사상 최고 국면에 진입했다. 다만 외국인의 장기 순매도가 변수로 떠올랐다.`,
  outlook:`외국인 수급 전환 여부와 6월 미국 연방공개시장위원회(FOMC)의 금리 결정이 단기 방향을 좌우할 전망이다. 반도체주 실적과 AI 관련 뉴스 흐름도 지수 변동성을 키울 수 있다.`,
  sources:[{title:`코스피 종가기준 사상 첫 8800고지 입성…외국인은 18일째 순매도 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202606021543597716`},{title:`코스피 시총 7천조…삼성전자도 2천조 돌파 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202606011835398305`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미·이란 호르무즈 휴전 임박에 국제유가 급락… 브렌트유 100달러 아래로`,
  metrics:[`브렌트유 장중 6% 이상 급락·100달러 하회`,`미·이란 60일 휴전 연장 합의 임박`],
  summary:`미국과 이란이 60일간 휴전을 연장하고 호르무즈 해협을 통행료 없이 개방하는 양해각서(MOU) 체결에 근접했다는 소식에 국제유가가 급락했다. 글로벌 벤치마크인 브렌트유는 장중 6% 이상 빠지며 약 한 달 만에 다시 배럴당 100달러 아래로 내려왔다. 합의안에는 휴전 기간 호르무즈 해협 운항을 아무런 제한 없이 보장하고, 이란이 30일 이내에 해협에 깔린 기뢰를 모두 제거하며, 이란산 석유 수출 금지를 해제하는 내용이 담긴 것으로 전해졌다. 그동안 중동 전쟁 리스크로 치솟았던 유가가 공급 정상화 기대에 빠르게 식은 것이다. 다만 시장에서는 호르무즈 해협 통행량이 전쟁 이전의 80% 수준을 회복하는 데만 최소 4개월이 걸리고, 완전 정상화는 내년 1~2분기 이후에나 가능할 것으로 본다. 유가 하락은 물가 부담을 덜어 주요국 중앙은행의 금리 운신 폭을 넓힐 수 있다는 점에서 세계 경제에 긍정적 신호로 읽힌다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`이란과 아라비아반도 사이의 좁은 바닷길로, 전 세계 원유 수송의 약 5분의 1이 지나는 핵심 길목이다. 이곳이 막히면 유가가 급등하고, 다시 열리면 공급 불안이 풀려 유가가 내려간다.`}],
  history:`2026년 2월 미국·이스라엘의 대이란 군사작전 이후 중동 긴장이 고조되면서 이란이 호르무즈 해협 봉쇄 카드를 꺼내 들었고, 이에 유가가 급등했다. 이후 미국과 이란은 휴전과 핵 협상을 놓고 막판 줄다리기를 벌여 왔다. 이번 MOU는 그 협상의 1단계 성과로 평가된다.`,
  players:`미국과 이란이 협상 당사자이며, 트럼프 대통령의 최종 승인이 남은 단계로 알려졌다. 산유국과 글로벌 정유·해운업계, 원유 수입 의존도가 높은 한국·일본 등이 직접적인 영향권에 있다. OPEC+의 증산 결정도 유가 향방을 좌우한다.`,
  current:`휴전 연장과 호르무즈 무료 개방 합의가 임박했다는 소식만으로 유가가 6% 넘게 급락하며 100달러 선이 무너졌다. 시장은 공급 정상화 기대를 빠르게 가격에 반영하고 있다.`,
  outlook:`트럼프 대통령의 최종 서명 여부와 이란의 기뢰 제거 이행 속도가 관건이다. 합의가 깨지거나 지연되면 유가가 다시 출렁일 수 있어 향후 60일이 분수령이 될 전망이다.`,
  sources:[{title:`미·이란 60일 휴전연장·호르무즈 무료개방 MOU 근접 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202605241354014488`},{title:`미·이란 합의 근접…30일 내 호르무즈 정상화 - 서울경제`,url:`https://m.sedaily.com/amparticle/20047910`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`제9회 전국동시지방선거, 더불어민주당 압승… 광역단체장 16곳 중 12곳 이상 우세`,
  metrics:[`광역단체장 16곳 중 12곳 이상 민주당 우세`,`개표율 96% 시점 기준`],
  summary:`6월 3일 치러진 제9회 전국동시지방선거에서 더불어민주당이 전국 광역자치단체장(시·도지사) 가운데 12곳 이상에서 승리하며 압승을 거뒀다. 개표율이 96%를 넘은 시점 기준으로 민주당은 인천, 충청권, 호남, 제주 등에서 잇따라 승리를 확정했다. 이번 선거는 이재명 정부 출범 이후 처음 치러진 전국 단위 선거로, 사실상 집권 1년 차 정권에 대한 중간평가 성격을 띠었다. 높은 사전투표 열기 속에 광역단체장뿐 아니라 기초단체장과 지방의원, 교육감까지 한꺼번에 뽑는 대규모 선거였다. 여당의 압승은 향후 국정 운영에 힘을 실어주는 동시에, 지방 권력까지 여당이 장악하면서 견제와 균형 약화에 대한 우려도 제기된다. 보수 야권은 참패 책임론과 지도부 개편 압박에 직면할 것으로 보인다. 최종 결과는 6월 4일 오전 개표 완료와 함께 확정된다.`,
  keyTerms:[{term:`전국동시지방선거`,explanation:`전국의 시·도지사, 시장·군수·구청장, 지방의회 의원, 교육감을 같은 날 한꺼번에 뽑는 선거로 4년마다 열린다. 지역 살림을 맡을 일꾼을 뽑는 동시에, 현 정권에 대한 민심을 가늠하는 중간평가로 받아들여진다.`}],
  history:`지방선거는 1995년 본격 도입된 뒤 4년마다 실시돼 왔으며, 통상 집권 세력에 대한 중간평가로 기능해 왔다. 직전 선거 이후 정권 교체가 이뤄지면서 이번 선거는 새 정부의 첫 전국 단위 시험대가 됐다. 사전투표 제도 확대로 투표 접근성도 한층 높아졌다.`,
  players:`집권 더불어민주당과 제1야당인 보수 진영이 광역·기초단체장 자리를 놓고 맞붙었다. 이재명 대통령과 정부·여당은 국정 동력 확보가 걸려 있고, 야권은 정권 견제론을 내세웠다. 중앙선거관리위원회가 선거 관리와 개표를 총괄한다.`,
  current:`민주당이 광역단체장 16곳 중 12곳 이상에서 우세를 보이며 압승 구도가 굳어졌다. 여당이 중앙에 이어 지방 권력까지 확보하는 흐름이 나타났다.`,
  outlook:`6월 4일 최종 개표 결과 확정 이후 야권의 지도부 책임론과 정계 개편 움직임이 본격화할 전망이다. 새로 구성될 지방정부의 예산·정책 방향과 여야 협치 여부도 관전 포인트다.`,
  sources:[{title:`제9회 전국동시지방선거 - 나무위키`,url:`https://namu.wiki/w/%EC%A0%9C9%ED%9A%8C%20%EC%A0%84%EA%B5%AD%EB%8F%99%EC%8B%9C%EC%A7%80%EB%B0%A9%EC%84%A0%EA%B1%B0`},{title:`2026 지방선거 개표방송 생중계 - KBS`,url:`https://www.youtube.com/watch?v=lFVsTYmeNIk`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`우크라이나·러시아 휴전 협상 교착… EU, 6월 정상회의 앞두고 직접 개입 검토`,
  metrics:[`EU 정상회의 6월 18~19일 개최`,`휴전 합의 데드라인 6월 30일`],
  summary:`우크라이나와 러시아의 전쟁을 끝내기 위한 휴전 협상이 좀처럼 돌파구를 찾지 못하는 가운데, 유럽연합(EU)이 6월 18~19일 정상회의를 앞두고 직접 개입 확대를 검토하고 있다. EU는 정상회의 결론 초안에서 러시아가 무조건적 휴전에 진지하게 임할 때에 한해 중재 역할을 강화하겠다는 입장을 밝혔다. 미국이 중재한 아부다비·제네바 3자 협상은 영토 양보, 우크라이나 중립화, 안전보장 문제에서 별다른 진전을 내지 못했다. 러시아는 무조건적 교전 중단을 거부한 채 동부 전선에서 공세를 이어가고 있고, 우크라이나는 상트페테르부르크의 정유 터미널을 드론으로 타격하며 맞불을 놓았다. 시장과 외교가는 6월 30일로 거론되는 휴전 합의 시한을 넘길 가능성에 무게를 두고 있다. 젤렌스키 대통령은 EU 정상회의에서 27개국 정상과 직접 또는 화상으로 대화할 예정이다.`,
  keyTerms:[{term:`무조건적 휴전`,explanation:`어떤 전제 조건도 달지 않고 일단 전투부터 멈추는 것을 뜻한다. 우크라이나와 서방은 이를 협상의 출발점으로 요구하지만, 러시아는 영토 등 조건을 먼저 보장받으려 해 협상이 막혀 있다.`}],
  history:`2022년 2월 러시아의 전면 침공으로 시작된 전쟁이 4년 넘게 이어지고 있다. 그동안 부활절·전승절 등 단기 휴전이 몇 차례 있었으나 포로 교환 외에 큰 성과는 없었다. 2026년 2월 중동 정세 격화 이후 러시아·우크라이나 간 공식 협상은 사실상 중단된 상태다.`,
  players:`우크라이나와 러시아가 당사자이고, 미국이 3자 협상을 중재해 왔다. EU와 영국·프랑스 등 유럽 국가들은 안전보장과 평화유지 병력 파견을 논의하며 더 적극적인 역할을 모색하고 있다. 젤렌스키 대통령과 푸틴 대통령이 핵심 인물이다.`,
  current:`협상이 교착된 가운데 EU가 6월 정상회의를 분수령으로 직접 중재 확대를 저울질하고 있다. 동시에 전장에서는 드론 공격 등 무력 충돌이 계속되고 있다.`,
  outlook:`6월 18~19일 EU 정상회의에서 유럽의 개입 수위가 결정될 전망이다. 6월 30일 휴전 시한을 넘길지, 미국의 추가 압박이 나올지가 향후 협상의 향방을 가른다.`,
  sources:[{title:`EU ready to step up in Ukraine-Russia talks but ceasefire must come first - Euronews`,url:`https://www.euronews.com/my-europe/2026/06/02/eu-ready-to-step-up-in-ukraine-russia-talks-but-ceasefire-must-come-first-summit-draft-sho`},{title:`2026 United States-Ukraine-Russia meetings in Geneva - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_United_States%E2%80%93Ukraine%E2%80%93Russia_meetings_in_Geneva`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미·이란, 60일 휴전 연장·핵 협상 재개 2단계 합의안 막판 조율`,
  metrics:[`휴전 60일 연장 합의`,`이란, 30일 내 호르무즈 기뢰 제거 약속`],
  summary:`미국과 이란이 휴전을 60일 연장한 뒤 호르무즈 해협을 먼저 개방하고 이어 핵 협상을 벌이는 2단계 합의안에 근접했다. 양국은 양해각서(MOU) 체결에 사실상 합의했으며, 트럼프 대통령의 최종 승인만 남은 것으로 전해진다. 합의안에 따르면 60일 휴전 기간 호르무즈 해협은 통행료 없이 개방되고, 이란은 항행의 자유를 위해 해협에 설치한 기뢰를 30일 이내에 제거하기로 했다. 또 이란산 석유 수출 금지가 해제되고, 이후 단계에서 이란 핵 프로그램에 대한 본격 협상이 시작된다. 이는 2026년 2월 미국·이스라엘의 대이란 군사작전으로 격화된 중동 긴장을 푸는 중대 전환점이 될 수 있다. 다만 핵 협상 자체는 농축 우라늄 처리와 사찰 범위 등 난제가 많아 합의까지는 험로가 예상된다. 휴전이 안착될지, 1단계에서 멈출지가 중동 정세의 분수령이 될 전망이다.`,
  keyTerms:[{term:`핵 협상`,explanation:`이란이 핵무기로 전용할 수 있는 우라늄 농축 활동을 어디까지 제한할지를 놓고 미국 등과 벌이는 협상이다. 제재 해제와 핵 활동 동결을 맞바꾸는 것이 핵심으로, 중동 안정의 최대 변수다.`}],
  history:`이란 핵 문제는 2015년 핵합의(JCPOA)가 2018년 미국 탈퇴로 무너진 뒤 줄곧 갈등의 불씨였다. 2026년 2월 미국·이스라엘의 군사작전으로 무력 충돌이 벌어졌고, 이후 휴전과 협상으로 국면이 넘어왔다. 이번 MOU는 그 첫 단계 성과다.`,
  players:`미국과 이란이 직접 당사자이며, 트럼프 대통령의 최종 결단이 남았다. 이스라엘과 걸프 산유국들이 결과에 민감하게 반응하고, 원유 수송로인 호르무즈 해협을 통해 전 세계 에너지 시장이 직접 영향을 받는다.`,
  current:`휴전 연장과 호르무즈 무료 개방을 담은 1단계 MOU 체결이 임박해, 무력 충돌 국면이 협상 국면으로 전환되고 있다. 핵 협상은 그 다음 단계로 예고됐다.`,
  outlook:`트럼프 대통령의 서명과 이란의 기뢰 제거 이행 여부가 1차 시험대다. 60일 휴전 기간 핵 협상 개시 여부와 진전 정도가 합의 지속성을 좌우할 전망이다.`,
  sources:[{title:`미·이란 양해각서 합의…트럼프 최종 승인 남아 - MBC`,url:`https://imnews.imbc.com/replay/2026/nw2500/article/6826036_36989.html`},{title:`미·이란 60일 휴전 MOU 임박…호르무즈·핵 놓고 막판 수싸움 - 다음뉴스`,url:`https://v.daum.net/v/20260529102737263`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`엔비디아, PC용 RTX Spark 슈퍼칩 공개… 인텔·AMD·퀄컴 영토 정조준`,
  metrics:[`대만 컴퓨텍스 6월 1일 공개·올가을 출시`,`발표 직후 AMD·인텔·퀄컴 주가 동반 하락`],
  summary:`엔비디아가 6월 1일 대만 컴퓨텍스 기조연설에서 윈도 PC용 신형 칩 RTX Spark 슈퍼칩을 공개하며 개인용 컴퓨터 시장에 본격 진출했다. 젠슨 황 최고경영자(CEO)는 마이크로소프트와 손잡고 PC를 다시 발명하겠다고 선언했다. 이 칩은 마이크로프로세서와 그래픽칩을 결합한 형태로 대만 미디어텍과 함께 만들었으며, 윈도 온 암(ARM) 운영체제에서 구동된다. 델과 레노버 등 주요 PC 제조사 제품에 탑재돼 올가을 출시될 예정이다. 엔비디아가 데이터센터를 넘어 기기 자체에서 AI를 돌리는 엣지 컴퓨팅 영역까지 넓히겠다는 신호로, AI 에이전트를 클라우드보다 저렴하게 24시간 구동할 수 있다는 점을 내세웠다. 발표 직후 AMD·인텔·퀄컴 주가가 동반 하락하며 시장 충격이 그대로 드러났다. PC용 반도체 시장의 경쟁 구도가 근본적으로 흔들릴 수 있다는 평가가 나온다.`,
  keyTerms:[{term:`엣지 컴퓨팅`,explanation:`데이터를 멀리 있는 클라우드 서버로 보내지 않고 PC나 스마트폰 같은 기기 안에서 직접 처리하는 방식이다. 속도가 빠르고 비용이 저렴해, AI를 기기에서 바로 돌리려는 흐름의 핵심 기술이다.`}],
  history:`엔비디아는 그래픽칩(GPU)으로 출발해 AI 학습용 데이터센터 칩 시장을 장악하며 세계 최고 몸값의 기업으로 올라섰다. 그러나 데이터센터 의존도가 높다는 지적을 받아 왔고, AI를 기기에서 직접 구동하는 엣지 시장으로 영역 확장을 모색해 왔다. 이번 PC 칩 진출은 그 연장선이다.`,
  players:`엔비디아와 젠슨 황 CEO가 마이크로소프트, 대만 미디어텍과 동맹을 맺고 델·레노버를 통해 제품을 내놓는다. 기존 PC 칩 강자인 인텔·AMD·퀄컴이 직접적인 경쟁 위협에 직면했다. 윈도 생태계를 쥔 마이크로소프트도 핵심 파트너다.`,
  current:`엔비디아가 PC용 SoC(시스템온칩)를 발표하며 데이터센터를 넘어 소비자 기기 시장으로 전선을 넓혔다. 경쟁사 주가가 즉각 하락하며 업계 지각변동이 시작됐다.`,
  outlook:`올가을 실제 제품 출시 후 성능과 가격 경쟁력이 시장 판도를 좌우할 전망이다. 인텔·AMD·퀄컴의 대응 전략과 윈도 온 ARM 생태계 확장 속도가 관전 포인트다.`,
  sources:[{title:`Nvidia Is Taking On Intel and AMD With AI Chip for Computers - Bloomberg`,url:`https://www.bloomberg.com/news/articles/2026-06-01/nvidia-enters-windows-laptop-market-taking-on-intel-and-amd`},{title:`Nvidia unveils new chip to bring AI directly to personal computers - Al Jazeera`,url:`https://www.aljazeera.com/economy/2026/6/1/nvidia-unveils-new-chip-to-bring-ai-directly-to-personal-computers`}]

  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`지방선거일 덮친 때 이른 폭염… 정부, 취약계층 매일 안부 확인 나서`,
  metrics:[`선거일 대전·세종·충남 낮 최고 31도`,`복지부, 폭염특보 시 취약계층 매일 점검`],
  summary:`제9회 전국동시지방선거가 치러진 6월 3일, 대전·세종·충남 지역에 낮 최고기온이 31도에 육박하는 때 이른 무더위가 닥쳤다. 중요한 선거일과 폭염이 겹치면서 야외 활동이 늘어 온열질환과 식중독 위험에 경고등이 켜졌다. 온열질환은 열사병·일사병처럼 뜨거운 환경에 오래 노출될 때 생기는 병으로 두통·어지럼증·구토·의식 저하를 유발하고 심하면 생명을 위협한다. 보건복지부는 올여름 기록적 폭염이 예보된 가운데 홀로 사는 어르신과 쪽방촌 주민, 노숙인 등 취약계층을 선제적으로 보호하기로 했다. 폭염특보가 발효되면 취약계층의 안부를 매일 확인하고 필요한 지원을 신속히 연계할 방침이다. 6월 초부터 30도를 넘는 더위가 나타난 것은 갈수록 빨라지고 길어지는 폭염의 신호로, 여름철 보건·재난 대응 체계의 부담이 커지고 있다.`,
  keyTerms:[{term:`온열질환`,explanation:`뜨거운 환경에 오래 노출돼 생기는 병으로 열사병·일사병이 대표적이다. 두통·어지럼증·구토 등을 일으키고 심하면 목숨을 잃을 수 있어, 폭염 때 노약자 보호가 특히 중요하다.`}],
  history:`한국의 여름 폭염은 2018년 기록적 더위 이후 해마다 강도와 빈도가 높아져 왔다. 폭염으로 인한 온열질환 사망과 취약계층 피해가 반복되면서 정부는 폭염을 자연재난으로 관리하기 시작했다. 최근에는 6월 초부터 때 이른 더위가 나타나는 사례가 늘고 있다.`,
  players:`보건복지부와 기상청, 지방자치단체가 폭염 대응을 맡는다. 홀로 사는 노인, 쪽방촌 주민, 노숙인, 야외 노동자 등이 가장 취약한 계층이다. 선거일에는 중앙선거관리위원회와 방역·보건 당국도 유권자 건강 관리에 신경을 썼다.`,
  current:`선거일에 31도에 육박하는 더위가 닥치며 온열질환 우려가 현실로 떠올랐다. 정부가 본격적인 여름을 앞두고 취약계층 매일 점검 체계를 가동했다.`,
  outlook:`7~8월 본격 폭염기에 온열질환자와 사망자 추이가 관건이다. 정부의 취약계층 보호 대책 실효성과 전력 수요 급증에 따른 에너지 부담도 주시할 대목이다.`,
  sources:[{title:`역대급 폭염 올여름…복지부, 나 홀로 어르신 안부 매일 살핀다 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202606021730325472`},{title:`지방선거일, 31도 폭염…온열질환·식중독 경고등 - 의약일보`,url:`https://www.medicaldaily.co.kr/news/19410`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`한반도 온난화 속도 지구 평균의 2배… 5년 내 역대급 폭염 경고`,
  metrics:[`한반도 온난화 속도 지구 평균의 약 2배`,`향후 5년 내 역대급 폭염 도래 전망`],
  summary:`한반도의 온난화 속도가 지구 평균의 약 2배에 달하며, 향후 5년 안에 역대급 폭염이 닥칠 수 있다는 분석이 나왔다. 한반도는 삼면이 바다로 둘러싸인 반도 특성과 빠른 도시화로 인해 전 지구 평균보다 빠르게 더워지고 있다는 것이다. 지구온난화가 가속되면서 여름철 평균 기온과 폭염 일수, 열대야 빈도가 모두 늘어나는 추세다. 이런 변화는 단순한 불볕더위를 넘어 농업 생산, 전력 수급, 보건 의료, 재난 대응 전반에 구조적 부담을 키운다. 실제로 2026년에는 6월 초부터 30도를 넘는 더위가 일찍 시작돼 폭염기가 길어지는 양상이 뚜렷하다. 전문가들은 온실가스 감축과 함께 폭염을 상수로 가정한 도시·인프라 적응 대책이 시급하다고 지적한다. 기후변화가 먼 미래의 문제가 아니라 당장의 생활·경제 리스크로 다가오고 있음을 보여주는 경고다.`,
  keyTerms:[{term:`지구온난화`,explanation:`온실가스가 늘어 지구 평균 기온이 장기적으로 오르는 현상이다. 한반도는 이 속도가 세계 평균의 약 2배여서 폭염·열대야 등 극한 기상이 더 빠르게 심해지고 있다.`}],
  history:`산업화 이후 온실가스 배출이 늘면서 전 지구 기온이 꾸준히 상승해 왔다. 한반도는 특히 빠른 도시화와 지리적 특성 때문에 세계 평균을 웃도는 속도로 더워졌다. 2018년 기록적 폭염 이후 극한 더위가 일상화되는 추세가 자료로 확인되고 있다.`,
  players:`기상청과 기후 연구기관들이 온난화 추세를 분석·경고하고, 정부와 지자체가 적응·감축 정책을 마련한다. 농민, 야외 노동자, 노약자 등이 직접적 피해 계층이며, 전력·보건 당국의 부담도 커진다.`,
  current:`한반도 온난화 속도가 지구 평균의 2배에 이르고 5년 내 역대급 폭염 가능성이 제기되며, 2026년 6월 초 이른 더위가 그 신호로 받아들여지고 있다.`,
  outlook:`올여름 실제 폭염 강도와 일수가 경고의 현실화 여부를 보여줄 전망이다. 정부의 온실가스 감축 목표 이행과 폭염 적응 인프라 투자 확대가 핵심 과제로 떠오른다.`,
  sources:[{title:`2배 빠른 K온난화…5년내 역대급 폭염 온다 - 서울신문`,url:`https://m.go.seoul.co.kr/news/society/2026/05/29/20260529008006`},{title:`올여름 역대급 폭염 예보…정부 취약계층 선제 보호 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202606021730325472`}]
}]

  tag:`2026-06-03`,
  label:`2026년 6월 3일 (수)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피, 외국인 6.6조 순매도 폭탄에도 개인·기관 매수로 사상 첫 8800선 마감`,
  metrics:[`코스피 종가 사상 첫 8800선 마감`,`외국인 유가증권시장 6조5997억원 순매도 (역대 3위)`],
  summary:`2일 코스피는 장 초반 엔비디아 젠슨 황 CEO 방한 기대감에 개장 5분 만에 8900선을 돌파했으나 외국인 매물이 쏟아지며 9분 만에 8500선까지 수직 낙하하는 극심한 변동성을 보였다. 그러나 개인과 기관의 강한 매수세에 힘입어 종가 기준 사상 처음으로 8800선에 안착했다. 이날 외국인은 유가증권시장에서만 6조5997억원을 순매도했는데, 이는 2026년 2월 27일(7조527억원), 5월 7일(6조6986억원)에 이은 역대 3위 규모다. 전날인 1일에도 코스피는 장중 8588까지 올라 사상 처음 8500선을 넘었고 개인이 1조1476억원을 순매수한 반면 외국인은 1조2008억원을 순매도했다. 올해 코스피는 AI·반도체주를 중심으로 90% 가까이 폭등하며 5월 8000선을 돌파한 데 이어 가파른 상승세를 이어왔다. 다만 반도체 단일종목 레버리지 ETF가 장중 변동성을 증폭시키면서 시장 과열 우려도 커지고 있다. 6월에는 FOMC 점도표와 MSCI 한국 시장 재분류 결정이 최대 변수로 꼽힌다.`,
  keyTerms:[{term:`외국인 순매도`,explanation:`외국인 투자자가 산 주식보다 판 주식이 더 많은 상태를 말한다. 규모가 크면 지수를 끌어내리고 변동성을 키운다.`}],
  history:`코스피는 2025년 하반기부터 AI·반도체 슈퍼사이클 기대와 정부의 증시 부양책에 힘입어 가파르게 올랐다. 2026년 들어 상승세가 더 가팔라져 5월 중순 사상 처음 8000선을 돌파했고, 한 달여 만에 8800선까지 치솟았다. 올해 누적 상승률은 약 90%에 달한다.`,
  players:`개인 투자자(개미)는 대규모 순매수로 지수를 떠받치는 반면, 외국인은 차익 실현성 대량 매도로 변동성을 키우고 있다. 삼성전자·SK하이닉스 등 반도체 대형주와 엔비디아 젠슨 황 CEO 방한 같은 이벤트가 수급을 좌우한다. 한국은행과 금융당국은 과열·변동성 관리에 주목하고 있다.`,
  current:`단 9분 만에 지수가 수백 포인트 출렁이는 등 변동성이 역대급으로 커진 점이 분기점이다. 외국인 순매도가 역대 3위 규모에 달해 추가 조정 가능성에 대한 경계감이 높다.`,
  outlook:`6월 FOMC의 점도표와 MSCI 한국 시장 재분류 결정이 향후 수급의 최대 분수령이다. 반도체 업황과 외국인 매매 동향을 주시해야 한다.`,
  sources:[{title:`코스피, 외국인 거센 매도에도 8800선 방어...개미의 힘 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202606021552432375`},{title:`코스피, 사상 첫 8500선 돌파...개인 1.1조 사자·외국인 1.2조 팔자 - 이투데이`,url:`https://www.etoday.co.kr/news/view/2589445`},{title:`[마감] 코스피, 외국인 6조 매도에도 개인 매수세로 8800선 안착 - 인베스팅닷컴`,url:`https://kr.investing.com/news/stock-market-news/article-1968429`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`이란 전쟁발 유가 급등·제조업 위축에 글로벌 증시 혼조`,
  metrics:[`브렌트유 5% 급등해 배럴당 95달러 돌파`,`S&P 글로벌 제조업 PMI 52.6→49.1 위축 전환`],
  summary:`6월 2일 글로벌 금융시장은 AI 기술주 강세에 유럽 증시가 오르고 미국 선물은 하락하는 등 혼조세를 보였다. 이란이 이스라엘의 레바논 지상전 확대에 반발해 미국과의 협상을 중단하고 호르무즈 해협 봉쇄를 시사하면서 브렌트유는 한때 5% 급등해 배럴당 95달러를 넘어섰다. 다만 트럼프 대통령이 이스라엘과 헤즈볼라가 상호 공격 중단에 합의했다고 밝히면서 유가는 장중 고점에서 일부 되돌려졌다. 경기 측면에서는 S&P 글로벌 제조업 구매관리자지수(PMI)가 52.6에서 49.1로 한 달 만에 위축 국면(50 미만)으로 떨어져 우려를 키웠다. 미국 10년물 국채금리는 6bp 오른 4.51%를 기록했고, 연방기금금리 선물은 12월까지 금리 인상 확률을 약 60%로 반영했다. 고유가가 인플레이션 기대를 자극하면서 소비심리에도 부담을 주고 있다. 시장은 유가와 중동 정세, 연준의 다음 행보를 동시에 주시하고 있다.`,
  keyTerms:[{term:`구매관리자지수(PMI)`,explanation:`기업 구매 담당자 설문으로 경기를 가늠하는 지표다. 50을 넘으면 경기 확장, 밑돌면 위축을 뜻한다.`}],
  history:`2026년 3월 이스라엘-이란 전쟁이 본격화되며 중동 지정학 리스크가 글로벌 경제의 핵심 변수로 부상했다. 전쟁은 항공·해운을 마비시키고 호르무즈 해협·홍해 우회를 강요하며 유가를 끌어올렸다. 그동안 AI 투자 붐이 증시를 떠받쳐 왔으나 고유가가 인플레이션을 자극할 수 있다는 우려가 커졌다.`,
  players:`산유국과 이란(호르무즈 해협 봉쇄 위협), 미국 연준(금리 정책), AI 기술주를 보유한 글로벌 투자자가 핵심 플레이어다. 트럼프 행정부의 중재와 관세 정책도 시장 방향을 좌우한다.`,
  current:`제조업 PMI가 한 달 만에 위축 전환하고 유가가 95달러를 넘으면서 스태그플레이션 우려가 커진 점이 분기점이다. 금리 인하가 아니라 인상 가능성이 다시 부각되고 있다.`,
  outlook:`6월 FOMC 회의와 이란-미국 협상 재개 여부, 호르무즈 해협 봉쇄 현실화 여부가 단기 최대 변수다.`,
  sources:[{title:`Global Markets Rise on Tuesday, June 2, 2026 - STL.News`,url:`https://www.stl.news/global-markets-rise-on-tuesday-june-2-2026/`},{title:`Global Economy Briefing - June 2, 2026 - Rio Times`,url:`https://www.riotimesonline.com/global-economy-briefing-june-2-2026/`},{title:`International Business, World News & Global Stock Market Analysis - CNBC`,url:`https://www.cnbc.com/world/`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`AI 기업 앤스로픽, 9650억 달러 몸값으로 IPO 비밀 신청…오픈AI 첫 추월`,
  metrics:[`기업가치 9650억 달러 (오픈AI 첫 추월)`,`연 매출 런레이트 약 470억 달러 (1년 새 약 4.7배)`],
  summary:`클로드(Claude)를 개발한 AI 기업 앤스로픽이 6월 1일 미국 증권거래위원회(SEC)에 비밀 방식으로 상장 신청서(S-1)를 제출하며 기업공개(IPO) 절차에 착수했다. 회사는 최근 650억 달러 규모 투자를 유치하며 9650억 달러의 기업가치를 인정받아 사상 처음으로 경쟁사 오픈AI의 몸값을 넘어섰다. 이는 역대 최대 규모의 기술 기업 상장 시도 중 하나로, 주요 프런티어 AI 연구소가 상장 회사가 되는 첫 사례가 된다. 앤스로픽의 연 매출 런레이트는 5월 기준 약 470억 달러로, 1년 전 약 100억 달러에서 폭발적으로 늘었다. 비밀 신청은 대형 상장 예정 기업의 통상적 절차로, 발행 주식 수와 공모가는 아직 정해지지 않았다. 상장 목표 시점은 오는 10월로 거론되며, 9월 상장을 목표로 한 오픈AI보다 앞서게 된다. AI 거품 논란 속에서 앤스로픽의 상장은 시장의 시험대가 될 전망이다.`,
  keyTerms:[{term:`기업공개(IPO)`,explanation:`비상장 기업이 처음으로 주식을 증시에 공개해 일반 투자자에게 파는 절차다. 대규모 자금을 조달하는 대신 공개 시장의 평가를 받게 된다.`}],
  history:`앤스로픽은 오픈AI 출신들이 2021년 설립한 AI 안전 중심 기업으로, 챗봇 클로드로 급성장했다. 구글·아마존 등으로부터 대규모 투자를 받으며 생성형 AI 경쟁의 선두권으로 올라섰다. AI 모델 경쟁이 가열되며 막대한 컴퓨팅 투자가 필요해지자 자금 조달을 위한 상장 카드를 꺼내 들었다.`,
  players:`앤스로픽과 투자자(구글·아마존 등), 경쟁사 오픈AI, 상장을 심사하는 SEC가 핵심이다. 엔비디아 등 AI 인프라 기업의 실적과도 맞물린다.`,
  current:`비상장 AI 기업이 처음으로 공개 시장의 평가를 받는 분기점으로, AI 산업 전체의 밸류에이션 적정성을 가늠하는 잣대가 된다.`,
  outlook:`10월로 거론되는 상장 일정과 SEC 심사 결과, 9월 목표인 오픈AI의 상장 행보가 관전 포인트다.`,
  sources:[{title:`Anthropic confidentially files for IPO at a \$965 billion valuation - Fortune`,url:`https://fortune.com/2026/06/01/anthropic-confidentially-files-ipo-965-billion-valuation/`},{title:`Anthropic IPO Filing: A Comparative Analysis of AI Valuations - Tokenist`,url:`https://tokenist.com/anthropic-ipo-filing-ai-valuations-analysis/`},{title:`Anthropic Submits Secret S-1, Eyes October IPO At Near-Trillion Valuation - Yellow.com`,url:`https://yellow.com/news/anthropic-confidential-s1-october-ipo-valuation`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이재명 정부 출범 1주년 앞두고 차별금지법 검토 명시…속도 2배 국정 드라이브`,
  metrics:[`국민주권정부 출범 1주년(6월 4일) D-2`,`2026년 본예산 727조9000억원 (전년 대비 약 5% 증가)`],
  summary:`이재명 정부가 출범 1주년(6월 4일)을 이틀 앞둔 6월 2일 제24회 국무회의 겸 제11차 비상경제점검회의를 열었다. 이 대통령은 앞으로 4년간 국정 속도를 두 배로 높여 8년처럼 일하겠다며 국정과제 강드라이브를 예고했다. 정부는 출범 1년 국정성과 자료집에 혐오 표현·차별 방지를 위한 포괄적 차별금지법(평등법) 제정 검토를 명시해 논쟁에 불을 붙였다. 교육감 선거를 앞두고 보수 개신교계와의 갈등 확산이 전망된다. 정부는 2026년을 AI 대전환의 원년으로 선포하고 727조9000억원 규모의 슈퍼 확장 예산을 편성했다. 선거가 없는 향후 2년을 개혁 골든타임으로 보고 연금·노동 개혁 등 장기 과제도 추진한다는 구상이다. 계엄 사태를 극복하고 경제 반등에 주력해 온 정부의 2년차 국정 운영 방향이 분수령을 맞고 있다.`,
  keyTerms:[{term:`차별금지법`,explanation:`성별·장애·인종·성적지향 등을 이유로 한 차별을 포괄적으로 금지하는 법이다. 2007년 이후 발의가 반복됐으나 종교계 반발 등으로 번번이 무산돼 온 쟁점이다.`}],
  history:`이재명 정부는 2025년 6월 4일 비상계엄 사태 수습 국면에서 출범했다. 출범 후 경제 반등과 AI 산업 육성에 주력했고 2026년을 대도약의 해로 규정했다. 차별금지법은 2007년 이후 여러 차례 발의됐으나 종교계 반발 등으로 번번이 무산된 해묵은 쟁점이다.`,
  players:`이재명 대통령과 정부·여당이 개혁 드라이브를 주도하고, 보수 개신교계와 야당은 차별금지법에 강하게 반발한다. 교육감 선거 표심도 변수다.`,
  current:`출범 1주년과 선거 없는 2년 골든타임을 맞아 정부가 차별금지법·연금·노동 등 휘발성 큰 과제를 동시에 꺼내든 점이 분기점이다.`,
  outlook:`6월 4일 출범 1주년 메시지와 차별금지법 입법 추진 강도, 교육감 선거 국면의 갈등 양상을 지켜봐야 한다.`,
  sources:[{title:`이재명 정부, 차별금지법 검토...교육감 선거·보수 개신교계 갈등 확산 전망 - 뉴스핌`,url:`https://www.newspim.com/news/view/20260602000610`},{title:`선거 없는 2년 개혁 골든타임...李대통령, 국정과제 강드라이브 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202606010506472703`},{title:`취임 1년 앞둔 이 대통령 속도 2배로 올려 8년처럼 일하자 - 오마이뉴스`,url:`https://www.ohmynews.com/NWS_Web/View/at_pg.aspx?CNTN_CD=A0003239563`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이란, 이스라엘 레바논 공세에 반발해 미국과 협상 중단…호르무즈 봉쇄 시사`,
  metrics:[`레바논 누적 사망 최소 3370명 (3월 확전 이후)`,`이스라엘 전사자 23명으로 증가`],
  summary:`이란이 6월 1일 이스라엘의 레바논 지상·공중전 확대에 반발해 미국과의 협상 및 메시지 교환을 중단했다. 이란 국영매체는 테헤란이 호르무즈 해협을 완전 봉쇄할 준비를 하고 있다고 보도했고, 이에 브렌트유는 5% 급등해 배럴당 95달러를 넘어섰다. 레바논 보건부 집계 기준 3월 확전 이후 누적 사망자는 최소 3370명에 달하며, 2일에도 이스라엘이 남부 레바논 전역을 공습해 수십 개 마을 주민 수천 명에게 대피령이 내려졌다. 같은 날 새로 점령한 보퍼트 성 인근에서 헤즈볼라 드론 공격으로 이스라엘 병사 1명이 숨지고 3명이 다쳐 3월 2일 확전 이후 전사자가 23명으로 늘었다. 다만 트럼프 대통령이 이스라엘과 헤즈볼라의 상호 공격 중단 합의와 이란과의 협상 지속을 언급하며 긴장은 일부 완화됐다. 2026년 이란 전쟁은 중동발 항공·해운 마비와 유가 급등을 통해 세계 경제 전반을 흔들고 있다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`페르시아만과 외해를 잇는 좁은 해상 길목으로, 세계 원유 수송의 약 5분의 1이 지나간다. 이란이 봉쇄하면 유가가 급등하는 등 세계 경제에 직접 타격을 준다.`}],
  history:`2026년 3월 이스라엘과 이란 간 전면 충돌이 시작되며 전선이 레바논으로 확대됐다. 이스라엘은 헤즈볼라 거점을 겨냥해 지상전을 벌이고 있고, 이란은 핵·미사일 시설 피격에 맞서 대응 수위를 높여왔다. 이미 95일 넘게 이어진 전쟁이다.`,
  players:`이스라엘, 이란, 친이란 무장정파 헤즈볼라가 직접 교전 당사자이며, 미국(트럼프 행정부)이 중재와 군사 지원을 병행한다. 호르무즈 해협 봉쇄 위협은 산유국과 세계 경제에 직결된다.`,
  current:`이란의 협상 중단과 호르무즈 봉쇄 시사로 외교 해법이 흔들리고 유가가 급등한 점이 전환점이다. 휴전과 확전 사이 분기점에 서 있다.`,
  outlook:`이스라엘-헤즈볼라 휴전 합의의 실제 이행 여부, 미국-이란 협상 재개, 호르무즈 해협 봉쇄 현실화가 핵심 관전 포인트다.`,
  sources:[{title:`Iran War 2026 - Day 95 Update - 02 June 2026 - GlobalSecurity.org`,url:`https://www.globalsecurity.org/military/ops/iran-war-oprep.htm`},{title:`2026 Iran war - Britannica`,url:`https://www.britannica.com/event/2026-Iran-war`},{title:`Israel/US-Iran conflict 2026: Background and UK response - House of Commons Library`,url:`https://commonslibrary.parliament.uk/research-briefings/cbp-10521/`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`폴란드 대선서 트럼프가 지지한 나브로츠키 신승…유럽 우경화 가속`,
  metrics:[`나브로츠키 50.9% vs 트샤스코프스키 49.1%`,`득표 차 약 1.8%포인트 박빙`],
  summary:`6월 1일 치러진 폴란드 대선 결선투표에서 도널드 트럼프 미국 대통령이 지지한 카롤 나브로츠키가 50.9%를 얻어 바르샤바 시장 라파우 트샤스코프스키(49.1%)를 약 1.8%포인트 차로 꺾고 당선됐다. 이번 선거는 우파 민족주의와 유럽연합(EU) 친화적 자유주의 노선 사이의 선명한 대결로, 민족주의가 가장 근소한 차이로 승리했다. 트럼프 2기 출범 이후 해외 선거에서는 트럼프식 관세·강경 노선에 대한 반발 기류가 감지돼 왔으나, 폴란드에서는 오히려 우파가 승리했다. 유럽 극우 진영은 자국 경제를 미국 우선주의 관세로부터 방어해야 하는 딜레마에 직면해 있다. EU는 강제 추방 확대와 역외 구금시설 건설 등 이민 정책 대수술도 추진 중이다. 이번 결과는 유럽 정치 지형의 우경화 흐름과 EU 내부 결속에 적지 않은 파장을 줄 전망이다.`,
  keyTerms:[{term:`민족주의`,explanation:`자국과 자민족의 이익·정체성을 최우선에 두는 정치 노선이다. 유럽에서는 EU 통합·이민에 거리를 두고 주권을 강조하는 우파 진영의 핵심 이념으로 통한다.`}],
  history:`폴란드는 친EU 자유주의 진영과 우파 민족주의 진영이 오랜 기간 첨예하게 대립해 왔다. 대통령은 법안 거부권 등 상당한 권한을 가져 정부 정책 향방을 좌우한다. 이번 결선은 양 진영의 정면 대결이었다.`,
  players:`당선자 나브로츠키(우파 민족주의·트럼프 지지)와 트샤스코프스키(친EU 자유주의), 트럼프 행정부, EU 집행부가 핵심 이해당사자다.`,
  current:`미국 우선주의·관세 갈등 속에서도 폴란드에서 민족주의가 승리해 유럽 우경화 흐름이 재확인된 점이 분기점이다.`,
  outlook:`신임 대통령의 EU·우크라이나 정책 노선, 폴란드 정부와의 동거 정부 갈등, EU 이민 정책 추진 향방을 주시해야 한다.`,
  sources:[{title:`Trump invites electoral backlash abroad, but Europe's far right is far from dead - Brookings`,url:`https://www.brookings.edu/articles/trump-invites-electoral-backlash-abroad-but-europes-far-right-is-far-from-dead/`},{title:`Europe News - Euronews`,url:`https://www.euronews.com/my-europe/europe-news`},{title:`Elections 2026: The latest from the NPR Network - NPR`,url:`https://www.npr.org/sections/elections/`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`오픈AI-엔비디아, 10기가와트 규모 AI 인프라 구축 초대형 동맹`,
  metrics:[`엔비디아 최대 1000억 달러 오픈AI 투자`,`최소 10기가와트(GW) 규모 시스템 배치`],
  summary:`오픈AI와 엔비디아가 차세대 AI 인프라를 위해 최소 10기가와트(GW) 규모의 엔비디아 시스템을 배치하는 초대형 전략적 파트너십을 발표했다. 엔비디아는 1기가와트씩 배치될 때마다 단계적으로 오픈AI에 최대 1000억 달러를 투자할 계획이다. 첫 1기가와트 시스템은 차세대 베라 루빈(Vera Rubin) 플랫폼 기반으로 2026년 하반기에 배치된다. 이는 AI 컴퓨팅 수요가 전력 단위로 측정될 만큼 폭증하고 있음을 보여주는 상징적 거래다. 같은 시기 마이크로소프트는 빌드 2026 행사에서 깃허브 코파일럿용 자체 코딩 모델 프로젝트 폴라리스를 공개하며 AI가 동기식 비서에서 장시간 작업을 수행하는 비동기 동료로 진화했다고 선언했다. 엔비디아는 윈도 PC용 고성능 칩도 내놓으며 AI 생태계 전 계층을 장악하려는 행보를 보였다. AI 인프라 투자 경쟁이 한층 격화되는 양상이다.`,
  keyTerms:[{term:`기가와트(GW)`,explanation:`전력의 크기를 나타내는 단위로 1GW는 100만kW다. AI 데이터센터가 워낙 많은 전기를 쓰다 보니 이제 투자 규모를 전력 용량으로 표현할 만큼 커졌다.`}],
  history:`생성형 AI 붐 이후 모델 학습·추론에 필요한 GPU와 전력 수요가 폭발적으로 늘었다. 엔비디아는 AI 칩 시장을 사실상 독점하며 시가총액이 급등했고, 오픈AI는 막대한 컴퓨팅 자원 확보가 최대 과제였다. 양사는 칩 공급을 넘어 자본·인프라 동맹으로 관계를 격상해 왔다.`,
  players:`오픈AI(모델), 엔비디아(칩·투자), 마이크로소프트(클라우드·코파일럿)가 핵심 축이다. 앤스로픽 등 경쟁 진영과의 인프라 군비 경쟁 구도가 형성돼 있다.`,
  current:`투자가 GW 단위로 이뤄질 만큼 AI 인프라가 거대화된 점이 분기점으로, 전력·데이터센터가 AI 경쟁의 새 병목으로 떠올랐다.`,
  outlook:`2026년 하반기 첫 1GW 배치와 베라 루빈 플랫폼 성능, 마이크로소프트 폴라리스 모델 전환(8월) 등이 관전 포인트다.`,
  sources:[{title:`OpenAI and NVIDIA Announce Strategic Partnership to Deploy 10 Gigawatts of NVIDIA Systems - NVIDIA Newsroom`,url:`https://nvidianews.nvidia.com/news/openai-and-nvidia-announce-strategic-partnership-to-deploy-10gw-of-nvidia-systems`},{title:`OpenAI and NVIDIA announce strategic partnership - OpenAI`,url:`https://openai.com/index/openai-nvidia-systems-partnership/`},{title:`AI News Today - June 2, 2026: 11 Biggest Stories - BuildFastWithAI`,url:`https://www.buildfastwithai.com/blogs/ai-news-today-june-2-2026`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`한화에어로스페이스 대전공장 폭발…5명 사망 등 7명 사상, 8년 새 세 번째 참사`,
  metrics:[`5명 사망·2명 중경상 (총 7명 사상)`,`동일 사업장 8년 새 3번째 폭발 (2018·2019년 사망 8명)`],
  summary:`6월 1일 오전 10시 59분께 대전 유성구 외삼동 한화에어로스페이스 대전사업장 56동 세척시설에서 폭발과 화재가 발생해 5명이 숨지고 2명이 중경상을 입는 등 7명이 사상했다. 사망자는 모두 건물 내부에서 발견됐으며, 폭발이 일어난 건물은 물과 세척제로 로켓 추진제(화약)를 세척하는 공간이었다. 이 사업장은 2018년(5명 사망), 2019년(3명 사망)에도 폭발 사고가 났던 곳으로, 8년 새 세 번째 대형 참사다. 과거 사고 모두 부실한 안전 관리가 원인으로 지목됐고, 이번에도 위험한 추진제를 자동화 한계 탓에 수작업으로 다룬 정황이 드러났다. 사측은 기존 작업 방식과 관행을 고수한 것이 실패 원인이라고 인정했다. 경찰은 2일 저녁 국립과학수사연구원에 시료를 보냈고 사망자 신원은 3일 오전 확인될 전망이다. 반복되는 사망 사고로 중대재해처벌법 적용과 안전 관리 책임론이 거세지고 있다.`,
  keyTerms:[{term:`중대재해처벌법`,explanation:`노동자가 숨지는 등 중대 산업재해가 발생했을 때 경영 책임자를 형사 처벌할 수 있게 한 법이다. 안전 관리 의무를 다하지 않은 책임을 기업 최고경영진에게 물을 수 있다.`}],
  history:`한화에어로스페이스 대전사업장은 로켓·미사일 추진제를 다루는 방산 핵심 시설이다. 2018년과 2019년에도 같은 사업장에서 폭발로 각각 5명, 3명이 숨졌고 모두 안전 관리 부실이 원인으로 지목됐다. 위험 공정의 자동화가 더디다는 지적이 반복돼 왔다.`,
  players:`한화에어로스페이스(사측), 희생된 노동자와 유가족, 고용노동부·경찰·국립과학수사연구원, 중대재해처벌법 적용을 검토하는 수사당국이 핵심이다.`,
  current:`8년 새 세 번째 사망 참사이자 사측이 관행 고수를 자인하면서 구조적 안전 관리 실패가 드러난 점이 분기점이다.`,
  outlook:`6월 3일 사망자 신원 확인과 합동 감식·국과수 분석 결과, 중대재해처벌법 적용 및 경영 책임 수사 향방을 지켜봐야 한다.`,
  sources:[{title:`3번째 동일 사업장 대형 사고...7명 사상 한화에어로 폭발 사고 합동 감식 - 헤럴드경제`,url:`https://biz.heraldcorp.com/article/10762554`},{title:`한화에어로 폭발 사고로 대전 곳곳서 연기...사망자 모두 건물 내부서 발견 - MBC`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6826827_37004.html`},{title:`한화에어로 폭발 사고 사망자 신원확인, 이르면 3일 오전 밝혀질 듯 - 머니투데이`,url:`https://www.mt.co.kr/society/2026/06/02/2026060219224669203`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`이른 6호 태풍 장미 한반도 영향…기상청 올여름 폭염·집중호우 우려`,
  metrics:[`6월 2일 6호 태풍 장미(JANGMI) 한반도 영향`,`6~8월 기온 평년보다 높음 전망`],
  summary:`6월 2일 제6호 태풍 장미(JANGMI)가 한국에 영향을 미쳤다. 이는 5~6월에 한반도에 영향을 준 가장 이른 태풍 중 하나로, 남부 지방에 더위를 식히는 비를 뿌렸다. 기상청은 같은 날 발표한 여름철 전망에서 6~8월 기온이 평년보다 높고 강수량도 대체로 많을 것으로 내다봤다. 한반도 주변 해역의 해수면 온도 역시 평년보다 높을 것으로 전망됐는데, 높은 해수면 온도는 태풍을 키우고 대기 불안정을 심화시키는 요인이다. 기상청장은 이상고온과 집중호우 등 위험기상으로 인한 피해 발생이 우려된다고 강조했다. 이른 태풍과 고수온이 겹치면서 올여름 극한 기상 위험이 어느 때보다 커졌다는 평가다. 폭염과 호우에 대비한 선제적 방재 대응이 과제로 떠올랐다.`,
  keyTerms:[{term:`해수면 온도`,explanation:`바다 표면의 물 온도를 말한다. 온도가 높을수록 바다에서 수증기가 더 많이 증발해 태풍이 강해지고 집중호우 가능성이 커진다.`}],
  history:`최근 수년간 한반도는 기후변화 영향으로 폭염·집중호우 등 극한 기상이 잦아졌다. 한반도 주변 해수면 온도 상승은 태풍의 위력을 키우고 장마철 강수를 강화하는 요인으로 지목돼 왔다. 태풍이 6월 초에 영향을 주는 것은 이례적으로 이른 편이다.`,
  players:`기상청(예보·경보), 중앙·지방 재난당국, 침수·폭염 취약 지역 주민이 핵심 이해당사자다. 기후변화 자체가 근본 배경이다.`,
  current:`6월 초 이른 태풍과 평년 이상의 고수온이 겹쳐 올여름 극한 기상 위험이 조기에 부각된 점이 분기점이다.`,
  outlook:`본격 장마철 강수량과 폭염 강도, 추가 태풍 북상 여부, 기상청의 단계별 특보 발령을 주시해야 한다.`,
  sources:[{title:`기상청 여름철 전망 보도자료 (2026.6.2.) - 기상청`,url:`https://www.kma.go.kr/kma/news/press_01.jsp`},{title:`[오늘의 날씨] 2026년 6월 2일 - 네이트 뉴스`,url:`https://news.nate.com/view/20260601n35439`}]
}]

  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피 8800선 첫 돌파 사상 최고…삼성전자 시가총액 2000조 시대 열어`,
  metrics:[`코스피 종가 8800선 돌파 (사상 최고)`,`삼성전자 시가총액 사상 첫 2000조원 돌파`],
  summary:`6월 첫 거래일인 1일 코스피가 사상 처음으로 8800선을 넘어서며 종가 기준 최고치를 경신했다. 반도체 대장주 삼성전자가 시가총액 사상 첫 2000조원을 돌파하며 지수 상승을 견인했다. 인공지능(AI) 투자 확대와 반도체 이익 전망 상향이라는 호재가 미국·이란 평화 협상의 불확실성을 상쇄했다. 국내외 주요 증권사들은 AI 수요를 근거로 코스피 9000선 안팎을 목표가로 제시했고, 일부는 1만선 시나리오까지 내놨다. 한국은행 기준금리는 연 2.5%로 동결된 상태여서 풍부한 유동성도 증시에 우호적이다. 다만 단기 급등에 따른 과열과 차익 실현 매물 부담은 변수로 꼽힌다. 외국인과 기관의 매수세가 지속될지가 추가 상승의 관건이다.`,
  keyTerms:[{term:`시가총액`,explanation:`주식 가격에 발행된 주식 수를 곱한 값으로, 그 회사 전체의 시장 가치를 뜻한다. 삼성전자가 2000조원을 넘었다는 건 시장이 평가하는 회사 몸값이 그만큼 커졌다는 의미다.`}],
  history:`코스피는 2025년부터 AI·반도체 슈퍼사이클 기대감 속에 가파르게 올랐다. 정부의 밸류업 정책과 기업 지배구조 개선 기대가 더해지며 외국인 자금이 꾸준히 유입됐다. 2026년 들어 글로벌 AI 투자 붐이 본격화하며 반도체 수출과 실적 전망이 함께 뛰었다.`,
  players:`시총 1위 삼성전자와 SK하이닉스가 지수를 좌우하는 핵심 종목이다. 외국인 투자자와 연기금 등 기관이 매수 주체로 작용하고, 한국은행의 금리 정책이 유동성 환경을 결정한다. 증권사 리서치센터들은 잇따라 목표 지수를 상향하고 있다.`,
  current:`삼성전자 시총 2000조 돌파는 한국 증시 체급이 한 단계 올라섰음을 상징하는 사건이다. AI 사이클이 실적으로 확인되며 고평가 부담을 정당화하는 국면이다.`,
  outlook:`6월 중 발표될 반도체 수출 지표와 미국 기술주 흐름, 한국은행 금융통화위원회의 금리 시그널이 추가 상승 여부를 가른다. 단기 과열 조정 가능성도 지켜봐야 한다.`,
  sources:[{title:`삼성전자 시총 2천조·코스피 8800 돌파 - 한국경제`,url:`https://www.hankyung.com/`},{title:`코스피 사상 최고가 마감 - 다음금융`,url:`https://m.finance.daum.net/domestic`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`6월 G10 중앙은행 줄회의…ECB·일본은행 동시 금리 인상 전망`,
  metrics:[`ECB·BOJ 인상 확률 시장 반영 약 80~90%`,`BOJ 현 정책금리 0.75% (4월 동결)`],
  summary:`6월에는 뉴질랜드를 제외한 G10 중앙은행이 모두 통화정책 회의를 연다. 스왑시장은 유럽중앙은행(ECB)과 일본은행(BOJ) 모두 기준금리 인상 확률을 80~90% 수준으로 반영하고 있다. 반면 미국 연방준비제도(Fed)의 6월 금리 변경 가능성은 사실상 0에 가깝게 가격이 매겨졌다. 일본은행은 4월 회의에서 정책금리를 0.75%로 동결했지만, 추가 인상 기조 자체는 유지하고 있다. 시장은 BOJ가 2026년 중 최소 0.5%포인트의 인상을 단행할 것으로 본다. 다만 중동 분쟁이 인플레이션과 경기에 미칠 영향이 인상 시점의 변수로 남아 있다. 유로존 물가 지표는 ECB 결정을 가늠할 핵심 자료로 주목받는다. 주요국 긴축 전환이 글로벌 자금 흐름과 환율에 파장을 일으킬 수 있다.`,
  keyTerms:[{term:`기준금리`,explanation:`중앙은행이 정하는 핵심 정책금리로, 시중 대출·예금 금리의 기준이 된다. 금리를 올리면 돈을 빌리는 비용이 커져 물가와 경기를 식히는 효과가 있다.`}],
  history:`코로나 이후 풀린 유동성으로 2022~2023년 전 세계가 고물가에 시달렸고 주요국은 급격한 긴축에 나섰다. 일본은 오랜 마이너스 금리에서 2024년 탈피한 뒤 점진적 정상화를 진행 중이다. 유럽은 인플레이션 둔화와 경기 사이에서 정책 균형을 찾아왔다.`,
  players:`미국 Fed, 유럽 ECB, 일본 BOJ가 글로벌 금리 흐름의 3대 축이다. 우에다 가즈오 BOJ 총재는 추가 인상 의지를 거듭 밝혀왔다. 채권·외환시장 참가자들이 각국 결정에 베팅하며 환율을 움직인다.`,
  current:`여러 중앙은행이 같은 달에 인상에 나설 가능성이 높아 6월은 통화정책 분수령으로 꼽힌다. 미·일 금리차 축소는 엔화 흐름과 직결된다.`,
  outlook:`6월 각국 통화정책 회의 결과와 유로존 소비자물가지수(CPI) 발표가 분수령이다. 중동 사태에 따른 유가 변동이 인상 속도를 좌우할 전망이다.`,
  sources:[{title:`BoJ keeps policy rate steady while raising inflation forecast - CNBC`,url:`https://www.cnbc.com/2026/04/28/bank-of-japan-keeps-policy-rate-steady-cpi-iran-war-gdp.html`},{title:`Global markets weekly update - T. Rowe Price`,url:`https://www.troweprice.com/personal-investing/resources/insights/global-markets-weekly-update.html`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`닛케이 사상 첫 67,000 돌파…AI·반도체株 랠리에 일본 증시 신고가`,
  metrics:[`닛케이 장중 67,231.28 (사상 최고)`,`소프트뱅크그룹 하루 +14% 급등`],
  summary:`1일 일본 닛케이225 지수가 장중 67,231.28까지 오르며 사상 처음으로 67,000선을 넘었다. 종가는 전 거래일보다 604.83포인트(0.91%) 오른 66,934.33으로 마감해 신고가를 다시 썼다. AI 관련 대형 기술주가 상승을 이끌었고, 특히 소프트뱅크그룹이 하루 14% 폭등했다. 키옥시아(+10.1%), 무라타제작소(+9%) 등 반도체·부품주도 동반 강세를 보였다. 다만 광범위한 종목으로 구성된 토픽스 지수는 0.42% 하락해 대형 기술주 쏠림이 뚜렷했다. 글로벌 AI 투자 붐이 일본 수출 기업 실적 기대를 끌어올린 결과다. 미국·이란 휴전 협상에 따른 위험 선호 회복도 매수세를 거들었다. 한국 코스피 사상 최고와 맞물려 동아시아 증시 동반 강세가 두드러진다.`,
  keyTerms:[{term:`사상 최고`,explanation:`지수나 주가가 역사상 가장 높은 수준에 도달했다는 뜻이다. 그만큼 시장의 낙관과 자금 유입이 강하다는 신호로 읽힌다.`}],
  history:`닛케이는 1989년 거품경제 고점(약 3만8915)을 30여 년 만인 2024년에야 회복한 뒤 가파른 상승세를 이어왔다. 엔저와 기업 지배구조 개혁, 외국인 자금 유입이 상승을 떠받쳤다. 2026년 들어 AI 테마가 추가 동력으로 작용했다.`,
  players:`소프트뱅크그룹, 도쿄일렉트론, 키옥시아 등 AI·반도체 관련주가 지수 상승의 핵심이다. 외국인 투자자가 일본 증시 매수의 주력으로 꼽힌다. 일본은행의 금리 정책과 엔화 환율도 증시 방향에 영향을 준다.`,
  current:`67,000 돌파는 일본 증시가 AI 사이클의 수혜를 정면으로 받고 있음을 보여준다. 다만 토픽스 약세는 상승이 일부 대형주에 집중됐다는 경고이기도 하다.`,
  outlook:`일본은행의 6월 금리 결정과 엔화 흐름이 추가 상승의 변수다. 미국 기술주 동향과 글로벌 AI 투자 지속 여부가 관건이다.`,
  sources:[{title:`Nikkei 225 tops 67,000 for first time - The Japan Times`,url:`https://www.japantimes.co.jp/business/2026/06/01/markets/nikkei-stock-index-above-67000/`},{title:`Tokyo stocks mixed, Nikkei hits fresh record high on tech rise - Big News Network`,url:`https://www.bignewsnetwork.com/news/279095974/tokyo-stocks-mixed-nikkei-hits-fresh-record-high-on-tech-rise`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`6·3 지방선거 D-2…전문가 민주당 우세론 속 격차·격전지 주목`,
  metrics:[`6월 3일 제9회 전국동시지방선거 실시`,`광역단체장 16곳 + 국회의원 재보궐 동시 진행`],
  summary:`6월 3일 제9회 전국동시지방선거를 이틀 앞두고 정치권이 막판 표심 잡기에 총력을 쏟고 있다. 전문가 전망은 더불어민주당 우세론으로 기울었지만, 초점은 승패보다 격차에 맞춰지고 있다. 서울·부산·충남 등 주요 격전지에서는 보수층 결집과 정권 견제론이 막판 변수로 작용 중이다. 민주당은 서울·부산·대구·울산·경남·전북 6곳을 접전 지역으로 분류했다. 최대 화제 지역은 대구로, 김부겸 민주당 후보가 추경호 국민의힘 후보를 상대로 여론조사에서 앞선다는 결과가 나오며 이변 가능성이 거론된다. 서울에서는 정원오 전 성동구청장과 오세훈 현 시장이 맞붙는다. 국민의힘은 인물론과 현역 프리미엄에 기대를 걸고 있다. 여론조사 공표 금지 기간에 들어가면서 막판 표심은 안갯속이다.`,
  keyTerms:[{term:`전국동시지방선거`,explanation:`전국의 시·도지사, 시장·군수, 지방의원 등을 같은 날 한꺼번에 뽑는 선거다. 4년마다 치러지며 현 정부에 대한 중간 평가 성격을 띤다.`}],
  history:`지방선거는 1995년 부활해 4년 주기로 실시돼 왔다. 보통 집권 초반에 치러지면 여당에 유리한 허니문 선거 성격을 띤다. 이번에는 정권 교체 후 첫 전국 단위 선거라 의미가 크다.`,
  players:`더불어민주당과 국민의힘이 16개 광역단체장을 놓고 맞붙는다. 김부겸·추경호(대구), 정원오·오세훈(서울) 등 거물급 대결이 관전 포인트다. 이재명 정부에 대한 평가가 선거 프레임으로 작동하고 있다.`,
  current:`여당 우세 속 보수 결집이라는 변수가 막판에 부상하며 격차가 관전 포인트로 떠올랐다. 전통적 보수 텃밭 대구의 판세가 최대 이변 변수다.`,
  outlook:`6월 3일 투표 결과와 광역단체장 16곳의 여야 분포가 정국 주도권을 좌우한다. 재보궐 결과도 원내 지형에 영향을 준다.`,
  sources:[{title:`제9회 전국동시지방선거 판세 총정리 - JJC`,url:`https://www.jjctv.co.kr/article/view/jjc202605270014`},{title:`사전투표 D-1, 여론조사 블랙아웃 - YTN`,url:`https://www.ytn.co.kr/_ln/0101_202605281241036010`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미국·이란 휴전 연장 합의 임박…트럼프 막판 수정에 핵협상 진통`,
  metrics:[`60일 휴전 연장 MOU 잠정 합의`,`포괄적 합의 시한 6월 30일`],
  summary:`미국과 이란 협상단이 휴전을 60일 연장하고 공식 핵협상을 시작하는 양해각서(MOU)에 잠정 합의했다고 보도됐다. 이르면 호르무즈 해협 통항 재개 기대까지 더해지며 국제 유가가 하락하고 위험 선호 심리가 회복됐다. 그러나 트럼프 대통령이 1일 더 엄격한 핵 약속과 호르무즈 해협 관련 조항을 요구하는 수정안을 돌려보내면서 협상이 최소 일주일 더 늘어졌다. 가장 첨예한 쟁점은 이란의 우라늄 농축 능력으로, 이란이 구체적 핵 양보를 계속 미루고 있다. 협상은 파키스탄의 중재로 진행되고 있다. 2026년 2월 미국·이스라엘의 대규모 공습으로 전쟁이 시작됐고 이란 최고지도자 하메네이가 사망한 바 있다. 6월 30일 시한 내 포괄 합의 도출은 불확실하다는 평가가 나온다.`,
  keyTerms:[{term:`우라늄 농축`,explanation:`천연 우라늄에서 핵분열이 잘 되는 성분의 비율을 높이는 과정이다. 낮은 농도는 원전 연료로, 높은 농도는 핵무기 원료로 쓰일 수 있어 협상의 최대 쟁점이 된다.`}],
  history:`2026년 2월 28일 미국과 이스라엘이 이란을 대규모 공습하며 전쟁이 발발했고 이 과정에서 하메네이가 사망했다. 4월 7일 양측은 2주짜리 임시 휴전에 합의했다. 이후 협상이 이어졌지만 핵 문제에서 번번이 막혔다.`,
  players:`미국 트럼프 행정부와 이란 정부가 당사자이며, 파키스탄이 중재자로 나섰다. 이스라엘의 안보 우려와 호르무즈 해협 통항 문제가 핵심 변수다. 유가에 민감한 글로벌 시장도 협상 결과를 주시한다.`,
  current:`트럼프의 막판 수정 요구로 합의가 다시 미뤄지면서 6월 말 시한 준수 여부가 불투명해졌다. 우라늄 농축 양보를 둘러싼 교착이 최대 고비다.`,
  outlook:`6월 30일 시한과 후속 협상 라운드 결과가 휴전 지속 여부를 가른다. 합의 불발 시 유가 급등과 군사 충돌 재발 위험이 있다.`,
  sources:[{title:`U.S. and Iran reach tentative deal to extend ceasefire - PBS`,url:`https://www.pbs.org/newshour/world/u-s-and-iranian-negotiators-reach-tentative-deal-to-extend-ceasefire-and-start-new-nuclear-talks`},{title:`U.S.-Iran Ceasefire and Negotiations - Congress.gov`,url:`https://www.congress.gov/crs-product/IN12678`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`우크라이나 임시 휴전 발효…트럼프, 주독 미군 5000명 이상 감축 시사`,
  metrics:[`주독 미군 5000명 이상 감축 예고`,`우크라 대선·총선 2026년 연말 전망`],
  summary:`우크라이나 전쟁에서 임시 휴전이 발효된 가운데 러시아는 규모를 축소한 전승절 열병식을 치렀다. 다만 러시아가 우크라이나의 항복을 목표로 하고 있어 전쟁이 2026년 중반 전에 끝나기는 어렵다는 분석이 우세하다. 미국에서는 트럼프 대통령이 독일 주둔 미군을 5000명보다 훨씬 많이 빼겠다고 밝혀 유럽 안보 지형에 파장을 일으켰다. 우크라이나는 미국발 불리한 평화 압박, 대형 정치 부패 스캔들, 러시아의 계속된 진격이라는 삼중고에 직면해 있다. 연말로 예상되는 대통령·의회 선거는 텔레그램·틱톡 등 플랫폼의 영향과 러시아 개입 우려로 혼란이 예상된다. 영국 스타머 총리는 지방선거 패배에도 사임하지 않겠다고 밝혔다. 유럽 정치 전반에 불확실성이 커지고 있다.`,
  keyTerms:[{term:`휴전`,explanation:`전쟁 당사국이 싸움을 일시적으로 멈추기로 한 상태를 말한다. 전쟁을 공식 종결하는 평화협정과 달리 언제든 깨질 수 있는 잠정적 합의다.`}],
  history:`2022년 2월 러시아의 침공으로 시작된 우크라이나 전쟁은 4년 넘게 이어졌다. 미국 정권 교체 이후 워싱턴은 협상을 통한 조기 종전을 강하게 밀어붙여 왔다. 그 과정에서 우크라이나에 불리한 조건이 거론되며 갈등이 불거졌다.`,
  players:`러시아, 우크라이나, 미국이 핵심 당사자이며 유럽 국가들의 안보 부담이 커지고 있다. 트럼프 행정부의 주독 미군 감축은 나토 동맹에 직접 영향을 준다. 젤렌스키 정부는 부패 스캔들과 선거 압박에 시달린다.`,
  current:`임시 휴전과 미군 감축 시사가 맞물리며 유럽 안보 질서가 전환점을 맞고 있다. 연말 선거를 앞둔 우크라이나 내부 정치도 불안정하다.`,
  outlook:`휴전 지속 여부와 후속 평화 협상, 연말 우크라이나 선거 일정이 분수령이다. 미군 감축 규모 확정과 유럽의 대응이 관건이다.`,
  sources:[{title:`What our journalists expect to cover in Ukraine in 2026 - Kyiv Independent`,url:`https://kyivindependent.com/from-russias-war-to-elections-in-ukraine-heres-what-our-journalists-expect-to-cover-in-2026/`},{title:`Russian invasion of Ukraine: Latest news - CNN`,url:`https://www.cnn.com/world/europe/ukraine`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`엔비디아, PC 시장 정조준…AI 슈퍼칩 RTX Spark로 인텔·AMD에 도전장`,
  metrics:[`RTX Spark 탑재 노트북 두께 14mm·가을 출시`,`마이크로소프트·델·HP·에이수스·레노버·MSI 채택`],
  summary:`젠슨 황 엔비디아 CEO가 1일 대만 컴퓨텍스 2026 기조연설에서 새 프로세서 RTX Spark 슈퍼칩을 발표했다. Arm 기반의 이 칩은 마이크로소프트·델·HP·에이수스·레노버·MSI의 노트북에 올가을부터 탑재된다. 첫 노트북은 두께 14mm(약 0.5인치)의 초박형으로 프리미엄 가격대로 출시되며 소형 데스크톱에도 들어간다. 핵심 차별점은 클라우드에 의존하지 않고 PC에서 직접 AI 에이전트를 구동하는 온디바이스 AI다. 엔비디아는 인텔·AMD·퀄컴·애플이 장악해온 PC 메인 프로세서 시장에 정면 진입하게 됐다. 황 CEO는 신형 베라(Vera) CPU도 양산에 들어갔으며 오픈AI·앤스로픽·스페이스X가 조기 도입했다고 밝혔다. 발표 직후 엔비디아 주가는 약 2% 상승했다. AI 칩 패권 경쟁이 데이터센터를 넘어 개인용 기기로 확전됐다.`,
  keyTerms:[{term:`온디바이스 AI`,explanation:`인터넷 클라우드 서버가 아니라 스마트폰이나 노트북 같은 기기 자체에서 AI를 직접 구동하는 방식이다. 속도가 빠르고 개인정보가 외부로 덜 나가 보안에 유리하다.`}],
  history:`엔비디아는 AI 학습용 데이터센터 GPU 시장을 사실상 독점하며 세계 최대 시총 기업으로 올라섰다. 그동안 PC의 핵심 두뇌인 CPU 시장은 인텔·AMD·애플·퀄컴이 나눠 가졌다. AI가 일상 기기로 확산되며 PC용 칩이 새 격전지로 부상했다.`,
  players:`엔비디아(젠슨 황)가 PC 시장에 도전하고, 인텔·AMD·퀄컴·애플이 기존 강자로 맞선다. 마이크로소프트·델·HP 등 PC 제조사가 채택 파트너다. 오픈AI·앤스로픽 등은 베라 CPU 초기 고객이다.`,
  current:`엔비디아가 데이터센터를 넘어 개인용 PC 프로세서로 영역을 넓히는 분기점이다. 온디바이스 AI 시대 주도권 경쟁이 본격화됐다.`,
  outlook:`올가을 RTX Spark 노트북 출시와 시장 반응이 첫 시험대다. 인텔·AMD의 대응 전략과 PC 교체 수요 회복 여부를 지켜봐야 한다.`,
  sources:[{title:`Nvidia enters Windows laptop market, taking on Intel and AMD - Bloomberg`,url:`https://www.bloomberg.com/news/articles/2026-06-01/nvidia-enters-windows-laptop-market-taking-on-intel-and-amd`},{title:`Nvidia jumps into PCs with new Arm-based chip - CNBC`,url:`https://www.cnbc.com/2026/05/31/nvidias-new-chip-to-power-fresh-line-of-windows-laptops-by-dell-hp.html`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`제36회 삼성호암상 시상식 개최…과학·예술 등 6개 부문 수상자 영예`,
  metrics:[`제36회 삼성호암상 시상`,`과학·공학·의학·예술·사회봉사 등 6명 수상`],
  summary:`호암재단이 1일 서울 신라호텔에서 제36회 삼성호암상 시상식을 열고 수상자들에게 상을 수여했다. 과학·공학·의학·예술·사회봉사 등 분야에서 탁월한 업적을 이룬 6명이 수상의 영예를 안았다. 삼성호암상은 故 이병철 삼성 창업회장의 인재제일·사회공헌 정신을 기려 1990년 제정된 국내 최고 권위의 민간 학술·문화 시상으로 꼽힌다. 매년 학술·예술·봉사 분야의 한국인 또는 한국계 인사를 선정해 시상한다. 수상자에게는 상장과 메달, 거액의 상금이 수여된다. 기초과학과 첨단 분야 연구자를 조명해 국가 연구개발 동기 부여에 기여한다는 평가를 받는다. 정부가 과학기술·AI를 통한 대도약을 국정 기조로 내세운 가운데 열려 의미를 더했다. 시상식에는 학계·재계 주요 인사가 참석했다.`,
  keyTerms:[{term:`삼성호암상`,explanation:`삼성 창업주 이병철 회장의 정신을 기려 1990년 만들어진 민간 시상이다. 과학·예술·봉사 등에서 뛰어난 한국인을 매년 뽑아 상과 상금을 주는 국내 최고 권위의 상으로 평가받는다.`}],
  history:`삼성호암상은 1990년 이병철 삼성 창업회장의 호 호암을 따 제정됐다. 36년간 기초과학·의학·공학·예술·사회봉사 분야의 인재를 발굴해 시상해 왔다. 한국 기초연구의 위상을 높여온 대표 상으로 자리 잡았다.`,
  players:`주최는 삼성이 설립한 호암재단이며, 매년 분야별 심사를 거쳐 수상자를 선정한다. 국내외 학계·예술계·봉사 분야 인사가 후보에 오른다. 정부의 과학기술·AI 진흥 기조와도 맞닿아 있다.`,
  current:`과학기술과 AI를 통한 국가 대도약이 화두인 시점에 기초연구자를 조명했다는 점에서 의미가 부각된다. 인재 양성과 연구 동기 부여 효과가 기대된다.`,
  outlook:`수상자들의 후속 연구·활동 성과와 사회적 파급이 주목된다. 정부의 R&D 투자 확대 기조와 맞물린 효과를 지켜봐야 한다.`,
  sources:[{title:`제36회 삼성호암상 시상식 개최 - 연합뉴스`,url:`https://www.yna.co.kr/`},{title:`과학기술·AI로 여는 대한민국 대도약 - 사이언스타임스`,url:`https://www.sciencetimes.co.kr/nscvrg/view/menu/255`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`휴스턴대 연구진, 초전도 신기록…영하 122도서 전기저항 0 구현`,
  metrics:[`초전도 발현 온도 151켈빈(영하 122도)`,`30여 년 만에 기존 기록 경신`],
  summary:`미국 휴스턴대 연구진이 151켈빈(영하 122도)에서 전기저항 없이 전류를 흘려보내는 물질을 만들어 초전도 신기록을 세웠다. 이는 30년 넘게 유지돼온 기존 기록을 깬 성과다. 초전도는 특정 온도 이하에서 전기저항이 완전히 사라지는 현상으로, 전력 손실 없는 송전과 강력한 자기장 활용이 가능해진다. 다만 영하 122도는 여전히 극저온이어서 상온·상압 초전도라는 궁극의 목표까지는 갈 길이 멀다. 같은 시기 연구계에서는 트위스트 광을 이용한 상온 양자소자, 뇌세포 재생을 돕는 비타민K 화합물 등 굵직한 발표가 잇따랐다. 초전도 온도를 끌어올리는 경쟁은 에너지·의료·컴퓨팅 산업을 바꿀 잠재력 때문에 치열하다. 실용화까지는 재현성 검증과 압력 조건 완화가 과제로 남는다.`,
  keyTerms:[{term:`초전도`,explanation:`물질이 특정 온도 이하로 내려가면 전기저항이 완전히 0이 되는 현상이다. 전기를 손실 없이 보내거나 강한 자석을 만들 수 있어 꿈의 기술로 불린다.`}],
  history:`초전도는 1911년 처음 발견됐고, 이후 더 높은 온도에서 작동시키려는 연구가 100년 넘게 이어졌다. 1980~90년대 고온 초전도체 발견으로 한 차례 도약했지만 이후 기록은 오래 정체됐다. 최근 고압 환경을 이용한 신소재 연구가 다시 기록 경신을 이끌고 있다.`,
  players:`휴스턴대 연구진이 이번 기록을 세웠고, 세계 각국 물리학 연구실이 상온 초전도 경쟁을 벌이고 있다. 과거 일부 상온 초전도 주장이 검증 실패로 철회된 전례가 있어 재현성 검증이 중요하다. 에너지·반도체 기업들이 실용화 가능성을 주시한다.`,
  current:`30년 묵은 기록을 깬 것은 상온 초전도라는 난제에 한 걸음 다가섰다는 의미다. 다만 극저온·고압 조건이라 곧바로 산업에 쓰기는 어렵다.`,
  outlook:`독립 연구진의 재현 검증과 작동 압력을 낮추는 후속 연구가 관건이다. 성공 시 무손실 송전과 차세대 컴퓨팅에 혁신을 가져올 수 있다.`,
  sources:[{title:`University of Houston shatters superconductivity record - SciTechDaily`,url:`https://scitechdaily.com/`},{title:`Scientific breakthroughs: 2026 emerging trends - CAS`,url:`https://www.cas.org/resources/cas-insights/scientific-breakthroughs-2026-emerging-trends-watch`}]
}]

  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`종합소득세 신고 마감일이 일요일과 겹쳐 6월 1일로 자동 연장…홈택스 접속 폭주`,
  metrics:[`무신고 가산세 납부세액 20%`,`홈택스 운영시간 06시~24시`],
  summary:`2026년 귀속 종합소득세 정기 신고·납부 마감일이 5월 31일 일요일과 겹치면서 국세청은 마감을 6월 1일 월요일 자정까지로 자동 연장했다. 지각 신고자가 일시에 몰리면서 5월 31일 홈택스와 손택스 접속이 폭주해 일부 메뉴에서 대기 화면이 발생했다. 종합소득세 대상자는 근로소득 외 사업·금융·임대 등 추가 소득이 있는 직장인과 프리랜서, 개인사업자다. 기한 내 신고하지 않으면 납부세액의 20%에 달하는 무신고 가산세가 부과되며, 납부 지연 시 매일 가산세가 추가로 붙는다. 성실신고 확인 대상 고소득 사업자는 6월 말까지 한 달 여유 기간을 추가로 부여받는다. 국세청은 막판 신고자들에게 홈택스 운영시간(06시~24시) 내 분산 접속을 권고하면서, 모바일 손택스 활용을 안내했다. 부부 국민연금 합산 평균 수령액이 월 120만원에 그치는 등 고령층의 노후소득 부족 문제가 함께 부각되면서, 연금·세제 전반에 대한 사회적 관심도 동시에 커졌다.`,
  keyTerms:[{term:`무신고 가산세`,explanation:`정해진 기한 안에 세금 신고를 하지 않았을 때 원래 내야 할 세금에 추가로 매기는 벌금성 세금이다. 종합소득세의 경우 납부세액의 20%가 부과되어 부담이 크게 늘어난다.`}],
  history:`종합소득세는 1975년 도입된 인별 합산 과세 제도로, 매년 5월 한 달간 전년도 소득을 신고·납부하는 방식이다. 디지털 신고 시스템인 홈택스가 자리잡으면서 종이 신고는 사실상 사라졌고, 모바일 손택스로 영역이 확장됐다. 마감일이 주말·공휴일과 겹치면 다음 평일까지 연장되는 행정 관행이 정착됐다.`,
  players:`주관 부처는 국세청이며 기획재정부가 세법 개정을 담당한다. 신고 대상은 근로소득만 있는 직장인을 제외한 거의 모든 소득자로, 1인 사업자·플랫폼 노동자·임대인 등이 핵심 대상이다. 세무 대리인 업계와 핀테크 신고 서비스가 보조 인프라 역할을 한다.`,
  current:`2026년에는 부동산 임대소득·가상자산 양도소득까지 합산 신고 영역이 확대되고, AI 기반 신고 도우미 서비스 이용자가 급증하는 추세다. 마감일 연장과 맞물려 신고 절차에 대한 관심이 정점에 도달했다.`,
  outlook:`6월 말까지 성실신고 확인 대상자 신고가 마무리되고, 7~8월에 추가 환급·고지가 이어진다. 9월 정기국회에서 다뤄질 세법 개정안에서 가상자산·플랫폼 소득 과세 기준이 다시 손질될 전망이다.`,
  sources:[{title:`2026년 5월 31일 오늘의 주요 뉴스(종합소득세 마감부터 지방선거 사전투표율 및 증시 전망까지) - 오늘의 클릭`,url:`https://www.cliktoday.com/2026/05/20260531-today-news.html`},{title:`2026년 5월 종합소득세 신고 방법 - KB금융`,url:`https://kbthink.com/tax-guide/global-income-tax.html`},{title:`종합소득세 신고납부기한 - 국세청`,url:`https://www.nts.go.kr/nts/cm/cntnts/cntntsView.do?mi=2225&cntntsId=7665`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피 8000선 안착, AI·반도체주 주도 속 고평가 우려 점증`,
  metrics:[`코스피 종가 8,047.51 (5월 26일)`,`전 거래일 대비 +199.80포인트(+2.55%)`],
  summary:`한국 증시가 사상 처음 코스피 8000선을 종가 기준으로 안착시키며 글로벌 자금 유입세를 입증했다. 5월 26일 코스피는 전 거래일 대비 199.80포인트(2.55%) 오른 8,047.51로 거래를 마쳤고, 5월 마지막 주 내내 8000선 위에서 등락을 반복했다. 상승을 견인한 것은 인공지능(AI) 인프라 투자 확대 기대감 속 반도체·전력기기·2차전지 대형주였다. 일부 증권사는 연내 코스피 10,000(만피) 돌파 가능성까지 거론하며 목표치를 잇따라 상향 조정했다. 그러나 단기 급등에 따른 고평가 부담과 외국인 차익실현 매물에 대한 경계 목소리도 동시에 커지고 있다. 원·달러 환율은 1,490원~1,520원 사이에서 변동성이 확대되며 외환시장 변수도 상존한다. 다음 주에는 한국은행 금융통화위원회와 미국 비농업 고용지표 발표가 예정돼 있어 변동성 확대 가능성이 제기된다.`,
  keyTerms:[{term:`코스피`,explanation:`한국거래소 유가증권시장에 상장된 우량 대형주를 모아 계산하는 한국의 대표 주가지수다. 1980년 1월 4일을 100포인트로 잡고 시작했고, 지수가 높을수록 한국 대표 기업들의 시가총액이 커졌다는 뜻이다.`}],
  history:`코스피는 1983년 도입 이후 IMF 외환위기(1997), 글로벌 금융위기(2008), 코로나19(2020) 등 위기를 거치며 등락을 반복해 왔다. 2020년 사상 첫 3000선 돌파에 이어 2024~2025년 AI 슈퍼사이클과 정책 부양이 결합돼 가파른 상승세를 보였다. 2026년 들어 8000선 진입은 박스권 탈피 신호로 해석된다.`,
  players:`주요 매수 주체는 외국인과 연기금이고, 매도 주체는 단기 차익실현 개인투자자다. 삼성전자·SK하이닉스·현대차·LG에너지솔루션 등 시총 상위주가 지수에 결정적 영향을 미친다. 한국은행과 금융당국은 거시 변동성 관리 역할을 맡는다.`,
  current:`AI 데이터센터 투자 사이클이 본격화되고 반도체 업황이 회복기에 진입한 점, 정부의 밸류업 정책 효과가 가시화된 점이 동시에 작용했다. 다만 5월 한 달 급등 폭이 크다는 점에서 차익실현 압력도 누적되고 있다.`,
  outlook:`6월 첫째 주 한은 금통위 회의록 공개와 미국 5월 고용지표가 단기 방향성을 결정할 변수다. 7월 2분기 실적 시즌에 진입하면서 AI·반도체 기업 실적이 추가 상승 여부를 가른다.`,
  sources:[{title:`올해 1만피 간다 전망도 줄줄이…코스피, 종가 기준 8000 안착 - 머니투데이`,url:`https://www.mt.co.kr/stock/2026/05/26/2026052615143237371`},{title:`코스피 (KS11) - Investing.com`,url:`https://kr.investing.com/indices/kospi`},{title:`USD KRW 과거 데이터 - Investing.com`,url:`https://kr.investing.com/currencies/usd-krw-historical-data`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미-이란 휴전 협상 기대에 국제유가 5월 19% 폭락, 코로나19 이후 최악의 월간 낙폭`,
  metrics:[`브렌트유 \$92.56 (-1.2%, 5월 -19%)`,`WTI \$87.18 (5월 누적 -16.5%)`],
  summary:`국제 유가가 5월 한 달 동안 약 19% 급락하며 코로나19 팬데믹 이후 가장 큰 월간 낙폭을 기록했다. 5월 30일(현지) 기준 브렌트유는 전일 대비 1.2% 하락한 배럴당 92.56달러에 마감했고, WTI 선물도 1.9% 내린 87.18달러를 기록해 월간 16.5% 빠졌다. 2026년 최고치 대비로는 약 20% 하락한 수준이다. 급락 배경에는 미국과 이란이 60일 휴전 양해각서에 잠정 합의하고 호르무즈 해협 봉쇄 해제 가능성이 커진 점이 핵심으로 작용했다. 2월 말 미-이스라엘 연합의 이란 공습 이후 한때 배럴당 120달러를 넘었던 브렌트유는 협상 진전 신호와 함께 빠르게 되돌림되는 모습이다. 다만 트럼프 대통령이 협상 초안에 핵물질 관련 강경 조항을 추가 요구한 것으로 알려져 합의 지연 위험은 남아 있다. 유가 하락은 글로벌 인플레이션 압력을 완화하지만, 미국 셰일 업계와 산유국 재정에는 부담 요인이다.`,
  keyTerms:[{term:`브렌트유`,explanation:`북해 유전에서 나오는 원유 가격으로, 세계 유가의 기준 역할을 하는 대표 지표다. 배럴(약 159리터) 단위로 거래되며, 중동·아시아 정유사 대부분이 이 가격을 기준으로 원유를 사고팔기 때문에 글로벌 휘발유·항공유 가격에 직접 영향을 준다.`}],
  history:`호르무즈 해협은 전 세계 해상 원유 수송의 약 20%가 통과하는 전략적 길목이다. 2026년 2월 28일 미국과 이스라엘이 이란 핵시설에 대한 대규모 공습을 단행하고 최고지도자 알리 하메네이가 사망하면서 이란이 해협 봉쇄로 맞대응했다. 4월 13일부터 미국은 이란 항구를 동시 봉쇄하는 강수를 뒀다.`,
  players:`미국(트럼프 행정부), 이란(임시 지도부), 이스라엘이 직접 당사자이며, 중국·인도 등 이란산 원유 주요 수입국이 협상 추이를 면밀히 주시한다. OPEC+는 가격 방어를 위한 추가 감산을 검토 중이고, 한국·일본 등 에너지 수입국은 유가 안정을 적극 환영한다.`,
  current:`60일 휴전 양해각서로 군사 충돌은 일시 진정되었으나, 핵물질 사찰 범위와 농축 한도를 둘러싼 이견이 남아 있다. 트럼프 대통령은 5월 31일 결단을 보류하며 추가 압박 카드를 흘리고 있다.`,
  outlook:`6월 중순까지 핵협상 1차 라운드 결과가 도출될 전망이며, 6월 OPEC+ 회의에서 감산 연장 여부도 결정된다. 협상 결렬 시 유가가 다시 100달러대를 넘어설 가능성이 거론된다.`,
  sources:[{title:`Oil drops 20% from 2026 peak on optimism over U.S.-Iran ceasefire talks - CNBC`,url:`https://www.cnbc.com/2026/05/29/oil-prices-iran-ceasefire-us-trump-strait-hormuz-energy-costs.html`},{title:`2026 Strait of Hormuz crisis - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_Strait_of_Hormuz_crisis`},{title:`Economic impact of the 2026 Iran war - Wikipedia`,url:`https://en.wikipedia.org/wiki/Economic_impact_of_the_2026_Iran_war`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`6·3 지방선거 사전투표율 23.5% 역대 최고…민주·국힘 본투표 총력전`,
  metrics:[`최종 사전투표율 23.5% (역대 최고)`,`전남 34.34% vs 대구 15.61%`],
  summary:`6월 3일 실시되는 제9회 전국동시지방선거의 사전투표율이 5월 29~30일 이틀간 23.5%를 기록하며 역대 최고치를 경신했다. 30일 오후 3시 기준 전국 누적 사전투표율은 19.77%로 직전 지방선거 대비 1.65%포인트 높았고, 마감 시간이 다가오며 추가 상승했다. 지역별로는 전남 34.34%, 전북 30.49% 등 호남권이 30%대를 돌파한 반면 대구 15.61%, 경기 17.39%는 상대적으로 낮았다. 이재명 대통령은 31일 권력을 남용한 자들에게 기회를 주는 선거가 돼선 안 된다며 본투표 참여를 호소했다. 격전지인 경남·창원에서는 더불어민주당 김경수 후보와 국민의힘 박완수 후보가 사전투표 직후부터 강행군 유세에 돌입했다. MBC 여론조사 기준 서울·대구는 접전, 부산은 전재수 후보가 오차범위 밖 우세를 보였다. 사전투표율 급등은 양 진영 결집의 상징적 지표로, 본투표 최종 투표율이 60%를 넘어설 가능성도 거론된다.`,
  keyTerms:[{term:`사전투표`,explanation:`본투표일에 투표하기 어려운 유권자를 위해 미리 투표할 수 있게 한 제도다. 별도 신고 없이 전국 어느 사전투표소에서나 투표할 수 있어 편리하며, 한국에서는 2013년 도입 이후 투표율을 끌어올리는 핵심 장치로 자리 잡았다.`}],
  history:`한국 지방선거는 1995년 부활 이후 4년 주기로 실시돼 왔으며, 사전투표는 2013년 재보궐선거에서 처음 도입돼 2014년 지방선거부터 전국 단위로 확대됐다. 사전투표율은 매 선거마다 상승 추세로, 2022년 지방선거 사전투표율 20.62%를 이번에 넘어섰다.`,
  players:`더불어민주당과 국민의힘이 17개 광역단체장 자리를 두고 정면 대결한다. 이재명 대통령 취임 1년 차에 치러지는 첫 전국 단위 선거인 만큼 정권 중간평가 성격이 강하다. 중앙선거관리위원회가 선거 관리 전반을 총괄한다.`,
  current:`사전투표율 역대 최고 경신은 양 진영 지지층 결집이 동시에 이뤄졌음을 시사한다. 호남 강세, 영남 상대적 부진 패턴은 그대로 유지됐고, 수도권 막판 표심이 최종 승부를 가를 변수다.`,
  outlook:`6월 3일 본투표 종료 직후 출구조사가 발표되며, 광역단체장·기초단체장·교육감·지방의원이 한꺼번에 결정된다. 결과는 향후 정부의 노동·복지·부동산 정책 추진 동력에 직접 영향을 미친다.`,
  sources:[{title:`[표]6·3 지방선거 지역별 누적 사전투표율(30일 오후 3시) - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202605301510336580`},{title:`6.3 지방선거, 사전투표율 역대 최고 기록 - MBC 뉴스데스크`,url:`https://www.youtube.com/watch?v=Hc93gTC4COc`},{title:`[MBC여론조사] 서울·대구 접전‥부산 전재수 오차 범위 밖 우세`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6825990_37004.html`}]

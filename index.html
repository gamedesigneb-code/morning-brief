  tag:`2026-05-12`,
  label:`2026년 5월 12일 (화요일)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피, AI 반도체 랠리에 7,822 사상 최고치 돌파…시총 7,000조 원 첫 돌파`,
  metrics:[`코스피 7,822pt (+4.32%), 5거래일 연속 신고가 경신 (5월 11일 기준)`,`코스피·코스닥 합산 시총 7,000조 원(약 4.75조 달러) 사상 첫 돌파, 반도체 수출 5월 1~10일 전년 대비 +149.7%`],
  summary:`5월 11일 코스피 지수는 4.32% 급등하며 7,822포인트에 마감해 사상 최고치를 경신했다. 이번 랠리의 핵심 동력은 반도체 슈퍼사이클로, AI 서버 수요 폭발이 삼성전자와 SK하이닉스 주가를 동반 신고가로 끌어올렸다. 삼성전자는 하루 만에 6.33% 오른 285,500원, SK하이닉스는 11.51% 급등한 188만 원을 각각 기록했다. 5월 1~10일 한국 반도체 수출은 전년 대비 약 150% 폭증하며 역대 최고 수준을 달성했다. 코스피와 코스닥을 합산한 시가총액은 사상 처음으로 7,000조 원을 돌파했다. 한국 증시는 연초 이후 약 75% 급등하며 글로벌 최고 성과 시장으로 부상했다. 이란 전쟁에 따른 글로벌 불확실성에도 불구하고 한국 반도체 기업들은 AI 수혜주로 부각되며 외국인 매수세가 집중되는 양상이다. 전문가들은 AI 인프라 투자 사이클이 적어도 2027년까지 지속될 것으로 전망한다.`,
  keyTerms:[{term:`반도체 슈퍼사이클`,explanation:`반도체 수요가 폭발적으로 늘어나 가격과 생산이 동시에 급등하는 장기 호황 국면을 뜻한다. 이번 사이클은 AI 서버용 고성능 메모리 수요가 핵심 동력으로, 삼성전자와 SK하이닉스 같은 한국 기업들이 최대 수혜를 받고 있다.`}],
  history:`한국 코스피는 2024년까지 2,000~2,800선에서 정체되며 주요 선진국 증시 대비 저평가 상태를 유지했다. 2025년 이재명 정부 출범 이후 반도체·AI 산업 지원 정책이 강화되며 외국인 투자 유입이 본격화됐다. AI 붐으로 메모리 반도체 수요가 폭발하면서 삼성전자·SK하이닉스가 최대 수혜 기업으로 부상했다.`,
  players:`삼성전자와 SK하이닉스는 글로벌 고대역폭메모리(HBM) 시장을 양분하며 AI 반도체 공급의 핵심 축을 담당한다. 엔비디아·마이크로소프트·구글 등 빅테크 기업들의 AI 서버 투자가 한국 반도체 기업의 수주를 끌어올리고 있다. 외국인 투자자들이 반도체 섹터에 집중 매수하며 지수 상승을 주도하고 있다.`,
  current:`이란 전쟁으로 글로벌 공급망 불안이 커졌음에도 AI 수요는 꺾이지 않아 한국 반도체는 강세를 보이고 있다. 코스피 상위 종목이 사상 최고치를 기록하는 반면 하위 종목은 오히려 하락하는 양극화 현상도 심화되고 있다.`,
  outlook:`5월 중순 삼성전자·SK하이닉스 2분기 잠정 실적 발표가 주가 방향을 결정할 주요 변수다. 미-이란 협상 결과에 따른 에너지 가격 변동이 코스피 추가 상승 여부의 핵심 변수가 될 전망이다.`,
  sources:[{title:`KOSPI surges to new peak above 7,800 on chip gains - UPI`,url:`https://www.upi.com/Top_News/World-News/2026/05/11/korea-KOSPI-Korea-Stock-Index-new-high-7800-semiconductor-shares-bull-run/1271778484523/`},{title:`Up 75% Already in 2026, Korea's Stock Market Is Hotter Than Ever - Bloomberg`,url:`https://www.bloomberg.com/news/articles/2026-05-06/up-75-already-in-2026-korea-s-stock-market-is-hotter-than-ever`},{title:`KOSPI Hits Record Highs, But 30% of Stocks Fall Behind - Seoul Economic Daily`,url:`https://en.sedaily.com/finance/2026/05/12/kospi-hits-record-highs-but-30-percent-of-stocks-fall-behind`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`호르무즈 해협 봉쇄 10주째 장기화…사우디 아람코 '연내 해결 불투명' 공개 경고`,
  metrics:[`미국 휘발유 가격 \$2.98 → \$4.52/갤런 (+51.7%), 미국 소비자 에너지 추가 부담 약 200억 달러`,`IEA, 2026년 2분기 글로벌 원유 수요 중동·아태 중심 약 150만 배럴/일 감소 전망`],
  summary:`이란-미국 전쟁으로 촉발된 호르무즈 해협 봉쇄가 10주째 지속되며 글로벌 에너지 시장에 전례 없는 공급 충격을 주고 있다. 전 세계 원유 수출의 약 20%가 통과하는 호르무즈 해협 봉쇄는 개전 초까지만 해도 불가능한 시나리오로 여겨졌으나 현실이 됐다. 세계 최대 산유 기업인 사우디아라비아 국영 아람코가 이 문제가 연내에 해결되지 않을 수 있다고 공개 경고하며 에너지 시장에 충격을 줬다. 미국 내 휘발유 가격은 전쟁 전 갤런당 \$2.98에서 \$4.52로 51.7% 급등해 미국 소비자들에게 약 200억 달러의 추가 에너지 비용을 발생시켰다. 국제에너지기구(IEA)는 2026년 2분기 글로벌 원유 수요 전망을 중동·아시아태평양 지역 중심으로 약 150만 배럴/일 하향 조정했다. 한국 등 에너지 수입 의존도가 높은 아시아 국가들은 대체 공급처 확보와 전략 비축유 방출을 검토 중이다. 에너지 가격 급등은 항공·해운·제조업 전반의 비용을 끌어올려 2차 인플레이션 압력으로 이어지고 있다. 전문가들은 봉쇄가 한 달 더 지속될 경우 글로벌 경기 침체 가능성이 현실화될 수 있다고 경고한다.`,
  keyTerms:[{term:`호르무즈 해협 봉쇄`,explanation:`페르시아만과 오만만을 잇는 좁은 해협인 호르무즈를 선박이 통과하지 못하도록 막는 것을 말한다. 전 세계 원유 수출의 약 20%가 이 해협을 통과하기 때문에, 봉쇄가 길어지면 글로벌 에너지 가격이 급등하고 각국 경제에 큰 충격을 준다.`}],
  history:`호르무즈 해협은 냉전 시절부터 에너지 안보의 핵심 요충지로 꼽혀왔다. 2026년 초 미-이란 전쟁이 발발하자 이란이 보복 카드로 해협 봉쇄를 단행했고, 국제 사회는 빠른 해결을 기대했으나 장기화되고 있다. 과거 1980년대 이란-이라크 전쟁 때도 통항이 위협받았지만 실제 완전 봉쇄는 이번이 사실상 처음이다.`,
  players:`이란은 호르무즈 봉쇄를 협상 레버리지로 활용하며 미국의 제재 해제와 전쟁 배상을 요구하고 있다. 미국은 해군력을 동원해 해협 개방을 압박하지만 이란의 저항으로 성과를 내지 못하고 있다. 사우디아라비아·UAE 등 걸프 산유국들도 수출길이 막혀 생산량 제한에 직면했다.`,
  current:`미-이란 휴전 협상이 교착 상태에 빠지며 봉쇄 해제 시점이 불투명해졌다. 아람코의 공개 경고는 최대 산유국조차 장기 공급 차질을 기정사실화하기 시작했다는 점에서 시장에 강한 신호를 줬다.`,
  outlook:`미-이란 협상 재개 여부가 관건이며, 협상 결렬 시 유가가 배럴당 120달러를 돌파할 수 있다는 전망도 나온다. 다음 주 OPEC+ 긴급회의 개최 여부 및 미국의 전략 비축유 추가 방출 결정이 단기 유가 방향을 결정할 것이다.`,
  sources:[{title:`Resilience amid ruins: Why markets are hitting record highs despite the Iran war - Euronews`,url:`https://www.euronews.com/business/2026/05/06/resilience-amid-ruins-why-markets-are-hitting-record-highs-despite-iran-war-effects`},{title:`Trump says Iran ceasefire is on life support after rejecting peace proposal - NBC News`,url:`https://www.nbcnews.com/world/iran/iran-us-peace-talks-trump-rejects-totally-unacceptable-hormuz-rcna344501`},{title:`Global Economic Outlook May 2026: Growth Holds Amid Inflation & Oil Risks - OTET Markets`,url:`https://otetmarkets.com/blog/otet-view/global-economic-outlook-may-2026-inflation/`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미국 CPI 3.3% 급등으로 연준 금리 인하 더 멀어져…에너지발 인플레이션 재점화`,
  metrics:[`미국 3월 CPI 전년 대비 +3.3% (2월 +2.4%에서 급등), 월간 +0.9% (휘발유 +21.2%)`,`IMF, 2026년 글로벌 성장률 전망 하향 조정…무역장벽·이란 전쟁 리스크 주요 원인`],
  summary:`미국의 3월 소비자물가지수가 전년 동기 대비 3.3% 상승하며 시장 예상을 웃돌았다. 소비자물가지수는 2월의 2.4%에서 한 달 만에 0.9%포인트 급등했는데, 이란 전쟁으로 인한 에너지 가격 폭등이 주된 원인이다. 월간 기준으로도 0.9% 올랐으며, 이 중 휘발유 가격이 한 달 만에 21.2% 급등하며 전체 물가를 주도했다. 이 같은 인플레이션 재가속화로 미 연방준비제도(Fed)의 기준금리 인하 시점이 더욱 불투명해졌다. 시장은 연내 금리 인하 가능성을 크게 줄여 잡기 시작했고, 미 국채 수익률은 상승 압력을 받고 있다. IMF는 2026년 세계경제 성장 전망을 하향 조정하며 무역장벽 확대와 이란 전쟁 여파를 주요 하방 리스크로 지목했다. 한국을 비롯한 아시아 수출 의존 국가들은 달러 강세와 에너지 수입 비용 증가라는 이중 압박을 받고 있다. 물가 재점화가 계속된다면 연준이 오히려 금리를 추가 인상해야 하는 시나리오도 배제할 수 없다.`,
  keyTerms:[{term:`소비자물가지수`,explanation:`가계가 실제로 사는 물건과 서비스의 가격이 얼마나 올랐는지를 보여주는 지표로, CPI라고 줄여 부른다. 이 숫자가 높으면 중앙은행이 금리를 내리기 어려워져 대출 이자와 경기 전반에 영향을 미친다.`}],
  history:`미국은 2022~2023년 40년 만의 최고 인플레이션(9.1%)을 경험한 뒤 연준의 공격적인 금리 인상으로 2024년 말 2%대까지 물가를 잡는 데 성공했다. 2025년부터 금리 인하 사이클에 들어섰으나 이란 전쟁 발발로 에너지 가격이 급등하며 인플레이션이 다시 고개를 들기 시작했다. 2026년 초 CPI가 2%대를 유지했던 것과 달리 3월에는 3.3%로 급반등했다.`,
  players:`미 연방준비제도 제롬 파월 의장은 인플레이션 지속 여부를 신중히 관찰하겠다는 입장을 유지하고 있다. 에너지 기업들은 유가 급등의 수혜를 입고 있지만, 항공·물류·소비재 기업들은 비용 급증으로 실적 압박을 받고 있다. 백악관은 전략비축유 방출 등을 통해 에너지 가격 안정을 시도하고 있다.`,
  current:`이란과의 휴전 협상이 교착 상태에 빠지면서 에너지발 인플레이션이 단기간 해소될 가능성이 낮아졌다. 5월 발표될 4월 CPI 데이터가 3.3%를 넘기면 연준의 금리 인하 계획이 전면 수정될 수 있다.`,
  outlook:`5월 중순 발표될 4월 CPI와 5월 FOMC 의사록이 금리 방향의 핵심 가이드가 될 전망이다. 이란 전쟁 종식 또는 봉쇄 해제가 이뤄지면 에너지 충격이 완화되며 물가도 빠르게 안정될 가능성이 있다.`,
  sources:[{title:`Global Economic Outlook May 2026: Growth Holds Amid Inflation & Oil Risks - OTET Markets`,url:`https://otetmarkets.com/blog/otet-view/global-economic-outlook-may-2026-inflation/`},{title:`May 2026 Economic and Market Update - Crestwood Advisors`,url:`https://www.crestwoodadvisors.com/may-2026-economic-and-market-update/`},{title:`IMF World Economic Outlook April 2026`,url:`https://www.imf.org/-/media/files/publications/weo/2026/april/english/ch1.pdf`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`트럼프, 미-이란 휴전 협상 '생명유지장치' 선언…이란 제안 전면 거부, 전투 재개 가능성 고조`,
  metrics:[`트럼프, 이란 제안을 완전히 받아들일 수 없다며 거부…휴전 협상 붕괴 직전`,`호르무즈 해협 10주 연속 봉쇄, 개전 이후 미국 소비자 에너지 추가 부담 200억 달러`],
  summary:`도널드 트럼프 미국 대통령은 5월 11일 미-이란 휴전 협상이 사실상 붕괴 위기라며 생명유지장치에 기대고 있는 상태라고 밝혔다. 이란이 파키스탄 중재를 통해 전달한 휴전 협상 답변을 트럼프는 공개적으로 거부했다. 이란의 제안은 레바논 전선 포함 전면 종전, 전쟁 피해 배상, 호르무즈 주권 확인, 미국의 해상 봉쇄 해제, 추가 공격 불가 보장, 제재 해제 및 이란산 원유 판매 금지 해제 등을 요구하는 내용이었다. 트럼프 행정부 내에서는 강경파 국방부 관계자들이 전투 재개를 통한 이란 압박을 주장하는 반면, 외교 해결을 지지하는 진영과 충돌하고 있다. 이 휴전 협상이 최종 붕괴하면 이란 전쟁이 더욱 확전될 가능성이 있으며, 이는 글로벌 에너지·금융 시장에 추가 충격을 줄 수 있다. 호르무즈 해협 봉쇄는 이미 10주째 지속되며 미국 내 유가를 역대 최고 수준으로 끌어올리고 있다. 중동 전문가들은 양측의 요구 간격이 너무 커 단기 합의는 어렵다고 분석한다. 협상 결렬 시 사우디아라비아·이스라엘 등 지역 동맹국들의 전략적 대응도 복잡해질 전망이다.`,
  keyTerms:[{term:`휴전 협상`,explanation:`전쟁 중인 양측이 싸움을 잠시 멈추거나 완전히 끝내기 위해 조건을 주고받는 과정을 말한다. 이번 미-이란 휴전 협상은 파키스탄이 중재자 역할을 맡았지만, 양측의 요구 조건 차이가 너무 커 타결에 어려움을 겪고 있다.`}],
  history:`2026년 초 미-이란 핵 협상이 최종 결렬되고 이란이 핵 농축을 무기화 수준으로 가속하자, 미국은 이스라엘과 공조해 이란 핵시설을 공습하며 전쟁이 시작됐다. 이란은 보복으로 호르무즈 해협을 봉쇄하고 레바논 헤즈볼라에 이스라엘 공격을 지시했다. 휴전 교섭은 수차례 시작됐으나 번번이 결렬됐다.`,
  players:`트럼프 대통령은 빠른 협상 타결을 원하지만, 자국 내 강경파와 이란의 소극적 태도 사이에서 줄타기를 하고 있다. 이란 최고지도자 하메네이 후계 체제는 대화보다 지속 저항을 원한다는 신호를 내보내고 있다. 파키스탄은 이슬람권 중재자로서 양측 메시지를 전달하는 역할을 맡고 있다.`,
  current:`이란 측 답변이 공개 거부되면서 휴전 교섭 채널이 사실상 차단됐다. 미 행정부 내 강경파 목소리가 커지며 새로운 군사 옵션 검토가 시작된 것으로 알려졌다.`,
  outlook:`이번 주 미국의 공식 대응 발표가 향후 전쟁·협상 방향을 결정할 분기점이다. 트럼프가 협상 테이블을 완전히 떠나면 대규모 군사 작전 재개 가능성이 높아진다.`,
  sources:[{title:`Trump says ceasefire on life support, slams Iran response - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/5/11/trump-says-ceasefire-on-life-support-slams-iran-response-to-us-proposal`},{title:`Live updates: Trump more seriously thinking of restarting combat operations - CNN`,url:`https://www.cnn.com/2026/05/11/world/live-news/iran-war-proposal-trump`},{title:`Trump says Iran ceasefire is on life support - CNBC`,url:`https://www.cnbc.com/amp/2026/05/11/trump-iran-war-ceasefire-life-support.html`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`러-우크라이나, 승전절 휴전 합의…양측 포로 2,000명 교환으로 트럼프 중재 첫 성과`,
  metrics:[`양국 포로 각 1,000명씩 총 2,000명 교환 합의, 우크라이나 전쟁 이래 최대 규모`,`3일 휴전 기간: 5월 9~11일 (러시아 2차 대전 승전절 연계)`],
  summary:`러시아와 우크라이나가 트럼프 미국 대통령의 중재 하에 승전절 휴전에 합의하며, 러시아 승전절(5월 9일)을 계기로 3일간 전투를 멈추고 양국 포로 각 1,000명씩 총 2,000명을 맞교환하기로 했다. 이번 합의는 트럼프 대통령의 직접적인 외교 중재 결과로, 젤렌스키 우크라이나 대통령과 우샤코프 러시아 외교 보좌관 모두 협정 내용을 공식 확인했다. 젤렌스키 대통령은 포로 송환이 우크라이나의 핵심 요구 중 하나였다며 트럼프 팀의 효과적인 외교를 높이 평가했다. 트럼프는 이번 승전절 휴전을 미국 중재 외교의 성과로 자평하며 추가 평화 협상 의지를 밝혔다. 다만 푸틴은 러시아가 먼저 포로 교환을 제안했는데 우크라이나가 거부했다며 이행 지연을 비판하는 등 마찰이 있었다. 이번 3일 휴전과 대규모 포로 교환은 본격적인 종전 협상으로 이어질 모멘텀이 형성됐다는 기대감을 높였다. 그러나 전선은 여전히 교착 상태이며 양측 간 영토 요구의 간극은 크다. 미국의 중재가 지속적인 외교 채널 역할을 할 수 있을지가 관건이다.`,
  keyTerms:[{term:`승전절 휴전`,explanation:`러시아가 2차 세계대전 승전을 기념하는 5월 9일 승전절을 전후해 전투를 일시 중단하는 것을 말한다. 러시아에서 승전절은 국가 최대 기념일 중 하나로, 이 날을 계기로 한 외교적 제스처는 상징적 의미가 크다.`}],
  history:`러시아-우크라이나 전쟁은 2022년 2월 러시아의 전면 침공으로 시작됐다. 수차례 휴전 시도가 있었으나 번번이 실패했고, 트럼프 집권 이후 미국이 적극적인 중재자 역할을 자임하며 협상 재개 분위기가 형성됐다. 포로 교환은 전쟁 내내 양측 국내 여론에 민감한 인도주의적 사안이었다.`,
  players:`트럼프 대통령은 취임 초부터 우크라이나 전쟁 조기 종식을 공언해왔다. 젤렌스키는 포로 송환과 영토 회복을 협상 최우선 조건으로 내세웠고, 푸틴은 나토 불확장과 우크라이나 중립화를 핵심 요구로 유지하고 있다.`,
  current:`이번 3일 휴전과 대규모 포로 교환은 트럼프 중재 외교의 실질적 첫 성과로, 본격 평화 협상으로 이어질 모멘텀이 형성됐다. 그러나 영토 문제를 둘러싼 양측의 입장 차가 여전히 크다.`,
  outlook:`5월 중·하순 미-러, 미-우크라이나 별도 회담 가능성이 거론되고 있다. 트럼프가 제시하는 잠정 중재안 윤곽이 나올 경우 협상 속도가 빨라질 수 있다.`,
  sources:[{title:`Russia, Ukraine agree to 3-day ceasefire, prisoner exchange - CGTN`,url:`https://news.cgtn.com/news/2026-05-09/Russia-Ukraine-agree-to-3-day-ceasefire-prisoner-exchange-1MZTIBieREI/p.html`},{title:`Russia, Ukraine agree to Victory Day truce and prisoner exchange - Washington Post`,url:`https://www.washingtonpost.com/world/2026/05/08/russia-ukraine-victory-day-ceasefire/`},{title:`Zelenskyy confirms 3-day ceasefire, prisoner swap with Russia - Global Security`,url:`https://www.globalsecurity.org/wmd/library/news/ukraine/2026/05/ukraine-260508-azertac01.htm`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`호르무즈 한국 선박 나무호 드론 피격 공식 확인…공격 주체 놓고 정치권 갈등`,
  metrics:[`미상 비행체 1분 간격 2차례 타격, 선미 좌현에 폭 5m·깊이 7m 파공 확인 (5월 10일 공식 발표)`,`선원 24명(한국인 6명 포함) 중 1명 부상, 이란은 자국 소행 공식 부인`],
  summary:`한국 정부는 5월 10일 호르무즈 해협에서 발생한 HMM 화물선 나무호 화재가 미상 비행체의 외부 타격으로 인한 것임을 공식 확인했다. 비행체는 약 1분 간격으로 두 차례 선미 좌현을 타격해 폭 5m·깊이 7m의 파공을 남겼으며, 기종 및 발사 주체는 현재 미확인 상태다. 나무호는 HMM이 운용하는 대형 중량화물 운반선으로, 5월 4일 아랍에미리트 인근 해역을 이동하던 중 공격을 받았다. 선원 24명 중 1명이 부상을 입었으나 사망자는 없었다. 이란 정부는 자국 소행이라는 주장을 공식 부인하며 증거 제시를 요구했다. 한국 정치권에서는 여당 더불어민주당이 공격 주체를 예단하지 않겠다는 신중한 입장을 취한 반면, 야당 국민의힘은 이를 비판하며 안보 논쟁을 촉발시켰다. 이번 사건은 자유항행권 침해 사례로 국제법 차원에서도 논란이 되고 있어 한국 외교 당국의 대응이 주목된다. 호르무즈 봉쇄 장기화로 한국 경제는 에너지 수입 차질과 해운 안전 위협을 동시에 받고 있다.`,
  keyTerms:[{term:`자유항행권`,explanation:`국제법상 어떤 나라의 선박이든 공해와 국제 해협을 자유롭게 지나다닐 수 있는 권리를 말한다. 나무호 피격은 이 자유항행권을 침해한 사건으로 볼 수 있으며, 한국 정부가 외교적 항의와 배상을 요구할 수 있는 법적 근거가 된다.`}],
  history:`한국은 에너지 수입의 70% 이상을 호르무즈 해협 경유 루트에 의존하고 있어, 이란과의 관계 관리에 항상 조심스러운 입장을 취해왔다. 2019~2021년에도 이란이 한국 선박을 억류한 사례가 있었고, 당시에도 외교적 해결에 수개월이 걸렸다. 이번 전쟁 상황에서 한국은 미국 동맹이지만 직접 교전에는 참여하지 않겠다는 입장을 유지하고 있다.`,
  players:`HMM(구 현대상선)은 한국 최대 해운사로, 나무호는 초대형·초중량 화물 전문 선박이다. 한국 외교부와 국방부 합동 조사단이 사고 경위와 공격 주체 규명을 진행 중이다. 이란은 자국 연루를 부정하며 제3세력 소행을 암시하고 있다.`,
  current:`공격 주체가 미확인인 상태에서 한국의 외교적 대응이 미묘해졌다. 이란을 직접 지목하면 양국 관계가 급격히 악화될 수 있고, 그렇지 않으면 국내 안보 비판에 직면하는 딜레마다.`,
  outlook:`합동 조사단의 비행체 기종 및 발사 주체 최종 규명 결과가 한-이란 관계의 핵심 변수다. 호르무즈 내 한국 선박 안전 확보를 위한 해군 파견 논의도 정치권에서 촉발될 가능성이 있다.`,
  sources:[{title:`나무호 피격 외부 공격 확인…호르무즈 봉쇄 장기화에 한국 경제 빨간불 - 이콘밍글`,url:`https://econmingle.com/economy/namu-ho-attack-hormuz-strait-korea-econo/`},{title:`정부 호르무즈 韓선박 화재는 미상비행체 타격 확인 - 네이트 뉴스`,url:`https://news.nate.com/view/20260510n14479`},{title:`HMM 나무호 피격 사건 - 나무위키`,url:`https://namu.wiki/w/HMM%20%EB%82%98%EB%AC%B4%ED%98%B8%20%ED%94%BC%EA%B2%A9%20%EC%82%AC%EA%B1%B4`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`앤트로픽, 연간반복수익 300억 달러로 오픈AI 추월…에이전틱 AI 기업 채택이 주도`,
  metrics:[`앤트로픽 ARR 300억 달러 달성, 오픈AI ARR 240억 달러 추월 (2026년 5월 기준)`,`성장 동력: 기업용 에이전틱 AI 워크플로 채택 급증, 소비자 챗봇 비중은 감소`],
  summary:`앤트로픽의 연간반복수익(ARR)이 300억 달러에 달해 오픈AI(240억 달러)를 추월한 것으로 파악됐다. 앤트로픽이 AI 기업 매출 1위로 올라선 이 전환의 핵심 원인은 에이전틱 AI 워크플로의 기업 채택 급증이다. 에이전틱 AI란 사람의 지시 없이도 복잡한 업무를 자율적으로 계획하고 실행하는 AI 시스템을 뜻하며, 대기업들의 업무 자동화 수요를 빠르게 흡수하고 있다. 오픈AI가 소비자 대상 ChatGPT 서비스에 집중하는 동안, 앤트로픽은 기업 보안·신뢰성 요구를 충족하는 B2B 에이전트 서비스로 포지셔닝에 성공했다. 이 수치 역전은 AI 산업의 무게 중심이 소비자용 챗봇에서 기업용 자율 에이전트로 이동하고 있음을 상징적으로 보여준다. 노보 노디스크가 오픈AI와 신약개발·제조·공급망 전 분야에 걸친 전략 파트너십을 체결하는 등 제약·의료 분야의 AI 도입도 빠르게 확산되고 있다. 구글과 메타 등도 에이전틱 AI 역량 강화에 총력을 기울이며 앤트로픽을 추격하고 있다. 전문가들은 에이전틱 AI 시장이 향후 2~3년 내 가장 빠르게 성장하는 AI 세그먼트가 될 것으로 전망한다.`,
  keyTerms:[{term:`에이전틱 AI`,explanation:`사람이 일일이 지시하지 않아도 스스로 목표를 정하고, 계획을 세우고, 여러 단계의 작업을 순서대로 실행하는 AI를 말한다. 기업들이 이를 도입하면 반복 업무 자동화와 복잡한 의사결정 지원이 가능해져 운영 비용을 크게 줄일 수 있다.`}],
  history:`앤트로픽은 2021년 오픈AI 출신 연구자들이 창업한 AI 안전 중심 기업으로, 클로드(Claude) 시리즈 모델을 개발해왔다. 2023~2024년에는 오픈AI가 ChatGPT로 시장을 압도했지만, 앤트로픽은 기업 고객 확보에 집중해 아마존·구글의 대규모 투자를 유치했다. 2025년 말부터 기업용 AI 에이전트 수요가 폭발하며 앤트로픽의 성장 속도가 오픈AI를 앞서기 시작했다.`,
  players:`앤트로픽 CEO 다리오 아모데이는 AI 안전성과 기업 신뢰성을 핵심 차별화 포인트로 내세우고 있다. 오픈AI CEO 샘 알트먼은 소비자 시장 확장과 함께 기업 시장 강화에도 드라이브를 걸고 있다. 아마존·구글은 각각 앤트로픽에 수십억 달러를 투자해 전략적 파트너 관계를 맺고 있다.`,
  current:`앤트로픽의 ARR 역전은 AI 패권 경쟁이 단순한 모델 성능 경쟁에서 기업 솔루션 생태계 경쟁으로 진화했음을 보여준다. 오픈AI는 기업 시장 입지를 유지하려 하지만 앤트로픽의 보안·안전성 강점을 뚫기 어려운 상황이다.`,
  outlook:`2026년 하반기에는 구글 딥마인드, 메타 AI가 에이전틱 플랫폼을 강화하며 3파전 구도가 형성될 전망이다. 기업용 AI 에이전트 시장 규모가 2028년 수천억 달러에 달할 것으로 예측되며, 이 시장 선점이 향후 AI 패권을 결정할 것이다.`,
  sources:[{title:`Agentic AI News + AI Breakthroughs 2026 - Crescendo AI`,url:`https://www.crescendo.ai/news/latest-ai-news-and-updates`},{title:`10 Things That Matter in AI Right Now 2026 - MIT Technology Review`,url:`https://www.technologyreview.com/2026/04/21/1135643/10-ai-artificial-intelligence-trends-technologies-research-2026/`},{title:`AI Update May 8 2026 - Marketing Profs`,url:`https://www.marketingprofs.com/opinions/2026/54655/ai-update-may-8-2026-ai-news-and-views-from-the-past-week`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`구글, AI 모델 핵심 병목 해결 'TurboQuant' 공개…KV 캐시 메모리 부담 획기적 감소`,
  metrics:[`TurboQuant: PolarQuant 벡터 회전 + Quantized JL 압축 2단계 방식, KV 캐시 메모리 오버헤드 대폭 절감`,`구글 오픈소스 모델 Gemma 4 동시 출시, Apache 2.0 라이선스 무상 공개`],
  summary:`구글 연구팀이 국제학회 ICLR 2026에서 대형 AI 모델의 핵심 병목 문제인 KV 캐시 메모리 부담을 획기적으로 줄이는 알고리즘 TurboQuant를 공개했다. KV 캐시란 AI 모델이 긴 문맥을 처리할 때 이전 연산 결과를 저장해두는 메모리 구조로, 모델이 커질수록 메모리를 대량 소모하는 현재 AI 인프라의 최대 비용 요인 중 하나다. TurboQuant는 PolarQuant 벡터 회전과 Quantized Johnson-Lindenstrauss 압축법을 결합한 2단계 방식으로 KV 캐시를 압축해 모델 성능을 거의 유지하면서 메모리 효율을 크게 끌어올렸다. 이 기술이 상용화되면 AI 모델 운용 비용이 대폭 절감되고 더 긴 문맥창을 가진 모델을 저렴하게 배포할 수 있게 된다. 구글은 같은 시기에 고급 추론과 에이전틱 워크플로에 특화된 오픈소스 모델 Gemma 4도 Apache 2.0 라이선스로 무상 공개했다. 연구계와 스타트업 생태계는 Gemma 4 공개로 AI 모델 접근성이 크게 높아질 것으로 기대하고 있다. 이 같은 구글의 공세는 앤트로픽과 오픈AI의 시장 점유율을 직접 위협한다. AI 인프라 비용 절감 기술은 2026년 AI 산업의 핵심 경쟁 축으로 부상하고 있다.`,
  keyTerms:[{term:`KV 캐시`,explanation:`AI 언어 모델이 긴 글을 읽고 답할 때, 앞에서 이미 계산한 정보를 버리지 않고 임시 저장해두는 메모리 공간이다. 저장 양이 많아질수록 컴퓨터 메모리를 많이 차지해 비용이 올라가기 때문에, 이를 효율적으로 줄이는 기술이 AI 산업의 중요한 과제로 꼽힌다.`}],
  history:`대형 언어 모델(LLM)이 더 긴 문맥을 처리할수록 KV 캐시 메모리 사용량이 폭발적으로 늘어나는 문제는 2023년부터 AI 연구계의 핵심 과제로 인식됐다. 구글, 메타, 마이크로소프트 등 주요 AI 기업들이 이 문제 해결에 수년간 투자해왔다. ICLR은 AI·머신러닝 분야 최상위 국제 학술대회 중 하나로, 이곳에서 발표되는 기술은 업계 표준으로 자리잡는 경우가 많다.`,
  players:`구글 딥마인드와 구글 리서치 팀은 TurboQuant 개발의 주역으로, AI 인프라 효율성 분야에서 경쟁우위를 노리고 있다. 엔비디아는 GPU 하드웨어 차원에서 이 같은 알고리즘 발전과 연동한 최적화를 병행해왔다. 학계와 스타트업들은 Gemma 4 같은 오픈소스 모델을 기반으로 특화 AI 서비스를 개발하는 방향으로 전략을 세우고 있다.`,
  current:`TurboQuant와 Gemma 4의 동시 공개는 구글이 AI 인프라 비용 절감과 오픈소스 생태계 주도권이라는 두 가지 전략을 동시에 추진하고 있음을 보여준다. 이는 폐쇄형 모델로 수익을 추구하는 오픈AI·앤트로픽과의 차별화 전략이기도 하다.`,
  outlook:`TurboQuant가 실제 제품에 적용되면 AI 모델 운용 단가가 하락해 기업 채택 속도가 더욱 빨라질 전망이다. 오픈소스 Gemma 4를 기반으로 한 한국형 특화 AI 모델 개발 움직임도 주목할 만하다.`,
  sources:[{title:`TLT AI Brief May 2026 - TLT LLP`,url:`https://www.tlt.com/insights-and-events/insight/ai-brief-may-2026`},{title:`LLM News Today May 2026 - LLM Stats`,url:`https://llm-stats.com/ai-news`},{title:`AI Update May 8 2026 - Marketing Profs`,url:`https://www.marketingprofs.com/opinions/2026/54655/ai-update-may-8-2026-ai-news-and-views-from-the-past-week`}]

  headline:`삼성·SK하이닉스, AI 서버 수요에 반도체 수출 150% 폭증…Q1 영업이익 역대 최고`,
  metrics:[`삼성전자 Q1 2026 반도체 사업 매출 81.7조 원·영업이익 53.7조 원 (역대 최고)`,`한국 반도체 수출 4월 800억 달러 돌파 (2개월 연속), 5월 1~10일 전년 대비 +149.7%`],
  summary:`AI 데이터센터 투자 붐으로 한국 반도체 기업들이 기록적인 수출 성과를 달성하고 있다. 삼성전자 반도체 사업부는 2026년 1분기 매출 81.7조 원, 영업이익 53.7조 원을 기록해 역대 최고 실적을 달성했다. 핵심 성장 동력은 고대역폭메모리로, AI 그래픽처리장치(GPU)와 함께 작동하는 고대역폭메모리는 수요가 공급을 크게 초과하는 상황이 수년간 지속될 것으로 전망된다. SK하이닉스도 고대역폭메모리 생산을 공격적으로 늘리며 엔비디아·마이크로소프트·구글 등 빅테크 기업들의 AI 서버 주문을 수주하고 있다. 한국의 4월 반도체 수출은 800억 달러를 돌파해 2개월 연속 사상 최고치를 경신했다. 5월 1~10일 반도체 수출은 전년 동기 대비 149.7% 폭증하며 상승세가 꺾이지 않고 있다. 고대역폭메모리 수요는 2025년 전년 대비 130% 성장에 이어 2026년에도 70% 이상 성장이 예상된다. 한국 반도체 산업의 폭발적 성장은 코스피 사상 최고치와 맞물려 한국 경제 전반의 활력으로 이어지고 있다.`,
  keyTerms:[{term:`고대역폭메모리`,explanation:`HBM이라고도 부르는 고성능 메모리 반도체로, AI 연산에 필요한 방대한 데이터를 빠르게 처리할 수 있도록 설계됐다. AI 가속기(GPU) 옆에 바로 붙여서 사용하며, 현재 삼성전자와 SK하이닉스가 세계 공급의 대부분을 담당하고 있다.`}],
  history:`한국 반도체 산업은 D램·낸드 플래시 분야에서 수십 년간 세계 1위를 유지해왔다. 2023년 AI 붐이 시작되며 고대역폭메모리가 AI 가속기의 핵심 부품으로 부상했고, 삼성전자·SK하이닉스는 빠르게 생산 라인을 확대해 시장을 선점했다. 미국의 대중국 반도체 수출 규제로 중국 기업들의 조달이 막히면서 한국 기업들의 수혜가 더욱 커졌다.`,
  players:`삼성전자와 SK하이닉스는 글로벌 고대역폭메모리 시장 점유율 합계 약 90% 이상을 차지하고 있다. 엔비디아·AMD 등 AI 반도체 설계 기업들이 수요를 창출하고, 마이크로소프트·구글·메타 등 빅테크가 대규모 AI 서버를 발주하고 있다. 미국 정부는 첨단 반도체 공급망에서 한국 기업들의 역할을 전략적으로 지원하고 있다.`,
  current:`고대역폭메모리 수요가 공급을 크게 초과하는 구조가 최소 2027년까지 지속될 것으로 예측되며, 삼성전자는 이 격차가 더 벌어질 수 있다고 경고했다. AI 인프라 투자 경쟁이 격화될수록 한국 반도체 기업들의 수혜는 더욱 커진다.`,
  outlook:`삼성전자의 HBM4 양산 시점과 SK하이닉스의 차세대 제품 점유율 유지 여부가 하반기 실적의 핵심 변수다. 미-이란 전쟁 및 글로벌 무역 환경 변화가 공급망에 미치는 영향도 계속 모니터링이 필요하다.`,
  sources:[{title:`AI Boosts Korea's Exports and Strains Global Memory - Cloud News`,url:`https://cloudnews.tech/ai-boosts-koreas-exports-and-strains-global-memory/`},{title:`Semiconductors in 2026: The AI-Driven Upswing Meets Structural Bottlenecks - Medium`,url:`https://medium.com/@adnanmasood/semiconductors-in-2026-the-ai-driven-upswing-meets-structural-bottlenecks-3568b004905b`},{title:`HBM technology landscape 2026: market and AI demand - PatSnap`,url:`https://www.patsnap.com/resources/blog/articles/hbm-technology-landscape-2026-market-and-ai-demand/`}]
}]

  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`트럼프, 이란 역제안 전면 거부 — 브렌트유 4% 급등 \$104 돌파, 이번 주 CPI·Fed 의장 인준 주목`,
  metrics:[`브렌트유 +4% → \$104.01/bbl, WTI +2.7% → \$97.97/bbl (협상 결렬 우려)`,`S&P 500 7,300대 유지, 코스피 4.32% 급등 7,822.24 역대 최고 경신`],
  summary:`이란이 미국의 종전 제안에 '호르무즈 해협 주권 인정 + 전쟁 배상금'을 역으로 요구하는 역제안을 제시하자, 트럼프 대통령이 소셜미디어에 '전혀 받아들일 수 없다(TOTALLY UNACCEPTABLE)'고 강경 반응하며 협상 결렬 우려가 커졌다. 이에 국제 유가가 즉각 반응해 브렌트유는 4% 올라 배럴당 \$104.01, WTI는 2.7% 오른 \$97.97을 기록했다. 반면 지난 5월 초 미-이란 협상 기대감 속에 급락했던 유가가 재차 \$100선을 넘어서며 인플레이션 재점화 경계감이 높아지고 있다. 글로벌 주식시장은 혼조세를 보였다. S&P 500은 7,300대를 유지했고, 한국 코스피는 반도체 랠리에 힘입어 4.32% 급등해 역대 최고치인 7,822.24를 경신했으며 SK하이닉스는 11% 이상 급등했다. 이번 주 최대 이벤트는 5월 12일(화) 미국 4월 CPI 발표(헤드라인 +3.7%YoY 예상)와, 5월 15일 파월 의장 임기 종료에 따른 케빈 워시 신임 Fed 의장 인준 표결이다. 유가 재급등이 CPI 서프라이즈를 유발할 경우 금리 인하 기대가 다시 후퇴할 수 있어 시장 변동성 확대가 예상된다.`,
  keyTerms:[],
  history:`2026년 3~4월 미국의 대이란 군사 행동 이후 이란은 호르무즈 해협을 실질적으로 봉쇄하며 전 세계 원유·LNG 공급량의 약 20%가 묶였다. 유가는 한때 배럴당 \$130대까지 치솟았고 글로벌 인플레이션이 재점화됐다. 4월 초 임시 휴전 합의 이후 유가가 \$94~\$101선으로 급락했으나, 항구적 종전 협상은 줄곧 난항을 겪었다.`,
  players:`트럼프 행정부는 최대 압박을 유지하면서 종전 협상을 주도하려 하며 군사 옵션 재개 가능성도 열어두고 있다. 이란은 핵 주권 보장·제재 해제·배상금 수령을 목표로 협상 조건을 높이고 있다. 파키스탄은 양측 메시지 전달 채널 역할을 하고 있으며, 중국은 이란 최대 원유 수입국으로서 해협 재개에 경제적 이해관계가 크다. 산유국들과 해운업계는 호르무즈 재개 시점을 예의주시하고 있다.`,
  current:`이란의 역제안은 미국이 수용하기 어려운 조건(호르무즈 주권+배상금)을 포함해 협상이 사실상 원점으로 돌아갔다는 평가가 나온다. 트럼프가 강경 입장을 유지하면서 군사 옵션 재개 가능성이 다시 부각되고 있고, 이것이 유가 급등의 직접 원인이 됐다.`,
  outlook:`5월 12일 CPI 발표에서 유가 급등의 영향으로 헤드라인 수치가 예상치를 웃돌 경우 금리 인하 기대가 크게 후퇴할 수 있다. 5월 15일 케빈 워시 Fed 의장 인준 여부도 통화정책 방향 가늠자가 된다. 이란 협상이 완전 결렬될 경우 유가 재차 \$115~\$120 시나리오까지 열려 있다.`,
  sources:[{title:`Oil jumps 4% as Trump rejects Iran's response to ceasefire proposal — Euronews`,url:`https://www.euronews.com/business/2026/05/11/oil-jumps-4-after-trump-rejects-irans-response-to-ceasefire-proposal`},{title:`Markets dip as US-Iran ceasefire goes nowhere, leaving Trump with a military option to reopen Hormuz — Fortune`,url:`https://fortune.com/2026/05/10/markets-dow-futures-crude-oil-prices-us-iran-ceasefire-trump-military-option-strait-of-hormuz/`},{title:`Asia markets live updates: Nikkei, Kospi, Hang Seng — CNBC`,url:`https://www.cnbc.com/2026/05/11/asia-markets-today-live-updates-nikkei-kospi-hang-seng-sensex-csi-300-iran-hormuz.html`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`러-우 3일 휴전 붕괴 — 양측 16,000건 이상 위반 상호 비난, 전선 교전 전면 재개`,
  metrics:[`러시아 주장: 우크라이나가 24시간 내 16,071건 휴전 위반 저질렀다`,`우크라이나 주장: 러시아 60차례 공격 감행, 민간인 1명 사망·15명 부상`],
  summary:`트럼프 대통령이 중재한 러시아-우크라이나 3일 휴전(5월 9~11일, 러시아 전승절 기념)이 사실상 붕괴됐다. 러시아 국방부는 우크라이나가 24시간 내 드론·포격으로 크림반도, 벨고로드주, 쿠르스크주 등에서 총 16,071건의 휴전 위반을 저질렀다고 주장했다. 우크라이나는 반박하며 러시아가 60차례 공격을 감행했고 민간인 1명이 사망하고 15명이 부상했다고 밝혔다. 젤렌스키 대통령은 러시아가 휴전을 준수하지도, '지키려는 노력조차 하지 않는다'고 강하게 비난했다. 양측은 대규모 도시 공습은 소강상태를 보였으나 전선 교전은 완전히 재개됐다. 앞서 부활절 등 여러 차례 합의된 임시 휴전이 모두 실질적 성과 없이 붕괴된 전례가 반복됐다. 한편 푸틴은 별도 회견에서 전쟁이 '끝나가고 있다'고 시사하며 제3국에서 젤렌스키와 만날 의향을 내비쳐 상반된 신호를 보냈다.`,
  keyTerms:[],
  history:`러시아는 2022년 2월 우크라이나를 전면 침공했고, 4년 이상 이어진 전쟁은 교착 상태에 빠졌다. 트럼프 2기 행정부 출범 이후 미국은 적극적인 중재자로 나섰으나 부활절·러시아 연방 기념일 등 여러 차례 합의된 임시 휴전은 모두 실패했다. 양측 간 근본적 불신이 해소되지 않은 채 미봉적 휴전만 반복되고 있다.`,
  players:`트럼프 대통령은 빠른 종전을 공약으로 내세운 만큼 중재 실패가 정치적 부담이 되고 있다. 푸틴은 '협상 용의'를 시사하면서도 실제 교전을 멈추지 않는 이중 전략을 구사하고 있다. 젤렌스키는 실질적 안전 보장 없이는 어떤 휴전도 용납할 수 없다는 입장이다. 유럽 동맹국들은 미국의 지원 지속 여부에 촉각을 세우고 있다.`,
  current:`휴전 붕괴는 종전 협상이 여전히 요원함을 재확인시켰다. 러-우 양측의 상호 비난이 외교적 모멘텀을 완전히 소진시키는 분위기이며, 트럼프의 다음 중재 시도가 어떤 형태가 될지 불확실하다.`,
  outlook:`5월 14~15일 트럼프-시진핑 베이징 정상회담에서 러시아-우크라이나 전쟁 중재 문제도 의제로 다뤄질 가능성이 있다. 푸틴의 '만남 의향' 발언이 단순한 외교적 제스처인지 실질적 신호인지가 단기 최대 관전 포인트다. 휴전 추가 합의 실패 시 유럽 에너지·곡물 가격 불안과 방산 지출 확대 압력이 지속될 전망이다.`,
  sources:[{title:`Russia and Ukraine accuse the other of ceasefire violations — Al Jazeera`,url:`https://www.aljazeera.com/video/newsfeed/2026/5/11/russia-and-ukraine-accuse-the-other-of-ceasefire-violations`},{title:`Russia and Ukraine accuse each other of violating U.S.-brokered ceasefire — CBS News`,url:`https://www.cbsnews.com/news/russia-ukraine-accuse-each-other-ceasefire-violations/`},{title:`Russia and Ukraine accuse each other of violating U.S.-brokered three-day ceasefire — PBS NewsHour`,url:`https://www.pbs.org/newshour/amp/world/russia-and-ukraine-accuse-each-other-of-violating-u-s-brokered-three-day-ceasefire`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`트럼프-시진핑 베이징 정상회담 5월 14~15일 확정 — 대만 최우선 의제, 이란·AI·희토류·무역도 논의`,
  metrics:[`정상회담 일정: 2026-05-14(목)~15(금), 베이징 — 트럼프 13일 저녁 도착 예정`,`세계 60개국 이상 지도자가 회담 결과를 촉각 주시 중 (CNBC 보도)`],
  summary:`미국과 중국이 도널드 트럼프 대통령의 베이징 방문 일정을 5월 14~15일로 공식 확정했다. 트럼프는 13일 저녁 베이징에 도착해 14일 시진핑 주석과 첫 공식 정상회담을 갖는다. 중국 측은 대만 문제를 가장 중요한 의제로 명시했고, 미국도 이를 수용해 대만 해협 안정화 여부가 핵심 관전 포인트가 됐다. 시진핑은 트럼프에게 대만 독립 반대 공식 표명과 무기 판매 제한을 압박할 것으로 예상된다. 이 밖에도 중국의 이란·러시아 관계, AI·반도체 기술 통제, 희토류 공급 확대, 농산물·보잉 항공기 구매 계약 등 광범위한 의제가 다뤄진다. 싱가포르부터 브뤼셀까지 60개국 이상의 정상들이 이 회담의 결과를 예의주시하고 있으며, 무역·안보·에너지 질서 전반에 영향을 줄 것으로 관측된다. 전문가들은 회담이 劇的 합의보다는 '관계 안정화'에 초점을 맞출 가능성이 높다고 분석한다.`,
  keyTerms:[],
  history:`미-중 관계는 반도체·AI 패권 경쟁, 대만 해협 긴장, 무역 갈등을 축으로 구조적 대립이 심화돼 왔다. 트럼프 2기 출범 이후 양측은 관세 협상과 갈등을 반복했고, 지난해 한국에서 열린 미-중 정상회담에서는 대만 문제가 의도적으로 배제됐다. 이번 베이징 회담은 트럼프 집권 2년차 첫 중국 방문으로, 관계 재설정의 전환점으로 주목된다.`,
  players:`트럼프는 무역 패키지 딜(중국의 농산물·보잉 구매)과 이란·러시아 관계 차단을 협상 카드로 활용하려 한다. 시진핑은 대만 문제에서 미국의 양보를 이끌어내고 희토류 수출 협력을 활용해 전략적 레버리지를 높이려 한다. 대만은 자국의 운명이 결정될 수 있는 회담을 긴장 속에 주시하고 있다. 한국·일본·유럽 등 동맹국들은 반도체 공급망과 대중 무역 정책 변화를 우려하며 촉각을 곤두세우고 있다.`,
  current:`이란 전쟁 중 중국이 이란과의 관계를 어떻게 유지하고 있는지가 트럼프의 핵심 문제 제기 사안이다. 회담 직전 희토류 공급 협력 패키지가 부상하면서 미-중 간 거래 성사 가능성도 제기되고 있다.`,
  outlook:`회담 결과는 대만 해협 긴장 수위, 반도체·AI 수출통제 완화 여부, 이란 전쟁 해법에 직접적 영향을 미친다. 양측 이해관계 충돌이 크고 국내 정치 압박도 있는 만큼 劇的 합의보다는 부분 합의 + 후속 협의 로드맵 제시 수준에 그칠 것이라는 전망이 우세하다. 회담 결렬 시 대만 해협 및 반도체 공급망 충격이 금융시장에 즉각 반영될 수 있다.`,
  sources:[{title:`From Singapore to Brussels, world leaders eye Trump-Xi summit from afar — CNBC`,url:`https://www.cnbc.com/2026/05/11/trump-xi-summit-beijing-global-leaders-iran-war-taiwan-strait-of-hormuz-.html`},{title:`US-China relations: What to expect from the Trump-Xi summit — World Economic Forum`,url:`https://www.weforum.org/stories/2026/05/what-to-expect-trump-xi-summit-china-us/`},{title:`Taiwan tops Beijing's agenda for Trump-Xi summit — The Standard HK`,url:`https://www.thestandard.com.hk/china/article/330674/Taiwan-tops-Beijings-agenda-for-Trump-Xi-summit`}]

let current = null;
let currentCat = null;
const CAT_ORDER = ['경제', '정치', '기타 이슈'];

function renderSidebar() {
  const list = document.getElementById('date-list');
  list.innerHTML = '';
  BRIEFS.forEach((b, i) => {
    const el = document.createElement('div');
    el.className = 'date-item' + (i === 0 ? ' active' : '');
    el.dataset.tag = b.tag;
    const parts = b.tag.split('-');
    const short = parts[1] + '/' + parts[2];
    el.innerHTML = b.tag;
    el.addEventListener('click', () => showBrief(b.tag));
    list.appendChild(el);
  });
}

function showBrief(tag) {
  current = tag;
  document.querySelectorAll('.date-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tag === tag);
  });
  const brief = BRIEFS.find(b => b.tag === tag);
  if (!brief) return;

  // 카테고리별 그룹핑
  const grouped = {};
  brief.stories.forEach(s => {
    if (!grouped[s.category]) grouped[s.category] = [];
    grouped[s.category].push(s);
  });
  const availableCats = CAT_ORDER.filter(c => grouped[c] && grouped[c].length);
  if (!availableCats.length) return;

  // 기본 카테고리 결정
  if (!availableCats.includes(currentCat)) currentCat = availableCats[0];

  renderContent(brief, grouped, availableCats);
}

function renderContent(brief, grouped, availableCats) {
  const content = document.getElementById('content');
  let html = `<div class="sticky-top">
    <div class="brief-header">
      <div class="bh-eyebrow">Morning Brief</div>
      <h2>${brief.label}</h2>
    </div>`;

  // 탭
  html += '<div class="cat-tabs">';
  availableCats.forEach(c => {
    const cls = c === currentCat ? 'cat-tab active' : 'cat-tab';
    html += `<button class="${cls}" data-cat="${c}">${c}</button>`;
  });
  html += '</div></div>';

  // 선택된 카테고리 기사들
  const stories = grouped[currentCat] || [];
  stories.forEach((s, idx) => {
    if (idx > 0) html += '<hr class="story-divider">';
    html += `<div class="story">
      <div class="story-top">
        <div class="story-headline">${s.headline}</div>
      </div>`;
    if (s.metrics.length) {
      html += '<div class="metrics">';
      s.metrics.forEach(m => { html += `<div class="metric-chip">${m}</div>`; });
      html += '</div>';
    }
    // 요약문에 핵심 개념 밑줄 (출력은 박스 다음)
    let summaryHtml = s.summary;
    if (s.keyTerms && s.keyTerms.length) {
      s.keyTerms.forEach(kt => {
        if (!kt.term) return;
        const safe = kt.term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const re = new RegExp(safe, 'g');
        summaryHtml = summaryHtml.replace(re, `<span class="kt-underline">${kt.term}</span>`);
      });
    }

    // 핵심 개념 박스 (요약 위)
    if (s.keyTerms && s.keyTerms.length) {
      html += '<div class="key-terms"><div class="key-terms-title">핵심 개념</div>';
      s.keyTerms.forEach(kt => {
        html += `<div class="kt-item">
          <span class="kt-term">${kt.term}</span>
          <span class="kt-exp">${kt.explanation}</span>
        </div>`;
      });
      html += '</div>';
    }

    html += `<div class="summary">${summaryHtml}</div>`;

    const bgSections = [
      ['역사적 맥락', s.history],
      ['핵심 플레이어', s.players],
      ['현재 구도', s.current],
      ['향후 전망', s.outlook],
    ].filter(([, v]) => v);

    if (bgSections.length) {
      html += '<div class="bg-box"><div class="bg-box-title">배경 스토리</div>';
      bgSections.forEach(([label, text]) => {
        html += `<div class="bg-section">
          <div class="bg-section-label">${label}</div>
          <div class="bg-section-text">${text}</div>
        </div>`;
      });
      html += '</div>';
    }

    if (s.sources.length) {
      html += `<button class="sources-toggle" data-toggle="srcs-${idx}">출처 ${s.sources.length}개 보기 <span class="arrow">▾</span></button>`;
      html += `<div class="sources-body" id="srcs-${idx}">`;
      s.sources.forEach((src, si) => {
        html += `<div class="source-item">
          <span class="src-num">${si+1}</span>
          <a href="${src.url}" target="_blank">${src.title}</a>
        </div>`;
      });
      html += '</div>';
    }
    html += '</div>';
  });

  content.innerHTML = html;

  // 탭 클릭 핸들러
  content.querySelectorAll('.cat-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      renderContent(brief, grouped, availableCats);
    });
  });

  // 출처 토글
  content.querySelectorAll('.sources-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const body = document.getElementById(btn.dataset.toggle);
      const isOpen = body.classList.toggle('open');
      btn.classList.toggle('open', isOpen);
    });
  });

  document.getElementById('main').scrollTop = 0;
}

if (BRIEFS.length > 0) {
  renderSidebar();
  showBrief(BRIEFS[0].tag);
} else {
  document.getElementById('content').innerHTML = '<div class="empty">브리핑 데이터가 없습니다.</div>';
}

// ── Quiz Gate ──
const PASS_TARGET = 3;
let correctCount = 0;
const usedIndexes = new Set();

function pickQuestion() {
  // 사용 안 한 문제 중 랜덤. 다 썼으면 풀 리셋
  if (usedIndexes.size >= QUIZ.length) usedIndexes.clear();
  let idx;
  do { idx = Math.floor(Math.random() * QUIZ.length); } while (usedIndexes.has(idx));
  usedIndexes.add(idx);
  return QUIZ[idx];
}

function updateCounter() {
  document.getElementById('quiz-counter').textContent = `(${correctCount}/${PASS_TARGET})`;
}

function renderQuiz() {
  const q = pickQuestion();
  document.getElementById('quiz-q').textContent = q.q;
  updateCounter();
  const feedback = document.getElementById('quiz-feedback');
  feedback.textContent = '';
  feedback.className = 'quiz-feedback';
  const closeBtn = document.getElementById('quiz-close');
  closeBtn.classList.add('hidden');

  const choicesEl = document.getElementById('quiz-choices');
  choicesEl.innerHTML = '';
  q.a.forEach((text, idx) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-choice';
    btn.textContent = text;
    btn.addEventListener('click', () => {
      const allBtns = choicesEl.querySelectorAll('.quiz-choice');
      allBtns.forEach(b => b.disabled = true);
      if (idx === q.correct) {
        btn.classList.add('correct');
        correctCount++;
        updateCounter();
        if (correctCount >= PASS_TARGET) {
          feedback.textContent = '통과! 들어와도 좋아.';
          feedback.className = 'quiz-feedback right';
          closeBtn.classList.remove('hidden');
        } else {
          feedback.textContent = '역시 맞출 줄 알았어. 다음 문제 고.';
          feedback.className = 'quiz-feedback right';
          btn.blur();
          setTimeout(() => {
            if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
            renderQuiz();
          }, 900);
        }
      } else {
        btn.classList.add('wrong');
        feedback.textContent = '정말 실망이다.... 다음.';
        feedback.className = 'quiz-feedback wrong';
        btn.blur();
        setTimeout(() => {
          if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
          renderQuiz();
        }, 900);
      }
    });
    choicesEl.appendChild(btn);
  });
}

document.getElementById('quiz-close').addEventListener('click', () => {
  document.getElementById('quiz-overlay').classList.add('hidden');
  document.body.classList.remove('quiz-active');
});

document.body.classList.add('quiz-active');
renderQuiz();

// ── Mobile sidebar toggle ──
const sidebar = document.getElementById('sidebar');
const backdrop = document.getElementById('sidebar-backdrop');
function toggleSidebar(open) {
  sidebar.classList.toggle('open', open);
  backdrop.classList.toggle('open', open);
}
document.getElementById('sidebar-toggle').addEventListener('click', () => toggleSidebar(!sidebar.classList.contains('open')));
backdrop.addEventListener('click', () => toggleSidebar(false));
// 날짜 클릭하면 모바일에서 자동으로 닫히게
sidebar.addEventListener('click', e => {
  if (e.target.classList.contains('date-item') && window.innerWidth <= 768) {
    toggleSidebar(false);
  }
});

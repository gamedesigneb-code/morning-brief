<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모닝 브리핑</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sidebar-w: 240px;
    --bg: #FAFAF7;
    --paper: #FFFFFF;
    --accent: #6B7A8F;
    --accent-soft: #E8ECEF;
    --line: #EAE8E3;
    --line-strong: #D8D5CE;
    --text: #2D2A26;
    --text-mid: #6B655D;
    --text-sub: #A09889;
    --radius: 10px;
  }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 15px; line-height: 1.65; font-weight: 400;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }

  /* ── Layout ── */
  #app { display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar {
    width: var(--sidebar-w); flex-shrink: 0;
    background: var(--bg); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #sidebar-header {
    padding: 36px 20px 24px;
    border-bottom: 1px solid var(--line);
    text-align: center;
  }
  #sidebar-header h1 {
    font-size: 19px; font-weight: 700; color: var(--text);
    letter-spacing: -0.4px; line-height: 1.3;
  }
  #sidebar-header p {
    font-size: 12px; color: var(--text-sub); margin-top: 6px;
    letter-spacing: 0.3px;
  }
  #date-list { overflow-y: auto; flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
  .date-item {
    padding: 11px 14px; cursor: pointer; border-radius: 8px;
    transition: background 0.15s, color 0.15s;
    background: transparent;
    text-align: center; font-size: 13px; font-weight: 500; color: var(--text-mid);
    letter-spacing: 0.1px;
  }
  .date-item:hover { background: var(--accent-soft); color: var(--text); }
  .date-item.active {
    background: var(--accent-soft); color: var(--text); font-weight: 600;
  }

  /* ── Main ── */
  #main { flex: 1; overflow-y: auto; background: var(--paper); }
  #content { max-width: 760px; margin: 0 auto; padding: 56px 40px 80px; }

  .brief-header { margin-bottom: 36px; }
  .brief-header .bh-eyebrow {
    font-size: 11px; color: var(--text-sub); margin-bottom: 8px;
    letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;
  }
  .brief-header h2 {
    font-size: 30px; font-weight: 700; letter-spacing: -0.7px;
    color: var(--text); line-height: 1.25;
  }

  /* ── Category Tabs ── */
  .cat-tabs {
    display: flex; gap: 0; margin-bottom: 36px;
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; background: var(--paper); z-index: 10;
  }
  .cat-tab {
    padding: 12px 20px 14px; cursor: pointer; font-size: 14px; font-weight: 500;
    color: var(--text-sub); border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: inherit; letter-spacing: -0.1px;
    margin-bottom: -1px;
  }
  .cat-tab:hover { color: var(--text-mid); }
  .cat-tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 600; }

  /* ── Sources (collapsible) ── */
  .sources-toggle {
    background: transparent; border: 1px solid var(--line-strong);
    padding: 8px 14px; border-radius: 6px; font-size: 12.5px; font-weight: 500;
    color: var(--text-mid); cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
    font-family: inherit; margin-top: 12px;
    transition: background 0.15s, border-color 0.15s;
  }
  .sources-toggle:hover { background: var(--accent-soft); border-color: var(--accent); }
  .sources-toggle .arrow { transition: transform 0.2s; font-size: 9px; color: var(--text-sub); }
  .sources-toggle.open .arrow { transform: rotate(180deg); }
  .sources-body { display: none; margin-top: 12px; padding-left: 4px; }
  .sources-body.open { display: block; }

  /* ── Story Card ── */
  .story { margin-bottom: 40px; }
  .story-top { margin-bottom: 18px; }
  .story-headline {
    font-size: 19px; font-weight: 700; line-height: 1.45;
    letter-spacing: -0.4px; color: var(--text);
  }

  .metrics { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .metric-chip {
    background: var(--accent-soft); border: none;
    border-radius: 6px; padding: 7px 12px;
    font-size: 12.5px; font-weight: 500; color: var(--text-mid);
    line-height: 1.4;
  }

  .summary {
    font-size: 15px; line-height: 1.8; color: var(--text); margin-bottom: 20px;
    letter-spacing: -0.1px;
  }
  .summary .kt-underline {
    text-decoration: underline;
    text-decoration-color: var(--accent);
    text-decoration-thickness: 1.5px;
    text-underline-offset: 3px;
    cursor: help;
  }

  /* ── Key Terms Box ── */
  .key-terms {
    background: #F4F1EA; border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius); padding: 18px 22px; margin-bottom: 14px;
  }
  .key-terms-title {
    font-size: 11px; font-weight: 600; color: var(--text-sub);
    text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 14px;
  }
  .kt-item { margin-bottom: 12px; }
  .kt-item:last-child { margin-bottom: 0; }
  .kt-term {
    font-size: 13.5px; font-weight: 700; color: var(--text);
    margin-bottom: 4px; display: block;
    letter-spacing: -0.1px;
  }
  .kt-exp {
    font-size: 13.5px; line-height: 1.7; color: var(--text-mid);
  }

  /* ── Background ── */
  .bg-box {
    background: var(--bg); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 22px 24px; margin-bottom: 14px;
  }
  .bg-box-title {
    font-size: 11px; font-weight: 600; color: var(--text-sub);
    text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 16px;
  }
  .bg-section { margin-bottom: 16px; }
  .bg-section:last-child { margin-bottom: 0; }
  .bg-section-label {
    font-size: 12.5px; font-weight: 600; color: var(--text); margin-bottom: 6px;
    letter-spacing: -0.1px;
  }
  .bg-section-text { font-size: 14px; line-height: 1.75; color: var(--text-mid); }

  /* ── Sources ── */
  .source-item {
    display: flex; align-items: flex-start; gap: 10px;
    margin-bottom: 8px; font-size: 13px;
  }
  .src-num {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent-soft); color: var(--text-mid);
    font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .source-item a { color: var(--text-mid); text-decoration: none; line-height: 1.55; }
  .source-item a:hover { color: var(--text); text-decoration: underline; }

  .story-divider { border: none; border-top: 1px solid var(--line); margin: 36px 0; }

  .empty { color: var(--text-sub); font-size: 14px; padding: 60px 0; text-align: center; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 3px; }

  /* ── Mobile Toggle ── */
  #sidebar-toggle {
    display: none;
    position: fixed; top: 14px; left: 14px; z-index: 50;
    background: var(--paper); border: 1px solid var(--line-strong);
    width: 40px; height: 40px; border-radius: 10px;
    cursor: pointer; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(45, 42, 38, 0.08);
  }
  #sidebar-toggle span {
    display: block; width: 18px; height: 2px; background: var(--text);
    position: relative;
  }
  #sidebar-toggle span::before,
  #sidebar-toggle span::after {
    content: ''; position: absolute; left: 0; width: 18px; height: 2px; background: var(--text);
  }
  #sidebar-toggle span::before { top: -6px; }
  #sidebar-toggle span::after { top: 6px; }

  #sidebar-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(45, 42, 38, 0.4); z-index: 40;
  }
  #sidebar-backdrop.open { display: block; }

  /* ── Mobile Responsive ── */
  @media (max-width: 768px) {
    #sidebar-toggle { display: flex; }
    #sidebar {
      position: fixed; left: 0; top: 0; bottom: 0;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 45; width: 260px;
      box-shadow: 0 0 24px rgba(45, 42, 38, 0.12);
    }
    #sidebar.open { transform: translateX(0); }

    #content { padding: 64px 20px 60px; max-width: 100%; }
    .brief-header h2 { font-size: 22px; }
    .story-headline { font-size: 16px; }
    .summary { font-size: 14.5px; line-height: 1.75; }
    .bg-section-text { font-size: 13.5px; }
    .metric-chip { font-size: 12px; padding: 6px 10px; }
    .bg-box { padding: 18px 18px; }
    .cat-tab { padding: 11px 14px; font-size: 13.5px; }

    .quiz-card { padding: 28px 24px 24px; }
    .quiz-q { font-size: 17px; }
    .quiz-choice { font-size: 14px; padding: 13px 16px; }
  }

  /* ── Quiz Overlay ── */
  body.quiz-active #app {
    filter: blur(6px) saturate(0.85);
    pointer-events: none;
    transition: filter 0.3s ease;
  }
  #quiz-overlay {
    position: fixed; inset: 0;
    background-color: rgba(250, 250, 247, 0.55);
    background-image:
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0) 0,
        rgba(255,255,255,0) 5px,
        rgba(45,42,38,0.04) 5px,
        rgba(45,42,38,0.04) 6px
      ),
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0) 0,
        rgba(255,255,255,0) 22px,
        rgba(45,42,38,0.025) 22px,
        rgba(45,42,38,0.025) 23px
      );
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 24px;
  }
  #quiz-overlay.hidden { display: none; }

  .quiz-card {
    background: var(--paper); border-radius: 16px;
    padding: 36px 36px 32px; width: 100%; max-width: 440px;
    box-shadow: 0 16px 48px rgba(45, 42, 38, 0.18);
  }
  .quiz-eyebrow {
    font-size: 11px; color: var(--text-sub); letter-spacing: 1.5px;
    text-transform: uppercase; font-weight: 500; margin-bottom: 12px;
  }
  .quiz-q {
    font-size: 19px; font-weight: 700; color: var(--text);
    line-height: 1.5; letter-spacing: -0.3px; margin-bottom: 24px;
  }
  .quiz-choices { display: flex; flex-direction: column; gap: 8px; }
  .quiz-choice {
    background: var(--paper); border: 1px solid var(--line-strong);
    padding: 14px 18px; border-radius: 10px; font-size: 14.5px; font-weight: 500;
    color: var(--text); cursor: pointer; text-align: left;
    font-family: inherit; transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .quiz-choice:focus { outline: none; }
  .quiz-choice:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  @media (hover: hover) {
    .quiz-choice:hover { background: var(--accent-soft); border-color: var(--accent); }
  }
  .quiz-choice:active { transform: scale(0.99); }
  .quiz-choice.wrong {
    background: #F5E6E0; border-color: #C9947F; color: #8A4A30;
    animation: shake 0.4s ease;
  }
  .quiz-choice.correct {
    background: #E3EDE2; border-color: #7A9077; color: #2E4A2C;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .quiz-feedback {
    margin-top: 20px; text-align: center; font-size: 14px; font-weight: 500;
    color: var(--text-mid); min-height: 22px;
  }
  .quiz-feedback.right { color: #2E4A2C; }
  .quiz-feedback.wrong { color: #8A4A30; }

  .quiz-close-btn {
    margin-top: 18px; width: 100%;
    background: var(--text); color: var(--paper); border: none;
    padding: 13px 20px; border-radius: 10px; font-size: 14px; font-weight: 600;
    font-family: inherit; cursor: pointer;
    transition: background 0.15s;
  }
  .quiz-close-btn:hover { background: #1a1815; }
  .quiz-close-btn.hidden { display: none; }
</style>
</head>
<body>
<div id="quiz-overlay">
  <div class="quiz-card">
    <div class="quiz-eyebrow"><span>잠깐, 나에 대해서 잘 알지?</span> <span id="quiz-counter">(0/3)</span></div>
    <div class="quiz-q" id="quiz-q"></div>
    <div class="quiz-choices" id="quiz-choices"></div>
    <div class="quiz-feedback" id="quiz-feedback"></div>
    <button class="quiz-close-btn hidden" id="quiz-close">닫기</button>
  </div>
</div>

<button id="sidebar-toggle" aria-label="메뉴"><span></span></button>
<div id="sidebar-backdrop"></div>

<div id="app">
  <nav id="sidebar">
    <div id="sidebar-header">
      <h1>모닝 브리핑</h1>
      <p>일별 세계 뉴스 요약</p>
    </div>

    <div id="date-list"></div>
  </nav>
  <main id="main">
    <div id="content"></div>
  </main>
</div>

<script>
const BRIEFS = [{
  tag:`2026-05-12`,
  label:`2026년 5월 12일 (화요일)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미중, 제네바 협상서 관세 대폭 인하 합의…90일 무역 휴전 돌입`,
  metrics:[`미국 대중 관세 145%→30%로 인하`,`중국 대미 관세 125%→10%로 인하`],
  summary:`미국과 중국이 5월 12일 스위스 제네바에서 이틀간 고위급 협상을 마치고 상호 관세를 대폭 낮추는 무역 휴전에 합의했다. 미국은 중국산 수입품 관세를 145%에서 30%로, 중국은 미국산 제품 관세를 125%에서 10%로 각각 인하하기로 했다. 협상은 미 재무장관 스콧 베센트와 중국 허리펑 부총리가 주도했으며 양측은 90일의 휴전 기간 동안 추가 협상을 이어가기로 합의했다. 이번 합의는 2026년 4월 트럼프 행정부가 관세를 145%까지 끌어올린 뒤 글로벌 공급망 붕괴 우려와 인플레이션 재상승 압박이 커진 데 따른 것이다. 합의 발표 직후 S&P 500은 3% 이상 급등했고 나스닥도 동반 상승했다. 그러나 전문가들은 30% 관세도 역사적으로 높은 수준이며, 반도체·인공지능 분야 수출 통제는 여전히 유효해 무역 정상화까지는 상당한 시간이 걸릴 것으로 본다. 90일 휴전 기간이 끝나는 8월 이후에도 협상이 타결되지 않으면 관세가 다시 인상될 위험이 상존한다.`,
  keyTerms:[{term:`무역 휴전`,explanation:`전쟁에서 양측이 싸움을 잠시 멈추듯, 관세 인상과 보복 조치를 일정 기간 동안 중단하기로 합의하는 것을 말합니다. 완전한 무역 합의가 아니라 협상을 위한 일시적 중단이며, 기간이 끝나면 다시 갈등이 재개될 수 있습니다.`},{term:`글로벌 공급망`,explanation:`제품 하나를 만들기 위해 원자재 조달부터 부품 제조, 조립, 물류까지 여러 나라에 걸쳐 연결된 생산 네트워크를 뜻합니다. 미중 관세가 오르면 이 연결고리가 끊겨 물가 상승과 기업 비용 증가로 이어집니다.`}],
  history:`미중 무역 전쟁은 트럼프 1기인 2018년 철강·알루미늄 관세 부과로 시작됐다. 바이든 행정부에서도 반도체 수출 통제가 이어졌고, 트럼프 2기 출범 후 2026년 4월에는 양국 관세가 각각 145%와 125%에 달하며 실질적인 무역 단절 수준에 이르렀다.`,
  players:`미국의 스콧 베센트 재무장관은 기술 이전 제한을 유지하면서 농산물·에너지 분야 수입 확대를 요구했다. 중국 허리펑 부총리는 수출 둔화로 인한 경기 부진을 해소하기 위해 협상에 적극 나섰다. 다국적 기업들은 공급망 재편 비용 부담을 줄이기 위해 양국에 협상 타결을 촉구해왔다.`,
  current:`관세 전쟁으로 미국 내 CPI가 3.3%까지 재상승하고 글로벌 경기 침체 우려가 커지면서 양국 모두 협상 필요성을 절감하게 됐다. 호르무즈 해협 봉쇄로 에너지 가격까지 폭등한 상황에서 추가 무역 충격은 경제 전반에 치명적일 수 있었다.`,
  outlook:`90일 휴전 기간인 8월 초가 1차 협상 시한이다. 반도체, 배터리, 희토류 등 전략 물자에 대한 추가 협상이 이어질 예정이며, 합의 실패 시 관세 재인상이 현실화될 수 있다.`,
  sources:[{title:`Trump 2.0 tariff tracker - Trade Compliance Resource Hub`,url:`https://www.tradecomplianceresourcehub.com/2026/05/07/trump-2-0-tariff-tracker/`},{title:`As the Trump-Xi summit draws closer, trade uncertainty still looms large - Atlantic Council`,url:`https://www.atlanticcouncil.org/blogs/econographics/as-the-trump-xi-summit-draws-closer-trade-uncertainty-still-looms-large/`},{title:`Fact Sheet: President Donald J. Trump Strikes Deal on Economic and Trade Relations with China - The White House`,url:`https://www.whitehouse.gov/fact-sheets/2025/11/fact-sheet-president-donald-j-trump-strikes-deal-on-economic-and-trade-relations-with-china/`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`케빈 워시, 5월 15일 Fed 의장 취임…중앙은행 독립성 논란 속 출발`,
  metrics:[`상원 금융위 13대 11 찬성 인준 가결`,`5월 15일 파월 임기 종료 후 취임 예정`],
  summary:`트럼프 대통령이 지명한 케빈 워시가 오는 5월 15일 파월 의장의 임기 종료와 함께 미국 연방준비제도 의장으로 취임할 예정이다. 상원 금융위원회는 지난달 13대 11의 완전 당파적 표결로 워시 지명을 인준했는데, 이는 연방공개시장위원회 의장 인준 역사상 처음으로 여야 경계가 명확히 갈린 사례로 기록됐다. 워시는 2006년부터 2011년까지 Fed 이사를 지낸 금융 전문가이나, 트럼프 대통령과의 긴밀한 관계로 인해 중앙은행 독립성 훼손 우려가 제기되고 있다. 현재 미국 물가상승률은 유가 급등 영향으로 3.3%까지 재상승했고 연방공개시장위원회 내부에서는 금리 인하 시점을 두고 의견이 갈린 상태다. 워시가 취임 직후 트럼프 대통령이 강력히 요구해온 금리 인하를 단행할 경우 인플레이션이 재자극될 수 있다는 우려가 크다. 전 Fed 이코노미스트 클로디아 삼은 당파적 인준 표결이 중앙은행 독립성을 심각하게 약화시킬 선례를 남겼다고 경고했다. 시장은 워시의 첫 공식 발언과 6월 예정된 회의 결과에 촉각을 곤두세우고 있다.`,
  keyTerms:[{term:`연방공개시장위원회`,explanation:`미국 중앙은행인 연방준비제도의 핵심 의사결정 기구로, 기준금리를 올리거나 내리는 결정을 내립니다. 약어로 FOMC라 부르며 연 8회 회의를 열어 미국과 전 세계 금융시장에 큰 영향을 미칩니다.`},{term:`중앙은행 독립성`,explanation:`중앙은행이 정치권의 압력 없이 물가 안정과 경제 성장이라는 본연의 임무에 따라 금리 등 통화정책을 독립적으로 결정할 수 있는 권한을 말합니다. 독립성이 약해지면 정치적 목적으로 금리가 결정되어 인플레이션이 악화될 위험이 있습니다.`}],
  history:`파월 의장은 2018년 트럼프 1기에 취임해 코로나19 위기 대응과 이후 인플레이션 억제를 위한 급격한 금리 인상을 주도했다. 트럼프는 1기 때부터 파월에게 금리 인하를 수차례 압박했으나 파월은 독립적 판단을 유지했다. 트럼프는 재집권 후 자신의 지시에 더 순응적인 인물을 Fed 의장으로 앉히겠다고 공언해왔다.`,
  players:`케빈 워시는 금융위기 시절 Fed에서 위기 대응을 직접 경험한 인물로 기술적 역량은 인정받는다. 반면 민주당과 일부 경제학자들은 전례 없는 당파적 인준 표결이 Fed 독립성을 침해한다고 경고했다. 월가와 글로벌 투자자들은 워시의 통화정책 방향성을 아직 예측하기 어렵다고 보고 있다.`,
  current:`워시 취임 시점은 미국 인플레이션이 재상승하고 이란 전쟁으로 유가가 배럴당 100달러에 육박한 시기와 겹친다. 금리를 내리면 인플레이션 위험이 커지고, 유지하면 경기 둔화 압박이 이어지는 딜레마 상황이다.`,
  outlook:`워시의 첫 연방공개시장위원회 회의는 6월로 예상된다. 금리 방향과 함께 통화정책 독립성에 관한 발언이 글로벌 시장의 최대 관심사가 될 것이다.`,
  sources:[{title:`Kevin Warsh is set to inherit a Federal Reserve under pressure - The Washington Post`,url:`https://www.washingtonpost.com/business/2026/05/11/warsh-fed-pressure-inflation/`},{title:`Senate panel advances Kevin Warsh's nomination for US Fed chair - Al Jazeera`,url:`https://www.aljazeera.com/economy/2026/4/29/senate-panel-advances-kevin-warshs-nomination-for-us-fed-chair`},{title:`Warsh's take on Fed independence is met with confusion and some concern - CNBC`,url:`https://www.cnbc.com/2026/05/04/fed-kevin-warsh-interest-rates.html`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`한국 50대 그룹 시가총액 5403조원…사상 처음 자산 총액 돌파`,
  metrics:[`50대 그룹 시가총액 합계 5403조 2961억원`,`2021년 대비 187.2% 증가`],
  summary:`국내 50대 그룹의 시가총액 합계가 올해 처음으로 이들 그룹이 보유한 자산 총액을 상회하는 역사적 전환점이 나타났다. 시가총액 합계는 5403조 2961억원으로 2021년 1881조원에서 약 187% 급증하며 사실상 3배 가까이 불어났다. 이는 한국 경제의 무게중심이 전통적인 제조·자산 기반에서 미래 성장성 중심으로 빠르게 이동하고 있음을 보여주는 지표로 해석된다. 배경에는 SK하이닉스와 삼성전자 등 반도체 기업의 주가 급등, 카카오·네이버 등 플랫폼 기업 재평가, 그리고 외국인 투자 자금 유입이 있다. 증권업계는 이를 밸류에이션 리레이팅의 신호로 보고 있으며, 한국 증시가 오랫동안 저평가 구간에 머물렀던 이른바 코리아 디스카운트가 해소되고 있다는 긍정적 평가도 나온다. 이재명 정부의 적극적 재정정책과 기업 밸류업 프로그램도 주가 상승에 기여한 것으로 분석된다. 다만 주가 급등이 실질 이익 성장보다 선행하고 있어 과열 우려도 함께 제기된다.`,
  keyTerms:[{term:`밸류에이션 리레이팅`,explanation:`기업의 실적이 크게 변하지 않아도 투자자들이 그 기업의 미래 가치를 새롭게 평가하면서 주가수익비율 등 가치 지표가 전반적으로 상향되는 현상입니다. 한국 기업들이 예전보다 높은 가격에 거래되기 시작했다는 의미입니다.`},{term:`코리아 디스카운트`,explanation:`한국 주식 시장이 비슷한 이익을 내는 미국·일본·유럽 기업들보다 낮은 주가 수준에서 거래되는 현상을 말합니다. 지배구조 문제, 북한 리스크, 낮은 주주환원율 등이 원인으로 꼽혀왔습니다.`}],
  history:`한국 대기업 그룹들의 시가총액은 1997년 외환위기 이후 자산 대비 큰 폭으로 할인된 채 거래되는 코리아 디스카운트 현상이 수십 년간 이어졌다. 2020년대 들어 반도체 호황과 플랫폼 성장으로 시총이 빠르게 늘었고, 2024년부터 정부 주도의 기업 밸류업 프로그램이 시행됐다.`,
  players:`SK하이닉스는 HBM 수요 급증에 힘입어 주가가 1년 새 두 배 이상 올랐고, 삼성전자도 반도체 사이클 회복 기대로 상승세다. 외국인 투자자들은 최근 한국 증시 순매수로 전환했고, 이재명 정부는 배당 확대·자사주 소각 촉진 정책을 강화하고 있다.`,
  current:`1분기 한국 GDP 성장률이 22개국 중 1위를 기록하는 등 경제 지표 개선이 투자 심리를 뒷받침하고 있다. 미중 무역 휴전 합의도 수출 의존도가 높은 한국 기업들에 긍정적 신호로 작용했다.`,
  outlook:`6월 3일 전국 지방선거를 앞두고 정부의 경제성과 부각이 이어질 전망이다. 하반기에는 반도체 수출 실적과 미국 금리 방향이 시총 유지의 핵심 변수가 될 것이다.`,
  sources:[{title:`한국경제신문 2026년 5월 - 모바일한경`,url:`https://plus.hankyung.com/apps/newspaper.view`},{title:`SK증권 파격보고서 삼성전자 50만원·하이닉스 300만원 목표가 제시 - 비즈워치`,url:`https://news.bizwatch.co.kr/article/market/2026/05/07/0003`},{title:`삼성전자·SK하이닉스 주가 움직이는 3가지 동력 - 비즈한국`,url:`https://www.bizhankook.com/bk/article/32208`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미이란 전쟁 72일째, 트럼프 휴전 사실상 파기 선언…호르무즈 봉쇄 장기화`,
  metrics:[`일일 호르무즈 통과 선박 70척→2∼5척으로 급감`,`국제유가 배럴당 100달러 근접`],
  summary:`미국과 이란 간의 전쟁이 72일째를 맞은 가운데, 트럼프 대통령은 이란의 휴전 역제안이 완전히 수용 불가능하다며 휴전이 사실상 사망 상태라고 발언했다. 호르무즈 해협 봉쇄는 지속되고 있으며 하루 통과 선박이 봉쇄 이전 70척에서 현재 2∼5척으로 급감했다. 이란 혁명수비대는 해협을 통과하려는 선박에 대한 공격을 계속하고 있으며, 미군도 이란 유조선에 경고 사격을 가하는 등 무력 충돌이 이어지고 있다. 국제유가는 배럴당 100달러에 육박하고 미국 내 갤런당 가솔린 가격은 4.5달러까지 올라 인플레이션 압박이 극심하다. 사우디 아람코 CEO는 호르무즈 해협이 당장 열려도 에너지 시장 정상화까지 수개월이 걸리고, 봉쇄가 몇 주 더 지속되면 2027년까지 영향이 이어질 것이라고 경고했다. 유엔 태스크포스는 비료 수송 차단으로 최대 4500만 명이 기아 위기에 처할 수 있다고 밝혀 인도주의적 우려도 커지고 있다. 일부 펜타곤 관리들은 이란 군사 시설에 대한 추가 정밀 타격을 주장하고 있어 확전 가능성도 배제하기 어렵다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`페르시아만과 아라비아해를 연결하는 좁은 해협으로, 전 세계 원유 수출의 약 20%가 이곳을 통과합니다. 이란이 이 해협을 봉쇄하면 중동 산유국들이 원유를 수출하지 못해 국제 에너지 가격이 폭등합니다.`},{term:`이란 혁명수비대`,explanation:`이란 이슬람 공화국의 정예 군사 조직으로, 일반 군대와는 별도로 최고 지도자의 직접 지휘를 받습니다. 해군 부대가 페르시아만을 실질적으로 통제하며 호르무즈 봉쇄를 주도하고 있습니다.`}],
  history:`미국과 이스라엘은 2026년 2월 28일 이란의 핵 시설과 군사 기지에 대한 공습을 개시했고 이란 최고지도자 하메네이가 사망했다. 이란은 3월 4일 호르무즈 해협을 봉쇄한다고 선언하며 전면 대결에 나섰다. 미국은 3월 중순부터 한시적 휴전에 들어갔으나 양측이 간헐적으로 무력을 행사하면서 실질적 충돌이 이어지고 있다.`,
  players:`미국 국방부는 외교와 군사 압박 병행 전략을 두고 강경파와 협상파로 분열돼 있다. 이란은 핵 협정 조건 충족 없이는 해협 개방이 불가하다는 입장을 유지한다. 사우디아라비아와 UAE 등 걸프 국가들은 이란의 공격 위협에 직접 노출되어 있다.`,
  current:`트럼프의 휴전 파기 발언으로 미군의 이란 본토 재공습 가능성이 고조됐다. 에너지 가격 급등이 미국 내 인플레이션과 정치적 압박으로 이어지면서 트럼프가 군사적 해결을 택할 가능성을 배제할 수 없는 상황이다.`,
  outlook:`5월 중 미국의 추가 제재 또는 정밀 타격 여부가 최대 변수다. 이란이 협상 테이블로 복귀할 조건을 제시하는지가 6월 이전 사태 해결의 핵심이 될 전망이다.`,
  sources:[{title:`Trump says ceasefire with Iran on massive life support - CNN`,url:`https://www.cnn.com/2026/05/11/world/live-news/iran-war-proposal-trump`},{title:`Iran says it will never bow as Trump rejects peace counteroffer - CNBC`,url:`https://www.cnbc.com/2026/05/11/iran-war-trump-negotiation-hormuz-nuclear-talks.html`},{title:`Saudi Aramco CEO says oil market won't normalize until 2027 if Hormuz disruption persists - CNBC`,url:`https://www.cnbc.com/2026/05/11/saudi-aramco-oil-iran-war-strait-hormuz.html`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`러-우 3일 휴전 종료, 푸틴 종전 가능성 시사…포로 교환 각 1000명씩 이행`,
  metrics:[`포로 교환 양측 각 1000명씩 합의 이행`,`3일 휴전 기간 5월 9∼11일`],
  summary:`트럼프 대통령이 중재한 러시아-우크라이나 3일 휴전이 5월 9일부터 11일까지 시행됐으며, 양국은 포로 교환 합의에 따라 각각 1000명씩 전쟁 포로를 맞바꿨다. 푸틴 대통령은 전승절 기념식이 열린 5월 9일 모스크바에서 러시아의 전쟁이 종식을 향하고 있다고 시사하며 젤렌스키와의 직접 회담에 열린 자세를 보였다. 그러나 휴전 기간 중에도 러시아가 드론과 미사일로 우크라이나를 공격했다는 우크라이나 외무부의 주장이 나오면서 신뢰 문제가 불거졌다. 평화 협상의 핵심 걸림돌은 우크라이나 동부 도네츠크주 영토 문제로, 러시아는 미점령 지역에서도 우크라이나군 철수를 요구하고 있으나 우크라이나는 이를 거부하고 있다. 전문가들은 이번 휴전을 완전한 평화 합의가 아닌 전술적 소강 상태로 보고 있으며, 전승절 행사를 안전하게 치르려는 푸틴의 정치적 계산이 반영됐다고 분석한다. 트럼프 행정부의 중재 노력이 지속되고 있으나 영토 문제의 간극이 커 전면 합의까지는 난관이 예상된다.`,
  keyTerms:[{term:`전승절`,explanation:`러시아가 매년 5월 9일에 기념하는 날로, 1945년 제2차 세계대전에서 나치 독일에 승리한 것을 기리는 행사입니다. 러시아에서 가장 중요한 국경일 중 하나로, 푸틴 대통령은 이날 붉은 광장에서 대규모 군사 퍼레이드를 주최합니다.`},{term:`포로 교환`,explanation:`전쟁 중 포로로 잡힌 병사들을 서로 맞바꾸는 행위입니다. 인도주의적 차원에서 이루어지며, 국제 협상의 신뢰 구축 수단으로도 활용됩니다. 전면 휴전 합의 없이도 단독으로 성사될 수 있어 협상 돌파구 역할을 합니다.`}],
  history:`러시아는 2022년 2월 우크라이나를 전면 침공했으며 전쟁은 4년 넘게 이어지고 있다. 트럼프 대통령은 취임 직후부터 종전 중재에 나섰으나 영토와 안보 보장 문제에서 양측의 입장 차이가 커 수차례 협상이 결렬됐다. 2026년 봄 들어 양측이 독자적 임시 휴전을 선언하는 등 협상 흐름이 서서히 만들어지고 있다.`,
  players:`푸틴은 점령지 합법화와 우크라이나의 나토 가입 포기를 핵심 조건으로 내세우고 있다. 젤렌스키는 영토 양보 없이는 어떤 협상도 불가하다는 원칙을 유지하나 국내외 전쟁 피로감으로 압박을 받고 있다. 트럼프는 양측을 압박해 빠른 종전을 원하며 제재 완화와 재건 지원을 협상 카드로 활용하고 있다.`,
  current:`전승절을 전후한 3일 휴전이 러시아에게 외교적 숨통을 틔워줬다는 분석이 나온다. 푸틴의 종전 시사 발언이 실질적 협상 의지인지 외교적 수사인지 판단하기 어렵다는 시각도 있다.`,
  outlook:`5월 말까지 미-러-우 3자 또는 양자 협상 재개 여부가 관건이다. 영토 문제에서 임시 분계선 설정이나 단계적 철수 같은 중간 방안이 논의될 가능성이 있다.`,
  sources:[{title:`Trump announces three-day ceasefire in Russia-Ukraine war - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/5/8/trump-announces-three-day-ceasefire-in-russia-ukraine-war`},{title:`Putin suggests Russia's war on Ukraine coming to an end - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/5/10/putin-suggests-russias-war-on-ukraine-coming-to-an-end`},{title:`Russia and Ukraine trade blame for continued fighting as ceasefire nears end - Washington Times`,url:`https://www.washingtontimes.com/news/2026/may/11/russia-ukraine-exchange-blame-continued-fighting-us-brokered/`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`한국 화물선 나무호 피격 공식 확인…정부, 이란에 단호한 대응 방침`,
  metrics:[`선체 외부 직경 약 50cm 관통 구멍 확인`,`승선 24명 중 1명 부상`],
  summary:`외교부는 5월 10일 HMM 소속 화물선 나무호가 호르무즈 해협 인근 해역에서 미상 비행체의 타격을 받았다는 합동 조사 결과를 공식 발표했다. 조사단은 선체 바깥쪽에 반구형으로 뚫린 직경 약 50cm의 구멍과 선미 좌현 외판이 크게 찢겨 나간 흔적을 확인했다. 이란 혁명수비대는 국영 매체를 통해 한국 국적 선박을 의도적으로 공격한 사실을 인정했으나, 주한 이란 대사관은 공격 사실을 부인하는 엇갈린 반응을 보였다. 사건은 5월 4일 나무호가 아랍에미리트 항구로 이동하던 중 발생했으며, 한국인 6명을 포함한 24명의 승선원 중 1명이 부상을 입었다. 정부는 국방부·외교부·해경 합동 조사를 확대하는 한편 외교 채널을 통해 이란 측에 강력히 항의했다. 야당인 국민의힘은 정부 대응이 미흡하다며 파병 부대 안전과 대이란 규탄 결의를 촉구했고, 더불어민주당 원내대표는 국가 안보를 정쟁에 이용하지 말라고 반박했다. 이 사건은 6월 지방선거를 앞두고 한국 내 외교·안보 논쟁을 가열시키고 있다.`,
  keyTerms:[{term:`미상 비행체`,explanation:`정체가 확인되지 않은 항공기, 드론, 미사일 등 날아다니는 물체를 통칭하는 군사·외교 용어입니다. 공격 주체를 특정하기 어렵거나 외교적으로 신중해야 할 때 사용하며, 이번 경우에는 이란산 드론 또는 미사일로 추정됩니다.`},{term:`합동 조사`,explanation:`국방부, 외교부, 경찰·해경 등 여러 정부 기관이 함께 참여해 사건 경위와 원인을 공동으로 파악하는 수사 방식입니다. 민감한 국제 분쟁이 개입된 사건에서 단일 기관의 독단적 결론을 피하고 신뢰도를 높이기 위해 활용됩니다.`}],
  history:`한국은 중동 원유 의존도가 높고 호르무즈 해협을 통과하는 물동량이 연간 수백 척에 달한다. 이란과 한국은 2021년 동결된 이란 자산 문제로 외교 마찰을 겪은 바 있으며, 이번 전쟁 이후에도 한국 선박의 중동 항로 이용이 계속됐다.`,
  players:`HMM은 한국 최대 국적 해운사로 국제 물류망 유지에 핵심적인 역할을 한다. 이란 혁명수비대는 자국이 적대적이라고 판단하는 국가 선박에 대한 압박 수단으로 공격을 활용해왔다. 한국 군 당국은 아덴만 청해부대를 파견 중이며 중동 해역 안전에 촉각을 세우고 있다.`,
  current:`이란이 한국 선박을 의도적으로 공격했다는 점이 공식 확인됨에 따라 한국 정부는 외교적 대응 수위 결정이라는 어려운 과제를 안게 됐다. 이란 제재에 동참하면 에너지 수급과 무역에 타격이 올 수 있어 선택이 쉽지 않다.`,
  outlook:`정부는 유엔 안보리 및 국제해사기구를 통한 다자 대응을 추진할 것으로 보인다. 미국의 대이란 추가 제재 논의에 한국이 동참하는지 여부가 이달 중 외교 향방을 결정짓는 핵심 변수다.`,
  sources:[{title:`HMM 나무호 피격 사건 - 나무위키`,url:`https://namu.wiki/w/HMM%20%EB%82%98%EB%AC%B4%ED%98%B8%20%ED%94%BC%EA%B2%A9%20%EC%82%AC%EA%B1%B4`},{title:`나무호 공격에 규탄과 신중 사이에 선 정부 - 경향신문`,url:`https://www.khan.co.kr/article/202605111834001/`},{title:`정부 나무호 화재는 미상비행체 타격 기종 미확인 - MBC`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6821325_37004.html`}]

  colorBg:`#e6f4f1`,
  headline:`Anthropic 연간 반복 매출 300억 달러로 OpenAI 추월…AI 산업 지각변동`,
  metrics:[`Anthropic 연간 반복 매출 300억 달러 돌파`,`OpenAI 연간 반복 매출 240억 달러로 뒤처져`],
  summary:`AI 스타트업 Anthropic의 연간 반복 매출이 300억 달러를 돌파하며 OpenAI의 240억 달러를 앞질러 AI 산업의 지각변동이 확인됐다. Anthropic은 Claude 모델을 기반으로 기업 고객을 빠르게 확보해왔으며, AI 에이전트 기능을 기업 업무 자동화에 적용하려는 수요 급증이 매출 성장을 이끌었다. 구글 딥마인드는 ICLR 2026에서 AI 모델의 핵심 병목인 KV 캐시 문제를 해결하는 TurboQuant 알고리즘을 공개했으며, 이 기술이 상용화되면 대규모 언어 모델 운용 비용이 대폭 줄어들 전망이다. 구글은 오픈소스 모델 Gemma 4도 출시해 기업들이 자체 AI를 구축하는 비용 장벽을 낮췄다. AI 에이전트 시장이 급성장하면서 단순 챗봇을 넘어 실제 업무를 자율적으로 처리하는 서비스 수요가 폭발적으로 늘고 있다. 스탠퍼드대 AI 인덱스 2026 보고서는 AI 모델의 능력이 전례 없는 수준에 도달했으나 에너지 소비, 투명성, 이익 분배 문제가 시급하다고 지적했다. Anthropic의 약진은 AI 산업이 단순 모델 경쟁을 넘어 기업 서비스 생태계 싸움으로 전환되고 있음을 보여준다.`,
  keyTerms:[{term:`연간 반복 매출`,explanation:`구독형 서비스에서 1년 동안 안정적으로 반복해서 들어오는 매출을 연간 단위로 환산한 값입니다. 스타트업 성장세를 측정하는 핵심 지표로, 영어로는 ARR(Annual Recurring Revenue)이라 합니다.`},{term:`AI 에이전트`,explanation:`사람의 일일이 지시 없이도 스스로 계획을 세우고 도구를 활용해 복잡한 작업을 수행하는 AI 프로그램입니다. 단순 질문 답변을 넘어 이메일 작성, 코드 실행, 정보 검색 등을 자율적으로 연속 수행하는 것이 특징입니다.`},{term:`대규모 언어 모델`,explanation:`수천억 개 이상의 매개변수를 학습한 초거대 AI로, ChatGPT나 Claude처럼 사람과 자연스럽게 대화하고 글을 쓰거나 코딩을 할 수 있는 AI의 기반 기술입니다. 영어 약자로 LLM(Large Language Model)이라 불립니다.`}],
  history:`Anthropic은 OpenAI 공동 창업자 출신 다리오 아모데이 형제가 2021년 설립했다. Claude 출시 이후 안전성 중심의 AI 개발 철학으로 기업 고객들 사이에서 신뢰를 쌓아왔다. 2024년 아마존과 구글의 대규모 투자를 받으며 OpenAI와 본격적인 경쟁 구도를 형성했다.`,
  players:`Anthropic의 다리오 아모데이 CEO는 안전하고 신뢰할 수 있는 AI 개발을 최우선 가치로 내세우며 기업 시장을 공략해왔다. OpenAI는 ChatGPT의 소비자 브랜드 인지도가 높지만 기업 계약에서 점유율을 잃고 있다. 구글과 아마존은 Anthropic의 주요 투자자이자 클라우드 인프라 파트너다.`,
  current:`기업들이 AI 도입 비용 대비 효과를 검증하기 시작하면서 실용성 높은 AI 에이전트를 제공하는 회사가 수혜를 받고 있다. 이재명 대통령도 구글 딥마인드 CEO 데미스 하사비스를 만나 AI 거버넌스 강화를 논의했다.`,
  outlook:`2026년 하반기에는 Anthropic의 Claude 4 시리즈와 OpenAI의 차기 모델 업데이트가 예정돼 기술 경쟁이 더욱 치열해질 전망이다. 미국과 유럽의 AI 규제 입법 속도도 기업 전략에 중요한 변수가 된다.`,
  sources:[{title:`Agentic AI News + AI Breakthroughs 2026 - Crescendo AI`,url:`https://www.crescendo.ai/news/latest-ai-news-and-updates`},{title:`AI Update May 2026 - MarketingProfs`,url:`https://www.marketingprofs.com/opinions/2026/54655/ai-update-may-8-2026-ai-news-and-views-from-the-past-week`},{title:`Inside the AI Index: 12 Takeaways from the 2026 Report - Stanford HAI`,url:`https://hai.stanford.edu/news/inside-the-ai-index-12-takeaways-from-the-2026-report`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`삼성·SK하이닉스 목표주가 대폭 상향…7세대 D램 기술 경쟁 본격화`,
  metrics:[`SK하이닉스 목표주가 200만→300만원 상향`,`삼성전자 목표주가 40만→50만원 상향`],
  summary:`국내 주요 증권사들이 삼성전자와 SK하이닉스의 목표주가를 대폭 상향하면서 한국 반도체 산업에 대한 기대감이 최고조에 달했다. SK증권은 SK하이닉스 목표주가를 300만원, 삼성전자를 50만원으로 올리며 메모리 반도체 업황의 구조적 상승을 전망했다. 4월 서버 D램 계약가격이 예상을 넘어서 강하게 형성됐고, 모바일 D램 가격도 서버 수준에 근접할 가능성이 부각됐다. 삼성전자는 7세대 D램 한계 극복을 위해 셀을 위로 쌓는 16단 수직 적층 방식인 VS-D램과 GAA 기술을 추진하고 있으며, SK하이닉스는 셀 면적을 줄이는 4F 수직 게이트 구조 방식으로 맞불을 놓고 있다. AI 데이터센터 확장으로 HBM 수요가 급증하는 가운데, 차세대 D램 기술 경쟁의 승패가 향후 5년간 양사의 시장 지위를 결정할 것으로 분석된다. 메모리 반도체 밸류에이션 리레이팅도 본격화돼 한국 증시 전반의 주가 상승을 견인하고 있다. 전문가들은 AI 투자 사이클이 2027년까지 이어질 것으로 보며 반도체 업황 호조가 지속될 것으로 전망한다.`,
  keyTerms:[{term:`HBM`,explanation:`고대역폭 메모리(High Bandwidth Memory)의 약자로, D램 칩을 여러 층으로 쌓아 데이터 처리 속도를 극적으로 높인 반도체입니다. AI 연산에 필수적인 부품으로, SK하이닉스가 세계 최고 기술력을 보유해 엔비디아 AI 칩에 독점 공급하고 있습니다.`},{term:`GAA 기술`,explanation:`게이트 올 어라운드(Gate-All-Around)의 약자로, 반도체 트랜지스터의 전류 흐름을 사방에서 제어하는 차세대 미세공정 기술입니다. 기존 방식보다 전력 효율이 높고 더 작게 만들 수 있어 7세대 이후 D램의 물리적 한계를 돌파하는 핵심 기술입니다.`},{term:`밸류에이션 리레이팅`,explanation:`기업의 실적이 크게 변하지 않아도 투자자들이 그 기업의 미래 성장성을 더 높게 평가하면서 주가수익비율 등 가치 지표가 전반적으로 상향되는 현상입니다. 한국 반도체 기업들이 예전보다 훨씬 높은 가격에 거래되기 시작했다는 의미입니다.`}],
  history:`한국 반도체 산업은 1990년대부터 D램과 낸드플래시 분야에서 세계 1·2위 자리를 지켜왔다. 2023~2024년 메모리 시황 침체기를 거쳤으나 AI 서버 수요 급증으로 2024년 하반기부터 빠르게 회복됐다. SK하이닉스가 HBM 시장을 선도하면서 삼성전자도 차세대 HBM 경쟁력 강화에 박차를 가하고 있다.`,
  players:`SK하이닉스는 HBM3E 양산에서 앞서며 엔비디아의 최우선 파트너 지위를 유지하고 있다. 삼성전자는 파운드리와 메모리를 동시에 추진하는 전략으로 시장 재탈환을 노리고 있다. 미국 마이크론도 HBM 공급 확대에 나서고 있어 3파전 양상이 벌어지고 있다.`,
  current:`미중 관세 휴전 합의로 반도체 수출 불확실성이 일부 해소됐고, AI 수요 측 모멘텀이 에너지 비용 상승 우려를 압도하고 있다. 1분기 한국 GDP 성장률이 22개국 중 1위를 기록하는 등 거시 환경도 투자 심리를 지지하고 있다.`,
  outlook:`2분기 실적 발표가 예정된 7~8월에 양사의 HBM 매출 비중과 7세대 D램 개발 진척도가 확인될 예정이다. 엔비디아의 차세대 칩 블랙웰 울트라 공급 일정이 HBM 수주 경쟁의 분기점이 될 것이다.`,
  sources:[{title:`SK증권 파격보고서 삼성전자 50만원·하이닉스 300만원 목표가 - 비즈워치`,url:`https://news.bizwatch.co.kr/article/market/2026/05/07/0003`},{title:`2026년 5월 반도체 기술 주요 뉴스 - SPTA Times Korea`,url:`https://www.sptatimeskorea.com/post/%EC%A0%9C20260506-tt-01%ED%98%B8-2026%EB%85%84-5%EC%9B%94-6%EC%9D%BC-%EB%B0%98%EB%8F%84%EC%B2%B4-%EA%B8%B0%EC%88%A0-%EA%B4%80%EB%A0%A8-%EC%A3%BC%EC%9A%94-%EB%89%B4%EC%8A%A4-%EC%9A%94%EC%95%BD`},{title:`삼성전자·SK하이닉스 주가 움직이는 3가지 동력 - 비즈한국`,url:`https://www.bizhankook.com/bk/article/32208`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`인도-파키스탄 분쟁 1주년, 미국 로비 문건 공개로 휴전 주도권 논쟁 재점화`,
  metrics:[`2025년 5월 4일간 교전으로 양측 수십 명 사상`,`미국 중재 휴전 합의 2025년 5월 10일`],
  summary:`인도-파키스탄이 2025년 5월 치른 4일간의 무력 충돌 1주년을 맞아 양국이 서로 다른 주장으로 갈등 기억을 재연하고 있다. 파키스탄 최고사령관 아심 무니르는 인도가 먼저 미국에 휴전을 요청했다고 주장했으나, 미국의 로비 문건 공개를 통해 파키스탄이 워싱턴에서 강도 높은 외교·로비 활동을 벌였다는 사실이 드러나 신뢰성 논란이 일었다. 이번 충돌은 2025년 4월 22일 인도령 카슈미르 파할감에서 민간인 26명이 사망한 테러 공격에 대해 인도가 작전명 신두르로 파키스탄을 군사 타격하면서 시작됐다. 핵보유국인 양국이 4일 만에 전면전 직전까지 갔다는 사실에 국제사회는 큰 충격을 받았다. 미국의 중재로 휴전이 이뤄졌으나 1년이 지난 지금도 양국 간 신뢰는 회복되지 않았고 카슈미르 국경에는 긴장이 상존한다. 파키스탄 군 당국은 1주년을 맞아 추가 도발에 강경히 대응하겠다고 경고하며 긴장을 높였다. 분쟁의 근본 원인인 카슈미르 영유권 문제가 해결되지 않는 한 양국 관계 개선은 요원하다는 분석이 지배적이다.`,
  keyTerms:[{term:`작전명 신두르`,explanation:`2025년 5월 인도군이 파키스탄 내 테러 거점을 겨냥해 실시한 군사작전의 명칭입니다. 신두르는 힌두 문화에서 기혼 여성이 바르는 붉은 분가루를 뜻하며, 파할감 테러 희생자들을 기리는 의미를 담았습니다.`},{term:`핵보유국`,explanation:`핵무기를 보유하고 실전 배치할 능력을 갖춘 국가를 말합니다. 인도와 파키스탄은 모두 핵무기를 보유하고 있어, 양국 간 전쟁은 핵전쟁으로 확대될 위험이 있어 국제사회가 극도로 예민하게 반응합니다.`}],
  history:`인도와 파키스탄은 1947년 독립 분리 이후 세 차례 전쟁을 치렀으며 카슈미르 영유권 분쟁은 80년 가까이 이어지고 있다. 양국 모두 1998년 핵실험 이후 공식 핵보유국이 됐으며, 이후 직접 충돌이 발생할 때마다 핵 사용 가능성에 대한 우려가 부각됐다.`,
  players:`인도 모디 정부는 테러 대응에 단호한 의지를 보이며 국내 지지층을 결집했다. 파키스탄 군부는 전통적으로 안보 정책을 주도하며 인도의 군사 행동에 강경 대응 원칙을 내세웠다. 미국은 핵전쟁 방지 차원에서 즉각 개입해 양국을 설득했으나 근본 문제 해결에는 관여를 꺼렸다.`,
  current:`분쟁 1주년을 맞아 파키스탄이 강경 발언을 내놓고 인도도 방어 태세를 강화하면서 긴장이 다시 고조됐다. 로비 문건 공개로 파키스탄 국내에서 군부의 외교 역할에 대한 비판 여론도 형성되고 있다.`,
  outlook:`카슈미르에서 추가 테러나 국경 충돌이 발생할 경우 즉각적인 긴장 고조로 이어질 수 있다. 양국 간 직접 대화 채널 복원이 전제되지 않으면 중장기적인 관계 개선은 어렵다는 전망이 지배적이다.`,
  sources:[{title:`US lobbying disclosures puncture Asim Munir's India-Pakistan ceasefire claim - Tribune India`,url:`https://www.tribuneindia.com/news/world/us-lobbying-disclosures-puncture-asim-munirs-india-pakistan-may-ceasefire-claim/`},{title:`2025 India-Pakistan conflict - Wikipedia`,url:`https://en.wikipedia.org/wiki/2025_India%E2%80%93Pakistan_conflict`},{title:`Pakistan warns of strong response to any attack on anniversary of clash with India - Local10`,url:`https://www.local10.com/news/2026/05/07/pakistan-warns-of-strong-response-to-any-attack-on-anniversary-of-clash-with-india/`}]
}]

  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`트럼프, 이란 역제안 전면 거부 — 브렌트유 4% 급등 \$104 돌파, 이번 주 CPI·Fed 의장 인준 주목`,
  metrics:[`브렌트유 +4% → \$104.01/bbl, WTI +2.7% → \$97.97/bbl (협상 결렬 우려)`,`S&P 500 7,300대 유지, 코스피 4.32% 급등 7,822.24 역대 최고 경신`],
  summary:`이란이 미국의 종전 제안에 '호르무즈 해협 주권 인정 + 전쟁 배상금'을 역으로 요구하는 역제안을 제시하자, 트럼프 대통령이 소셜미디어에 '전혀 받아들일 수 없다(TOTALLY UNACCEPTABLE)'고 강경 반응하며 협상 결렬 우려가 커졌다. 이에 국제 유가가 즉각 반응해 브렌트유는 4% 올라 배럴당 \$104.01, WTI는 2.7% 오른 \$97.97을 기록했다. 반면 지난 5월 초 미-이란 협상 기대감 속에 급락했던 유가가 재차 \$100선을 넘어서며 인플레이션 재점화 경계감이 높아지고 있다. 글로벌 주식시장은 혼조세를 보였다. S&P 500은 7,300대를 유지했고, 한국 코스피는 반도체 랠리에 힘입어 4.32% 급등해 역대 최고치인 7,822.24를 경신했으며 SK하이닉스는 11% 이상 급등했다. 이번 주 최대 이벤트는 5월 12일(화) 미국 4월 CPI 발표(헤드라인 +3.7%YoY 예상)와, 5월 15일 파월 의장 임기 종료에 따른 케빈 워시 신임 Fed 의장 인준 표결이다. 유가 재급등이 CPI 서프라이즈를 유발할 경우 금리 인하 기대가 다시 후퇴할 수 있어 시장 변동성 확대가 예상된다.`,
  keyTerms:[],
  history:`2026년 3~4월 미국의 대이란 군사 행동 이후 이란은 호르무즈 해협을 실질적으로 봉쇄하며 전 세계 원유·LNG 공급량의 약 20%가 묶였다. 유가는 한때 배럴당 \$130대까지 치솟았고 글로벌 인플레이션이 재점화됐다. 4월 초 임시 휴전 합의 이후 유가가 \$94~\$101선으로 급락했으나, 항구적 종전 협상은 줄곧 난항을 겪었다.`,
  players:`트럼프 행정부는 최대 압박을 유지하면서 종전 협상을 주도하려 하며 군사 옵션 재개 가능성도 열어두고 있다. 이란은 핵 주권 보장·제재 해제·배상금 수령을 목표로 협상 조건을 높이고 있다. 파키스탄은 양측 메시지 전달 채널 역할을 하고 있으며, 중국은 이란 최대 원유 수입국으로서 해협 재개에 경제적 이해관계가 크다. 산유국들과 해운업계는 호르무즈 재개 시점을 예의주시하고 있다.`,
  current:`이란의 역제안은 미국이 수용하기 어려운 조건(호르무즈 주권+배상금)을 포함해 협상이 사실상 원점으로 돌아갔다는 평가가 나온다. 트럼프가 강경 입장을 유지하면서 군사 옵션 재개 가능성이 다시 부각되고 있고, 이것이 유가 급등의 직접 원인이 됐다.`,
  outlook:`5월 12일 CPI 발표에서 유가 급등의 영향으로 헤드라인 수치가 예상치를 웃돌 경우 금리 인하 기대가 크게 후퇴할 수 있다. 5월 15일 케빈 워시 Fed 의장 인준 여부도 통화정책 방향 가늠자가 된다. 이란 협상이 완전 결렬될 경우 유가 재차 \$115~\$120 시나리오까지 열려 있다.`,
  sources:[{title:`Oil jumps 4% as Trump rejects Iran's response to ceasefire proposal — Euronews`,url:`https://www.euronews.com/business/2026/05/11/oil-jumps-4-after-trump-rejects-irans-response-to-ceasefire-proposal`},{title:`Markets dip as US-Iran ceasefire goes nowhere, leaving Trump with a military option to reopen Hormuz — Fortune`,url:`https://fortune.com/2026/05/10/markets-dow-futures-crude-oil-prices-us-iran-ceasefire-trump-military-option-strait-of-hormuz/`},{title:`Asia markets live updates: Nikkei, Kospi, Hang Seng — CNBC`,url:`https://www.cnbc.com/2026/05/11/asia-markets-today-live-updates-nikkei-kospi-hang-seng-sensex-csi-300-iran-hormuz.html`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`러-우 3일 휴전 붕괴 — 양측 16,000건 이상 위반 상호 비난, 전선 교전 전면 재개`,
  metrics:[`러시아 주장: 우크라이나가 24시간 내 16,071건 휴전 위반 저질렀다`,`우크라이나 주장: 러시아 60차례 공격 감행, 민간인 1명 사망·15명 부상`],
  summary:`트럼프 대통령이 중재한 러시아-우크라이나 3일 휴전(5월 9~11일, 러시아 전승절 기념)이 사실상 붕괴됐다. 러시아 국방부는 우크라이나가 24시간 내 드론·포격으로 크림반도, 벨고로드주, 쿠르스크주 등에서 총 16,071건의 휴전 위반을 저질렀다고 주장했다. 우크라이나는 반박하며 러시아가 60차례 공격을 감행했고 민간인 1명이 사망하고 15명이 부상했다고 밝혔다. 젤렌스키 대통령은 러시아가 휴전을 준수하지도, '지키려는 노력조차 하지 않는다'고 강하게 비난했다. 양측은 대규모 도시 공습은 소강상태를 보였으나 전선 교전은 완전히 재개됐다. 앞서 부활절 등 여러 차례 합의된 임시 휴전이 모두 실질적 성과 없이 붕괴된 전례가 반복됐다. 한편 푸틴은 별도 회견에서 전쟁이 '끝나가고 있다'고 시사하며 제3국에서 젤렌스키와 만날 의향을 내비쳐 상반된 신호를 보냈다.`,
  keyTerms:[],
  history:`러시아는 2022년 2월 우크라이나를 전면 침공했고, 4년 이상 이어진 전쟁은 교착 상태에 빠졌다. 트럼프 2기 행정부 출범 이후 미국은 적극적인 중재자로 나섰으나 부활절·러시아 연방 기념일 등 여러 차례 합의된 임시 휴전은 모두 실패했다. 양측 간 근본적 불신이 해소되지 않은 채 미봉적 휴전만 반복되고 있다.`,
  players:`트럼프 대통령은 빠른 종전을 공약으로 내세운 만큼 중재 실패가 정치적 부담이 되고 있다. 푸틴은 '협상 용의'를 시사하면서도 실제 교전을 멈추지 않는 이중 전략을 구사하고 있다. 젤렌스키는 실질적 안전 보장 없이는 어떤 휴전도 용납할 수 없다는 입장이다. 유럽 동맹국들은 미국의 지원 지속 여부에 촉각을 세우고 있다.`,
  current:`휴전 붕괴는 종전 협상이 여전히 요원함을 재확인시켰다. 러-우 양측의 상호 비난이 외교적 모멘텀을 완전히 소진시키는 분위기이며, 트럼프의 다음 중재 시도가 어떤 형태가 될지 불확실하다.`,
  outlook:`5월 14~15일 트럼프-시진핑 베이징 정상회담에서 러시아-우크라이나 전쟁 중재 문제도 의제로 다뤄질 가능성이 있다. 푸틴의 '만남 의향' 발언이 단순한 외교적 제스처인지 실질적 신호인지가 단기 최대 관전 포인트다. 휴전 추가 합의 실패 시 유럽 에너지·곡물 가격 불안과 방산 지출 확대 압력이 지속될 전망이다.`,
  sources:[{title:`Russia and Ukraine accuse the other of ceasefire violations — Al Jazeera`,url:`https://www.aljazeera.com/video/newsfeed/2026/5/11/russia-and-ukraine-accuse-the-other-of-ceasefire-violations`},{title:`Russia and Ukraine accuse each other of violating U.S.-brokered ceasefire — CBS News`,url:`https://www.cbsnews.com/news/russia-ukraine-accuse-each-other-ceasefire-violations/`},{title:`Russia and Ukraine accuse each other of violating U.S.-brokered three-day ceasefire — PBS NewsHour`,url:`https://www.pbs.org/newshour/amp/world/russia-and-ukraine-accuse-each-other-of-violating-u-s-brokered-three-day-ceasefire`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`트럼프-시진핑 베이징 정상회담 5월 14~15일 확정 — 대만 최우선 의제, 이란·AI·희토류·무역도 논의`,
  metrics:[`정상회담 일정: 2026-05-14(목)~15(금), 베이징 — 트럼프 13일 저녁 도착 예정`,`세계 60개국 이상 지도자가 회담 결과를 촉각 주시 중 (CNBC 보도)`],
  summary:`미국과 중국이 도널드 트럼프 대통령의 베이징 방문 일정을 5월 14~15일로 공식 확정했다. 트럼프는 13일 저녁 베이징에 도착해 14일 시진핑 주석과 첫 공식 정상회담을 갖는다. 중국 측은 대만 문제를 가장 중요한 의제로 명시했고, 미국도 이를 수용해 대만 해협 안정화 여부가 핵심 관전 포인트가 됐다. 시진핑은 트럼프에게 대만 독립 반대 공식 표명과 무기 판매 제한을 압박할 것으로 예상된다. 이 밖에도 중국의 이란·러시아 관계, AI·반도체 기술 통제, 희토류 공급 확대, 농산물·보잉 항공기 구매 계약 등 광범위한 의제가 다뤄진다. 싱가포르부터 브뤼셀까지 60개국 이상의 정상들이 이 회담의 결과를 예의주시하고 있으며, 무역·안보·에너지 질서 전반에 영향을 줄 것으로 관측된다. 전문가들은 회담이 劇的 합의보다는 '관계 안정화'에 초점을 맞출 가능성이 높다고 분석한다.`,
  keyTerms:[],
  history:`미-중 관계는 반도체·AI 패권 경쟁, 대만 해협 긴장, 무역 갈등을 축으로 구조적 대립이 심화돼 왔다. 트럼프 2기 출범 이후 양측은 관세 협상과 갈등을 반복했고, 지난해 한국에서 열린 미-중 정상회담에서는 대만 문제가 의도적으로 배제됐다. 이번 베이징 회담은 트럼프 집권 2년차 첫 중국 방문으로, 관계 재설정의 전환점으로 주목된다.`,
  players:`트럼프는 무역 패키지 딜(중국의 농산물·보잉 구매)과 이란·러시아 관계 차단을 협상 카드로 활용하려 한다. 시진핑은 대만 문제에서 미국의 양보를 이끌어내고 희토류 수출 협력을 활용해 전략적 레버리지를 높이려 한다. 대만은 자국의 운명이 결정될 수 있는 회담을 긴장 속에 주시하고 있다. 한국·일본·유럽 등 동맹국들은 반도체 공급망과 대중 무역 정책 변화를 우려하며 촉각을 곤두세우고 있다.`,
  current:`이란 전쟁 중 중국이 이란과의 관계를 어떻게 유지하고 있는지가 트럼프의 핵심 문제 제기 사안이다. 회담 직전 희토류 공급 협력 패키지가 부상하면서 미-중 간 거래 성사 가능성도 제기되고 있다.`,
  outlook:`회담 결과는 대만 해협 긴장 수위, 반도체·AI 수출통제 완화 여부, 이란 전쟁 해법에 직접적 영향을 미친다. 양측 이해관계 충돌이 크고 국내 정치 압박도 있는 만큼 劇的 합의보다는 부분 합의 + 후속 협의 로드맵 제시 수준에 그칠 것이라는 전망이 우세하다. 회담 결렬 시 대만 해협 및 반도체 공급망 충격이 금융시장에 즉각 반영될 수 있다.`,
  sources:[{title:`From Singapore to Brussels, world leaders eye Trump-Xi summit from afar — CNBC`,url:`https://www.cnbc.com/2026/05/11/trump-xi-summit-beijing-global-leaders-iran-war-taiwan-strait-of-hormuz-.html`},{title:`US-China relations: What to expect from the Trump-Xi summit — World Economic Forum`,url:`https://www.weforum.org/stories/2026/05/what-to-expect-trump-xi-summit-china-us/`},{title:`Taiwan tops Beijing's agenda for Trump-Xi summit — The Standard HK`,url:`https://www.thestandard.com.hk/china/article/330674/Taiwan-tops-Beijings-agenda-for-Trump-Xi-summit`}]
}]

let current = null;
let currentCat = null;
const CAT_ORDER = ['경제', '정치', '기타 이슈'];

function renderSidebar() {
  const list = document.getElementById('date-list');
  list.innerHTML = '';
  BRIEFS.forEach((b, i) => {
    const el = document.createElement('div');
    el.className = 'date-item' + (i === 0 ? ' active' : '');
    el.dataset.tag = b.tag;
    const parts = b.tag.split('-');
    const short = parts[1] + '/' + parts[2];
    el.innerHTML = b.tag;
    el.addEventListener('click', () => showBrief(b.tag));
    list.appendChild(el);
  });
}

function showBrief(tag) {
  current = tag;
  document.querySelectorAll('.date-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tag === tag);
  });
  const brief = BRIEFS.find(b => b.tag === tag);
  if (!brief) return;

  // 카테고리별 그룹핑
  const grouped = {};
  brief.stories.forEach(s => {
    if (!grouped[s.category]) grouped[s.category] = [];
    grouped[s.category].push(s);
  });
  const availableCats = CAT_ORDER.filter(c => grouped[c] && grouped[c].length);
  if (!availableCats.length) return;

  // 기본 카테고리 결정
  if (!availableCats.includes(currentCat)) currentCat = availableCats[0];

  renderContent(brief, grouped, availableCats);
}

function renderContent(brief, grouped, availableCats) {
  const content = document.getElementById('content');
  let html = `<div class="brief-header">
    <div class="bh-eyebrow">Morning Brief</div>
    <h2>${brief.label}</h2>
  </div>`;

  // 탭
  html += '<div class="cat-tabs">';
  availableCats.forEach(c => {
    const cls = c === currentCat ? 'cat-tab active' : 'cat-tab';
    html += `<button class="${cls}" data-cat="${c}">${c}</button>`;
  });
  html += '</div>';

  // 선택된 카테고리 기사들
  const stories = grouped[currentCat] || [];
  stories.forEach((s, idx) => {
    if (idx > 0) html += '<hr class="story-divider">';
    html += `<div class="story">
      <div class="story-top">
        <div class="story-headline">${s.headline}</div>
      </div>`;
    if (s.metrics.length) {
      html += '<div class="metrics">';
      s.metrics.forEach(m => { html += `<div class="metric-chip">${m}</div>`; });
      html += '</div>';
    }
    // 요약문에 핵심 개념 밑줄 (출력은 박스 다음)
    let summaryHtml = s.summary;
    if (s.keyTerms && s.keyTerms.length) {
      s.keyTerms.forEach(kt => {
        if (!kt.term) return;
        const safe = kt.term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const re = new RegExp(safe, 'g');
        summaryHtml = summaryHtml.replace(re, `<span class="kt-underline">${kt.term}</span>`);
      });
    }

    // 핵심 개념 박스 (요약 위)
    if (s.keyTerms && s.keyTerms.length) {
      html += '<div class="key-terms"><div class="key-terms-title">핵심 개념</div>';
      s.keyTerms.forEach(kt => {
        html += `<div class="kt-item">
          <span class="kt-term">${kt.term}</span>
          <span class="kt-exp">${kt.explanation}</span>
        </div>`;
      });
      html += '</div>';
    }

    html += `<div class="summary">${summaryHtml}</div>`;

    const bgSections = [
      ['역사적 맥락', s.history],
      ['핵심 플레이어', s.players],
      ['현재 구도', s.current],
      ['향후 전망', s.outlook],
    ].filter(([, v]) => v);

    if (bgSections.length) {
      html += '<div class="bg-box"><div class="bg-box-title">배경 스토리</div>';
      bgSections.forEach(([label, text]) => {
        html += `<div class="bg-section">
          <div class="bg-section-label">${label}</div>
          <div class="bg-section-text">${text}</div>
        </div>`;
      });
      html += '</div>';
    }

    if (s.sources.length) {
      html += `<button class="sources-toggle" data-toggle="srcs-${idx}">출처 ${s.sources.length}개 보기 <span class="arrow">▾</span></button>`;
      html += `<div class="sources-body" id="srcs-${idx}">`;
      s.sources.forEach((src, si) => {
        html += `<div class="source-item">
          <span class="src-num">${si+1}</span>
          <a href="${src.url}" target="_blank">${src.title}</a>
        </div>`;
      });
      html += '</div>';
    }
    html += '</div>';
  });

  content.innerHTML = html;

  // 탭 클릭 핸들러
  content.querySelectorAll('.cat-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      renderContent(brief, grouped, availableCats);
    });
  });

  // 출처 토글
  content.querySelectorAll('.sources-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const body = document.getElementById(btn.dataset.toggle);
      const isOpen = body.classList.toggle('open');
      btn.classList.toggle('open', isOpen);
    });
  });

  document.getElementById('main').scrollTop = 0;
}

if (BRIEFS.length > 0) {
  renderSidebar();
  showBrief(BRIEFS[0].tag);
} else {
  document.getElementById('content').innerHTML = '<div class="empty">브리핑 데이터가 없습니다.</div>';
}

// ── Quiz Gate ──
const PASS_TARGET = 3;
let correctCount = 0;
const usedIndexes = new Set();

function pickQuestion() {
  // 사용 안 한 문제 중 랜덤. 다 썼으면 풀 리셋
  if (usedIndexes.size >= QUIZ.length) usedIndexes.clear();
  let idx;
  do { idx = Math.floor(Math.random() * QUIZ.length); } while (usedIndexes.has(idx));
  usedIndexes.add(idx);
  return QUIZ[idx];
}

function updateCounter() {
  document.getElementById('quiz-counter').textContent = `(${correctCount}/${PASS_TARGET})`;
}

function renderQuiz() {
  const q = pickQuestion();
  document.getElementById('quiz-q').textContent = q.q;
  updateCounter();
  const feedback = document.getElementById('quiz-feedback');
  feedback.textContent = '';
  feedback.className = 'quiz-feedback';
  const closeBtn = document.getElementById('quiz-close');
  closeBtn.classList.add('hidden');

  const choicesEl = document.getElementById('quiz-choices');
  choicesEl.innerHTML = '';
  q.a.forEach((text, idx) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-choice';
    btn.textContent = text;
    btn.addEventListener('click', () => {
      const allBtns = choicesEl.querySelectorAll('.quiz-choice');
      allBtns.forEach(b => b.disabled = true);
      if (idx === q.correct) {
        btn.classList.add('correct');
        correctCount++;
        updateCounter();
        if (correctCount >= PASS_TARGET) {
          feedback.textContent = '통과! 들어와도 좋아.';
          feedback.className = 'quiz-feedback right';
          closeBtn.classList.remove('hidden');
        } else {
          feedback.textContent = '역시 맞출 줄 알았어. 다음 문제 고.';
          feedback.className = 'quiz-feedback right';
          btn.blur();
          setTimeout(() => {
            if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
            renderQuiz();
          }, 900);
        }
      } else {
        btn.classList.add('wrong');
        feedback.textContent = '정말 실망이다.... 다음.';
        feedback.className = 'quiz-feedback wrong';
        btn.blur();
        setTimeout(() => {
          if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
          renderQuiz();
        }, 900);
      }
    });
    choicesEl.appendChild(btn);
  });
}

document.getElementById('quiz-close').addEventListener('click', () => {
  document.getElementById('quiz-overlay').classList.add('hidden');
  document.body.classList.remove('quiz-active');
});

document.body.classList.add('quiz-active');
renderQuiz();

// ── Mobile sidebar toggle ──
const sidebar = document.getElementById('sidebar');
const backdrop = document.getElementById('sidebar-backdrop');
function toggleSidebar(open) {
  sidebar.classList.toggle('open', open);
  backdrop.classList.toggle('open', open);
}
document.getElementById('sidebar-toggle').addEventListener('click', () => toggleSidebar(!sidebar.classList.contains('open')));
backdrop.addEventListener('click', () => toggleSidebar(false));
// 날짜 클릭하면 모바일에서 자동으로 닫히게
sidebar.addEventListener('click', e => {
  if (e.target.classList.contains('date-item') && window.innerWidth <= 768) {
    toggleSidebar(false);
  }
});
</script>

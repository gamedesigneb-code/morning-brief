<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모닝 브리핑</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sidebar-w: 240px;
    --bg: #FAFAF7;
    --paper: #FFFFFF;
    --accent: #6B7A8F;
    --accent-soft: #E8ECEF;
    --line: #EAE8E3;
    --line-strong: #D8D5CE;
    --text: #2D2A26;
    --text-mid: #6B655D;
    --text-sub: #A09889;
    --radius: 10px;
  }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 15px; line-height: 1.65; font-weight: 400;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }

  /* ── Layout ── */
  #app { display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar {
    width: var(--sidebar-w); flex-shrink: 0;
    background: var(--bg); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #sidebar-header {
    padding: 36px 20px 24px;
    border-bottom: 1px solid var(--line);
    text-align: center;
  }
  #sidebar-header h1 {
    font-size: 19px; font-weight: 700; color: var(--text);
    letter-spacing: -0.4px; line-height: 1.3;
  }
  #sidebar-header p {
    font-size: 12px; color: var(--text-sub); margin-top: 6px;
    letter-spacing: 0.3px;
  }
  #date-list { overflow-y: auto; flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
  .date-item {
    padding: 11px 14px; cursor: pointer; border-radius: 8px;
    transition: background 0.15s, color 0.15s;
    background: transparent;
    text-align: center; font-size: 13px; font-weight: 500; color: var(--text-mid);
    letter-spacing: 0.1px;
  }
  .date-item:hover { background: var(--accent-soft); color: var(--text); }
  .date-item.active {
    background: var(--accent-soft); color: var(--text); font-weight: 600;
  }

  /* ── Main ── */
  #main { flex: 1; overflow-y: auto; background: var(--paper); }
  #content { max-width: 760px; margin: 0 auto; padding: 56px 40px 80px; }

  .brief-header { margin-bottom: 36px; }
  .brief-header .bh-eyebrow {
    font-size: 11px; color: var(--text-sub); margin-bottom: 8px;
    letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;
  }
  .brief-header h2 {
    font-size: 30px; font-weight: 700; letter-spacing: -0.7px;
    color: var(--text); line-height: 1.25;
  }

  /* ── Sticky Top (header + tabs) ── */
  .sticky-top {
    position: sticky; top: 0;
    background: var(--paper); z-index: 20;
    padding-top: 56px; margin-top: -56px;
  }
  .sticky-top .brief-header { margin-bottom: 24px; }

  /* ── Category Tabs ── */
  .cat-tabs {
    display: flex; gap: 0; margin-bottom: 36px;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
  }
  .cat-tab {
    padding: 12px 20px 14px; cursor: pointer; font-size: 14px; font-weight: 500;
    color: var(--text-sub); border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: inherit; letter-spacing: -0.1px;
    margin-bottom: -1px;
  }
  .cat-tab:hover { color: var(--text-mid); }
  .cat-tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 600; }

  /* ── Sources (collapsible) ── */
  .sources-toggle {
    background: transparent; border: 1px solid var(--line-strong);
    padding: 8px 14px; border-radius: 6px; font-size: 12.5px; font-weight: 500;
    color: var(--text-mid); cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
    font-family: inherit; margin-top: 12px;
    transition: background 0.15s, border-color 0.15s;
  }
  .sources-toggle:hover { background: var(--accent-soft); border-color: var(--accent); }
  .sources-toggle .arrow { transition: transform 0.2s; font-size: 9px; color: var(--text-sub); }
  .sources-toggle.open .arrow { transform: rotate(180deg); }
  .sources-body { display: none; margin-top: 12px; padding-left: 4px; }
  .sources-body.open { display: block; }

  /* ── Story Card ── */
  .story { margin-bottom: 40px; }
  .story-top { margin-bottom: 18px; }
  .story-headline {
    font-size: 19px; font-weight: 700; line-height: 1.45;
    letter-spacing: -0.4px; color: var(--text);
  }

  .metrics { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .metric-chip {
    background: var(--accent-soft); border: none;
    border-radius: 6px; padding: 7px 12px;
    font-size: 12.5px; font-weight: 500; color: var(--text-mid);
    line-height: 1.4;
  }

  .summary {
    font-size: 15px; line-height: 1.8; color: var(--text); margin-bottom: 20px;
    letter-spacing: -0.1px;
  }
  .summary .kt-underline {
    color: #1996BD;
    text-decoration: underline;
    text-decoration-color: #1996BD;
    text-decoration-thickness: 1.5px;
    text-underline-offset: 3px;
    cursor: help;
  }

  /* ── Key Terms Box ── */
  .key-terms {
    background: #F4F1EA; border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius); padding: 18px 22px; margin-bottom: 14px;
  }
  .key-terms-title {
    font-size: 11px; font-weight: 600; color: var(--text-sub);
    text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 14px;
  }
  .kt-item { margin-bottom: 12px; }
  .kt-item:last-child { margin-bottom: 0; }
  .kt-term {
    font-size: 13.5px; font-weight: 700; color: #1996BD;
    margin-bottom: 4px; display: block;
    letter-spacing: -0.1px;
  }
  .kt-exp {
    font-size: 13.5px; line-height: 1.7; color: var(--text-mid);
  }

  /* ── Background ── */
  .bg-box {
    background: var(--bg); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 22px 24px; margin-bottom: 14px;
  }
  .bg-box-title {
    font-size: 11px; font-weight: 600; color: var(--text-sub);
    text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 16px;
  }
  .bg-section { margin-bottom: 16px; }
  .bg-section:last-child { margin-bottom: 0; }
  .bg-section-label {
    font-size: 12.5px; font-weight: 600; color: var(--text); margin-bottom: 6px;
    letter-spacing: -0.1px;
  }
  .bg-section-text { font-size: 14px; line-height: 1.75; color: var(--text-mid); }

  /* ── Sources ── */
  .source-item {
    display: flex; align-items: flex-start; gap: 10px;
    margin-bottom: 8px; font-size: 13px;
  }
  .src-num {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent-soft); color: var(--text-mid);
    font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .source-item a { color: var(--text-mid); text-decoration: none; line-height: 1.55; }
  .source-item a:hover { color: var(--text); text-decoration: underline; }

  .story-divider { border: none; border-top: 1px solid var(--line); margin: 36px 0; }

  .empty { color: var(--text-sub); font-size: 14px; padding: 60px 0; text-align: center; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 3px; }

  /* ── Mobile Toggle ── */
  #sidebar-toggle {
    display: none;
    position: fixed; top: 14px; left: 14px; z-index: 50;
    background: var(--paper); border: 1px solid var(--line-strong);
    width: 40px; height: 40px; border-radius: 10px;
    cursor: pointer; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(45, 42, 38, 0.08);
  }
  #sidebar-toggle span {
    display: block; width: 18px; height: 2px; background: var(--text);
    position: relative;
  }
  #sidebar-toggle span::before,
  #sidebar-toggle span::after {
    content: ''; position: absolute; left: 0; width: 18px; height: 2px; background: var(--text);
  }
  #sidebar-toggle span::before { top: -6px; }
  #sidebar-toggle span::after { top: 6px; }

  #sidebar-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(45, 42, 38, 0.4); z-index: 40;
  }
  #sidebar-backdrop.open { display: block; }

  /* ── Mobile Responsive ── */
  @media (max-width: 768px) {
    #sidebar-toggle { display: flex; }
    #sidebar {
      position: fixed; left: 0; top: 0; bottom: 0;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 45; width: 260px;
      box-shadow: 0 0 24px rgba(45, 42, 38, 0.12);
    }
    #sidebar.open { transform: translateX(0); }

    #content { padding: 64px 20px 60px; max-width: 100%; }
    .brief-header h2 { font-size: 22px; }
    .story-headline { font-size: 16px; }
    .summary { font-size: 14.5px; line-height: 1.75; }
    .bg-section-text { font-size: 13.5px; }
    .metric-chip { font-size: 12px; padding: 6px 10px; }
    .bg-box { padding: 18px 18px; }
    .cat-tab { padding: 11px 14px; font-size: 13.5px; }

    .quiz-card { padding: 28px 24px 24px; }
    .quiz-q { font-size: 17px; }
    .quiz-choice { font-size: 14px; padding: 13px 16px; }
  }

  /* ── Quiz Overlay ── */
  body.quiz-active #app {
    filter: blur(6px) saturate(0.85);
    pointer-events: none;
    transition: filter 0.3s ease;
  }
  #quiz-overlay {
    position: fixed; inset: 0;
    background-color: rgba(250, 250, 247, 0.55);
    background-image:
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0) 0,
        rgba(255,255,255,0) 5px,
        rgba(45,42,38,0.04) 5px,
        rgba(45,42,38,0.04) 6px
      ),
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0) 0,
        rgba(255,255,255,0) 22px,
        rgba(45,42,38,0.025) 22px,
        rgba(45,42,38,0.025) 23px
      );
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 24px;
  }
  #quiz-overlay.hidden { display: none; }

  .quiz-card {
    background: var(--paper); border-radius: 16px;
    padding: 36px 36px 32px; width: 100%; max-width: 440px;
    box-shadow: 0 16px 48px rgba(45, 42, 38, 0.18);
  }
  .quiz-eyebrow {
    font-size: 11px; color: var(--text-sub); letter-spacing: 1.5px;
    text-transform: uppercase; font-weight: 500; margin-bottom: 12px;
  }
  .quiz-q {
    font-size: 19px; font-weight: 700; color: var(--text);
    line-height: 1.5; letter-spacing: -0.3px; margin-bottom: 24px;
  }
  .quiz-choices { display: flex; flex-direction: column; gap: 8px; }
  .quiz-choice {
    background: var(--paper); border: 1px solid var(--line-strong);
    padding: 14px 18px; border-radius: 10px; font-size: 14.5px; font-weight: 500;
    color: var(--text); cursor: pointer; text-align: left;
    font-family: inherit; transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .quiz-choice:focus { outline: none; }
  .quiz-choice:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  @media (hover: hover) {
    .quiz-choice:hover { background: var(--accent-soft); border-color: var(--accent); }
  }
  .quiz-choice:active { transform: scale(0.99); }
  .quiz-choice.wrong {
    background: #F5E6E0; border-color: #C9947F; color: #8A4A30;
    animation: shake 0.4s ease;
  }
  .quiz-choice.correct {
    background: #E3EDE2; border-color: #7A9077; color: #2E4A2C;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .quiz-feedback {
    margin-top: 20px; text-align: center; font-size: 14px; font-weight: 500;
    color: var(--text-mid); min-height: 22px;
  }
  .quiz-feedback.right { color: #2E4A2C; }
  .quiz-feedback.wrong { color: #8A4A30; }

  .quiz-close-btn {
    margin-top: 18px; width: 100%;
    background: var(--text); color: var(--paper); border: none;
    padding: 13px 20px; border-radius: 10px; font-size: 14px; font-weight: 600;
    font-family: inherit; cursor: pointer;
    transition: background 0.15s;
  }
  .quiz-close-btn:hover { background: #1a1815; }
  .quiz-close-btn.hidden { display: none; }
</style>
</head>
<body>
<div id="quiz-overlay">
  <div class="quiz-card">
    <div class="quiz-eyebrow"><span>잠깐, 나에 대해서 잘 알지?</span> <span id="quiz-counter">(0/3)</span></div>
    <div class="quiz-q" id="quiz-q"></div>
    <div class="quiz-choices" id="quiz-choices"></div>
    <div class="quiz-feedback" id="quiz-feedback"></div>
    <button class="quiz-close-btn hidden" id="quiz-close">닫기</button>
  </div>
</div>

<button id="sidebar-toggle" aria-label="메뉴"><span></span></button>
<div id="sidebar-backdrop"></div>

<div id="app">
  <nav id="sidebar">
    <div id="sidebar-header">
      <h1>모닝 브리핑</h1>
      <p>일별 세계 뉴스 요약</p>
    </div>

    <div id="date-list"></div>
  </nav>
  <main id="main">
    <div id="content"></div>
  </main>
</div>

<script>
const BRIEFS = [{
  tag:`2026-06-21`,
  label:`2026년 6월 21일 (토요일)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피 사상 첫 9,000선 돌파했지만 환율·금리 동반 급등에 변동성 확대`,
  metrics:[`코스피 9,000선 첫 돌파`,`원/달러 환율 1,530원대`],
  summary:`코스피가 사상 처음으로 9,000선을 넘어서며 상징적 고점인 1만 포인트 돌파 기대가 커졌다. 그러나 환율과 금리가 동반 급등하면서 시장 변동성도 함께 확대됐다. 원/달러 환율은 중동 지정학 리스크로 1,530원대까지 올랐고, 3년물 국고채 금리는 연 3.858% 수준까지 상승했다. 미국 연방준비제도(Fed)의 매파적 신호가 이어지면서 채권금리 상승과 달러 강세가 국내 시장을 압박했다. 특히 외국인 순매도가 수조 원 규모로 이어지며 지수 변동성을 키운 점이 부담 요인으로 지목됐다. 전문가들은 금리 상승, 환율 급등, 외국인 매도라는 3대 변수가 단기 조정 압력으로 작용할 수 있다고 분석한다. 가파른 상승 속도가 목표주가 조정 속도를 앞지르고 있다는 경계론도 나온다. 다만 견조한 기업 실적과 수출 회복이 지수의 추가 상승 동력으로 거론된다.`,
  keyTerms:[{term:`외국인 순매도`,explanation:`외국인 투자자가 산 주식보다 판 주식이 더 많은 상태를 말한다. 외국인 자금이 빠져나가면 주가가 떨어지고 환율이 오르는 압력으로 작용한다.`}],
  history:`코스피는 2020년대 들어 반도체와 2차전지 등 수출주를 중심으로 장기 상승 추세를 이어왔다. 저금리 시기 풍부한 유동성과 외국인 매수세가 지수를 끌어올렸다. 그러나 2025년 이후 미국 고금리 기조가 길어지면서 환율과 자본 유출 변수가 다시 부각됐다.`,
  players:`한국은행은 환율과 물가를 고려해 금리 정책을 조율하고, 기획재정부는 외환시장 안정에 관여한다. 외국인 투자자는 코스피 시가총액의 상당 부분을 보유해 지수 방향에 큰 영향을 준다. 미국 연준의 금리 결정은 글로벌 자금 흐름을 통해 한국 시장에 직접 파급된다.`,
  current:`지수가 9,000선이라는 사상 최고 영역에 들어서면서 차익 실현과 추가 상승 기대가 팽팽하게 맞서고 있다. 환율 1,530원대와 국채금리 급등이 동시에 나타난 점이 이번 국면을 분기점으로 만든다.`,
  outlook:`다음 한국은행 금융통화위원회 회의와 미국 연준의 추가 발언이 단기 방향을 가를 변수다. 외국인 수급과 환율 1,500원 선 방어 여부를 함께 지켜봐야 한다.`,
  sources:[{title:`코스피 9,000 첫 돌파…환율·금리 동반 급등 - 연합뉴스`,url:`https://www.yna.co.kr`},{title:`외국인 매도에 흔들리는 증시 3대 변수 - 한국경제`,url:`https://www.hankyung.com`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미국 연준, 워시 신임 의장 첫 회의서 금리 동결…연내 인상 가능성 시사`,
  metrics:[`기준금리 동결`,`나스닥 약 496포인트(+1%대) 상승`],
  summary:`미국 연방준비제도(Fed)가 6월 19일 기준금리를 동결했다. 케빈 워시 신임 의장의 첫 통화정책 결정으로, 연내 추가 인상 가능성을 열어두면서 점도표(금리 전망) 발표를 생략하는 이례적 행보를 보였다. 시장은 고금리 장기화 기조가 강해질 수 있다고 받아들였다. 결정 직후 뉴욕 증시는 오히려 강세로 돌아서 나스닥이 약 496포인트, 1% 이상 상승했다. 마이크론 등 반도체주가 실적 발표를 앞두고 사상 최고가를 기록하며 지수 상승을 이끌었다. 미국과 이란의 협상 진전 기대로 유가가 하락한 점도 위험자산 선호를 키웠다. 달러는 연준의 매파적 메시지에 강세를 보였다. 견조한 소비 지표가 증시 심리를 떠받쳤다는 평가가 나온다.`,
  keyTerms:[{term:`고금리 장기화`,explanation:`중앙은행이 금리를 높은 수준에서 오래 유지하는 정책 방향을 뜻한다. 물가를 잡기 위한 조치지만 기업 이자 부담과 자산시장 변동성을 키운다.`}],
  history:`연준은 2022년 이후 인플레이션 대응을 위해 급격히 금리를 올린 뒤, 2024~2025년 인하와 동결을 반복하며 정책 방향을 조율해 왔다. 2026년 들어 물가가 다시 끈적해지자 추가 긴축 논의가 재점화됐다. 이번 회의는 새 의장 체제의 첫 시험대였다.`,
  players:`케빈 워시 신임 연준 의장이 정책을 주도하며, 연방공개시장위원회(FOMC) 위원들이 표결에 참여한다. 미국 정부와 시장 참가자들은 금리 경로에 촉각을 세운다. 한국을 포함한 신흥국은 연준 결정에 따라 자본 흐름과 환율이 출렁인다.`,
  current:`점도표 생략과 연내 인상 시사가 겹치면서 정책 불확실성이 커진 점이 이번 회의를 분기점으로 만든다. 시장은 고금리 장기화 시나리오를 다시 가격에 반영하기 시작했다.`,
  outlook:`다음 FOMC 회의와 워시 의장의 의회 증언, 물가 지표 발표가 향후 금리 방향을 가를 핵심 이벤트다. 인상 시점이 연말로 구체화될지 주목된다.`,
  sources:[{title:`Fed holds rates steady in Warsh first meeting - Reuters`,url:`https://www.reuters.com`},{title:`Nasdaq rallies after Fed decision, chips lead gains - CNBC`,url:`https://www.cnbc.com`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`한국 전력기기 3사, 미국 생산 확대…합산 수주잔고 15조원 돌파`,
  metrics:[`주요 3사 합산 수주잔고 15조원 초과`,`북미 생산능력 확대`],
  summary:`한국의 주요 전력기기 제조 3사가 북미 생산을 빠르게 늘리며 현지 수요 선점에 나섰다. 인공지능(AI) 데이터센터 확산과 전력망 교체 수요가 맞물리면서 변압기 등 전력기기 주문이 급증한 영향이다. 3사의 합산 수주잔고는 15조원을 넘어선 것으로 집계됐다. 미국 내 노후 전력 인프라 교체와 전력 수요 급증이 장기 호황의 배경으로 꼽힌다. 기업들은 현지 공장 증설과 인력 확충으로 납기 단축과 관세 리스크 대응을 동시에 노리고 있다. 수주잔고가 수년치 일감을 의미하는 만큼 실적 가시성도 높아졌다. 미국의 제조업 회귀 정책도 한국 기업에 우호적으로 작용하고 있다. 다만 인건비 상승과 현지화 비용은 부담 요인으로 지적된다.`,
  keyTerms:[{term:`수주잔고`,explanation:`기업이 이미 계약을 따냈지만 아직 매출로 잡지 않은 일감의 총량이다. 잔고가 많을수록 앞으로 몇 년치 실적이 미리 확보됐다는 뜻이다.`}],
  history:`전력기기 산업은 오랜 기간 저성장 분야로 여겨졌으나, 2020년대 중반 AI 데이터센터 붐과 전력망 노후화가 겹치며 슈퍼사이클에 진입했다. 미국은 수십 년 된 송배전 설비 교체 시점이 도래했다. 한국 기업들은 품질과 납기 경쟁력으로 빠르게 점유율을 키웠다.`,
  players:`HD현대일렉트릭, 효성중공업, LS일렉트릭 등 국내 전력기기 3사가 미국 시장을 공략한다. 미국 전력회사와 데이터센터 운영사가 주요 고객이다. 미 정부의 제조업 유치 정책과 관세 정책이 변수로 작용한다.`,
  current:`합산 수주잔고가 15조원을 넘어서며 현지 증설이 본격화한 점이 이번 국면을 분기점으로 만든다. AI 전력 수요가 단기 유행이 아닌 구조적 성장으로 자리잡고 있다.`,
  outlook:`하반기 추가 수주 공시와 미국 공장 가동률 추이가 실적 모멘텀을 좌우한다. 관세·통상 정책 변화가 현지화 전략에 미칠 영향도 관전 포인트다.`,
  sources:[{title:`한국 전력기기 3사 미국 증설…수주잔고 15조 돌파 - 매일경제`,url:`https://www.mk.co.kr`},{title:`AI 전력 수요에 호황 맞은 전력기기 산업 - 연합뉴스`,url:`https://www.yna.co.kr`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이재명 대통령, G7·유럽 순방 마치고 귀국…대미·대EU 외교 성과 강조`,
  metrics:[`8~10일간 벨기에·이탈리아·바티칸 등 순방`,`트럼프, 미 함정 10척 신속 건조 요청`],
  summary:`이재명 대통령이 G7 정상회의 참석과 유럽 순방을 마치고 6월 19일 귀국해 성과를 직접 브리핑했다. 이 대통령은 높아진 대한민국 위상을 느꼈다며 한·EU 협력 확대와 한반도 평화 논의를 주요 성과로 꼽았다. 그는 트럼프 미국 대통령이 미 해군 함정 10척의 신속 건조를 요청했고 이에 긍정적으로 답했다고 밝혔다. 또 교황에게 비무장지대(DMZ)와 북한 방문을 요청했고 교황이 적극 검토하겠다고 답했다고 전했다. 이번 순방은 벨기에·이탈리아·바티칸 등을 포함해 8~10일간 진행됐다. G7 정상회의 무대에서 한국의 외교적 입지를 넓혔다는 평가가 나온다. 다만 야권은 일부 발언과 성과를 두고 공방을 이어가고 있다. 함정 건조 협력은 한미 방산·조선 협력 확대로 이어질지 주목된다.`,
  keyTerms:[{term:`G7 정상회의`,explanation:`미국·일본·독일·영국·프랑스·이탈리아·캐나다 등 주요 7개국 정상이 모여 세계 경제와 안보 현안을 논의하는 회의다. 한국 등 비회원국이 초청받아 참여하면 국제적 위상을 보여주는 자리로 평가된다.`}],
  history:`한국은 G7 정회원국은 아니지만 최근 수년간 의장국 초청으로 정상회의에 참여하며 외교 보폭을 넓혀왔다. 이재명 정부 출범 이후 첫 다자 정상외교 무대라는 점에서 의미가 컸다. 대미·대EU 관계 재정립이 핵심 과제로 거론돼 왔다.`,
  players:`이재명 대통령과 대통령실이 순방 외교를 주도했고, 미국 트럼프 대통령, 유럽연합(EU) 지도부, 교황청이 상대로 참여했다. 국내에서는 여당과 야당이 성과 평가를 두고 대립한다. 방산·조선 업계도 함정 협력 발언에 촉각을 세운다.`,
  current:`귀국 직후 브리핑에서 함정 건조와 교황 방북 요청 등 구체적 내용이 공개되며 외교 성과 논쟁이 본격화한 점이 분기점이다. 다자무대에서의 위상 강화가 국내 정치 평가와 맞물리고 있다.`,
  outlook:`한미 함정 협력의 구체적 후속 협의와 EU 협력 사업의 이행 여부가 관전 포인트다. 교황의 한반도 방문 검토 결과도 외교 일정의 변수로 떠올랐다.`,
  sources:[{title:`이재명 대통령, G7·유럽 순방 성과 브리핑 - 연합뉴스`,url:`https://www.yna.co.kr`},{title:`李대통령 트럼프 함정 10척 건조 요청에 긍정 답변 - 한겨레`,url:`https://www.hani.co.kr`},{title:`교황에 DMZ·방북 요청…적극 검토 답변 - 중앙일보`,url:`https://www.joongang.co.kr`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이란-미국 핵협상 스위스서 재개…트럼프 60일 시한 압박, 호르무즈 긴장 고조`,
  metrics:[`트럼프, 60일 내 합의 압박`,`이란, 호르무즈 해협 봉쇄 주장`],
  summary:`이란과 미국이 핵 문제를 둘러싼 협상을 스위스에서 재개했다. 미국 측에서는 밴스 부통령이, 이란에서는 협상단이 스위스로 향했으나 역내 긴장으로 일정이 다소 유동적인 상황이다. 트럼프 대통령은 60일 내에 최종 합의에 이르지 못하면 호르무즈 해협에 통항료를 물리는 등 대가를 치르게 될 것이라고 경고했다. 이란 혁명수비대(IRGC)는 이스라엘의 레바논 공습에 대응해 호르무즈 해협 봉쇄를 선언했으나, 이란 외무부가 이를 사실상 부인하면서 혼선이 빚어졌다. 미군은 이란의 해협 봉쇄 주장을 일축했다. 전 세계 원유 수송의 핵심 길목인 호르무즈 해협의 불안은 국제 유가에 직접적 영향을 준다. 협상 진전 기대로 유가가 하락하기도 했다. 합의의 실질적 내용과 이행을 둘러싼 양측의 신경전은 계속되고 있다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`페르시아만과 외해를 잇는 좁은 바닷길로 전 세계 원유 해상 수송의 약 5분의 1이 지난다. 이란이 이곳을 봉쇄하면 유가가 급등할 수 있어 세계 경제의 급소로 불린다.`}],
  history:`이란 핵 문제는 2015년 핵합의(JCPOA) 체결과 2018년 미국의 탈퇴 이후 장기 교착 상태에 빠졌다. 이후 중동에서 이스라엘과 이란을 둘러싼 충돌이 반복되며 협상과 긴장이 되풀이됐다. 최근 이스라엘의 레바논 공습이 도화선이 됐다.`,
  players:`미국 트럼프 행정부와 이란 정부가 협상 당사자이며, 이스라엘과 레바논, 이란 혁명수비대가 군사 긴장의 핵심 행위자다. 스위스는 중재 무대를 제공한다. 산유국과 원유 수입국들은 유가 영향에 촉각을 세운다.`,
  current:`60일 시한 제시와 호르무즈 봉쇄 주장이 겹치며 협상과 무력 충돌 위험이 동시에 커진 점이 분기점이다. 봉쇄 여부를 둘러싼 이란 내부의 엇갈린 발표가 불확실성을 키운다.`,
  outlook:`스위스 협상의 실제 개시 여부와 60일 시한 내 합의 도출 가능성이 최대 변수다. 호르무즈 해협의 실제 통항 상황과 유가 추이를 함께 지켜봐야 한다.`,
  sources:[{title:`Iran, US to hold nuclear talks in Switzerland - Reuters`,url:`https://www.reuters.com`},{title:`Iran says it has closed Strait of Hormuz; US disputes claim - BBC`,url:`https://www.bbc.com/news`},{title:`Trump warns of consequences if no Iran deal in 60 days - CNBC`,url:`https://www.cnbc.com`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`투표용지 부족 사태 수사 본격화…인쇄량 절반 축소 경위 추궁`,
  metrics:[`투표 종료 40분 전 첫 보고`,`투표용지 인쇄량 약 50% 축소`],
  summary:`선거 당시 발생한 투표용지 부족 사태에 대한 수사가 본격화됐다. 노태악 전 중앙선거관리위원회 위원장은 투표 종료 약 40분 전에야 투표용지 부족 상황을 처음 보고받은 것으로 드러났다. 수사 당국은 약 6개월 전 투표용지 인쇄량이 정상 대비 절반 수준으로 줄어든 경위를 집중적으로 살피고 있다. 인쇄량 축소가 적절한 검토와 승인 없이 이뤄졌는지가 핵심 쟁점이다. 투표용지 부족은 유권자의 참정권을 직접 침해할 수 있는 사안이라 파장이 크다. 선거관리위원회의 의사결정 구조와 책임 소재를 둘러싼 논란이 확산되고 있다. 정치권에서는 선거 행정 신뢰 회복을 요구하는 목소리가 커지고 있다. 수사 결과에 따라 관련자 문책과 제도 개선이 뒤따를 전망이다.`,
  keyTerms:[{term:`선거관리위원회`,explanation:`선거가 공정하게 치러지도록 투표·개표 등 선거 사무 전반을 관리하는 독립 헌법기관이다. 투표용지 준비처럼 유권자 권리와 직결된 실무를 책임진다.`}],
  history:`한국의 선거관리위원회는 선거 공정성을 보장하기 위해 헌법상 독립기관으로 설치돼 왔다. 그동안 채용·관리 부실 등으로 신뢰 논란이 제기된 바 있다. 이번 투표용지 부족 사태는 선거 행정의 기본 절차에서 발생했다는 점에서 충격을 줬다.`,
  players:`노태악 전 중앙선관위원장 등 선관위 관계자들이 수사 대상에 올랐고, 검찰·경찰 등 수사기관이 경위를 조사한다. 여야 정치권은 책임 규명과 제도 개선을 요구한다. 유권자와 시민단체도 진상 규명을 촉구하고 있다.`,
  current:`투표 종료 직전에야 보고가 이뤄지고 인쇄량이 절반으로 줄어든 정황이 드러나면서 수사가 본격화한 점이 분기점이다. 선거 행정 전반의 신뢰가 시험대에 올랐다.`,
  outlook:`인쇄량 축소 결정의 책임 소재 규명과 관련자 사법처리 여부가 향후 핵심 관전 포인트다. 재발 방지를 위한 선관위 제도 개편 논의로 이어질지 주목된다.`,
  sources:[{title:`투표용지 부족 사태 수사 본격화…인쇄량 절반 축소 경위 추궁 - 연합뉴스`,url:`https://www.yna.co.kr`},{title:`노태악 전 선관위원장, 종료 40분 전 첫 보고 - 조선일보`,url:`https://www.chosun.com`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`빅테크 맞춤형 AI 칩 경쟁 가열…엔비디아 독주에 아마존·브로드컴 도전`,
  metrics:[`브로드컴 12개월 선행 PER 약 25배`,`AMD 주가 1년간 약 300% 상승`],
  summary:`엔비디아의 인공지능(AI) 반도체 독주 구도에 균열을 내려는 빅테크들의 경쟁이 가열되고 있다. 아마존은 자체 개발한 맞춤형 AI 칩 트레이니엄(Trainium)을 외부 기업에 판매하는 방안을 논의 중이라고 밝혔다. 구글·메타·앤스로픽·오픈AI 등에 AI 칩을 공급하는 브로드컴은 12개월 선행 주가수익비율(PER) 약 25배 수준에서 거래되며 저평가 AI 종목으로 부각됐다. AMD 주가는 지난 1년간 약 300% 급등했다. 엔비디아는 AI 거품 우려 속에서도 부채를 활용한 대규모 인프라 투자를 검토하고 있다. 미 국방부의 AI 도입은 1,775% 증가한 것으로 보고됐다. 오픈AI의 기업공개(IPO) 기대도 시장의 관심을 끌고 있다. 칩 성능 경쟁과 인프라 투자 확대가 산업 지형을 빠르게 바꾸고 있다.`,
  keyTerms:[{term:`맞춤형 AI 칩`,explanation:`특정 기업이 자사 데이터센터와 AI 작업에 최적화해 직접 설계한 반도체다. 엔비디아 제품 의존도를 낮추고 비용을 줄이려는 빅테크들이 앞다퉈 개발하고 있다.`}],
  history:`AI 붐이 본격화한 2023년 이후 엔비디아 GPU가 AI 학습 시장을 사실상 독점해 왔다. 가격 부담과 공급 제약이 커지자 빅테크들은 자체 칩 개발로 눈을 돌렸다. 아마존·구글·메타 등이 잇따라 전용 칩을 내놓으며 경쟁 구도가 형성됐다.`,
  players:`엔비디아가 선두를 지키는 가운데 아마존(트레이니엄), 브로드컴, AMD가 도전자로 부상했다. 구글·메타·오픈AI·앤스로픽 등은 칩의 핵심 고객이자 자체 개발 주체다. 미 국방부 등 정부 수요도 빠르게 늘고 있다.`,
  current:`아마존의 외부 판매 검토와 브로드컴 저평가 부각이 겹치며 엔비디아 독주에 실질적 균열 가능성이 제기된 점이 분기점이다. AI 거품 논쟁 속에서도 인프라 투자 경쟁이 멈추지 않고 있다.`,
  outlook:`주요 기업들의 실적 발표와 신규 칩 벤치마크 결과가 경쟁 구도를 가를 변수다. 오픈AI IPO 추진 여부와 엔비디아의 부채 기반 투자 향방도 주목된다.`,
  sources:[{title:`Amazon in talks to sell custom AI chips externally - Bloomberg`,url:`https://www.bloomberg.com`},{title:`Broadcom emerges as undervalued AI chip play - CNBC`,url:`https://www.cnbc.com`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`한국, 월드컵 멕시코에 0-1 패배…그래도 32강 진출 가능성 90%대 유지`,
  metrics:[`한국 0-1 멕시코 패배`,`국내 TV 시청률 17.7%`],
  summary:`한국 축구 대표팀이 2026 북중미 월드컵 조별리그 2차전에서 개최국 멕시코에 0-1로 패했다. 전반은 0-0으로 마쳤으나 후반 시작 직후 수비 실수로 루이스 로모에게 결승골을 내줬다. BBC는 이번 월드컵에서 가장 형편없는 경기 중 하나로 평가했고, 홍명보 감독은 실점 장면은 아쉽지만 선수들이 최선을 다했다고 밝혔다. 패배에도 한국의 32강 진출 확률은 약 90~91%로 유지되고 있다. 마지막 조별리그 경기에서 남아프리카공화국과 비기기만 해도 본선 진출이 확정되기 때문이다. 이 경기는 국내에서 17.7%의 TV 시청률을 기록했고 온라인 등을 합쳐 1,000만 명 이상이 시청했다. 다음 경기 결과에 따라 한국의 토너먼트 진출 여부가 최종 결정된다.`,
  keyTerms:[{term:`조별리그`,explanation:`본선 진출 팀들을 여러 조로 나눠 같은 조끼리 맞붙는 1차 라운드다. 각 조 상위 팀이 다음 단계인 토너먼트(32강)로 올라간다.`}],
  history:`한국 축구는 2002년 한일 월드컵 4강 이후 꾸준히 본선에 진출하며 아시아 강호 자리를 지켜왔다. 2026년 대회는 미국·캐나다·멕시코가 공동 개최하고 본선 참가국이 48개국으로 확대된 첫 대회다. 한국은 조별리그를 통과하기 위한 길목에 서 있다.`,
  players:`홍명보 감독이 이끄는 한국 대표팀이 개최국 멕시코, 남아프리카공화국 등과 같은 조에 속해 경쟁한다. 멕시코는 홈 이점을 등에 업고 강세를 보였다. 국내 팬과 방송사들은 높은 관심으로 경기를 지켜봤다.`,
  current:`개최국에 패하며 분위기는 가라앉았지만 32강 진출 가능성은 여전히 높아 마지막 경기가 분수령이 된 점이 분기점이다. 한 번의 무승부로 진출을 확정할 수 있는 상황이다.`,
  outlook:`남아공과의 조별리그 최종전 결과가 토너먼트 진출 여부를 최종 확정한다. 수비 불안 보완과 득점력 회복이 다음 경기의 관건으로 꼽힌다.`,
  sources:[{title:`한국, 멕시코에 0-1 패…32강 진출 가능성은 유지 - 연합뉴스`,url:`https://www.yna.co.kr`},{title:`홍명보호 멕시코전 패배, 시청률 17.7% - JTBC`,url:`https://news.jtbc.co.kr`},{title:`South Korea lose to hosts Mexico at World Cup - BBC`,url:`https://www.bbc.com/sport`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`볼리비아, 수주간 반정부 시위에 국가비상사태 선포…생필품 부족 심화`,
  metrics:[`수주간 지속된 반정부 시위`,`전국적 물자·생필품 부족`],
  summary:`볼리비아 정부가 수주간 이어진 반정부 시위 끝에 국가비상사태를 선포했다. 시위 장기화로 물류가 마비되면서 식료품과 연료 등 생필품 부족이 전국적으로 심화됐다. 경제난과 정치 불안이 맞물리며 사회 혼란이 커지고 있다. 대통령은 비상조치를 통해 치안을 회복하고 공급망을 정상화하겠다고 밝혔다. 그러나 시위대는 정부의 경제 정책과 통치 방식에 대한 불만을 거두지 않고 있다. 국가비상사태 선포가 사태를 진정시킬지, 오히려 갈등을 키울지는 불투명하다. 남미 자원 부국인 볼리비아의 불안은 역내 정세에도 파장을 줄 수 있다. 국제사회는 사태 추이를 주시하고 있다.`,
  keyTerms:[{term:`국가비상사태`,explanation:`정부가 심각한 위기 상황에서 치안 유지를 위해 일부 시민 권리를 제한하고 군·경의 권한을 강화하는 특별 조치다. 통제력 회복을 노리지만 인권 침해 논란을 부르기도 한다.`}],
  history:`볼리비아는 천연가스 등 자원에 의존하는 경제 구조 속에서 정치적 양극화와 경제난을 반복적으로 겪어왔다. 최근 수년간 물가 상승과 외환 부족이 누적되며 민심이 악화됐다. 이번 시위는 누적된 경제·정치 불만이 폭발한 결과로 해석된다.`,
  players:`볼리비아 대통령과 정부가 비상조치를 주도하고, 반정부 시위대와 야권이 맞서고 있다. 군과 경찰이 치안 유지의 핵심 행위자다. 주변 남미 국가와 국제사회는 정세 안정을 주시한다.`,
  current:`수주간의 시위가 생필품 부족이라는 민생 위기로 번지면서 국가비상사태라는 강경 카드가 등장한 점이 분기점이다. 통치 정당성과 사회 안정이 동시에 시험대에 올랐다.`,
  outlook:`비상사태 이후 시위 진정 여부와 공급망 정상화 속도가 핵심 관전 포인트다. 정부와 시위대 간 대화 가능성, 추가 충돌 여부도 변수로 남아 있다.`,
  sources:[{title:`Bolivia declares state of emergency amid weeks of unrest - BBC`,url:`https://www.bbc.com/news`},{title:`Bolivia faces shortages as protests paralyse supply chains - Reuters`,url:`https://www.reuters.com`}]
}]

  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`연준, 케빈 워시 신임 의장 첫 회의서 금리 동결했지만 '연내 인상' 시사하며 증시 급락`,
  metrics:[`기준금리 3.5~3.75% 동결, 연말 중간값 3.4%→3.8% 상향`,`다우 -0.98%·S&P500 -1.21%·나스닥 -1.34%`],
  summary:`미 연방준비제도(Fed)가 이틀간의 회의를 마치고 기준금리를 3.5~3.75%로 동결했지만, 케빈 워시 신임 의장의 첫 기자회견 직후 뉴욕 증시 3대 지수가 일제히 급락했다. 동결 자체는 예상됐으나 점도표(dot plot)에서 연말 금리 중간값 전망이 3월의 3.4%에서 3.8%로 올라가, 다수 위원이 오히려 '연내 인상' 가능성을 열어둔 점이 시장에 충격을 줬다. 이날 다우지수는 507포인트(-0.98%), S&P500은 -1.21%, 나스닥은 -1.34% 하락했다. 인플레이션이 끈질기게 높은 수준을 유지하는 가운데 채권 금리는 1년 만의 최고치로 뛰었고, 시장은 인하가 아닌 인상 시나리오를 가격에 반영하기 시작했다. 같은 주 일본은행(BOJ)도 정책금리를 25bp 인상해 30여 년 만의 최고치인 1%로 올리며 글로벌 긴축 기조에 가세했다. 전 세계 국채 금리는 경기 회복력과 물가 압력이 겹치며 '더 높게, 더 오래(higher-for-longer)' 전망 쪽으로 빠르게 이동하고 있다. 워시 체제 출범과 함께 통화정책의 불확실성이 커지면서 위험자산 변동성이 당분간 확대될 전망이다.`,
  keyTerms:[],
  history:`연준은 2024~2025년 인플레이션 둔화에 맞춰 금리를 점진적으로 내려 3%대 중반까지 낮췄다. 그러나 2026년 들어 중동 전쟁발 유가 급등과 공급망 충격으로 물가가 다시 들썩이며 인하 사이클이 사실상 멈췄다. 제롬 파월의 뒤를 이어 매파 성향의 케빈 워시가 의장에 오르면서 정책 방향 전환 가능성이 제기돼 왔다.`,
  players:`연준은 물가 안정과 고용 사이에서 균형을 잡아야 하는 입장이고, 워시 의장은 시장 친화적이면서도 인플레이션에 강경한 인물로 평가된다. 백악관은 금리 인하를 통한 경기 부양을 원하지만 연준의 독립성과 충돌할 소지가 있다. 일본은행은 엔화 약세와 수입물가 상승에 대응해 초저금리 정상화에 속도를 내고 있다.`,
  current:`동결과 동시에 나온 매파적 전망은 시장의 인하 기대를 정면으로 뒤집었다는 점에서 분기점이다. 글로벌 중앙은행들이 동시에 긴축 쪽으로 기우는 흐름이 확인됐다.`,
  outlook:`다음 FOMC와 워시 의장의 추가 발언, 그리고 향후 CPI·고용 지표가 인상 현실화 여부를 가를 핵심 변수다. 국채 금리와 달러 향방에 주목해야 한다.`,
  sources:[{title:`June Fed Meeting: Updates and Commentary | Kiplinger`,url:`https://www.kiplinger.com/news/live/fed-meeting-updates-and-commentary-june-2026`},{title:`Stock market news for June 17, 2026 | CNBC`,url:`https://www.cnbc.com/2026/06/16/stock-market-today-live-updates.html`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`美-이란 종전 합의 이틀째…호르무즈 해협 재개통되며 유가 안정세, 이스라엘-헤즈볼라 휴전도 재개`,
  metrics:[`브렌트유 \$80.57·WTI \$77.54 (전쟁 정점 \$120+ 대비 급락)`,`호르무즈 해협 통항 6/18 기준 25건으로 회복`],
  summary:`미국과 이란이 6월 17일 전쟁 종식 합의를 발표한 가운데, 양측과 동맹국이 레바논을 포함한 전 전선에서 즉각적·영구적 군사작전 중단을 선언하면서 중동 긴장이 빠르게 완화되고 있다. 합의에 따라 이란은 봉쇄했던 호르무즈 해협을 조건부로 재개통했고, 미국은 해군 봉쇄를 해제했다. 6월 18일 기준 검증된 호르무즈 통항 건수는 25건으로 4월 18일 이후 최대치를 기록하며 해상 물류가 정상화 조짐을 보였다. 전쟁 정점 당시 배럴당 120달러를 넘었던 유가는 브렌트유 80.57달러, WTI 77.54달러까지 내려와 시장은 공급 차질 위기가 사실상 끝났다고 판단했다. 다만 이행 세부사항이 미해결 상태이고 위치신호를 끈 '다크 크로싱'이 여전해, 선사들은 신중한 태도를 유지하고 있다. 이스라엘과 헤즈볼라도 이스라엘의 레바논 남부 공습 직후 휴전을 재개하기로 합의했다. 한편 6월 19일 제네바에서 열릴 예정이던 미-이란 평화회담이 돌연 연기되면서 합의 이행의 불확실성이 부각됐다.`,
  keyTerms:[],
  history:`2026년 봄 미국의 이란 핵시설 타격을 계기로 전면전으로 비화한 '2026 이란 전쟁'은 중동 전역의 항공·해운을 마비시켰다. 이란의 호르무즈 해협 봉쇄 위협으로 글로벌 에너지 시장이 요동쳤고, 유가는 한때 120달러를 돌파했다. 수개월간의 충돌 끝에 양측은 6월 17일 종전 양해각서(MOU)에 서명했다.`,
  players:`미국은 즉각적 제재 일부 완화와 해군 봉쇄 해제를, 이란은 호르무즈 재개통과 향후 핵협상 복귀를 맞바꿨다. 이스라엘과 헤즈볼라는 레바논 전선의 휴전 당사자이며, 파키스탄은 기술급 실무회담을 중재하고 있다. 쿠웨이트 등 걸프 산유국은 불가항력(force majeure) 선언을 해제하며 수출 정상화에 나섰다.`,
  current:`호르무즈 통항 재개와 유가 급락은 전쟁 리스크 해소의 가장 가시적 신호다. 그러나 회담 연기와 산발적 공습은 합의가 여전히 취약함을 보여준다.`,
  outlook:`연기된 제네바 회담의 재개 시점과 기술급 실무협상 결과, 호르무즈 통항량의 추가 회복 여부가 향후 안정의 가늠자다. 핵협상 복귀 일정도 핵심 관전 포인트다.`,
  sources:[{title:`Oil rises after U.S.-Iran peace talks in Geneva are abruptly postponed | CNBC`,url:`https://www.cnbc.com/2026/06/19/oil-prices-wti-brent-crude-us-iran-deal-strait-hormuz-shipping-recovery.html`},{title:`2026 Strait of Hormuz crisis | Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_Strait_of_Hormuz_crisis`},{title:`Iran Announces Closure Of Strait Of Hormuz | RFE/RL`,url:`https://www.rferl.org/a/iran-war-us-hormuz-oil-blockade-gulf-israel/33640284.html`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`엔비디아, 오픈AI에 최대 1000억 달러 투자…10GW 규모 AI 인프라 동맹과 GPT-5.5 공개`,
  metrics:[`엔비디아, 오픈AI에 최대 \$1,000억 투자 / 10GW 시스템 배치`,`GPT-5.5, Terminal-Bench 2.0 82.7%·OSWorld 78.7% 달성`],
  summary:`엔비디아와 오픈AI가 차세대 AI 인프라 구축을 위한 대규모 전략적 제휴를 발표했다. 양사는 최소 10기가와트(GW) 규모의 엔비디아 시스템을 오픈AI의 차세대 모델 학습·운영에 배치하는 의향서(LOI)를 체결했으며, 엔비디아는 시스템 배치에 맞춰 오픈AI에 최대 1000억 달러를 투자할 계획이다. 이는 '초지능(superintelligence)' 구현을 목표로 한 사상 최대 규모의 AI 인프라 투자 중 하나로 평가된다. 첫 단계는 2026년 하반기 엔비디아의 차세대 베라 루빈(Vera Rubin) 플랫폼을 활용해 가동을 시작할 예정이다. 동시에 오픈AI는 역대 최강 모델인 GPT-5.5를 공개했는데, 에이전트형 코딩·컴퓨터 사용·과학 연구에서 큰 도약을 보이며 Terminal-Bench 2.0에서 82.7%, OSWorld-Verified에서 78.7%로 최고 성적을 기록했다. 엔비디아는 또 맞춤형 칩 업체 마벨에 20억 달러를 투자해 NVLink 퓨전 플랫폼과 결합하는 등 AI 하드웨어 생태계 장악에 박차를 가하고 있다. 자본·전력·반도체가 소수 빅테크에 집중되는 'AI 인프라 군비경쟁'이 본격화하는 모습이다.`,
  keyTerms:[],
  history:`오픈AI는 2022년 챗GPT 출시 이후 모델 규모를 급격히 키워왔고, 학습에 필요한 GPU 수요가 폭증하며 엔비디아가 사실상 독점 공급자로 자리 잡았다. 두 회사는 마이크로소프트를 매개로 느슨히 협력해 왔으나, 이번에 직접적 자본·인프라 동맹으로 관계를 격상했다.`,
  players:`엔비디아는 AI 칩 시장의 압도적 1위로 수요처를 직접 묶어두려 하고, 오픈AI는 막대한 학습 비용과 전력을 안정적으로 확보하려 한다. 마이크로소프트, 구글, 메타 등 경쟁 빅테크와 AMD 등 칩 경쟁사도 인프라 확보전에 뛰어든 상태다.`,
  current:`1000억 달러 규모 투자와 10GW 배치는 AI 경쟁이 모델 성능에서 '전력·데이터센터 규모' 싸움으로 옮겨갔음을 상징한다. 공급자와 수요자가 자본으로 결합하는 구조가 굳어지고 있다.`,
  outlook:`2026년 하반기 베라 루빈 플랫폼 첫 가동 일정과 GPT-5.5의 실사용 성과, 전력·데이터센터 인허가 진척이 다음 관전 포인트다. 반독점 규제 당국의 반응도 변수다.`,
  sources:[{title:`OpenAI and NVIDIA Announce Strategic Partnership to Deploy 10GW of NVIDIA Systems | NVIDIA Newsroom`,url:`https://nvidianews.nvidia.com/news/openai-and-nvidia-announce-strategic-partnership-to-deploy-10gw-of-nvidia-systems`},{title:`Top AI News for June 2026: Breakthroughs, Launches & Trends | AIapps`,url:`https://www.aiapps.com/blog/ai-news-breakthroughs-launches-trends-must-read/`}]
}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`美 연준, 워시 신임 의장 첫 회의서 기준금리 4회 연속 동결`,
  metrics:[`기준금리 3.50~3.75% 유지(4회 연속 동결)`,`S&P500 7,420선으로 사상 최고치 근접`],
  summary:`미국 연방준비제도(연준)가 6월 16~17일 FOMC 회의에서 기준금리를 3.50~3.75%로 묶으며 네 차례 연속 동결을 결정했다. 이는 케빈 워시 신임 의장이 주재한 첫 회의로, 그는 성명서 분량을 대폭 줄이고 향후 금리 방향을 예고하는 포워드 가이던스 문구를 삭제했으며 정책·절차 개편을 검토할 5개 태스크포스 구성을 발표했다. 연준은 높은 인플레이션과 견조한 경기, 안정적 실업률을 동결 근거로 제시했다. 새 점도표에서는 18명 중 9명이 올해 최소 1회 금리 인상을 전망했고 6명은 2회 이상 인상을, 나머지 9명은 동결 또는 인하를 예상해 위원들 간 시각이 크게 갈렸다. 이는 연초까지 시장이 기대하던 1~2회 인하 전망과는 정반대 흐름으로, 에너지 가격 상승이 분위기를 바꿔놨다. 회의 직전인 6월 17일 S&P500은 7,420으로 사상 최고치에 근접했고 10년물 국채금리는 4.48%를 기록했다. 시장은 이제 연내 금리 인상 가능성까지 일부 반영하기 시작했다.`,
  keyTerms:[{term:`포워드 가이던스`,explanation:`중앙은행이 앞으로의 금리 방향을 미리 시장에 알려주는 신호다. 연준이 이 문구를 성명서에서 빼면 시장은 향후 정책을 예측하기 어려워져 불확실성이 커진다.`}],
  history:`연준은 2025년 인플레이션이 좀처럼 목표치(2%)로 내려오지 않자 금리 인하를 미뤄왔다. 연초 시장은 연내 1~2회 인하를 기대했으나 에너지 가격이 다시 오르며 기대가 흔들렸다. 5월 들어 제롬 파월 후임으로 케빈 워시가 신임 의장에 올랐다.`,
  players:`핵심 주체는 미 연준과 신임 의장 케빈 워시, 금리 결정 기구인 FOMC다. 워시는 매파 성향으로 분류되며 물가 안정을 최우선 과제로 내세웠다. 미국 주식·채권 시장과 달러 가치, 나아가 한국을 포함한 신흥국 자본 흐름이 이 결정에 직접 영향을 받는다.`,
  current:`워시 체제 첫 회의에서 포워드 가이던스를 없애고 위원 전망이 인상과 인하로 양분되면서, 향후 통화정책 경로의 불확실성이 크게 커졌다는 점이 분기점이다.`,
  outlook:`다음 FOMC와 7~8월 발표될 물가·고용 지표가 인상 여부의 분수령이 된다. 워시가 예고한 5개 태스크포스의 정책 개편 방향도 관전 포인트다.`,
  sources:[{title:`Fed interest rate decision June 2026: Fed holds rates steady - CNBC`,url:`https://www.cnbc.com/2026/06/17/fed-interest-rate-decision-june-2026.html`},{title:`Fed holds rates steady as new Chair Kevin Warsh commits to price stability - U.S. Bank`,url:`https://www.usbank.com/investing/financial-perspectives/market-news/federal-reserve-interest-rate.html`},{title:`June 16-17, 2026 FOMC Meeting Press Conference - Federal Reserve`,url:`https://www.federalreserve.gov/monetarypolicy/fomcpresconf20260617.htm`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`원·달러 환율 1500원대 고착…외국인 셀 코리아에 수급 불안 심화`,
  metrics:[`원·달러 환율 1,537.4원(6/19 개장, +10.3원)`,`외국인 코스피 누적 순매도 약 66조원`],
  summary:`6월 19일 서울 외환시장에서 원·달러 환율은 전 거래일보다 10.3원 오른 1,537.4원에 주간 거래를 시작하며 글로벌 금융위기 이후 최고 수준의 고환율이 이어졌다. 유가 급락과 중동 종전 기대 같은 호재에도 환율 하락은 나타나지 않아, 1500원대 고환율이 사실상 고착화됐다는 평가가 나온다. 가장 큰 압력은 외국인의 셀 코리아 흐름으로, 외국인은 한동안 코스피에서 19거래일 연속 순매도를 이어가며 누적 순매도 규모가 약 66조원에 달했다. 외국인 자금 이탈이 원화 약세를 부르고, 약세가 다시 추가 매도를 부르는 악순환 우려가 커지고 있다. 고환율은 수입 물가를 끌어올려 인플레이션과 한국은행의 통화정책 부담으로 직결된다. 정부와 한국은행은 외환·수급 안정을 주시하고 있으나 뚜렷한 반전 계기는 아직 보이지 않는다. 글로벌 강달러와 한국 증시의 구조적 취약성이 겹친 결과라는 진단이 많다. 단기적으로는 외국인 매도 진정 여부가 환율 향방의 최대 변수다.`,
  keyTerms:[{term:`셀 코리아`,explanation:`외국인 투자자가 한국 주식을 대거 팔고 자금을 빼나가는 현상을 가리킨다. 외국인이 팔면서 원화를 달러로 바꿔 나가기 때문에 주가는 내리고 환율(원화 가치 하락)은 오른다.`}],
  history:`2025년 하반기부터 글로벌 강달러와 미국 금리 불확실성이 겹치며 원화 약세가 시작됐다. 2026년 들어 외국인의 코스피 매도가 장기화하면서 환율은 1500원선을 넘어 금융위기 이후 최고 수준까지 치솟았다.`,
  players:`원화 가치를 흔드는 핵심은 외국인 투자자와 미국 연준의 고금리 기조, 강달러다. 방어선에는 한국은행과 기획재정부가 있으며, 수입 기업과 가계는 고환율에 따른 물가 부담을 떠안는다.`,
  current:`유가 하락과 중동 종전 기대라는 호재에도 환율이 내리지 않고 고착화됐다는 점에서, 일시적 충격이 아닌 구조적 약세 국면일 수 있다는 우려가 커진 시점이다.`,
  outlook:`외국인 매도 진정 여부, 한국은행의 금리·외환 대응, 미 연준 통화정책 방향이 향후 환율 경로를 좌우한다. 1분기 이후 수출·경상수지 흐름도 주시 대상이다.`,
  sources:[{title:`유가 급락·종전 호재도 소용없다…원·달러 환율 1500원대 고착화 왜? - 뉴스핌`,url:`https://www.newspim.com/news/view/20260619000540`},{title:`외국인 19일간 코스피 매도…1530원 고환율에 수급 불안 가중 - 뉴스핌`,url:`https://www.newspim.com/news/view/20260604001090`},{title:`코스피, 외국인 매도에 마감…환율 1530원대 - 서울신문`,url:`https://www.seoul.co.kr/news/economy/securities/2026/06/04/20260604500219`}]

  colorBg:`#e8f0fe`,
  headline:`삼성전자, 엔비디아 HBM4 첫 납품 임박…SK하이닉스 독주에 균열`,
  metrics:[`SK하이닉스 1분기 영업이익 37.6조원(+405%)`,`HBM 시장 점유율 SK 58%·삼성 추격`],
  summary:`AI 메모리 호황 속에 삼성전자가 엔비디아와 AMD의 HBM4 최종 품질 테스트를 통과하면서 6월부터 본격 공급에 들어갈 것으로 예상된다. 그동안 HBM 시장은 SK하이닉스가 사실상 독주해 왔는데, 삼성이 엔비디아 HBM4 초기 납품사로 합류하며 점유율 구도에 변화가 시작됐다는 평가다. SK하이닉스는 2026년 1분기 매출 52조5,800억원(전년比 +198%), 영업이익 37조6,100억원(+405%)으로 영업이익률 72%라는 기록적 실적을 냈다. HBM 점유율은 1분기 58%로 1위를 지켰으나 전년 동기 69%보다는 낮아졌고, 엔비디아 HBM 주문의 약 70%를 점유하고 있다. AI 가속기 수요 급증으로 2028년까지 HBM 공급 부족이 예상돼 가격과 실적 모멘텀은 당분간 이어질 전망이다. 삼성의 가세는 SK 독점 완화와 공급망 다변화라는 측면에서 의미가 크다. 한국 반도체 두 축이 글로벌 AI 메모리 시장을 주도하는 구도가 굳어지고 있다. 다만 점유율 경쟁 심화에 따른 가격·수익성 변화는 변수다.`,
  keyTerms:[{term:`HBM`,explanation:`고대역폭 메모리(High Bandwidth Memory)의 약자로, 여러 D램을 수직으로 쌓아 데이터 전송 속도를 크게 높인 반도체다. AI 가속기의 성능을 좌우하는 핵심 부품이라 수요가 폭발적으로 늘고 있다.`}],
  history:`AI 붐이 본격화한 2023~2024년부터 엔비디아 GPU에 들어가는 HBM 수요가 폭증했다. SK하이닉스가 엔비디아 공급을 선점하며 시장을 주도해 왔고, 삼성전자는 품질 인증 지연으로 뒤처졌다가 2026년 HBM4에서 반전을 노리고 있다.`,
  players:`핵심 공급사는 SK하이닉스·삼성전자·마이크론이며, 최대 수요처는 엔비디아와 AMD다. 엔비디아 주문을 누가 더 확보하느냐가 점유율과 실적을 가른다. TSMC의 3나노 라인 포화도 공급망 변수로 작용한다.`,
  current:`삼성이 엔비디아 HBM4 초기 납품사로 진입하며 SK하이닉스의 독주에 균열이 생긴 점이 이번 국면의 전환점이다.`,
  outlook:`삼성의 HBM4 양산 안정화 속도와 엔비디아 차세대 플랫폼 채택 비중, 2분기 실적 발표가 점유율 경쟁의 향방을 보여줄 핵심 이벤트다.`,
  sources:[{title:`AMD 잭팟에 웃는 삼성…HBM4로 SK하이닉스 독주 균열 시작인가 - 초이스스탁US`,url:`https://www.choicestock.co.kr/stock/news_view/138946`},{title:`SK하이닉스 신고가 경신: 2028년까지 HBM 부족 - TradingKey`,url:`https://www.tradingkey.com/kr/analysis/stocks/more/261879259-sk-hynix-hbm-shortage-samsung-tracker-valuation-tradingkey`},{title:`없어서 못 판다…삼성·SK 2분기 실적 잭팟 가능성 - 더빅데이터`,url:`https://www.thebigdata.co.kr/view.php?ud=2026051213433448430ecbf9426b_23`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이스라엘·헤즈볼라 휴전 합의…흔들리던 미·이란 평화협상 가까스로 유지`,
  metrics:[`휴전 발효 6/19 오전 9시(美 동부시간)`,`미·이란 MOU 서명 6/17, 60일 내 종전 목표`],
  summary:`이스라엘과 레바논 무장정파 헤즈볼라가 6월 19일 휴전에 합의해 미국 동부시간 오전 9시부터 발효됐다. 이번 휴전은 레바논에서의 치명적 충돌 격화가 스위스에서 예정된 미·이란 평화협상을 무산 직전까지 몰고 간 직후 이뤄졌다. 앞서 이스라엘군은 나바티예 인근 마을에서 중령을 포함한 군인 4명이 전차 공격으로 사망하자 헤즈볼라 시설을 겨냥한 다수의 보복 공습을 단행했다. 이 충돌로 미·이란 협상이 일시 연기되고 밴스 부통령의 스위스 방문이 취소되는 등 지역 정세가 출렁였다. 큰 틀에서는 6월 14일 중재국들이 발표한 양해각서(MOU)가 배경으로, 미국과 이란 대통령이 6월 17일 서명하며 60일 내 공식 종전을 목표로 삼았다. 헤즈볼라 휴전은 이 평화 로드맵을 살려두기 위한 응급 조치 성격이 짙다. 다만 충돌이 언제든 재발할 수 있어 휴전의 지속성은 불확실하다. 중동 종전 기대는 국제 유가와 글로벌 금융시장에도 직접 영향을 미치고 있다.`,
  keyTerms:[{term:`양해각서(MOU)`,explanation:`당사국들이 본 합의에 앞서 핵심 사항에 대한 의지를 문서로 확인하는 예비 합의다. 법적 구속력은 약하지만 이후 정식 협정으로 나아가는 출발점 역할을 한다.`}],
  history:`2025~2026년 이란과 이스라엘은 직접 충돌과 12일 전쟁 등을 거치며 중동 긴장이 최고조에 달했다. 미국이 중재에 나서면서 6월 들어 평화협상이 본격화됐으나, 이스라엘·헤즈볼라 간 레바논 전선 충돌이 협상의 최대 위협으로 남아 있었다.`,
  players:`핵심 당사자는 이스라엘, 레바논 헤즈볼라, 이란이며 미국이 중재자로 협상을 주도한다. 미국 부통령 밴스가 스위스 협상 무대에 관여했고, 이란·미국 정상이 MOU에 서명했다. 사우디 등 중재국들도 관련돼 있다.`,
  current:`헤즈볼라 충돌이 평화협상을 깰 뻔한 직후 휴전이 성사되며, 중동 종전 로드맵이 붕괴 위기를 한 차례 넘긴 분기점이다.`,
  outlook:`MOU가 정한 60일 시한 내 정식 종전 협정 체결 여부가 최대 관건이다. 레바논 전선의 휴전 유지와 협상 재개 일정, 유가 흐름을 지켜봐야 한다.`,
  sources:[{title:`Israel and Hezbollah agree to a ceasefire as fighting threatens U.S.-Iran talks - NBC News`,url:`https://www.nbcnews.com/world/iran/us-iran-talks-postponed-vance-cancels-trip-israel-strikes-lebanon-rcna350830`},{title:`Israel and Hezbollah renew ceasefire after U.S. and Iran call off talks - PBS News`,url:`https://www.pbs.org/newshour/world/israel-and-hezbollah-renew-ceasefire-after-u-s-and-iran-call-off-talks-over-fighting-in-lebanon`},{title:`2026 Iran war: Deal, Explained - Britannica`,url:`https://www.britannica.com/event/2026-Iran-war`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이재명 대통령, 유럽·G7 순방 마무리…G7 플러스 책임강국 표방`,
  metrics:[`순방 기간 6/9~6/18(10일간)`,`벨기에·EU·이탈리아·교황청·佛 G7 등 5개 일정`],
  summary:`이재명 대통령이 6월 9일부터 18일까지 벨기에와 유럽연합(EU), 이탈리아, 교황청을 방문하고 프랑스 에비앙에서 열린 G7 정상회의에 참석하는 유럽 순방을 마무리하고 6월 19일 결과를 브리핑했다. 대통령실은 이번 순방이 집권 1년의 외교 성과를 바탕으로 유럽으로 외교 지평을 넓히고, 한국이 주요 국제 현안에 참여하는 G7 플러스의 글로벌 책임강국으로 자리매김하는 계기가 됐다고 평가했다. 6월 9~10일 브뤼셀에서 벨기에·EU와 정상회담을 갖고, 11~13일 이탈리아를 국빈 방문했으며, 16~17일 에비앙 G7 정상회의에 참석했다. 대통령은 트럼프 미국 대통령의 미 군함 건조 요청에 대해 당연히 가능하며 최선을 다하겠다고 답했다고 밝혔다. 위성락 안보실장이 순방 의의와 정상외교 성과를 별도로 설명했다. 미·중 사이 통상 압박과 안보 현안이 산적한 가운데 다자외교 무대에서 한국의 위상을 높였다는 자평이다. 다만 구체적 경제·안보 성과의 후속 이행이 과제로 남는다.`,
  keyTerms:[{term:`G7 플러스`,explanation:`기존 주요 7개국(G7) 협의체에 한국 등 비회원 핵심국이 더해져 폭넓게 협력하는 구상을 가리킨다. 한국이 정식 회원은 아니지만 주요 국제 현안 논의에 사실상 동참한다는 의미다.`}],
  history:`이재명 정부는 2025년 출범 이후 한미동맹과 한일·한중 관계를 재정비하며 외교 지평을 넓혀왔다. 집권 1년을 맞아 유럽으로 외교 무대를 확장하고 G7 정상회의에 초청국으로 참여하면서 다자외교 비중을 키우고 있다.`,
  players:`이재명 대통령과 대통령실, 위성락 안보실장이 순방을 이끌었다. 상대는 벨기에·EU 지도부, 이탈리아 정부와 교황청, G7 정상들이며, 트럼프 미국 대통령과의 통상·안보 현안 조율도 핵심 의제였다.`,
  current:`한국이 G7 플러스를 표방하며 유럽 핵심국과 다자무대에서 존재감을 키운 점에서, 외교 노선의 확장이 가시화된 시점이다.`,
  outlook:`미 군함 건조 협력 등 트럼프 행정부와의 통상·방산 후속 협의, EU·이탈리아와의 경제 협력 이행 여부가 향후 성과를 가늠할 지표다.`,
  sources:[{title:`이재명 대통령, 유럽·G7 순방 결과 브리핑 - 뉴시스`,url:`https://www.newsis.com/view/NISI20260619_0021327660`},{title:`유럽 순방 및 G7 정상회의 참석 관련 위성락 안보실장 브리핑 - 대통령실`,url:`https://www.president.go.kr/briefings/r9e0D0XL`},{title:`이재명 대통령 유럽 순방 일정 정리 - Insight Echo`,url:`https://insightecho.net/lee-jae-myung-europe-visit-g7-2026/`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`트럼프, 강제노동 미흡 60개국에 10%+ 관세 추진…EU·대만·英 정조준`,
  metrics:[`16개 경제권에 10% 이상 관세 부과 방침`,`美 대중국 월 수입 약 50% 급감, 적자 95억달러`],
  summary:`트럼프 미국 행정부가 강제노동 근절에 미흡하다는 이유로 60여 개 교역국에 10% 이상의 추가 관세를 부과하는 방안을 내놨다. 캐나다·멕시코·EU·대만·영국 등 16개 경제권이 10% 관세 대상으로 거론됐고, 다수 국가에는 12.5% 관세율이 제시됐다. 이는 올해 초 연방대법원이 기존 관세를 위법으로 판단한 뒤, 행정부가 전 세계 관세 체계를 재구축하려는 시도다. 트럼프는 별도로 EU산 제품에 6월 1일부터 일률 50% 관세를 매겨야 한다고 주장하며, 부가가치세와 미국 기업에 대한 제재·소송을 문제 삼았다. 그는 미·EU 간 연 2,500억달러 무역적자를 근거로 들었다. 한편 대중국 압박 효과로 미국의 월간 대중 수입은 1~6월 사이 약 50% 급감했고, 6월 대중 무역적자는 95억달러로 21년 만에 최저를 기록했다. 관세 전선이 강제노동 이슈로 명분을 갈아끼우며 다시 확전되는 양상이다. 한국을 비롯한 수출국들의 통상 리스크도 다시 커지고 있다.`,
  keyTerms:[{term:`강제노동`,explanation:`본인의 의사에 반해 협박이나 구속 상태에서 일하도록 시키는 노동을 말한다. 미국은 이를 막지 못한 나라의 제품 수입을 제한하거나 관세를 매기는 명분으로 삼고 있다.`}],
  history:`트럼프 행정부는 2025년부터 광범위한 보편 관세를 밀어붙였으나 2026년 초 연방대법원이 핵심 관세를 위법으로 판단해 제동이 걸렸다. 이후 행정부는 강제노동 등 다른 법적 근거를 활용해 관세 체계를 다시 짜는 작업에 들어갔다.`,
  players:`미국 트럼프 행정부가 관세를 주도하고, EU·캐나다·멕시코·대만·영국·중국 등 주요 교역국이 대상이다. 미국 수입기업과 소비자, 한국 등 수출 의존도가 높은 나라들이 직접 영향권에 있다.`,
  current:`대법원 제동 이후 강제노동을 새 명분으로 60여 개국 관세를 재추진하며 글로벌 통상 갈등이 다시 격화되는 국면이다.`,
  outlook:`각국의 보복관세 여부와 EU 50% 관세 현실화, 미·중 무역 흐름이 향후 관전 포인트다. 한국에 대한 관세율 적용 여부도 주목된다.`,
  sources:[{title:`U.S. plans extra tariffs of 10% or more for most trading partners after forced labor probe - PBS News`,url:`https://www.pbs.org/newshour/economy/u-s-says-it-plans-extra-tariffs-of-10-or-more-for-most-trading-partners-after-forced-labor-probe`},{title:`Trump administration floats tariffs on 60 trading partners after forced labor probes - CBS News`,url:`https://www.cbsnews.com/news/trump-administration-tariffs-60-trading-partners-forced-labor-probes/`},{title:`Tariff Tracker: 2026 Trump Tariffs and Trade War by the Numbers - Tax Foundation`,url:`https://taxfoundation.org/research/all/federal/trump-tariffs-trade-war/`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`글로벌 AI 인프라 경쟁 가열…엔비디아 차세대 칩·OpenAI 데이터센터 확장`,
  metrics:[`OpenAI 스타게이트 노르웨이, 2026년말 GPU 10만대 목표`,`삼성 파운드리에 엔비디아·구글·테슬라 등 칩 생산 협의`],
  summary:`AI 인프라를 둘러싼 글로벌 경쟁이 한층 뜨거워지고 있다. 엔비디아는 에이전트 AI에 특화한 차세대 CPU 베라와 추론 특화 칩을 묶은 베라 루빈 플랫폼 등 차세대 AI 반도체를 공개하며 AI 인프라 주도권 굳히기에 나섰다. OpenAI는 노르웨이에 짓는 스타게이트 데이터센터에 2026년 말까지 GPU 10만 대를 설치하겠다는 목표를 제시했다. 수요 폭증으로 TSMC의 3나노 라인 가동률이 포화에 근접하자, AMD·BYD·구글·테슬라·엔비디아 등 주요 고객사가 공급망 다변화를 위해 삼성 파운드리와 첨단 칩 생산을 협의 중이다. 업계의 무게중심은 모델 학습을 넘어 실제 서비스 단계인 추론으로 빠르게 옮겨가고 있다. 추론 비중이 커질수록 메모리·전력·데이터센터 수요가 함께 폭발한다. 결국 AI 경쟁은 칩과 인프라를 누가 더 확보하느냐의 싸움으로 재편되는 양상이다. 한국 반도체 기업들에도 새 기회이자 부담이 되고 있다.`,
  keyTerms:[{term:`추론`,explanation:`AI 모델이 학습을 끝낸 뒤 실제 사용자 요청에 답을 내놓는 단계를 말한다. 서비스 수익이 실제로 발생하는 구간이라, 최근 AI 반도체와 데이터센터 수요의 핵심 동력으로 떠올랐다.`}],
  history:`2023년 챗GPT 등장 이후 AI 모델 학습용 GPU 수요가 폭발하며 엔비디아가 AI 반도체 시장을 장악했다. 2025~2026년 들어 생성형 AI가 서비스로 확산되면서 경쟁의 초점이 학습에서 실사용(추론)과 데이터센터 인프라로 옮겨가고 있다.`,
  players:`엔비디아가 AI 칩을 주도하고 OpenAI·구글·테슬라 등이 막대한 데이터센터 투자를 벌인다. 제조에서는 TSMC가 선두, 삼성 파운드리가 추격하며, SK하이닉스·삼성전자가 HBM 메모리를 공급한다.`,
  current:`차세대 칩 공개와 대규모 데이터센터 구축이 동시에 진행되며, AI 경쟁이 인프라 확보전으로 재편되는 분기점이다.`,
  outlook:`엔비디아 베라 루빈의 양산·채택 속도, OpenAI 스타게이트 가동, 삼성 파운드리의 고객사 수주 결과가 향후 판도를 가른다. 전력·메모리 공급도 변수다.`,
  sources:[{title:`GTC2026 엔비디아 AI 반도체 칩 대거 공개…AI 인프라 주도권 겨냥 - 전자신문`,url:`https://www.etnews.com/20260317000314`},{title:`2026년 6월 17일 글로벌 반도체 산업 관련 주요 뉴스 요약 - SPTA Times`,url:`https://www.sptatimeskorea.com/post`},{title:`GPU 26만 장과 내년도 AI 예산 확대가 갖는 의미 - 정책브리핑`,url:`https://www.korea.kr/news/policyNewsView.do?newsId=148954462`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`초여름 기록적 폭염 뒤 최대 200㎜ 집중호우 예보…기후 변동성 확대`,
  metrics:[`경북 경산 비공식 34.2℃ 기록`,`예상 강수량 최대 200㎜`],
  summary:`6월 중순 영남 내륙을 중심으로 전국 대부분 지역에서 30℃를 웃도는 초여름 폭염이 이어졌다. 경북 경산시 하양읍에서는 34.2℃의 비공식 기록까지 나오며 이례적인 더위가 나타났다. 이 같은 폭염 뒤로 최대 200㎜에 달하는 집중호우가 예보되면서, 폭염과 폭우가 짧은 간격으로 교차하는 기후 변동성이 부각되고 있다. 기온 급변과 강한 비는 농작물 피해, 도시 침수, 온열질환 위험을 동시에 키운다. 기상청은 특보 상황을 주시하며 호우 대비를 당부하고 있다. 이른 폭염과 집중호우의 반복은 기후 위기가 일상으로 다가왔음을 보여주는 신호로 해석된다. 특히 사회적 약자와 야외 노동자에게 피해가 집중될 우려가 크다. 당국의 선제적 재난 대응 역량이 시험대에 올랐다.`,
  keyTerms:[{term:`집중호우`,explanation:`짧은 시간에 좁은 지역으로 많은 비가 한꺼번에 쏟아지는 현상이다. 도시 침수와 산사태 같은 피해를 빠르게 키워, 사전 대비와 신속한 경보가 중요하다.`}],
  history:`최근 몇 년간 한국의 여름은 이른 폭염과 국지성 집중호우가 반복되며 피해가 커져 왔다. 2026년에도 초여름부터 30℃를 넘는 더위가 일찍 찾아오며 기후 이변 우려가 제기됐다.`,
  players:`기상청이 예보와 특보를 담당하고, 지자체·소방·재난 당국이 대응에 나선다. 농민, 야외 노동자, 고령층 등 기후 취약계층이 가장 큰 영향을 받는다.`,
  current:`기록적 폭염 직후 최대 200㎜ 집중호우가 예보되며, 극단적 날씨가 짧은 주기로 교차하는 양상이 뚜렷해진 시점이다.`,
  outlook:`호우 특보 발효와 실제 강수량, 침수·산사태 피해 규모가 관건이다. 본격 장마와 여름철 폭염·태풍으로 이어지는 흐름을 주시해야 한다.`,
  sources:[{title:`2026년 폭염 - 나무위키`,url:`https://namu.wiki/w/2026%EB%85%84%20%ED%8F%AD%EC%97%BC`},{title:`특보현황 - 기상청 날씨누리`,url:`https://www.weather.go.kr/w/special-report/overall.do`},{title:`기상청 날씨누리 소식`,url:`https://www.weather.go.kr/w/community/news.do`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`인천서 발견된 신체 일부, 요양병원 80대 환자로 확인…경찰 수사 착수`,
  metrics:[`발견된 신체 일부 신원 80대 입원 환자`,`국립과학수사 DNA 일치 확인`],
  summary:`인천에서 발견된 사람의 다리가 한 요양병원에 입원해 있던 80대 환자의 신체 일부로 확인됐다고 경찰이 밝혔다. 국립과학수사연구원의 유전자 감식 결과 발견된 신체 일부와 해당 환자의 신원이 일치하는 것으로 나타났다. 경찰은 어떻게 환자의 신체 일부가 병원 밖에서 발견됐는지, 사망 경위와 관리 책임 등을 두고 본격 수사에 착수했다. 요양병원 환자 관리 체계와 안전 문제를 둘러싼 사회적 논란으로 번질 가능성이 제기된다. 고령 입원 환자의 보호와 시설 관리의 사각지대가 다시 도마에 올랐다. 경찰은 병원 관계자 조사와 함께 정확한 사실관계 규명에 주력하고 있다. 유족과 시민들의 충격도 큰 상황이다. 진상 규명 결과에 따라 제도 보완 논의로 이어질 수 있다.`,
  keyTerms:[{term:`유전자 감식`,explanation:`사람마다 다른 유전 정보(DNA)를 비교해 신원이나 혈연 관계를 확인하는 수사 기법이다. 신체 일부만 발견돼도 누구인지 특정할 수 있어 사건 수사에서 핵심 역할을 한다.`}],
  history:`고령화로 요양병원 이용이 늘면서 입원 환자의 관리·안전 문제가 꾸준히 제기돼 왔다. 그동안에도 환자 방치·관리 부실 논란이 반복됐으나 이번처럼 신체 일부가 외부에서 발견된 사례는 이례적이다.`,
  players:`경찰과 국립과학수사연구원이 수사·감식을 맡고, 해당 요양병원과 관계자, 유족이 직접 당사자다. 보건 당국과 시설 관리 감독 기관도 책임 소재와 무관치 않다.`,
  current:`유전자 감식으로 신원이 특정되고 경찰 수사가 시작되면서, 요양병원 환자 관리의 사각지대가 다시 사회적 쟁점으로 떠오른 시점이다.`,
  outlook:`사망·훼손 경위에 대한 경찰 수사 결과와 병원 관계자 책임 여부가 향후 관건이다. 결과에 따라 요양시설 관리 제도 보완 논의로 확대될 수 있다.`,
  sources:[{title:`2026년 사건 - 나무위키`,url:`https://namu.wiki/w/2026%EB%85%84/%EC%82%AC%EA%B1%B4`},{title:`대한민국 최신 뉴스 - Google 뉴스`,url:`https://news.google.com/topics/CAAqIQgKIhtDQkFTRGdvSUwyMHZNRFp4WkRNU0FtdHZLQUFQAQ?hl=ko&gl=KR&ceid=KR%3Ako`}]
}]

  tag:`2026-06-19`,
  label:`2026년 6월 19일 (금요일)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`워시 신임 연준 의장의 첫 FOMC, 금리 동결 속 연내 인상 가능성 시사하며 매파 본색 드러내`,
  metrics:[`기준금리 3.50~3.75% 동결`,`지급준비금 금리 3.65%`],
  summary:`미국 연방준비제도(Fed)가 6월 17~18일 회의에서 기준금리를 연 3.50~3.75%로 동결하고 지급준비금에 적용하는 금리는 3.65%로 유지했다. 케빈 워시 신임 의장이 주재한 첫 FOMC에서 연준은 물가 안정 의지를 전면에 내세우며 연내 금리 인상 가능성까지 열어뒀다. 올해 초만 해도 시장은 12월까지 두 차례 0.25%포인트 인하를 예상했으나, 지금은 CME 페드워치 기준 연내 인하 전망이 사실상 사라졌다. 중동 전쟁발 에너지 가격 상승이 인플레이션 재점화 우려를 키운 점이 매파 기조의 배경으로 꼽힌다. 발표 직후 뉴욕 증시는 하락했다가 다음 날 일부 낙폭을 만회했다. 워시 의장은 시장 친화적이라는 기존 평판과 달리 긴축 신호를 분명히 해 향후 통화정책 경로의 불확실성을 키웠다. 신임 의장의 첫 메시지가 인하 기대를 정면으로 뒤집었다는 점에서 글로벌 자금 흐름의 분수령으로 평가된다.`,
  keyTerms:[{term:`FOMC`,explanation:`미국 중앙은행인 연준이 기준금리 등 통화정책을 결정하는 회의기구다. 이곳의 금리 결정은 전 세계 자금 흐름과 환율, 주가에 직접 영향을 준다.`}],
  history:`연준은 2022년 고물가에 맞서 공격적으로 금리를 올린 뒤 2024년부터 인하 국면에 들어섰다. 2026년 들어 시장은 추가 인하를 기대했으나 인플레이션이 다시 들썩이며 분위기가 바뀌었다. 제롬 파월의 뒤를 이어 케빈 워시가 새 의장에 올라 첫 시험대에 섰다.`,
  players:`핵심 인물은 케빈 워시 신임 연준 의장으로, 과거 시장 친화적 인사로 분류됐으나 이번에 긴축 의지를 드러냈다. 트럼프 행정부는 저금리를 압박해 왔고, 월가 투자자들은 금리 경로에 따라 자산 배분을 조정한다. 신흥국 통화당국도 연준 결정에 연쇄적으로 영향을 받는다.`,
  current:`신임 의장의 첫 회의에서 인하 기대가 인상 경계로 급반전한 점이 핵심이다. 중동 전쟁발 유가 불안이 물가 전망을 흔들면서 연준의 신중론에 힘이 실렸다.`,
  outlook:`다음 FOMC와 향후 소비자물가지수(CPI) 발표가 금리 향방의 분수령이 된다. 워시 의장의 추가 발언과 점도표 변화도 주목 대상이다.`,
  sources:[{title:`Implementation Note issued June 17, 2026 - Federal Reserve`,url:`https://www.federalreserve.gov/newsevents/pressreleases/monetary20260617a1.htm`},{title:`June Fed Meeting: Updates and Commentary - Kiplinger`,url:`https://www.kiplinger.com/news/live/fed-meeting-updates-and-commentary-june-2026`},{title:`Markets Try to Recover Early After Fed Selloff - Schwab`,url:`https://www.schwab.com/learn/story/stock-market-update-open`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피 사상 첫 9000선 마감, 8000 돌파 16거래일 만에 새 역사 쓰며 상반기 G20 상승률 1위`,
  metrics:[`코스피 종가 9063.84 (+2.25%)`,`시가총액 7413조원`],
  summary:`코스피가 6월 18일 장중 9106.07까지 오르며 사상 최고치를 찍은 뒤 전 거래일보다 2.25% 오른 9063.84로 마감해 처음으로 9000선을 넘었다. 지난 5월 26일 8000선을 처음 돌파한 지 단 16거래일 만의 기록이다. 유가증권시장 시가총액도 7413조원으로 사상 최대치를 새로 썼다. 한국거래소는 2026년 1~6월 코스피 상승률이 115.1%로 주요 20개국(G20) 가운데 가장 높다고 밝혔다. 미국 연준의 매파적 신호로 하락이 우려됐으나 예상을 깨고 강세장이 이어졌다. 정은보 거래소 이사장은 1만 포인트를 향한 새 여정이라고 평가했다. 외국인과 기관 자금이 동시에 유입되며 지수를 끌어올린 것으로 분석된다. 단기 급등에 따른 과열과 차익실현 우려도 함께 커지고 있다.`,
  keyTerms:[{term:`시가총액`,explanation:`상장된 모든 주식의 가격을 합한 시장 전체의 몸값이다. 주가와 상장 주식 수에 따라 변하며 시장 규모를 보여주는 대표 지표다.`}],
  history:`코스피는 오랫동안 박스권에 갇혀 코리아 디스카운트라는 저평가 꼬리표가 붙었다. 그러나 2026년 들어 기업 밸류업 정책과 반도체 호황, 풍부한 유동성이 맞물리며 가파른 상승세를 탔다. 8000선을 넘은 지 한 달도 안 돼 9000선까지 뚫렸다.`,
  players:`한국거래소와 정은보 이사장이 시장 안정과 추가 상승 기대를 관리한다. 외국인 투자자와 연기금, 개인 투자자가 매수 주체로 가세했고, 정부의 자본시장 선진화 정책도 상승 동력으로 작용했다. 반도체 대형주가 지수 상승을 주도했다.`,
  current:`미국발 긴축 신호에도 외국인 자금이 빠지지 않고 오히려 신고가를 경신한 점이 이례적이다. 단기간 급등으로 1만 포인트 기대와 과열 경고가 동시에 나오는 국면이다.`,
  outlook:`차익실현 매물과 글로벌 금리 변수, 반도체 업황이 향후 추가 상승 여부를 가른다. 기업 실적 시즌과 정부의 밸류업 후속 대책 발표가 다음 관전 포인트다.`,
  sources:[{title:`코스피 9000 시대 개막…종가 9063.84 마감 - 아시아경제`,url:`https://www.asiae.co.kr/article/2026061816204217852`},{title:`코스피, 사상 첫 9000선 돌파…정은보 거래소 이사장 발언 - 뉴스핌`,url:`https://www.newspim.com/news/view/20260618000973`},{title:`美 매파 시그널에도 코스피 날았다…꿈의 1만피 사정권 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202606181829497171`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`영란은행, 중동발 에너지 충격 경계하며 기준금리 3.75% 동결…추가 인하 미뤄`,
  metrics:[`기준금리 3.75% 동결`,`영국 물가상승률 2.8%`],
  summary:`영국 중앙은행인 영란은행(BOE)이 6월 18일 통화정책회의에서 기준금리를 연 3.75%로 동결했다. 영국의 현재 물가상승률은 2.8%로 목표치 2%를 웃돈다. 영란은행은 중동 전쟁이 에너지 수송과 공급을 교란해 유가가 오르고 가계의 연료비와 공공요금 부담이 커진 점을 동결 배경으로 들었다. 인하를 기대했던 변동금리 대출자들에게는 추가 부담이 없다는 점에서 일부 안도감을 줬다. 미국 연준의 매파 기조와 맞물려 주요국 중앙은행들이 동시에 신중 모드로 돌아선 흐름이다. 에너지발 물가 재상승 위험이 글로벌 통화정책의 공통 변수로 부상했다. 영란은행은 물가가 목표치로 안정될 때까지 긴축적 기조를 유지하겠다는 입장이다. 향후 중동 정세와 유가 흐름이 인하 시점을 좌우할 전망이다.`,
  keyTerms:[{term:`기준금리`,explanation:`중앙은행이 정하는 나라의 대표 금리로, 시중 대출과 예금 금리의 출발점이 된다. 금리를 올리면 돈을 빌리기 비싸져 물가와 경기를 식히는 효과가 있다.`}],
  history:`영란은행은 2022~2023년 고물가에 대응해 16년 만의 최고 수준까지 금리를 올렸다가, 물가가 둔화되자 2024년부터 점진적 인하에 나섰다. 2026년 들어 인하 기조가 이어질 것으로 예상됐다. 그러나 중동 전쟁이 변수로 떠올랐다.`,
  players:`앤드루 베일리 총재가 이끄는 영란은행 통화정책위원회(MPC)가 금리를 결정한다. 영국 가계와 모기지 대출자, 기업이 직접적인 영향을 받는다. 산유 지역 정세와 글로벌 에너지 시장도 핵심 변수다.`,
  current:`물가가 목표치를 웃도는 가운데 중동발 유가 불안까지 겹쳐 인하를 미룬 점이 핵심이다. 미국 연준과 같은 방향의 신중론이 동조화 양상을 보인다.`,
  outlook:`다음 통화정책회의와 영국 물가 지표, 중동 정세 안정 여부가 인하 재개 시점을 결정한다. 에너지 가격 추이가 가장 큰 관전 포인트다.`,
  sources:[{title:`Will The Bank Of England Cut Interest Rates On 18 June 2026? - HomeOwners Alliance`,url:`https://hoa.org.uk/news/interest-rate-predictions-2/`},{title:`Bank of England 18 June 2026 Rate Decision - Mortgage One`,url:`https://www.mortgageonefinance.co.uk/news/bank-of-england-18-june-2026-rate-decision`},{title:`Bank of England Base Rate 2026 - money.co.uk`,url:`https://www.money.co.uk/mortgages/bank-of-england-base-rate`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미국·이란, 베르사유서 양해각서 서명 수순…60일 내 공식 종전 향한 새 협상 국면 진입`,
  metrics:[`향후 협상 기간 60일`,`2026 이란 전쟁 5주간 교전`],
  summary:`미국과 이란이 6월 19일 서명 예정인 양해각서를 통해 2026년 이란 전쟁의 공식 종결을 향한 새 국면에 들어섰다. 트럼프 대통령은 프랑스 베르사유궁 만찬에서 이란과의 양해각서에 서명했고, 미국은 이란 항구와 연안에 선박이 드나들 수 있도록 허용했다. 양측은 앞으로 60일에 걸쳐 협상을 이어가기로 했다. 2026년 이란 전쟁은 2월 28일 미국과 이스라엘이 시작했으며, 5주 넘는 교전 끝에 4월 7~8일 이스라엘을 포함한 휴전에 합의한 바 있다. 다만 이스라엘군은 레바논 남부에서 헤즈볼라와 다시 교전 중이며 레바논과 이스라엘은 직접 대화를 이어가고 있다. 6월 14일 중재국들이 발표한 양해각서는 60일 내 분쟁을 공식 종료하는 것을 목표로 한다. 한 여론조사에서 이스라엘인의 71%는 트럼프가 이란 협상에서 자국 이익을 지킬 것으로 신뢰하지 않는다고 답했다.`,
  keyTerms:[{term:`양해각서`,explanation:`정식 조약 전에 당사자들이 합의 내용과 추진 방향을 적어 서명하는 문서다. 법적 구속력은 약하지만 협상의 큰 틀과 의지를 확인하는 첫 단계 역할을 한다.`}],
  history:`이란의 핵 개발과 중동 패권을 둘러싼 갈등은 수십 년간 이어졌다. 2026년 2월 28일 미국과 이스라엘이 이란을 상대로 군사작전을 개시하며 전면전으로 번졌다. 5주간의 교전 끝에 4월 휴전이 성사됐다.`,
  players:`미국 트럼프 대통령과 이란 정부가 협상 당사자이며, 이스라엘은 안보 이해가 직결된 핵심 당사국이다. 중재국들이 양해각서 도출을 주선했고, 레바논과 헤즈볼라도 변수로 남아 있다. 호르무즈 해협 항행은 글로벌 에너지 시장과 직결된다.`,
  current:`휴전을 넘어 공식 종전 협상으로 나아가는 분기점이다. 항구 봉쇄 해제와 양해각서 서명이 실질적 긴장 완화 신호로 읽힌다.`,
  outlook:`6월 19일 양해각서 서명과 향후 60일간의 협상 진행이 최대 관건이다. 레바논 남부 교전과 이스라엘 내 여론 악화가 합의 이행의 변수로 꼽힌다.`,
  sources:[{title:`Liveblog June 18, 2026 - The Times of Israel`,url:`https://www.timesofisrael.com/liveblog-june-18-2026/`},{title:`2026 Iran war - Deal, Explained - Britannica`,url:`https://www.britannica.com/event/2026-Iran-war`},{title:`2026 Iran war - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_Iran_war`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`김건희 특검, 여론조사 비용 대납 혐의 오세훈 서울시장에 징역 1년 6개월 구형`,
  metrics:[`오세훈 시장 징역 1년 6개월 구형`,`강철원 전 부시장 징역 1년 구형`],
  summary:`민중기 특별검사팀(김건희 특검)이 6월 18일 여론조사 비용을 대납하도록 한 혐의로 기소된 오세훈 서울시장에게 징역 1년 6개월을 구형했다. 함께 기소된 강철원 전 서울시 정무부시장에게는 징역 1년, 사업가 김한정씨에게도 징역 1년을 구형했다. 특검은 오 시장이 정치적 목적의 여론조사 비용을 외부에 떠넘긴 것으로 보고 있다. 이는 김건희 여사 관련 의혹을 수사하는 특검 수사가 현직 광역단체장으로까지 확대된 사례다. 검찰의 구형은 법원에 형량을 요청하는 절차이며 실제 형은 재판부가 선고에서 정한다. 오 시장 측은 혐의를 부인하며 법정에서 다툴 것으로 보인다. 현직 서울시장이 형사재판에서 실형을 구형받았다는 점에서 정치적 파장이 크다. 선고 결과에 따라 시정 운영과 향후 정치 일정에도 영향이 불가피하다.`,
  keyTerms:[{term:`구형`,explanation:`재판에서 검사가 피고인에게 어느 정도 형벌을 내려달라고 법원에 요청하는 절차다. 실제 형량은 판사가 선고에서 따로 정하므로 구형이 곧 확정 형은 아니다.`}],
  history:`김건희 여사를 둘러싼 각종 의혹을 수사하기 위해 특별검사팀이 출범했다. 수사가 진행되며 여론조사 비용 대납 의혹이 불거졌고 오세훈 서울시장이 기소됐다. 이후 재판이 이어져 왔다.`,
  players:`민중기 특별검사팀이 수사와 공소 유지를 맡고 있다. 피고인은 오세훈 서울시장과 강철원 전 정무부시장, 사업가 김한정씨다. 여야는 이 사건을 정치적 공방의 소재로 삼고 있다.`,
  current:`현직 서울시장에 대한 실형 구형으로 사건이 중대 국면에 들어섰다. 특검 수사의 칼끝이 현직 광역단체장에게 향했다는 점에서 상징성이 크다.`,
  outlook:`법원의 선고 기일과 형량이 최대 관전 포인트다. 결과에 따라 오 시장의 거취와 서울시정, 정치권 역학에 파장이 예상된다.`,
  sources:[{title:`[오늘의 국회일정] 주요 정당·기자회견 - 6월 18일 - 뉴스핌`,url:`https://www.newspim.com/news/view/20260617001109`},{title:`구글 뉴스 - 대한민국 정치 최신 뉴스`,url:`https://news.google.com/topics/CAAqIQgKIhtDQkFTRGdvSUwyMHZNRFp4WkRNU0FtdHZLQUFQAQ?hl=ko&gl=KR&ceid=KR%3Ako`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`G7 정상회의서 우크라이나 놓고 미·유럽 온도차…트럼프 우리와 무관, 유럽은 흐름 우크라이나로`,
  metrics:[`G7 정상회의 6월 16일 개막`,`유럽 정상 우크라이나 지지 재확인`],
  summary:`6월 16일 개막한 주요 7개국(G7) 정상회의에서 러시아·우크라이나 전쟁을 둘러싸고 미국과 유럽의 입장차가 뚜렷하게 드러났다. 트럼프 미국 대통령은 미국이 이 전쟁과 아무 관련이 없다고 말하며 전쟁이 자국 행정부의 우선순위가 아님을 시사했다. 반면 유럽 정상들은 우크라이나의 상황을 낙관적으로 평가했다. 우르줄라 폰데어라이엔 유럽연합 집행위원장은 회담 후 흐름이 우크라이나 쪽으로 기울고 있다고 사회관계망서비스에 적었다. 이재명 대통령도 16일부터 18일 일정으로 캐나다를 방문해 G7 정상회의에 참석하며 다자 외교 무대에 섰다. 미국의 발 빼기 기류 속에 유럽이 우크라이나 지원의 부담을 더 짊어지는 구도가 굳어지고 있다. 종전 협상 동력과 서방의 결속이 시험대에 올랐다. 한국으로서는 미·유럽 간 균열 속에서 외교적 입지를 조율해야 하는 과제를 안았다.`,
  keyTerms:[{term:`G7`,explanation:`미국, 일본, 독일, 영국, 프랑스, 이탈리아, 캐나다 등 주요 7개 선진국의 협의체다. 세계 경제와 외교 현안을 함께 논의하며 국제 질서에 큰 영향을 미친다.`}],
  history:`2022년 러시아의 우크라이나 침공 이후 G7은 대러 제재와 우크라이나 군사·재정 지원을 주도해 왔다. 그러나 트럼프 행정부 출범 이후 미국의 지원 의지가 약해지며 서방 내 균열이 커졌다. 전쟁이 장기화되며 피로감도 누적됐다.`,
  players:`미국 트럼프 대통령과 유럽연합 폰데어라이엔 집행위원장이 상반된 입장을 대표한다. 우크라이나와 러시아가 전쟁 당사자이며, 이재명 대통령 등 초청국 정상들도 참석했다. 유럽 주요국은 지원 부담을 떠안는 처지다.`,
  current:`미국의 발 빼기와 유럽의 결속 강화가 동시에 부각된 분기점이다. 한국 대통령의 G7 참석으로 다자 외교 무대에서의 역할도 주목됐다.`,
  outlook:`향후 종전 협상 진전과 유럽의 추가 지원 규모가 관전 포인트다. 미국 입장 변화와 전선 상황이 전쟁 향방을 가른다.`,
  sources:[{title:`War in Ukraine - Global Conflict Tracker - CFR`,url:`https://www.cfr.org/global-conflict-tracker/conflict/conflict-ukraine`},{title:`Middle East conflict, Russia-Ukraine war top US security concerns - CFR`,url:`https://www.cfr.org/news-releases/middle-east-conflict-russia-ukraine-war-and-us-venezuela-tensions-are-top-us-security`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`메타, 슈퍼인텔리전스랩 첫 모델 뮤즈 스파크 공개…올해 AI 설비투자 최대 1350억 달러 베팅`,
  metrics:[`2026년 AI 설비투자 1150~1350억 달러`,`구형 라마 4 대비 연산비용 대폭 절감`],
  summary:`메타가 신설 슈퍼인텔리전스랩에서 만든 첫 플래그십 대규모 언어모델 뮤즈 스파크를 공개했다. 이 모델은 알렉산드르 왕 최고AI책임자가 이끄는 조직이 만든 자체 모델로, 멀티모달 인식과 추론, 헬스, 에이전트 작업에서 경쟁력 있는 성능을 구형 라마 4 중형 모델보다 훨씬 적은 연산비용으로 구현했다고 한다. 메타는 또 2026년 AI 설비투자를 1150억~1350억 달러로 잡아 지난해의 거의 두 배로 늘리겠다고 밝혔다. 이는 오픈AI, 구글과의 격차를 좁히려는 공격적 행보로 해석된다. AI를 향한 빅테크의 초지능 경쟁이 천문학적 투자 경쟁으로 번지고 있다. 같은 시기 엔비디아는 데이터센터용 신형 칩을 앞세워 AI 인프라 수요를 주도하고 있다. 막대한 자본 지출이 실제 수익으로 이어질지에 대한 시장의 의구심도 함께 커지고 있다.`,
  keyTerms:[{term:`초지능`,explanation:`사람의 지능을 전반적으로 뛰어넘는 인공지능을 가리키는 말이다. 빅테크들이 도달 목표로 내세우며 막대한 자본과 인재를 쏟아붓는 경쟁의 핵심 개념이다.`}],
  history:`메타는 오픈소스 모델 라마 시리즈로 AI 경쟁에 뛰어들었으나 오픈AI, 구글에 뒤처졌다는 평가를 받았다. 이에 알렉산드르 왕을 영입하고 슈퍼인텔리전스랩을 신설해 전열을 재정비했다. 그 첫 결과물이 뮤즈 스파크다.`,
  players:`메타와 알렉산드르 왕 최고AI책임자가 이번 발표의 주역이다. 경쟁자인 오픈AI, 구글이 추격 대상이며, 엔비디아는 AI 칩 공급을 통해 전체 생태계를 떠받친다. 천문학적 투자를 지켜보는 월가도 이해당사자다.`,
  current:`자체 플래그십 모델 공개와 두 배 규모의 설비투자 발표가 맞물린 전환점이다. 초지능을 향한 빅테크 군비 경쟁이 본격화됐음을 보여준다.`,
  outlook:`뮤즈 스파크의 실제 성능 검증과 메타의 투자 회수 여부가 관전 포인트다. 경쟁사 신모델 출시와 AI 칩 공급 상황도 함께 지켜봐야 한다.`,
  sources:[{title:`Latest AI News and Breakthroughs That Matter Most - June 2026 - Crescendo`,url:`https://www.crescendo.ai/news/latest-ai-news-and-updates`},{title:`NVIDIA Kicks Off the Next Generation of AI With Rubin - NVIDIA Newsroom`,url:`https://nvidianews.nvidia.com/news/rubin-platform-ai-supercomputer`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`서울 아파트값 한 주 0.27% 급등…정부, 강남3구·마용성 넘어 서울 전역 현장점검 확대`,
  metrics:[`서울 아파트값 주간 0.27% 상승`,`강남3구·마용성 88개 단지 현장점검`],
  summary:`6월 셋째 주(15일 기준) 서울 아파트 가격이 한 주 만에 0.27% 오르며 상승세를 이어갔다. 집값이 다시 들썩이자 국토교통부는 6월 중 강남 3구와 마용성(마포·용산·성동)의 88개 아파트 단지를 대상으로 실거주 의무 확인과 자금조달계획서 검증 등 현장점검을 진행했다. 정부는 점검 대상 지역을 서울 전체와 경기도 일부로 확대하겠다고 밝혔다. 이는 코스피 급등 등 자산시장 과열 속에 부동산으로 자금이 쏠리는 흐름을 차단하려는 조치다. 이재명 정부는 이날 비상경제점검회의에서 물가 안정과 추가경정예산 규모도 함께 논의했다. 가격 급등이 특정 지역을 넘어 서울 전역으로 번질 조짐을 보이면서 정부 대응도 광역화되고 있다. 대출 규제와 세제 등 추가 대책 여부에 시장의 관심이 쏠린다.`,
  keyTerms:[{term:`자금조달계획서`,explanation:`집을 살 때 매수 자금을 어디서 마련했는지 적어 내는 서류다. 정부가 편법 증여나 불법 대출 등 비정상 자금 유입을 가려내는 데 활용한다.`}],
  history:`한국의 집값은 저금리와 풍부한 유동성 속에 강남권을 중심으로 반복적으로 급등했다. 정부는 규제지역 지정과 대출 제한, 자금 출처 점검 등으로 대응해 왔다. 2026년 들어 증시 활황과 맞물려 부동산이 다시 들썩였다.`,
  players:`국토교통부가 현장점검과 규제 정책을 주도한다. 이재명 정부의 경제팀이 거시 대응을 총괄하고, 서울 강남권 등 매수 수요자와 다주택자가 정책 대상이다. 가계와 무주택 실수요자가 직접 영향을 받는다.`,
  current:`집값 상승이 강남권을 넘어 서울 전역으로 확산될 조짐을 보이는 점이 분기점이다. 정부 점검 범위가 광역화되며 규제 강화 신호가 나오고 있다.`,
  outlook:`정부의 추가 대출·세제 대책 발표 여부와 다음 주간 시세 흐름이 관건이다. 추경 편성 방향과 금리 환경도 집값에 영향을 줄 변수다.`,
  sources:[{title:`이재명 정부 비상경제점검회의·부동산 현장점검 - 대한민국 정책브리핑`,url:`https://www.korea.kr/`},{title:`한국경제 - 부동산·경제 뉴스`,url:`https://www.hankyung.com/`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`유럽 이른 폭염에 포르투갈 40.3도…과학자들 귀인 분석으로 기후변화 영향 확인`,
  metrics:[`포르투갈 최고 40.3도·영국 35.1도`,`2026~2030년 평균기온 산업화 이전 대비 1.3~1.9도 상승 전망`],
  summary:`유럽이 최근 몇 년 새 가장 이르고 강력한 폭염에 휩싸였다. 포르투갈, 프랑스, 이탈리아, 스페인, 독일, 영국 등지에서 기온이 평년을 크게 웃돌며 폭염 경보와 휴교, 비상 대응이 잇따랐다. 포르투갈은 40.3도, 영국은 35.1도, 프랑스는 36도까지 올랐다. 클리마미터 연구진의 귀인 분석은 이번 서유럽 폭염을 인간이 유발한 기후변화 탓으로 돌렸으며, 과거 주로 가을에 나타나던 기상 조건이 이제 늦봄에도 발생하는 드문 현상이라고 설명했다. 세계기상기구(WMO)와 영국 기상청은 2026~2030년 연평균 기온이 산업화 이전 대비 1.3~1.9도 높아질 것으로 전망했다. 과학자들은 2026년이 역대 가장 더운 10개 해 안에 들 것이 거의 확실하다고 본다. 온실가스 감축뿐 아니라 이미 닥친 기후 충격에 대한 적응이 핵심 과제로 떠올랐다.`,
  keyTerms:[{term:`귀인 분석`,explanation:`특정 폭염이나 홍수 같은 이상기후가 인간이 만든 기후변화 때문인지 과학적으로 따져보는 연구 방법이다. 자연 변동과 인위적 영향을 구분해 책임 소재를 가린다.`}],
  history:`산업화 이후 온실가스 배출이 늘며 지구 평균기온이 꾸준히 상승해 왔다. 최근 몇 년 사이 유럽은 기록적 폭염을 반복적으로 겪고 있다. 2026년에는 폭염이 평년보다 이른 늦봄에 찾아왔다.`,
  players:`세계기상기구와 영국 기상청, 클리마미터 등 연구기관이 분석과 경고를 내놓는다. 폭염 피해를 입는 유럽 각국 정부와 시민, 온실가스 감축 책임을 진 주요 배출국이 이해당사자다. 도시들은 폭염 적응 대책을 서두르고 있다.`,
  current:`폭염이 늦봄으로 앞당겨진 점과 과학적 귀인 분석으로 기후변화 영향이 확인된 점이 분기점이다. 적응이 먼 미래가 아닌 당면 과제가 됐다는 인식이 확산된다.`,
  outlook:`여름철 추가 폭염과 산불·가뭄 위험, 각국의 적응 정책 발표가 관전 포인트다. 다음 기후 회의에서의 감축 목표 논의도 주목된다.`,
  sources:[{title:`World Environment Day 2026 Coincides with Record Heatwaves - ArchDaily`,url:`https://www.archdaily.com/1042205/world-environment-day-2026-coincides-with-record-heatwaves-renewing-focus-on-climate-adaptation-in-cities`},{title:`Cited 9 June 2026: Europe's exceptional heatwave - Carbon Brief`,url:`https://www.carbonbrief.org/cited-9-june-2026-europes-exceptional-heatwave-warming-forecast-amoc-observations-at-risk/`},{title:`This Week in Climate News (June 2026, Week 2) - Earth.Org`,url:`https://earth.org/this-week-in-climate-news-june-2026-week-2/`}]
}]

  tag:`2026-06-18`,
  label:`2026년 6월 18일 (목)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피, 반도체 쇼크 딛고 급반등…명목 성장률은 50년 만에 최고치`,
  metrics:[`명목 GDP 성장률 10.5% (1976년 이후 50년 만에 최고)`,`원/달러 환율 1,512원 (전일 대비 약 23원 하락)`],
  summary:`6월 초 코스피가 반도체 쇼크와 외국인 이탈로 하루 4.52% 급락하며 투자자 공포지수인 VKOSPI가 91포인트로 2009년 집계 이후 사상 최고치를 찍었지만, 이후 한국 경제가 탄탄하다는 평가가 확산되며 시장이 빠르게 반등했다. 중동발 지정학 리스크가 완화되고 반도체와 피지컬 AI 등 기술주가 반등을 주도했다. 같은 기간 한국의 실질 GDP 성장률은 1.8%, 명목 GDP 성장률은 10.5%로 1976년 이후 50년 만에 가장 높은 수치를 기록했다. 원/달러 환율도 약 23원 내린 1,512원에 주간 거래를 마치며 안정세를 보였다. 외국인은 22거래일 연속 순매도를 이어갔지만 삼성전자와 SK하이닉스 보유 비중이 1년 만에 가장 낮은 수준까지 떨어져 추가 매도세가 둔화될 것이라는 전망도 나온다. 급락 직후 검은 월요일 우려가 컸던 시장이 빠르게 진정 국면으로 돌아선 것이 핵심이다. 다만 외국인 수급과 반도체 업황이 향후 지수 방향을 가를 변수로 남아 있다.`,
  keyTerms:[{term:`명목 GDP`,explanation:`물가 변동을 빼지 않고 그해 시장가격 그대로 계산한 국내총생산. 물가 상승분이 반영되기 때문에 실질 성장률보다 보통 높게 나온다.`}],
  history:`한국 증시는 2025년 말부터 AI·반도체 슈퍼사이클 기대와 외국인 매도 공방이 반복되며 변동성이 컸다. 2026년 6월 초에는 글로벌 반도체주 조정과 중동 긴장이 겹치며 코스피가 하루 4%대 급락하는 충격이 발생했다. 동시에 환율이 급등하며 자금 이탈 우려가 커졌다.`,
  players:`코스피 시가총액의 큰 비중을 차지하는 삼성전자·SK하이닉스 등 반도체 대형주가 지수 방향을 좌우한다. 외국인 투자자는 매도 주체로, 한국은행과 정부는 환율·물가 안정 관리 주체로 맞물려 있다. 신현송 한국은행 총재는 물가안정목표 점검 기자설명회를 통해 시장 메시지를 내고 있다.`,
  current:`급락 직후 빠른 반등과 50년 만의 명목 성장률 최고치가 동시에 나오며 한국 경제 펀더멘털에 대한 평가가 갈리는 분기점에 있다. 외국인 보유 비중이 1년 만의 최저로 낮아진 점은 매도 압력 완화 신호로 읽힌다.`,
  outlook:`외국인 매도 지속 여부와 반도체 업황, 7월 이후 기업 실적 발표가 지수 방향을 가를 변수다. 한국은행의 통화정책 메시지와 미국 연준 기조 변화도 환율과 증시에 직접 영향을 줄 전망이다.`,
  sources:[{title:`반도체는 건재하다 코스피 급반전…명목 성장률은 50년 만에 최고치 - MBC뉴스`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6828934_37004.html`},{title:`반도체주 폭락에 환율도 급등…검은 월요일 오나 - MBC뉴스`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6828243_37004.html`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미 연준, 금리 동결했지만 점도표는 연내 인상으로 선회…국채금리 급등`,
  metrics:[`기준금리 3.5~3.75% 동결`,`2년물 국채금리 4.216% (하루 16bp 이상 급등)`],
  summary:`미국 연방준비제도(Fed)가 이틀간의 회의 끝에 기준금리를 3.5~3.75%에서 동결했다. 이번 회의는 케빈 워시 신임 의장 체제의 첫 회의였다. 그러나 위원들의 금리 전망을 모은 점도표에서 연말 기준금리 중간값이 종전 3.4%에서 3.8%로 올라가, 위원회가 2026년 안에 최소 한 차례 인상이 필요하다고 본 것으로 나타났다. 시장은 동결 자체보다 매파적으로 돌아선 점도표에 충격을 받았다. 결정 직후 2년물 국채금리가 16bp 이상 뛰며 4.216%를 기록했고, 다우지수는 507포인트(0.98%) 하락한 51,492.55, S&P500은 1.21%, 나스닥은 1.34% 떨어졌다. 인플레이션이 다시 고개를 들 수 있다는 우려가 금리 인하 기대를 후퇴시킨 것이 핵심이다. 향후 물가 지표가 연준의 추가 행보를 가를 변수로 남았다.`,
  keyTerms:[{term:`점도표`,explanation:`연준 위원들이 각자 생각하는 적정 금리 수준을 점으로 찍어 모은 표. 앞으로 금리를 올릴지 내릴지에 대한 위원들의 속마음을 엿볼 수 있는 자료다.`}],
  history:`연준은 2024~2025년 고물가 대응을 위해 금리를 크게 올린 뒤 점진적으로 인하 기조로 전환해 왔다. 2026년 들어 인플레이션 둔화 속도가 느려지면서 인하 기대와 인상 우려가 엇갈렸다. 이번 회의는 워시 신임 의장의 첫 무대라는 점에서 주목받았다.`,
  players:`케빈 워시 신임 연준 의장과 FOMC 위원들이 정책 결정 주체다. 채권시장 투자자와 미국 증시, 그리고 환율을 통해 한국 등 신흥국 시장도 직접 영향을 받는다. 백악관의 금리 압박도 변수로 거론된다.`,
  current:`동결에도 점도표가 인상 쪽으로 선회하며 통화정책 방향에 대한 시장 기대가 한순간에 뒤집힌 전환점이다. 국채금리 급등과 3대 지수 동반 하락이 그 충격을 보여준다.`,
  outlook:`다음 FOMC와 그 사이 발표되는 소비자물가·고용 지표가 실제 인상 여부를 가른다. 매파적 점도표가 유지되면 달러 강세와 신흥국 자금 이탈 압력이 커질 수 있다.`,
  sources:[{title:`Stock Market Today (June 17, 2026): S&P 500, Nasdaq plummet as Fed points to rate hike - TheStreet`,url:`https://www.thestreet.com/stock-market-today/stock-market-today-dow-jones-sp-500-nasdaq-updates-june-17-2026`},{title:`June Fed Meeting: Updates and Commentary - Kiplinger`,url:`https://www.kiplinger.com/news/live/fed-meeting-updates-and-commentary-june-2026`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`일본은행, 금리 1.0%로 인상…1995년 이후 31년 만에 최고`,
  metrics:[`정책금리 0.75%→1.0% (25bp 인상)`,`표결 결과 7대 1 가결`],
  summary:`일본은행(BOJ)이 6월 회의에서 단기 정책금리를 0.25%포인트 올린 1.0%로 인상했다. 이는 1995년 9월 이후 가장 높은 수준으로, 시장 예상에 부합했고 7대 1 표결로 가결됐다. 엔화 약세와 중동 긴장에 따른 에너지 비용 상승이 물가를 자극하자, 이란발 에너지 충격이 인플레이션을 더 키우는 것을 막기 위한 결정이었다. BOJ는 2026 회계연도 근원물가 전망치를 상향하며 금리 정상화를 이어가겠다는 매파적 신호를 거듭 냈다. 다만 아사다 도이치로 위원은 물가 상방 위험보다 생산·고용의 하방 위험이 더 크다며 반대표를 던졌다. BOJ는 내년에는 국채 매입 축소(테이퍼링)도 종료하겠다고 밝혔다. 초저금리를 길게 유지해온 일본이 본격적인 긴축 정상화 국면으로 들어선 점이 핵심이며, 향후 인상 속도는 점진적일 것으로 전망된다.`,
  keyTerms:[{term:`금리 정상화`,explanation:`오랫동안 비정상적으로 낮게 묶어둔 금리를 경제 상황에 맞는 보통 수준으로 천천히 되돌리는 과정. 일본은 수십 년간 초저금리를 유지해와 정상화 자체가 큰 사건이다.`}],
  history:`일본은행은 디플레이션 탈출을 위해 수십 년간 마이너스·초저금리와 대규모 국채 매입을 이어왔다. 2024년 마이너스 금리를 끝낸 뒤 조금씩 정상화에 나섰다. 2026년 엔 약세와 수입물가 상승이 겹치며 추가 인상 압력이 커졌다.`,
  players:`BOJ 정책위원회가 결정 주체이며, 우치다 부총재 등이 정책 방향을 설명해 왔다. 엔화 환율과 일본 국채시장, 엔 캐리 트레이드에 노출된 글로벌 투자자가 직접 영향을 받는다.`,
  current:`1.0%는 1995년 이후 최고 수준으로, 일본이 초저금리 시대에서 벗어나는 상징적 전환점이다. 중동발 에너지 충격을 선제 차단하려는 의도도 깔려 있다.`,
  outlook:`내년 국채 매입 축소 종료 일정과 추가 인상 시점이 관전 포인트다. 엔화 가치와 글로벌 자금 흐름, 일본 내 물가 흐름이 다음 행보를 좌우할 전망이다.`,
  sources:[{title:`Bank of Japan raises rates to 1%, and will end tapering next year - FXStreet`,url:`https://www.fxstreet.com/analysis/bank-of-japan-raises-rates-to-1-and-will-end-tapering-next-year-202606161039`},{title:`Bank of Japan rate hike a done deal given inflation and weak yen - The Japan Times`,url:`https://www.japantimes.co.jp/business/2026/06/11/economy/boj-preview-june-meeting-2026/`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`국민의힘, 6·3 지방선거 투표용지 부족 사태에 11개 지역 선거 소청…당내 갈등 표면화`,
  metrics:[`선거 소청 제기 지역 11곳`,`잠실 개표소 봉쇄 시위 12일째`],
  summary:`국민의힘이 6·3 지방선거에서 투표용지 부족 등 문제가 불거진 11개 지역에 대해 17일 선거 소청을 제기했다. 이 사태로 촉발된 잠실 개표소 봉쇄 시위는 12일간 이어지며 대치 상황이 계속됐다. 같은 날 국민의힘은 국회에서 의원총회를 열고 장동혁 대표의 거취와 투표용지 부족 사태 대응 방안을 논의했다. 장동혁 대표가 전면 재선거를 주장한 반면 정점식 원내대표는 이에 제동을 걸면서 당내 갈등이 표면화됐다. 선거 결과 불복과 재선거 요구를 둘러싼 지도부 내 노선 차이가 핵심 쟁점으로 떠올랐다. 한편 정치 브로커 명태균 씨로부터 여론조사를 제공받은 혐의를 받는 오세훈 서울시장은 징역 1년6개월을 구형받았다. 선거 행정 부실 논란과 지도부 리더십 위기가 맞물리며 야당 내홍이 확산되는 양상이다.`,
  keyTerms:[{term:`선거 소청`,explanation:`선거 결과나 당선에 문제가 있다고 보고 선거관리위원회 등에 공식적으로 이의를 제기하는 행정 절차. 소송으로 가기 전 단계로, 받아들여지면 재검표나 재선거로 이어질 수 있다.`}],
  history:`6·3 지방선거 과정에서 일부 투표소의 투표용지 부족 등 선거 행정 부실 논란이 제기됐다. 개표 단계에서 결과에 불복하는 움직임이 커지며 잠실 개표소 봉쇄 시위로 번졌다. 국민의힘은 해당 지역들에 대해 공식 이의 제기에 나섰다.`,
  players:`국민의힘 장동혁 대표와 정점식 원내대표가 재선거 여부를 두고 대립한다. 선거관리위원회는 소청 심사 주체이며, 오세훈 서울시장 사건 등 다른 정치 현안도 야당을 압박하는 변수다.`,
  current:`소청 제기와 의원총회 갈등이 같은 날 겹치며 야당 지도부의 리더십이 시험대에 오른 분기점이다. 재선거 주장과 신중론이 충돌해 당내 노선 갈등이 표면화됐다.`,
  outlook:`선거관리위원회의 소청 심사 결과와 재검표·재선거 여부가 최대 관전 포인트다. 장동혁 대표 거취 논의 결과에 따라 당 지도부 재편 가능성도 거론된다.`,
  sources:[{title:`오늘의 정치일정 6월 17일(수) - 뉴스핌`,url:`https://www.newspim.com/news/view/20260616001220`},{title:`오늘의 국회일정 2026년 6월 16일 - 법률신문`,url:`https://www.lawtimes.co.kr/news/articleView.html?idxno=222076`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미국·이란 평화 협정 서명…호르무즈 해협 금요일 전면 재개방`,
  metrics:[`미-이란 휴전 60일 연장`,`호르무즈 해협 6월 19일(금) 무관세 재개방`],
  summary:`미국과 이란이 일요일 잠정 합의에 이어 평화 협정에 서명하면서 60일간 휴전을 연장하고 모든 선박에 대해 호르무즈 해협을 다시 열기로 했다. 도널드 트럼프 미국 대통령은 협정에 서명했다고 밝히며 호르무즈 해협이 금요일(19일) 이란의 통행료 없이 완전히 재개방될 것이라고 말했다. 공식 서명식은 19일 스위스 제네바에서 열릴 예정이다. 합의 소식에 국제 유가는 3개월 만에 최저로 떨어졌는데, 미국이 이란의 즉각적인 원유 판매를 허용한다는 조건이 알려지면서 브렌트유가 5% 급락해 배럴당 78.96달러로 3월 이후 처음 80달러를 밑돌았고 서부텍사스산원유(WTI)는 5.8% 떨어진 76.05달러로 마감했다. 분쟁 프리미엄이 빠르게 해소된 것이 핵심이다. 다만 유조선 업계는 호르무즈 해협 통항 재개에 대해 여전히 신중한 입장을 보이고 있다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`이란과 아라비아반도 사이의 좁은 바닷길로, 세계에서 수송되는 원유의 약 5분의 1이 이곳을 지난다. 막히면 유가가 급등하기 때문에 전 세계 에너지 안보의 급소로 꼽힌다.`}],
  history:`2026년 5월 미국의 이란 공격으로 호르무즈 해협 봉쇄 우려가 커지며 유가가 급등했다. 이후 미국과 이란이 휴전과 평화 협상을 이어갔고, 합의가 임박했다는 신호가 나오면서 유가가 등락을 반복했다. 이번 협정으로 60일 휴전 연장과 해협 재개방이 명문화됐다.`,
  players:`트럼프 미국 대통령과 이란 정부가 협정 당사자이며, 제네바가 서명 무대가 된다. 산유국과 유조선 업계, 그리고 에너지 수입 의존도가 높은 한국 등 아시아 국가들이 직접 영향을 받는다.`,
  current:`분쟁 프리미엄이 빠르게 빠지며 유가가 3개월 만에 최저로 떨어진 전환점이다. 중동 긴장 완화가 글로벌 인플레이션과 통화정책에도 파급되고 있다.`,
  outlook:`6월 19일 제네바 공식 서명식과 호르무즈 해협 실제 재개방이 최대 변수다. 휴전 60일 이후 협정이 항구적 평화로 이어질지, 유조선 통항이 정상화될지가 관건이다.`,
  sources:[{title:`Brent falls below \$80 on report U.S. will allow Iran to sell oil immediately - CNBC`,url:`https://www.cnbc.com/2026/06/16/us-iran-peace-agreement-oil-prices-tankers-strait-of-hormuz-transit.html`},{title:`Oil prices fall amid mixed signals on US-Iran peace deal - Al Jazeera`,url:`https://www.aljazeera.com/economy/2026/5/25/oil-prices-fall-amid-mixed-signals-on-us-iran-peace-deal`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`G7 정상회의, 우크라이나 방공 지원 강화·대러 추가 제재 합의`,
  metrics:[`우크라이나 방공 시스템·요격 미사일 추가 지원 합의`,`러시아 석유·가스 부문 추가 제재 추진`],
  summary:`프랑스에서 열린 G7 정상회의에서 정상들이 우크라이나의 방공망을 강화하고 에너지 공급을 보장하며 러시아에 대한 경제 압박을 한층 높이기로 합의했다. 구체적으로 방공 시스템과 요격 미사일, 장거리 타격 능력 제공을 늘리고, 우크라이나가 서방 무기를 직접 생산할 수 있도록 라이선스를 부여하는 방안도 검토하기로 했다. 정상들은 러시아 전쟁 경제에 대한 압박을 키우기 위해 석유·가스 부문을 포함한 제재를 강화하겠다고 밝혔다. 공동성명에서 G7은 우크라이나의 자유와 주권, 영토 보전을 위해 흔들림 없이 지지한다고 강조했다. 트럼프 미국 대통령은 젤렌스키 대통령과의 회담을 매우 좋았다고 평가하며 러시아가 평화 협상에 나서야 한다고 말했다. 전쟁이 장기화되는 가운데 서방의 결속을 다시 확인한 것이 핵심이다.`,
  keyTerms:[{term:`방공망`,explanation:`적의 미사일이나 항공기를 탐지·요격해 막아내는 방어 체계. 러시아의 공습이 계속되는 우크라이나에는 도시와 발전소를 지키는 생존 수단이다.`}],
  history:`2022년 러시아의 우크라이나 침공 이후 G7은 군사·재정 지원과 대러 제재로 우크라이나를 뒷받침해 왔다. 전쟁이 길어지며 서방 내 지원 피로감과 미국의 입장 변화가 변수로 떠올랐다. 이번 정상회의에서 다시 지원 강화를 결의했다.`,
  players:`미국·영국·프랑스·독일·이탈리아·캐나다·일본 등 G7 정상과 젤렌스키 우크라이나 대통령이 핵심 인물이다. 러시아는 제재 대상이자 협상 상대이며, 메르츠 독일 총리 등이 강한 지지를 표명했다.`,
  current:`미국의 우크라이나 정책이 흔들리는 가운데 G7이 결속을 재확인하고 트럼프가 평화 중재 의지를 밝힌 분기점이다. 방공 강화와 무기 생산 라이선스 검토가 새로운 진전이다.`,
  outlook:`추가 제재의 실제 시행 범위와 방공 시스템 인도 속도가 관전 포인트다. 트럼프 주도의 평화 협상이 실제 휴전으로 이어질지가 향후 전쟁 향방을 좌우할 전망이다.`,
  sources:[{title:`Zelenskyy says G7 leaders pledge more vital help for Ukraine - PBS News`,url:`https://www.pbs.org/newshour/amp/world/zelenskyy-says-g7-leaders-pledge-more-vital-help-for-ukraine-against-russia`},{title:`Trump says he will push for peace in Ukraine after meeting Zelenskyy at G7 - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/6/16/g7-leaders-meet-in-france-with-iran-and-ukraine-high-on-agenda`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`스페이스X, AI 코딩 플랫폼 커서 600억 달러에 전량 주식 인수`,
  metrics:[`인수 규모 600억 달러 (전량 주식)`,`2026년 3분기 거래 종료 예정`],
  summary:`스페이스X가 AI 기반 코딩 플랫폼 커서(Cursor)를 600억 달러 규모의 올스톡 인수 방식으로 사들이는 옵션을 행사했다. 거래는 2026년 3분기에 마무리될 예정이다. 이번 인수는 일론 머스크의 AI 회사 xAI와의 통합을 통해 머스크의 AI 야망을 강화하고, 위성 기반 컴퓨팅 등 기업용 AI 애플리케이션과 인프라 계획을 가속하기 위한 포석으로 풀이된다. 같은 시기 G7 정상들은 오픈AI, 앤스로픽, 구글 딥마인드 등 주요 AI 기업 경영진과 만나 AI 안전, 첨단 모델 접근권, 경제 경쟁력에서 AI의 역할을 논의했다. 중국에서는 상하이증권거래소가 대형 AI 기업의 스타마켓 상장 규정을 마련하는 등 AI 자본시장 경쟁도 가열되고 있다. 빅테크가 AI 코딩과 인프라로 영토를 넓히는 흐름이 핵심이다.`,
  keyTerms:[{term:`올스톡 인수`,explanation:`인수 대금을 현금이 아니라 인수하는 회사의 주식으로 지급하는 방식. 현금이 빠져나가지 않는 대신, 인수당하는 쪽 주주가 새 회사의 주주가 된다.`}],
  history:`생성형 AI 붐 이후 빅테크들은 모델 개발을 넘어 코딩 도구, 인프라, 칩까지 수직 통합 경쟁을 벌여 왔다. 머스크는 xAI를 통해 AI 시장에 뛰어들며 데이터·컴퓨팅 자원 확보에 공을 들였다. 커서는 개발자용 AI 코딩 도구로 빠르게 성장한 플랫폼이다.`,
  players:`스페이스X와 일론 머스크의 xAI가 인수 주체이며, 커서 경영진과 투자자가 상대다. 오픈AI·앤스로픽·구글 딥마인드 등 경쟁사와 G7 정부, 중국 규제당국도 AI 패권 경쟁의 핵심 행위자다.`,
  current:`600억 달러 규모의 대형 인수와 G7의 AI 정상급 논의가 겹치며 AI 산업이 자본·정책 양면에서 분기점을 맞고 있다. 머스크 진영의 AI·우주·컴퓨팅 통합 시도가 본격화됐다.`,
  outlook:`3분기 거래 종료 여부와 규제 심사가 관전 포인트다. G7의 AI 모델 접근권 논의와 중국의 AI 기업 상장 허용이 글로벌 AI 경쟁 구도를 어떻게 바꿀지가 변수다.`,
  sources:[{title:`Top Tech News Today, June 17, 2026 - Tech Startups`,url:`https://techstartups.com/2026/06/17/top-tech-news-today-june-17-2026/`},{title:`June 2026 AI News Roundup: G7 looks at AI model access - TS2`,url:`https://ts2.tech/en/g7-looks-at-ai-model-access-as-openai-costs-china-rivalry-grow/`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`영남에 올해 첫 폭염특보…대구 34.2도, 이른 무더위 시작`,
  metrics:[`대구 낮 최고기온 34.2°C`,`강릉 올해 첫 열대야 발생(6/18)`],
  summary:`6월 17일부터 강한 난기가 한반도 본토까지 확장하면서 대구와 일부 경상북도 지역에 올해 첫 폭염특보가 발효됐다. 이날 대구의 낮 최고기온은 34.2도까지 올랐다. 이튿날인 18일에는 강릉에서 올해 첫 열대야가 나타났고 대구는 34.3도를 기록하는 등 영남 지역을 중심으로 무더위가 이어졌다. 강한 난기 유입으로 한반도 날씨가 급변한 시점으로, 예년보다 이른 폭염이 영남권에서 먼저 시작된 것이 특징이다. 6월 중순에 폭염특보가 나온 것은 평년보다 빠른 편으로, 올여름 무더위가 일찍 길어질 수 있다는 우려가 제기된다. 기상청은 난기 확장 상황을 주시하며 온열질환과 농작물 피해 대비를 당부하고 있다. 이른 폭염은 전력 수요와 건강 관리 측면에서 중요한 변수가 된다.`,
  keyTerms:[{term:`폭염특보`,explanation:`기상청이 무더위로 인한 피해가 우려될 때 발표하는 경보. 보통 하루 최고 체감온도가 33도 이상이 이틀 넘게 이어질 것으로 예상될 때 주의보·경보 단계로 내린다.`}],
  history:`한반도는 최근 몇 년간 여름철 폭염 일수가 늘고 첫 폭염 시점이 빨라지는 추세를 보여 왔다. 기후변화로 강한 난기가 일찍 유입되는 사례가 잦아졌다. 2026년에도 6월 중순에 첫 폭염특보가 발효됐다.`,
  players:`기상청이 특보 발령과 예보 주체이며, 지방자치단체와 보건당국이 온열질환·취약계층 대응을 맡는다. 전력당국과 농가도 무더위의 직접 영향권에 있다.`,
  current:`평년보다 이른 6월 중순 폭염특보가 영남에서 먼저 발효되며 올여름 무더위의 강도와 길이에 대한 경계감이 커진 시점이다. 첫 열대야까지 나타나며 본격 더위가 앞당겨졌다.`,
  outlook:`난기 확장 범위와 장마 시작 시점이 폭염 지속 여부를 가른다. 전력 수요 급증과 온열질환자 발생, 농작물 피해 여부가 향후 주시할 변수다.`,
  sources:[{title:`특보현황 - 기상청 날씨누리`,url:`https://www.weather.go.kr/w/special-report/overall.do`},{title:`2026년 폭염 - 나무위키`,url:`https://namu.wiki/w/2026%EB%85%84%20%ED%8F%AD%EC%97%BC`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`삼성전자, 엔비디아·AMD HBM4 품질 통과…SK하이닉스 독주에 균열`,
  metrics:[`SK하이닉스 HBM 점유율 62% vs 삼성 17% (2025년 2분기)`,`삼성 HBM4 6월부터 본격 공급 예상`],
  summary:`AI 메모리 시장의 핵심인 HBM(고대역폭메모리)을 둘러싼 한국 두 기업의 경쟁 구도가 변하고 있다. 그동안 SK하이닉스는 2025년 2분기 기준 HBM 시장의 62%를 장악했고 삼성전자는 17%까지 밀린 상태였다. 그러나 5월 초 보도에 따르면 삼성전자가 엔비디아와 AMD의 차세대 HBM4 최종 품질 테스트를 통과했고, 6월부터 본격적인 공급이 시작될 것으로 예상된다. 이는 SK하이닉스 독주에 균열을 내는 신호로 평가된다. SK하이닉스는 2026년 1분기 매출 52조5,800억 원, 영업이익 37조6,100억 원으로 영업이익률 72%를 기록하며 호황을 이어가고 있다. 생성형 AI와 데이터센터 투자 급증으로 HBM은 공급이 수요를 못 따라가는 초과 수요 상태가 이어지고 있으며, 이 수급 불균형은 2028년까지 지속될 것으로 전망된다. AI 반도체 패권을 가를 핵심 변수가 바로 HBM 공급 경쟁이다.`,
  keyTerms:[{term:`HBM`,explanation:`여러 개의 D램 칩을 위로 쌓아 데이터를 한꺼번에 빠르게 주고받게 만든 고성능 메모리. AI 연산을 처리하는 그래픽처리장치(GPU) 옆에 붙어 성능을 끌어올리는 핵심 부품이다.`}],
  history:`AI 붐으로 GPU 수요가 폭증하면서 함께 쓰이는 HBM이 메모리 시장의 핵심으로 떠올랐다. SK하이닉스가 엔비디아 공급을 선점하며 시장을 주도해 왔고 삼성전자는 추격하는 입장이었다. 차세대 규격인 HBM4에서 경쟁이 새 국면을 맞고 있다.`,
  players:`SK하이닉스와 삼성전자가 공급 경쟁의 양대 축이며, 엔비디아·AMD가 최대 고객이다. 이들의 품질 인증 여부가 점유율을 좌우한다.`,
  current:`삼성전자가 엔비디아·AMD HBM4 품질 테스트를 통과하며 SK하이닉스 독주에 균열이 생긴 분기점이다. 6월 공급 본격화 여부가 점유율 반등의 열쇠다.`,
  outlook:`삼성의 HBM4 양산·공급 안정성과 SK하이닉스의 대응이 관전 포인트다. 2028년까지 이어질 것으로 보이는 HBM 초과 수요가 두 기업 실적을 떠받칠 전망이다.`,
  sources:[{title:`AMD 잭팟에 웃는 삼성…HBM4로 SK하이닉스 독주 균열 시작인가 - 글로벌이코노믹`,url:`https://www.g-enews.com/article/Global-Biz/2026/05/202605080644316380fbbec65dfb_1`},{title:`SK하이닉스 15% 급등 신고가…2028년까지 HBM 부족 - 트레이딩키`,url:`https://www.tradingkey.com/kr/analysis/stocks/more/261879259-sk-hynix-hbm-shortage-samsung-tracker-valuation-tradingkey`}]
}]

  tag:`2026-06-17`,
  label:`2026년 6월 17일 (수)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미 연준, 워시 신임 의장 첫 FOMC서 기준금리 동결 유력…인플레 재가속에 인하 기대 후퇴`,
  metrics:[`기준금리 4.25~4.50% 동결 유력`,`미국 5월 CPI 4.2%`],
  summary:`미국 연방준비제도(연준)가 한국시간 6월 18일 새벽 공개하는 6월 FOMC 회의에서 기준금리를 현행 4.25~4.50%로 동결할 것이 유력하다. 이번 회의는 지난해 5월 제롬 파월 후임으로 취임한 케빈 워시 신임 의장이 주재하는 첫 정책 무대다. 워시 의장은 인플레이션 억제와 구조개혁을 강조해 온 대표적 매파 인사로 분류된다. 미-이란 전쟁으로 에너지 가격이 급등하며 5월 소비자물가지수(CPI)가 4.2%까지 치솟자, 연초 예상됐던 금리 인하 기대가 빠르게 후퇴했다. 골드만삭스는 올해 인하 전망을 폐기하고 다음 인하 시점을 2027년으로 미뤘으며 금리 인상 확률을 10%에서 20%로 올렸다. 한때 시장에서는 인상 확률이 52%까지 치솟았다는 분석도 나왔다. 시장은 동결 자체보다 워시 의장의 기자회견 발언과 향후 금리 경로 신호에 주목하고 있다. 미-이란 종전 합의로 유가가 급락한 점이 물가 부담을 다소 덜어줄지가 관건이다.`,
  keyTerms:[{term:`매파`,explanation:`물가를 잡기 위해 금리를 높게 유지하거나 올리려는 통화정책 성향을 뜻한다. 경기 부양보다 인플레이션 억제를 우선한다.`}],
  history:`연준은 2022년부터 고강도 긴축으로 금리를 가파르게 올렸다가 2024~2025년 점진적 인하로 방향을 틀었다. 그러나 2025년 5월 워시 의장 취임과 2026년 미-이란 전쟁이 겹치며 통화정책 환경이 급변했다. 전쟁발 에너지 충격이 물가를 다시 끌어올린 것이 핵심 배경이다.`,
  players:`미국 연준과 케빈 워시 의장이 중심에 있다. 워시는 백악관과 트럼프 행정부의 금리 인하 압박과 인플레이션 억제 사이에서 균형을 잡아야 한다. 골드만삭스 등 월가 투자은행은 인하 기대를 거둬들였고, 한국 등 신흥국은 강달러 부담을 받는다.`,
  current:`미-이란 종전 합의로 국제유가가 급락하며 인플레 압력이 일부 완화될 조짐이 나타난 가운데 열리는 첫 회의라 방향 신호가 중요하다.`,
  outlook:`워시 의장의 기자회견 발언과 다음 회의, 향후 CPI 지표가 금리 경로를 좌우한다. 인하 재개 시점은 2027년으로 밀릴 가능성이 거론된다.`,
  sources:[{title:`6월 17일 금리 회의 전망: 신임 연준 의장의 딜레마 - TradingKey`,url:`https://www.tradingkey.com/kr/analysis/economic/central-banks/261952354-fed-fomc-june-warsh-inflation-cpi-nonfarm-payrolls-rate-hike-whitehouse-fed-yields-tradingkey`},{title:`June Fed Meeting: Live Updates and Commentary - Kiplinger`,url:`https://www.kiplinger.com/news/live/fed-meeting-updates-and-commentary-june-2026`},{title:`케빈 워시 FOMC 2026년 6월 전망 - 결로그`,url:`https://gyeollog.com/entry/케빈-워시-FOMC-2026년-6월-전망`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`한국은행 기준금리 2.5% 동결 기조…가계대출 총량규제로 수도권 집값·가계부채 죈다`,
  metrics:[`기준금리 연 2.5% 동결`,`원·달러 환율 1520원대`],
  summary:`한국은행은 올해 기준금리를 연 2.5%로 동결하며 추가 인하에 신중한 태도를 이어가고 있다. 물가와 경기뿐 아니라 수도권 집값과 가계부채, 1520원대까지 오른 원·달러 환율 변동성을 함께 고려하겠다는 입장이다. 금융당국은 가계대출 총량규제라는 강력한 카드로 시중 자금이 부동산으로 쏠리는 흐름을 차단하고 있다. 미 연준의 매파적 기조로 한미 금리차가 벌어지며 원화 약세와 자본유출 우려가 커진 점도 동결 배경으로 꼽힌다. 외국인은 5월 한 달간 국내 주식을 대규모로 순매도했다. 한은은 금융안정 측면에서 수도권 주택가격과 가계부채 리스크 전개 상황을 계속 주시하겠다고 밝혔다. 다음 통화정책방향 결정회의는 7월 16일로 예정돼 있다. 시장은 미국 FOMC 결과가 한은의 다음 행보에 미칠 영향에 촉각을 세우고 있다.`,
  keyTerms:[{term:`가계대출 총량규제`,explanation:`은행이 일정 기간 내어줄 수 있는 가계대출의 총량에 한도를 정해 묶어두는 규제다. 부동산으로 쏠리는 돈줄을 죄어 집값과 가계빚 증가를 억제하려는 조치다.`}],
  history:`한은은 코로나 이후 인플레이션에 대응해 금리를 올렸다가 2024~2025년 인하로 전환했다. 그러나 수도권 집값 급등과 가계부채 증가가 다시 불거지면서 인하 속도 조절에 들어갔다. 강달러 환경도 운신의 폭을 좁혔다.`,
  players:`한국은행과 금융위원회·금융감독원 등 금융당국이 핵심 주체다. 정부는 가계부채 관리와 부동산 안정을, 차주와 은행은 대출 한도 축소의 부담을 안는다. 미 연준의 통화정책이 외부 변수로 작용한다.`,
  current:`미 연준의 매파 기조로 한미 금리차가 벌어지고 환율이 1520원대로 오른 상황이라 인하 여력이 제한된다.`,
  outlook:`7월 16일 금통위와 수도권 집값·가계부채 추이, 미국 금리 경로가 향후 결정의 분수령이 된다.`,
  sources:[{title:`한국은행, 금리 추가 인하 여부 수도권 집값·환율 고려 결정 - Investing.com`,url:`https://kr.investing.com/news/stock-market-news/article-1766862`},{title:`한국은행 기준금리 동결, 2026 금리 발표 일정 - 토스뱅크`,url:`https://www.tossbank.com/articles/baserate2601`}]

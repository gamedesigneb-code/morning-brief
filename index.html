  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피, 미국·이란 전쟁 충격에 4.52% 폭락하며 7,730선으로 추락`,
  metrics:[`코스피 -366.11p(-4.52%), 7,730.82 마감`,`원·달러 환율 1,526.50원, 1,560원대 위협`],
  summary:`10일 코스피지수가 전 거래일보다 366.11포인트(-4.52%) 급락한 7,730.82에 마감하며 하루 만에 또 한 번 무너졌다. 미국과 이란의 군사 충돌이 재격화하면서 국제유가가 치솟자 수출·제조업 비중이 큰 한국 증시가 직격탄을 맞은 것이다. 유가증권시장에서 외국인과 기관이 동반 매도에 나섰고 개인이 홀로 방어했으나 역부족이었다. 원·달러 환율은 전날 1,526.50원에서 1,560원대를 위협하며 환율 경고등이 켜졌다. 전쟁 불확실성이 커지자 투자자들이 위험자산을 팔고 달러로 몰리는 위험회피 심리가 시장을 지배했다. 급락장 속에서도 조선·방산·전력주는 상대적으로 선방했는데, 이란 혁명수비대가 역내 미국 목표물에 미사일과 드론을 발사하는 등 긴장이 고조된 영향으로 풀이된다. 환율 급등과 유가 상승이 수입물가를 끌어올려 국내 물가에도 부담을 줄 전망이다. 시장은 한국은행의 대응과 전쟁 전개 양상을 주시하고 있다.`,
  keyTerms:[{term:`위험회피`,explanation:`전쟁이나 위기처럼 불확실성이 커질 때 투자자들이 주식 같은 위험자산을 팔고 달러·금 등 안전자산으로 자금을 옮기는 현상이다. 이 과정에서 주가는 떨어지고 환율(달러값)은 오른다.`}],
  history:`한국 증시는 수출 의존도가 높아 국제 정세와 유가에 민감하게 반응해 왔다. 2026년 2월 미국·이스라엘이 이란을 상대로 공습을 시작하고 호르무즈 해협 통항이 막히면서 유가가 급등했고, 글로벌 증시 변동성이 확대됐다. 6월 들어 미·이란 충돌이 다시 격화하자 위험회피 심리가 재점화됐다.`,
  players:`외국인 투자자와 기관은 위기 시 한국 같은 신흥·수출국 증시에서 자금을 빼는 경향이 있다. 개인 투자자는 저가 매수로 방어에 나섰다. 한국은행은 환율과 물가 안정 사이에서 통화정책 딜레마에 직면해 있으며, 정부도 금융시장 안정 대책을 검토 중이다.`,
  current:`하루 만에 4.52% 급락은 코로나 이후 손꼽히는 낙폭으로, 전쟁 장기화 우려가 증시·환율에 동시 반영되는 복합 위기 국면이다. 환율 1,560원대 진입 시 외국인 추가 이탈이 우려된다.`,
  outlook:`미·이란 전쟁 전개와 호르무즈 해협 정상화 여부가 최대 변수다. 6월 한국은행 금융통화위원회의 환율·물가 대응과 미국 연준의 6월 17일 회의 결과가 단기 방향을 가를 전망이다.`,
  sources:[{title:`USD KRW 미달러 원 환율 - Investing.com`,url:`https://kr.investing.com/currencies/usd-krw`},{title:`한국은행 경제통계시스템 - 환율 통계`,url:`https://ecos.bok.or.kr/`},{title:`KOSPI 과거 데이터 - Investing.com`,url:`https://kr.investing.com/indices/kospi-historical-data`}]

  colorBg:`#e8f0fe`,
  headline:`미국 5월 소비자물가 4.2% 급등, 3년 만에 최고치…유가 충격이 주도`,
  metrics:[`소비자물가 전년比 +4.2%(4월 3.8%)`,`휘발유 가격 전년比 +40.5%`],
  summary:`미국 노동부가 발표한 5월 소비자물가지수가 전년 동월 대비 4.2% 올라 2023년 4월 이후 3년 만에 가장 높은 상승률을 기록했다. 4월의 3.8%에서 더 가팔라진 수치로, 1월 2.4%에서 빠르게 치솟았다. 가장 큰 원인은 이란 전쟁발 에너지 충격으로, 휘발유 가격이 1년 전보다 40.5% 뛰었고 월간으로도 7% 올랐다. 에너지 가격이 월간 물가 상승분의 60% 이상을 차지했으며, 에너지 부문 전체로는 전년比 23.5% 상승했다. 호르무즈 해협을 통한 원유 수송 차질로 휘발유값은 1월 이후 약 50% 올랐다. 연방준비제도(Fed)는 6월 17일 회의에서 금리를 동결할 것으로 예상되며, 물가 급등이 일시적인지 지속될지 지켜본다는 입장이다. 크리스토퍼 월러 이사는 물가 압력이 잦아들지 않으면 추가 금리 인상 가능성도 배제할 수 없다고 밝혔다.`,
  keyTerms:[{term:`소비자물가지수`,explanation:`가정이 자주 사는 상품·서비스 가격을 묶어 평균적으로 얼마나 올랐는지 보여주는 대표적 물가 지표다. 이 수치가 높을수록 생활비 부담이 커지고 중앙은행은 금리 인상을 고민하게 된다.`}],
  history:`미국 물가는 2022년 고점 이후 둔화돼 2026년 초 2%대까지 내려왔으나, 2월 시작된 미·이란 전쟁으로 에너지값이 급등하며 다시 4%대로 치솟았다. 1970년대 오일쇼크 이후 최대 규모의 세계 에너지 공급 차질이 물가를 끌어올리고 있다.`,
  players:`연준은 물가 안정과 경기 사이에서 금리 결정을 내려야 한다. 트럼프 행정부는 이란산 원유를 차단하는 강경책을 펴고 있으며, 소비자는 휘발유·항공유 등 연료비 급등에 직면했다. 기업들은 비용 상승을 가격에 전가하고 있다.`,
  current:`에너지가 주도한 물가 상승이 다른 품목으로 번질지가 관건이다. 4%대 물가는 연준의 금리 인하 기대를 약화시키고, 인하 대신 동결 또는 인상 시나리오를 부각시키고 있다.`,
  outlook:`6월 17일 연준 회의의 금리 결정과 성명이 분수령이다. 전쟁·유가 향방에 따라 추가 인상 여부가 갈리며, 다음 물가 지표와 호르무즈 해협 상황이 핵심 변수다.`,
  sources:[{title:`CPI inflation report May 2026: Prices rose 4.2% annually - CNBC`,url:`https://www.cnbc.com/2026/06/10/cpi-inflation-report-may-2026.html`},{title:`Inflation topped 4% in May as CPI surged to highest in 3 years - CBS News`,url:`https://www.cbsnews.com/news/cpi-report-today-may-2026-inflation-iran-war-trump/`},{title:`Consumer Price Index Summary - 2026 M05 - BLS`,url:`https://www.bls.gov/news.release/cpi.nr0.htm`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`국제유가 배럴당 96달러 돌파…호르무즈 해협 봉쇄로 1970년대 이후 최대 공급 차질`,
  metrics:[`브렌트유 배럴당 96달러 돌파(전쟁 이후 +25%)`,`올해 휘발유 도매가 약 +50% 전망`],
  summary:`국제유가 기준물인 브렌트유가 10일 미군의 이란 2일차 공습 속에 배럴당 96달러를 넘어섰다. 전쟁 발발 이후 25% 이상 오른 수준으로, 평화 협상이 무산되고 분쟁이 장기화할 수 있다는 공포가 시장을 짓눌렀다. 이란은 2월 28일 미국·이스라엘의 공습과 최고지도자 사망 이후 호르무즈 해협 통항을 사실상 차단해 왔고, 10일에는 혁명수비대 해군이 해협을 통과하려던 유조선 2척을 공격했다고 밝혔다. 이 봉쇄는 1970년대 오일쇼크 이후 세계 에너지 공급에 가해진 최대 규모의 차질로 평가된다. 미국 에너지정보청(EIA)은 봉쇄 지속을 전제로 6~7월 브렌트유 평균을 배럴당 105달러로 전망했다. 디젤·항공유 도매가는 올해 60% 이상, 휘발유는 약 50% 오를 것으로 추정된다. 고유가는 전 세계 물가와 증시를 동시에 압박하고 있다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`페르시아만과 외해를 잇는 좁은 바닷길로, 전 세계 해상 원유 수송의 약 5분의 1이 지나는 핵심 길목이다. 이곳이 막히면 원유 공급이 줄어 국제유가가 급등한다.`}],
  history:`호르무즈 해협은 세계 원유 물동량의 약 20%가 통과하는 전략 요충지로, 과거에도 분쟁 때마다 봉쇄 위협이 유가를 흔들었다. 2026년 2월 미·이스라엘의 대이란 공습 이후 실제 통항이 막히면서 유가가 본격적으로 치솟기 시작했다.`,
  players:`이란은 해협 봉쇄를 대미 압박 카드로 쓰고 있고, 미국은 이란 항구에 제재를 가하며 맞서고 있다. 원유 수입 의존도가 높은 한국·일본 등 아시아 국가와 산유국, 글로벌 정유·해운업계가 직접 영향을 받는다.`,
  current:`유조선 직접 공격으로 봉쇄가 군사 충돌 국면으로 격상되며 공급 차질 우려가 현실화하고 있다. 유가가 100달러를 넘어설 경우 세계 경제 둔화 압력이 커진다.`,
  outlook:`해협 정상화 시점과 미·이란 협상 진전 여부가 유가 향방을 좌우한다. EIA의 105달러 전망 현실화 여부와 주요 산유국의 증산 대응이 단기 변수다.`,
  sources:[{title:`2026 Strait of Hormuz crisis - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_Strait_of_Hormuz_crisis`},{title:`Oil prices: U.S. strikes in Iran revive Strait of Hormuz fears - CNBC`,url:`https://www.cnbc.com/2026/05/28/oil-prices-us-strikes-in-iran-revive-strait-of-hormuz-turmoil-fears.html`},{title:`Short-Term Energy Outlook: Global oil markets - EIA`,url:`https://www.eia.gov/outlooks/steo/report/global_oil.php`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미군, 이란 다수 목표물 2일차 공습…트럼프 오늘 매우 강하게 친다 경고`,
  metrics:[`미군 공습 2일차, 이란 다수 목표물 타격`,`브렌트유 전쟁 후 +25%, 96달러 돌파`],
  summary:`미군이 10일 이란의 계속된 도발에 대응해 이란 내 다수 목표물을 이틀째 타격했다. 전날 미 육군 공격헬기가 호르무즈 해협 인근에서 이란 드론과 충돌해 추락한 직후 보복에 나선 것이다. 트럼프 대통령은 오늘 이란을 매우 강하게 칠 것이라고 경고했고, 양측은 새로운 공격을 주고받았다. 이란 혁명수비대 해군은 해협을 통과하려던 유조선 2척을 공격했다고 밝혔다. 이번 충돌은 2월 미국·이스라엘의 대이란 공습과 최고지도자 알리 하메네이 사망으로 시작된 전쟁의 재격화 국면이다. 다만 양측 모두 자국 내에서 승리로 포장할 수 있다면 출구를 찾으려는 기류도 감지된다. 확전 우려에 국제유가가 96달러를 넘고 글로벌 증시가 급락하는 등 경제 충격이 확산되고 있다. 한국을 비롯한 원유 수입국들은 에너지·물가 부담에 직면했다.`,
  keyTerms:[{term:`확전`,explanation:`전쟁이나 분쟁의 규모·범위가 더 커지는 것을 뜻한다. 공습이 보복을 부르고 다시 더 큰 공격으로 이어지면서 전쟁이 멈추기 어려워지는 상황을 가리킨다.`}],
  history:`미·이란 갈등은 수십 년에 걸쳐 핵 개발과 제재를 둘러싸고 누적돼 왔다. 2026년 2월 미국·이스라엘이 이란을 공습하고 최고지도자가 사망하면서 전면전으로 비화했고, 호르무즈 해협 봉쇄로 세계 경제에까지 충격을 줬다.`,
  players:`미국과 이스라엘은 이란의 군사·핵 역량 무력화를 목표로 하고, 이란은 해협 봉쇄와 역내 미국 자산 공격으로 맞서고 있다. 트럼프 대통령은 강경 대응을 주도하고 있으며, 걸프 산유국과 주변국이 확전 여파를 우려한다.`,
  current:`헬기 추락과 유조선 공격으로 충돌이 2일차로 이어지며 전면 확전 위험이 커진 분수령이다. 동시에 양측이 출구를 모색하는 신호도 있어 향방이 유동적이다.`,
  outlook:`트럼프의 추가 공습 예고 실행 여부와 양측의 협상 가능성이 최대 관전 포인트다. 호르무즈 해협 통항 재개 시점과 유가·증시 반응이 사태 진정 여부를 가를 전망이다.`,
  sources:[{title:`U.S. military striking multiple targets in Iran on 2nd day of renewed fire - NPR`,url:`https://www.npr.org/2026/06/10/nx-s1-5853882/us-strike-iran-second-day-renewed-fire`},{title:`Live updates: U.S. will hit Iran very hard today, Trump says - NBC News`,url:`https://www.nbcnews.com/world/iran/live-blog/us-attacks-iran-rcna349305`},{title:`2026 Iran war - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_Iran_war`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이재명 대통령 취임 1주년 기자회견…대체불가 대한민국·AI 3대 강국 청사진 제시`,
  metrics:[`국가대표 AI 모델 8개 등재, 美·中 이어 세계 3위`,`GPU 26만장 확보, 역대 최대 R&D 예산 편성`],
  summary:`이재명 대통령이 8일 청와대 영빈관에서 취임 1주년 기자회견을 열고 대체불가 대한민국을 슬로건으로 지난 1년의 국정 성과와 비전을 밝혔다. 회견은 민생경제, 정치·외교·안보, 사회문화 세 분야로 나뉘어 진행됐다. 핵심 성과로는 AI 3대 강국 도약 기틀 마련이 강조됐는데, 과학기술정보통신부는 지난 1년간 GPU 26만장을 확보하고 국가대표 AI 모델을 육성했다고 밝혔다. 독자 AI 파운데이션 모델 프로젝트에 힘입어 미국 스탠퍼드대의 AI 인덱스 2026에 국내 AI 모델 8개가 등재돼 미국(50개)·중국(30개)에 이어 세계 3위에 올랐다. 정부는 연구 생태계 복원을 위해 역대 최대 규모의 국가 R&D 예산을 편성했다. 10일 더불어민주당 최고위원회의에서도 정청래 대표가 정부 성과를 부각했다. 야권은 정책 실효성과 재정 부담을 두고 검증을 예고하고 있다.`,
  keyTerms:[{term:`AI 3대 강국`,explanation:`미국·중국에 이어 한국을 인공지능 분야 세계 3위 국가로 키우겠다는 정부 목표다. 독자 AI 모델 개발, GPU 등 인프라 확보, 대규모 연구개발 투자가 핵심 수단이다.`}],
  history:`이재명 정부는 2025년 6월 출범 이후 AI를 국가 성장 전략의 축으로 삼아 왔다. 과기정통부를 부총리급으로 격상하고 AI 고속도로, 독자 AI 모델, GPU 확보 등을 추진하며 1년간 정책 드라이브를 걸었다.`,
  players:`이재명 대통령과 과기정통부가 AI·R&D 정책을 주도하고, 리벨리온·퓨리오사AI 등 국산 AI 반도체 기업과 연구계가 생태계를 떠받친다. 야당은 예산 규모와 성과의 실효성을 견제 대상으로 본다.`,
  current:`취임 1주년 시점에 스탠퍼드 AI 인덱스 세계 3위라는 성과 지표가 나오며 정책 정당성을 부각하는 분기점이 됐다. 동시에 막대한 재정 투입의 지속 가능성이 쟁점으로 떠올랐다.`,
  outlook:`국가인공지능전략위원회의 AI 행동계획 구체화와 2026년 예산 집행 성과가 다음 관전 포인트다. 야권의 국회 검증과 후속 정책 발표 일정이 정국 변수로 작용할 전망이다.`,
  sources:[{title:`이재명 대통령 취임 1주년 기자회견 주요 내용은? - MBC`,url:`https://imnews.imbc.com/news/2026/politics/article/6828470_36912.html`},{title:`과기부, 이재명 정부 1년 성과…AI 3대 강국 진입·역대 최대 R&D 예산 - EBN`,url:`https://www.ebn.co.kr/news/articleView.html?idxno=1710740`},{title:`AI 3대 강국 기틀 마련 1년…독자 AI 모델·GPU 확보로 AI 자립화 - 아시아경제`,url:`https://view.asiae.co.kr/article/2026053111280190413`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미 하원, 700억 달러 이민단속 예산 통과…75일 셧다운 끝내며 트럼프 임기 내내 ICE 지원`,
  metrics:[`하원 표결 214-212 통과`,`ICE 385억 달러·국경순찰대 226억 달러 배정`],
  summary:`미국 하원이 9일 당론 표결 끝에 214 대 212로 700억 달러 규모의 이민세관단속국(ICE)·국경순찰대 예산안을 통과시켰다. 이 법안은 트럼프 대통령의 두 번째 임기가 끝날 때까지 국토안보부의 이민 단속 예산을 완전히 채워준다. 올해 초 미네소타에서 연방요원에 의해 시민 2명이 숨진 사건 이후 민주당이 이민 단속 개혁 없이는 추가 예산을 막겠다고 맞서면서, 국토안보부를 겨냥한 75일간의 부분 셧다운이 빚어졌다. 합의안에 따라 ICE는 3년간 인력 채용·훈련에 385억 달러(국토안보수사국 70억 달러 포함)를, 국경순찰대는 226억 달러를 받는다. 4개월간 이어진 예산 공백을 끝낸 이 법안은 트럼프 대통령의 서명으로 발효됐다. 마이크 존슨 하원의장에게는 정치적 승리로 평가된다. 민주당은 단속 과정의 인권 문제를 계속 제기하고 있다.`,
  keyTerms:[{term:`셧다운`,explanation:`예산안이 제때 처리되지 못해 정부 기관이 일시적으로 운영을 멈추는 상태를 말한다. 공무원 급여 지급과 행정 서비스가 중단돼 사회적 혼란이 발생한다.`}],
  history:`트럼프 행정부는 두 번째 임기 들어 강력한 이민 단속 정책을 추진해 왔다. 이를 둘러싼 예산 갈등으로 국토안보부 관련 예산이 4개월간 끊겼고, 올초 단속 중 사망 사건이 불거지며 여야 대치가 75일 부분 셧다운으로 번졌다.`,
  players:`트럼프 대통령과 공화당, 마이크 존슨 하원의장이 예산안 통과를 주도했다. 민주당은 단속 개혁을 조건으로 내걸며 저항했다. ICE·국경순찰대 인력과 이민자 사회가 직접 영향을 받는다.`,
  current:`근소한 표차로 법안이 통과되며 장기 셧다운이 종료된 전환점이다. 트럼프 임기 내내 이민 단속 재원이 확보돼 단속 강화가 예상된다.`,
  outlook:`예산 집행에 따른 ICE 인력 확충과 단속 강도 변화가 주목된다. 민주당의 인권 관련 입법 시도와 중간선거 국면에서 이민 이슈의 쟁점화 여부가 변수다.`,
  sources:[{title:`Republicans send \$70 billion in ICE and border patrol funding to Trump - CNN`,url:`https://www.cnn.com/2026/06/09/politics/house-passes-ice-border-patrol-funding-trump`},{title:`House passes \$70 billion immigration enforcement funding - Washington Post`,url:`https://www.washingtonpost.com/politics/2026/06/09/ice-funding-bill-is-up-house-vote-after-weeks-republican-delays/`},{title:`Trump signs immigration bill with billions for ICE - NPR`,url:`https://www.npr.org/2026/06/09/nx-s1-5851664/house-reconciliation-vote-immigration-enforcement-ice-border-patrol`}]

  headline:`티빙 대규모 개인정보 유출…과기정통부 민관합동조사단 본격 조사 착수`,
  metrics:[`5월 30일 18시 1분 DB 직접 침입 발생`,`아이디·이름·생년월일·CI/DI 등 유출`],
  summary:`CJ ENM의 OTT 서비스 티빙에서 대규모 개인정보 유출 사고가 발생해 정부가 조사에 나섰다. 5월 30일 오후 6시 1분 신원 미상 해커가 개인정보가 저장된 티빙 DB에 직접 침입했고, 다음 날 회사가 유출을 확인한 뒤 6월 1일 신고하고 6월 3일 공지했다. 유출된 항목은 아이디, 이름, 생년월일, 성별, CI·DI, 휴대폰 번호(끝 4자리 암호화), 이메일, 환불 계좌번호(암호화), 비밀번호(단방향 암호화) 등으로 광범위하다. 해커가 DB에 접속해 개인정보 파일을 외부로 전송한 것으로 파악됐다. 다만 정확한 피해 회원 규모는 공개되지 않아 이용자 불안이 커지고 있다. 과학기술정보통신부는 피해 현황과 사고 원인을 조사하기 위해 민관합동조사단을 구성해 본격 조사에 착수했고, 한국인터넷진흥원(KISA)과 함께 자료 보전을 요구했다. 개인정보보호위원회도 별도 조사에 들어갔다.`,
  keyTerms:[{term:`개인정보 유출`,explanation:`이름·생년월일·연락처 등 개인을 식별할 수 있는 정보가 본인 동의 없이 외부로 새어 나가는 것을 말한다. 보이스피싱·명의도용 등 2차 피해로 이어질 수 있어 위험하다.`}],
  history:`국내에서는 통신·금융·유통 등 대형 플랫폼의 개인정보 유출 사고가 반복돼 왔다. 가입자가 많은 OTT 서비스로 성장한 티빙이 이번에 해킹 표적이 되면서 콘텐츠 플랫폼의 보안 취약성이 다시 도마에 올랐다.`,
  players:`사고를 일으킨 CJ ENM·티빙이 책임 주체이고, 과기정통부와 KISA, 개인정보보호위원회가 조사·감독을 맡았다. 더불어민주당도 10일 대변인 브리핑에서 이 사안을 다뤘다. 피해 회원들은 보상과 정보 보호를 요구하고 있다.`,
  current:`정부 민관합동조사단이 가동되며 사고 원인과 피해 규모 규명이 본격화된 국면이다. 규모가 공개되지 않은 점이 불안을 키우는 핵심 쟁점이다.`,
  outlook:`조사 결과에 따른 피해 규모 공식 발표와 과징금·보상 절차가 향후 관건이다. 재발 방지 대책과 OTT 업계 전반의 보안 강화 논의로 이어질 전망이다.`,
  sources:[{title:`티빙 개인정보 유출…과기부, 침해사고 조사 착수 - 비즈워치`,url:`https://news.bizwatch.co.kr/article/mobile/2026/06/04/0004`},{title:`개인정보위, 티빙 개인정보 유출 조사 착수 - MBC`,url:`https://imnews.imbc.com/news/2026/econo/article/6827734_36932.html`},{title:`티빙 개인정보 유출 사건 - 나무위키`,url:`https://namu.wiki/w/%ED%8B%B0%EB%B9%99%20%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EC%9C%A0%EC%B6%9C%20%EC%82%AC%EA%B1%B4`}]

  headline:`교황 레오 14세, 바르셀로나 사그라다 파밀리아 축성…140여 년 만에 세계 최고 높이 성당 완성`,
  metrics:[`예수의 탑 높이 172m(566피트), 세계 최고 높이 교회`,`착공 1882년, 약 144년 만에 중앙탑 완공`],
  summary:`교황 레오 14세가 10일 스페인 바르셀로나의 사그라다 파밀리아 대성당에서 미사를 집전하고 마지막 중앙탑인 예수의 탑을 축성했다. 1882년 착공돼 140여 년간 지어진 이 성당은 지난 2월 높이 172m(566피트)의 예수의 탑이 완공되면서 세계에서 가장 높은 교회가 됐고, 탑 꼭대기에는 5층 높이의 거대한 세라믹 십자가가 얹혔다. 이번 미사는 성당을 설계한 카탈루냐 건축가 안토니 가우디 서거 100주년을 기념하는 자리이기도 했다. 수만 명의 인파가 성당 주변 거리를 메웠고, 차량 통제와 함께 스페인 국왕 부부와 페드로 산체스 총리가 참석해 삼엄한 경비가 펼쳐졌다. 추기경·주교·사제들이 공동 집전했고 카탈루냐 각지의 합창단과 음악가들이 함께했다. 가우디의 미완성 역작이 한 세기 반 만에 사실상 완성 단계에 이른 상징적 순간으로 평가된다.`,
  keyTerms:[{term:`사그라다 파밀리아`,explanation:`스페인 바르셀로나에 있는 대성당으로, 건축가 안토니 가우디가 설계해 1882년 착공한 뒤 140여 년간 지어진 미완성 걸작이다. 독특한 모더니즘 양식으로 세계적 관광 명소이자 유네스코 세계유산이다.`}],
  history:`사그라다 파밀리아는 1882년 착공된 뒤 가우디가 1926년 사망할 때까지 일부만 완성됐고, 이후 시민 기부와 관광 수입에 의존해 한 세기 넘게 공사가 이어졌다. 내전과 자금난으로 여러 차례 중단되기도 했다.`,
  players:`가톨릭 교회와 교황 레오 14세, 성당 건축위원회가 완공·축성을 주도했다. 스페인 국왕 부부와 페드로 산체스 총리 등 정·종교계 인사가 참석했고, 바르셀로나 시민과 전 세계 순례객·관광객이 의미를 함께했다.`,
  current:`마지막 중앙탑 완공과 교황의 축성으로 144년에 걸친 대역사가 사실상 마무리되는 역사적 분기점이다. 가우디 서거 100주년과 맞물려 상징성이 한층 커졌다.`,
  outlook:`남은 세부 장식 공사 완료 시점과 가우디 시복(諡福) 추진 논의가 이어질 전망이다. 완공 효과로 바르셀로나 관광 수요가 더욱 늘 것으로 예상된다.`,
  sources:[{title:`Pope Leo honors Gaudi's Sagrada Familia masterpiece in Barcelona - PBS`,url:`https://www.pbs.org/newshour/world/photos-pope-leo-honors-gaudis-sagrada-familia-masterpiece-in-barcelona`},{title:`Pope Leo arrives in Barcelona for second leg of Spain visit - Vatican News`,url:`https://www.vaticannews.va/en/pope/news/2026-06/pope-leo-xiv-arrives-in-barcelona-second-leg-spain-visit.html`},{title:`Pope Leo to Bless Barcelona's Sagrada Familia - Artnet`,url:`https://news.artnet.com/art-world/pope-leo-blesses-sagrada-familia-2779861`}]

  headline:`국산 AI 반도체, K-Perf 시범 검증서 경쟁력 입증…리벨리온·퓨리오사AI 성능 과시`,
  metrics:[`리벨리온 R100, 1,200억 매개변수 모델 단일 카드 구동`,`한국 AI 모델 8개 등재, 세계 3위`],
  summary:`한국형 AI 성능평가 체계인 K-Perf 시범 검증에서 국산 AI 반도체 기업 리벨리온과 퓨리오사AI가 각각의 강점을 보이며 경쟁력을 입증했다. 리벨리온의 R100은 1,200억 개 매개변수 규모의 GPT-oss-120B 모델을 단일 카드에서 구동하며 높은 추론 성능과 처리량을 기록했다. 이는 엔비디아 등 해외 제품에 의존하던 AI 반도체 시장에서 국산 기술의 자립 가능성을 보여준 사례로 평가된다. 정부의 AI 3대 강국 전략과 맞물려 국산 칩과 독자 AI 모델 육성에 힘이 실리고 있으며, 스탠퍼드대 AI 인덱스 2026에는 한국 AI 모델 8개가 등재돼 미국·중국에 이어 세계 3위에 올랐다. 글로벌 차원에서는 6월 1일 유럽연합이 AI법(AI Act) 집행 강화를 위한 독립 전문가 지원 체계를 가동하며 기술 주권 패키지를 발표하는 등 각국의 AI 주도권 경쟁이 본격화하고 있다. 2026년 AI는 스스로 판단·실행하는 에이전틱 AI로 진화 중이다.`,
  keyTerms:[{term:`AI 반도체`,explanation:`인공지능 연산에 특화된 반도체로, 대량의 데이터를 빠르게 처리해 AI 모델의 학습과 추론을 돕는 핵심 부품이다. 그동안 엔비디아 등 해외 기업이 시장을 주도해 국산화가 과제로 꼽혀 왔다.`}],
  history:`AI 반도체 시장은 엔비디아의 GPU가 사실상 독점해 왔고, 한국은 메모리 강국이지만 AI 연산용 칩 분야에서는 후발 주자였다. 정부가 AI 3대 강국 전략을 내세우면서 리벨리온·퓨리오사AI 등 국내 스타트업의 자체 칩 개발이 가속화됐다.`,
  players:`리벨리온·퓨리오사AI 등 국산 AI 반도체 기업과 정부·과기정통부가 국산화를 주도하고, 엔비디아 등 글로벌 기업이 시장을 지배하고 있다. 유럽연합은 AI법으로 규제·기술 주권 강화에 나섰다.`,
  current:`K-Perf 검증으로 국산 칩이 대형 AI 모델을 단일 카드로 구동하는 성능을 입증하면서 자립화 가능성이 부각된 시점이다. AI 주권이 국가 경쟁력의 핵심 변수로 떠올랐다.`,
  outlook:`K-Perf 정식 평가 결과와 국산 칩의 상용화·수출 진전이 향후 관건이다. EU AI법 본격 시행과 글로벌 AI 규제·표준 경쟁의 전개가 주목된다.`,
  sources:[{title:`2026년 6월 7일 반도체 기술 관련 주요 뉴스 요약 - SPTA Times Korea`,url:`https://www.sptatimeskorea.com/post/%EB%B0%98%EB%8F%84%EC%B2%B4-%EB%89%B4%EC%8A%A4`},{title:`다섯 가지 키워드로 살펴보는 2026년 AI 트렌드 전망 - SK텔레콤 뉴스룸`,url:`https://news.sktelecom.com/218116`},{title:`AI 3강 향한 실행 로드맵…국가인공지능전략위 AI 행동계획 - 인공지능신문`,url:`https://www.aitimes.kr/news/articleView.html?idxno=37721`}]
}]

  headline:`미국 증시, 1조 달러 증발 후 진정세…워시 첫 FOMC 앞두고 금리 인상 유력`,
  metrics:[`나스닥 +0.86% (25,929.66)`,`5월 비농업 고용 17.2만 명 (전망치의 2배)`],
  summary:`지난 금요일 뉴욕 증시는 9주 연속 상승 행진을 끝내며 S&P500 지수가 2.6% 넘게 급락했고, 시장에서 약 1조 달러가 증발했다. 직접적 도화선은 5월 비농업 신규 고용이 17.2만 명으로 시장 전망치의 두 배에 달하면서 경기 과열과 물가 압력 우려가 커진 점이다. 월요일에는 반등 대신 진정세가 나타나 나스닥이 0.86% 오른 25,929.66, S&P500이 0.30% 상승한 반면 다우는 0.16% 하락했다. 이번 주에는 케빈 워시 신임 의장이 주재하는 첫 연방공개시장위원회(FOMC) 회의가 열리며, 시장은 사실상 금리 인상을 기정사실로 받아들이고 있다. 같은 주 유럽중앙은행(ECB)과 영란은행(BOE)도 인상이 예상돼 주요국 통화정책이 일제히 긴축으로 기울고 있다. 10년물 미 국채 금리는 2.8bp 오른 4.564%까지 상승하며 증시 부담 요인으로 작용했다. 다만 유럽은 독일 신규 수주 급감 등 경기 위축 신호 속에 금리를 올려야 하는 딜레마에 놓였다.`,
  keyTerms:[{term:`금리 인상`,explanation:`중앙은행이 기준금리를 올려 시중에 풀린 돈을 줄이는 정책이다. 물가가 너무 오르면 이를 잡으려 금리를 올리지만, 기업 대출과 소비가 위축돼 증시에는 악재로 작용한다.`}],
  history:`코로나 이후 풀린 막대한 유동성으로 미국 물가가 치솟자 연준은 2022년부터 공격적으로 금리를 올렸다. 이후 인하 기대가 커졌으나 고용과 소비가 식지 않으면서 다시 긴축 압력이 커진 상황이다. 2026년 들어 신임 의장 체제가 출범하며 통화정책 방향에 시장의 이목이 쏠려 있다.`,
  players:`미국 연준(Fed)과 케빈 워시 신임 의장이 핵심이며, 같은 주 결정을 앞둔 ECB와 영란은행도 주요 변수다. 투자자들은 금리 경로에 따라 주식과 채권 비중을 조정하며, 신흥국은 미국 금리 상승 시 자금 유출 위험에 노출된다.`,
  current:`고용 호조가 오히려 긴축 우려로 이어지는 역설적 국면이며, 신임 의장의 첫 회의라 정책 신호의 무게가 크다. 증시는 단기 급락 후 방향성을 탐색 중이다.`,
  outlook:`이번 주 FOMC 결정과 기자회견에서 향후 금리 경로에 대한 힌트가 핵심이다. 이어 발표될 소비자물가지수(CPI)도 시장 변동성을 키울 수 있다.`,
  sources:[{title:`Global Economy Briefing - June 9, 2026 - Rio Times`,url:`https://www.riotimesonline.com/global-economy-briefing-june-9-2026/`},{title:`Crude, Chips Deliver Early Tailwind Ahead of CPI - Schwab`,url:`https://www.schwab.com/learn/story/stock-market-update-open`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`중국 5월 수출 19.4% 급증…무역흑자 1,054억 달러로 사상 최대`,
  metrics:[`5월 수출 전년比 +19.4%`,`무역흑자 1,054억 달러 (사상 최대)`],
  summary:`중국의 5월 수출이 전년 동기 대비 19.4% 급증하며 시장 예상을 크게 웃돌았다. 이에 따라 월간 무역흑자는 1,054억 달러로 사상 최대치를 기록했다. 미국과의 통상 갈등이 이어지는 가운데 나온 강한 수출 지표는 중국 제조업의 회복력을 보여주는 신호로 해석된다. 수출 호조는 원자재 수요를 자극해 구리 등 상품 시장 전반에 상승 압력을 가했다. 다만 막대한 무역흑자는 미국 등 주요국과의 통상 마찰을 다시 키울 불씨로 지목된다. 글로벌 경기 둔화 우려 속에서도 중국 수출이 버텨주면서 세계 교역의 방향성에 대한 관심이 커지고 있다. 시장은 이 흑자 규모가 향후 위안화 환율과 관세 협상에 미칠 영향을 주시하고 있다.`,
  keyTerms:[{term:`무역흑자`,explanation:`한 나라가 수출로 번 돈이 수입으로 쓴 돈보다 많아 남는 차액이다. 흑자가 크면 그 나라 경제엔 좋지만, 상대국 입장에선 적자가 쌓여 무역 갈등의 원인이 된다.`}],
  history:`중국은 세계의 공장으로 불리며 오랜 기간 막대한 무역흑자를 쌓아왔다. 2018년 이후 미중 무역전쟁으로 관세 장벽이 높아졌지만 중국 수출은 우회로를 찾으며 증가세를 이어왔다. 2026년 들어 글로벌 경기 둔화 우려에도 수출이 견조한 흐름을 보이고 있다.`,
  players:`중국 정부와 제조업체가 수출 주체이며, 미국과 유럽연합(EU)은 거대한 흑자를 견제하는 입장이다. 중국에 원자재를 파는 호주·브라질 등 자원국은 수출 호조의 수혜를 본다.`,
  current:`고관세 환경에서도 두 자릿수 수출 증가율이 나오면서 통상 협상의 역학이 바뀔 수 있는 시점이다. 사상 최대 흑자는 새로운 무역 마찰의 빌미가 될 수 있다.`,
  outlook:`미국의 추가 관세 대응 여부와 위안화 환율 흐름이 관전 포인트다. 다음 달 수출 지표가 추세 지속 여부를 가를 전망이다.`,
  sources:[{title:`Global Economy Briefing - June 9, 2026 - Rio Times`,url:`https://www.riotimesonline.com/global-economy-briefing-june-9-2026/`},{title:`Weekly Global Economic Update - Deloitte Insights`,url:`https://www.deloitte.com/us/en/insights/topics/economy/global-economic-outlook/weekly-update.html`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`검은 월요일…코스피 8.29% 폭락, 서킷브레이커 발동 속 7,484선 마감`,
  metrics:[`코스피 -8.29% (8,160→7,484.41)`,`원/달러 환율 1,526.50원`],
  summary:`6월 8일 코스피가 전 거래일 대비 8.29% 폭락한 7,484.41로 마감하며 검은 월요일을 연출했다. 장중 매도 사이드카와 서킷브레이커가 연이어 발동될 만큼 투매가 거셌고, 코스닥은 911.39로 9% 넘게 급락해 900선을 간신히 지켰다. 급락의 배경에는 브로드컴발 인공지능(AI) 반도체 실적 우려, 반도체 중심의 단기 과열, 미국 금리 상승과 인플레이션 부담, 중동 지정학 리스크, 외국인 자금 유출, 스페이스X 상장 관련 수급 부담 등이 복합적으로 작용했다. 특히 반도체 업종은 코스피가 5.5% 빠질 때 7.9% 폭락하며 낙폭을 키웠다. 원/달러 환율은 1,526.50원으로 12.60원 하락(원화 강세)했다. 다만 기업 이익 추정치는 유지돼 이익 하락장이 아닌 밸류에이션 조정(PER 디레이팅) 국면이라는 분석이 우세하다. 증권가에서는 대세 하락의 시작이라기보다 일시적 조정일 가능성에 무게를 두고 있다.`,
  keyTerms:[{term:`서킷브레이커`,explanation:`주가가 일정 폭 이상 급락할 때 시장 전체 거래를 일시 중단시키는 안전장치다. 투자자들이 패닉에 빠져 무차별 투매하는 것을 잠시 멈춰 진정시키려는 제도다.`}],
  history:`코스피는 AI·반도체 호황에 힘입어 8,000선을 넘어서며 가파른 상승세를 이어왔다. 단기간 급등에 따른 고평가 부담이 누적되던 차에 대외 악재가 한꺼번에 터지며 차익실현 매물이 쏟아졌다. 서킷브레이커 발동은 흔치 않은 일로, 그만큼 충격이 컸음을 보여준다.`,
  players:`외국인 투자자의 대규모 매도가 낙폭을 키운 핵심이며, 삼성전자·SK하이닉스 등 반도체 대형주가 지수를 끌어내렸다. 개인 투자자와 기관은 저가 매수와 위험 관리 사이에서 대응에 나섰다.`,
  current:`AI 반도체 고평가 논란과 미국 금리·중동 리스크가 겹친 분기점으로, 조정이 일시적인지 추세 전환인지가 관건이다.`,
  outlook:`미국 CPI와 FOMC 결과, 외국인 수급 회복 여부가 반등 시점을 가를 전망이다. 반도체 업종 실적 가이던스도 주시 대상이다.`,
  sources:[{title:`검은 월요일에 주저앉은 코스피, 8% 폭락 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202606081702469112`},{title:`반도체 쇼크에 코스피 7480선 후퇴…3개월 만 최대 낙폭 - 디지털타임스`,url:`https://www.dt.co.kr/article/12066432`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이스라엘-이란 교전 재개 위기…트럼프 휴전 협상 막바지 진통`,
  metrics:[`2025년 분쟁 사망자 약 24만 4,600명 (1994년 이후 최대)`,`국제유가 배럴당 약 91달러`],
  summary:`중동에서 이스라엘과 이란의 교전이 다시 불붙으며 가까스로 이룬 휴전이 흔들리고 있다. 트럼프 미국 대통령은 이란과의 협상이 막바지 단계라고 밝히면서도 이스라엘에 휴전 유지를 위한 자제를 촉구했다. 그러나 이란은 긴장이 고조되면 전투가 재개될 수 있다고 경고하고 있어 정전 합의가 이름뿐이라는 우려가 커진다. 주말 사이 레바논에 대한 공습이 이어지면서 원유 시장의 지정학 프리미엄도 유지돼 국제유가는 배럴당 91달러 안팎을 기록했다. 한편 웁살라 분쟁데이터프로그램(UCDP) 집계 기준 2025년 전 세계 분쟁 사망자는 약 24만 4,600명으로 1994년 이후 최대를 기록하는 등 세계적 분쟁이 급증했다. 호르무즈 해협 인근에서는 아파치 헬기 추락 사고로 미군 조종사 2명이 무인정에 의해 구조되기도 했다. 휴전의 실질적 이행 여부가 중동 정세와 유가의 향방을 좌우할 전망이다.`,
  keyTerms:[{term:`휴전`,explanation:`전쟁 중인 양측이 싸움을 잠시 멈추기로 한 합의다. 전쟁을 끝내는 종전과 달리 임시적이어서, 합의가 깨지면 언제든 전투가 다시 시작될 수 있다.`}],
  history:`이스라엘과 이란은 핵 프로그램과 역내 무장세력 지원을 둘러싸고 오랜 적대 관계를 이어왔다. 최근 직접 충돌로 비화하며 전면전 우려가 커졌고, 미국 중재로 가까스로 휴전이 성립됐다. 그러나 양측의 불신이 깊어 합의 기반이 취약하다.`,
  players:`이스라엘과 이란이 당사자이며, 미국은 트럼프 대통령을 앞세워 중재에 나서고 있다. 레바논 헤즈볼라 등 친이란 세력과 호르무즈 해협을 둘러싼 미군의 움직임도 변수다.`,
  current:`교전 재개 조짐과 레바논 공습으로 휴전이 시험대에 올랐고, 협상은 타결 직전이라는 신호와 결렬 위험이 공존하는 분수령에 있다.`,
  outlook:`트럼프 행정부의 협상 타결 여부와 추가 공습 발생이 최대 관전 포인트다. 합의가 깨질 경우 유가 급등과 글로벌 인플레이션 재점화로 이어질 수 있다.`,
  sources:[{title:`Top U.S. & World Headlines - June 9, 2026`,url:`https://www.youtube.com/watch?v=E3-AP1Uq51Y`},{title:`10 Conflicts to Watch in 2026 - International Crisis Group`,url:`https://www.crisisgroup.org/cmt/global/10-conflicts-watch-2026`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`6·3 지방선거, 민주당 광역단체장 12곳 석권…서울은 오세훈이 수성`,
  metrics:[`광역단체장 16곳 중 민주 12 · 국힘 4`,`민주당 서울·대구서 패배`],
  summary:`6월 3일 치러진 지방선거에서 더불어민주당이 광역단체장 16곳 중 12곳을 차지하며 압승을 거뒀고, 국민의힘은 4곳을 지키는 데 그쳤다. 다만 최대 격전지였던 서울에서 국민의힘 오세훈 후보가 막판 대역전으로 시장직을 사수하면서 민주당의 승리에는 흠집이 남았다. 민주당은 인천·경기·충남·충북·세종·대전 등에서 승리했고, 부산시장에는 전재수 전 해양수산부 장관, 강원지사에는 우상호 전 정무수석이 당선됐다. 반면 민주당이 첫 승리를 노렸던 대구에서는 김부겸 후보가 패배했다. 이번 결과는 2022년 지방선거 대비 의석을 늘린 성과지만 수도 서울을 내준 점이 뼈아프다는 평가다. 선거가 끝나면서 그동안 미뤄졌던 쟁점 법안 논의가 본격화될 전망이다. 조작기소 특검법과 형사소송법 개정안 등이 대표적 현안으로 꼽힌다.`,
  keyTerms:[{term:`광역단체장`,explanation:`특별시장·광역시장·도지사처럼 광역 지방자치단체를 이끄는 선출직 수장이다. 지역 살림을 책임지는 자리라 선거 결과가 차기 대선 등 전국 정치 판도의 풍향계로 읽힌다.`}],
  history:`이재명 정부 출범 1년을 맞아 치러진 이번 지방선거는 정권 중간평가 성격을 띠었다. 직전 2022년 선거에서는 국민의힘이 우세했으나 이번엔 구도가 뒤집혔다. 선거를 앞두고 미뤄둔 쟁점 법안들이 결과에 따라 처리 동력을 얻게 됐다.`,
  players:`더불어민주당과 국민의힘이 맞붙었고, 서울을 지킨 오세훈 시장이 보수 진영의 차기 주자로 부상했다. 이재명 대통령과 여당은 입법 추진의 동력을, 야당은 서울 사수로 반전의 발판을 확보했다.`,
  current:`여당의 외형적 승리에도 서울 패배가 변수로 남아, 향후 입법 드라이브와 정국 주도권 다툼의 분기점이 됐다.`,
  outlook:`조작기소 특검법, 형사소송법 개정안 등 쟁점 법안의 처리 향배가 핵심 관전 포인트다. 새 단체장들의 취임 이후 지역 현안 대응도 주목된다.`,
  sources:[{title:`오세훈 대역전…민주 12곳·국힘 4곳 승리 - MBC`,url:`https://imnews.imbc.com/replay/2026/nw1400/article/6827731_36974.html`},{title:`6·3 지방선거, 민심의 선택은? - YTN`,url:`https://www.ytn.co.kr/_ln/0101_202606040345186215`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`정부, 2,000억 달러 대미 전략투자 기준 확정…원리금 회수 가능해야 추진`,
  metrics:[`대미 전략투자 2,000억 달러 (총 합의 3,500억 달러)`,`한미전략투자공사 자본금 2조 원`],
  summary:`정부는 6월 9일 국무회의에서 한미전략투자특별법 시행령안을 의결하며 2,000억 달러 규모 대미 투자 사업의 수익성 판단 기준과 선정 절차를 확정했다. 핵심 잣대는 상업적 합리성으로, 프로젝트의 예상 수명 동안 한국에 배정될 총 수익이 투자 원금과 이자를 모두 보전할 수 있어야 사업을 추진한다는 원칙이다. 이로써 미국과 합의한 3,500억 달러 규모 전략투자 계획을 실행할 법적·제도적 틀이 완성됐다. 실제 투자를 수행할 한미전략투자공사는 자본금 2조 원을 정부가 연차적으로 납입해 20년간 사업을 진행한다. 적자가 나지 않는 사업이 1순위로, 소형모듈원자로(SMR)와 조선 분야가 유력하게 거론된다. 정부는 6월 18일부터 특별법과 시행령을 본격 시행할 계획이다. 막대한 규모의 대미 투자가 국익에 부합하도록 회수 가능성을 제도적으로 못 박았다는 의미가 있다.`,
  keyTerms:[{term:`상업적 합리성`,explanation:`투자한 원금과 이자를 사업 수익으로 충분히 되돌려받을 수 있는 상태를 뜻한다. 정부가 대미 투자에서 손해 보는 사업은 하지 않겠다는 안전장치로 내세운 기준이다.`}],
  history:`한국은 미국과의 통상 협상 과정에서 대규모 대미 투자를 약속했고, 총 3,500억 달러 규모로 합의가 이뤄졌다. 그러나 막대한 투자가 자칫 손실로 이어질 수 있다는 우려가 제기돼 왔다. 이에 정부는 회수 가능성을 담보할 제도 마련에 나섰다.`,
  players:`기획예산처 등 정부 부처와 새로 설립되는 한미전략투자공사가 사업을 주도한다. 미국 정부는 투자 유치 주체이며, SMR·조선 등 관련 산업계가 수혜 후보로 거론된다.`,
  current:`시행령 의결로 투자 집행을 위한 법적 틀이 완성된 시점으로, 실제 사업 선정이 임박한 분수령이다.`,
  outlook:`6월 18일 특별법·시행령 본격 시행과 한미전략투자공사 출범 이후 첫 투자 대상 선정이 핵심 관전 포인트다. SMR·조선 등 1순위 사업의 윤곽이 주목된다.`,
  sources:[{title:`2000억달러 대미투자 수익성 기준 마련…원리금 회수가 핵심 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202606091327073237`},{title:`한미전략투자공사 자본금 2조…2000억달러 대미투자 시동 - 뉴스핌`,url:`https://www.newspim.com/news/view/20260609000571`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`오픈AI·엔비디아 10GW 동맹에 IPO 추진까지…AI 인프라 패권 경쟁 가속`,
  metrics:[`엔비디아 시스템 10기가와트 배치`,`엔비디아, 오픈AI에 최대 1,000억 달러 투자`],
  summary:`오픈AI와 엔비디아가 최소 10기가와트(GW) 규모의 엔비디아 시스템을 배치하는 대형 전략적 파트너십에 합의했다. 엔비디아는 시스템이 단계적으로 배치되는 과정에서 오픈AI에 최대 1,000억 달러를 투자할 계획이다. 1단계는 차세대 베라 루빈(Vera Rubin) 플랫폼을 활용해 2026년 하반기 가동을 목표로 하며, 이는 초지능(superintelligence) 구현을 향한 차세대 AI 인프라 구축의 핵심으로 평가된다. 이와 함께 오픈AI는 미국 증시 상장을 위한 서류를 비공개로 제출하며 기업공개(IPO)를 본격화한 것으로 전해졌다. 시장에서는 오픈AI의 기업가치가 1조 달러대에 이를 수 있다는 관측이 나오며, 이는 앤스로픽·스페이스X에 이은 거대 상장 행보다. 업계에서는 메타·앤스로픽·엔비디아·구글·오픈AI를 묶은 MANGO라는 표현까지 등장하며 AI 인프라 기업으로의 무게중심 이동을 보여준다. 천문학적 투자와 상장이 맞물리며 AI 패권 경쟁이 한층 격화되는 양상이다.`,
  keyTerms:[{term:`기업공개`,explanation:`회사가 주식을 증권시장에 처음 상장해 일반 투자자에게 파는 것으로 IPO라고도 한다. 거액의 자금을 조달할 수 있지만 실적과 경영을 공개해야 하는 의무가 생긴다.`}],
  history:`오픈AI는 챗GPT로 생성형 AI 시대를 열었고, 엔비디아는 AI 연산용 GPU 시장을 장악하며 함께 급성장했다. 모델 규모가 커질수록 막대한 연산 인프라가 필요해 양사의 결합이 심화돼 왔다. 2026년 들어 투자와 상장 움직임이 본격화됐다.`,
  players:`오픈AI와 엔비디아가 동맹의 양 축이며, 메타·앤스로픽·구글 등 이른바 MANGO 기업들이 경쟁자다. 막대한 자금을 대는 투자자와 상장을 지켜보는 공개시장 투자자도 핵심 이해관계자다.`,
  current:`10GW 규모 동맹과 IPO 추진이 동시에 진행되며 AI 인프라 투자 경쟁이 정점으로 치닫는 전환점이다.`,
  outlook:`베라 루빈 플랫폼의 2026년 하반기 가동 여부와 오픈AI 상장 일정·기업가치가 최대 관전 포인트다. 천문학적 투자가 실제 수익으로 이어질지가 관건이다.`,
  sources:[{title:`OpenAI and NVIDIA Announce Strategic Partnership to Deploy 10GW - NVIDIA`,url:`https://nvidianews.nvidia.com/news/openai-and-nvidia-announce-strategic-partnership-to-deploy-10gw-of-nvidia-systems`},{title:`Top Tech News Today, June 9, 2026 - Tech Startups`,url:`https://techstartups.com/2026/06/09/top-tech-news-today-june-9-2026/`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`유럽 이례적 조기 폭염에 기온 기록 경신…WMO 향후 5년 1.5도 돌파 경고`,
  metrics:[`포르투갈 40.3°C / 영국 35.1°C`,`2026~30년 1.5도 초과 확률 75%`],
  summary:`5월 말 서유럽이 이례적으로 이른 폭염에 휩싸이며 곳곳에서 기온 기록이 깨졌다. 영국은 35.1도, 프랑스는 36도까지 치솟았고 포르투갈은 40.3도를 기록했으며, 프랑스 기상청은 히트돔이 평년보다 10도 이상 높은 기온을 만들어냈다고 밝혔다. 세계기상기구(WMO)와 영국 기상청은 향후 5년간 지구 평균기온이 거의 기록적인 수준에 이를 것으로 전망했다. 2026~2030년 연평균 기온이 산업화 이전 대비 1.3~1.9도 높을 것으로 예측됐으며, 그중 한 해는 역대 최고치를 경신할 가능성이 크다. 특히 이 기간 평균기온이 1.5도를 넘어설 확률은 75%, 어느 한 해가 2024년의 최고 기록을 깰 확률은 86%로 제시됐다. 엘니뇨의 귀환으로 또 한 번의 기록적 더위가 2027년에 닥칠 가능성도 거론된다. 6월 5일 세계 환경의 날이 폭염과 겹치며 도시의 기후 적응 대책이 시급한 과제로 부상했다.`,
  keyTerms:[{term:`히트돔`,explanation:`고기압이 뚜껑처럼 대기를 덮어 뜨거운 공기를 가두는 현상이다. 열이 빠져나가지 못해 한 지역에 극심한 폭염이 며칠씩 이어지게 만든다.`}],
  history:`산업화 이후 온실가스 누적으로 지구 평균기온이 꾸준히 올라 폭염의 빈도와 강도가 강해졌다. 파리협정은 기온 상승을 1.5도 이내로 억제하자는 목표를 세웠으나 달성이 점점 어려워지고 있다. 2024년은 역대 가장 더운 해로 기록됐다.`,
  players:`세계기상기구(WMO)와 영국 기상청이 전망을 내놓았고, 폭염을 겪은 유럽 각국 정부와 도시가 대응 주체다. 온실가스 감축을 둘러싼 주요 배출국들의 책임도 핵심 쟁점이다.`,
  current:`봄철에 이미 한여름급 폭염이 닥치고 1.5도 돌파가 임박했다는 경고가 나오면서 기후 대응이 더 미룰 수 없는 국면에 들어섰다.`,
  outlook:`여름 본격 폭염의 강도와 엘니뇨 전개가 관건이며, 2027년이 새 최고 기록을 세울지 주목된다. 도시 냉방·기후 적응 정책 강화 여부도 관전 포인트다.`,
  sources:[{title:`Cited 9 June 2026: Europe's exceptional heatwave - Carbon Brief`,url:`https://www.carbonbrief.org/cited-9-june-2026-europes-exceptional-heatwave-warming-forecast-amoc-observations-at-risk/`},{title:`World Environment Day 2026 Coincides with Record Heatwaves - ArchDaily`,url:`https://www.archdaily.com/1042205/world-environment-day-2026-coincides-with-record-heatwaves-renewing-focus-on-climate-adaptation-in-cities`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`정부, 2026~2028년 AI 3대 강국 도약 기본계획 확정…미래 성장 조건으로`,
  metrics:[`2026~2028년 3개년 기본계획`,`AI 3대 강국(G3) 목표`],
  summary:`정부가 2026년부터 2028년까지 AI 3대 강국 도약을 뒷받침할 기본계획을 확정했다. 정부는 2026년을 인공지능(AI)이 선택의 문제가 아니라 국가 성장을 좌우하는 조건이 되는 해로 규정했다. 과학기술정보통신부 등은 과학·정보통신의 날 기념식에서 과학기술·AI로 여는 대한민국 대도약을 주제로 내걸며 정책 드라이브에 힘을 실었다. 콘텐츠·미디어 산업에서는 2026년이 AI 활용의 골든타임으로 꼽히며, 기술을 어떻게 받아들이고 산업 구조를 재설계하느냐가 경쟁력을 가를 전망이다. 정부 부처들도 AI 기반 업무 혁신을 가속화하며 행정 효율화에 나서고 있다. 한편 반도체 호황에 따른 막대한 초과 세수를 미래대응기금으로 떼어내 AI 등 미래 전략산업에 집중 투자하는 방안도 추진된다. AI를 국가 성장 엔진으로 삼으려는 정부의 의지가 본격화되는 모습이다.`,
  keyTerms:[{term:`AI 3대 강국`,explanation:`미국·중국에 이어 인공지능 분야에서 세계 3위권 국가가 되겠다는 한국 정부의 목표다. AI 기술·산업·인재 경쟁력을 끌어올려 미래 성장의 핵심 동력으로 삼겠다는 구상이다.`}],
  history:`AI가 산업과 일상 전반을 재편하는 핵심 기술로 떠오르면서 각국이 주도권 경쟁에 뛰어들었다. 한국은 반도체 경쟁력을 바탕으로 AI 강국 도약을 국가 전략으로 내세워 왔다. 2026년을 기점으로 3개년 기본계획을 통해 이를 구체화했다.`,
  players:`과학기술정보통신부 등 정부 부처가 정책을 주도하고, 반도체·콘텐츠·미디어 등 산업계가 핵심 수행 주체다. 미국·중국 등 AI 선도국이 경쟁 상대로, 글로벌 패권 경쟁의 일부다.`,
  current:`반도체 초과 세수를 미래 산업에 투입하는 재원 구상까지 맞물리며 AI 전략이 실행 단계로 진입하는 시점이다.`,
  outlook:`미래대응기금 신설 추진과 3개년 계획의 세부 예산·과제 발표가 관전 포인트다. AI 인재 양성과 인프라 투자 성과가 목표 달성의 관건이다.`,
  sources:[{title:`과학기술·AI로 여는 대한민국 대도약 - 사이언스타임즈`,url:`https://www.sciencetimes.co.kr/nscvrg/view/menu/255?searchCategory=226&nscvrgSn=261752`},{title:`2026 AI 산업 전망 - 콘텐츠·미디어 산업 AI 골든타임 - 전자신문`,url:`https://www.etnews.com/20251231000243`}]
}]

  tag:`2026-06-09`,
  label:`2026년 6월 9일 (화)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피 8% 폭락 검은 월요일, 서킷브레이커·사이드카 동시 발동`,
  metrics:[`코스피 -8.29% (676.18p↓, 7484.41)`,`코스닥 -9.08% (91.05p↓)`],
  summary:`8일 코스피가 전 거래일보다 676.18포인트(8.29%) 폭락한 7484.41에 마감하며 검은 월요일을 맞았다. 장중 8.80%까지 급락하자 매매거래를 일시 중단하는 1단계 서킷브레이커가 발동됐고, 프로그램 매도 물량을 잠시 멈추는 매도 사이드카까지 동시에 울렸다. 코스닥도 9.08%(91.05포인트) 급락해 양대 시장이 함께 무너졌다. 코스피 서킷브레이커 발동은 미국·이란 전쟁 확산 우려로 급락했던 3월 4일 이후 약 3개월 만이자 올해 세 번째다. 이번 폭락은 지난 주말 미국 브로드컴의 실적 전망 실망으로 반도체주가 일제히 무너진 데다, 미 연준의 금리 인상 우려가 다시 부각되며 외국인 투매가 겹친 결과다. 한국 증시는 삼성전자·SK하이닉스 등 반도체 비중이 커 글로벌 반도체 충격에 특히 취약하다. 증권가에서는 과도한 투매라며 저가 매수 기회라는 분석도 나온다.`,
  keyTerms:[{term:`서킷브레이커`,explanation:`주가가 일정 폭 이상 급락하면 시장 전체의 매매거래를 일시 중단시키는 안전장치다. 투자자들이 흥분을 가라앉히고 패닉 매도를 멈추도록 시간을 벌어준다.`}],
  history:`한국 증시는 코로나 이후 반도체·2차전지 등 성장주 중심으로 급등해 지수가 8000선까지 올라 사상 최고 수준에 근접해 있었다. 그만큼 밸류에이션 부담이 커진 상태였다. 서킷브레이커는 1998년 외환위기 이후 도입된 증시 안전장치다. 올해 들어 3월 미국·이란 충돌 우려 등으로 변동성이 이미 커져 있었다.`,
  players:`외국인 투자자가 대규모 순매도로 낙폭을 키웠고, 시가총액 상위인 삼성전자·SK하이닉스 등 반도체 대형주가 지수 하락을 주도했다. 한국거래소는 서킷브레이커와 사이드카를 발동해 거래를 일시 중단시켰다. 미국 브로드컴 실적과 연준의 금리 정책 기대가 도화선이 됐다.`,
  current:`글로벌 반도체주 동반 급락과 금리 인상 우려가 겹치며 위험자산 회피 심리가 극에 달한 시점이다.`,
  outlook:`미국의 6월 연방공개시장위원회(FOMC) 결과와 추가 반도체 실적 발표, 외국인 매매 동향이 향후 반등 여부를 가를 변수다.`,
  sources:[{title:`검은 월요일 덮친 코스피, 7500선 무너졌다 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202606081832201286`},{title:`검은 월요일 코스피 8% 폭락, 서킷브레이커 발동 - 한국경제`,url:`https://www.hankyung.com/article/2026060824616`},{title:`8000 깨진 코스피, 서킷브레이커·사이드카 동시 발동 - 헤럴드경제`,url:`https://biz.heraldcorp.com/article/10766387`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`브로드컴 AI 실적 가이던스 실망, 글로벌 반도체 시총 1.3조 달러 증발`,
  metrics:[`브로드컴 주가 한때 약 -15%`,`글로벌 반도체 시총 약 1.3조 달러 증발`],
  summary:`미국 반도체 기업 브로드컴이 지난 3일(현지시간) 시장 기대를 밑도는 가이던스를 내놓으면서 글로벌 반도체주가 급락했다. 브로드컴은 3분기(7월 종료) AI 반도체 매출을 160억 달러로 제시했는데, 이는 시장 평균 전망치 172억 달러를 크게 밑돌았다. 실적 자체는 AI 매출이 전년 대비 143% 급증한 108억 달러로 호조였지만, 연간 AI 매출 전망을 상향하지 않은 점이 실망을 키웠다. 발표 직후 주가는 한때 15%가량 급락했고, 마이크론·AMD·인텔·ARM 등 동종 반도체주가 동반 하락했다. 단 하루 거래에서 글로벌 반도체 업종 시가총액 약 1.3조 달러가 증발했다는 분석이 나왔다. 그동안 시장은 AI 칩 수요의 무한 성장을 가정해 반도체주를 완벽한 수준으로 고평가해왔는데, 이번 실적이 그 기대에 균열을 냈다. 이 충격이 한국·아시아 증시로 번지며 코스피 검은 월요일의 도화선이 됐다.`,
  keyTerms:[{term:`가이던스`,explanation:`기업이 앞으로의 매출·이익이 얼마나 될지 직접 제시하는 실적 전망치다. 실적 자체가 좋아도 가이던스가 시장 기대에 못 미치면 주가가 급락할 수 있다.`}],
  history:`2023년 이후 생성형 AI 붐으로 엔비디아·브로드컴 등 AI 반도체 기업 주가가 폭등했다. 브로드컴은 빅테크 맞춤형 AI 칩과 네트워킹 분야 강자로 부상했다. 투자자들은 AI 칩 수요가 기하급수적으로 늘 것이라 기대해왔다.`,
  players:`브로드컴 경영진과 경쟁사 엔비디아, 마이크론·AMD·인텔 등이 핵심 플레이어다. 구글·메타 등 빅테크가 주요 고객이다.`,
  current:`사상 최대 실적에도 시장 눈높이를 못 맞추면 주가가 급락할 수 있음을 보여준 사건으로, AI 거품 논쟁에 불을 붙였다.`,
  outlook:`엔비디아 등 다른 반도체 기업의 다음 실적 발표와 빅테크의 AI 설비투자 가이던스가 추세를 결정할 전망이다.`,
  sources:[{title:`Broadcom's outlook sparked a selloff for chip stocks - CNBC`,url:`https://www.cnbc.com/2026/06/04/broadcoms-outlook-sparked-a-selloff-for-chip-stocks-heres-why.html`},{title:`Broadcom Outlook Falls Short of Investor Expectations - Bloomberg`,url:`https://www.bloomberg.com/news/articles/2026-06-03/broadcom-outlook-disappoints-investors-seeking-ai-fueled-blowout`},{title:`Broadcom stock sinks 12% as AI chip forecast disappoints - Yahoo Finance`,url:`https://finance.yahoo.com/markets/article/broadcom-stock-sinks-in-after-hours-as-ai-chip-forecast-disappoints-165602504.html`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`최태원·젠슨 황, AI 팩토리 동맹 그룹 차원 확대…2027년 한국에 구축`,
  metrics:[`2027년 한국에 AI 팩토리(차세대 AI 데이터센터) 구축`,`차세대 AI 메모리 공동 개발·양산`],
  summary:`최태원 SK그룹 회장과 젠슨 황 엔비디아 CEO가 8일 서울 SK서린빌딩에서 공동 브리핑을 열고 AI 인프라 협력을 그룹 차원으로 확대한다고 밝혔다. 두 사람은 2027년 한국에 차세대 AI 데이터센터인 AI 팩토리를 함께 구축하기로 했다. 최 회장은 그동안 메모리 중심이던 협력을 넘어 연구개발(R&D) 로드맵을 공동 수립·공유해 급증하는 AI 수요에 대응하겠다고 설명했다. SK하이닉스는 차세대 AI 메모리를 공동 개발·양산하고, SKT는 엔비디아 DSX 기반 AI 클라우드를 구축한다. 황 CEO는 전 세계적으로 AI 팩토리 수요가 급증하고 있다며 SK하이닉스가 앞으로도 최대 메모리 파트너라고 화답했다. 코스피가 폭락한 와중에도 SK와 엔비디아가 동맹을 강화하며 한국이 아시아 AI 인프라 주도권을 노린다는 신호로 해석된다.`,
  keyTerms:[{term:`AI 팩토리`,explanation:`AI 모델을 대량으로 학습·운영하기 위해 반도체 공장과 데이터센터를 통합한 차세대 AI 생산 거점을 뜻한다. 전기·메모리·AI 칩이 결합된 대규모 AI 인프라다.`}],
  history:`SK하이닉스는 엔비디아 AI 가속기에 들어가는 고대역폭메모리(HBM) 최대 공급사로 부상하며 AI 붐의 핵심 수혜주가 됐다. 양사는 수년간 HBM을 중심으로 협력해왔다.`,
  players:`최태원 SK 회장, 젠슨 황 엔비디아 CEO, SK하이닉스, SKT가 핵심이다. 한국 정부의 AI 인프라 투자 정책과도 맞물린다.`,
  current:`협력 범위가 메모리에서 데이터센터·클라우드 전반으로 넓어진 전환점이다.`,
  outlook:`2027년 AI 팩토리 구축 일정과 차세대 HBM 양산 시점이 관전 포인트다.`,
  sources:[{title:`젠슨 황·최태원, 엔비디아·SK AI 팩토리 동맹 - 서울경제`,url:`https://www.sedaily.com/article/20052774`},{title:`최태원 엔비디아와 AI팩토리 협력…젠슨 황 미래 대단히 밝아 - 디지털타임스`,url:`https://www.dt.co.kr/article/12066299`},{title:`최태원 R&D 로드맵 공동 구축…젠슨 황 AI 팩토리 엄청난 수요 - 헤럴드경제`,url:`https://biz.heraldcorp.com/article/10766010`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이재명 대통령 취임 1주년 기자회견…성장전략 대전환 대규모 투자 예고`,
  metrics:[`취임 1주년, 집권 2년차 시작`,`4대 국정 목표 제시`],
  summary:`이재명 대통령이 8일 취임 1주년 기자회견을 열고 집권 2년차 국정 구상을 밝혔다. 이 대통령은 조만간 성장전략 대전환을 이뤄낼 대규모 투자 프로젝트를 국민 앞에 공개하겠다고 예고했다. 반도체로 인한 초과 세수를 가장 효과적으로 활용할 방안을 마련하고, 국민성장펀드가 모두의 성장이라는 역할을 다하도록 챙기겠다고 했다. 초과세수는 잠재성장률 회복을 위한 장기 투자에 집중하겠다는 방향도 제시했다. 이 대통령은 글로벌 외교·안보 강국, 규범이 지켜지는 정상 사회, 국민의 목숨을 살리는 정부 등 4대 국정 목표를 강조했다. 2026년을 세계 어떤 나라도 대신할 수 없는 대체 불가 대한민국의 담대한 꿈이 시작된 해로 삼겠다고도 밝혔다. 다만 같은 날 증시가 검은 월요일로 폭락하면서 경제 성과에 대한 평가는 엇갈리는 상황이다.`,
  keyTerms:[{term:`성장전략 대전환`,explanation:`기존 성장 방식의 한계를 넘어 산업·재정·투자 구조를 근본적으로 바꾸겠다는 정부의 경제 정책 방향이다. 반도체 초과세수와 대규모 투자 프로젝트가 핵심 수단으로 거론된다.`}],
  history:`이재명 대통령은 지난해 6월 취임해 경제 성장과 민생 회복을 핵심 과제로 내세워왔다. 1주년을 맞아 집권 2년차 청사진을 제시하는 자리였다.`,
  players:`이재명 대통령과 정부·여당이 성장전략을 주도하고, 반도체 등 주력 산업과 기업, 야당의 견제가 변수다.`,
  current:`집권 2년차를 맞아 성장 동력 확보와 민생 회복이라는 성과를 본격적으로 증명해야 하는 시점이다.`,
  outlook:`조만간 공개될 대규모 투자 프로젝트의 구체안과 반도체 초과세수 활용 방안이 다음 관전 포인트다.`,
  sources:[{title:`李대통령, 성장전략 대전환 대규모 투자 프로젝트 곧 공개 - 헤럴드경제`,url:`https://biz.heraldcorp.com/article/10765891`},{title:`이재명 대규모 투자 프로젝트·반도체 초과 세수 활용 방안 공개 - 서울경제`,url:`https://www.sedaily.com/article/20052894`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이스라엘-이란 미사일 교전 재개…4월 휴전 흔들, 트럼프 중재 압박`,
  metrics:[`전쟁 100일째 무력 충돌 재개`,`4월 휴전 이후 첫 직접 교전`],
  summary:`이스라엘과 이란이 8일 미사일을 주고받으며 4월 발효된 휴전이 흔들렸다. 양국이 휴전 이후 처음으로 직접 교전한 것으로, 전쟁 100일째에 충돌이 재개됐다. 이란은 이스라엘의 헤즈볼라 공격에 보복해 미사일을 쐈고, 이스라엘은 이란 석유화학 단지를 타격했다. 트럼프 미국 대통령은 양측에 즉각 공격을 멈추라고 압박하며 협상 진전에 낙관적이라고 밝혔다. 이란은 이스라엘이 추가 적대행위를 하면 더 강하게 보복하겠다고 경고하면서도 일단 군사 공세를 멈추겠다고 했다. 트럼프는 이란 항구 봉쇄를 풀고 호르무즈 해협을 다시 여는 대신 이란의 핵물질 포기를 요구하는 협상을 추진 중이다. 호르무즈 해협은 세계 원유의 상당량이 지나는 길목이라 충돌이 길어지면 국제 유가가 급등한다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`페르시아만과 외부 바다를 잇는 좁은 길목으로, 세계 원유 수송의 핵심 통로다. 이곳이 봉쇄되거나 위협받으면 원유 공급 차질 우려로 국제 유가가 크게 오른다.`}],
  history:`2026년 이란 전쟁은 올해 초 미국·이란·이스라엘 간 군사 충돌로 격화됐고, 4월 초 휴전이 성사됐다. 미국은 그동안 이란 항구를 봉쇄하고 호르무즈 해협 통행을 제한해왔다.`,
  players:`이란, 이스라엘(네타냐후 총리), 미국(트럼프 대통령), 레바논 헤즈볼라가 핵심이다. 트럼프는 중재자이자 협상 당사자로 동시에 나섰다.`,
  current:`휴전 100일을 넘기며 다시 교전이 벌어져 합의가 깨질 위기의 분수령이다.`,
  outlook:`이란 핵물질 처리와 항구 봉쇄 해제를 둘러싼 미국·이란 협상 결과, 추가 교전 여부가 관건이다.`,
  sources:[{title:`Trump insists negotiations are continuing despite Israel and Iran trading strikes - CNBC`,url:`https://www.cnbc.com/2026/06/07/iran-fires-missiles-israel-ceasefire-strains.html`},{title:`Israel and Iran trade strikes, imperiling fragile ceasefire in war's 100th day - CBS News`,url:`https://www.cbsnews.com/live-updates/iran-us-war-israel-hezbollah-fighting-ceasefire-efforts/`},{title:`Israel strikes Iran after first missile attack since ceasefire - Washington Post`,url:`https://www.washingtonpost.com/politics/2026/06/07/trump-says-us-open-unfreezing-iranian-funds-easing-sanctions-if-they-behave/`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`美 연방법원, 트럼프의 H-1B 비자 10만 달러 수수료 위법 판결`,
  metrics:[`수수료 10만 달러 → 위법 무효 판결`,`민주당 소속 주 법무장관 20명 소송`],
  summary:`미국 매사추세츠주 연방법원이 8일 트럼프 행정부가 신규 H-1B 비자에 부과한 10만 달러 수수료를 위법이라며 무효화했다. 레오 소로킨 판사는 이 수수료가 규제성 부담금이 아니라 의회 위임 없이 부과된 사실상의 세금이라고 판단했다. 트럼프 대통령은 지난해 9월 행정명령으로 고숙련 외국인 취업 비자인 H-1B 비자 발급 비용을 대폭 올렸는데, 기존 2000~5000달러 수준이던 수수료가 10만 달러로 치솟았다. 이번 소송은 민주당 소속 주 법무장관 20명이 제기했다. 판사는 대통령에게 의회가 법률로 위임하지 않는 한 세금을 부과할 권한이 없다고 적시했다. 정부는 항소하겠다고 밝혔다. H-1B 비자는 미국 IT·반도체 업계가 인도 등 해외 고급 인력을 채용하는 핵심 통로여서 한국·아시아 인재에도 영향이 크다.`,
  keyTerms:[{term:`H-1B 비자`,explanation:`미국 기업이 전문직 외국인을 합법적으로 고용할 수 있게 해주는 대표적 취업비자다. IT·반도체 등 첨단 산업의 해외 인력 채용 통로로 널리 쓰인다.`}],
  history:`H-1B 비자는 미국 기업이 전문직 외국인을 고용하는 대표 취업비자다. 트럼프 행정부는 자국민 일자리 보호를 명분으로 이민 제한 정책을 강화해왔고, 지난해 9월 10만 달러 수수료를 도입했다.`,
  players:`트럼프 행정부, 소송을 낸 민주당 주 법무장관들, 레오 소로킨 판사, 그리고 IT·반도체 기업이 핵심 이해당사자다.`,
  current:`행정부의 이민 제한 드라이브에 사법부가 제동을 건 사건으로, 행정명령의 한계를 드러냈다.`,
  outlook:`정부 항소와 상급심 판단, 다른 이민 규제에 대한 후속 소송이 이어질지가 관전 포인트다.`,
  sources:[{title:`Federal judge voids Trump's \$100,000 fee requirement for H-1B visas - CNN`,url:`https://www.cnn.com/2026/06/08/politics/federal-judge-voids-trumps-usd100-000-fee-requirement-for-h-1b-visas`},{title:`Judge strikes down Trump's \$100,000 H-1B visa fee as an unlawful tax - NBC News`,url:`https://www.nbcnews.com/news/us-news/judge-strikes-trumps-100000-h-1b-visa-fee-say-s-unlawful-tax-rcna349060`},{title:`Trump's \$100,000 fee on H-1B visas is struck down - Washington Post`,url:`https://www.washingtonpost.com/business/2026/06/08/court-strike-down-trumps-h-1b-100000-fee/`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`애플, WWDC 2026서 대대적 개편 Siri AI 공개…구글 제미나이 탑재`,
  metrics:[`공개 베타 7월, 정식 출시 9월(iOS 27)`,`EU·중국은 출시 제외`],
  summary:`애플이 8일(현지시간) 세계개발자회의(WWDC) 2026에서 대대적으로 개편한 음성비서를 Siri AI라는 이름으로 공개했다. 새 Siri는 애플의 AI 기술인 애플 인텔리전스를 기반으로 여러 단계의 작업을 처리하고 대화 맥락을 기억하는 등 단순 음성비서를 넘어 챗봇에 가깝게 진화했다. 아이폰의 다이내믹 아일랜드에 자리 잡고 핵심 앱에 접근해 정보를 찾아주며, 별도의 Siri 앱으로 이전 대화도 다시 볼 수 있다. 내부적으로는 구글의 제미나이(Gemini)를 활용해 성능을 끌어올렸다. 공개 베타는 7월, 정식 출시는 아이폰18과 함께 9월 iOS 27에서 이뤄진다. 다만 새 기능은 유럽연합(EU)과 중국에서는 당분간 제공되지 않는다. AI 경쟁에서 뒤처졌다는 평가를 받던 애플이 본격적인 반격에 나선 것이다.`,
  keyTerms:[{term:`애플 인텔리전스`,explanation:`애플 기기에 들어가는 자체 AI 시스템의 이름이다. 글쓰기·이미지 생성·음성비서 등에 AI 기능을 더해주며, 이번 Siri AI 개편의 기반이 된다.`}],
  history:`애플은 2024년 애플 인텔리전스를 발표했지만 Siri 고도화가 계속 지연되며 구글·오픈AI에 뒤처졌다는 평가를 받아왔다. 이번 WWDC는 그 만회를 위한 무대였다.`,
  players:`애플(팀 쿡 CEO), 기술을 제공한 구글(제미나이), 경쟁자 오픈AI·삼성이 핵심이다. EU·중국 규제 당국도 변수다.`,
  current:`애플이 자체 모델의 한계를 구글 제미나이로 보완하며 AI 경쟁에 다시 뛰어든 전환점이다.`,
  outlook:`7월 베타 품질과 9월 아이폰18·iOS 27 정식 출시 반응, EU·중국 출시 시점이 관전 포인트다.`,
  sources:[{title:`Apple WWDC 2026: Apple makes its big Siri AI reveal - CNBC`,url:`https://www.cnbc.com/2026/06/08/apple-wwdc-2026-live-updates.html`},{title:`WWDC 2026: Everything announced on Siri AI, iOS 27 - TechCrunch`,url:`https://techcrunch.com/2026/06/08/wwdc-2026-everything-announced-on-siri-ai-os-27-apple-intelligence-and-more/`},{title:`Apple Announces Siri AI at WWDC 2026 - MacRumors`,url:`https://www.macrumors.com/2026/06/08/apple-announces-siri-ai/`}]

  category:`기타 이슈`,

  colorBg:`#e6f4f1`,
  headline:`자본시장연구원, 전세사기 위험 줄이려면 기관투자자 임대주택 확대 제언`,
  metrics:[`전세사기 피해 보증금 다수 2억원 이하`,`피해자 상당수 20~30대 청년층`],
  summary:`자본시장연구원이 8일 비아파트 월세시장 안정화와 기관투자자의 역할 보고서를 내고, 전세사기 위험을 줄이려면 기관투자자가 임대주택 공급에 적극 나서야 한다고 제언했다. 보고서는 빌라·오피스텔 전세를 떠난 청년들이 월세시장으로 밀려나는 상황을 지적했다. 전세보증금 의존도가 낮은 기관임대가 늘면 전세사기 위험이 줄 수 있다는 분석이다. 2022년을 기점으로 전세사기 피해가 전국적으로 급증하며 비아파트 임대시장의 구조적 취약성이 드러났다. 피해는 오피스텔·빌라 등 비아파트 유형에 집중됐고, 보증금 2억원 이하 주택에 살던 20~30대 청년층이 상당수였다. 전세 기피와 월세 부담 증가가 동시에 나타나며 청년 주거 안정 문제가 다시 부각되고 있다.`,
  keyTerms:[{term:`전세사기`,explanation:`집주인이 세입자의 전세보증금을 돌려주지 않거나 처음부터 돌려줄 능력 없이 보증금을 가로채는 사기다. 2022년 이후 빌라·오피스텔을 중심으로 청년층 피해가 크게 늘었다.`}],
  history:`한국의 전세 제도는 임차인이 거액의 보증금을 집주인에게 맡기는 독특한 구조다. 2022년 금리 인상과 집값 하락이 겹치며 보증금을 돌려받지 못하는 전세사기가 전국에서 터졌다.`,
  players:`피해를 입은 청년 세입자, 정부·국회(특별법), 자본시장연구원 등 연구기관, 잠재적 기관 임대사업자가 핵심이다.`,
  current:`전세 기피와 월세 부담 증가가 동시에 나타나며 비아파트 임대시장의 체질 개선 필요성이 커진 시점이다.`,
  outlook:`기관투자자 임대 활성화를 위한 제도 정비와 전세사기 특별법 후속 조치가 관전 포인트다.`,
  sources:[{title:`전세는 무섭고 월세는 비싸고…기관투자자, 임대주택 역할 맡을까 - 뉴스핌`,url:`https://www.newspim.com/news/view/20260608000649`},{title:`전세사기 피해주택 매입 월 단위 최다 - 한인뉴스`,url:`https://www.koreancenter.or.kr/news/articleView.html?idxno=1335281`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`즈베레프, 프랑스오픈 우승…생애 첫 그랜드슬램 타이틀 거머쥐다`,
  metrics:[`생애 첫 그랜드슬램 단식 우승`,`2026 프랑스오픈(롤랑가로스) 남자 단식 정상`],
  summary:`독일의 알렉산더 즈베레프가 7일(현지시간) 프랑스오픈(롤랑가로스) 남자 단식에서 우승하며 생애 첫 그랜드슬램 타이틀을 차지했다. 즈베레프는 오랜 기간 세계 정상권에 머물렀지만 메이저 대회 우승과는 좀처럼 인연이 없었는데, 이번에 마침내 한을 풀었다. 그랜드슬램은 호주오픈·프랑스오픈·윔블던·US오픈 등 테니스 4대 메이저 대회를 통칭하는 최고 권위의 무대다. 그는 그동안 결승 문턱에서 여러 차례 좌절했던 만큼 이번 우승의 의미가 크다. 클레이코트 강자로서의 입지도 다시 확인했다. 나달·조코비치 등 거장들의 시대가 저문 뒤 새로운 챔피언 세대의 부상을 상징하는 결과로 평가된다. 다음 메이저 대회인 윔블던에서의 활약에도 관심이 쏠린다.`,
  keyTerms:[{term:`그랜드슬램`,explanation:`테니스에서 가장 권위 있는 4대 메이저 대회(호주·프랑스·윔블던·US오픈)를 통칭하는 말이다. 한 해 4개 대회를 모두 우승하는 것을 뜻하기도 한다.`}],
  history:`즈베레프는 2010년대 후반부터 세계 최상위권에 진입했지만 메이저 우승은 번번이 놓쳐 무관의 강자로 불려왔다. 결승과 4강에서 여러 차례 고배를 마셨다.`,
  players:`우승자 알렉산더 즈베레프(독일)와 그를 막아선 경쟁 선수들, 그리고 세대교체기에 놓인 남자 테니스계가 핵심이다.`,
  current:`거장들이 물러난 뒤 차세대 강자들이 메이저 타이틀을 나눠 갖는 흐름 속에서 나온 의미 있는 우승이다.`,
  outlook:`7월 윔블던 등 남은 메이저 대회에서 즈베레프가 정상권 경쟁을 이어갈지가 관전 포인트다.`,
  sources:[{title:`Alexander Zverev wins the French Open to finally earn a 1st Grand Slam title - NPR`,url:`https://www.npr.org/2026/06/07/g-s1-126803/french-open-2026-alexander-zverev-grand-slam-title`}]
}]

  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`원·달러 환율 1,560원 돌파, 고유가에 5월 물가 3.1%로 반등`,
  metrics:[`원·달러 환율 1,562원(6월 5일 야간시장, 최근 한 달 -7.91%)`,`5월 소비자물가 상승률 3.1%(전월 2.6%)`],
  summary:`원·달러 환율이 6월 5일 장중 1,549원까지 오른 뒤 야간시장에서 1,562원을 기록하며 사실상 1,560원 선을 넘어섰다. 최근 한 달간 원화는 달러 대비 약 7.91% 약세를 보였는데, 이는 중동발 고유가와 안전자산 선호가 겹친 결과다. 한국은 원유를 거의 전량 수입하기 때문에 국제유가 상승은 곧 수입물가와 생활물가 상승으로 이어진다. 실제로 5월 소비자물가 상승률은 3.1%로 전월(2.6%)보다 0.5%포인트 뛰며 다시 3%대로 올라섰다. 이런 고환율은 수입 원자재 가격을 끌어올려 기업 비용과 가계 부담을 동시에 키운다. 한국은행 기준금리는 2.50%에서 유지되고 있어, 물가와 환율이 함께 흔들리면 통화당국의 운신 폭이 좁아진다. 환율 방어를 위해 금리를 올리면 내수와 부동산이 눌리고, 경기를 위해 내리면 환율이 더 튀는 딜레마 상황이다. 당국은 외환시장 변동성 확대에 구두개입과 미세조정으로 대응하고 있다.`,
  keyTerms:[{term:`고환율`,explanation:`원화 가치가 크게 떨어져 같은 1달러를 사는 데 더 많은 원화가 드는 상태다. 수입 물건값이 비싸져 국내 물가를 끌어올리는 부작용이 있다.`}],
  history:`2025년 하반기부터 미국의 고금리 장기화와 한국의 경기 둔화가 겹치며 원화 약세가 시작됐다. 2026년 들어 중동 분쟁으로 국제유가가 급등하자 무역수지가 악화되며 환율 상승 압력이 더 커졌다. 원자재 수입 비중이 높은 한국 경제 구조상 유가와 환율은 물가에 직접 전이된다.`,
  players:`한국은행은 물가와 환율, 경기 사이에서 기준금리 2.50%를 유지하며 균형을 잡으려 한다. 기획재정부와 외환당국은 시장 안정조치로 변동성을 관리한다. 수출 대기업은 환율 상승의 수혜를, 정유·항공·수입업체와 일반 가계는 비용 상승의 직격탄을 맞는다.`,
  current:`환율이 심리적 저항선인 1,560원을 넘기며 외환위기 이후 가장 높은 수준 부근까지 올라온 점이 분기점이다. 물가까지 3%대로 반등해 한은의 금리 인하 기대가 후퇴하고 있다.`,
  outlook:`6월 한국은행 금융통화위원회의 금리 결정과 중동 정세에 따른 유가 흐름이 최대 변수다. 환율이 추가 급등하면 당국의 실개입 가능성이 커진다.`,
  sources:[{title:`대한민국 원 - 가격·차트·뉴스 - Trading Economics`,url:`https://ko.tradingeconomics.com/south-korea/currency`},{title:`2026 원·달러 환율 전망 - KB의 생각`,url:`https://kbthink.com/investment/issues/2026-krw-usd-outlook.html`},{title:`한국은행 기준금리 동결, 2026 금리 일정 - 토스뱅크`,url:`https://www.tossbank.com/articles/baserate2601`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`이란발 호르무즈 재봉쇄 위협에 브렌트유 95달러 육박, 에너지 변동성 재점화`,
  metrics:[`브렌트유 배럴당 94.98달러(6월 1일, 4% 이상 급등)`,`전쟁 개시(2월 28일) 이후 유가 +30% 이상`],
  summary:`국제유가 기준물인 브렌트유가 6월 초 하루 4% 넘게 뛰며 배럴당 94.98달러까지 올라 다시 100달러를 위협하고 있다. 5월 말 미국·이란 휴전 협상 기대로 고점 대비 20% 가까이 빠졌던 유가가 단기간에 방향을 되돌린 것이다. 트럼프 대통령이 이란과의 협상 결렬도 개의치 않는다는 강경 발언을 내놓자, 이란 국영매체는 호르무즈 해협을 완전 봉쇄하겠다고 맞받았다. 호르무즈 해협은 전 세계 원유 물동량의 약 20%가 지나는 길목이라, 봉쇄 위협만으로도 시장이 출렁인다. 2월 28일 전쟁 발발 이후 유가는 30% 넘게 올라 한때 배럴당 126달러까지 치솟았다. 골드만삭스는 4분기 브렌트유를 90달러로 보면서도 공급 차질 시 상방, 수요 둔화 시 하방의 양방향 위험을 경고했다. 유가 급등은 전 세계 인플레이션과 성장에 동시에 충격을 주는 변수다. 현재 시장은 휴전 합의의 지속 가능성에 베팅과 회의가 엇갈리며 높은 변동성을 보이고 있다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`이란과 아라비아반도 사이의 좁은 바닷길로, 전 세계 원유의 약 20%가 이곳을 통해 운송된다. 이란이 봉쇄하면 원유 공급이 막혀 유가가 급등한다.`}],
  history:`2026년 2월 28일 미국·이스라엘 주도의 대이란 전쟁이 시작되며 중동 정세가 급격히 악화됐다. 3월 8일 브렌트유는 4년 만에 100달러를 넘겼고 두바이유는 한때 166달러로 사상 최고를 기록했다. 이란의 호르무즈 봉쇄는 IEA가 사상 최대 공급 차질이라 부를 만큼 시장을 뒤흔들었다.`,
  players:`미국과 이스라엘은 이란의 핵·군사 능력 억제를 목표로 압박을 이어간다. 이란은 호르무즈 봉쇄를 최대 보복 카드로 활용한다. 한국·일본 등 원유 수입국과 산유국 OPEC+, 글로벌 투자은행들이 가격 향방에 촉각을 세운다.`,
  current:`5월 말 휴전 양해각서로 진정됐던 유가가 협상 중단 위협으로 재차 튀면서, 휴전의 취약성이 그대로 드러난 시점이다. 봉쇄 위협이 현실화하면 1970년대식 에너지 위기 재연 우려가 있다.`,
  outlook:`미·이란 핵협상 재개 여부와 호르무즈 실제 봉쇄 여부가 단기 유가를 가른다. 60일 휴전 양해각서의 만료·연장 시점이 다음 분수령이다.`,
  sources:[{title:`Oil jumps more than 4% as Trump says he doesn't care if Iran negotiations are over - CNBC`,url:`https://www.cnbc.com/2026/06/01/oil-prices-wti-brent-crude-israel-lebanon-hezbollah-iran-trump-us.html`},{title:`Economic impact of the 2026 Iran war - Wikipedia`,url:`https://en.wikipedia.org/wiki/Economic_impact_of_the_2026_Iran_war`},{title:`Oil drops 20% from 2026 peak on optimism over U.S.-Iran ceasefire talks - CNBC`,url:`https://www.cnbc.com/2026/05/29/oil-prices-iran-ceasefire-us-trump-strait-hormuz-energy-costs.html`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미국 근원물가 3.3%로 2023년 10월 이후 최고, 유가가 물가로 전이 시작`,
  metrics:[`4월 근원물가 전년대비 3.3%(2023년 10월 이후 최고)`,`S&P500 기업 85% 어닝 서프라이즈, 순이익률 14.8% 사상 최고`],
  summary:`미국의 근원물가가 4월 전년 동월 대비 3.3% 올라 2023년 10월 이후 가장 높은 상승률을 기록했다. 에너지를 뺀 근원물가가 뛰었다는 것은, 고유가가 다른 상품·서비스 가격으로 번지기 시작했다는 신호로 해석된다. 반면 기업 실적은 견조해, S&P500 기업의 85%가 주당순이익(EPS) 전망치를 웃돌며 2021년 2분기 이후 최고 비율을 보였다. 팩트셋 기준 분기 순이익률은 14.8%로 집계 이래 사상 최고치를 찍었다. 다만 지수 상승은 기술주에 쏠려 기술 섹터가 19.76% 급등한 반면 에너지(-5.63%)와 유틸리티(-5.19%) 등 8개 섹터는 하락했다. 신흥국 증시는 MSCI 신흥국지수가 연초 이후 23.76% 오르며 선진국을 앞섰다. 물가가 다시 끈적해지면 미 연준의 금리 인하 시점이 미뤄질 수 있어 시장의 관심이 집중된다. 인플레이션과 호실적이 공존하는 가운데 투자자들은 연준의 다음 행보를 주시하고 있다.`,
  keyTerms:[{term:`근원물가`,explanation:`변동이 심한 식품과 에너지 가격을 뺀 물가지표다. 일시적 충격을 걸러내 물가의 기조적 흐름을 보여주기 때문에 중앙은행이 금리를 정할 때 중시한다.`}],
  history:`미국은 2022년 고인플레이션 이후 금리를 빠르게 올렸다가 2024~2025년 물가가 잡히며 인하 기대가 커졌다. 그러나 2026년 중동발 유가 급등이 물가를 다시 자극하기 시작했다. 에너지가 근원물가로 전이되는지가 연준 정책의 핵심 변수로 떠올랐다.`,
  players:`미 연방준비제도(Fed)는 물가와 고용 사이에서 금리 경로를 저울질한다. 기술 대형주는 실적과 AI 기대로 증시를 떠받치고, 신흥국 증시는 자금 유입으로 강세다. 투자자들은 인플레이션 지표 하나하나에 민감하게 반응한다.`,
  current:`근원물가가 1년 반 만에 최고치로 올라서며 디스인플레이션 추세가 흔들린 점이 분기점이다. 실적은 좋지만 물가 부담이 커져 연준의 인하 기대가 후퇴하고 있다.`,
  outlook:`다음 소비자물가지수(CPI) 발표와 연준 회의에서의 금리 신호가 최대 관심사다. 유가가 추가 상승하면 물가 전이 우려가 더 커진다.`,
  sources:[{title:`Market Commentary - June 2026 - James Investment`,url:`https://www.jamesinvestment.com/market-commentary/june-2026/`},{title:`Weekly Global Economic Update - Deloitte Insights`,url:`https://www.deloitte.com/us/en/insights/topics/economy/global-economic-outlook/weekly-update.html`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`6·3 지방선거 민주당 광역 12곳 압승 속, 서울은 오세훈이 지켜내`,
  metrics:[`광역단체장 16곳 중 민주당 12곳·국민의힘 4곳`,`서울시의회 민주당 3분의 2 이상 확보`],
  summary:`6월 3일 치러진 제9회 전국동시지방선거에서 더불어민주당이 광역단체장 16곳 중 12곳을 차지하며 사실상 압승했다. 국민의힘은 서울·대구·경북·경남 4곳에서만 승리해 지방권력 지형이 4년 만에 다시 뒤집혔다. 최대 승부처였던 서울에서는 국민의힘 오세훈 후보가 막판 역전에 성공해 5선 시장이 됐다. 다만 같은 서울에서 시의회는 민주당이 3분의 2 이상을 가져가며, 오 시장은 임기 내내 의회와의 긴장 관계를 안게 됐다. 민주당 정청래 대표는 전국 압승에도 서울 탈환에 실패한 점을 아쉬워했다. 일부 서울·인천 투표소에서는 예상보다 많은 유권자가 몰려 투표용지가 부족해 투표가 일시 지연되는 일도 빚어졌다. 이번 결과로 오 시장은 차기 대권주자로서 입지를 다진 반면, 여권은 지방 기반 약화라는 숙제를 안게 됐다. 향후 중앙정부와 지방정부 간 정책 조율이 정국의 변수로 떠올랐다.`,
  keyTerms:[{term:`전국동시지방선거`,explanation:`전국의 광역·기초 단체장과 지방의회 의원을 같은 날 한꺼번에 뽑는 선거다. 4년마다 열리며 정부와 여당에 대한 중간평가 성격을 띤다.`}],
  history:`지방선거는 1995년 부활 이후 4년마다 치러지며 집권세력에 대한 중간평가로 기능해 왔다. 직전 선거에서 국민의힘이 다수 지역을 차지했으나 이번에 민주당이 대거 탈환했다. 고물가·고환율 등 민생 불안이 표심에 영향을 미친 것으로 분석된다.`,
  players:`더불어민주당은 광역 12곳을 석권하며 지방권력을 되찾았고, 국민의힘은 서울 사수로 체면을 지켰다. 오세훈 서울시장은 대권 잠룡으로 부상했고, 정청래 민주당 대표는 서울 패배라는 과제를 안았다. 중앙선거관리위원회는 투표용지 부족 논란으로 도마에 올랐다.`,
  current:`여소야대 지방권력 구도가 형성되며 중앙정부 국정운영에 부담이 커진 점이 분기점이다. 서울은 단체장과 의회의 소속 정당이 갈려 갈등이 예상된다.`,
  outlook:`당선자들의 6월 말 취임과 함께 지방정부 인선·예산 협상이 시작된다. 투표용지 부족 사태에 대한 선관위 책임 공방도 이어질 전망이다.`,
  sources:[{title:`민주당, 시도지사 16곳 중 12곳 우세 압승 - YTN`,url:`https://www.ytn.co.kr/_ln/0101_202606040642459730`},{title:`오세훈 대역전, 민주 12곳·국힘 4곳 승리 - MBC`,url:`https://imnews.imbc.com/replay/2026/nw1400/article/6827731_36974.html`},{title:`2026 지방선거 결과 분석과 향후 전망 - CODIT Insights`,url:`https://thecodit.com/blog/2026-local-elections-kr`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이란, 협상 중단·호르무즈 봉쇄 위협… 60일 휴전 양해각서 흔들`,
  metrics:[`미·이란 60일 휴전 양해각서 체결(5월 말)`,`전쟁 개시 2월 28일 이후 약 100일 경과`],
  summary:`2월 말 시작된 미국·이스라엘과 이란 간 전쟁이 5월 말 60일 휴전 양해각서로 잠시 멈추는 듯했으나, 6월 들어 다시 흔들리고 있다. 이란 국영매체는 이스라엘의 레바논 공격에 대응해 미국과의 협상을 중단하겠다고 밝혔다. 트럼프 대통령은 이란과의 협상이 끝나도 상관없다는 강경 입장을 내놓으며 압박 수위를 높였다. 이에 이란은 핵협상 카드와 함께 호르무즈 해협 완전 봉쇄라는 최후 보복 수단을 다시 꺼내 들었다. 양측은 휴전 기간 동안 이란 핵프로그램에 대한 협상을 시작하기로 했지만, 합의의 지속 가능성에는 의문이 커지고 있다. 휴전이 깨지면 중동 전역의 군사 충돌과 글로벌 에너지·금융시장 충격이 재연될 위험이 있다. 미국 백악관은 새 국가안보전략을 통해 강경 기조를 분명히 했다. 국제사회는 휴전 양해각서의 이행 여부를 숨죽이며 지켜보고 있다.`,
  keyTerms:[{term:`휴전 양해각서`,explanation:`전쟁을 일정 기간 멈추기로 양측이 문서로 약속한 잠정 합의다. 정식 평화협정은 아니어서 언제든 깨질 수 있는 임시 조치다.`}],
  history:`2026년 2월 28일 미국·이스라엘 주도의 대이란 전쟁이 발발하며 중동이 다시 전면 충돌 국면에 들어섰다. 이란의 호르무즈 봉쇄로 유가가 급등하고 글로벌 채권시장까지 매도세에 휩싸였다. 수개월의 공방 끝에 5월 말 60일 휴전 양해각서가 가까스로 마련됐다.`,
  players:`미국과 이스라엘은 이란 핵·군사력 억제를 목표로 하고, 이란은 협상 중단과 호르무즈 봉쇄로 맞선다. 레바논 헤즈볼라 등 친이란 세력도 충돌의 변수다. 미국 백악관의 새 국가안보전략이 강경 기조를 뒷받침한다.`,
  current:`휴전 양해각서 체결 직후 이스라엘의 레바논 공격과 트럼프의 강경 발언으로 합의가 곧바로 시험대에 오른 점이 분기점이다. 핵협상 중단 위협이 휴전 붕괴 우려를 키운다.`,
  outlook:`60일 휴전 기간 내 핵협상 재개 여부가 전쟁 재발의 분기점이 된다. 이란의 호르무즈 봉쇄 실행 여부가 다음 핵심 변수다.`,
  sources:[{title:`Oil prices: U.S. strikes in Iran revive fear over Strait of Hormuz - CNBC`,url:`https://www.cnbc.com/2026/05/28/oil-prices-us-strikes-in-iran-revive-strait-of-hormuz-turmoil-fears.html`},{title:`Economic impact of the 2026 Iran war - Wikipedia`,url:`https://en.wikipedia.org/wiki/Economic_impact_of_the_2026_Iran_war`},{title:`Oil jumps as Trump escalates on Iran - CNBC`,url:`https://www.cnbc.com/2026/06/01/oil-prices-wti-brent-crude-israel-lebanon-hezbollah-iran-trump-us.html`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`아르메니아 총선 6월 7일 실시, 강대국 영향력 다툼 속 분수령`,
  metrics:[`2026년 6월 7일 아르메니아 의회 총선 실시`,`선거 대상 국회 의석 전원 교체`],
  summary:`옛 소련권 국가 아르메니아에서 6월 7일 의회 총선이 치러졌다. 이번 선거는 아르메니아 국가 역사에서 분수령으로 평가되며, 향후 정권의 외교 노선을 결정짓는 중대 분기점으로 꼽힌다. 여러 강대국이 대리세력과 허위정보를 동원해 선거에 영향력을 행사하려 한다는 우려가 제기됐다. 아르메니아는 전통적 후견국 러시아와 거리를 두고 서방·유럽연합(EU)과 가까워지려는 흐름과, 기존 친러 노선 유지 사이에서 진로를 놓고 갈등해 왔다. 인접국 아제르바이잔과의 영토 분쟁 역사도 선거의 핵심 쟁점이다. 이번 총선 결과에 따라 아르메니아의 서방 경사 또는 회귀 여부가 가려진다. 코카서스 지역의 세력 균형에도 직접적인 영향을 미칠 사안이다. 개표 결과와 새 정부 구성 과정에 국제사회의 시선이 쏠리고 있다.`,
  keyTerms:[{term:`총선`,explanation:`한 나라의 국회의원 전체를 새로 뽑는 선거다. 의회에서 다수를 차지한 정당이 정부 운영의 주도권을 갖기 때문에 국정 방향을 좌우한다.`}],
  history:`아르메니아는 1991년 소련 해체 후 독립했으나 러시아의 안보 우산 아래 있었다. 아제르바이잔과의 나고르노카라바흐 분쟁에서 영토를 잃은 뒤 친러 노선에 대한 회의가 커졌다. 이후 정부는 서방·EU와의 관계 강화로 방향을 틀어 왔다.`,
  players:`현 집권세력은 서방 경사 노선을 추진하고, 친러 야권은 기존 동맹 유지를 내세운다. 러시아·EU·미국·튀르키예·아제르바이잔 등 주변 강대국이 결과에 이해관계를 갖는다. 유권자들은 안보와 경제 진로를 놓고 표로 답했다.`,
  current:`강대국 개입 의혹 속에 치러진 이번 총선이 아르메니아의 외교 좌표를 결정짓는 시점이라는 점에서 분기점이다. 코카서스 정세 전반에 파장이 예상된다.`,
  outlook:`개표 결과 확정과 연립정부 구성 협상이 향후 정국을 가른다. 아제르바이잔과의 평화협상 진척 여부도 함께 주목된다.`,
  sources:[{title:`Armenia between a historic summit and a crucial election - commonspace.eu`,url:`https://www.commonspace.eu/event/links-europe-webinar-armenia-between-historic-summit-and-crucial-election`},{title:`2026 in politics - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_in_politics`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`AI 기본법 시행 후 의료·금융 적용 확산, 한국 AI 규율 본격화`,
  metrics:[`AI 기본법 2026년 1월 22일 시행(가이드라인 5종 확정)`,`AI 반도체 수출, 2026년 실질성장률 +0.7%포인트 기여 추정`],
  summary:`한국은 1월 22일 인공지능 발전과 신뢰 기반 조성 등에 관한 기본법(AI 기본법)을 시행한 뒤, 의료·금융 등 실생활 영역으로 AI 적용이 빠르게 번지고 있다. 시행과 함께 시행령과 5종의 가이드라인이 확정·공개돼 기업이 따라야 할 기준이 마련됐다. 특히 의료·금융·채용처럼 국민 삶에 직접 영향을 주는 고영향 분야에는 더 엄격한 규율이 요구된다. 빅테크들의 잇단 헬스케어 진출로 진단 보조와 영상 판독에 AI가 빠르게 들어오면서, 안전성과 책임 소재가 핵심 쟁점으로 떠올랐다. 정부는 AI 행동계획 2026을 통해 산업 육성과 신뢰 확보를 동시에 추진하고 있다. 한국은행은 AI 반도체 수출 호조가 2026년 실질성장률을 0.7%포인트 끌어올릴 것으로 추정했다. 다만 조선·철강·석유화학 등 다른 산업은 고유가 부담에 어려움을 겪고 있다. AI를 둘러싼 규율과 성장의 균형이 한국 경제의 새 과제로 부상했다.`,
  keyTerms:[{term:`AI 기본법`,explanation:`인공지능 산업을 키우면서 안전성과 신뢰를 확보하기 위해 만든 한국의 기본 법률이다. 의료·금융처럼 영향이 큰 분야에 더 엄격한 의무를 부과한다.`}],
  history:`AI 기술이 급속히 확산되자 각국은 규율 마련에 나섰고, 한국도 수년간의 논의 끝에 AI 기본법을 제정했다. 2026년 1월 22일 법이 시행되며 시행령과 가이드라인이 함께 공개됐다. 의료·금융 등 고영향 분야의 사고 우려가 입법의 배경이 됐다.`,
  players:`과학기술정보통신부 등 정부는 산업 육성과 규율의 균형을 잡으려 한다. 오픈AI·앤트로픽·엔비디아 등 빅테크가 헬스케어 시장을 공략한다. 병원·금융사와 이용자, 그리고 한국은행 등 경제당국이 이해관계자다.`,
  current:`법 시행 반년이 지나며 실제 의료·금융 현장에 AI가 적용되기 시작한 점이 분기점이다. AI 반도체 수출이 성장을 떠받치는 동시에 규율 정비가 시험대에 올랐다.`,
  outlook:`가이드라인의 현장 적용 사례와 고영향 분야 인증·감독 체계 정비가 관전 포인트다. AI 반도체 수출 흐름이 하반기 성장률을 좌우한다.`,
  sources:[{title:`대한민국 AI 행동계획 2026 대시보드`,url:`https://aikorea.go.kr/web/board/brdDetail.do?menu_cd=000011&num=328`},{title:`의료 AI, 오픈AI·앤트로픽·엔비디아가 헬스케어를 바꾸는 방법 - KB의 생각`,url:`https://kbthink.com/life/daily/ai-in-healthcare.html`},{title:`과학기술·AI로 여는 대한민국 대도약 - 사이언스타임즈`,url:`https://www.sciencetimes.co.kr/`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`엔비디아, AI PC용 신칩 공개… 인텔·AMD·퀄컴 주가 동반 급락`,
  metrics:[`RTX Spark 칩 6월 1일 공개, 소비자 노트북 가을 출시 예정`,`신규 데이터센터용 Vera CPU 고객사에 앤트로픽·오픈AI 포함`],
  summary:`엔비디아가 6월 1일 대만 컴퓨텍스에서 PC에 AI를 직접 심는 신형 칩 RTX Spark를 공개했다. 젠슨 황 CEO는 이 칩이 PC를 재발명할 것이라며, AI 에이전트·게임·콘텐츠 제작을 한 기기에서 처리한다고 강조했다. 마이크로소프트와 3년간 협력한 결과물로, 이를 탑재한 소비자용 노트북은 올가을 출시될 예정이다. 동시에 공개된 데이터센터용 Vera CPU는 본격 양산에 들어갔으며, 초기 고객사로 앤트로픽·오픈AI 등이 이름을 올렸다. 엔비디아가 칩 전 영역으로 사업을 넓히자 시장은 이를 존립을 위협하는 신호로 받아들였다. 발표 직후 AMD·인텔·퀄컴 주가가 일제히 하락했다. 엔비디아는 PC부터 데이터센터까지 AI PC와 AI 인프라의 모든 층위를 장악하려는 전략을 분명히 했다. AI PC가 새로운 성장 동력으로 부상하면서 반도체 경쟁 구도가 재편되고 있다.`,
  keyTerms:[{term:`AI PC`,explanation:`인터넷 연결 없이도 기기 안에서 직접 AI 기능을 돌릴 수 있도록 전용 칩을 넣은 컴퓨터다. 처리 속도가 빠르고 개인정보 보호에 유리하다.`}],
  history:`AI 붐 속에서 엔비디아는 데이터센터용 GPU 시장을 사실상 독점하며 급성장했다. 최근에는 데이터센터를 넘어 개인용 PC와 CPU로 영역을 확장해 왔다. 마이크로소프트와의 장기 협력이 AI PC 칩의 토대가 됐다.`,
  players:`엔비디아는 칩 전 영역 장악을 노리고, 인텔·AMD·퀄컴은 기존 PC·CPU 시장을 방어해야 한다. 앤트로픽·오픈AI 등 AI 기업은 핵심 고객이다. 마이크로소프트는 운영체제 측 파트너로 협력한다.`,
  current:`엔비디아가 PC와 데이터센터를 아우르는 신칩을 동시에 내놓으며 경쟁사 주가가 급락한 점이 분기점이다. AI 에이전트 수요가 칩 시장 판도를 바꾸고 있다.`,
  outlook:`올가을 RTX Spark 탑재 노트북 출시와 시장 반응이 관전 포인트다. 경쟁사의 대응 신제품과 Vera CPU 채택 확대 여부가 다음 변수다.`,
  sources:[{title:`Nvidia Says Anthropic, OpenAI Among Users of New Vera Chip - Bloomberg`,url:`https://www.bloomberg.com/news/articles/2026-06-01/nvidia-says-anthropic-openai-among-big-users-of-new-vera-chip`},{title:`Nvidia's new PC chips are CEO Huang's bid to own every part of AI stack - CNBC`,url:`https://www.cnbc.com/2026/06/02/nvidias-new-pc-chips-are-ceos-bid-to-own-every-part-of-ai-stack.html`},{title:`Nvidia unveils new chip to bring AI directly to personal computers - Al Jazeera`,url:`https://www.aljazeera.com/economy/2026/6/1/nvidia-unveils-new-chip-to-bring-ai-directly-to-personal-computers`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`교황 레오 14세 마드리드 성체축일 미사에 120만 인파… 15년 만의 방문`,
  metrics:[`마드리드 시벨레스 광장에 120만 명 운집`,`행렬 구간 600m, 꽃양탄자 16개·카네이션 3만 송이`],
  summary:`교황 레오 14세가 6월 7일 스페인 마드리드 시벨레스 광장에서 가톨릭 성체축일(코르푸스 크리스티) 미사와 행렬을 집전했다. 무려 120만 명의 인파가 광장에 운집해 교황을 맞이했다. 6월 6일부터 12일까지 이어지는 이번 사도 방문은 교황의 본토 스페인 첫 방문이자 교황의 스페인 방문으로는 15년 만이다. 미사 후 교황은 황금 성광을 들고 카네이션 3만여 송이로 만든 16개의 꽃양탄자 위를 걸으며 600m 행렬을 이끌었다. 교황은 스페인의 수백 년 신앙 전통이 둘러보는 과거의 박물관이 아니라 오늘날에도 배울 수 있는 신앙의 학교가 돼야 한다고 강조했다. 이번 순방은 스페인 펠리페 6세 국왕과 교회의 초청으로 성사됐다. 교황은 마드리드에 이어 카나리아 제도까지 7일간 일정을 이어간다. 세속화가 진행된 유럽에서 가톨릭 신앙의 활력을 보여준 행사로 평가된다.`,
  keyTerms:[{term:`사도 방문`,explanation:`교황이 신앙 공동체를 격려하고 사목하기 위해 다른 나라를 공식 방문하는 것을 말한다. 단순 외교가 아니라 종교적·목회적 목적이 중심이다.`}],
  history:`교황의 스페인 방문은 15년 만으로, 직전 방문 이후 유럽의 세속화가 가속되며 가톨릭의 위상이 위축돼 왔다. 레오 14세는 즉위 후 신앙 재활성화를 강조해 왔다. 성체축일은 성체 안의 예수 현존을 기리는 가톨릭 주요 축일이다.`,
  players:`교황 레오 14세가 행사를 주도하고, 펠리페 6세 국왕과 스페인 교회가 초청·주관했다. 마드리드 시민과 전 세계 가톨릭 신자가 참여했다. 세속화 흐름 속 유럽 교회가 이해관계자다.`,
  current:`유럽 본토에서 120만 인파가 모인 대규모 미사가 열려 가톨릭의 결집력을 보여준 점이 주목된다. 교황이 전통의 현재적 의미를 강조한 메시지도 화제다.`,
  outlook:`교황은 마드리드 일정 후 카나리아 제도 방문으로 순방을 이어간다. 12일까지 이어질 방문에서 추가 메시지와 회동이 예정돼 있다.`,
  sources:[{title:`1 million people flood Madrid streets to see the pope's flower-carpeted procession - NPR`,url:`https://www.npr.org/2026/06/07/nx-s1-5849147/1-million-flood-madrid-streets-pope-procession`},{title:`2026 visit by Pope Leo XIV to Spain - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_visit_by_Pope_Leo_XIV_to_Spain`},{title:`Pope Leo XIV in Madrid: Corpus Christi must not become museum of the past - National Catholic Register`,url:`https://www.ncregister.com/cna/pope-leo-xiv-in-madrid-corpus-christi-must-not-become-museum-of-the-past`}]
}]

  tag:`2026-06-07`,
  label:`2026년 6월 7일 (일요일)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`원-달러 야간 1,562원·원-유로 17년 만에 1,800원 돌파…한은은 기준금리 2.50% 동결`,
  metrics:[`원-달러 야간시장 1,562.47원`,`5월 소비자물가 3.1% (전월 2.6%)`],
  summary:`6월 5일 원-달러 환율이 정규장에서 장중 1,549원까지 올랐다가 진정됐지만 야간시장에서 다시 급등해 1,562.47원을 기록했다. 원-유로 환율도 야간시장에서 치솟아 2009년 3월 이후 17년 만에 1,800원을 넘어섰다. 중동 전쟁과 국제유가 급등이 수입 물가를 끌어올리면서 5월 소비자물가 상승률은 3.1%로 전월(2.6%)보다 0.5%p 뛰었다. 이런 원화 약세 흐름 속에서 한국은행 금융통화위원회는 기준금리를 현재의 2.50%로 동결했다. 물가가 다시 들썩이는 상황에서 금리를 내리면 환율과 물가를 더 자극할 수 있어 한은이 신중하게 움직인 것으로 풀이된다. 5월 말 외환보유액은 4,269.9억달러로 한 달 전보다 8.8억달러 줄었다. 고환율과 고물가가 동시에 진행되는 부담스러운 국면이다. 당분간 중동 정세와 미국 금리 흐름이 환율의 최대 변수가 될 전망이다.`,
  keyTerms:[{term:`원화 약세`,explanation:`원화의 가치가 외국 돈(달러·유로)에 비해 떨어져 환율이 오르는 것을 말한다. 같은 물건을 사도 더 많은 원화를 내야 해서 수입 물가가 오르고 물가 전반이 들썩일 수 있다.`}],
  history:`2025년 하반기부터 미국의 고금리 장기화와 한국의 경기 둔화가 겹치면서 원화 가치가 흔들리기 시작했다. 2026년 들어 중동에서 미국-이란 전쟁이 터지고 국제유가가 급등하면서 에너지를 수입에 의존하는 한국의 원화는 더 빠르게 약해졌다. 환율은 심리적 저항선으로 여겨지던 1,500원을 차례로 넘어섰다.`,
  players:`통화 가치와 금리를 결정하는 한국은행, 외환시장 안정을 책임지는 기획재정부가 핵심 당사자다. 환율이 오르면 수출 기업은 유리하지만 원자재를 수입하는 기업과 물가를 부담하는 소비자는 불리하다. 미국 연방준비제도(Fed)의 금리 결정도 원-달러 환율에 직접 영향을 준다.`,
  current:`물가가 다시 3%대로 올라선 가운데 환율까지 사상 최고 수준으로 치솟아 한은의 통화정책 운신 폭이 크게 좁아졌다. 금리를 내리지도 올리지도 못하는 진퇴양난 국면이라는 점에서 분기점이다.`,
  outlook:`다음 금융통화위원회 회의와 6월 미국 Fed 회의 결과가 환율 향방을 가를 분수령이다. 중동 정세가 진정돼 유가가 안정되는지가 물가와 환율의 동시 진정 여부를 좌우할 전망이다.`,
  sources:[{title:`2026년 외환시장 전망 - 하나은행`,url:`https://biz.kebhana.com/cont/hanafx/file/2026FX.pdf`},{title:`한국은행 - Bank of Korea`,url:`https://www.bok.or.kr/portal/main/main.do`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미 5월 고용 17.2만 깜짝 증가에 국채금리 급등…Fed 6월 회의서 신임 의장 데뷔`,
  metrics:[`5월 비농업 고용 17.2만 (예상의 약 2배)`,`10년물 국채금리 4.54%, 실업률 4.3%`],
  summary:`미국의 5월 비농업 고용이 17만2천 건 늘어 시장 예상의 약 2배를 기록했고, 3~4월 수치도 상향 조정됐다. 실업률은 4.3%로 유지돼 전쟁발 인플레이션과 약한 소비심리에도 노동시장이 견조하다는 점을 보여줬다. 그러나 증시는 호재를 악재로 받아들이는 모습을 보였다. 경기가 너무 뜨거우면 Fed가 금리를 더 오래 높게 유지할 수 있다는 우려에 10년물 국채금리가 4.54%로 뛰었기 때문이다. 금리가 오르면 기업 자금 조달 비용과 주식의 상대적 매력이 나빠져 주가에 부담이 된다. 시장의 관심은 6월 17일 Fed 회의로 쏠려 있는데, 케빈 워시 신임 의장이 처음으로 회의를 주재한다. Fed는 여전히 올해 한 차례 인하를 예상하지만 시장은 인하가 없을 것으로 보고 있다. 새 의장의 화법에 시장이 적응하는 과정에서 변동성이 커질 수 있다.`,
  keyTerms:[{term:`10년물 국채금리`,explanation:`미국 정부가 10년간 돈을 빌리며 주는 이자율로, 시장 금리의 기준점 역할을 한다. 이 금리가 오르면 대출·기업 자금 비용이 함께 올라 주식 같은 위험자산에는 악재가 된다.`}],
  history:`2026년 미국-이란 전쟁으로 유가가 치솟으며 물가가 다시 자극받자 Fed의 금리 인하 기대가 후퇴했다. 시장은 노동시장이 식어 금리 인하 명분이 생기길 기대해 왔지만 고용은 오히려 강하게 나왔다. 강한 고용이 금리 인하를 늦출 수 있다는 점에서 시장에는 부담이 됐다.`,
  players:`통화정책을 결정하는 Fed와 새로 부임한 케빈 워시 의장이 핵심이다. 채권 투자자, 주식 투자자, 대출을 받는 기업과 가계가 금리 향방에 직접 영향을 받는다. 백악관도 금리 수준을 두고 Fed에 압박을 가해 왔다.`,
  current:`강한 고용 지표와 높은 국채금리가 겹치면서 위험자산 투자심리가 흔들리는 국면이다. 신임 의장의 첫 회의를 앞두고 정책 방향에 대한 불확실성이 최고조다.`,
  outlook:`6월 17일 Fed 회의에서 발표될 새 경제 전망과 점도표가 향후 금리 경로를 가늠할 핵심 이벤트다. 워시 의장의 발언 톤이 매파적인지 비둘기파적인지가 시장 변동성을 좌우할 전망이다.`,
  sources:[{title:`Stock Market Update - Schwab`,url:`https://www.schwab.com/learn/story/stock-market-update-open`},{title:`Stock market news for June 2026 - CNBC`,url:`https://www.cnbc.com/2026/06/01/stock-market-today-live-updates.html`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`호르무즈 봉쇄 장기화에 국제유가 고공행진…브렌트 100달러대 고착`,
  metrics:[`브렌트유 4월 고점 배럴당 138달러`,`세계 원유 약 20% 통과하는 호르무즈 봉쇄`],
  summary:`미국-이란 전쟁으로 호르무즈 해협이 사실상 봉쇄되면서 국제유가가 고공행진을 이어가고 있다. 전 세계 원유 교역의 약 20%가 지나는 길목이 막히자 공급 차질 우려가 커졌다. 브렌트유는 4월 7일 배럴당 138달러까지 치솟았고 4월 평균은 117달러를 기록했다. 이후 거래량이 줄며 일부 진정돼 5~6월 평균은 약 106달러 수준으로 예상되지만, 전쟁 이전과 비교하면 여전히 크게 높은 가격이다. 2분기 세계 원유 재고는 하루 평균 850만 배럴씩 줄어들 것으로 전망된다. 호르무즈 통항은 5월 말까지 사실상 막혔다가 6월 들어 조금씩 회복되고 있으나, 전쟁 이전 수준으로 돌아가는 데는 시간이 더 걸릴 전망이다. 고유가는 한국을 포함한 수입국의 물가와 무역수지에 직접적인 타격을 준다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`페르시아만과 외해를 잇는 좁은 바닷길로, 전 세계 원유의 약 20%가 이곳을 지나는 핵심 길목이다. 이 길이 막히면 기름이 제때 운송되지 못해 국제유가가 급등한다.`}],
  history:`2026년 봄 미국-이스라엘 연합과 이란의 전쟁이 격화되면서 이란이 호르무즈 해협을 통한 운송을 막기 시작했다. 4월 말 유가는 4년 만의 최고치인 126달러대를 찍었고, 세계적 연료 위기로 번졌다. 한 좁은 해협의 봉쇄가 전 세계 에너지 시장을 흔드는 구조적 취약점이 드러났다.`,
  players:`이란과 미국-이스라엘 연합이 직접 당사자이고, 산유국 협의체 OPEC, 원유를 수입하는 한국·중국·일본 등 아시아 국가들이 가격 충격을 고스란히 받는다. 미국 에너지정보청(EIA)이 공급과 재고 전망을 발표한다.`,
  current:`6월 들어 통항이 일부 재개되며 가격이 진정 기미를 보이지만, 전쟁 향방에 따라 다시 급등할 수 있어 불안정한 국면이다. 전쟁 장기화 여부가 유가의 최대 변수다.`,
  outlook:`호르무즈 통항이 전쟁 이전 수준을 회복하는 시점과 미국-이란 협상 진전이 유가 안정의 관건이다. 휴전 협상이 결렬되면 유가가 다시 130달러대로 치솟을 위험이 있다.`,
  sources:[{title:`2026 Strait of Hormuz crisis - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_Strait_of_Hormuz_crisis`},{title:`Short-Term Energy Outlook - U.S. EIA`,url:`https://www.eia.gov/outlooks/steo/`},{title:`Oil prices soar on fears of supply disruption - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/4/30/oil-prices-soar-on-fears-of-long-supply-disruption-us-siege-of-iran-ports`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`6·3 지방선거 민주 12 vs 국힘 4…서울은 오세훈이 0.6%p 신승`,
  metrics:[`광역단체장 16곳 중 민주 12·국힘 4`,`서울시장 오세훈 48.94% vs 정원오 48.34%`],
  summary:`6월 3일 치러진 전국동시지방선거에서 더불어민주당이 광역단체장 16곳 중 12곳을 차지하며 지방권력 교체에 성공했다. 국민의힘은 4곳을 지키는 데 그쳤지만 최대 승부처인 서울을 사수했다. 서울시장 선거에서 오세훈 국민의힘 후보는 개표 내내 정원오 민주당 후보에 뒤지다 개표율 93% 무렵 처음 역전해 48.94% 대 48.34%, 0.6%p 차이로 신승했다. 경기지사 선거에서는 추미애 민주당 후보가 승리해 첫 여성 광역단체장에 올랐고, 부산은 전재수 민주당 후보가 박형준 국민의힘 후보를 눌렀다. 대구·경북·경남은 국민의힘이 지켰다. 함께 치러진 국회의원 재보선 14곳에서는 민주당이 원래 갖고 있던 4곳을 내주며 절반의 승리에 그쳤다. 이재명 정부 2년 차 국정 운영의 동력과 야당의 견제력이 동시에 시험대에 오른 결과다.`,
  keyTerms:[{term:`광역단체장`,explanation:`특별시장·광역시장·도지사처럼 넓은 행정구역을 책임지는 자치단체장을 말한다. 지역 살림과 정책을 좌우하는 자리여서 전국 16곳의 승패가 정당의 힘을 가늠하는 기준이 된다.`}],
  history:`2025년 출범한 이재명 정부는 슈퍼 확장 재정과 AI 대전환을 내걸고 국정을 운영해 왔다. 집권 2년 차에 치러지는 지방선거는 정부 중간평가 성격을 띠어 여야 모두 사활을 걸었다. 동시에 국회의원 재보궐선거 14곳도 함께 열렸다.`,
  players:`이재명 대통령과 더불어민주당, 제1야당 국민의힘이 정면으로 맞붙었다. 서울 오세훈, 경기 추미애, 부산 전재수 등 광역단체장 후보들과 대구·경북의 국민의힘 후보들이 주요 인물이다. 유권자의 표심이 정부 정책에 대한 평가로 읽힌다.`,
  current:`민주당이 지방권력 다수를 가져갔지만 서울 패배와 재보선 부진으로 일방적 승리는 아니어서 향후 정국의 분기점이 됐다. 여당은 동력을, 야당은 반등 발판을 동시에 주장할 수 있는 결과다.`,
  outlook:`새로 선출된 광역단체장들의 임기 시작과 함께 정부-지자체 간 정책 협력·갈등 구도가 형성될 전망이다. 재보선 결과가 국회 의석 지형과 향후 입법 동력에 미칠 영향이 관전 포인트다.`,
  sources:[{title:`6·3 지선서 與 지방권력 교체 성공 - 서울신문`,url:`https://www.seoul.co.kr/news/politics/local-election2026/2026/06/04/20260604500103`},{title:`오세훈 대역전, 민주 12곳·국힘 4곳 승리 - MBC`,url:`https://imnews.imbc.com/replay/2026/nw1400/article/6827731_36974.html`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미-이란 전쟁 96일째 확전…미군 케슘섬 공습에 쿠웨이트·바레인까지 불똥`,
  metrics:[`전쟁 96일째 지속`,`쿠웨이트 드론·미사일 요격, 바레인 경보 발령`],
  summary:`미국-이스라엘 연합과 이란의 전쟁이 96일째로 접어들며 걸프 지역 전반으로 확전되고 있다. 미군은 자위권 차원이라며 이란 케슘섬을 공습했고, 이란 매체는 해당 지역의 폭발을 보도했다. 전쟁의 불똥은 주변국으로 튀어 쿠웨이트는 날아오는 드론과 미사일을 방공망으로 요격했다고 밝혔고, 바레인은 경보 사이렌을 울렸다. 이란 외무장관 아바스 아라그치는 이스라엘의 베이루트 공격이 전면전 재개로 이어질 것이라고 경고했다. 트럼프 미국 대통령은 전쟁 종식 합의가 이뤄진다면 이란의 새 최고지도자와 만날 용의가 있다고 밝혔다. 이란은 사실상 호르무즈 해협을 봉쇄해 세계 원유 공급의 상당 부분을 차단한 상태다. 전선이 주변국으로 번지면서 중동 전체의 안보와 글로벌 에너지 시장에 미치는 충격이 커지고 있다.`,
  keyTerms:[{term:`확전`,explanation:`전쟁이 처음 당사국을 넘어 주변 지역이나 다른 나라로 번지며 규모가 커지는 것을 말한다. 쿠웨이트·바레인까지 공격 위협이 미치면서 전쟁이 걸프 전역으로 확대되고 있다는 의미다.`}],
  history:`2026년 봄 미국-이스라엘 연합과 이란 사이에 전쟁이 발발해 수개월째 이어지고 있다. 이란은 호르무즈 해협 봉쇄로 맞섰고 미국은 이란 본토와 도서를 겨냥한 공습으로 대응해 왔다. 협상과 충돌이 번갈아 반복되며 전선이 점차 넓어졌다.`,
  players:`미국과 이스라엘 연합, 이란이 직접 교전 중이며 쿠웨이트·바레인 등 걸프 국가들이 위협에 노출됐다. 트럼프 대통령과 이란 외무장관 아라그치가 협상과 경고를 주고받는 핵심 인물이다. 원유 수입국 전체가 간접 당사자다.`,
  current:`공격이 이란 본토를 넘어 주변국 영공·항만까지 번지면서 국지전이 지역 전쟁으로 비화할 위험이 커진 분기점이다. 협상 가능성과 확전 위협이 동시에 존재한다.`,
  outlook:`트럼프-이란 지도부의 정상급 접촉 성사 여부가 전쟁 종식의 최대 변수다. 베이루트 공격이 현실화되면 전면전으로 번질 수 있어 향후 며칠의 군사 동향이 관건이다.`,
  sources:[{title:`Day 96 of Iran war as US, Iran engage in new attacks - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/6/3/whats-happening-on-day-96-of-iran-war-as-us-iran-engage-in-new-attacks`},{title:`June 4, 2026 - Uncertainty surrounds US-Iran talks - CNN`,url:`https://www.cnn.com/2026/06/04/world/live-news/iran-trump-war-news`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`레바논-이스라엘 휴전안 헤즈볼라 거부…남부서 이스라엘 병사 사망`,
  metrics:[`헤즈볼라 휴전 합의안 거부`,`이스라엘 병사 1명 대전차미사일 피격 사망`],
  summary:`레바논 정부와 이스라엘이 도출한 휴전 합의안을 무장정파 헤즈볼라가 거부하면서 레바논 전선의 긴장이 다시 고조됐다. 트럼프 미국 대통령은 레바논 전투 종식을 위한 진전이 있었다고 주장했지만, 실제 현장에서는 충돌이 이어졌다. 목요일 오후 레바논 남부에서 이스라엘 병사 한 명이 헤즈볼라의 대전차미사일에 맞아 숨졌다. 레바논 정부가 합의한 휴전을 정작 실권을 쥔 헤즈볼라가 받아들이지 않으면서 협상 구도가 꼬였다. 헤즈볼라의 배후로 지목되는 이란은 이스라엘의 베이루트 공격이 전면전 재개로 이어질 것이라고 경고한 상태다. 미국-이란 전쟁과 맞물려 레바논 전선이 또 다른 화약고로 떠오르고 있다. 휴전이 무산될 경우 중동 전체의 확전 위험이 한층 커진다.`,
  keyTerms:[{term:`헤즈볼라`,explanation:`레바논에 기반을 둔 이슬람 시아파 무장정파이자 정치세력으로, 이란의 지원을 받는다. 레바논 정부와 별개로 강력한 군사력을 갖고 있어 정부가 휴전에 합의해도 헤즈볼라가 거부하면 전투가 이어진다.`}],
  history:`헤즈볼라는 이스라엘과 오랜 적대 관계 속에 레바논 남부에서 반복적으로 무력 충돌을 벌여왔다. 2026년 미국-이란 전쟁이 격화되면서 이란의 지원을 받는 헤즈볼라도 이스라엘과의 전선에 다시 휘말렸다. 레바논 정부와 이스라엘 사이에 휴전 시도가 이어졌지만 헤즈볼라의 반대로 번번이 가로막혔다.`,
  players:`레바논 정부, 이스라엘, 헤즈볼라, 그리고 헤즈볼라를 지원하는 이란이 핵심 당사자다. 트럼프 미국 대통령이 중재자를 자처하고 있다. 정부와 무장정파의 입장이 엇갈리는 레바논 특유의 이중 권력 구조가 협상을 어렵게 한다.`,
  current:`정부 차원 합의에도 헤즈볼라가 거부하고 실제 교전이 이어지면서 휴전이 좌초될 기로에 섰다. 미국-이란 전쟁과 연동돼 전선이 동시에 불붙을 위험이 커진 분기점이다.`,
  outlook:`이스라엘의 베이루트 공격 여부가 전면전 재개의 도화선이 될 수 있어 최대 관전 포인트다. 헤즈볼라가 협상장에 복귀하는지, 이란이 어떤 신호를 보내는지가 향후 정세를 가른다.`,
  sources:[{title:`June 1, 2026 - Trump insists talks continue - CNN`,url:`https://www.cnn.com/2026/06/01/world/live-news/iran-trump-lebanon-war-news`},{title:`US, Iran trade new attacks amid talks - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/6/1/us-iran-trade-new-attacks-amid-talks-heres-what-we-know`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`엔비디아, AI를 PC 안으로…신규 칩 공개 속 글로벌 기술주 급락`,
  metrics:[`엔비디아 데이터센터용 베라(Vera) CPU 양산 시작`,`6월 5일 S&P500 -2.6%·나스닥 -4.2%`],
  summary:`엔비디아의 젠슨 황 CEO가 데이터센터용 신형 베라(Vera) CPU가 완전 양산에 들어갔으며 오픈AI 등 초기 고객사가 이미 사용 중이라고 밝혔다. 또한 엔비디아의 새 칩이 윈도 노트북과 데스크톱을 구동해 이른바 AI PC 시대를 열 것이라고 발표했다. AI 연산을 클라우드 서버가 아니라 개인 기기 안에서 직접 처리하는 방향으로 기술이 옮겨가고 있다. 하지만 신제품 발표와 별개로 시장은 차갑게 반응했다. 6월 5일 미국 증시에서 기술주 매도가 확대돼 S&P500이 2.6%, 나스닥이 4.2% 급락했고 엔비디아와 브로드컴이 하락을 주도했다. 그동안 AI 기대감으로 과도하게 오른 반도체·기술주에 대한 차익 실현과 고평가 부담이 한꺼번에 터진 것으로 풀이된다. 한국의 삼성전자도 6월 5일 5%대 급락하는 등 글로벌 반도체주가 동반 흔들렸다.`,
  keyTerms:[{term:`AI PC`,explanation:`인공지능 연산을 인터넷 너머 서버가 아니라 개인용 컴퓨터 안에서 직접 처리할 수 있게 만든 PC를 말한다. 빠르고 보안에 유리하지만, 이를 구동하는 전용 칩 시장을 누가 잡느냐가 새 경쟁의 핵심이 된다.`}],
  history:`2023년 생성형 AI 붐 이후 엔비디아는 데이터센터용 AI 칩 시장을 사실상 독점하며 주가가 폭등했다. 2026년 들어 AI는 스스로 판단해 일을 수행하는 에이전틱 AI로 진화하고, 연산을 개인 기기로 끌어내리는 흐름이 가속됐다. 칩 제조사들은 데이터센터를 넘어 PC 시장으로 전장을 넓히고 있다.`,
  players:`엔비디아, 인텔, 브로드컴 등 반도체 기업과 주요 고객사인 오픈AI가 핵심이다. 한국의 삼성전자·SK하이닉스는 AI용 고대역폭 메모리(HBM) 공급으로 직접 연결돼 있다. AI 인프라에 투자한 글로벌 투자자들이 주가 변동에 민감하게 반응한다.`,
  current:`신제품으로 AI 적용 범위는 넓어지고 있지만, 동시에 기술주 고평가 부담이 터지면서 시장이 급락하는 분기점에 섰다. 기대와 거품 우려가 충돌하는 국면이다.`,
  outlook:`AI PC용 칩의 실제 판매 성과와 데이터센터 투자 지속 여부가 반도체주 향방을 가른다. 전력·냉각 등 인프라 확보 능력이 향후 AI 패권 경쟁의 승부처로 떠오르고 있다.`,
  sources:[{title:`Nvidia unveils new chip to bring AI directly to PCs - Al Jazeera`,url:`https://www.aljazeera.com/economy/2026/6/1/nvidia-unveils-new-chip-to-bring-ai-directly-to-personal-computers`},{title:`2026년 6월 반도체 기술 주요 뉴스 요약 - SPTA Times`,url:`https://www.sptatimeskorea.com/post/2026-06-01-tt-01`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`기상청, 올여름 6~8월 평년보다 덥다…바다도 고수온 경고`,
  metrics:[`6~8월 기온 평년 상회 전망`,`해수면 온도 평년보다 높음`],
  summary:`기상청이 올해 6월부터 8월까지 한국의 여름철 기온이 평년보다 높을 것으로 전망했다. 바다 역시 해수면 온도가 평년보다 높을 것으로 예측돼 고수온 현상에 대한 경고가 나왔다. 여름철 폭염이 평년보다 강하고 길어질 수 있다는 의미로, 온열질환과 전력 수요 급증이 우려된다. 특히 해수면 온도가 오르면 양식장 어패류 폐사와 적조 같은 피해가 커질 수 있다. 데워진 바다는 한반도로 다가오는 태풍에 더 많은 에너지를 공급해 강한 태풍 발생 가능성도 높인다. 지구 온난화로 한반도 주변의 평균 기온과 수온이 해마다 상승하는 추세가 이번 전망에도 반영됐다. 정부와 지자체는 폭염 대응 체계와 고수온 양식장 관리 대책을 미리 점검할 필요가 있다.`,
  keyTerms:[{term:`고수온`,explanation:`바닷물 온도가 평년보다 비정상적으로 높게 오르는 현상을 말한다. 양식장 물고기가 떼죽음을 당하거나 적조가 발생하기 쉬워지고, 데워진 바다는 더 강한 태풍을 만들 수 있다.`}],
  history:`한반도 주변 바다의 수온은 지난 수십 년간 지구 평균보다 빠른 속도로 상승해 왔다. 여름철 폭염과 고수온으로 인한 양식장 피해와 온열질환이 해마다 반복되며 사회적 비용이 커졌다. 기상청은 매년 여름을 앞두고 계절 전망을 발표해 대비를 유도한다.`,
  players:`기상청과 해양수산부, 폭염 대응을 맡는 지자체와 보건당국, 그리고 고수온에 직접 노출되는 양식 어민들이 핵심 당사자다. 전력 수요 급증에 대비해야 하는 전력당국도 관련된다. 기후변화라는 큰 배경이 모든 당사자에 영향을 준다.`,
  current:`기온과 수온이 동시에 평년을 웃돌 것으로 전망되면서 폭염과 해양 피해가 겹칠 수 있는 분기점에 섰다. 여름이 시작되기 전 대비책 점검이 시급한 시점이다.`,
  outlook:`실제 6~8월의 폭염 강도와 태풍 발생 빈도가 피해 규모를 가른다. 정부의 폭염·고수온 대응 대책과 전력 수급 관리가 여름철 내내 관건이 될 전망이다.`,
  sources:[{title:`소식 - 기상청 날씨누리`,url:`https://www.weather.go.kr/w/community/news.do`},{title:`보도자료 - 기상청`,url:`https://www.kma.go.kr/kma/news/press_01.jsp?bid=press&mode=view&num=1194653`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`국제 개인정보 감독기구, 생성형 AI 오남용 대응 프라이버시 공동선언 채택`,
  metrics:[`국제 개인정보 감독기구 협의체 공동선언 채택`,`그록 등 생성형 AI 콘텐츠 대상`],
  summary:`전 세계 개인정보 감독기구들이 모인 국제 협의체가 생성형 AI의 오남용에 대응하기 위한 프라이버시 공동선언을 채택했다. 그록(Grok)처럼 사람의 사진과 정보를 활용해 콘텐츠를 만들어내는 AI 서비스가 늘면서, 본인 동의 없이 개인정보가 학습·합성되는 문제가 커진 데 따른 조치다. 공동선언은 AI 개발·운영 기업이 개인정보를 다룰 때 지켜야 할 원칙과 책임을 국제적으로 합의했다는 점에서 의미가 있다. 딥페이크와 무단 합성 이미지로 인한 명예훼손·사기 피해가 세계 곳곳에서 늘고 있는 상황이다. 한국 개인정보보호위원회를 비롯한 각국 기관이 함께 참여했다. 다만 선언 자체는 법적 강제력이 약해 실제 규제로 이어지려면 각국의 후속 입법이 필요하다. AI 기술 발전 속도를 규제가 따라잡을 수 있을지가 과제로 남았다.`,
  keyTerms:[{term:`생성형 AI`,explanation:`글·이미지·영상 등을 사람처럼 새로 만들어내는 인공지능을 말한다. 편리하지만 실제 인물의 사진이나 정보를 동의 없이 학습·합성해 가짜 콘텐츠를 만드는 등 개인정보 침해 위험이 크다.`}],
  history:`생성형 AI가 빠르게 보급되면서 실제 인물을 본뜬 딥페이크와 무단 합성 콘텐츠 피해가 전 세계에서 급증했다. 각국 개인정보 감독기구는 개별 대응의 한계를 느끼고 국제 공조의 필요성을 제기해 왔다. 그 결과 공동선언이라는 형태로 국제적 원칙 합의가 추진됐다.`,
  players:`한국 개인정보보호위원회를 포함한 각국 개인정보 감독기구 협의체가 주체다. 그록을 비롯한 생성형 AI 서비스 기업이 규제 대상이며, 피해를 입는 일반 시민이 보호 대상이다. 기술 기업과 규제 당국의 입장이 충돌하는 지점이 핵심이다.`,
  current:`AI 콘텐츠 오남용이 사회 문제로 부상한 가운데 국제 차원의 첫 공동 대응 원칙이 마련된 분기점이다. 선언을 실질적 규제로 옮길 수 있을지가 시험대다.`,
  outlook:`공동선언을 토대로 각국이 어떤 후속 법제를 마련하는지가 실효성의 관건이다. AI 기업들이 자율 규제와 투명성 강화에 얼마나 협조하는지도 주목할 대목이다.`,
  sources:[{title:`생성형 AI 오남용 대응 프라이버시 공동선언 채택 - 대한민국 정책브리핑`,url:`https://www.korea.kr/briefing/pressReleaseView.do?newsId=156745494`},{title:`2026년 AI와 기술 분야 트렌드 - IBM`,url:`https://www.ibm.com/think/news/ai-tech-trends-predictions-2026`}]
}]

  headline:`원/달러 환율 1,500원대 고착에 한국은행 금리 인상 압박 커진다`,
  metrics:[`원/달러 환율 1,500원대`,`기준금리 2.50% 동결 유지`],
  summary:`원/달러 환율이 1,500원대에 머물면서 한국 금융시장과 실물경제에 부담이 이어지고 있다. 한국은행 금융통화위원회는 지난 5월 28일 기준금리를 2.50%로 동결했지만, 신현송 총재가 환율 쏠림을 용인하지 않겠다고 밝히면서 추가 금리 인상이 사실상 기정사실화되는 분위기다. 일부 시장 참가자들은 연내 기준금리 3% 가능성까지 거론하고 있다. 고환율이 길어지자 국내 시중은행의 달러 예금은 최근 한 달 새 약 26억 달러나 늘어 안전자산 선호 심리를 드러냈다. 미-이란 전쟁에 따른 국제유가 상승이 수입물가를 끌어올리면서 환율과 물가가 동시에 자극받는 구조다. 한국은행은 올해 소비자물가 상승률을 2.7% 안팎으로 전망하고 있어 물가 방어와 경기 부양 사이 딜레마가 깊어지고 있다. 환율 안정과 자본 유출 방어를 위해 금리를 올리면 가계부채와 내수에 부담이 가중되는 상황이다. 결국 한국은행의 다음 금통위 결정이 하반기 경제 흐름을 가르는 분수령이 될 전망이다.`,
  keyTerms:[{term:`고환율`,explanation:`원화 가치가 떨어져 1달러를 사는 데 더 많은 원화가 드는 상태다. 수입 물가가 오르고 외국인 자금이 빠져나갈 위험이 커진다.`}],
  history:`2024년 이후 미국의 고금리 장기화와 달러 강세 흐름 속에 원화 약세가 누적됐다. 2026년 들어 미-이란 전쟁과 국제유가 급등이 겹치면서 원/달러 환율이 1,500원대까지 치솟아 외환위기 이후 가장 높은 수준에 근접했다.`,
  players:`한국은행과 신현송 총재가 금리 결정의 핵심 주체다. 기획재정부는 외환시장 안정을 위한 개입과 정책 공조를 담당하고, 시중은행과 수출입 기업, 외국인 투자자들이 환율 변동의 직접적 이해당사자다. 미국 연방준비제도의 금리 경로도 원화 흐름에 큰 영향을 준다.`,
  current:`환율이 1,500원대에 고착되면서 수입물가와 소비자물가를 동시에 자극해 한국은행의 금리 인상 명분이 강해졌다. 동결과 인상 사이에서 통화당국의 셈법이 가장 복잡해진 시점이다.`,
  outlook:`다음 금융통화위원회 회의에서의 금리 결정과 미-이란 휴전 협상의 진전 여부가 환율 향방을 좌우한다. 국제유가가 추가로 오를 경우 연내 기준금리 3% 시나리오가 현실화될 수 있다.`,
  sources:[{title:`2026년 하반기 환율 전망 - 한국무역협회`,url:`https://www.kita.net/board/totalTradeNews/totalTradeNewsDetail.do?no=101596&siteId=6`},{title:`KDI 경제전망 2026 상반기 - KDI 한국개발연구원`,url:`https://www.kdi.re.kr/research/economy`},{title:`한국은행 - Bank of Korea`,url:`https://www.bok.or.kr/portal/main/main.do`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`반도체 수출 사상 최고 행진…삼성·SK하이닉스 HBM 호조에 시총 사상 최대`,
  metrics:[`반도체 수출 3개월 연속 300억 달러 돌파`,`SK하이닉스 1분기 영업이익 37.6조원(전년比 405%↑)`],
  summary:`한국 경제를 떠받치는 반도체 수출이 사상 최고치 행진을 이어가며 고환율·고유가 충격 속 버팀목 역할을 하고 있다. 지난달 반도체 수출은 3개월 연속 월 300억 달러를 넘어 역대 최고치를 경신했다. AI 데이터센터 투자가 폭발하면서 HBM 수요가 급증한 것이 핵심 동력이다. SK하이닉스는 2026년 1분기 매출 52조 5,763억 원, 영업이익 37조 6,103억 원으로 창사 이래 최대 실적을 올렸고, 영업이익은 전년 동기 대비 405.5% 폭증했다. 삼성전자는 HBM4를 지난 2월 세계 최초로 양산 출하한 데 이어 올해 생산 물량을 모두 솔드아웃시키며 장기 공급계약을 추진 중이다. SK하이닉스의 올해 HBM 매출은 40.5조 원으로 전년 대비 38% 성장하고 시장점유율 50%로 1위를 지킬 전망이다. 다만 소재·장비 공급망 불안과 미-이란 전쟁발 물류 리스크가 변수로 남아 있다. 반도체 호황이 코스피 지수와 삼성전자 시가총액을 끌어올리며 증시 전반에 온기를 불어넣고 있다.`,
  keyTerms:[{term:`HBM`,explanation:`여러 개의 메모리 칩을 위로 쌓아 데이터를 매우 빠르게 주고받게 만든 고성능 메모리다. AI 연산에 필수라 수요가 폭발하고 있다.`}],
  history:`2023년 생성형 AI 붐 이후 AI 학습·추론에 쓰이는 HBM 수요가 급증했다. SK하이닉스가 엔비디아에 HBM을 선제 공급하며 시장을 선점했고, 삼성전자는 2026년 HBM4 양산으로 추격에 나섰다.`,
  players:`SK하이닉스와 삼성전자가 글로벌 HBM 시장의 양대 공급자이며, 최대 고객은 엔비디아를 비롯한 AI 칩·데이터센터 기업이다. 한국 정부는 반도체를 국가 핵심 전략산업으로 두고 세제·인프라를 지원하고 있다.`,
  current:`AI 인프라 투자 경쟁이 격화되면서 HBM이 없어서 못 파는 초호황 국면에 진입했다. 반도체 수출이 한국 전체 수출과 증시를 견인하는 의존도가 더 커진 시점이다.`,
  outlook:`하반기 엔비디아 차세대 플랫폼 양산과 HBM4 공급 계약 규모가 실적의 분수령이다. 소재·장비 공급망 차질과 글로벌 경기 둔화 여부가 호황의 지속성을 가를 변수다.`,
  sources:[{title:`삼성전자, HBM4 올해 물량 완판…장기공급계약 추진 - 뉴스1`,url:`https://www.news1.kr/industry/general-industry/6154059`},{title:`날아가는 반도체 업고 삼성전자 시총 2천조 돌파 - MBC뉴스`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6826849_37004.html`},{title:`2026년 메모리반도체 시장 전망 - 대신증권`,url:`http://money2.daishin.com/PDF/Out/intranet_data/product/researchcenter/report/2026/01/56208_260105_industry_report.pdf`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`글로벌 통화정책 분화…ECB·BOJ는 인상 가닥, 미 연준은 동결 속 증시 사상 최고`,
  metrics:[`ECB·BOJ 금리 인상 확률 80~90%`,`빅테크 4사 2026년 CAPEX 7,000억 달러 이상`],
  summary:`주요국 중앙은행의 통화정책 분화가 6월 글로벌 금융시장의 핵심 변수로 떠올랐다. 스왑시장은 유럽중앙은행(ECB)과 일본은행(BOJ)의 금리 인상 확률을 80~90%로 보는 반면, 미국 연준과 캐나다·호주·스위스 중앙은행은 사실상 금리 변동이 없을 것으로 가격에 반영하고 있다. ECB는 에너지값 상승으로 4월 유로존 물가가 3%까지 올라 2% 목표를 크게 웃돌면서, 경기 둔화를 막으면서도 물가를 잡아야 하는 난제에 직면했다. 이런 정책 분화 속에서도 미국 증시는 5월에 사상 최고치를 경신했다. 미-이란 전쟁과 고유가 불확실성에도 평화협정 기대감과 AI 투자 지속에 대한 낙관이 주가를 떠받쳤다. 아마존·마이크로소프트·구글·메타 등 빅테크 4사만으로 올해 자본지출이 7,000억 달러를 넘을 것으로 전망된다. 다만 일부 전문가들은 시장이 전쟁발 유가 충격에 따른 경기침체 위험을 과소평가하는 잘못된 낙관에 빠져 있다고 경고한다. 중앙은행들의 엇갈린 행보가 환율과 자본 흐름의 변동성을 키우고 있다.`,
  keyTerms:[{term:`통화정책 분화`,explanation:`나라마다 중앙은행이 금리를 올리거나 내리는 방향이 서로 엇갈리는 현상이다. 이 차이 때문에 국가 간 환율과 자금 흐름의 변동성이 커진다.`}],
  history:`2022~2023년 전 세계가 동시에 금리를 올린 긴축 시기를 지나, 2024년 이후 각국 경기와 물가 사정이 갈라지면서 통화정책 방향도 나라별로 달라지기 시작했다. 2026년 미-이란 전쟁발 유가 충격이 이 분화를 더 뚜렷하게 만들었다.`,
  players:`미국 연준, 유럽중앙은행(ECB), 일본은행(BOJ)이 핵심 주체다. ECB는 유로존 물가 3%와 경기 둔화 사이에서, BOJ는 장기 저금리 정상화 과정에서 인상 압박을 받는다. 글로벌 투자자와 빅테크 기업들이 시장 방향을 좌우한다.`,
  current:`물가·성장률이 나라마다 달라 중앙은행들이 정반대 신호를 내면서 환율과 채권시장의 변동성이 커진 국면이다. AI 투자가 증시를 떠받치지만 전쟁 리스크와의 괴리가 커지고 있다.`,
  outlook:`ECB와 BOJ의 다음 통화정책회의에서 실제 인상 여부가 확인되면 달러·엔·유로 환율이 크게 출렁일 수 있다. 미-이란 협상 결과에 따른 유가 흐름이 각국 금리 경로를 다시 흔들 변수다.`,
  sources:[{title:`June 2026 Market Update: Markets Climb Despite Middle East Conflict - BSG`,url:`https://www.bsgfs.co.uk/post/monthly-market-update-june-2026`},{title:`Global markets weekly update - T. Rowe Price`,url:`https://www.troweprice.com/personal-investing/resources/insights/global-markets-weekly-update.html`},{title:`The international role of the euro, June 2026 - ECB`,url:`https://www.ecb.europa.eu/press/other-publications/ire/html/ecb.ire202606.en.html`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`6·3 지방선거 결과 확정…서울은 오세훈, 경기는 추미애 첫 여성 광역단체장`,
  metrics:[`경기지사 추미애 15.67%p차 승리`,`서울 구청장 25곳 중 민주당 17곳 석권`],
  summary:`제9회 전국동시지방선거 개표가 마무리되며 여야가 핵심 광역단체장을 나눠 가진 결과가 확정됐다. 서울시장 선거에서는 국민의힘 오세훈 후보가 더불어민주당 정원오 후보를 49.08% 득표율로 역전승하며 시장직을 지켰다. 반면 경기도지사 선거에서는 민주당 추미애 후보가 국민의힘 양향자 후보를 15.67%포인트 차로 누르고 당선돼 헌정사상 첫 여성 광역단체장이라는 기록을 세웠다. 기초단체에서는 민주당이 서울 구청장 25곳 중 17곳을 휩쓸며 서울 자치 권력을 탈환했다. 부산·대구·강원·전북 등은 막판까지 접전 지역으로 분류됐다. 이번 선거는 이재명 정부 출범 1년에 대한 중간평가 성격이 짙어 향후 국정 동력에 직접 영향을 줄 전망이다. 다만 일부 투표소의 투표용지 부족 사태가 선거 막판 변수로 떠올라 결과의 정당성을 둘러싼 논란도 함께 불거졌다. 여야는 곧바로 차기 대선과 입법 주도권을 겨냥한 정국 주도권 경쟁에 돌입했다.`,
  keyTerms:[{term:`광역단체장`,explanation:`시·도 단위 지방정부를 이끄는 시장과 도지사를 말한다. 한 지역의 예산과 정책을 총괄해 사실상 작은 대통령으로 불린다.`}],
  history:`전국동시지방선거는 4년마다 시·도지사, 시장·군수·구청장, 지방의원을 한꺼번에 뽑는 선거다. 2026년 6월 3일 치러진 제9회 선거는 이재명 정부 출범 약 1년 만에 열려 정부 중간평가 성격을 띠었다.`,
  players:`집권 더불어민주당과 제1야당 국민의힘이 광역·기초단체장을 놓고 정면 대결했다. 오세훈 서울시장과 추미애 경기지사 당선인이 차기 대권 잠룡으로 부상했고, 이재명 대통령의 국정 운영도 결과의 직접 영향권에 있다.`,
  current:`수도권 핵심 지역이 여야로 갈리고 기초단체는 민주당이 우위를 보이면서 향후 정국 주도권 다툼이 격화될 분기점이 됐다. 투표용지 부족 사태가 결과 신뢰성 논란으로 번지고 있다.`,
  outlook:`당선인들의 취임과 함께 지역 현안 정책이 본격화되고, 여야는 후반기 국회 입법 주도권과 차기 대선 구도를 놓고 충돌할 전망이다. 접전지 재검표·소송 가능성도 변수다.`,
  sources:[{title:`6.3 지방선거 개표 속속…여야 성적표는? - YTN`,url:`https://www.ytn.co.kr/_ln/0101_202606032332578964`},{title:`당선 결과 — 6·3 지방선거 2026 - 뉴탐사`,url:`https://election2026.newtamsa.org/result/`},{title:`제9회 전국동시지방선거 - 나무위키`,url:`https://namu.wiki/w/%EC%A0%9C9%ED%9A%8C%20%EC%A0%84%EA%B5%AD%EB%8F%99%EC%8B%9C%EC%A7%80%EB%B0%A9%EC%84%A0%EA%B1%B0`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`투표용지 부족 사태에 노태악 선관위원장 사퇴…여야 국정조사 합의`,
  metrics:[`투표용지 부족 투표소 50곳`,`투표 일시 중단 22곳`],
  summary:`6·3 지방선거 당일 일부 투표소에서 벌어진 투표용지 부족 사태로 노태악 중앙선거관리위원장이 5일 책임을 지고 사퇴했다. 노 위원장은 경기 과천 중앙선관위 청사에서 대국민 사과를 통해 모든 사태에 대한 책임을 통감한다며 위원장직에서 물러나겠다고 밝혔고, 허철훈 사무총장도 함께 사의를 표명했다. 투표용지 부족 사태는 서울 송파·강남·광진구 등에서 용지가 동나 유권자들이 장시간 대기하면서 불거졌다. 조사 결과 실제 용지가 부족했던 투표소는 송파 14곳을 포함해 모두 50곳이었고, 이 중 22곳에서는 투표가 일시 중단됐다 재개됐다. 이재명 대통령도 수석보좌관 회의에서 깊은 유감을 표명했다. 여야는 국회 차원의 국정조사를 실시하는 데 의견을 모았다. 비상임·겸임 형태의 선관위원장 제도가 도마에 오르며 선관위 쇄신 요구가 커지고 있다. 초유의 선거 행정 참사로 유권자 참정권 침해 논란과 함께 제도 개편 논의가 본격화될 전망이다.`,
  keyTerms:[{term:`국정조사`,explanation:`국회가 특정 사건이나 정책의 진상을 밝히기 위해 직접 조사하는 활동이다. 관련자를 불러 따지고 자료를 받아 책임 소재를 가린다.`}],
  history:`중앙선거관리위원회는 선거 관리를 책임지는 헌법기관으로, 위원장은 관례상 대법관이 비상임으로 겸임해왔다. 2026년 6월 3일 지방선거에서 일부 투표소 용지가 부족해 투표가 중단되는 초유의 사태가 발생했다.`,
  players:`노태악 중앙선관위원장과 허철훈 사무총장이 사퇴로 책임을 졌고, 이재명 대통령이 유감을 표명했다. 더불어민주당과 국민의힘 등 여야가 국정조사에 합의했으며, 참정권을 침해당한 유권자들이 직접 당사자다.`,
  current:`선거 결과 자체의 신뢰성 논란으로 번질 수 있는 사안이라 정치적 파장이 크다. 비상임·겸임 위원장 제도의 구조적 한계가 드러나며 제도 개편 압박이 정점에 이른 시점이다.`,
  outlook:`국회 국정조사 일정과 범위 확정, 선관위 후임 인선과 조직 쇄신안이 다음 관전 포인트다. 접전지에서 재검표나 선거 무효 소송이 제기될 경우 파장이 더 커질 수 있다.`,
  sources:[{title:`노태악 선관위원장 사퇴…투표용지 사태 책임 통감 - 서울경제`,url:`https://www.sedaily.com/article/20052298`},{title:`투표지 사태 질타 쏟아진 선관위, 끝내 수장 사퇴 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202606051858042450`},{title:`한국 여야, 6.3 지방선거 투표용지 사태 국정조사 의견 일치 - VOA`,url:`https://www.voakorea.com/a/now-in-korea-060526/8157698.html`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미-이란 종전 합의에 국제유가 4%대 급락·글로벌 증시 급등`,
  metrics:[`WTI 4.8% 하락 배럴당 80.75달러`,`브렌트유 4.7% 하락 83.17달러`],
  summary:`미국과 이란이 6월 15일 전쟁을 끝내고 호르무즈 해협을 다시 여는 합의에 도달하면서 국제 금융시장이 크게 출렁였다. 서부텍사스산원유(WTI)는 4.8% 하락한 배럴당 80.75달러, 브렌트유는 4.7% 내린 83.17달러로 마감해 전쟁 발발 직후인 3월 첫째 주 이후 최저치를 기록했다. 호르무즈 해협 봉쇄 위협이 걷히자 위험선호 심리가 살아나며 글로벌 증시는 일제히 급등했다. 합의에는 미 해군의 이란 항구 봉쇄 해제와 60일 휴전, 핵 협상 재개가 담겼다. 공식 서명식은 금요일 스위스에서 열릴 예정이다. 다만 분석가들은 생산 정상화에 수개월이 걸려 휘발유 가격이 전쟁 이전 수준으로 돌아오는 것은 2027년에야 가능하다고 본다. 유가 안정은 인플레이션 압력을 낮춰 17일 연준 회의의 부담을 덜어줄 변수로 꼽힌다. 산유국들이 휴전 지속을 확신하기 전까지 증산을 미룰 수 있다는 점은 변수다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`세계 원유 해상 수송의 약 20%가 지나는 페르시아만의 핵심 길목이다. 이란이 봉쇄 위협을 가하면 유가가 급등하기 때문에 글로벌 에너지 시장의 최대 변수로 꼽힌다.`}],
  history:`2026년 봄 미국과 이스라엘, 이란의 군사 충돌이 격화되며 이란이 호르무즈 해협 봉쇄를 위협해 유가가 급등했다. 에너지 충격은 세계 물가를 다시 끌어올리는 핵심 원인이 됐다. 이후 수개월간 휴전 협상이 진통을 겪었다.`,
  players:`미국과 이란이 합의 당사자이며 중재국과 산유국, 글로벌 에너지 시장이 직접 영향을 받는다. 트럼프 행정부는 유가 안정과 외교 성과를, 이란은 제재 완화와 봉쇄 해제를 노린다.`,
  current:`60일 휴전과 봉쇄 해제로 유가가 급락하며 시장 불안이 빠르게 진정되는 전환점에 들어섰다.`,
  outlook:`금요일 스위스 서명식 성사 여부와 60일간의 핵·제재 협상 진행이 유가와 증시 방향을 좌우한다.`,
  sources:[{title:`Stock markets soar, oil falls as US-Iran confirm deal to end war - Al Jazeera`,url:`https://www.aljazeera.com/economy/2026/6/15/stock-markets-soar-oil-falls-as-us-iran-confirm-deal-to-end-war`},{title:`Oil prices fall on US, Iran deal announcement - Axios`,url:`https://www.axios.com/2026/06/14/oil-prices-us-iran-war-hormuz-strait-peace-deal`},{title:`Oil prices fall on Iran peace deal, but may not go much lower - NBC News`,url:`https://www.nbcnews.com/business/markets/oil-prices-iran-deal-hormuz-doubts-rcna350087`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미-이란 종전 양해각서 합의…호르무즈 봉쇄 해제·60일간 핵·제재 협상 돌입`,
  metrics:[`60일 휴전 합의`,`금요일 스위스 공식 서명식 예정`],
  summary:`미국과 이란이 6월 중순 직접 적대행위를 끝내는 양해각서(MOU)에 합의하며 수개월간 이어진 전쟁이 종식 국면에 들어섰다. 이 합의는 호르무즈 해협 재개방, 미 해군의 이란 항구 봉쇄 해제, 60일간의 휴전을 담았다. 휴전 기간에는 이란의 핵 프로그램과 농축 우라늄 재고, 제재 완화, 관련 현안을 추가로 협의한다. 공식 서명식은 금요일 스위스에서 열릴 예정이다. 합의가 발표되자 국제유가가 급락하고 글로벌 증시가 급등하는 등 시장이 즉각 반응했다. 다만 핵 협상과 제재 해제 등 핵심 쟁점이 60일 안에 타결될지는 불확실하다. 휴전이 깨질 경우 호르무즈 해협을 둘러싼 긴장이 재연될 수 있다는 우려도 남아 있다.`,
  keyTerms:[{term:`양해각서(MOU)`,explanation:`정식 조약에 앞서 당사자들이 합의한 큰 틀과 의사를 문서로 확인하는 예비 합의다. 법적 구속력은 약하지만 후속 협상의 토대가 된다.`}],
  history:`이란 핵 프로그램을 둘러싼 갈등은 2018년 미국의 핵합의(JCPOA) 탈퇴 이후 격화됐다. 2026년 봄 군사 충돌로 비화하면서 이란이 호르무즈 해협 봉쇄를 위협하고 미국은 해상 봉쇄로 맞섰다. 인명·경제 피해가 커지며 종전 협상 압박이 거세졌다.`,
  players:`미국과 이란이 당사자이며 중재국과 유럽, 주변 산유국이 이해관계자다. 트럼프 행정부는 외교 성과와 유가 안정을, 이란은 봉쇄 해제와 제재 완화를 노린다. 이스라엘의 입장도 변수다.`,
  current:`60일 휴전과 봉쇄 해제 합의로 전면전이 멈추면서 외교 국면으로 전환되는 분수령에 섰다.`,
  outlook:`금요일 스위스 서명식 성사와 60일간의 핵·제재 협상 진전 여부가 휴전의 지속성을 결정한다.`,
  sources:[{title:`US fuel prices to take months to normalise after US-Iran deal - Al Jazeera`,url:`https://www.aljazeera.com/economy/2026/6/16/us-fuel-prices-to-take-months-to-normalise-after-us-iran-deal-to-end-war`},{title:`Oil prices fall on US, Iran deal announcement - Axios`,url:`https://www.axios.com/2026/06/14/oil-prices-us-iran-war-hormuz-strait-peace-deal`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`8년 만에 여당으로 치른 지방선거 후폭풍…올림픽공원 부정선거 시위 12일째 경찰 대치`,
  metrics:[`제9회 전국동시지방선거 6월 3일 실시`,`올림픽공원 앞 시위 봉쇄 12일째`],
  summary:`6월 3일 치러진 제9회 전국동시지방선거는 더불어민주당이 8년 만에 여당 신분으로 맞은 첫 지방선거였다. 이번 선거는 광역·기초단체장과 지방의원을 한꺼번에 뽑았고, 일부 지역 국회의원 재보궐선거도 동시에 실시됐다. 선거 결과에 불복한 일부 단체는 부정선거 의혹을 제기하며 서울 송파구 올림픽공원 핸드볼경기장 앞에서 시위를 이어갔다. 6월 16일에는 봉쇄 12일째를 맞아 경찰이 진입을 시도하며 시위대와 대치했다. 시위대는 부정선거를 외치며 강하게 반발했고 현장 긴장이 고조됐다. 이재명 정부 2년차 국정 운영에 대한 중간평가 성격을 띤 선거였던 만큼 후폭풍이 정국에 미칠 영향이 주목된다. 경찰과 시위대의 충돌이 장기화될지 여부가 변수다.`,
  keyTerms:[{term:`전국동시지방선거`,explanation:`전국의 광역·기초단체장과 지방의원을 같은 날 한꺼번에 뽑는 선거다. 4년마다 열리며 임기 중반 정권에 대한 중간평가 성격을 띤다.`}],
  history:`지방선거는 1995년 부활 이후 4년마다 실시돼 왔다. 2026년 6월 3일 제9회 선거는 2025년 출범한 이재명 정부의 첫 전국 단위 선거였다. 민주당이 여당으로 치른 첫 지방선거라는 점에서 의미가 컸다.`,
  players:`더불어민주당과 국민의힘 등 주요 정당, 당선·낙선자, 선거관리위원회, 시위 단체와 경찰이 얽혀 있다. 여당은 국정 동력을, 야당과 불복 단체는 결과의 정당성을 두고 맞서고 있다.`,
  current:`선거 후 부정선거 의혹 시위가 12일째 이어지며 경찰과의 물리적 대치로 번진 점이 새로운 국면이다.`,
  outlook:`시위 장기화와 경찰 대응, 선관위의 의혹 해명, 당선인들의 취임과 정책 추진이 향후 관전 포인트다.`,
  sources:[{title:`2026 South Korean local elections - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_South_Korean_local_elections`},{title:`올림픽공원 시위 현장영상 - MBC뉴스`,url:`https://imnews.imbc.com/news/2026/society/article/6830559_36918.html`},{title:`제9회 전국동시지방선거 - 위키백과`,url:`https://ko.wikipedia.org/wiki/제9회_전국동시지방선거`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`G7 정상회의서 우크라이나 전쟁 의제 재부상…이란 사태에 밀렸던 지원 논의 재개`,
  metrics:[`G7 정상회의 개최`,`우크라이나 의제 트럼프 안건으로 재상정`],
  summary:`주요 7개국(G7) 정상회의에서 미국의 동맹국들이 그동안 이란 사태에 가려졌던 우크라이나 전쟁을 다시 핵심 의제로 끌어올렸다. 미-이란 충돌이 국제 외교의 초점을 흡수하면서 우크라이나 지원 논의가 한동안 뒷전으로 밀려 있었다. 동맹국들은 트럼프 대통령의 의제에 우크라이나 문제를 다시 올려놓으려 압박하고 있다. 러시아의 침공이 장기화된 가운데 군사·재정 지원과 종전 외교의 방향이 핵심 쟁점으로 떠올랐다. 우크라이나의 유럽연합(EU) 가입 절차도 배경 변수로 거론된다. G7 내부에서는 대러 제재와 지원 규모를 둘러싼 이견이 여전히 존재한다. 이번 회의 결과가 향후 서방의 우크라이나 정책 방향을 가늠하는 잣대가 될 전망이다.`,
  keyTerms:[{term:`G7`,explanation:`미국·일본·독일·영국·프랑스·이탈리아·캐나다 7개 주요 선진국 협의체다. 세계 경제·안보 현안을 조율하는 서방 진영의 핵심 회의다.`}],
  history:`러시아는 2022년 우크라이나를 침공했고 전쟁이 수년째 이어지고 있다. G7은 그동안 대러 제재와 우크라이나 지원을 주도해 왔다. 2026년 미-이란 전쟁이 터지면서 국제 외교의 초점이 중동으로 이동했다.`,
  players:`G7 회원국과 우크라이나, 러시아, 유럽연합이 핵심 행위자다. 트럼프 행정부의 입장과 유럽 동맹국의 지원 의지가 변수이며, 우크라이나는 지속적 군사·재정 지원을 절실히 요구한다.`,
  current:`이란 사태가 진정 국면에 들어서면서 우크라이나 전쟁이 다시 정상회의 전면에 부각된 점이 전환점이다.`,
  outlook:`G7의 지원 합의 수준과 대러 제재 강화 여부, 우크라이나 EU 가입 진전이 다음 관전 포인트다.`,
  sources:[{title:`U.S. and World News Headlines - NPR`,url:`https://www.npr.org/sections/news/`},{title:`Latest breaking news - Euronews`,url:`https://www.euronews.com/`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`AI 반도체 수요 폭발 지속…엔비디아 차세대 베라 루빈 앞세워 시장 주도`,
  metrics:[`엔비디아 AI칩 매출 2026년 1조 달러 전망`,`베라 루빈 추론 성능·와트당 효율 10배 향상`],
  summary:`인공지능(AI) 반도체 수요가 폭발하며 산업 지형이 빠르게 재편되고 있다. 엔비디아는 3월 GTC 2026에서 차세대 가속기 베라 루빈을 공개했는데, 에이전트 AI 시대를 겨냥해 추론 처리량과 와트당 성능을 10배 높이고 토큰당 비용을 10분의 1로 낮췄다. 6월 16일 뉴욕 증시 개장 전 거래에서는 반도체주가 일제히 강세를 보여 웨스턴디지털이 7%, 퀄컴이 3% 올랐다. 월가는 마이크론의 HBM 성장, 퀄컴의 AI 사업 확대, 스토리지 수요 회복 등을 들어 AI 중심의 업황 개선이 유효하다고 본다. 엔비디아는 내년까지 AI칩 매출 1조 달러를 전망하고 있다. AMD도 추론 전용 칩으로 엔비디아의 독주에 도전장을 냈다. 다만 투자자들은 17일 FOMC 결과를 주시하며 신중한 흐름을 보이고 있다.`,
  keyTerms:[{term:`에이전트 AI`,explanation:`사람의 지시 없이 스스로 작업을 계획하고 도구를 써서 실행하는 자율형 AI다. 단순 응답을 넘어 연속적인 추론과 행동을 수행해 연산 수요를 크게 늘린다.`}],
  history:`AI 붐은 2023년 생성형 AI 확산과 함께 본격화됐고, 엔비디아가 GPU 시장을 장악하며 반도체 산업의 중심에 섰다. 이후 학습용 칩 수요가 폭증했고, 최근에는 추론과 에이전트 AI로 수요가 확대되고 있다. HBM 등 고대역폭 메모리도 핵심 부품으로 부상했다.`,
  players:`엔비디아가 시장을 주도하는 가운데 AMD가 추격하고, 마이크론·SK하이닉스 등 메모리 업체와 퀄컴·웨스턴디지털 등이 가세한다. 빅테크들은 막대한 데이터센터 투자를 이어가고 있다.`,
  current:`에이전트 AI 확산으로 추론 연산 수요가 급증하며 차세대 칩 경쟁이 새로운 국면에 진입했다.`,
  outlook:`베라 루빈의 양산·공급 시점, 빅테크 데이터센터 투자 규모, AMD 등 경쟁사의 추격 속도가 관전 포인트다.`,
  sources:[{title:`뉴욕 반도체주 프리뷰…웨스턴디지털 7%·퀄컴 3% - 뉴스핌`,url:`https://www.newspim.com/news/view/20260616001216`},{title:`엔비디아, 추론 전용 칩·새 CPU 공개 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202603171824060673`},{title:`엔비디아 AI 반도체 칩 대거 공개 - 전자신문`,url:`https://www.etnews.com/20260317000314`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`안민석 경기교육감 당선인, 취임 1호 정책으로 스마트폰 프리스쿨 검토`,
  metrics:[`취임 1호 정책 검토`,`경기교육감 당선`],
  summary:`6월 16일 안민석 경기도교육감 당선인이 취임 1호 정책으로 스마트폰 프리스쿨 도입을 검토하고 있다고 밝혔다. 학교 안에서 학생의 스마트폰 사용을 제한하거나 없애 학습 집중도와 정서에 미치는 부정적 영향을 줄이겠다는 취지다. 청소년 디지털 과의존과 수업 방해 문제가 사회적 화두로 떠오른 가운데 나온 정책 구상이다. 경기도교육청은 국내 최대 규모 교육청으로, 정책이 도입되면 전국 교육 현장에 미칠 파급력이 크다. 학생 인권과 교육 효과를 둘러싼 찬반 논쟁도 예상된다. 안 당선인은 6월 3일 지방선거에서 교육감으로 당선됐다. 구체적 시행 방식과 적용 범위는 취임 이후 확정될 전망이다. 다른 시도 교육청의 동향에도 관심이 쏠린다.`,
  keyTerms:[{term:`스마트폰 프리스쿨`,explanation:`학교에서 학생의 스마트폰 사용을 제한하거나 없애 학습과 정서에 미치는 영향을 줄이려는 정책이다. 디지털 과의존 우려 속에 도입 논의가 확산되고 있다.`}],
  history:`스마트폰 보급 확대로 청소년의 디지털 과의존과 수업 집중도 저하가 꾸준히 문제로 지적돼 왔다. 일부 국가와 학교는 교내 스마트폰 사용 금지 정책을 도입했다. 국내에서도 관련 논의가 이어져 왔다.`,
  players:`경기도교육청과 안민석 당선인, 학생·학부모·교사가 핵심 이해관계자다. 교육 효과를 기대하는 측과 학생 인권·자율성을 우려하는 측이 맞선다. 타 시도 교육청의 동향도 영향을 미친다.`,
  current:`국내 최대 교육청의 신임 교육감이 1호 정책으로 내세우면서 전국적 정책 의제로 부상했다.`,
  outlook:`취임 이후 구체적 시행안 발표와 학교 현장 반응, 다른 교육청으로의 확산 여부가 관전 포인트다.`,
  sources:[{title:`안민석 경기교육감 당선인 스마트폰 프리스쿨 검토 - MBC뉴스`,url:`https://imnews.imbc.com/news/2026/society/article/6830559_36918.html`},{title:`사회 뉴스 - 경향신문`,url:`https://www.khan.co.kr/`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`오픈AI 추론모델, 환자 진단·관리서 숙련 의사 능가…국제학술지 사이언스 게재`,
  metrics:[`하버드의대·BIDMC 공동 연구`,`JP모건 2026 기술예산 약 198억 달러`],
  summary:`미국 하버드의대와 베스이스라엘디코니스 메디컬센터(BIDMC) 연구진이 국제학술지 사이언스에 발표한 연구에서, 오픈AI의 추론 모델이 숙련된 의사보다 환자 진단과 치료 관리에서 더 나은 성과를 냈다고 밝혔다. AI가 단순 정보 검색을 넘어 전문직의 핵심 판단 영역까지 파고들고 있음을 보여주는 사례다. 같은 시기 JP모건체이스는 AI 투자를 실험적 연구개발에서 핵심 인프라로 재분류하고 2026년 기술예산 약 198억 달러와 AI 전담 인력 2000명을 배정했다. 금융·의료 등 보수적인 산업까지 AI를 핵심 자산으로 받아들이는 흐름이 뚜렷해지고 있다. 다만 의료 현장 적용에는 진단 오류 책임과 신뢰성, 환자 안전 문제가 과제로 남는다. 규제와 검증 체계 마련이 함께 요구된다. AI의 전문직 대체 논쟁도 다시 불붙을 전망이다.`,
  keyTerms:[{term:`추론 모델`,explanation:`답을 내기 전에 단계별로 생각하는 과정을 거치도록 설계된 AI 모델이다. 복잡한 의학적 판단처럼 논리적 추론이 필요한 문제에서 성능이 높다.`}],
  history:`생성형 AI는 2023년 이후 빠르게 발전했고, 최근에는 답을 내기 전 단계적으로 사고하는 추론 모델이 등장하며 성능이 크게 향상됐다. 의료 분야에서도 진단 보조 AI 연구가 활발히 진행돼 왔다. 전문직 영역에서의 AI 활용 논의가 본격화되고 있다.`,
  players:`오픈AI 등 AI 개발사와 하버드의대·BIDMC 연구진, JP모건 등 도입 기업이 핵심이다. 의료진과 환자, 규제 당국은 신뢰성과 책임 문제를 두고 입장이 갈린다.`,
  current:`AI가 의사를 능가한다는 연구가 권위 있는 학술지에 실리면서 전문직 영역의 AI 활용 논쟁이 새로운 단계로 접어들었다.`,
  outlook:`의료 AI에 대한 규제·검증 체계 마련, 임상 현장 적용 확대 여부, 추가 연구 결과가 향후 변수다.`,
  sources:[{title:`Latest AI News and Breakthroughs That Matter Most - Crescendo AI`,url:`https://www.crescendo.ai/news/latest-ai-news-and-updates`},{title:`U.S. and World News Headlines - NPR`,url:`https://www.npr.org/sections/news/`}]
}]

  label:`2026년 6월 16일 (화)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미·이란 종전 합의 기대에 코스피 5% 넘게 급등하고 원·달러 환율 1500원대로 진정`,
  metrics:[`코스피 전 거래일 대비 456.20포인트(+5.62%) 상승, 8579.82`,`원·달러 환율 1504.0원까지 하락(전일 대비 약 8원↓)`],
  summary:`6월 15일 코스피가 장 초반 5%를 넘게 뛰며 8500선을 회복했다. 오전 9시27분 기준 코스피는 전 거래일보다 456.20포인트(5.62%) 오른 8579.82를 기록했고, 급등세에 매수 사이드카까지 발동됐다. 서울 외환시장에서 원·달러 환율은 전일 종가보다 8.4원 내린 1511.4원에 출발한 뒤 오전 9시7분 1504.0원까지 떨어졌다. 미국과 이란이 종전 합의에 근접했다는 소식에 지정학 리스크가 완화되면서 위험자산 선호 심리가 되살아난 결과다. 그동안 한국 증시는 중동 전쟁과 고유가, 환율 급등이라는 삼중 부담에 짓눌려 있었다. 한국은행은 지난달 수정경제전망에서 미·이란 협상이 타결되고 호르무즈 해협 통항이 재개되면 한국 경제에 긍정적 영향을 줄 것으로 내다본 바 있다. 다만 합의가 최종 서명까지 이어질지는 여전히 불확실해 변동성 확대 가능성은 남아 있다.`,
  keyTerms:[{term:`매수 사이드카`,explanation:`주가가 너무 빠르게 오를 때 프로그램 매수 주문을 5분간 잠시 멈추게 하는 안전장치다. 급등으로 인한 시장 혼란을 막기 위한 조치다.`}],
  history:`한국 증시는 2026년 2월 말 미국·이스라엘의 이란 공격 이후 중동 전쟁과 호르무즈 해협 통항 차질로 고유가·고환율 충격을 받아왔다. 환율은 한때 1500원대 중반까지 치솟으며 수입물가 부담을 키웠다. 고금리까지 겹치며 투자·소비 심리가 위축됐다.`,
  players:`한국은행은 환율과 물가 안정을 위해 통화정책 운용에 고심해 왔고, 정부는 확장재정으로 경기 위축을 일부 상쇄해 왔다. 외국인 투자자와 기관은 지정학 리스크 향방에 따라 매매 방향을 급격히 바꿔 왔다. 수출 의존도가 높은 한국 경제 특성상 유가와 환율은 핵심 변수다.`,
  current:`미·이란 종전 합의 기대가 현실화되면서 그동안 눌려 있던 위험자산 선호가 한꺼번에 분출했다. 유가와 환율이 동반 안정되면 물가와 무역수지에도 숨통이 트인다.`,
  outlook:`6월 19일로 예정된 미·이란 양해각서 서명 여부가 증시 추가 방향을 좌우할 전망이다. 합의가 무산되면 다시 급격한 되돌림이 나타날 수 있어 주의가 필요하다.`,
  sources:[{title:`코스피, 종전 합의에 5%대 급등…매수 사이드카 발동 - 이투데이`,url:`https://www.etoday.co.kr/news/view/2593542`},{title:`전쟁 먹구름 걷히자… 코스피 장초반 5% 뛰고 환율 진정 - 문화일보`,url:`https://www.munhwa.com/article/11595598`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`일본은행, 16일 회의서 기준금리 0.75%→1.0% 인상 유력…1995년 이후 최고`,
  metrics:[`기준금리 0.75%에서 1.0%로 25bp 인상 전망(시장 반영 확률 80~97%)`,`이코노미스트 94%가 6월 내 인상 예상`],
  summary:`일본은행이 6월 15~16일 이틀간의 금융정책결정회의에서 기준금리를 25bp 올려 1.0%로 인상할 것이 유력하다. 시장이 반영한 인상 확률은 80~97%에 달하며, 로이터 조사에서 이코노미스트의 94%가 6월 내 인상을 점쳤다. 현실화되면 일본 기준금리는 1995년 이후 31년 만의 최고 수준이 된다. 우에다 가즈오 일본은행 총재는 6월 3일 연설에서 에너지 가격 압력을 거론하며 인상 가능성을 시사했다. 직전 인상은 2025년 12월이었고, 시장은 이번 조치를 점진적 통화정책 정상화의 연장선으로 보고 있다. 일본의 금리 인상은 엔화 가치와 글로벌 자금 흐름에 영향을 주는 만큼 한국을 포함한 아시아 시장도 주시하고 있다. 다만 추가 인상 속도와 시점을 둘러싼 불확실성은 남아 있다.`,
  keyTerms:[{term:`통화정책 정상화`,explanation:`오랜 초저금리·돈풀기에서 벗어나 금리를 정상 수준으로 서서히 되돌리는 과정이다. 경기와 물가가 안정 궤도에 올랐다고 판단할 때 진행한다.`}],
  history:`일본은행은 디플레이션 탈출을 위해 수십 년간 초저금리와 마이너스 금리를 유지해 왔다. 2024년 마이너스 금리를 끝낸 뒤 2025년 12월까지 단계적으로 금리를 올려왔다. 엔저와 수입물가 상승이 인상 압력으로 작용했다.`,
  players:`우에다 총재가 이끄는 일본은행 정책위원회가 결정 주체이며, 4월 회의에서는 표결이 갈렸다. 엔화 약세에 부담을 느끼는 일본 정부와 수출기업, 글로벌 채권시장이 모두 결정을 주시한다. 미국 연준의 금리 경로도 변수다.`,
  current:`에너지·식품 물가 상승이 이어지면서 추가 인상의 명분이 강해졌다. 글로벌 지정학 불확실성 속에서 일본의 정상화 행보가 시험대에 올랐다.`,
  outlook:`6월 16일 회의 결과와 우에다 총재 기자회견에서 향후 인상 경로에 대한 단서가 나올 전망이다. 시장은 연내 추가 인상 가능성도 열어두고 있다.`,
  sources:[{title:`BOJ Is Said to Mull June Rate Hike With Another Possible in 2026 - Bloomberg`,url:`https://www.bloomberg.com/news/articles/2026-06-04/boj-is-said-to-mull-june-rate-hike-with-another-possible-in-2026`},{title:`Japan Interest Rate - Trading Economics`,url:`https://tradingeconomics.com/japan/interest-rate`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`호르무즈 통항 재개 기대에 국제유가 급락…브렌트유 배럴당 87달러대로`,
  metrics:[`브렌트유 3.4% 하락, 배럴당 87.3달러`,`주간 기준 약 6% 하락(2월 28일 이후로는 여전히 20%↑)`],
  summary:`6월 14일 브렌트유 가격이 3.4% 떨어진 배럴당 87.3달러를 기록했다. 미국과 이란이 호르무즈 해협을 다시 열기로 합의할 것이라는 기대가 커진 영향이다. 유가는 주간 기준 약 6% 하락했지만, 미국·이스라엘이 2월 28일 이란을 공격한 이후로 보면 여전히 20% 넘게 높은 수준이다. 트럼프 행정부 당국자는 합의 서명 가능성을 80%로 제시하며 호르무즈 재개방, 해상 봉쇄 해제, 이란 핵 프로그램 해체, 경제적 인센티브 등을 거론했다. 전쟁으로 붙었던 위험 프리미엄이 빠르게 빠지면서 유가가 내려가는 모습이다. 다만 이란 매체가 미군 철수와 재건 자금 등 다른 조건을 담은 초안을 공개하자 트럼프 대통령이 합의 내용과 다르다고 반박하는 등 혼선도 있었다. 호르무즈는 전 세계 원유 해상 수송의 핵심 길목이어서 통항 재개 여부는 유가 향방을 좌우한다.`,
  keyTerms:[{term:`위험 프리미엄`,explanation:`전쟁·공급 차질 같은 불안 요인 때문에 원자재 가격에 얹히는 추가 가격을 말한다. 불안이 줄면 이 프리미엄이 빠지면서 가격이 내려간다.`}],
  history:`2026년 2월 28일 미국과 이스라엘의 이란 공격으로 중동 정세가 급격히 악화됐고, 호르무즈 해협 통항이 사실상 막히면서 유가가 급등했다. 이후 4월 휴전과 5월 협상 기대가 오가며 유가도 등락을 반복했다. 5월 말에는 고점 대비 20%가량 떨어지기도 했다.`,
  players:`산유국 이란과 소비국 진영, 미국 트럼프 행정부, OPEC+ 산유국들이 가격에 영향을 미치는 핵심 주체다. 원유 수입 의존도가 높은 한국·일본 등 아시아 국가들이 유가 안정의 최대 수혜 대상이다. 글로벌 해운·정유업계도 통항 재개에 촉각을 곤두세운다.`,
  current:`종전 합의가 임박하면서 전쟁 프리미엄이 빠르게 해소되는 국면이다. 유가 하락은 글로벌 인플레이션 완화에도 도움이 된다.`,
  outlook:`6월 19일 양해각서 서명과 실제 호르무즈 통항 재개 시점이 유가 추가 하락 폭을 결정할 전망이다. 합의 이행이 지연되면 다시 반등할 위험도 있다.`,
  sources:[{title:`Oil drops 20% from 2026 peak on optimism over U.S.-Iran ceasefire talks - CNBC`,url:`https://www.cnbc.com/2026/05/29/oil-prices-iran-ceasefire-us-trump-strait-hormuz-energy-costs.html`},{title:`Brent Crude Oil - Price, News - Trading Economics`,url:`https://tradingeconomics.com/commodity/brent-crude-oil`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미국·이란, 휴전 60일 연장·호르무즈 재개 초기 합의…19일 양해각서 서명 예정`,
  metrics:[`휴전 60일 연장 합의`,`양해각서 서명 예정일 6월 19일`],
  summary:`미국과 이란이 전쟁을 끝내고 호르무즈 해협을 다시 열기 위한 초기 합의에 도달했다. 6월 14일 파키스탄 셰바즈 샤리프 총리는 양국이 양해각서를 마무리했으며 6월 19일 서명할 예정이라고 발표했다. 이 합의는 현재의 미·이란 휴전을 60일 더 연장하는 내용을 담고 있다. 양국은 2월 28일 미국·이스라엘의 이란 공격 이후 5주 넘게 교전했고, 이후 호르무즈 해협 접근을 둘러싼 벼랑 끝 대치로 국면이 옮겨졌다. 트럼프 대통령은 휴전 합의가 이뤄졌으며 그동안 막혀 있던 호르무즈 해협의 무관세 통항이 시작될 것이라고 밝혔다. 다만 핵심 쟁점들은 추가 협상 과제로 미뤄져 합의가 최종 타결되기까지는 난관이 남아 있다. 이란 매체가 다른 조건을 담은 초안을 공개하면서 양측 해석 차이도 드러났다.`,
  keyTerms:[{term:`양해각서`,explanation:`정식 조약 전에 합의의 큰 틀과 의사를 적어두는 문서다. 법적 구속력은 약하지만 본격 협상의 출발점이 된다.`}],
  history:`2026년 2월 28일 미국과 이스라엘이 이란을 공격하면서 중동에서 본격적인 전쟁이 시작됐다. 4월 7~8일 이스라엘을 포함한 휴전이 성사됐지만, 이후 호르무즈 해협 통항을 둘러싼 미·이란 간 긴장이 다시 고조됐다. 봉쇄로 글로벌 에너지 공급이 위협받았다.`,
  players:`미국 트럼프 행정부와 이란 정부가 협상 당사자이며, 파키스탄이 중재 역할을 맡아 합의 사실을 발표했다. 이스라엘과 걸프 산유국, 호르무즈 통항에 의존하는 아시아 수입국들이 이해당사자다. 핵 프로그램 해체 여부가 최대 쟁점이다.`,
  current:`60일 휴전 연장과 호르무즈 재개라는 초기 합의가 나오면서 전쟁 종식 기대가 커졌다. 다만 양측의 조건 해석이 엇갈려 합의가 흔들릴 여지가 있다.`,
  outlook:`6월 19일 양해각서 서명 여부가 1차 분수령이다. 서명 이후에도 핵·제재·재건 등 핵심 쟁점을 둔 후속 협상 결과를 지켜봐야 한다.`,
  sources:[{title:`U.S. and Iran announce an initial deal to end the war and reopen the Strait of Hormuz - NPR`,url:`https://www.npr.org/2026/06/15/nx-s1-5858590/us-iran-deal-updates`},{title:`US-Iran peace deal announced; Trump says Strait of Hormuz reopening - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/6/14/us-iran-ceasefire-deal-announced-trump-says-strait-of-hormuz-reopening`},{title:`Iran and U.S. reach an initial deal to extend the ceasefire - PBS News`,url:`https://www.pbs.org/newshour/world/iran-and-u-s-reach-an-initial-deal-to-extend-the-ceasefire-and-open-the-strait-of-hormuz-but-challenges-remain`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이재명 정부 2년차, 727.9조 슈퍼 확장예산으로 AI 대전환·민생 입법 드라이브`,
  metrics:[`2026년 본예산 727조9000억원(전년 대비 약 5% 증가)`,`AI 3대 강국 도약 등 AI 분야에 약 19조2000억원 투입`],
  summary:`이재명 정부가 집권 2년차를 맞아 슈퍼 확장재정을 동원해 경제 활성화와 미래 먹거리 확보에 본격 나서고 있다. 국회를 통과한 2026년도 본예산은 727조9000억원으로 전년 대비 약 5% 늘어난 규모다. 정부는 올해를 AI 대전환의 원년으로 선포하고, AI 3대 강국 도약을 위한 대전환에 10조1000억원, 전 분야 AI 도입에 2조6000억원, 인재 양성·인프라 구축에 7조5000억원 등 약 19조2000억원을 배정했다. 여당은 법제사법위원장직을 확보해 정부 국정과제 입법을 신속히 뒷받침하고 계류 중인 민생입법을 밀어붙인다는 방침이다. 다만 6월 3일 지방선거 이후 정국과 재정건전성 논란이 변수로 남아 있다. 고금리·고환율 부담 속에서 확장재정의 경기 부양 효과가 시험대에 올랐다.`,
  keyTerms:[{term:`확장재정`,explanation:`정부가 세금으로 거둔 것보다 돈을 더 많이 풀어 경기를 띄우는 재정 운용 방식이다. 경기 부양 효과가 크지만 나라 빚이 늘어나는 부담이 있다.`}],
  history:`이재명 정부는 출범 이후 경기 위축과 고금리 환경에 대응해 적극적 재정 운용 기조를 이어왔다. 2026년 예산을 짜며 전년보다 약 5% 늘린 슈퍼 확장예산을 편성했다. AI를 핵심 성장동력으로 삼겠다는 구상을 분명히 했다.`,
  players:`이재명 대통령과 정부, 다수당인 더불어민주당이 입법·재정 드라이브의 주체다. 야당은 재정건전성과 효과를 문제 삼으며 견제에 나서고 있다. 기업·연구기관은 AI 예산 집행의 직접적 수혜·협력 대상이다.`,
  current:`6월 3일 지방선거를 마친 직후로, 정부는 국정 동력을 입법 성과로 전환하려는 국면이다. 확장재정과 AI 투자가 실제 성장으로 이어질지가 관건이다.`,
  outlook:`하반기 추경 편성 여부와 AI 예산의 실제 집행 속도가 관전 포인트다. 재정적자와 국가채무 증가를 둘러싼 공방도 이어질 전망이다.`,
  sources:[{title:`[2026 신년특집] 이재명 정부 2년차 국정 운영 방향은? - 기호일보`,url:`https://www.kihoilbo.co.kr/news/articleView.html?idxno=3008737`},{title:`이재명 대통령이 구상하는 2026년 대한민국 - 주간한국`,url:`https://weekly.hankooki.com/news/articleView.html?idxno=7150193`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`NATO 앙카라 정상회의 준비 본격화…GDP 5% 국방비 놓고 유럽 분열 조짐`,
  metrics:[`NATO 신규 국방비 목표 GDP 대비 5% 제안`,`헝가리 야당 TISZA 지지율 42.8%로 집권 Fidesz(36.9%) 앞서`],
  summary:`NATO가 터키 앙카라에서 열릴 정상회의 준비에 속도를 내는 가운데 유럽 내부의 균열이 깊어지고 있다. 6월 11일 마르크 뤼터 NATO 사무총장은 브뤼셀에서 노르웨이 총리와 만나 정상회의 막바지 준비를 논의했다. 터키는 NATO 회의와 COP31 기후총회, 튀르크국가기구 정상회의까지 맡아 외교적으로 분주한 한 해를 보내고 있다. 그러나 전쟁 비용과 높은 부채, 늘어나는 국방비에 대한 피로감이 커지면서 GDP 대비 5% 국방비 분담을 놓고 서유럽과 동유럽이 갈리는 분열 조짐이 나타나고 있다. 정치 지형도 흔들려, 4월 헝가리 총선을 앞두고 페테르 머저르가 이끄는 야당 TISZA가 42.8% 지지율로 15년 집권한 오르반의 Fidesz-KDNP(36.9%)를 앞서고 있다. NATO 결속과 유럽 정치 재편이 동시에 시험대에 오른 셈이다.`,
  keyTerms:[{term:`GDP 대비 5% 국방비`,explanation:`회원국이 나라 경제 규모의 5%를 국방에 쓰자는 NATO의 분담 목표다. 부담이 큰 만큼 재정 여력이 약한 나라들의 반발을 부른다.`}],
  history:`NATO는 러시아의 위협 고조 이후 회원국 국방비 증액을 지속 추진해 왔다. 기존 GDP 2% 목표를 넘어 더 높은 분담을 요구하는 흐름이 강해졌다. 전쟁 장기화로 회원국의 재정 피로도 함께 누적됐다.`,
  players:`뤼터 사무총장과 미국, 서유럽·동유럽 회원국, 의장국 터키가 핵심 행위자다. 헝가리에서는 오르반 총리와 머저르가 이끄는 TISZA가 정면 대결 중이다. 높은 분담을 둘러싼 회원국 간 이해가 엇갈린다.`,
  current:`앙카라 정상회의를 앞두고 국방비 분담과 유럽 결속이 동시에 시험대에 올랐다. 헝가리 정권 교체 가능성은 NATO 내부 역학에도 영향을 줄 수 있다.`,
  outlook:`앙카라 정상회의에서 5% 국방비 합의 여부가 최대 관전 포인트다. 4월 헝가리 총선 결과와 COP31 일정도 함께 지켜봐야 한다.`,
  sources:[{title:`Outlook: Geopolitical Trends and Global Diplomacy in 2026 - The Diplomat`,url:`https://thediplomat.com/2025/12/outlook-geopolitical-trends-and-global-diplomacy-in-2026/`},{title:`The world in 2026: ten issues that will shape the international agenda - CIDOB`,url:`https://www.cidob.org/en/publications/world-2026-ten-issues-will-shape-international-agenda`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`엔비디아 젠슨 황 방한 확정…LG·두산·네이버와 한국 소버린 AI 동맹 강화`,
  metrics:[`엔비디아 시가총액 5조 달러 이상으로 세계 1위 유지`,`핵심 협력 축으로 LG·두산·네이버 3사 부상`],
  summary:`엔비디아 젠슨 황 최고경영자의 방한이 확정되면서 국내 반도체·AI 업계와의 협력이 본격화하고 있다. 제조 경쟁력을 보유한 LG, 로봇·반도체 소재 기술의 두산, 클라우드 역량의 네이버가 엔비디아 한국 AI 전략의 주요 협력 축으로 부상하고 있다. 엔비디아는 2026년 5월 기준 시가총액 5조 달러 이상으로 세계 1위 기업 자리를 지키고 있다. 한국은 자국 데이터와 언어로 통제하는 소버린 AI 구축을 핵심 과제로 삼고 있어, 엔비디아의 AI 가속기 공급과 협력이 정부의 AI 대전환 전략과 맞물린다. 정부는 GPU 26만 장 확보와 내년도 AI 예산 확대를 추진해 왔다. 다만 미국의 AI·반도체 수출 통제가 강화되는 가운데 칩 공급 안정성은 변수로 남아 있다. 젠슨 황의 방한은 한국이 글로벌 AI 공급망에서 어떤 위치를 차지할지를 가늠하는 분수령으로 평가된다.`,
  keyTerms:[{term:`소버린 AI`,explanation:`한 나라가 자국의 데이터·언어·인프라로 통제권을 갖고 운영하는 AI를 뜻한다. 핵심 기술을 외국에 의존하지 않으려는 전략이다.`}],
  history:`엔비디아는 AI 가속기 시장을 사실상 독점하며 시가총액 5조 달러대의 세계 1위 기업으로 올라섰다. 각국이 AI 주도권 경쟁에 나서면서 GPU 확보가 국가 전략 과제가 됐다. 한국도 정부 차원에서 GPU 확보와 AI 예산을 대폭 늘려왔다.`,
  players:`젠슨 황이 이끄는 엔비디아와 LG·두산·네이버 등 국내 기업, 한국 정부가 핵심 행위자다. 미국 정부의 수출 통제 정책이 공급의 변수로 작용한다. 삼성전자·SK하이닉스 등 메모리 업계도 협력 대상이다.`,
  current:`젠슨 황 방한으로 한국과 엔비디아의 AI 동맹이 구체화되는 국면이다. 정부의 AI 대전환 전략과 기업 협력이 맞물리며 추진력이 붙고 있다.`,
  outlook:`방한 기간 발표될 구체적 협력 내용과 GPU 공급 규모가 관전 포인트다. 미국의 수출 통제 강도에 따라 한국의 소버린 AI 추진 속도가 좌우될 전망이다.`,
  sources:[{title:`엔비디아 젠슨 황 방한 확정…국내 반도체 업계 만난다 - CBC뉴스`,url:`https://www.cbci.co.kr/news/articleView.html?idxno=577889`},{title:`[GTC2026] 엔비디아 AI 반도체 칩 대거 공개…AI 인프라 주도권 겨냥 - 전자신문`,url:`https://www.etnews.com/20260317000314`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`AI 붐이 부의 지도 다시 그린다…올해만 신규 억만장자 19명 탄생`,
  metrics:[`올해 AI 관련 신규 억만장자 19명 탄생`,`글로벌 머니마켓펀드 잔액 사상 첫 8조 달러 돌파`],
  summary:`AI 붐이 글로벌 부의 지형을 빠르게 바꾸고 있다. 올해 들어 기존 사업에 새 기술을 접목한 방식으로 AI 관련 신규 억만장자가 19명 탄생했다. 생성형 AI를 둘러싼 투자 열기가 소수에게 막대한 부를 안기며 부의 집중 논란도 커지고 있다. 동시에 금리·전쟁·에너지를 둘러싼 불확실성 탓에 안전자산으로 돈이 몰리면서 글로벌 머니마켓펀드 잔액은 사상 처음으로 8조 달러를 넘어섰다. 위험을 감수한 AI 투자와 현금을 쌓아두려는 관망 심리가 한 시장 안에서 공존하는 모습이다. 엔비디아가 시가총액 5조 달러로 세계 1위를 지키는 등 AI 대장주의 영향력도 갈수록 커지고 있다. 일각에서는 AI 밸류에이션 과열과 거품 가능성을 경고한다. AI가 만들어내는 부와 그 쏠림을 어떻게 다룰지가 새로운 사회적 과제로 떠올랐다.`,
  keyTerms:[{term:`생성형 AI`,explanation:`글·이미지·코드 등을 사람처럼 새로 만들어내는 AI 기술이다. 챗봇·이미지 생성기가 대표적이며 최근 투자 열풍의 중심에 있다.`}],
  history:`2020년대 들어 생성형 AI가 대중화되면서 관련 기업 가치가 폭발적으로 뛰었다. 반도체·클라우드·모델 기업을 중심으로 막대한 투자가 몰렸다. 그 과정에서 새로운 억만장자가 잇따라 탄생했다.`,
  players:`엔비디아 등 AI 대장주와 신생 AI 기업 창업자, 대형 투자자들이 부의 집중을 주도한다. 한편 불확실성을 우려하는 보수적 투자자들은 머니마켓펀드 같은 안전자산으로 이동하고 있다. 규제 당국은 부의 쏠림과 시장 과열을 주시한다.`,
  current:`AI 투자 열기와 안전자산 선호가 동시에 극단으로 치달으며 시장이 양극화되고 있다. 부의 급격한 집중은 사회적 형평성 논의로 번지고 있다.`,
  outlook:`AI 기업 실적 발표와 밸류에이션 조정 여부가 거품 논쟁의 향방을 가를 전망이다. 안전자산에 쌓인 8조 달러가 언제 위험자산으로 이동할지도 관전 포인트다.`,
  sources:[{title:`Business News, Stock Markets, Finance, Breaking & World News - Bloomberg`,url:`https://www.bloomberg.com/`},{title:`Markets - Bloomberg`,url:`https://www.bloomberg.com/markets`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`한국 소비자심리, 7개월 만에 최고치 돌파…경기 회복 기대 커진다`,
  metrics:[`소비자심리지수 7개월 만에 최고치 경신`,`2026년 본예산 727조9000억원 규모의 확장재정 뒷받침`],
  summary:`한국 소비자심리가 7개월 만에 최고 수준으로 올라섰다. 그동안 고금리와 고환율, 중동 전쟁발 불확실성에 짓눌렸던 가계의 경기 인식이 개선되고 있다는 신호다. 미·이란 종전 합의 기대로 환율과 유가가 진정되고 증시가 급반등한 점이 심리 회복을 뒷받침했다. 정부가 727조9000억원 규모의 확장재정과 AI 대전환 투자로 경기 부양에 나선 것도 기대를 키웠다. 소비자심리지수가 기준선을 넘어서면 향후 소비가 살아날 가능성이 높아진다. 다만 여전히 높은 금리 수준과 수입물가 부담은 소비 회복의 발목을 잡을 수 있는 요인이다. 심리 개선이 실제 소비와 내수 회복으로 이어질지가 하반기 경기의 관건이 될 전망이다.`,
  keyTerms:[{term:`소비자심리지수`,explanation:`소비자들이 경기와 살림살이를 어떻게 느끼는지 조사해 수치로 나타낸 지표다. 100을 넘으면 낙관, 밑돌면 비관이 우세하다는 뜻이다.`}],
  history:`한국 소비자심리는 고금리 장기화와 환율 급등, 중동 전쟁 충격으로 그동안 위축돼 있었다. 수입물가 상승이 가계 부담을 키우며 소비 심리를 짓눌렀다. 최근 들어 지정학 리스크 완화로 분위기가 반전되기 시작했다.`,
  players:`가계와 소비자, 통계·조사기관, 한국은행과 정부가 지표의 주요 관계자다. 정부는 확장재정으로, 한국은행은 통화정책으로 경기와 물가를 함께 관리한다. 기업은 소비 회복 여부에 따라 투자·고용을 조정한다.`,
  current:`종전 기대와 환율·유가 안정이 맞물리며 소비 심리가 7개월 만에 최고로 올라섰다. 확장재정 효과 기대까지 더해져 회복 신호가 뚜렷해지고 있다.`,
  outlook:`심리 개선이 실제 소비·내수 지표로 이어지는지가 하반기 핵심 관전 포인트다. 금리 인하 시점과 미·이란 합의 이행 여부가 추가 변수다.`,
  sources:[{title:`한국 소비자 신뢰도 7개월 최고치 돌파 - Trading Economics`,url:`https://ko.tradingeconomics.com/south-korea/consumer-confidence/news/460074`},{title:`2026년 세계경제 전망(업데이트) 발표 - 대한민국 정책브리핑`,url:`https://www.korea.kr/briefing/policyBriefingView.do?newsId=156761126`}]
}]
},{
  tag:`2026-06-15`,
  label:`2026년 6월 15일 (월요일)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피 8,100선 위 마감, 원달러 환율 1,518원대…한국은행 기준금리 연 2.5% 동결 기조 유지`,
  metrics:[`코스피 8,123.62 (6월 12일 종가)`,`원달러 환율 1,518.30원`],
  summary:`6월 12일 마감 기준 코스피는 8,123.62로 사상 최고권에서 거래를 이어갔고, 원달러 환율은 1,518.30원으로 원화 약세 흐름이 지속됐다. 한국은행은 2월 26일 통화정책방향 결정회의에서 기준금리를 연 2.5%로 동결한 뒤 현재까지 같은 수준을 유지하고 있다. 1월에도 2.5%로 동결한 만큼 올해 들어 두 차례 연속 금리를 묶어둔 셈이다. 환율이 1,500원을 웃도는 고환율 상황은 수입 물가를 끌어올려 가계와 기업의 비용 부담을 키우는 요인으로 작용한다. 동시에 가계부채 관리를 위해 금리를 섣불리 내리기도 어려워 한은의 운신 폭이 좁아진 상태다. 증시는 반도체·AI 관련주 강세에 힘입어 높은 수준을 유지하고 있지만, 원화 가치 하락은 외국인 자금 이탈 위험을 키운다. 다음 기준금리 결정 회의는 7월 16일로 예정돼 있어 시장은 환율과 물가 흐름을 주시하고 있다. 고환율과 고금리가 동시에 이어지면서 실물경제 부담이 누적되고 있다는 평가가 나온다.`,
  keyTerms:[{term:`기준금리`,explanation:`중앙은행이 시중 금리의 기준으로 삼는 정책금리. 이걸 올리면 대출이자가 오르고, 내리면 시중에 돈이 풀린다. 물가와 경기를 조절하는 가장 강력한 수단이다.`}],
  history:`한국은행은 2024~2025년 고물가에 대응해 금리를 올렸다가 경기가 둔화되자 인하로 방향을 틀었다. 2026년 들어서는 가계부채 급증과 원화 약세 우려가 겹치면서 1월과 2월 연속으로 금리를 2.5%에 묶어두는 동결 기조로 돌아섰다.`,
  players:`통화정책 결정 주체는 한국은행 금융통화위원회다. 정부와 금융위원회는 가계부채 관리방안을 통해 대출 총량을 죄고 있고, 외국인 투자자와 수출 대기업은 환율 변동에 직접적인 영향을 받는다. 가계와 자영업자는 고금리·고환율의 비용을 떠안는 쪽이다.`,
  current:`코스피가 8,000선을 넘는 호황 속에서도 환율이 1,500원을 웃돌아 실물경제와 자산시장의 온도차가 뚜렷하다. 미국 금리가 높게 유지되는 한 한미 금리차 부담으로 한은의 인하 여력이 제한된다.`,
  outlook:`7월 16일 금융통화위원회 회의에서 금리 향방이 결정된다. 미국 연준의 통화정책 방향과 6~7월 소비자물가 지표가 한은의 선택을 좌우할 핵심 변수다.`,
  sources:[{title:`한국은행 기준금리 추이 - 한국은행`,url:`https://www.bok.or.kr/portal/singl/baseRate/list.do?dataSeCd=01&menuNo=200643`},{title:`한국은행 기준금리 동결, 2026 금리 발표 일정 - 토스뱅크`,url:`https://www.tossbank.com/articles/baserate2601`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`스페이스X, 역대 최대 규모 IPO 성공…상장 첫날 19% 급등하며 시가총액 2조 달러 돌파`,
  metrics:[`상장 첫날 +19%, 종가 161.11달러`,`첫날 시가총액 2조 1천억 달러`],
  summary:`일론 머스크가 이끄는 우주기업 스페이스X가 6월 12일 나스닥에 티커 SPCX로 상장하며 사상 최대 규모의 IPO를 기록했다. 공모가는 135달러였으나 시초가 150달러로 출발해 장중 176.52달러까지 약 30% 치솟았고, 종가는 161.11달러로 첫날 19% 상승 마감했다. 거래량이 5억 주를 넘어서며 역대 최대 규모의 IPO로 집계됐다. 첫날 시가총액은 2조 1천억 달러를 돌파해 단숨에 세계 최대 상장기업 중 하나로 올라섰다. 로켓 발사뿐 아니라 위성 인터넷(스타링크)과 컴퓨팅 사업의 성장 기대가 투자 열기를 키웠다. 이번 상장은 우주산업이 본격적인 자본시장의 평가 대상이 됐다는 상징적 사건으로 받아들여진다. 다만 2조 달러가 넘는 밸류에이션이 실제 수익성에 비해 과도하다는 거품 논란도 함께 제기된다. 머스크의 또 다른 상장사인 테슬라와의 자금·인력 연계 여부도 향후 관전 포인트다.`,
  keyTerms:[{term:`IPO`,explanation:`기업공개(Initial Public Offering). 비상장 회사가 처음으로 주식을 증권시장에 내놓아 일반 투자자도 살 수 있게 만드는 절차다. 회사는 대규모 자금을 끌어모으고, 기업 가치가 시장에서 공개적으로 평가받게 된다.`}],
  history:`스페이스X는 2002년 설립 이후 줄곧 비상장 상태로 거액의 사모 투자를 받아왔고, 스타링크 위성통신 사업이 흑자로 돌아서면서 상장 기대가 커졌다. 머스크는 수년간 상장 가능성을 시사해왔고, 2026년 초부터 IPO 추진이 본격화됐다.`,
  players:`핵심 인물은 창업자 일론 머스크이며, 상장 주관 투자은행들과 기관투자자가 공모에 참여했다. 경쟁사인 블루오리진과 기존 위성통신 업체들, 그리고 우주산업 정책을 다루는 미국 정부도 이해관계자다.`,
  current:`AI·반도체에 이어 우주산업이 증시의 새로운 성장 테마로 부상하면서 천문학적 밸류에이션이 정당화되는지가 시험대에 올랐다. 첫날 폭등은 시장의 강한 기대를 보여줬다.`,
  outlook:`향후 분기 실적 발표에서 스타링크 가입자 증가와 수익성이 주가를 좌우할 전망이다. 상장 후 주가 변동성과 보호예수 해제 시점이 단기 변수로 꼽힌다.`,
  sources:[{title:`SpaceX IPO makes history as largest ever, stock gains 19% on first day - NPR`,url:`https://www.npr.org/2026/06/12/nx-s1-5855004/stock-ai-spacex-ipo-elon-musk`},{title:`SpaceX IPO takeaways: SPCX closes at \$161, jumping 19% after record debut - CNBC`,url:`https://www.cnbc.com/2026/06/12/spacex-ipo-spcx-live-updates.html`},{title:`SpaceX valuation at over \$2 trillion as stock closes at \$161.11 - Fortune`,url:`https://fortune.com/2026/06/12/spacex-ipo-trading-first-day-live-updates-elon-musk/`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`美 기업 1분기 순이익 28.6% 급증…순이익률 14.8%로 집계 이래 최고치`,
  metrics:[`1분기 순이익 전년比 +28.6% (예상 13.1%의 2배 이상)`,`팩트셋 순이익률 14.8%, 2009년 집계 이후 최고`],
  summary:`미국 상장기업들의 1분기 순이익이 전년 대비 28.6% 급증해 시장 예상치 13.1%의 두 배를 웃돌았다. 팩트셋이 집계한 블렌디드 순이익률은 14.8%로, 관련 통계를 추적하기 시작한 2009년 이후 가장 높은 수준을 기록했다. 강력한 실적에 힘입어 미국 증시는 S&P500이 0.50%, 다우지수가 0.70%, 나스닥이 0.31% 오르며 견조한 흐름을 보였다. 특히 반도체 업종에 대한 투자 쏠림이 심해 응답자의 73%가 반도체 매수를 가장 붐비는 거래로 꼽았다. 기업들이 비용을 효율적으로 통제하면서 매출 대비 이익 비중을 끌어올린 점이 호실적의 배경으로 분석된다. 다만 이익이 일부 빅테크와 반도체 기업에 집중돼 있어 시장 전체의 건강성에 대한 우려도 공존한다. 높은 순이익률은 기업의 가격 결정력을 보여주지만, 동시에 소비자 물가 부담의 한 단면이기도 하다. 투자자들은 실적 호조가 하반기에도 이어질지 주시하고 있다.`,
  keyTerms:[{term:`순이익률`,explanation:`매출에서 원가·세금·이자 등 모든 비용을 뺀 순이익이 매출에서 차지하는 비율. 높을수록 기업이 같은 매출로 더 많은 돈을 남긴다는 뜻이며, 그만큼 사업 효율이 좋다고 해석한다.`}],
  history:`팬데믹 이후 미국 기업들은 공급망 비용 상승과 고금리를 겪었지만, 2025년부터 AI 투자와 비용 절감이 맞물리며 이익이 빠르게 회복됐다. 1분기 실적은 그 회복세가 정점에 이르렀음을 보여준다.`,
  players:`주역은 엔비디아 등 반도체·AI 기업과 대형 기술주이며, 실적을 집계·분석하는 팩트셋과 월가 투자은행들이 시장 기대를 형성한다. 연준은 이런 호실적과 물가를 함께 보며 통화정책을 조율한다.`,
  current:`기업 이익이 사상 최고 수준이지만 성장의 과실이 소수 종목에 집중돼, 증시 랠리가 지속 가능한지에 대한 논쟁이 커지는 국면이다.`,
  outlook:`2분기 실적 시즌과 연준의 금리 결정이 다음 분기 증시 방향을 가른다. 반도체 쏠림이 해소되는지, 이익이 전 업종으로 확산되는지가 관건이다.`,
  sources:[{title:`Market Commentary - June 2026 - James Investment`,url:`https://www.jamesinvestment.com/market-commentary/june-2026/`},{title:`International Business, World News & Global Stock Market Analysis - CNBC`,url:`https://www.cnbc.com/world/`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미국·이란 평화협정 타결…6월 19일 스위스서 서명, 트럼프는 G7서 호르무즈 해협 정상화 논의`,
  metrics:[`서명식 6월 19일 스위스 예정`,`휴전 발효 4월 7일, 전쟁 발발 2월 28일`],
  summary:`도널드 트럼프 미국 대통령과 주요국 정상들이 미국과 이란이 평화협정에 합의했다고 확인했다. 양측은 협정문에 전자 서명한 뒤 6월 19일 스위스에서 공식 서명식을 가질 예정이다. 이번 전쟁은 2월 28일 미국과 이스라엘이 이란 전역에 공동 타격을 가하며 시작됐고, 4월 7일부터 휴전이 발효됐으나 양측의 산발적 공격으로 불안정한 상태가 이어져 왔다. 트럼프 대통령은 프랑스에서 열리는 G7 정상회의에서 호르무즈 해협의 기뢰 제거 방안을 동맹국들과 논의할 계획이며, 영국과 프랑스가 협력 의사를 밝혔다. 그는 회의 계기에 이집트·카타르·아랍에미리트 정상과 별도로 만나 전쟁 종식 방안을 협의한다. 다만 이스라엘의 레바논 공습이 합의를 위협하는 변수로 남아 있다. 세계 원유 수송의 핵심 길목인 호르무즈 해협의 안정 여부가 글로벌 유가에 직접적인 영향을 미친다. 서명식까지 남은 며칠 동안의 추가 충돌 여부가 협정의 성패를 가를 전망이다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`페르시아만과 외해를 잇는 좁은 바닷길로, 전 세계 해상 원유 수송의 약 20%가 지나가는 핵심 길목이다. 이곳이 막히거나 위협받으면 국제 유가가 곧바로 출렁인다.`}],
  history:`미국과 이란은 핵 개발과 제재를 둘러싸고 수십 년간 적대해왔다. 2026년 2월 28일 미국·이스라엘의 이란 본토 타격으로 전면전이 벌어졌고, 국제사회 중재로 4월 7일 휴전이 성사됐다.`,
  players:`트럼프 미 대통령이 협상을 주도하고, 파키스탄 총리 등이 중재 역할을 했다. 이란 정부, 이스라엘, 그리고 영국·프랑스 등 G7 동맹국과 걸프 산유국들이 직접적 이해관계자다.`,
  current:`휴전이 불안정한 가운데 정식 평화협정 서명이 임박해 중동 정세의 분기점에 섰다. 이스라엘의 레바논 공습이 막판 합의를 흔들 위험이 있다.`,
  outlook:`6월 19일 스위스 서명식이 최대 분수령이다. G7 정상회의에서의 호르무즈 해협 안전 보장 합의와 이스라엘의 자제 여부가 협정 이행을 좌우한다.`,
  sources:[{title:`Live Updates: Iran and U.S. reach deal, Trump and Pakistani PM say - CBS News`,url:`https://www.cbsnews.com/live-updates/iran-war-us-trump-peace-deal-agreement/`},{title:`Trump to discuss Strait of Hormuz demining at G7 as confidence grows for Iran deal - The Inquirer`,url:`https://www.inquirer.com/news/nation-world/iran-us-peace-deal-demine-strait-hormuz-g7-britain-france-ali-khamenei-funeral-20260613.html`},{title:`US, Iran agree to peace deal, according to Pakistan PM - NewsNation`,url:`https://www.newsnationnow.com/world/us-iran-peace-deal-final-text-agreed-upon/`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이재명 대통령, 참정권 침해 문제제기 수용…부정선거론에는 본질 왜곡하는 반사회적 행태로 일축`,
  metrics:[`6·3 지방선거 관련 국회 조사위 이번 주 가동`,`검경 합동수사단 책임 수사 본격화`],
  summary:`유럽 순방 중인 이재명 대통령이 6월 14일 6·3 지방선거 과정에서 불거진 참정권 침해 문제 제기를 인정하고 수용한다는 입장을 밝혔다. 이 대통령은 참모진과의 화상 보고회에서 철저하고 투명한 진상규명을 서둘러야 하며 검경 합동수사단도 예외 없이 책임 수사에 속도를 내야 한다고 강조했다. 다만 선거 결과가 조작됐다는 부정선거론에 대해서는 문제의 본질을 왜곡하고 시민의 소중한 목소리를 모욕하는 반사회적 행태라고 선을 그었다. 그는 국회 조사위원회가 이번 주부터 가동될 예정이라며 중앙선거관리위원회의 전면적인 협조를 요청했다. 이 대통령은 또 남은 4년의 성패가 집권 2년 차에 달렸다며 핵심 정책 과제의 제도적 기반을 다지겠다고 밝혔다. 최근 지지율 하락 속에 순방 중에도 SNS와 화상회의로 국정을 챙기는 초심 모드를 강조했다. 참정권 문제와 부정선거론을 구분해 대응하려는 의도로 풀이된다.`,
  keyTerms:[{term:`참정권`,explanation:`국민이 선거에 참여하고 투표할 권리, 즉 정치에 참여할 기본 권리를 말한다. 투표소 운영 부실이나 투표 방해 등으로 이 권리가 제대로 보장되지 못하면 참정권 침해 논란이 생긴다.`}],
  history:`2026년 6월 3일 치러진 지방선거 과정에서 투표 관리와 참정권 보장을 둘러싼 문제 제기가 잇따랐다. 이는 선거 결과 조작을 주장하는 부정선거론과 뒤섞이며 정치 쟁점으로 번졌다.`,
  players:`이재명 대통령과 여권이 진상규명을 주도하고, 국회 조사위원회와 검경 합동수사단이 사실관계를 파헤친다. 중앙선거관리위원회는 협조 대상이자 책임 논란의 한가운데 있는 기관이다.`,
  current:`대통령이 참정권 침해는 인정하되 부정선거론은 차단하는 이원적 대응에 나서면서, 진상규명의 범위와 강도가 정국의 핵심 변수로 떠올랐다.`,
  outlook:`이번 주 국회 조사위 가동과 검경 수사 진척이 분수령이다. 선관위의 협조 수준과 수사 결과가 향후 정치적 책임 공방의 향방을 가른다.`,
  sources:[{title:`李대통령 참정권 침해 문제 제기 인정·수용, 부정선거론은 본질 왜곡 - 세계일보`,url:`https://segye.com/newsView/20260614509897`},{title:`이 대통령 참정권 침해 문제 제기 인정, 부정선거론은 반사회적 행태 - 한국일보`,url:`https://www.hankookilbo.com/news/article/A2026061422540005203`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`러시아·우크라이나 불안정한 휴전 속 교전 지속…민간인 사상 잇따르고 러시아는 9월 총선 준비`,
  metrics:[`지난 24시간 우크라 민간인 4명 사망·22명 부상`,`러시아 총선 9월 예정`],
  summary:`우크라이나와 러시아의 불안정한 휴전 속에서도 교전이 이어지며 인명 피해가 계속되고 있다. 6월 14일 우크라이나 지방 당국은 지난 24시간 동안 러시아의 공격으로 민간인 4명이 숨지고 22명이 다쳤다고 밝혔다. 우크라이나도 같은 날 밤사이 러시아 툴라주의 화학공장과 야로슬라블주의 석유 저장시설 등을 타격했다. 발트해에서는 스웨덴이 러시아 군용기 접근에 두 차례 전투기를 긴급 발진시켰고, 영국은 러시아의 그림자 함대 유조선을 나포했다. 한편 6월 14일 공개된 문서에는 9월로 예정된 러시아 총선을 앞두고 푸틴 대통령과 집권당 통합러시아당의 향후 4개월 지지율 전망이 담겼다. 현재의 휴전은 유럽의 외교가 아니라 우크라이나의 소진과 미국의 압박에 의해 유지되고 있다는 분석이 나온다. 산발적 충돌이 본격적인 평화협상으로 이어질지는 여전히 불투명하다. 발트해와 에너지 시설을 둘러싼 긴장이 새로운 확전 위험으로 지목된다.`,
  keyTerms:[{term:`그림자 함대`,explanation:`제재를 피하려고 소유주와 운항 기록을 숨긴 채 러시아산 원유를 몰래 실어 나르는 노후 유조선 무리를 말한다. 서방의 제재망을 우회하는 통로라서 나포·단속의 표적이 된다.`}],
  history:`2022년 시작된 러시아의 우크라이나 침공은 장기전으로 이어졌고, 2026년 들어 양측의 소진과 미국의 압박 속에 불안정한 휴전 국면에 접어들었다. 그러나 산발적 교전과 후방 시설 타격이 끊이지 않고 있다.`,
  players:`러시아의 푸틴 대통령과 우크라이나 정부가 당사자이며, 미국이 휴전을 압박하는 핵심 외부 행위자다. 스웨덴·영국 등 유럽 국가들은 발트해와 해상에서 러시아를 직접 견제하고 있다.`,
  current:`휴전이 명목상 유지되지만 민간인 피해와 에너지 시설 타격이 이어져 언제든 재격화할 수 있는 위태로운 균형 상태다. 9월 러시아 총선이 정치적 변수로 떠올랐다.`,
  outlook:`9월 러시아 총선과 미국의 중재 강도가 향후 정세를 좌우한다. 발트해 영공 충돌과 해상 나포가 확전으로 번질지 주시할 필요가 있다.`,
  sources:[{title:`News from Ukraine, Eastern Europe - The Kyiv Independent`,url:`https://kyivindependent.com/`},{title:`Hungarian election could have implications for EU, US, Russia, and Ukraine - Atlantic Council`,url:`https://www.atlanticcouncil.org/blogs/ukrainealert/hungarian-election-could-have-implications-for-eu-us-russia-and-ukraine/`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`오픈AI·엔비디아, 10기가와트 규모 전략적 제휴…엔비디아 최대 1천억 달러 투자 추진`,
  metrics:[`엔비디아 시스템 최소 10기가와트(GW) 배치`,`엔비디아 최대 1,000억 달러 오픈AI 투자`],
  summary:`오픈AI와 엔비디아가 차세대 AI 인프라 구축을 위한 대규모 전략적 제휴 의향서를 체결했다. 양사는 오픈AI의 차세대 모델을 학습·구동하기 위해 최소 10기가와트 규모의 엔비디아 시스템을 배치하기로 했으며, 엔비디아는 시스템이 단계적으로 깔리는 데 맞춰 오픈AI에 최대 1천억 달러를 투자할 계획이다. 오픈AI는 초지능 구현을 목표로 막대한 연산 능력을 확보하려는 행보를 이어가고 있다. 동시에 오픈AI는 브로드컴과 손잡고 2026년 자체 AI 칩을 처음 생산해 외부 판매 없이 내부용으로 활용할 예정이어서 엔비디아 의존도를 낮추려는 전략도 병행하고 있다. 엔비디아는 데이터센터를 넘어 윈도 노트북용 칩까지 내놓으며 AI 생태계의 모든 계층을 장악하려 하고 있다. 거대 자본과 연산 자원이 소수 기업에 집중되면서 AI 패권 경쟁이 한층 격화되는 양상이다. 한편 천문학적 투자 규모가 AI 거품 논란을 키운다는 지적도 나온다.`,
  keyTerms:[{term:`기가와트`,explanation:`전력량 단위로 1기가와트(GW)는 100만 킬로와트, 대형 원전 한 기가 만들어내는 정도의 전력이다. AI 데이터센터가 잡아먹는 전기를 GW로 표현하는데, 10GW는 도시 하나가 쓰는 전력에 맞먹는 어마어마한 규모다.`}],
  history:`엔비디아는 AI 학습에 필수인 GPU 시장을 사실상 독점하며 급성장했고, 오픈AI는 챗GPT 이후 더 큰 모델을 위해 연산 자원 확보에 사활을 걸어왔다. 양사의 협력은 이런 수요와 공급이 맞물린 결과다.`,
  players:`핵심 행위자는 오픈AI와 엔비디아이며, 자체 칩 생산을 돕는 브로드컴, 그리고 마이크로소프트·델 등 하드웨어 파트너가 가세한다. 구글·아마존 등 경쟁 빅테크도 자체 AI 인프라로 맞서고 있다.`,
  current:`1천억 달러 규모의 투자와 10GW 인프라 계획은 AI 경쟁이 자본·전력 싸움으로 전환됐음을 보여주는 분기점이다. 동시에 과도한 투자에 대한 거품 경고도 커지고 있다.`,
  outlook:`오픈AI의 자체 칩 양산 시점과 엔비디아 투자 집행 속도가 관전 포인트다. 막대한 전력 수요를 감당할 전력 인프라 확보가 다음 과제로 부상한다.`,
  sources:[{title:`OpenAI and NVIDIA Announce Strategic Partnership to Deploy 10 Gigawatts - NVIDIA Newsroom`,url:`https://nvidianews.nvidia.com/news/openai-and-nvidia-announce-strategic-partnership-to-deploy-10gw-of-nvidia-systems`},{title:`OpenAI to launch its first AI chip in 2026 with Broadcom, FT reports - AOL`,url:`https://www.aol.com/news/openai-set-start-mass-production-003906132.html`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`한국 온난화 세계 평균의 2배 속도…향후 5년 내 역대급 폭염·온열질환 피해 우려`,
  metrics:[`향후 5년 한국 기온 상승폭 세계 평균의 2배 전망`,`여름철 온열질환 피해 재확대 경고`],
  summary:`한국의 온난화가 세계 평균의 2배 속도로 진행되고 있어 향후 5년 내 역대급 폭염이 닥칠 수 있다는 경고가 나왔다. 기상 분석에 따르면 한반도의 평균기온 상승폭이 지구 전체 평균을 크게 웃돌아, 폭염과 온열질환 피해가 다시 커질 위험이 높다. 한반도는 삼면이 바다인 데다 도시화와 열섬 현상이 겹쳐 기온 상승에 특히 취약하다는 분석이다. 여름철 폭염은 농작물 피해, 전력 수요 급증, 취약계층의 건강 위협으로 직결돼 사회적 비용을 키운다. 특히 고령층과 야외 노동자 등 사회적 약자가 폭염의 직접적 피해를 입는 구조가 반복되고 있다. 정부와 지자체는 폭염 대응 체계를 강화하고 있지만 기온 상승 속도를 따라잡지 못한다는 우려가 제기된다. 기후 위기가 더 이상 먼 미래가 아니라 당장의 생존 문제로 다가오고 있다는 경각심이 커지고 있다. 온열질환 예방과 취약계층 보호가 시급한 과제로 떠올랐다.`,
  keyTerms:[{term:`온열질환`,explanation:`더위 때문에 몸의 열 조절이 무너지면서 생기는 병으로 열사병·열탈진 등이 대표적이다. 심하면 목숨까지 위협하는데, 특히 노약자와 야외에서 일하는 사람에게 위험하다.`}],
  history:`한국은 최근 수년간 기록적 폭염을 거듭 겪으며 온열질환 사망자가 늘었다. 전 지구적 온난화가 가속되는 가운데 한반도의 기온 상승 속도가 세계 평균을 앞지른다는 분석이 누적돼 왔다.`,
  players:`기상청과 환경부 등 정부 기관이 예측·대응을 맡고, 지방자치단체가 폭염 쉼터 등 현장 대책을 운영한다. 고령층·야외 노동자·저소득층 등 취약계층이 피해의 최전선에 있다.`,
  current:`여름이 본격화되는 시점에 세계 평균 2배의 온난화 경고가 나오면서 폭염 대비가 시급한 현안으로 부상했다. 기후 위기의 체감도가 한층 높아졌다.`,
  outlook:`7~8월 본격 폭염 시기의 기온과 온열질환 발생 추이가 관건이다. 정부의 폭염 대응 예산과 취약계층 보호 대책의 실효성이 시험대에 오른다.`,
  sources:[{title:`2배 빠른 K온난화, 5년내 역대급 폭염 온다 - 서울신문`,url:`https://m.go.seoul.co.kr/news/society/2026/05/29/20260529008006`},{title:`2026 in South Korea - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_in_South_Korea`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`국제우주정거장서 골다공증·심장질환 연구 활발…우주의학이 지구 의료 혁신 이끈다`,
  metrics:[`ISS 74차 원정대 미세중력 의학 실험 진행`,`골세포·심장조직 등 다중 연구 동시 수행`],
  summary:`국제우주정거장(ISS)에서 골다공증과 심장질환을 규명하기 위한 의학 연구가 활발히 진행되고 있다. 유럽우주국(ESA) 우주비행사 소피 아드노는 특수 처리한 등나무 목재 지지체에 인간 뼈세포를 키워 미세중력 환경에서 골다공증을 모사하는 실험을 선보였다. 이는 골다공증 치료와 뼈 재생 요법 개선의 단서를 제공할 것으로 기대된다. ISS의 74차 원정대는 폐렴을 일으키는 박테리아가 심장에 장기 손상을 주는 과정을 줄기세포 유래 심장조직으로 관찰하고 있다. 중력이 거의 없는 우주 환경은 지구에서 수십 년 걸릴 노화와 질병 변화를 빠르게 재현할 수 있어 의학 연구의 새로운 무대로 주목받는다. 연구진은 심우주 탐사 기술이 휴대용 의료기기와 로봇 진료 등 지구 의료에도 혁신을 가져올 것으로 전망한다. 다만 최근 ISS의 공기 누출이 악화돼 엔지니어들이 새로운 균열 위치를 조사하는 등 시설 노후화 문제도 부각됐다. 우주의학이 미래 의료의 핵심 분야로 떠오르고 있다.`,
  keyTerms:[{term:`미세중력`,explanation:`우주정거장처럼 중력이 거의 느껴지지 않는 무중력에 가까운 상태를 말한다. 이 환경에서는 뼈와 근육이 빠르게 약해지고 세포가 다르게 자라기 때문에, 지구에서 오래 걸리는 질병 변화를 짧게 관찰할 수 있다.`}],
  history:`우주비행사들이 장기 체류 중 뼈와 근육이 급격히 약해지는 현상이 보고되면서, 미세중력을 거꾸로 활용해 노화·질병을 연구하려는 시도가 이어져 왔다. NASA와 ESA는 ISS를 의학 실험실로 적극 활용하고 있다.`,
  players:`NASA와 ESA 등 우주기관, 74차 원정대 우주비행사들, 그리고 줄기세포·골질환을 연구하는 지상의 과학자들이 협력한다. 우주의학 성과는 제약·의료기기 산업으로 확산된다.`,
  current:`골다공증·심장질환 등 노년기 만성질환 연구가 우주에서 가속되며, 우주 연구가 지구 의료 혁신으로 직결되는 사례가 늘고 있다. 동시에 ISS 노후화가 변수로 떠올랐다.`,
  outlook:`실험 결과가 지상 임상으로 이어지는 속도가 관건이다. ISS 공기 누출 수리와 향후 상업용 우주정거장으로의 연구 이전 여부가 주목된다.`,
  sources:[{title:`Human Research, Biotechnology for Advanced Health Fill Station Research Schedule - NASA`,url:`https://www.nasa.gov/blogs/spacestation/2026/06/03/human-research-biotechnology-for-advanced-health-fill-station-research-schedule/`},{title:`Out-of-this-world medical tech could boost health care on Earth - CBC News`,url:`https://www.cbc.ca/news/health/space-medicine-technology-earth-9.7228858`}]
}]
},{
  tag:`2026-06-14`,
  label:`2026년 6월 14일 (일요일)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피, 미·이란 평화 기대와 반도체 강세에 장 초반 6% 급등하며 8000선 회복`,
  metrics:[`코스피 장 초반 +6%, 8000선 회복`,`삼성전자 시가총액 2000조원 돌파`],
  summary:`6월 12일 코스피가 장 초반 6% 넘게 급등하며 한때 무너졌던 8000선을 다시 회복했다. 미·이란 평화협정 임박 소식으로 중동 리스크가 완화되자 아시아 증시 전반이 동반 강세를 보였고, 그 중심에는 삼성전자와 SK하이닉스의 반도체 슈퍼사이클 기대가 자리잡고 있다. 메모리 가격 급등으로 두 회사의 합산 영업이익이 2025년 91조원에서 2026년 600조원대로 불어날 것이라는 전망이 나오면서 삼성전자 시가총액은 2000조원을 돌파했다. 지난달 반도체 수출은 3개월 연속 300억 달러를 넘어 사상 최고치를 경신했다. 다만 코스피 시가총액의 절반가량을 두 종목이 차지하면서 쏠림과 거품 논란도 함께 커지고 있다. KB증권은 올해 코스피 목표치를 7500에서 1만500으로 40% 상향했다. 증시가 미국 금리 결정과 미·이란 협상 결과라는 두 변수에 크게 흔들리는 국면이다.`,
  keyTerms:[{term:`반도체 슈퍼사이클`,explanation:`반도체 가격과 수요가 몇 년에 걸쳐 크게 오르는 대호황 국면을 말한다. AI 서버용 메모리 수요가 폭발하면서 삼성전자·SK하이닉스 실적과 한국 증시를 끌어올리는 핵심 동력이 되고 있다.`}],
  history:`한국 증시는 2025년까지 4000선 안팎에 머물렀으나 AI 데이터센터용 고대역폭메모리(HBM) 수요가 폭증하면서 2026년 들어 반도체 주도의 가파른 랠리가 시작됐다. 5월 중순 코스피는 사상 처음 8000선을 돌파했다.`,
  players:`삼성전자와 SK하이닉스가 랠리를 주도하며 코스피 시총의 약 절반을 차지한다. 외국인 투자자와 연기금이 매수 주체이고, KB증권 등 증권사들은 목표치를 잇따라 상향 중이다. 한국은행은 기준금리 2.5%를 유지하고 있다.`,
  current:`미·이란 평화 기대로 유가·지정학 리스크가 줄면서 위험자산 선호가 살아나, 반도체 호황과 맞물려 지수가 단기간에 급등했다. 8000선 회복은 투자심리 회복의 신호로 읽힌다.`,
  outlook:`다음 주 미국 연준의 금리 결정과 미·이란 협정 서명 여부가 단기 방향을 좌우한다. 2분기 반도체 실적 발표와 HBM 가격 추이도 추가 상승의 관건이다.`,
  sources:[{title:`올해 90% 폭등해 8000 뚫은 코스피…1만 찍고 1만2천까지 간다? - 머니투데이`,url:`https://www.mt.co.kr/amp/stock/2026/05/15/2026051511060599435`},{title:`반도체는 건재하다 코스피 급반전…명목 성장률은 50년 만에 최고치 - MBC`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6828934_37004.html`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미·이란 평화 기대에 국제 유가 하락…글로벌 증시는 한 주 상승 마감 전망`,
  metrics:[`WTI 유가 배럴당 약 82.8달러`,`유가 전일 대비 약 2% 하락`],
  summary:`미국과 이란의 평화협정 임박 소식에 전쟁 프리미엄이 빠지면서 국제 유가가 하락했다. 6월 13일 기준 WTI 원유는 배럴당 82.8달러 안팎까지 내려, 전일 대비 약 2% 떨어진 85달러 부근에서 추가로 밀렸다. 협정이 체결되면 이란산 원유 제재가 풀리고 봉쇄됐던 호르무즈 해협이 다시 열릴 것이라는 기대가 공급 확대 전망으로 이어진 결과다. 미국 증시는 평화 기대감에 한 주를 상승세로 마칠 것으로 전망됐으나, 협정 서명 시점을 둘러싼 엇갈린 보도에 장중 변동성도 컸다. 시장은 다음 주 연방준비제도(연준)의 금리 결정과 소비자 물가·기대인플레이션 지표에 촉각을 곤두세우고 있다. 일부에서는 유가 부담 탓에 연준이 금리 인하 대신 동결 또는 인상을 택할 수 있다는 관측도 나온다. 국제에너지기구(IEA) 월간 보고서 발표도 유가 변동성을 키울 변수다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`페르시아만과 외부 바다를 잇는 좁은 길목으로, 전 세계 해상 원유 수송의 약 5분의 1이 지나간다. 이곳이 막히면 유가가 급등하고, 다시 열리면 공급 우려가 풀려 유가가 내린다.`}],
  history:`2026년 봄 미국이 이란을 상대로 해상 봉쇄에 나서면서 호르무즈 해협 통항이 막혔고, 유가가 급등했다. 트럼프 대통령은 4월부터 해협 재개방을 요구하며 최후통첩과 협상을 병행해왔다.`,
  players:`미국과 이란이 협상 당사자이고, 파키스탄이 중재 역할을 맡고 있다. G7 회원국인 영국·프랑스는 협정 후 기뢰 제거 지원에 관심을 보인다. 산유국과 글로벌 정유·해운 업계가 유가 향방에 직접 영향을 받는다.`,
  current:`협정 임박 소식으로 전쟁 프리미엄이 빠지며 유가가 안정세로 돌아섰고, 위험자산 선호가 살아나 증시가 반등했다. 다만 서명 시점이 불확실해 변동성이 크다.`,
  outlook:`주말 협정 서명 여부와 다음 주 연준 금리 결정이 유가·증시의 단기 방향을 정한다. IEA 보고서와 호르무즈 해협 재개통 진행 상황도 주시 대상이다.`,
  sources:[{title:`Stocks on Track for Positive Week Amid Peace Hopes - Schwab`,url:`https://www.schwab.com/learn/story/stock-market-update-open`},{title:`Trump denies Iran's account of deal terms - CNBC`,url:`https://www.cnbc.com/2026/06/12/iran-us-peace-memo-strait-hormuz-oil-sanctions.html`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`오픈AI, 역대 최대 1220억 달러 투자 유치…기업가치 8520억 달러로 평가`,
  metrics:[`조달액 1220억 달러`,`기업가치(밸류에이션) 8520억 달러`],
  summary:`오픈AI가 역대 최대 규모인 1220억 달러의 투자를 유치하며 기업가치를 8520억 달러로 인정받았다. 이번 라운드에는 아마존이 500억 달러, 엔비디아와 소프트뱅크가 각각 300억 달러를 투입한 것으로 알려졌다. 오픈AI의 월 매출은 26억 달러, 챗GPT 주간 활성 이용자는 9억 명에 달하며 회사는 연내 기업공개(IPO) 가능성도 내비쳤다. 이번 밸류에이션은 비상장 기업으로는 세계 최고 수준으로, AI 투자 열기가 여전히 식지 않았음을 보여준다. 오픈AI는 엔비디아와 별도 협력으로 최소 10기가와트 규모의 AI 데이터센터를 구축하기로 했고, 엔비디아는 최대 1000억 달러를 오픈AI에 투자할 계획이다. 막대한 자금이 데이터센터·반도체로 흘러가며 AI 인프라 투자 경쟁이 가열되고 있다. 동시에 천문학적 밸류에이션이 거품 논란을 키운다는 경계론도 나온다.`,
  keyTerms:[{term:`밸류에이션`,explanation:`기업의 가치를 돈으로 환산해 매긴 평가액을 말한다. 매출·이익·성장성 등을 따져 정하며, 이 값이 높을수록 시장이 그 회사의 미래를 크게 기대한다는 뜻이다.`}],
  history:`오픈AI는 2022년 챗GPT 공개 이후 빠르게 성장하며 마이크로소프트의 대규모 투자를 받았다. 이후 모델 고도화와 이용자 급증으로 기업가치가 해마다 수직 상승해왔다.`,
  players:`오픈AI를 중심으로 아마존·엔비디아·소프트뱅크 등 빅테크가 투자자로 참여했다. 엔비디아는 AI 칩 공급과 지분 투자를 함께 추진하며 생태계의 핵심 축이 됐다.`,
  current:`역대 최대 펀딩과 IPO 시사로 AI 산업의 자금 쏠림이 정점에 달했음을 보여준다. 데이터센터·메모리 수요 확대가 한국 반도체 기업에도 직접 영향을 준다.`,
  outlook:`연내 IPO 추진 여부와 10기가와트 데이터센터 건설 일정이 관전 포인트다. AI 매출 성장세가 밸류에이션을 정당화할 수 있을지가 거품 논란의 핵심이다.`,
  sources:[{title:`OpenAI and NVIDIA announce strategic partnership - Barchart`,url:`https://www.barchart.com/story/news/34958327/openai-and-nvidia-announce-strategic-partnership-to-deploy-10-gigawatts-of-nvidia-systems`},{title:`AI News Today - June 2026: Biggest Stories - Build Fast with AI`,url:`https://www.buildfastwithai.com/blogs/ai-news-today-june-7-2026`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`윤석열 전 대통령, 평양 무인기 침투 사건으로 징역 30년 선고`,
  metrics:[`징역 30년 선고`,`2024년 10월 무인기 침투 사건`],
  summary:`서울중앙지법은 6월 11일 윤석열 전 대통령에게 평양 상공 무인기 침투 사건과 관련해 징역 30년을 선고했다. 재판부는 윤 전 대통령이 2024년 12월 비상계엄 선포의 명분을 만들기 위해 그해 10월 북한에 군용 무인기를 보낸 작전에 처음부터 가담했다고 보고, 직권남용과 이적 행위 혐의를 유죄로 인정했다. 함께 기소된 김용현 전 국방장관에게도 같은 재판부가 형을 선고했다. 윤 전 대통령 측은 작전을 지시하거나 추인한 적이 없으며 계엄과 무관하다고 주장했으나 받아들여지지 않았다. 이미 구속 상태인 윤 전 대통령은 1심 판결에 항소할 수 있다. 앞서 그는 2024년 계엄 시도와 관련한 별도 재판에서도 중형을 선고받은 바 있다. 전직 대통령에 대한 거듭된 중형 선고로 정치권 후폭풍이 이어지고 있다.`,
  keyTerms:[{term:`이적 행위`,explanation:`적을 이롭게 하는 행위, 즉 국가 안보를 해치고 적국에 도움을 주는 범죄를 말한다. 군사 무인기를 북한에 보낸 작전이 국가 이익을 해쳤다고 본 것이 이번 유죄 판단의 핵심이다.`}],
  history:`윤석열 전 대통령은 2024년 12월 비상계엄을 선포했다가 곧바로 철회한 뒤 탄핵·파면됐다. 검찰은 계엄 선포의 명분을 만들기 위해 그해 10월 평양 무인기 침투가 동원됐다고 보고 수사를 확대했다.`,
  players:`윤 전 대통령과 김용현 전 국방장관이 핵심 피고인이다. 서울중앙지법이 재판을 맡았고, 북한은 당시 무인기 침투를 강하게 비난하며 군사적 긴장을 끌어올렸다.`,
  current:`전직 대통령에게 30년이라는 중형이 내려지며 사법적 단죄가 본격화됐다. 계엄과 무인기 작전의 연결고리가 법원에서 인정된 점이 분수령이다.`,
  outlook:`윤 전 대통령의 항소 여부와 2심 일정이 향후 핵심 변수다. 별도 계엄 재판의 상급심 결과와 맞물려 정치권 공방이 계속될 전망이다.`,
  sources:[{title:`Ex-South Korean President Yoon Suk Yeol sentenced to 30 years over Pyongyang drone plot - CNN`,url:`https://www.cnn.com/2026/06/11/asia/south-korean-yoon-suk-yeol-drone-case-jail-intl-hnk`},{title:`South Korea's ex-President Yoon gets 30 years over drone operation - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/6/12/south-koreas-ex-president-yoon-gets-30-years-over-drone-operation`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`트럼프, 미·이란 평화협정 일요일 서명 예고…호르무즈 해협 재개방 추진`,
  metrics:[`협정 서명 예고일 6월 14일(일)`,`G7 정상회의 6월 15~17일 개최`],
  summary:`트럼프 미국 대통령은 미·이란 간 평화협정이 6월 14일 일요일에 서명될 것이라고 밝혔다. 협정에는 봉쇄됐던 호르무즈 해협 재개방과 이란의 핵무기 개발 중단이 포함된 것으로 알려졌다. 다만 이란 외무부는 합의가 임박했음은 인정하면서도 서명 시점에 대해서는 신중한 입장을 보여 양측 발표가 엇갈렸다. 트럼프 대통령은 6월 15일 시작되는 G7 정상회의에서 해협의 기뢰 제거 방안을 논의할 예정이며, 영국·프랑스는 분쟁 종료 후 기뢰 제거 지원 의사를 밝혔다. 협상에는 파키스탄이 중재자로 깊숙이 관여하고 있다. 트럼프 대통령은 이란이 합의 내용을 왜곡하고 새 드론 공격을 감행했다며 강하게 비판하기도 했다. 협정이 실제 체결되면 수개월간 이어진 미·이란 군사 대치가 일단락된다.`,
  keyTerms:[{term:`기뢰 제거`,explanation:`바닷속에 설치된 폭발물인 기뢰를 안전하게 없애 배가 다닐 수 있게 만드는 작업이다. 봉쇄된 호르무즈 해협의 기뢰를 치워야 원유 수송선이 다시 오갈 수 있다.`}],
  history:`2026년 봄 미국의 해상 봉쇄로 호르무즈 해협이 막히며 미·이란 군사 긴장이 고조됐다. 트럼프 대통령은 해협 재개방을 요구하며 최후통첩과 단계적 휴전을 거쳐 협상에 나섰다.`,
  players:`미국과 이란이 당사자이고 파키스탄이 중재한다. G7 회원국, 특히 영국·프랑스가 기뢰 제거 지원을 검토하며, 이집트·사우디·카타르·UAE 정상도 G7 별도 세션에 초청됐다.`,
  current:`협정 문안이 사실상 타결됐다는 발표가 나오며 분쟁 종식이 가시권에 들어왔다. 서명 시점을 둘러싼 미·이란 간 온도차가 막판 변수다.`,
  outlook:`일요일 서명 성사 여부와 G7 정상회의에서의 기뢰 제거 합의가 최대 분수령이다. 호르무즈 해협 실제 재개통과 이란 핵 프로그램 검증 절차가 다음 관전 포인트다.`,
  sources:[{title:`Iran war: Trump says peace deal with Iran will be signed Sunday - NewsNation`,url:`https://www.newsnationnow.com/world/us-iran-peace-deal-final-text-agreed-upon/`},{title:`Trump to discuss Strait of Hormuz demining at G7 as confidence grows - Inquirer`,url:`https://www.inquirer.com/news/nation-world/iran-us-peace-deal-demine-strait-hormuz-g7-britain-france-ali-khamenei-funeral-20260613.html`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`G7 정상회의 15일 프랑스 에비앙 개막…이란·우크라이나 전쟁이 최대 의제`,
  metrics:[`6월 15~17일 에비앙 개최`,`G7 회원 7개국+EU 참가`],
  summary:`주요 7개국(G7) 정상회의가 6월 15일부터 17일까지 프랑스 알프스 휴양지 에비앙에서 열린다. 프랑스·영국·캐나다·독일·이탈리아·일본·미국 정상과 유럽연합(EU)이 참석하며, 중동과 우크라이나 두 전쟁이 회의를 지배할 전망이다. 이란 관련 세션에는 이집트·사우디아라비아·카타르·UAE 정상이 초청돼 호르무즈 해협 봉쇄와 미·이란 협상을 집중 논의한다. 우크라이나 전쟁도 가장 시급한 지정학 현안으로 다뤄지며 젤렌스키 대통령이 아웃리치 파트너로 참여한다. 이 밖에 경제성장, 공급망 회복력, 불법 이민, 인공지능도 핵심 의제로 올라 있다. 트럼프 대통령은 도착 직후 마크롱 프랑스 대통령과 회담한 뒤 정상 세션에 들어간다. 회원국 간 입장차가 커 합의 도출이 쉽지 않을 것이라는 관측도 나온다.`,
  keyTerms:[{term:`G7`,explanation:`미국·일본·독일·영국·프랑스·이탈리아·캐나다 등 주요 7개 선진국 모임이다. 세계 경제와 안보의 큰 방향을 함께 논의하고 조율하는 협의체로, 매년 정상회의를 연다.`}],
  history:`G7은 세계 주요 선진국이 경제·안보 현안을 조율하는 협의체로 매년 의장국이 정상회의를 주최한다. 올해는 프랑스가 의장국을 맡아 에비앙에서 회의를 연다.`,
  players:`미국·프랑스·영국·독일·이탈리아·일본·캐나다와 EU가 정회원이다. 올해는 중동 산유국과 우크라이나가 아웃리치 파트너로 초청돼 의제별 세션에 참여한다.`,
  current:`미·이란 평화협정 서명 직후 열리는 회의여서 호르무즈 해협 재개방과 기뢰 제거가 즉각적 의제로 떠올랐다. 우크라이나 전쟁 해법도 시급한 현안이다.`,
  outlook:`이란·우크라이나에 대한 공동성명 수위와 회원국 간 이견 조율이 관전 포인트다. AI·공급망 등 경제 의제에서의 합의 여부도 주목된다.`,
  sources:[{title:`Iran and Ukraine loom over G7 - Times of Israel`,url:`https://www.timesofisrael.com/iran-and-ukraine-loom-over-g7-as-france-hopes-trump-will-at-least-stay-for-duration/`},{title:`White House Says Iran, Ukraine High On Trump's G7 Agenda - RFE/RL`,url:`https://www.rferl.org/a/33779774.html`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`엔비디아, 컴퓨텍스서 AI PC용 신규 칩 공개…노트북에 온디바이스 AI 시대 연다`,
  metrics:[`AI PC 신제품 2026년 하반기 출시`,`엔비디아-SK하이닉스 차세대 메모리 협력`],
  summary:`엔비디아가 대만 컴퓨텍스에서 노트북과 데스크톱에 고성능 인공지능 기능을 넣을 수 있는 새 칩을 공개했다. 이 칩을 탑재한 마이크로소프트·델 등의 신형 PC가 2026년 하반기 출시될 예정으로, 온디바이스 AI가 일반 소비자 기기로 본격 확산되는 신호로 받아들여진다. 데이터센터에 집중됐던 AI 연산을 기기 자체에서 처리하면 속도와 보안, 개인정보 보호 면에서 이점이 크다. 엔비디아는 또 SK하이닉스와 다년간의 기술 협력을 맺고 차세대 메모리를 공동 개발하기로 했다. 이는 AI 인프라 로드맵에 맞춘 메모리 확보 전략으로, 한국 반도체 기업의 수혜가 예상된다. AI 칩 시장을 사실상 독점해온 엔비디아가 PC 영역까지 발을 넓히며 경쟁 구도가 재편되고 있다. 다만 AI PC 수요가 실제 판매로 이어질지는 검증 과제로 남아 있다.`,
  keyTerms:[{term:`온디바이스 AI`,explanation:`인터넷의 먼 서버를 거치지 않고 스마트폰·노트북 같은 기기 안에서 직접 AI 연산을 처리하는 방식이다. 응답이 빠르고 데이터를 외부로 보내지 않아 개인정보 보호에 유리하다.`}],
  history:`엔비디아는 AI 학습·추론용 GPU로 데이터센터 시장을 사실상 독점하며 급성장했다. 최근에는 클라우드를 넘어 개인 기기에서 AI를 구동하는 온디바이스 AI로 영역을 넓히고 있다.`,
  players:`엔비디아가 칩을 공급하고 마이크로소프트·델 등이 PC 제품을 내놓는다. SK하이닉스는 차세대 메모리 공동 개발 파트너로 참여해 AI 메모리 공급망의 핵심에 선다.`,
  current:`컴퓨텍스 신제품 공개로 AI 기능이 데이터센터에서 일반 PC로 내려오는 전환점이 마련됐다. 한국 메모리 업계에는 새 수요처가 생긴 셈이다.`,
  outlook:`하반기 AI PC 출시와 실제 판매 성과가 시장 확산의 가늠자다. 엔비디아-SK하이닉스 협력에서 나올 차세대 메모리 규격과 양산 시점도 관전 포인트다.`,
  sources:[{title:`Nvidia bets on AI personal computers with new chip powering Windows laptops - ABC News`,url:`https://abcnews.com/International/wireStory/nvidia-bets-ai-personal-computers-new-chip-powering-133478022`},{title:`Latest AI News and Breakthroughs - June 2026 - Crescendo`,url:`https://www.crescendo.ai/news/latest-ai-news-and-updates`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`과기정통부, AI 윤리원칙 전문가 자문단 발족…6월 제정 목표`,
  metrics:[`6월 13일 자문단 발족`,`AI 기본법 근거 6월 제정 목표`],
  summary:`과학기술정보통신부가 6월 13일 안전하고 신뢰할 수 있는 인공지능 사회를 만들기 위한 인공지능 윤리원칙 전문가 자문단을 발족했다. 인공지능 윤리원칙은 AI가 사회에 미칠 긍정·부정적 영향을 고려해 인간 중심적이고 책임 있는 AI 개발과 활용을 촉진하기 위한 규범으로, 인공지능 기본법에 따라 과기정통부가 관계부처 의견을 모아 제정해야 한다. 자문단은 정보통신정책연구원과 다양한 분야의 윤리 전문가로 구성됐다. 과기정통부는 자문단을 통해 다음 달 중순까지 초안을 마련하고, 이후 국민·기업·관계기관 의견 수렴 등 공론화를 거쳐 윤리원칙을 확정할 계획이다. 같은 날 과기정통부는 제13회 국가전략기술 특별위원회도 열어 범부처 차원의 전략기술 육성 과제를 점검했다. AI 기본법 시행을 앞두고 정부가 규범 정비에 속도를 내는 모습이다.`,
  keyTerms:[{term:`인공지능 윤리원칙`,explanation:`AI를 개발하고 사용할 때 지켜야 할 가치와 행동 기준을 정한 규범이다. 사람을 중심에 두고 차별·오용 같은 부작용을 막아 안전하고 책임 있는 AI를 만들기 위한 약속이다.`}],
  history:`한국은 AI 산업 육성과 안전을 함께 다루기 위해 인공지능 기본법을 제정했고, 이 법은 정부가 AI 윤리원칙을 마련하도록 규정했다. 앞서 5월 말 AI 개발 6대 원칙 초안이 공개 의견수렴을 거쳤다.`,
  players:`과학기술정보통신부가 주관하고 정보통신정책연구원과 학계·산업계 전문가들이 자문단을 구성했다. 향후 국민과 기업, 관계부처가 공론화 과정에 참여한다.`,
  current:`AI 기본법 시행을 앞두고 윤리원칙 제정이 본격화되는 시점이다. 자문단 발족으로 초안 마련 작업이 시작됐다.`,
  outlook:`다음 달 중순 초안 공개와 의견수렴 일정이 관전 포인트다. 6월 윤리원칙 확정 여부와 기업 현장에 적용될 구체적 기준이 주목된다.`,
  sources:[{title:`과기정통부, AI 윤리원칙 6월 제정…전문가 자문단 발족 - 대한민국 정책브리핑`,url:`https://www.korea.kr/news/policyNewsView.do?newsId=148960815&call_from=rsslink`},{title:`AI 개발시 지켜야 할 6대 원칙 나왔다…정부, 공개 의견수렴 - 머니투데이`,url:`https://www.mt.co.kr/tech/2026/05/28/2026052810145480413`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`2026 월드컵 개막…미국, 파라과이 4-1 완파하며 역대 최다 득점 기록`,
  metrics:[`미국 4-1 파라과이 승리`,`월드컵 단일 경기 미국 최다 4골`],
  summary:`북중미 공동 개최로 막을 올린 2026 FIFA 월드컵에서 미국이 6월 12일 조별리그 첫 경기에서 파라과이를 4-1로 완파했다. 로스앤젤레스 스타디움에서 열린 경기에서 미국은 전반 7분 상대 자책골로 앞서간 뒤, 발로건이 두 골을 몰아넣고 후반 레이나가 추가골을 터뜨렸다. 4골은 미국 남자 대표팀의 월드컵 단일 경기 최다 득점으로, 종전 최다였던 3골 기록을 넘어섰다. 핵심 공격수 풀리식은 두 차례 도움으로 초반 두 골을 만들고 전반에 교체됐다. 파라과이는 후반 73분 교체 투입된 마우리시오의 골로 한 점을 만회하는 데 그쳤다. 개최국 미국의 압도적 승리에 홈 관중이 열광했다. 미국은 D조에서 유리한 출발을 하며 조별리그 통과에 청신호를 켰다.`,
  keyTerms:[{term:`조별리그`,explanation:`월드컵 본선 첫 단계로, 팀들을 여러 조로 나눠 같은 조끼리 맞붙는 방식이다. 각 조 상위 팀이 다음 토너먼트(16강)로 올라가기 때문에 초반 승리가 매우 중요하다.`}],
  history:`2026 월드컵은 미국·캐나다·멕시코가 공동 개최하는 사상 첫 3개국 공동 대회이자, 본선 참가국이 48개국으로 늘어난 첫 대회다. 미국은 개최국 자격으로 본선에 직행했다.`,
  players:`개최국 미국이 풀리식·발로건·레이나 등을 앞세워 우승 후보들과 경쟁한다. 첫 상대 파라과이는 남미 강호로 꼽혔으나 미국에 완패했다.`,
  current:`개막전 대승으로 미국이 조별리그 통과의 기세를 잡았다. 자국 개최 분위기 속 흥행에도 청신호가 켜졌다.`,
  outlook:`미국의 D조 잔여 경기 결과와 16강 진출 여부가 다음 관전 포인트다. 다른 우승 후보들의 개막전 성적과 대회 흥행 추이도 주목된다.`,
  sources:[{title:`USA 4-1 Paraguay Final Score - ESPN`,url:`https://www.espn.com/soccer/match/_/gameId/760417/paraguay-united-states`},{title:`The U.S. dazzles in its World Cup opener, dominating Paraguay 4-1 - NPR`,url:`https://www.npr.org/2026/06/12/nx-s1-5850736/2026-world-cup-usmnt-paraguay`}]
}]
},{
  tag:`2026-06-13`,
  label:`2026년 6월 13일 (토요일)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피, 이란 종전 기대·반도체 질주에 4.63% 급등하며 8,100선 회복`,
  metrics:[`코스피 8,123.62 마감 (+4.63%)`,`외국인 코스피 약 2조2,000억원 순매수`],
  summary:`12일 코스피가 전 거래일보다 4.63% 오른 8,123.62로 마감하며 8,100선을 회복했다. 미국과 이란의 종전 협상이 최종 조율 단계에 이르렀다는 기대감이 위험자산 선호를 자극했고, 25거래일 만에 돌아온 외국인이 지수 상승을 견인했다. 외국인은 이날 코스피에서 약 2조2,000억원을 순매수했으며, 특히 삼성전자를 8,240억원, SK하이닉스를 1조2,850억원어치 사들였다. 관세청 집계상 6월 1~10일 반도체 수출이 전년 동기 대비 205.8% 급증하며 펀더멘털도 뒷받침했다. 노무라증권은 반도체 슈퍼사이클이 아직 초입 단계라며 한국 증시 강세를 전망했다. 시장에서는 명목 성장률이 50년 만에 최고치를 기록했다는 분석도 나왔다. 다만 종전 협상의 불확실성이 여전해 단기 변동성 확대 가능성은 남아 있다. 환율은 원·달러 1,518원대에서 움직였다.`,
  keyTerms:[{term:`반도체 슈퍼사이클`,explanation:`반도체 수요가 여러 해에 걸쳐 길고 강하게 늘어나는 호황 국면을 말한다. AI 투자 확대로 메모리·시스템 반도체 가격과 수출이 동반 상승하면서 한국 증시의 핵심 상승 동력이 되고 있다.`}],
  history:`코스피는 2025년 이후 AI·반도체 투자 붐을 타고 가파르게 상승해 사상 처음 8,000선을 돌파했다. 그러나 2026년 들어 미국의 관세 압박과 이란을 둘러싼 전쟁 리스크가 겹치며 변동성이 커졌다. 외국인은 한동안 순매도로 돌아서며 지수 급락을 유발하기도 했다.`,
  players:`삼성전자와 SK하이닉스가 시가총액 상위를 차지하며 지수 방향을 좌우한다. 외국인 투자자와 연기금·기관이 수급의 핵심이며, 미국 연준의 금리 결정과 글로벌 AI 투자 사이클이 외부 변수로 작용한다. 노무라 등 외국계 증권사의 전망도 투자심리에 영향을 준다.`,
  current:`이란 종전 기대로 유가·전쟁 리스크가 완화되자 위험자산 선호가 살아나며 외국인이 대규모로 복귀했다. 반도체 수출 급증이 실적 기대를 키우며 지수가 하루 만에 급락분을 되돌렸다.`,
  outlook:`6월 17일 미국 연준의 금리 결정과 미·이란 협상 타결 여부가 단기 분수령이다. 반도체 수출 지표와 외국인 수급 지속성이 9,000선 안착의 관건이다.`,
  sources:[{title:`외국투자자 한달여만에 컴백 … 반도체 투톱 2조 폭풍 쇼핑 - 매일경제`,url:`https://v.daum.net/v/20260612175700375`},{title:`반도체 질주에 코스피 급락분 회복…변동성 관건 - 머니투데이`,url:`https://www.mt.co.kr/amp/stock/2026/06/11/2026061111564123616`},{title:`반도체는 건재하다 코스피 급반전‥명목 성장률은 50년 만에 최고치 - MBC`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6828934_37004.html`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미국 5월 물가 4.2%로 3년 만에 최고…연준 금리 인상 논쟁 재점화`,
  metrics:[`5월 CPI 전년비 4.2% (2023년 4월 이후 최고)`,`근원물가 2.9%, 에너지 +23.5%`],
  summary:`미국의 5월 소비자물가지수(CPI)가 전년 동월 대비 4.2% 상승해 2023년 4월 이후 약 3년 만의 최고치를 기록했다. 4월의 3.8%에서 한 달 만에 다시 뛰어오른 것으로, 이란 분쟁발 에너지 충격으로 에너지 비용이 23.5% 급등한 영향이 컸다. 변동성이 큰 식품·에너지를 뺀 근원물가도 2.9%로 올라 물가 압력이 광범위해지고 있음을 시사했다. 연방준비제도(연준)는 2025년 12월 이후 기준금리를 연 3.5~3.75%로 동결해 왔다. 이번 물가 지표로 2023년 7월 이후 첫 금리 인상 가능성까지 거론되며 시장의 긴장이 커졌다. 선물시장은 10월까지 금리 인상 확률을 약 38.9%로 반영하기 시작했다. 다음 회의는 6월 17일로 예정돼 있으며 동결이 유력하나 매파적 신호가 나올 수 있다. 물가가 잡히지 않으면 글로벌 자금 흐름과 신흥국 통화에 압박이 커진다.`,
  keyTerms:[{term:`기준금리`,explanation:`중앙은행이 정하는 정책금리로, 시중 대출·예금 금리의 기준이 된다. 물가가 오르면 중앙은행은 금리를 올려 돈을 빌리기 어렵게 만들어 소비·물가를 억제하려 한다.`}],
  history:`미국 물가는 2022년 9%대까지 치솟은 뒤 연준의 고강도 긴축으로 둔화됐다. 그러나 2026년 이란 사태로 유가가 급등하면서 에너지 주도의 물가 재상승이 시작됐다. 연준은 2025년 말부터 금리를 동결하며 상황을 관망해 왔다.`,
  players:`연준 의장과 연방공개시장위원회(FOMC) 위원들이 금리를 결정한다. 백악관은 금리 인하를 압박해 왔고, 채권시장과 달러 가치, 신흥국 중앙은행들이 연준의 결정에 직접 영향을 받는다.`,
  current:`에너지발 물가 충격이 근원물가로 번지며 인플레이션 둔화 추세가 꺾였다. 동결 기조를 유지해 온 연준이 인상으로 선회할지가 핵심 쟁점으로 떠올랐다.`,
  outlook:`6월 17일 FOMC 회의에서의 점도표와 의장 발언이 향후 금리 경로의 가늠자다. 이란 사태에 따른 유가 향방이 물가의 추가 방향을 좌우한다.`,
  sources:[{title:`CPI inflation report May 2026: Prices rose 4.2% annually - CNBC`,url:`https://www.cnbc.com/2026/06/10/cpi-inflation-report-may-2026.html`},{title:`US Inflation Hits 4.2% in May, Highest in Three Years - Informed Clearly`,url:`https://informedclearly.com/en/economy/54915/us-inflation-42-percent-may-2026`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`이란 사태 장기화에 국제유가 고공행진…호르무즈 봉쇄로 공급 불안`,
  metrics:[`브렌트유 최고 약 120달러 (전쟁 후 +55%)`,`호르무즈 해협, 세계 원유 약 20% 통과`],
  summary:`이란을 둘러싼 전쟁이 길어지면서 국제유가가 고공행진을 이어가고 있다. 브렌트유는 2월 말 배럴당 약 72달러에서 한때 120달러 가까이 치솟아 전쟁 발발 이후 55% 넘게 급등했다. 3월 한 달에만 51% 오르며 역대급 월간 상승률을 기록하기도 했다. 가격 급등의 핵심은 세계 원유의 약 20%가 지나는 호르무즈 해협의 수송 차질 우려다. 미군이 이란 소형 선박을 격침하고 이란이 상선·UAE를 공격하면서 봉쇄 위기가 반복됐다. 4월 말 서부텍사스산원유(WTI)는 106달러대, 브렌트유는 118달러대까지 올랐다. 이는 미국의 5월 물가를 3년 만의 최고로 끌어올린 직접적 원인이 됐다. 다만 미·이란 종전 협상 기대가 커지며 유가가 진정될 수 있다는 관측도 나온다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`페르시아만과 외해를 잇는 좁은 길목으로, 세계 원유의 약 5분의 1이 이곳을 통해 운송된다. 이 길이 막히면 원유 공급이 끊겨 국제유가가 급등하기 때문에 분쟁 때마다 세계 경제의 최대 뇌관이 된다.`}],
  history:`2026년 초 미국·이스라엘과 이란의 군사 충돌이 본격화되며 중동 정세가 급격히 악화됐다. 이란은 호르무즈 해협 봉쇄를 위협 카드로 활용해 왔고, 미군은 이를 막기 위해 군사 대응에 나섰다. 그 결과 유가가 단기간에 폭등했다.`,
  players:`산유국 이란과 미국·이스라엘이 군사적으로 충돌하고 있으며, UAE 등 걸프 산유국이 위협에 노출돼 있다. 원유 수입 의존도가 높은 한국·일본 등 아시아 국가들이 유가 급등의 직접적 타격을 받는다.`,
  current:`호르무즈 수송 차질이 반복되며 공급 불안이 유가를 떠받치고 있다. 종전 협상 기대가 유가의 추가 급등을 일부 진정시키는 변수로 떠올랐다.`,
  outlook:`미·이란 협정 타결 여부가 유가 방향의 최대 변수다. 호르무즈 해협의 실제 봉쇄 여부와 산유국의 증산 결정이 단기 가격을 좌우한다.`,
  sources:[{title:`A timeline of how the Iran war shook oil prices — and what comes next - CNBC`,url:`https://www.cnbc.com/2026/04/21/oil-price-iran-war-middle-east.html`},{title:`Oil prices surge as violence flares in Strait of Hormuz - Al Jazeera`,url:`https://www.aljazeera.com/economy/2026/5/5/oil-prices-surge-as-violence-flares-in-strait-of-hormuz`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`트럼프, 대이란 공습 전격 취소…종전 협정 임박 시사에 이란은 신중`,
  metrics:[`예정된 대이란 공습 취소`,`주말 내 협정 서명 가능성 시사`],
  summary:`도널드 트럼프 미국 대통령이 11일 예정돼 있던 대이란 공습을 전격 취소하고 양국이 종전 협정에 매우 근접했다고 밝혔다. 트럼프는 트루스소셜에 이란 최고지도부 차원에서 논의가 승인됐다며 이번 저녁 공습을 취소했다고 적었다. 그는 협정이 이르면 이번 주말 안에 서명될 수 있다고도 했다. 그러나 이란 외무부 대변인 에스마일 바그하이는 합의 타결 보도가 단지 추측일 뿐이라며 최종 결정을 내리지 않았다고 반박했다. 트럼프는 12일에는 이란이 흘린 협정안 내용이 실제 합의와 무관하다고 일축하며 혼선을 더했다. 양측이 합의 내용을 두고 상반된 주장을 펴면서 실제 타결 여부는 여전히 불투명하다. 이번 발표만으로도 국제유가와 글로벌 증시는 위험자산 선호로 크게 반응했다. 합의가 무산되면 군사 충돌이 재개될 수 있어 긴장이 지속되고 있다.`,
  keyTerms:[{term:`종전 협정`,explanation:`전쟁을 멈추기로 당사국들이 공식 합의하는 문서다. 단순 휴전과 달리 적대행위 종료와 후속 조건을 담으며, 서명·이행 단계에서 양측의 해석 차이로 다시 틀어지는 경우가 많다.`}],
  history:`2026년 초 미국·이스라엘과 이란의 충돌이 전면전 양상으로 번지며 중동이 전쟁 위기에 휩싸였다. 트럼프 행정부는 이란에 강경 압박과 협상을 병행해 왔다. 수개월간 공습 위협과 외교가 교차했다.`,
  players:`트럼프 대통령과 이란 최고지도부, 이스라엘이 핵심 당사자다. 이란 외무부는 협상 창구를 맡고 있으며, 걸프 국가들과 국제사회가 중재·관망하고 있다. 유가와 글로벌 증시도 협상 결과에 직접 연동된다.`,
  current:`트럼프가 공습을 취소하고 협정 임박을 선언했지만 이란은 신중한 태도를 보이며 양측 주장이 엇갈린다. 합의 직전의 불확실성이 최고조에 달한 분수령 국면이다.`,
  outlook:`주말로 거론된 협정 서명이 실제 이뤄질지가 최대 관전 포인트다. 협상 결렬 시 군사 충돌 재개와 유가 재급등 위험이 다시 부각된다.`,
  sources:[{title:`Trump cancels further strikes on Iran, announcing peace deal is imminent - NPR`,url:`https://www.npr.org/2026/06/12/nx-s1-5855326/trump-cancels-further-strikes-on-iran-announcing-peace-deal-is-imminent`},{title:`Trump Says Iran's Leaked Peace Deal Terms Have No Relation to the Truth - TIME`,url:`https://time.com/article/2026/06/12/trump-us-iran-peace-deal-details-timeline-conflicting-reports/`},{title:`June 11, 2026 — Trump cancels planned strikes and touts progress - CNN`,url:`https://www.cnn.com/2026/06/11/world/live-news/iran-war-trump-israel-hnk`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`영국 국방장관 힐리 사임…노동당 정부 국방예산 충분치 않다 비판`,
  metrics:[`존 힐리 국방장관 사임`,`국방비 GDP 2.5% 목표(2027년)도 부족 비판`],
  summary:`존 힐리 영국 국방장관이 사임했다고 발표했다. 그는 노동당 정부의 군사 예산이 런던이 직면한 국제적 도전에 대응하기에 크게 부족하다고 지적했다. 영국은 국방비를 2027년까지 국내총생산(GDP)의 2.5%로 끌어올리겠다고 약속해 왔으나, 힐리는 이마저도 충분치 않다는 입장을 밝혔다. 이란 사태와 유럽 안보 위기가 겹친 가운데 나온 사임이어서 파장이 크다. 국방 책임자의 사퇴는 키어 스타머 총리의 노동당 정부에 정치적 부담을 안긴다. 안보 투자 확대를 둘러싼 정부 내 갈등이 표면화한 셈이다. 후임 인선과 추가 국방비 증액 논의가 즉각적 과제로 떠올랐다. 유럽 각국이 방위비를 늘리는 흐름 속에서 영국의 대응 수위가 시험대에 올랐다.`,
  keyTerms:[{term:`국방예산`,explanation:`한 나라가 군대 운영과 무기 도입 등에 쓰기로 정한 예산이다. 보통 GDP 대비 비율로 표시하며, 이 비율을 얼마로 올릴지가 안보 위기 때마다 정치적 쟁점이 된다.`}],
  history:`영국은 러시아·우크라이나 전쟁과 중동 위기 이후 국방비 증액 압박을 받아 왔다. 노동당 정부는 2027년까지 GDP 2.5% 목표를 제시했다. 그러나 안보 환경 악화로 더 빠른 증액을 요구하는 목소리가 커졌다.`,
  players:`키어 스타머 총리의 노동당 정부와 사임한 존 힐리 국방장관이 중심에 있다. 미국·나토 동맹과 유럽 국가들이 영국의 방위비 수준을 주시한다. 이란 사태로 군사적 부담이 가중된 상태다.`,
  current:`국방 수장의 사임으로 안보 투자를 둘러싼 정부 내 균열이 드러났다. 국방예산 증액의 속도와 규모가 핵심 쟁점으로 부상했다.`,
  outlook:`후임 국방장관 인선과 추가 증액 발표 시점이 관전 포인트다. 노동당 정부의 안보 정책 신뢰도가 시험대에 오를 전망이다.`,
  sources:[{title:`World News Headlines: UK Defence Minister Healey resigns - US News and World Report`,url:`https://www.usnews.com/news/world`},{title:`Global Developments on June 12, 2026 - Everything Briefing`,url:`https://everythingbriefing.substack.com/p/june-12-2026`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이재명 정부·여당, 방송3법 등 쟁점 법안 국회 본회의 처리 추진`,
  metrics:[`민주당 단독 과반 의석(약 170석)`,`방송3법 등 쟁점 법안 본회의 상정`],
  summary:`집권 2년 차를 맞은 이재명 정부와 더불어민주당이 방송3법을 비롯한 쟁점 법안의 국회 본회의 처리를 강하게 밀어붙이고 있다. 방송3법은 방송 지배구조를 바꾸는 핵심 개혁 법안으로, 과학기술정보방송통신위원회와 법제사법위원회를 거쳐 본회의 처리만 남겨둔 상태로 전해졌다(추정). 22대 국회는 민주당이 단독 과반에 가까운 의석을 차지한 여대야소 구도여서 여당이 입법 주도권을 쥐고 있다. 앞서 정부·여당은 사법개혁 3법을 처리하며 사법체계 재편에 나선 바 있다. 야당은 방송 장악 우려를 들어 강하게 반발하고 있어 극한 대치가 이어지고 있다. 정부는 올해를 AI 대전환의 원년으로 삼고 확장 재정과 개혁 입법을 병행하겠다는 구상이다. 이번 입법 드라이브는 집권 2년 차 국정 동력 확보의 시험대로 평가된다. 다만 6월 12일 본회의의 구체적 처리 내역은 확인이 더 필요하다.`,
  keyTerms:[{term:`방송3법`,explanation:`공영방송의 이사회 구성 등 지배구조를 바꾸는 3개 법안(방송법·방송문화진흥회법·한국교육방송공사법 개정안)을 묶어 부르는 말이다. 누가 방송사 경영진을 정하느냐를 둘러싼 여야의 대표적 쟁점 법안이다.`}],
  history:`방송3법은 공영방송의 정치적 독립성을 명분으로 여러 차례 발의됐으나 정권마다 여야가 뒤바뀌며 처리와 거부가 반복됐다. 2024년 총선에서 민주당이 압승하며 여대야소 구도가 형성됐다. 2026년 이재명 정부 출범 이후 개혁 입법이 본격화됐다.`,
  players:`이재명 대통령과 더불어민주당이 입법을 주도하고 있으며, 야당은 방송 장악 우려를 들어 반대한다. 방송사 구성원과 언론단체, 미디어 학계도 이해관계가 엇갈린다.`,
  current:`여당이 과반 의석을 앞세워 본회의 처리를 시도하면서 여야 대치가 극한으로 치닫고 있다. 사법개혁에 이은 방송 개혁 입법이 집권 2년 차 국정의 분수령이 되고 있다.`,
  outlook:`본회의 표결 일정과 야당의 필리버스터(무제한토론) 대응 여부가 관건이다. 통과 시 공영방송 이사회 재구성을 둘러싼 후속 갈등이 예상된다.`,
  sources:[{title:`[2026 신년특집] 이재명 정부 2년차 국정 운영 방향은? - 기호일보`,url:`https://www.kihoilbo.co.kr/news/articleView.html?idxno=3008737`},{title:`방송3법 개정은 더 이상 미룰 수 없는 약속 - 민주언론시민연합`,url:`https://www.ccdm.or.kr/340433`},{title:`[2025결산] 여야 뒤바뀐 여의도…일상화한 극한대치 - 연합뉴스`,url:`https://news.nate.com/view/20251217n03136`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`2026 북중미 월드컵 개막…멕시코 개막전 승리, 한국은 체코 꺾고 첫 승`,
  metrics:[`멕시코 2-0 남아공 (개막전, 레드카드 3장 최다 기록)`,`한국, 체코 꺾고 승리`],
  summary:`캐나다·멕시코·미국이 공동 개최하는 2026 북중미 월드컵이 11일 멕시코시티에서 화려하게 막을 올렸다. 개막전이 열린 에스타디오 아스테카에서 멕시코가 남아공을 2-0으로 꺾었고, 훌리안 키뇨네스와 라울 히메네스가 득점했다. 이 경기에서는 레드카드가 무려 3장 나오며 월드컵 한 경기 최다 퇴장 기록이 세워졌다. 개막식에는 샤키라, 안드레아 보첼리, J 발빈 등이 출연해 라틴 음악 축제를 펼쳤다. 같은 날 한국 대표팀은 체코를 꺾고 값진 승리를 거두며 산뜻하게 대회를 시작했다. 다만 일부 도시에서는 긴장이 고조되며 행사 차질 우려도 제기됐다. FIFA는 마이애미 공항에서 11시간 억류됐다고 주장한 한 선수가 대회에 참가하지 않는다고 확인했다. 48개국으로 확대된 첫 대회인 만큼 규모와 일정 모두 역대 최대다.`,
  keyTerms:[{term:`북중미 월드컵`,explanation:`캐나다·멕시코·미국 3개국이 함께 여는 2026년 FIFA 월드컵을 가리킨다. 본선 참가국이 32개국에서 48개국으로 처음 늘어난 역대 최대 규모 대회다.`}],
  history:`2026 월드컵은 사상 처음 3개국이 공동 개최하고 본선이 48개국으로 확대된 대회다. 개최지와 확대 방식은 2017년 전후 FIFA가 결정했다. 멕시코 에스타디오 아스테카는 세 번째 월드컵 개막전을 치르는 상징적 경기장이다.`,
  players:`개최국 멕시코·미국·캐나다와 48개 본선 진출국이 경쟁한다. 한국 대표팀도 본선에 올라 첫 경기에서 체코를 상대했다. FIFA가 대회 운영을 총괄하며 각국 정부가 보안을 지원한다.`,
  current:`개막전 멕시코의 승리와 한국의 첫 승으로 대회가 출발했지만, 일부 지역의 긴장과 입국 논란이 변수로 떠올랐다. 확대된 규모만큼 운영·안전 관리가 시험대에 올랐다.`,
  outlook:`한국의 다음 조별리그 경기 결과와 16강 진출 가능성이 국내 최대 관심사다. 개최 도시의 치안과 행사 운영이 대회 흥행을 좌우할 전망이다.`,
  sources:[{title:`World Cup highlights: Mexico defeats South Africa 2-0 in opening match - CNN`,url:`https://www.cnn.com/2026/06/11/sport/live-news/world-cup-mexico-south-africa`},{title:`South Korea defeats Czechia after Mexico's victory: World Cup results - NBC News`,url:`https://www.nbcnews.com/sports/soccer/live-blog/fifa-world-cup-2026-opening-ceremonies-june-11-live-updates-rcna349400`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`엔비디아 젠슨 황 방한…AI 공급망 조율·한국 피지컬 AI 협력 강조`,
  metrics:[`젠슨 황 CEO 방한 (대만 GTC 직후)`,`차세대 베라 루빈 본격 양산 돌입`],
  summary:`엔비디아의 젠슨 황 최고경영자(CEO)가 대만 GTC와 컴퓨텍스 일정을 마친 뒤 서울을 찾았다. 그는 하반기 대규모 AI 인프라 구축을 앞두고 AI 공급망을 조율하는 것이 방한의 핵심 목적이라고 밝혔다. 엔비디아는 차세대 그레이스 블랙웰 시스템이 호조를 보이는 가운데 베라 루빈이 본격 양산에 들어갔다고 전했다. 데이터센터용 베라 CPU도 본격 생산에 돌입했으며 초기 고객으로 앤스로픽, 오픈AI, 스페이스X 등이 거론된다. 황 CEO는 로보틱스와 피지컬 AI 분야에서 한국의 잠재력이 막대하다고 평가했다. 한국 정부도 의료 AI와 피지컬 AI 인재 양성 등 국가 차원의 AI 전략을 추진 중이다. 메모리 반도체를 공급하는 삼성전자·SK하이닉스와의 협력이 한층 중요해졌다. AI 인프라 투자 사이클이 한국 반도체·증시의 핵심 동력으로 부상하고 있다.`,
  keyTerms:[{term:`피지컬 AI`,explanation:`화면 속 소프트웨어를 넘어 로봇·자율주행처럼 현실의 물리 세계에서 움직이며 일하는 인공지능을 말한다. 엔비디아는 이를 차세대 핵심 분야로 보고 제조 강국인 한국과의 협력을 강조하고 있다.`}],
  history:`엔비디아는 AI 가속기 시장을 사실상 독점하며 2020년대 AI 붐의 중심에 섰다. 그레이스 블랙웰에 이어 베라 루빈으로 제품 세대를 잇따라 교체하고 있다. 한국 기업은 고대역폭메모리(HBM) 공급으로 이 생태계의 핵심 파트너가 됐다.`,
  players:`젠슨 황의 엔비디아와 메모리를 공급하는 삼성전자·SK하이닉스가 핵심 축이다. 앤스로픽·오픈AI 등 AI 기업이 주요 고객이며, 한국 정부는 AI 전략으로 산업 육성에 나서고 있다.`,
  current:`황 CEO의 방한은 하반기 대규모 AI 인프라 투자를 앞둔 공급망 점검 성격이 짙다. 피지컬 AI를 고리로 한국과의 협력이 한층 구체화되는 국면이다.`,
  outlook:`베라 루빈 양산 속도와 HBM 수요 확대가 한국 반도체 실적의 가늠자다. 한국 정부의 AI 인프라·인재 정책 구체화 여부가 후속 관전 포인트다.`,
  sources:[{title:`서울의 비전: NVIDIA와 한국이 함께 여는 AI의 미래 - NVIDIA Blog Korea`,url:`https://blogs.nvidia.co.kr/blog/korea-ecosystem-2026/`},{title:`Nvidia unveils new chip to bring AI directly to personal computers - Al Jazeera`,url:`https://www.aljazeera.com/economy/2026/6/1/nvidia-unveils-new-chip-to-bring-ai-directly-to-personal-computers`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`북아일랜드 이틀째 폭력 시위…벨파스트 흉기 사건이 반이민 시위로 번져`,
  metrics:[`이틀째 폭력 시위 지속`,`벨파스트 흉기 사건이 발단`],
  summary:`영국 북아일랜드에서 이틀째 폭력 시위가 이어졌다. 시위대는 작은 불을 지르고 경찰을 향해 벽돌과 병을 던졌다. 이번 사태는 벨파스트에서 발생한 흉기 사건이 발단이 됐다. 사건을 계기로 반이민 폭력 시위가 분출하며 격화됐다. 경찰은 진압에 나섰지만 충돌이 반복되며 부상자와 재산 피해가 잇따랐다. 유럽 곳곳에서 이민 문제를 둘러싼 갈등이 고조되는 가운데 나온 사건이어서 파장이 크다. 당국은 추가 폭력 확산을 막기 위해 경계를 강화하고 있다. 사회 통합과 치안 유지가 영국 정부의 시급한 과제로 떠올랐다.`,
  keyTerms:[{term:`반이민 폭력 시위`,explanation:`이민자 유입에 반대하는 정서가 폭력적 행동으로 분출하는 시위를 말한다. 특정 사건을 계기로 군중이 이민자나 공권력을 겨냥해 방화·투석 등으로 번지는 경우가 많다.`}],
  history:`북아일랜드는 종파·정치 갈등의 오랜 역사를 가진 지역으로 폭력 시위에 취약하다. 최근 유럽 전역에서 이민자 유입을 둘러싼 사회 갈등이 커져 왔다. 특정 강력사건이 반이민 시위의 도화선이 되는 사례가 반복되고 있다.`,
  players:`시위대와 북아일랜드 경찰(PSNI)이 직접 충돌하고 있으며, 영국 정부와 지역 정치권이 사태 수습 책임을 진다. 이민자 공동체가 폭력의 표적이 되고 있다.`,
  current:`흉기 사건을 계기로 반이민 정서가 폭발하며 이틀째 폭력이 이어지는 위기 국면이다. 치안 불안과 사회 분열이 동시에 부각되고 있다.`,
  outlook:`당국의 추가 진압과 체포 규모, 폭력의 확산 여부가 관건이다. 이민 정책을 둘러싼 영국 내 정치 논쟁이 더욱 거세질 전망이다.`,
  sources:[{title:`Global Developments on June 12, 2026: Northern Ireland protests - Everything Briefing`,url:`https://everythingbriefing.substack.com/p/june-12-2026`},{title:`World News and International Headlines - NPR`,url:`https://www.npr.org/sections/world/`}]
}]

  tag:`2026-06-12`,
  label:`2026년 6월 12일 (금)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`유럽중앙은행, 2023년 이후 첫 금리 인상…중동 전쟁발 물가에 예금금리 2.25%로 올려`,
  metrics:[`기준 예금금리 2.25% (25bp 인상)`,`유로존 5월 물가상승률 3.2%`],
  summary:`유럽중앙은행(ECB)이 6월 11일 통화정책회의에서 기준 예금금리를 0.25%포인트 올린 2.25%로 결정하며 2023년 이후 약 3년 만에 첫 금리 인상에 나섰다. 이번 인상은 중동 전쟁과 호르무즈 해협의 원유 수송 차질로 에너지 가격이 급등하면서 유로존 물가가 다시 치솟은 데 따른 대응이다. 유로존 5월 소비자물가 상승률은 3.2%로 ECB 목표치 2%를 크게 웃돌았고, 근원물가도 4월 2.2%에서 5월 2.5%로 올랐다. ECB는 올해 유로존 물가 전망치를 평균 3%로 상향하고, 2027년 2.3%, 2028년 2%로 점차 안정될 것으로 봤다. 반면 성장률 전망은 2026년 0.8%로 낮춰 잡아 경기 둔화 우려를 함께 드러냈다. ECB는 중동 전쟁이 인플레이션 압력을 만들고 있으며 이번 결정이 여러 시나리오에 걸쳐 견고하다고 설명했다. 시장의 관심은 추가 인상 여부와 함께 6월 16~17일 미국 연방공개시장위원회(FOMC) 회의로 이동하고 있다.`,
  keyTerms:[{term:`금리 인상`,explanation:`중앙은행이 기준금리를 올리는 것. 돈을 빌리는 비용이 커져 시중에 도는 돈이 줄고, 물가 상승(인플레이션)을 누르는 효과가 있다.`}],
  history:`ECB는 2022~2023년 고물가에 맞서 공격적으로 금리를 올린 뒤 2024~2025년에는 물가가 안정되며 인하 또는 동결 기조를 유지해 왔다. 그러나 2026년 2월 발발한 중동 전쟁으로 에너지 가격이 급등하면서 물가가 다시 튀어 올랐다.`,
  players:`크리스틴 라가르드 ECB 총재가 이끄는 정책위원회가 결정 주체이며, 독일·프랑스·이탈리아·스페인 등 유로존 20개국이 영향을 받는다. 미국 연준, 일본은행 등 주요국 중앙은행의 통화정책 방향과도 맞물려 있다.`,
  current:`오랜 인하 기대를 뒤집은 인상 전환이라는 점에서 글로벌 금융시장에 충격을 줬다. 전쟁발 공급 충격이 물가를 자극하는 가운데 경기까지 둔화돼 중앙은행이 진퇴양난에 빠진 국면이다.`,
  outlook:`6월 16~17일 미국 FOMC와 6월 16일 일본은행 회의가 줄줄이 예정돼 주요국 금리 향방이 분수령이다. 중동 전쟁과 유가 흐름이 향후 ECB 추가 인상 여부를 좌우할 변수다.`,
  sources:[{title:`ECB hikes interest rates for first time since 2023 as Iran war ramps up energy costs - CNBC`,url:`https://www.cnbc.com/amp/2026/06/11/ecb-hikes-interest-rates.html`},{title:`European Central Bank Raises Interest Rates and Lifts Inflation Forecasts - Morningstar`,url:`https://www.morningstar.com/economy/european-central-bank-raises-interest-rates-lifts-inflation-forecasts`},{title:`ECB set for first interest-rate hike, with markets wondering if more will come - FXStreet`,url:`https://www.fxstreet.com/news/european-central-bank-set-to-hike-interest-rates-for-first-time-in-nearly-three-years-202606110700`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`반도체주 폭락에 코스피 급락·원/달러 환율 1,560원 돌파…검은 월요일 공포 확산`,
  metrics:[`코스피 8,160.59 (-5.54%)`,`원/달러 환율 야간 1,562.47원`],
  summary:`AI 관련 기술주와 반도체 종목이 급락하면서 국내 증시가 휘청이고 원/달러 환율이 급등해 금융시장 불안이 커지고 있다. 6월 5일 코스피는 전 거래일보다 478.82포인트(5.54%) 내린 8,160.59에, 코스닥은 4.50% 내린 1,002.44에 마감하며 검은 금요일이라 불렸고, 필라델피아 반도체지수는 하루 10.26% 폭락했다. 미국 5월 비농업 고용이 17만2천명 늘며 시장 전망(8만명)을 크게 웃돌자 연준의 금리 인상 가능성이 부각되며 투자심리가 급격히 얼어붙었다. 원/달러 환율은 장중 1,549원까지 오른 뒤 야간시장에서 1,562.47원까지 치솟았고, 원-유로 환율은 17년 만에 1,800원을 돌파했다. 6월 11일에는 오라클 실적 발표로 AI 투자 피크아웃 우려가 재점화될 수 있다는 경계감이 컸고, 이날은 한국 선물·옵션 동시 만기일이기도 했다. 시장에서는 다음 거래일 추가 급락, 이른바 검은 월요일 가능성을 우려하고 있다. 반도체 실적과 환율이 동시에 변수로 작용하면서 당분간 변동성이 이어질 전망이다.`,
  keyTerms:[{term:`피크아웃`,explanation:`실적이나 성장세가 정점을 찍고 꺾이기 시작한다는 뜻. AI 투자 피크아웃 우려는 그동안 폭발적으로 늘던 AI 관련 투자가 고점을 지났을지 모른다는 걱정을 가리킨다.`}],
  history:`2025년부터 이어진 AI·반도체 랠리로 코스피는 한때 8,600선을 넘봤지만, 고환율 사태와 미국 금리 변수로 변동성이 커졌다. 6월 들어 미국 고용 호조가 금리 인상 우려로 연결되며 반도체주가 무너지기 시작했다.`,
  players:`삼성전자·SK하이닉스 등 국내 반도체 대형주와 엔비디아·필라델피아 반도체지수에 묶인 글로벌 AI 밸류체인이 핵심이다. 한국은행과 외환당국은 환율 급등에 대응해야 하는 처지다.`,
  current:`고용 호조가 금리 인상 신호로 읽히면서 호재가 악재가 되는 역설이 시장을 흔들고 있다. 환율·증시·반도체 실적이 한꺼번에 흔들려 시스템 리스크 경계감이 커진 국면이다.`,
  outlook:`오라클 등 빅테크 실적과 미국 FOMC(6월 16~17일) 결과가 투자심리의 분수령이다. 환율이 1,560원대에서 안정될지, 추가 급등할지가 당분간 국내 시장의 최대 관전 포인트다.`,
  sources:[{title:`반도체주 폭락에 환율도 급등‥검은 월요일 오나 - MBC뉴스`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6828243_37004.html`},{title:`미국 정말 금리 올릴까‥반도체 실적·환율 변수 등 돌다리 두드려야 - MBC뉴스`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6828658_37004.html`},{title:`2025-2026년 원화 고환율 사태 - 나무위키`,url:`https://namu.wiki/w/2025-2026%EB%85%84%20%EC%9B%90%ED%99%94%20%EA%B3%A0%ED%99%98%EC%9C%A8%20%EC%82%AC%ED%83%9C`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`세계은행, 중동 전쟁에 올해 세계 성장률 2.5% 전망…코로나 이후 최저로 둔화`,
  metrics:[`2026년 세계 성장률 전망 2.5% (2025년 2.9%)`,`브렌트유 평균 배럴당 94달러 (전년比 +36%)`],
  summary:`세계은행이 6월 11일 발표한 글로벌경제전망에서 중동 전쟁 여파로 올해 세계 경제 성장률이 코로나19 확산 이후 가장 낮은 수준으로 떨어질 것이라고 경고했다. 세계 성장률은 2025년 2.9%에서 2026년 2.5%로 둔화할 것으로 전망됐는데, 에너지 가격 상승과 물가 급등, 차입 비용 증가가 동시에 성장을 짓누른다는 분석이다. 핵심 원인은 이란이 호르무즈 해협을 봉쇄하면서 원유 수송이 마비된 데 있다. 세계은행은 최악의 차질이 7월에 진정된다는 가정 아래 올해 브렌트유 평균 가격을 배럴당 94달러로 전망했는데, 이는 2025년보다 36% 높은 수준이다. 호르무즈 해협은 전 세계 석유 물동량의 약 20%가 통과하는 핵심 길목이어서 봉쇄가 길어질수록 유가 충격은 더 커진다. 고유가는 다시 각국 물가를 자극해 ECB의 금리 인상처럼 통화정책을 긴축 방향으로 몰아가고 있다. 전쟁의 향방이 세계 경제 회복 시점을 좌우할 핵심 변수로 떠올랐다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`페르시아만과 외해를 잇는 좁은 바닷길로, 전 세계 석유 물동량의 약 20%가 지나간다. 이란이 이곳을 막으면 원유 공급이 막혀 국제 유가가 치솟는다.`}],
  history:`2026년 2월 말 미국·이스라엘의 대이란 공격으로 시작된 전쟁이 장기화되면서 에너지 시장이 직격탄을 맞았다. 이란의 호르무즈 봉쇄로 원유 공급망이 흔들리며 유가가 급등했다.`,
  players:`세계은행과 IMF 등 국제기구가 경고음을 내고 있으며, 원유 수입 의존도가 높은 한국·일본·유럽 등이 특히 타격을 받는다. 산유국과 미국 셰일업계의 증산 여력이 변수다.`,
  current:`공급 충격발 고유가가 물가를 밀어 올려 성장과 물가 안정을 동시에 잡기 어려운 스태그플레이션 우려가 커진 국면이다. 전쟁이라는 지정학 리스크가 실물경제 지표로 직접 옮겨붙고 있다.`,
  outlook:`7월까지 호르무즈 해협 봉쇄가 풀리는지가 유가와 성장률 전망의 최대 분기점이다. 휴전 협상 진전 여부, OPEC+의 증산 결정이 향후 유가 흐름을 좌우할 전망이다.`,
  sources:[{title:`Middle East Conflict Sends Global Growth to Lowest Rate Since COVID-19 - World Bank`,url:`https://www.worldbank.org/en/news/press-release/2026/06/11/global-economic-prospects-june-2026-press-release`},{title:`Markets Today - June 11, 2026 - Nexo`,url:`https://nexo.com/blog/markets-today-june-11`},{title:`호르무즈 해협 - 나무위키`,url:`https://namu.wiki/w/%ED%98%B8%EB%A5%B4%EB%AC%B4%EC%A6%88%20%ED%95%B4%ED%98%91`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미국·이스라엘-이란 전쟁 100일 넘겨…호르무즈 봉쇄 속 휴전 협상 난항`,
  metrics:[`2026년 2월 28일 개전 후 100일 이상 지속`,`전 세계 석유 물동량의 약 20% 호르무즈 통과`],
  summary:`지난 2월 28일 미국과 이스라엘이 이란 핵개발 저지와 반정부 세력 지원을 명분으로 선전포고 없이 단행한 선제 타격으로 시작된 전쟁이 100일을 넘기며 서아시아 전역으로 번지고 있다. 미국·이스라엘은 이란군 수뇌부와 핵심 시설, 군사 전력을 폭격했고, 이란은 이스라엘 본토와 바레인·아랍에미리트·쿠웨이트 등 미군 주둔국까지 공격하며 전선을 넓혔다. 특히 이란이 호르무즈 해협을 봉쇄하고 통항 상선을 공격하면서 국제 석유 시장이 큰 타격을 입었다. 4월 7일 파키스탄의 막후 중재로 미국과 이란이 2주간 휴전에 합의했고, 이란은 공격이 멈추면 자국도 멈추고 해협의 안전 통항을 허용하겠다고 밝혔다. 그러나 4월 10일 이슬라마바드에서 열린 JD 밴스 부통령과 이란 의회 의장 간 회담은 성과 없이 끝났고, 이란은 전쟁 종식을 위한 5대 조건을 내걸며 협상이 교착됐다. 봉쇄가 길어질수록 유가 급등과 세계 경제 둔화가 심화되는 구조다. 휴전 협상의 재가동 여부가 전쟁 향방과 글로벌 경제의 최대 변수로 떠올랐다.`,
  keyTerms:[{term:`선제 타격`,explanation:`상대가 공격하기 전에 위협을 미리 제거하겠다며 먼저 군사 공격을 가하는 것. 국제법상 정당성 논란이 큰 방식이다.`}],
  history:`이란 핵개발을 둘러싼 미국·이스라엘과 이란의 갈등은 수십 년간 이어져 왔다. 2026년 2월 말 미국·이스라엘의 기습 선제 타격으로 전면전이 발발했다.`,
  players:`미국·이스라엘 대 이란이 직접 당사자이며, 파키스탄이 중재자로 나서고 있다. 미군 주둔국인 걸프 국가들과 원유 수입국 전반이 전쟁에 연루·노출돼 있다.`,
  current:`휴전 합의에도 협상이 교착되면서 호르무즈 봉쇄가 풀리지 않아 유가 충격이 이어지는 국면이다. 군사 충돌이 경제 위기로 직결되는 양상이 뚜렷하다.`,
  outlook:`이란이 제시한 5대 조건을 둘러싼 후속 협상과 휴전 연장 여부가 핵심이다. 봉쇄 해제 시점, 미국의 추가 군사행동 여부가 향후 단계를 가른다.`,
  sources:[{title:`2026년 이란 전쟁 - 위키백과`,url:`https://ko.wikipedia.org/wiki/2026%EB%85%84_%EC%9D%B4%EB%9E%80_%EC%A0%84%EC%9F%81`},{title:`미국-이란 전쟁 - 나무위키`,url:`https://namu.wiki/w/%EB%AF%B8%EA%B5%AD-%EC%9D%B4%EB%9E%80%20%EC%A0%84%EC%9F%81`},{title:`2026년 중동 위기 - 나무위키`,url:`https://namu.wiki/w/2026%EB%85%84%20%EC%A4%91%EB%8F%99%20%EC%9C%84%EA%B8%B0`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`지방선거 동시 개헌 국민투표 무산…국민의힘 표결 불참에 좌초`,
  metrics:[`개헌 필요성 찬성 여론 58%`,`동시 국민투표 찬성 59%`],
  summary:`여야 6개 정당이 추진하던 개헌이 국민의힘의 본회의 표결 불참으로 끝내 무산됐다. 개헌안은 계엄 선포 요건 강화와 5·18 민주화운동 정신의 헌법 전문 수록 등을 핵심으로, 6월 3일 치러진 제9회 전국동시지방선거와 함께 국민투표에 부치는 방안이 추진됐다. 여론조사에서는 개헌 필요성에 58%, 지방선거 동시 국민투표에 59%가 찬성해 국민 다수가 우호적이었지만, 정작 국회 표결이 정족수를 채우지 못하면서 좌초됐다. 개헌은 이재명 대통령이 1순위 과제로 내건 사안이어서 정치적 타격이 작지 않다. 시민사회에서는 국회 말고 국민을 믿고 가라며 별도 국민투표 추진을 촉구하는 목소리가 나온다. 여당인 더불어민주당은 8년 만에 여당 위치에서 지방선거를 치른 만큼 개헌 동력을 잃지 않으려 하고 있다. 개헌 불발은 향후 정국 주도권과 차기 총선·대선 구도에도 영향을 미칠 전망이다.`,
  keyTerms:[{term:`개헌`,explanation:`헌법을 고치는 일. 국회 재적 3분의 2 이상 찬성과 국민투표 과반 찬성을 모두 거쳐야 해 절차가 까다롭다.`}],
  history:`2024년 말 비상계엄 사태 이후 계엄 권한 통제와 민주주의 가치 강화를 위한 개헌 요구가 커졌다. 이재명 대통령은 이를 1번 국정과제로 내걸고 지방선거 동시 국민투표를 추진했다.`,
  players:`더불어민주당 등 여야 6개 정당이 개헌안에 참여했으나 국민의힘이 표결에 불참했다. 대통령실과 시민사회는 개헌 재추진을 압박하고 있다.`,
  current:`국민 여론이 우호적인데도 국회 절차에서 막히면서 국민 대 국회 구도가 부각된 국면이다. 대통령의 핵심 공약이 좌초돼 국정 동력에 대한 평가가 엇갈린다.`,
  outlook:`여당이 별도 국민투표 등 우회로를 모색할지가 관건이다. 지방선거 결과와 맞물려 개헌 재추진 시점과 동력이 결정될 전망이다.`,
  sources:[{title:`제9회 전국동시지방선거 - 위키백과`,url:`https://ko.wikipedia.org/wiki/%EC%A0%9C9%ED%9A%8C_%EC%A0%84%EA%B5%AD%EB%8F%99%EC%8B%9C%EC%A7%80%EB%B0%A9%EC%84%A0%EA%B1%B0`},{title:`[2026 개헌 로드맵 2화] 이재명 대통령 1번 과제 무산 위기 - 참여연대`,url:`https://peoplepower21.org/solidarity/2003443`},{title:`제9회 전국동시지방선거 - 나무위키`,url:`https://namu.wiki/w/%EC%A0%9C9%ED%9A%8C%20%EC%A0%84%EA%B5%AD%EB%8F%99%EC%8B%9C%EC%A7%80%EB%B0%A9%EC%84%A0%EA%B1%B0`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`NATO 국방장관회의 벨기에서 개최…우크라이나 안전보장 놓고 미·우 이견`,
  metrics:[`미국 제시 안전보장 15년 vs 우크라이나 요구 20년 이상`,`NATO 정상회의 6월 18일 튀르키예 예정`],
  summary:`북대서양조약기구(NATO)가 6월 11일 벨기에에서 국방장관회의를 열고 우크라이나 지원과 안보 현안을 논의했다. 이번 회의는 6월 18일 튀르키예에서 열릴 NATO 정상회의를 앞둔 사전 조율 성격이 짙다. 핵심 쟁점은 러시아-우크라이나 평화협상의 최대 난제인 안전보장 문제다. 앞서 2월 뮌헨안보회의에서 젤렌스키 우크라이나 대통령은 미국이 15년짜리 안전보장을 제안했지만 우크라이나는 20년 이상을 원한다고 밝혔고, 미국이 2개월 휴전을 도와준다면 민주적 선거를 치를 준비가 돼 있다고 언급했다. 2026년 초부터 제네바 등지에서 영토 문제, 안전보장, 선거를 둘러싼 평화협상이 여러 차례 이어져 왔다. 중동 전쟁으로 국제사회의 관심이 분산된 가운데 우크라이나 지원 동력 유지가 NATO의 과제로 부상했다. 정상회의에서 안전보장 기간과 방위비 분담을 둘러싼 회원국 간 조율이 분수령이 될 전망이다.`,
  keyTerms:[{term:`안전보장`,explanation:`전쟁이 끝난 뒤 다시 침공받지 않도록 강대국이나 동맹이 군사·외교적으로 지켜주겠다고 약속하는 것. 기간이 길수록 더 확실한 보장으로 여겨진다.`}],
  history:`2022년 러시아의 우크라이나 침공 이후 NATO는 대규모 군사·재정 지원을 이어왔다. 2026년 들어 미국 주도로 종전 협상이 본격화되며 안전보장이 최대 쟁점으로 떠올랐다.`,
  players:`미국·우크라이나·러시아가 협상 당사자이며, NATO 회원국들이 지원 규모와 방위 분담을 두고 입장이 갈린다. 튀르키예는 정상회의 개최국이자 중재자 역할을 한다.`,
  current:`안전보장 기간을 둘러싼 미·우 간 격차가 좁혀지지 않아 종전 협상이 교착된 국면이다. 중동 전쟁이 겹치며 서방의 자원과 관심이 분산되는 점도 변수다.`,
  outlook:`6월 18일 튀르키예 NATO 정상회의에서의 합의 수준이 핵심 분기점이다. 휴전·선거·영토 문제를 묶은 일괄 타결이 가능할지가 향후 협상 향방을 가른다.`,
  sources:[{title:`2026 United States-Ukraine-Russia meetings in Geneva - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_United_States%E2%80%93Ukraine%E2%80%93Russia_meetings_in_Geneva`},{title:`Events - NATO`,url:`https://www.nato.int/en/news-and-events/events`},{title:`NATO summits - NATO Topic`,url:`https://www.nato.int/en/what-we-do/introduction-to-nato/nato-summits`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`KKR·엔비디아, 100억달러 AI 인프라 법인 출범…젠슨 황 방한 직후 AI 팩토리 동맹 가속`,
  metrics:[`신규 법인 약정 자본 100억달러 이상`,`젠슨 황 6월 6~9일 SK·LG·네이버·현대차 방문`],
  summary:`KKR이 주도하는 컨소시엄이 AI 인프라 구축을 위해 100억달러 이상의 약정 자본을 갖춘 신규 법인 헬릭스 디지털 인프라스트럭처를 출범시켰다. 쿠웨이트투자청(KIA), 엔비디아, 전력 유틸리티 기업 비스트라가 앵커 투자자로 참여했고, 전 아마존웹서비스(AWS) 최고경영자 아담 셀립스키가 법인을 이끈다. 이는 엔비디아의 투자 전략이 메모리 반도체와 데이터센터를 넘어 로보틱스와 제조 AI를 포함한 AI 팩토리 영역으로 확장되고 있음을 보여준다. 앞서 젠슨 황 엔비디아 CEO는 6월 6~9일 방한해 SK·LG·서울대 AI연구소·네이버·현대차를 잇따라 방문하며 AI·로봇 기술동맹을 약속했다. SK는 차세대 메모리와 AI 팩토리 개발 파트너로 격상됐고, LG와는 로봇 학습과 센서 개발에서 협력하기로 했다. 다만 AI 투자 과열과 피크아웃 우려가 증시 변동성을 키우는 양면성도 있다. 글로벌 자본과 한국 제조업이 결합하는 AI 인프라 경쟁이 본격화되는 양상이다.`,
  keyTerms:[{term:`AI 팩토리`,explanation:`AI 모델을 대규모로 학습·운영하기 위해 GPU·데이터센터·전력을 갖춘 일종의 AI 생산 공장. 엔비디아가 미래 핵심 사업으로 밀고 있는 개념이다.`}],
  history:`2023년 생성형 AI 붐 이후 GPU와 데이터센터 수요가 폭증하며 천문학적 인프라 투자가 이어졌다. 엔비디아는 칩 공급을 넘어 인프라·로보틱스로 사업 영역을 넓혀왔다.`,
  players:`엔비디아, KKR, 쿠웨이트투자청, 비스트라가 자본·인프라 축이고, SK·LG·네이버·현대차 등 한국 기업이 메모리·로봇 파트너로 참여한다. 막대한 전력 수요로 유틸리티 기업도 핵심 플레이어다.`,
  current:`글로벌 국부펀드·사모펀드 자금이 AI 인프라로 몰리는 가운데 한국 기업이 공급망 핵심으로 부상한 국면이다. 동시에 AI 투자 피크아웃 논쟁이 증시 변동성을 키우고 있다.`,
  outlook:`헬릭스의 데이터센터 착공·가동 일정과 추가 투자 유치 여부가 관전 포인트다. 엔비디아의 차세대 칩 로드맵과 한국 기업과의 후속 협력 발표가 이어질 전망이다.`,
  sources:[{title:`[미국 특징주] KKR, 엔비디아·비스트라와 100억달러 AI 인프라 기업 출범 - 뉴스핌`,url:`https://www.newspim.com/news/view/20260612000007`},{title:`젠슨 황 SK·LG·네이버·현대차까지‥AI-로봇 기술동맹 - MBC뉴스`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6828655_37004.html`},{title:`엔비디아 젠슨 황 방한 확정…국내 반도체 업계 만난다 - CBC뉴스`,url:`https://www.cbci.co.kr/news/articleView.html?idxno=577889&hl=ko-KR`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`기상청, 6월부터 폭염 중대경보 신설…올여름 이상고온·집중호우 경고`,
  metrics:[`6~8월 기온 평년보다 높음 전망`,`신설 특보: 폭염 중대경보·열대야 주의보`],
  summary:`기상청이 갈수록 극심해지는 더위에 대응하기 위해 6월부터 기존 폭염경보를 넘어서는 폭염 중대경보와 열대야 주의보를 새로 도입한다. 올해 6~8월 기온은 평년보다 높고 강수량은 대체로 많을 것으로 전망돼 이상고온과 집중호우 피해 우려가 동시에 제기된다. 우리나라 주변 해역 해수면 온도가 평년보다 높게 유지되는 가운데, 북인도양·북태평양의 따뜻한 바닷물과 한반도 동쪽 고기압성 순환이 열대 온난기류 유입을 늘려 기온을 끌어올릴 가능성이 크다. 또 봄철 티베트고원의 많은 눈덮임이 동아시아 상층 기압골을 강화해 강수량을 늘릴 수 있다고 기상청은 분석했다. 5월 중순 이후 이미 평년을 웃도는 더위가 이어지고 있어 폭염 중대경보 발령 가능성이 거론된다. 폭염과 호우가 번갈아 닥치는 극한기상이 일상화되는 추세다. 정부는 취약계층 보호와 재난 대비 체계 강화에 나서고 있다.`,
  keyTerms:[{term:`폭염 중대경보`,explanation:`기존 폭염경보보다 더 극심한 더위에 대응하기 위해 기상청이 새로 만든 최고 단계 폭염 특보. 인명 피해 위험이 큰 수준의 폭염을 알리는 신호다.`}],
  history:`기후변화로 한반도 여름 폭염과 열대야가 매년 기록을 갈아치우며 인명·농작물 피해가 커졌다. 기존 폭염주의보·경보 2단계 체계로는 극한 더위 대응에 한계가 있다는 지적이 이어졌다.`,
  players:`기상청이 특보 체계 개편을 주도하고, 기후에너지환경부·지자체가 폭염 대응과 취약계층 보호를 맡는다. 농업·에너지·보건 분야가 직접 영향을 받는다.`,
  current:`5월부터 평년을 웃도는 고온이 이어져 여름 초입부터 폭염 위기감이 큰 국면이다. 폭염과 집중호우가 함께 강해지는 극한기상 패턴이 뚜렷해지고 있다.`,
  outlook:`7~8월 본격 폭염기에 새 특보가 실제 발령될지가 관전 포인트다. 엘니뇨·해수면 온도 추이에 따라 올여름 더위와 호우 강도가 결정될 전망이다.`,
  sources:[{title:`2026년 기상청 주요정책 추진계획 - 기상청`,url:`https://www.kma.go.kr/kma/news/press.jsp?bid=press&mode=view&num=1194578`},{title:`기상청 보도자료 - 본청`,url:`https://www.kma.go.kr/kma/news/press_01.jsp?bid=press&mode=view&num=1194653`},{title:`기후정보포털 - 기상청`,url:`https://www.climate.go.kr/`}]

  category:`기타 이슈`,

  colorBg:`#e6f4f1`,
  headline:`외국인 관광객 급증에 백화점 특수…롯데·신세계 외국인 매출 비중 2배로`,
  metrics:[`외국인 매출 비중 15%(2024년)→30%(2026년 1~5월)`,`주요 수혜: 롯데·신세계 백화점`],
  summary:`외국인 관광객이 빠르게 늘면서 롯데·신세계 등 주요 백화점이 인바운드 관광 특수를 누리고 있다. 백화점 전체 매출에서 외국인이 차지하는 비중은 2024년 15% 수준에서 올해 1~5월에는 30% 수준으로 약 2배 늘었다. 고환율로 원화 가치가 떨어지면서 외국인 입장에서 한국 쇼핑의 가격 경쟁력이 높아진 점이 특수를 키운 배경으로 꼽힌다. K-콘텐츠 인기와 면세·관광 수요 회복이 맞물리며 명품·화장품·패션 매장에 외국인 발길이 몰리고 있다. 내수 부진 속에서 외국인 소비가 백화점 실적을 떠받치는 버팀목 역할을 하는 셈이다. 다만 환율과 관광 트렌드에 좌우되는 만큼 특수의 지속성에는 변수가 있다는 분석도 나온다. 유통업계는 외국인 전용 서비스와 결제·통역 인프라를 강화하며 인바운드 관광객 잡기에 적극 나서고 있다.`,
  keyTerms:[{term:`인바운드 관광`,explanation:`외국인이 한국에 들어와 즐기는 관광을 가리키는 말. 반대로 한국인이 해외로 나가는 것은 아웃바운드 관광이라고 한다.`}],
  history:`코로나19로 급감했던 외국인 관광이 2024년부터 빠르게 회복됐고, 2025~2026년 고환율이 겹치며 쇼핑 수요가 폭발적으로 늘었다. 백화점은 면세점과 함께 대표적 수혜 채널로 떠올랐다.`,
  players:`롯데·신세계 등 대형 백화점과 면세업계가 직접 수혜를 보고, 중국·동남아·일본 등에서 온 관광객이 핵심 소비층이다. 정부의 관광 활성화 정책도 뒷받침한다.`,
  current:`내수 소비가 부진한 가운데 외국인 매출이 유통 실적을 떠받치는 구조가 굳어진 국면이다. 고환율이 외국인 구매력을 높여 특수를 키우는 역설적 상황이다.`,
  outlook:`환율 흐름과 외국인 입국자 수 추이가 특수 지속 여부를 가른다. 유통업계의 외국인 맞춤 서비스 확대와 면세 정책 변화가 향후 변수다.`,
  sources:[{title:`경향신문 - 경제`,url:`https://www.khan.co.kr/`},{title:`다음뉴스 - 사건/사고 및 경제`,url:`https://news.daum.net/affair`},{title:`KB의 생각 - 2026년 6월 11일 금융시장 동향`,url:`https://kbthink.com/investment/trend/daily/260611.html`}]
}]

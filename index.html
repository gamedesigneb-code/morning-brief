<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모닝 브리핑</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sidebar-w: 240px;
    --bg: #FAFAF7;
    --paper: #FFFFFF;
    --accent: #6B7A8F;
    --accent-soft: #E8ECEF;
    --line: #EAE8E3;
    --line-strong: #D8D5CE;
    --text: #2D2A26;
    --text-mid: #6B655D;
    --text-sub: #A09889;
    --radius: 10px;
  }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 15px; line-height: 1.65; font-weight: 400;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }

  /* ── Layout ── */
  #app { display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar {
    width: var(--sidebar-w); flex-shrink: 0;
    background: var(--bg); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #sidebar-header {
    padding: 36px 20px 24px;
    border-bottom: 1px solid var(--line);
    text-align: center;
  }
  #sidebar-header h1 {
    font-size: 19px; font-weight: 700; color: var(--text);
    letter-spacing: -0.4px; line-height: 1.3;
  }
  #sidebar-header p {
    font-size: 12px; color: var(--text-sub); margin-top: 6px;
    letter-spacing: 0.3px;
  }
  #date-list { overflow-y: auto; flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
  .date-item {
    padding: 11px 14px; cursor: pointer; border-radius: 8px;
    transition: background 0.15s, color 0.15s;
    background: transparent;
    text-align: center; font-size: 13px; font-weight: 500; color: var(--text-mid);
    letter-spacing: 0.1px;
  }
  .date-item:hover { background: var(--accent-soft); color: var(--text); }
  .date-item.active {
    background: var(--accent-soft); color: var(--text); font-weight: 600;
  }

  /* ── Main ── */
  #main { flex: 1; overflow-y: auto; background: var(--paper); }
  #content { max-width: 760px; margin: 0 auto; padding: 56px 40px 80px; }

  .brief-header { margin-bottom: 36px; }
  .brief-header .bh-eyebrow {
    font-size: 11px; color: var(--text-sub); margin-bottom: 8px;
    letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;
  }
  .brief-header h2 {
    font-size: 30px; font-weight: 700; letter-spacing: -0.7px;
    color: var(--text); line-height: 1.25;
  }

  /* ── Sticky Top (header + tabs) ── */
  .sticky-top {
    position: sticky; top: 0;
    background: var(--paper); z-index: 20;
    padding-top: 56px; margin-top: -56px;
  }
  .sticky-top .brief-header { margin-bottom: 24px; }

  /* ── Category Tabs ── */
  .cat-tabs {
    display: flex; gap: 0; margin-bottom: 36px;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
  }
  .cat-tab {
    padding: 12px 20px 14px; cursor: pointer; font-size: 14px; font-weight: 500;
    color: var(--text-sub); border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: inherit; letter-spacing: -0.1px;
    margin-bottom: -1px;
  }
  .cat-tab:hover { color: var(--text-mid); }
  .cat-tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 600; }

  /* ── Sources (collapsible) ── */
  .sources-toggle {
    background: transparent; border: 1px solid var(--line-strong);
    padding: 8px 14px; border-radius: 6px; font-size: 12.5px; font-weight: 500;
    color: var(--text-mid); cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
    font-family: inherit; margin-top: 12px;
    transition: background 0.15s, border-color 0.15s;
  }
  .sources-toggle:hover { background: var(--accent-soft); border-color: var(--accent); }
  .sources-toggle .arrow { transition: transform 0.2s; font-size: 9px; color: var(--text-sub); }
  .sources-toggle.open .arrow { transform: rotate(180deg); }
  .sources-body { display: none; margin-top: 12px; padding-left: 4px; }
  .sources-body.open { display: block; }

  /* ── Story Card ── */
  .story { margin-bottom: 40px; }
  .story-top { margin-bottom: 18px; }
  .story-headline {
    font-size: 19px; font-weight: 700; line-height: 1.45;
    letter-spacing: -0.4px; color: var(--text);
  }

  .metrics { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .metric-chip {
    background: var(--accent-soft); border: none;
    border-radius: 6px; padding: 7px 12px;
    font-size: 12.5px; font-weight: 500; color: var(--text-mid);
    line-height: 1.4;
  }

  .summary {
    font-size: 15px; line-height: 1.8; color: var(--text); margin-bottom: 20px;
    letter-spacing: -0.1px;
  }
  .summary .kt-underline {
    color: #1996BD;
    text-decoration: underline;
    text-decoration-color: #1996BD;
    text-decoration-thickness: 1.5px;
    text-underline-offset: 3px;
    cursor: help;
  }

  /* ── Key Terms Box ── */
  .key-terms {
    background: #F4F1EA; border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius); padding: 18px 22px; margin-bottom: 14px;
  }
  .key-terms-title {
    font-size: 11px; font-weight: 600; color: var(--text-sub);
    text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 14px;
  }
  .kt-item { margin-bottom: 12px; }
  .kt-item:last-child { margin-bottom: 0; }
  .kt-term {
    font-size: 13.5px; font-weight: 700; color: #1996BD;
    margin-bottom: 4px; display: block;
    letter-spacing: -0.1px;
  }
  .kt-exp {
    font-size: 13.5px; line-height: 1.7; color: var(--text-mid);
  }

  /* ── Background ── */
  .bg-box {
    background: var(--bg); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 22px 24px; margin-bottom: 14px;
  }
  .bg-box-title {
    font-size: 11px; font-weight: 600; color: var(--text-sub);
    text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 16px;
  }
  .bg-section { margin-bottom: 16px; }
  .bg-section:last-child { margin-bottom: 0; }
  .bg-section-label {
    font-size: 12.5px; font-weight: 600; color: var(--text); margin-bottom: 6px;
    letter-spacing: -0.1px;
  }
  .bg-section-text { font-size: 14px; line-height: 1.75; color: var(--text-mid); }

  /* ── Sources ── */
  .source-item {
    display: flex; align-items: flex-start; gap: 10px;
    margin-bottom: 8px; font-size: 13px;
  }
  .src-num {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent-soft); color: var(--text-mid);
    font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .source-item a { color: var(--text-mid); text-decoration: none; line-height: 1.55; }
  .source-item a:hover { color: var(--text); text-decoration: underline; }

  .story-divider { border: none; border-top: 1px solid var(--line); margin: 36px 0; }

  .empty { color: var(--text-sub); font-size: 14px; padding: 60px 0; text-align: center; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 3px; }

  /* ── Mobile Toggle ── */
  #sidebar-toggle {
    display: none;
    position: fixed; top: 14px; left: 14px; z-index: 50;
    background: var(--paper); border: 1px solid var(--line-strong);
    width: 40px; height: 40px; border-radius: 10px;
    cursor: pointer; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(45, 42, 38, 0.08);
  }
  #sidebar-toggle span {
    display: block; width: 18px; height: 2px; background: var(--text);
    position: relative;
  }
  #sidebar-toggle span::before,
  #sidebar-toggle span::after {
    content: ''; position: absolute; left: 0; width: 18px; height: 2px; background: var(--text);
  }
  #sidebar-toggle span::before { top: -6px; }
  #sidebar-toggle span::after { top: 6px; }

  #sidebar-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(45, 42, 38, 0.4); z-index: 40;
  }
  #sidebar-backdrop.open { display: block; }

  /* ── Mobile Responsive ── */
  @media (max-width: 768px) {
    #sidebar-toggle { display: flex; }
    #sidebar {
      position: fixed; left: 0; top: 0; bottom: 0;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 45; width: 260px;
      box-shadow: 0 0 24px rgba(45, 42, 38, 0.12);
    }
    #sidebar.open { transform: translateX(0); }

    #content { padding: 64px 20px 60px; max-width: 100%; }
    .brief-header h2 { font-size: 22px; }
    .story-headline { font-size: 16px; }
    .summary { font-size: 14.5px; line-height: 1.75; }
    .bg-section-text { font-size: 13.5px; }
    .metric-chip { font-size: 12px; padding: 6px 10px; }
    .bg-box { padding: 18px 18px; }
    .cat-tab { padding: 11px 14px; font-size: 13.5px; }

    .quiz-card { padding: 28px 24px 24px; }
    .quiz-q { font-size: 17px; }
    .quiz-choice { font-size: 14px; padding: 13px 16px; }
  }

  /* ── Quiz Overlay ── */
  body.quiz-active #app {
    filter: blur(6px) saturate(0.85);
    pointer-events: none;
    transition: filter 0.3s ease;
  }
  #quiz-overlay {
    position: fixed; inset: 0;
    background-color: rgba(250, 250, 247, 0.55);
    background-image:
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0) 0,
        rgba(255,255,255,0) 5px,
        rgba(45,42,38,0.04) 5px,
        rgba(45,42,38,0.04) 6px
      ),
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0) 0,
        rgba(255,255,255,0) 22px,
        rgba(45,42,38,0.025) 22px,
        rgba(45,42,38,0.025) 23px
      );
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 24px;
  }
  #quiz-overlay.hidden { display: none; }

  .quiz-card {
    background: var(--paper); border-radius: 16px;
    padding: 36px 36px 32px; width: 100%; max-width: 440px;
    box-shadow: 0 16px 48px rgba(45, 42, 38, 0.18);
  }
  .quiz-eyebrow {
    font-size: 11px; color: var(--text-sub); letter-spacing: 1.5px;
    text-transform: uppercase; font-weight: 500; margin-bottom: 12px;
  }
  .quiz-q {
    font-size: 19px; font-weight: 700; color: var(--text);
    line-height: 1.5; letter-spacing: -0.3px; margin-bottom: 24px;
  }
  .quiz-choices { display: flex; flex-direction: column; gap: 8px; }
  .quiz-choice {
    background: var(--paper); border: 1px solid var(--line-strong);
    padding: 14px 18px; border-radius: 10px; font-size: 14.5px; font-weight: 500;
    color: var(--text); cursor: pointer; text-align: left;
    font-family: inherit; transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .quiz-choice:focus { outline: none; }
  .quiz-choice:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  @media (hover: hover) {
    .quiz-choice:hover { background: var(--accent-soft); border-color: var(--accent); }
  }
  .quiz-choice:active { transform: scale(0.99); }
  .quiz-choice.wrong {
    background: #F5E6E0; border-color: #C9947F; color: #8A4A30;
    animation: shake 0.4s ease;
  }
  .quiz-choice.correct {
    background: #E3EDE2; border-color: #7A9077; color: #2E4A2C;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .quiz-feedback {
    margin-top: 20px; text-align: center; font-size: 14px; font-weight: 500;
    color: var(--text-mid); min-height: 22px;
  }
  .quiz-feedback.right { color: #2E4A2C; }
  .quiz-feedback.wrong { color: #8A4A30; }

  .quiz-close-btn {
    margin-top: 18px; width: 100%;
    background: var(--text); color: var(--paper); border: none;
    padding: 13px 20px; border-radius: 10px; font-size: 14px; font-weight: 600;
    font-family: inherit; cursor: pointer;
    transition: background 0.15s;
  }
  .quiz-close-btn:hover { background: #1a1815; }
  .quiz-close-btn.hidden { display: none; }
</style>
</head>
<body>
<div id="quiz-overlay">
  <div class="quiz-card">
    <div class="quiz-eyebrow"><span>잠깐, 나에 대해서 잘 알지?</span> <span id="quiz-counter">(0/3)</span></div>
    <div class="quiz-q" id="quiz-q"></div>
    <div class="quiz-choices" id="quiz-choices"></div>
    <div class="quiz-feedback" id="quiz-feedback"></div>
    <button class="quiz-close-btn hidden" id="quiz-close">닫기</button>
  </div>
</div>

<button id="sidebar-toggle" aria-label="메뉴"><span></span></button>
<div id="sidebar-backdrop"></div>

<div id="app">
  <nav id="sidebar">
    <div id="sidebar-header">
      <h1>모닝 브리핑</h1>
      <p>일별 세계 뉴스 요약</p>
    </div>

    <div id="date-list"></div>
  </nav>
  <main id="main">
    <div id="content"></div>
  </main>
</div>

<script>
const BRIEFS = [{
  tag:`2026-05-25`,
  label:`2026년 5월 25일 (월)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피, 반도체주 주도 강세… 7,000선 안착하며 8,000선 재도전`,
  metrics:[`코스피 5월 6일 종가 7,384.56 (전일 대비 +6.45%)`,`외국인 순매도 3조원대`],
  summary:`코스피가 반도체주 주도로 사상 최초로 7,000선을 돌파한 뒤 5월 내내 7,000선대에서 강한 흐름을 유지하고 있다. 5월 6일에는 단 하루 만에 7,000선부터 7,400선까지 잇따라 뚫으며 전일 대비 6.45% 급등한 7,384.56에 마감했다. 다만 5월 12일에는 장중 7,999.67까지 치솟았다가 외국인이 하루에만 3조원 이상을 순매도하면서 -2.29% 빠진 7,643.15에 거래를 마쳤다. 외국인의 차익 실현 매물에도 개인과 기관 매수세가 지수 하단을 떠받치는 구조가 이어지고 있다. AI 수요 폭증으로 메모리 가격이 가파르게 오르는 이른바 반도체 슈퍼사이클이 지수 상승의 핵심 동력으로 작용하는 상황이다. 트럼프 행정부의 관세·통상 정책 변수와 환율 변동성이 단기 변동성 요인으로 지목된다. 시장에서는 8,000선 안착 여부가 향후 추가 상승의 분기점이 될 것으로 보고 있다.`,
  keyTerms:[{term:`반도체 슈퍼사이클`,explanation:`반도체 수요가 폭증하면서 가격과 기업 이익이 동시에 오랜 기간 상승하는 호황 국면을 말한다. AI 인프라 투자 확대로 메모리·HBM 수요가 급증하면서 삼성전자·SK하이닉스 등 한국 대표주가 코스피 상승을 이끄는 배경이 됐다.`}],
  history:`코스피는 2024~2025년 2,500~3,000선에서 박스권에 갇혀 있다가 AI 인프라 투자 본격화와 함께 2026년 들어 가파른 상승세로 전환됐다. 미국 빅테크가 데이터센터 투자에 천문학적인 자금을 쏟아부으면서 HBM·D램 가격이 급등했고, 한국 반도체 두 회사 실적이 사상 최대를 경신했다. 이에 따라 외국인과 개인 자금이 동시에 유입되며 지수 레벨이 한 단계 올라섰다.`,
  players:`삼성전자와 SK하이닉스가 시가총액 비중에서 절대적 위치를 차지해 코스피 방향을 좌우한다. 외국인 투자자는 단기 차익 실현에 나선 반면, 개인·기관은 매수 우위로 지수 하단을 받치고 있다. 한국은행은 환율 변동성 관리, 금융위원회는 시장 안정 모니터링에 나섰다.`,
  current:`5월 6일 7,000선 첫 돌파 이후 단기 과열 논란이 커지고 있고, 외국인 매도세가 변동성을 키우는 국면이다. 8,000선이 심리적 저항선으로 작용하고 있어 추가 상승을 위한 모멘텀 확인 구간으로 평가된다.`,
  outlook:`6월 한국은행 금융통화위원회 회의와 미국 FOMC 결과, 그리고 트럼프 행정부의 반도체 관세 결정이 단기 방향을 결정할 분수령이다. 2분기 삼성전자·SK하이닉스 실적 발표도 7월 중 예정돼 있어 실적 모멘텀 점검이 이어질 전망이다.`,
  sources:[{title:`코스피/역사/2026년 - 나무위키`,url:`https://namu.wiki/w/%EC%BD%94%EC%8A%A4%ED%94%BC/%EC%97%AD%EC%82%AC/2026%EB%85%84`},{title:`코스피 7500 문턱…반도체 질주 속 트럼프 변수 주목 - 머니투데이`,url:`https://www.mt.co.kr/stock/2026/05/10/2026051014393729901`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`서울 아파트값 0.28% 급등… 강남권 재진입에 매수심리 회복`,
  metrics:[`서울 아파트 매매가격 주간 +0.28%`,`송파구 +0.35%, 강남구 +0.19%`],
  summary:`한국부동산원 주간 통계에 따르면 5월 셋째 주 서울 아파트 매매가격이 전주 대비 0.28% 오르며 3개월 만에 최대 상승폭을 기록했다. 전세가격도 매매와 같은 0.28% 상승해 매매·전세가 동시에 강하게 움직이는 모습이 확인됐다. 강남구가 0.19%, 서초구 0.17%, 송파구 0.35%, 강동구 0.19%, 용산구 0.21% 등 핵심 지역의 상승폭이 일제히 확대됐다. 성북구·서대문구·강서구처럼 실거주 선호와 재건축 기대감이 맞물린 지역도 강세를 보였다. 반면 수도권은 0.14% 상승에 그치고 지방은 -0.02%로 하락이 이어져 양극화가 심화되고 있다. 시장에서는 모든 단지가 동반 상승하기보다는 입지·재건축 기대감이 분명한 곳만 먼저 움직이는 선별적 상승장이라는 평가가 나온다. 정부의 대출 규제 강화 여부와 6월 지방선거 이후 정책 방향이 향후 흐름을 좌우할 전망이다.`,
  keyTerms:[{term:`선별적 상승장`,explanation:`부동산 시장 전체가 일제히 오르는 것이 아니라, 입지·재건축 호재·학군 등 호재가 뚜렷한 단지나 지역만 골라서 오르는 장세를 말한다. 매수자와 매도자 모두 상품 가치를 더 따져 거래하기 때문에 양극화가 심해진다.`}],
  history:`서울 아파트 가격은 2022~2023년 금리 급등 충격으로 큰 폭 조정을 받았다가 2024년 하반기부터 강남권을 중심으로 회복세를 보였다. 2025년에는 공급 부족 우려와 전세가 상승이 매매가를 밀어 올리며 다시 상승 추세에 진입했다. 2026년 들어서는 주택담보대출 금리 안정과 재건축 추진 단지 호재가 맞물려 상승폭이 확대되고 있다.`,
  players:`국토교통부와 한국부동산원이 거래·가격 통계를 발표하고, 서울시는 재건축 정비계획 변경 권한을 쥐고 있다. 매수 주체로는 30~40대 실수요자와 강남권 자산가가 양분되어 있고, 매도자들은 호가를 올리며 매물을 잠그는 흐름이다.`,
  current:`강남 3구가 다시 상승을 주도하면서 서울 외곽까지 온기가 확산되고 있다. 다만 수도권 외곽·지방과의 격차가 커지고 있어 정책 당국의 핀셋 규제 가능성이 거론된다.`,
  outlook:`6월 3일 지방선거 이후 주택 정책 변화와 한국은행의 추가 금리 인하 여부가 핵심 변수다. 7월 주택공급 대책 발표와 재건축 단지 사업시행 인가 결과도 단기 흐름을 좌우할 전망이다.`,
  sources:[{title:`서울 집값 다시 달리나, 2026년 5월 부동산원 통계로 본 상승 신호 - Aboda`,url:`https://aboda.kr/entry/%EC%84%9C%EC%9A%B8-%EC%A7%91%EA%B0%92-%EB%8B%A4%EC%8B%9C-%EB%8B%AC%EB%A6%AC%EB%82%98-2026%EB%85%84-5%EC%9B%94`},{title:`3개월 만에 최대 상승…잠잠하던 서울 집값 왜 다시 뛰나 - 머니투데이`,url:`https://www.mt.co.kr/amp/estate/2026/05/14/2026051414573745425`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`OpenAI, 1,220억 달러 사상 최대 펀딩… 엔비디아 1,000억 베팅`,
  metrics:[`펀딩 규모 1,220억 달러, 기업가치 8,520억 달러`,`엔비디아 투자 약정액 최대 1,000억 달러`],
  summary:`OpenAI가 사상 최대 규모인 1,220억 달러 펀딩 라운드를 마무리하며 기업가치 8,520억 달러를 인정받았다. 이번 라운드는 아마존 500억 달러, 엔비디아 300억 달러, 소프트뱅크 300억 달러가 핵심 투자자로 참여했다. 별도로 OpenAI는 엔비디아와 최소 10기가와트 규모 AI 인프라 구축 전략적 파트너십을 체결했고, 엔비디아는 시스템 배치에 맞춰 최대 1,000억 달러까지 OpenAI에 추가 출자할 계획이다. 첫 1기가와트 시스템은 2026년 하반기 엔비디아의 차세대 베라 루빈 플랫폼 기반으로 배치된다. 사라 프라이어 OpenAI CFO는 향후 IPO 시 일반 개인투자자에게도 일부 물량을 배정하겠다고 밝혔다. 한편 엔비디아는 2026년 들어 앤트로픽·xAI 등 AI 기업 지분 투자에만 400억 달러 이상을 베팅하며 생태계 장악을 강화하고 있다. 미국 국방부 역시 OpenAI·구글·엔비디아·MS 등과 기밀 네트워크에서의 AI 활용 계약을 체결해 안보 영역에서도 영향력이 확대되는 양상이다.`,
  keyTerms:[{term:`기업가치`,explanation:`투자자들이 평가하는 회사의 총 가치를 뜻한다. 한국에서는 흔히 밸류에이션이라고도 부르며, 신규 펀딩 라운드에서 새 자금이 들어올 때 기준이 된다. 8,520억 달러는 OpenAI가 비상장 기업 중 사실상 최고 수준 평가를 받았다는 의미다.`}],
  history:`OpenAI는 2015년 비영리로 출발해 2019년 영리 자회사를 두는 하이브리드 구조로 전환했다. 챗GPT가 2022년 말 폭발적 인기를 끌면서 마이크로소프트가 130억 달러를 투자했고, 이후 매 라운드마다 기업가치를 두세 배씩 끌어올려 왔다. 2025년에는 1,500억 달러대 평가를 받았다가 1년 만에 8,520억 달러로 뛰었다.`,
  players:`OpenAI는 샘 올트먼 CEO와 사라 프라이어 CFO가 펀딩·IPO 전략을 주도한다. 엔비디아는 AI 칩 공급과 직접 투자라는 양 축으로 OpenAI와 결합도를 높이고 있고, 아마존·소프트뱅크는 인프라 클라우드와 자본을 댄다. 미국 국방부는 생성형 AI를 기밀 환경에 접목하려는 주요 발주처로 등장했다.`,
  current:`AI 인프라 투자 경쟁이 칩·전력·데이터센터 전반으로 확장되며 사실상 거대 자본 동맹의 시대로 접어들었다. OpenAI는 IPO를 2026년 하반기로 검토 중이라는 보도가 잇따른다.`,
  outlook:`엔비디아 추가 출자 시점과 베라 루빈 첫 가동 일정, OpenAI IPO 공식 발표 여부가 향후 주가·산업 흐름을 결정할 변수다. 미·중 반도체 수출 통제 강화 여부도 인프라 배치 속도에 영향을 줄 전망이다.`,
  sources:[{title:`OpenAI and NVIDIA Announce Strategic Partnership - NVIDIA Newsroom`,url:`https://nvidianews.nvidia.com/news/openai-and-nvidia-announce-strategic-partnership-to-deploy-10gw-of-nvidia-systems`},{title:`AI Round-Up - May 2026 - Fladgate`,url:`https://www.fladgate.com/insights/ai-round-up-may-2026`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이재명 대통령, 부처님오신날 봉축법요식 참석… 원융회통 정신으로 위기 극복 강조`,
  metrics:[`조계사 봉축법요식 참석자 약 1만 명`,`불기 2570년 (2026년)`],
  summary:`이재명 대통령과 김혜경 여사가 24일 서울 종로구 조계사에서 열린 불기 2570년 부처님오신날 봉축법요식에 참석해 축사를 했다. 봉축법요식에는 조계종 총무원장 진우 스님과 정관계 주요 인사, 신도 등 약 1만 명이 자리를 함께했다. 이 대통령은 축사에서 서로 다른 쟁론을 화합해 하나로 소통한다는 의미의 원융회통 정신을 거듭 강조하며 하나 된 힘으로 국민과 나라의 위기를 극복하겠다고 밝혔다. 또한 국민 한 사람 한 사람의 삶을 더 세심하게 살피고 가장 낮은 곳의 목소리에 귀 기울이는 나라를 만들겠다고 다짐했다. 부처님 말씀을 등불 삼아 국민의 목숨을 살리는 정부를 만들겠다는 메시지도 함께 내놨다. 6월 3일 제9회 전국동시지방선거를 열흘 앞둔 시점인 만큼, 통합 메시지가 갖는 정치적 무게가 크다는 해석이 나온다. 야권은 같은 날 별도 봉축행사에 참석해 민생·물가 안정 메시지를 부각시켰다.`,
  keyTerms:[{term:`원융회통`,explanation:`불교에서 나온 말로, 서로 다른 주장과 의견이 충돌하더라도 그 모두를 포용해 하나로 통하게 한다는 화합의 정신을 뜻한다. 이재명 대통령은 진영 갈등과 사회 분열을 가라앉히겠다는 통합 메시지로 이 표현을 사용했다.`}],
  history:`이재명 대통령은 2025년 대선에서 당선된 뒤 출범 이후 노동·복지·검찰개혁 의제에서 강한 드라이브를 걸어왔다. 동시에 야권과의 충돌이 격화되며 사법 현안과 특검법을 둘러싼 갈등이 누적된 상태다. 매년 부처님오신날 봉축법요식은 현직 대통령이 종교계와 만나 통합 메시지를 던지는 정치적 자리로 활용돼 왔다.`,
  players:`이재명 대통령과 더불어민주당은 국정 안정론을, 국민의힘 등 야권은 정권 견제론을 내세우며 지방선거 총력 모드에 돌입했다. 조계종 등 종교계는 사회 통합과 민생 안정에 대한 메시지를 정부·여야 모두에 요구하고 있다.`,
  current:`지방선거를 코앞에 두고 여야 모두 공식 일정을 종교 행사로 채우며 표심 잡기 경쟁을 벌이고 있다. 사법 현안과 공소취소 특검법 충돌은 봉축 분위기 속에서도 가라앉지 않고 있다.`,
  outlook:`6월 3일 지방선거 결과에 따라 이 대통령 국정 운영의 동력과 향후 사법·개헌 의제의 속도가 결정될 전망이다. 6월 임시국회에서는 특검법 처리와 추경 편성을 둘러싼 정면 충돌이 예상된다.`,
  sources:[{title:`이재명 대통령, 부처님오신날 봉축법요식서 국민 목숨 살리는 정부 만들겠다 - 한국연합신문`,url:`https://www.koreaunionnews.com/2156455`},{title:`평화·상생의 부처님오신날…李대통령 원융회통 새길 것 - 헤럴드경제`,url:`https://biz.heraldcorp.com/article/10755154`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`美·이란 핵 합의 임박… 호르무즈 해협 60일 휴전안 윤곽`,
  metrics:[`60일 휴전 및 호르무즈 해협 재개방`,`트럼프 largely negotiated 발표`],
  summary:`트럼프 미국 대통령이 23일 사회관계망을 통해 이란과의 합의가 상당 부분 협상됐다고 밝히면서 양국 충돌 종식이 가시권에 들어왔다. 협상 초안에는 60일 휴전 동안 호르무즈 해협을 재개방하고 이란이 원유를 자유롭게 수출하는 한편, 우라늄 농축 프로그램 중단 협상을 이어가는 내용이 담겼다. 이란은 핵무기 보유를 추구하지 않고 고농축 우라늄 비축분을 반출하겠다는 양해각서(MOU)에 응할 가능성이 거론된다. 그러나 백악관은 24일 협상 타결까지 며칠이 더 걸릴 수 있다고 밝혔고, 이란 측은 공식 확인을 하지 않은 채 반관영 파르스통신을 통해 여전히 큰 이견이 있다는 입장을 흘리고 있다. 공화당 내에서도 이번 합의가 이란에 지나치게 관대하다는 비판이 잇따르고 있다. 협상의 핵심 변수인 호르무즈 해협은 전 세계 원유 해상 수송의 20%가량이 통과하는 길목이어서 합의 향방은 글로벌 유가에 직격탄으로 작용한다. 합의가 깨질 경우 중동 정세 재격화와 유가 급등이 동시에 벌어질 수 있어 한국 등 원유 수입국들의 긴장도가 높아지고 있다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`이란과 오만 사이에 있는 폭 약 33km짜리 좁은 바닷길로, 페르시아만에서 생산된 원유와 LNG의 약 20%가 이곳을 통해 세계로 빠져나간다. 이란이 이 해협을 봉쇄하거나 위협하면 국제 유가가 즉시 치솟을 만큼 글로벌 에너지 시장에서 결정적인 길목이다.`}],
  history:`미국은 2018년 트럼프 1기 행정부 때 이란 핵합의(JCPOA)에서 일방 탈퇴한 뒤 강도 높은 제재를 부과해 왔다. 2024~2025년 이란 핵 프로그램 재가속화와 이스라엘과의 직접 충돌이 겹치며 중동 긴장이 최고조에 달했고, 2026년 들어서는 호르무즈 봉쇄와 미군 공습이 오가는 군사 충돌 국면으로 비화했다.`,
  players:`협상 테이블에는 트럼프 대통령과 이란 최고지도자 모즈타바 하메네이, 그리고 중재자로 카타르·오만이 깊숙이 관여하고 있다. 이스라엘은 협상 결과가 핵 시설 검증 수준에 미치지 못할까 경계하고 있고, 사우디아라비아·UAE 등 걸프 국가는 유가 안정 차원에서 합의를 지지하는 분위기다.`,
  current:`합의 골격은 잡혔지만 이란 최고지도자 승인, 미 의회 반발, 이스라엘 변수가 동시에 작동하는 다층 협상 국면이다. 협상 결렬 시 호르무즈 재봉쇄 가능성이 다시 제기된다.`,
  outlook:`수일 내 이란 측 공식 입장 발표가 분수령이며, G7과 IAEA의 검증 체계 합의 여부가 후속 일정을 결정할 전망이다. 협상 진전 시 국제 유가의 단기 안정과 함께 한국 정유·항공업계 비용 부담 완화 효과가 기대된다.`,
  sources:[{title:`Exclusive: What's inside the Iran deal Trump is close to signing - Axios`,url:`https://www.axios.com/2026/05/24/iran-deal-strait-hormuz-sanctions-nuclear`},{title:`Trump: Deal with Iran is largely negotiated - NPR`,url:`https://www.npr.org/2026/05/23/g-s1-124145/trump-iran-deal-strait-of-hormuz`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`러시아, 키이우 대규모 미사일 공격… 오레쉬닉 미사일 동원`,
  metrics:[`사망 4명·부상 60명 이상`,`미사일 55발·드론 549대 격추, 54곳 피해`],
  summary:`러시아가 24일 새벽 우크라이나 수도 키이우와 인근 지역에 대규모 미사일·드론 공격을 감행해 최소 4명이 숨지고 60명 이상이 다쳤다. 우크라이나 당국에 따르면 키이우 시내 40여 곳에서 주거 건물과 인프라 피해가 보고됐고, 내각 청사와 외교부 건물도 일부 손상을 입었다. 러시아 국방부는 이번 공격에 핵탄두 탑재가 가능한 신형 중거리 탄도미사일인 오레쉬닉 미사일을 비롯해 이스칸데르·킨잘·치르콘 등 다양한 무기를 동원했다고 밝혔다. 오레쉬닉이 실전에 사용된 것은 4년에 걸친 전쟁에서 이번이 세 번째다. 우크라이나 방공망은 미사일 55발과 공격 드론 549대를 요격했으나, 일부 미사일 16발과 드론 51대가 54개 지점을 타격했다. 젤렌스키 대통령은 알자지라 인터뷰에서 체르노빌 박물관 같은 문화시설까지 공격하는 것은 미친 짓이라고 비판했다. 우크라이나군은 침공 이후 러시아 측 누적 인명 손실이 약 135만 5,920명에 달한다고 발표했다.`,
  keyTerms:[{term:`오레쉬닉 미사일`,explanation:`러시아가 개발한 신형 중거리 탄도미사일로, 핵탄두 탑재가 가능하고 마하 10 안팎의 극초음속으로 비행해 현존 방공망으로 요격이 어렵다. 러시아가 이를 실전 사용한 것은 우크라이나 침공 4년차 만에 세 번째로, 핵 위협을 가시화하는 카드로 활용되고 있다.`}],
  history:`러시아는 2022년 2월 우크라이나를 전면 침공한 이후 동부 전선에서 장기 소모전을 이어왔다. 2024년부터는 후방 인프라와 에너지 시설을 노리는 대규모 미사일·드론 공습이 정례화됐고, 2024년 11월 처음으로 오레쉬닉 미사일을 우크라이나에 사용한 바 있다. 2025~2026년에는 평화협상 시도와 군사 공세가 동시에 진행되는 양면 전략이 자리 잡았다.`,
  players:`푸틴 대통령은 군사 압박을 통해 협상에서 우위를 확보하려는 전략을 유지하고 있고, 젤렌스키 대통령은 서방의 추가 방공 지원을 호소하고 있다. 미국 트럼프 행정부는 협상 중재 기조이지만 무기 지원 규모는 줄어든 상태이며, 유럽연합은 러시아 추가 제재와 우크라이나 군사·재정 지원 확대를 검토하고 있다.`,
  current:`민간인 사상자가 다시 늘면서 서방 내 추가 지원·제재 압박이 커지고 있고, 협상 모멘텀이 약화될 가능성이 제기된다. 핵 위협 카드까지 다시 등장하면서 NATO 동부 전선 긴장도 한층 높아졌다.`,
  outlook:`다음 주 EU 정상회의에서 신규 대러 제재 패키지와 우크라이나 방공망 추가 지원안이 논의될 예정이다. 러시아의 후속 공습 강도와 협상 테이블 재가동 여부가 향후 흐름을 결정할 분수령이다.`,
  sources:[{title:`Russian attacks on Ukraine's Kyiv kill at least four people - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/5/24/russian-attacks-on-ukraines-kyiv-kill-at-least-four-people`},{title:`The Kyiv Independent - News from Ukraine`,url:`https://kyivindependent.com/`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`삼성·SK하이닉스 R&D 투자 폭증… HBM4 양산 경쟁 본격화`,
  metrics:[`삼성전자 1분기 R&D 11조 3,000억원`,`SK하이닉스 R&D 전년 동기 대비 +65.1%`],
  summary:`삼성전자와 SK하이닉스가 AI 반도체 주도권을 잡기 위해 올해 1분기 연구개발(R&D) 투자를 사상 최대 규모로 집행했다. 삼성전자는 1분기 R&D에 11조 3,000억원을 쏟아부었고, SK하이닉스 R&D 비용은 전년 동기 대비 65.1% 급증했다. 두 회사가 동시에 사활을 거는 분야는 차세대 고대역폭메모리인 HBM4로, 2026년 본격 양산이 시작될 예정이다. HBM4는 기존 D램 기반에서 로직 공정 기반으로 구조가 바뀌는 첫 세대로, 2048비트 인터페이스와 최대 12.8GT/s의 데이터 전송 속도를 지원한다. 출하량 기준 2분기 HBM 시장 점유율은 SK하이닉스 62%, 삼성전자 17%로 K-반도체 전체 점유율은 79%에 달한다. 글로벌 반도체 장비 시장 역시 1,430억 달러를 돌파해 전년 대비 12% 성장이 전망된다. 다만 한국 정부는 보조금 직접 지원 근거 법안이 늦어지면서 미국·대만·일본 대비 지원 강도가 낮다는 지적이 이어지고 있다.`,
  keyTerms:[{term:`HBM4`,explanation:`고대역폭메모리(High Bandwidth Memory)의 4세대 제품으로, AI 반도체에 필수적으로 들어가는 고속 메모리다. 기존 세대와 달리 로직(연산) 공정 기반으로 만들어져 데이터를 더 빠르고 효율적으로 주고받을 수 있으며, 엔비디아 차세대 AI 칩에 탑재될 핵심 부품으로 꼽힌다.`}],
  history:`HBM은 2013년 SK하이닉스가 세계 최초로 개발한 적층형 D램으로, 2022년 챗GPT 등장 이후 AI 가속기 핵심 부품으로 부상했다. SK하이닉스가 HBM3·HBM3E 시장을 선점하며 엔비디아 독점 공급사로 자리 잡았고, 삼성전자는 뒤늦게 추격에 나섰다. HBM4는 메모리·로직 통합이라는 구조 변화로 양사 격차를 다시 좁힐 수 있는 분수령으로 평가된다.`,
  players:`SK하이닉스는 엔비디아와의 깊은 공급 협력을 무기로, 삼성전자는 파운드리·메모리 통합 역량을 강점으로 내세운다. 마이크론은 일정 부분 시장을 가져가려 노력 중이며, 엔비디아·AMD·구글은 최대 수요처로 양사 선택 기준에 영향을 미친다. 정부와 국회는 반도체 특별법과 보조금 직접 지원 여부를 둘러싸고 막판 조율 중이다.`,
  current:`AI 인프라 투자가 폭증하면서 HBM 수요가 공급을 크게 웃돌고 있고, 양산 시점과 수율이 점유율 판도를 결정할 분위기다. HBM4 초도 물량이 어느 고객사에 먼저 인도되느냐가 단기 주가 모멘텀도 좌우한다.`,
  outlook:`하반기 HBM4 양산 진입 발표와 엔비디아 베라 루빈 플랫폼 공급사 선정이 핵심 이벤트다. 국회 반도체 특별법 통과 시점과 보조금 직접 지원 도입 여부도 한국 반도체 산업 경쟁력을 가르는 변수가 될 전망이다.`,
  sources:[{title:`삼성·SK, AI 반도체 슈퍼사이클 올라탔다…HBM4 더 큰 장 선다 - CEOSCOREDAILY`,url:`http://m.ceoscoredaily.com/page/view/2025120814104920681`},{title:`삼성·SK하이닉스 효과…반도체 장비 시장 1430억달러 돌파 - 카운터포인트`,url:`https://korea.counterpointresearch.com/ai-driven-semiconductor-equipment-market-2026-outlook/`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`중국 선저우 23호 발사… 홍콩 출신 우주인 첫 탑승`,
  metrics:[`탑승 우주비행사 3명`,`톈궁 우주정거장 최대 1년 체류 가능`],
  summary:`중국이 24일 오후 11시 8분(현지시간) 간쑤성 주취안 위성발사센터에서 유인 우주선 선저우 23호를 창정 2F 로켓에 실어 발사했다. 이번 임무는 중국 유인 우주공정의 17번째 유인 비행으로, 주양주 지휘관과 장즈위안·리자잉 등 우주비행사 3명이 탑승했다. 특히 리자잉은 홍콩 출신으로는 처음으로 중국 유인 우주 임무에 참여하는 우주비행사가 됐다. 이번 임무 기간 중 일부 우주비행사는 톈궁 우주정거장에 최대 1년간 체류할 수 있어, 2021년 이후 표준이었던 6개월 임무를 처음으로 넘어서게 된다. 톈궁 우주정거장은 미국 주도의 국제우주정거장(ISS)과 별도로 중국이 독자 구축·운영하는 유일한 상시 거주 우주정거장이다. 발사 성공으로 중국은 올해 추진 중인 5대 우주 임무(달 탐사, 소행성 샘플 회수, 유인 우주정거장, 차세대 우주선, 우주망원경) 중 핵심 축을 안정적으로 가동하게 됐다. 미국·러시아·인도와의 우주 패권 경쟁이 한층 격화될 전망이다.`,
  keyTerms:[{term:`톈궁 우주정거장`,explanation:`중국이 2021년부터 자국 기술로 건설해 운영 중인 상시 거주 우주정거장이다. 미국 주도의 국제우주정거장(ISS)과는 별개로 작동하며, 우주비행사 3명이 6개월~1년 단위로 교대 근무한다. 중국이 독자적인 우주 강국 지위를 굳히는 상징적 인프라다.`}],
  history:`중국은 2003년 선저우 5호로 첫 유인 우주 비행에 성공한 뒤 2011년 톈궁 1호, 2021년 톈궁 우주정거장 핵심 모듈 발사로 자체 우주정거장을 완성했다. 이후 6개월 주기로 우주인을 교대 파견하며 운영 노하우를 축적해 왔다. 2024~2025년에는 달 탐사선 창어 7호, 화성 샘플 회수 미션 계획을 잇따라 발표하며 우주 패권 경쟁에 본격 가세했다.`,
  players:`중국국가항천국(CNSA)이 임무 전반을 지휘하고, 우주비행사들은 인민해방군 출신과 민간 전문가가 혼합된다. 이번 임무에 홍콩 출신 비행사가 합류하면서 본토-홍콩 통합 메시지를 동시에 발신했다. 미국 NASA·SpaceX, 러시아 로스코스모스, 인도 ISRO와의 우주 경쟁 구도가 짙어지고 있다.`,
  current:`선저우 23호 발사 성공으로 중국 우주 프로그램은 ISS 의존 없이 독자 인프라를 유지하는 두 번째 국가 위상을 굳혔다. 1년 장기체류 실험은 향후 달·화성 유인 탐사로 가는 핵심 데이터로 활용된다.`,
  outlook:`올 하반기에는 창어 7호 달 남극 탐사선, 차세대 유인 우주선 시험 발사가 예정돼 있다. 미국 아르테미스 프로그램의 진척도와 비교되며 우주 패권 경쟁이 가시화될 전망이다.`,
  sources:[{title:`선저우 23호 유인우주선, 24일 발사 예정 - CRI 한국어`,url:`https://korean.cri.cn/2026/05/23/ARTI1779502829533853`},{title:`중국, 선저우 23호 발사…우주인 1년 체류 가능성 - Investing.com`,url:`https://kr.investing.com/news/economy-news/article-1958806`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`콩고 에볼라 진원지서 주민들 치료센터 공격… 방역 차질 우려`,
  metrics:[`에볼라 진원지 콩고민주공화국 동부`,`치료센터 텐트 방화·시설 일부 파괴`],
  summary:`콩고민주공화국(DRC) 동부 에볼라 발병 진원지에서 분노한 주민들이 치료센터를 공격해 텐트를 불태우는 사건이 발생했다. 해당 텐트는 환자들이 격리 치료를 받던 시설로, 일부 의료 장비가 파괴되면서 방역 체계에 직접적인 차질이 발생했다. 외신은 주민들이 방역 인력에 대한 불신, 토착 신앙·문화 거부감, 정부 정보 통제 등에 누적된 불만이 폭발한 것으로 보고 있다. 콩고 동부 지역은 무장 반군 활동과 분쟁이 장기화되어 있어 백신 접종과 의료진 접근 자체가 매우 어렵다. 세계보건기구(WHO)는 추가 백신 1만 회분 긴급 공수와 보안 강화 인력 투입을 추진 중이다. 에볼라 바이러스는 치사율이 최대 90%에 이를 수 있는 출혈열 질환으로, 환자 분비물 접촉으로 빠르게 확산된다. 인접한 우간다·르완다·부룬디 등은 국경 검역과 발열 감시 체계를 강화하며 확산 차단에 나섰다.`,
  keyTerms:[{term:`에볼라 바이러스`,explanation:`감염되면 고열·구토와 함께 전신에 출혈이 나타나 사망에 이를 수 있는 바이러스성 출혈열을 일으키는 병원체다. 치사율이 최대 90%에 달하며, 환자의 혈액·분비물·시신과의 직접 접촉으로 전염되어 의료진 감염과 장례 문화로 인한 2차 감염이 큰 위험으로 꼽힌다.`}],
  history:`에볼라는 1976년 옛 자이르(현 콩고민주공화국) 에볼라강 인근에서 처음 발견된 이래 DRC와 우간다 일대에서 주기적으로 발병해 왔다. 2014~2016년 서아프리카 대유행에서는 1만 1,000명 이상이 사망하며 전 세계가 백신 개발에 속도를 냈다. 이후 DRC 동부 분쟁지역에서는 발병이 거듭되며 백신 접종 인프라 부족과 안보 위협이 만성 과제로 남았다.`,
  players:`콩고 보건부와 WHO가 방역 사령탑이고, 국경없는의사회(MSF) 등 국제 NGO가 현장 치료를 주도한다. 무장 반군은 의료진 접근을 방해하는 주요 위협이며, 인접국과 미국 CDC·EU CDC도 국경 모니터링에 참여한다. 백신 공급에는 머크와 J&J 같은 글로벌 제약사가 관여한다.`,
  current:`주민 신뢰 붕괴와 시설 공격이 동시에 발생하면서 방역 인력이 일시적으로 일부 지역에서 철수했다. 분쟁과 보건위기가 결합된 복합재난 양상이 강해지는 국면이다.`,
  outlook:`WHO 추가 백신 공수 도착과 신규 환자 발생 추세가 향후 1~2주가 확산 차단의 분수령이 될 전망이다. 한국 질병관리청도 아프리카 출입국자 발열 모니터링을 강화할 가능성이 있다.`,
  sources:[{title:`Ebola outbreak attack on health center in eastern Congo - CBS News`,url:`https://www.cbsnews.com/`},{title:`5 Big News Stories Overnight - Sunday, May 24, 2026 - Go Local Prov`,url:`https://www.golocalprov.com/news/5-big-news-stories-overnight-sunday-may-24-2026`}]
}]

  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피 8000선 첫 돌파에도 외국인 5월 들어 20조 순매도, 반도체·자동차에 매물 집중`,
  metrics:[`코스피 5월 15일 장중 8002.66 기록`,`5월 외국인 누적 순매도 약 20조2000억원`],
  summary:`한국 증시가 사상 처음으로 코스피 8000선을 돌파했지만 외국인의 매도세는 오히려 거세지고 있다. 5월 15일 장중 8002.66을 찍은 코스피는 23일 종가 기준 7847선에서 등락하며 견조한 흐름을 유지 중이다. 다만 5월 들어 8거래일 동안 외국인의 코스피 순매도 금액은 약 20조2000억원에 달해 월간 기준 역대 3위 규모로 집계됐다. 매물 대부분은 5월 이후 41.6% 급등한 반도체와 29.2% 오른 자동차 업종에 집중돼 차익실현 성격이 강하다는 분석이다. 일평균 시가총액 대비 순매도 비중은 5월 0.34%로 2~3월보다 낮아 구조적 이탈로 보긴 어렵다는 평가도 나온다. 다만 호르무즈 해협 사태로 유가가 배럴당 100달러를 넘어선 만큼 인플레이션 우려가 외국인 자금 흐름을 다시 흔들 가능성도 제기된다.`,
  keyTerms:[{term:`차익실현`,explanation:`주가가 많이 오른 종목을 팔아서 이익을 확정짓는 행위를 말한다. 외국인이 5월에 반도체·자동차를 대거 판 것도 단기간 급등에 따른 차익실현 성격이 강해 시장 이탈로 단정하기 어렵다는 해석이 나온다.`}],
  history:`코스피는 2024년 박스권을 벗어나 2025년부터 AI 반도체 수요 확대와 정책 모멘텀에 힘입어 가파르게 상승했다. 2026년 2월 7000선, 4월 7500선을 차례로 넘어선 뒤 5월 15일 처음으로 8000선을 뚫었다. 사상 최대 실적을 낸 SK하이닉스·삼성전자가 지수 상승을 견인했다.`,
  players:`외국인 투자자는 5월 들어 누적 20조원 넘게 순매도하며 시장의 주도권을 기관과 개인에 넘겨주고 있다. 금융당국과 한국거래소는 시장 변동성 점검을 강화했고, 한국은행은 환율과 자본 유출 흐름을 모니터링 중이다. 정부는 6·3 지방선거를 앞두고 자본시장 친화 정책 기조를 유지하고 있다.`,
  current:`8000선 돌파 직후 외국인 매도 폭이 단기간 급증하면서 변동성이 커진 점이 부담이다. 중동 유가 충격이 한국 수출기업 비용 구조에 부정적 영향을 미칠지가 관건이다.`,
  outlook:`6월 미 연준 FOMC, 6월 3일 지방선거 결과, 호르무즈 사태 향배가 외국인 자금의 재유입 여부를 가를 변수로 꼽힌다. 반도체 2분기 실적 발표도 7월 중순부터 본격화된다.`,
  sources:[{title:`코스피 8000 찍자마자 삼전·하닉 와르르, 외국인·기관 7조 팔고 떠났다 - 한국일보`,url:`https://www.hankookilbo.com/news/article/amp/A2026051514360001577`},{title:`코스피 8000 꿈의 8천피 돌파, 세계 증시 판도 흔든 한국 - 뉴스핌`,url:`https://www.newspim.com/news/view/20260515000195`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`UN, 호르무즈 충격 반영해 2026년 세계 성장률 전망 2.7%에서 2.5%로 하향`,
  metrics:[`UN 세계 성장률 전망 2.7%→2.5% 하향`,`최악 시나리오 시 2.1%까지 추락 가능`],
  summary:`유엔이 중동 분쟁 장기화와 유가 급등을 반영해 2026년 세계 경제 성장률 전망치를 기존 2.7%에서 2.5%로 0.2%포인트 끌어내렸다. 호르무즈 해협 봉쇄가 장기화돼 유가가 추가 상승할 경우 성장률이 2.1%까지 떨어질 수 있다는 비관 시나리오도 함께 제시됐다. 국제유가는 호르무즈 봉쇄 여파로 배럴당 104달러 선을 돌파해 2022년 우크라이나 전쟁 직후 수준으로 복귀했다. IMF·세계은행 역시 4월 보고서에서 독일·프랑스·이탈리아·영국 등 유럽 주요국의 일시적 GDP 위축을 경고한 바 있다. UN은 에너지 비용 급등이 신흥국 채무위기로 번질 수 있다며 다자 협력 강화를 촉구했다. 수출 의존도가 높은 한국·일본·독일 등이 직접적 충격을 받을 가능성이 큰 것으로 분류됐다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`이란과 오만 사이에 있는 좁은 바닷길로, 전 세계 원유와 LNG 해상 운송의 약 27%가 통과하는 핵심 길목이다. 이곳이 막히면 유가가 즉시 급등해 세계 경제 전반에 충격이 번지는 구조다.`}],
  history:`미국·이스라엘은 2026년 2월부터 이란을 상대로 군사작전을 개시했고 이란은 3월 4일 호르무즈 해협 봉쇄를 선언했다. 4월 8일 일시 휴전 합의가 있었지만 협상 결렬과 함께 4월 18일 다시 봉쇄됐다. UN은 그 이후 분기마다 성장률 전망을 하향 조정해왔다.`,
  players:`UN과 IMF·세계은행은 다자 협력 채널을 통해 압박 수위를 높이고 있다. 미국은 이란 항만에 대한 대(對) 봉쇄를 유지 중이고, 중국과 인도는 자국 정유사의 이란산 원유 의존도를 낮추는 방안을 모색하고 있다. 유럽연합은 비축유 방출 카드를 검토 중이다.`,
  current:`유가가 100달러를 넘어선 상태가 두 달 가까이 이어지며 글로벌 인플레이션 재점화 가능성이 커진 점이 가장 큰 부담이다. 미 연준의 금리 인하 기대도 빠르게 후퇴하고 있다.`,
  outlook:`6월 OPEC+ 정례회의, 6월 중순 G7 정상회의, 7월 미 연준 FOMC에서 추가 정책 대응이 논의될 전망이다. 호르무즈 협상 재개 여부가 향후 한 달 최대 변수다.`,
  sources:[{title:`Global Economic Outlook: May 2026 - S&P Global`,url:`https://www.spglobal.com/market-intelligence/en/news-insights/research/2026/05/global-economic-outlook-may-2026`},{title:`April 2026 Global Economy Tested Again - IMF`,url:`https://www.imf.org/-/media/files/publications/weo/2026/april/english/ch1.pdf`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`일본은행, 정책금리 0.75% 동결…호르무즈발 유가 충격 반영해 물가전망 2.8%로 상향`,
  metrics:[`BOJ 정책금리 0.75% 동결 (1995년 9월 이후 최고)`,`FY2026 근원 CPI 전망 1.9%→2.8% 상향`],
  summary:`일본은행(BOJ)이 4월 회의에서 단기 정책금리를 0.75%로 유지하면서도 2026 회계연도 근원 인플레이션 전망치를 1.9%에서 2.8%로 큰 폭 끌어올렸다. 동결 결정은 6 대 3 표결로 통과됐고 다카타·다무라·나카가와 위원이 1.0%로의 인상을 주장하며 반대표를 던졌다. 일본 10년물 국채금리는 2.72%까지 치솟아 1997년 이후 최고치를 갈아치웠다. 시장은 호르무즈발 유가 충격이 일본의 에너지·수입물가를 자극하며 BOJ의 다음 인상 시점을 7월로 앞당길 가능성이 크다고 본다. 우에다 가즈오 총재는 회견에서 추가 인상 여지를 사실상 공식화했다. 다만 이란 사태로 글로벌 경기 하방 위험도 동시에 커진 만큼 BOJ는 매 회의마다 강도를 조정하는 신중 모드를 이어갈 전망이다.`,
  keyTerms:[{term:`근원 인플레이션`,explanation:`변동성이 큰 에너지·식료품 가격을 뺀 물가 상승률로, 중앙은행이 추세적 물가 흐름을 판단하는 핵심 지표다. 일본은행이 이 전망치를 1.9%에서 2.8%로 한 번에 0.9%포인트 올린 것은 통화정책 정상화 속도가 빨라질 수 있다는 신호로 해석된다.`}],
  history:`일본은행은 2024년 3월 마이너스 금리를 종료한 뒤 2025년부터 단계적 인상에 나섰다. 2026년 1월 0.75%로 인상한 뒤 4월까지 두 번 연속 동결 중이다. 30년 디플레이션을 빠져나오는 과정에 있다는 점에서 BOJ의 행보는 매번 시장 변수가 된다.`,
  players:`우에다 총재는 점진적 정상화 기조를 유지하지만 매파 위원들이 인상 압력을 높이는 양상이다. 일본 정부와 재무성은 엔화 약세·국채금리 급등을 견제하기 위해 시장 개입과 BOJ 공조를 강화하고 있다. 미 연준의 정책 변화 역시 BOJ 결정에 핵심 변수로 작용한다.`,
  current:`호르무즈 사태로 에너지·곡물 가격이 일본 소비자물가를 직접 압박하고 있다. 엔·달러 환율이 다시 160엔대 진입을 시도하는 점도 정책 부담이다.`,
  outlook:`6월 13~14일 차기 BOJ 통화정책회의에서 추가 인상 여부가 결정될 가능성이 크다. 일본 5월 CPI(6월 20일 발표)와 미 연준 6월 FOMC가 핵심 분기점이다.`,
  sources:[{title:`Bank of Japan keeps policy rate steady while raising inflation forecast on Iran war worries - CNBC`,url:`https://www.cnbc.com/2026/04/28/bank-of-japan-keeps-policy-rate-steady-cpi-iran-war-gdp.html`},{title:`April 28, 2026 Bank of Japan Statement on Monetary Policy`,url:`https://www.boj.or.jp/en/mopo/mpmdeci/mpr_2026/k260428a.pdf`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이재명 대통령 국정 지지율 66%…6·3 지방선거 앞두고 국정 안정론 52% 우세`,
  metrics:[`이재명 국정 운영 긍정 평가 66%`,`국정 안정론 52% vs 정부 견제론 39%`],
  summary:`이재명 대통령의 국정 운영 긍정 평가가 전국지표조사(NBS)에서 66%로 집계되며 취임 이후 안정적 지지세를 이어가고 있다. 6월 3일 지방선거를 열흘 앞두고 실시된 여론조사에서 국정 안정을 위해 여당에 힘을 실어야 한다는 응답이 52%로, 정부 견제를 위해 야당에 힘을 실어야 한다는 응답 39%를 13%포인트 앞섰다. 다만 서울·부산 등 일부 격전지에서는 여야 후보 격차가 좁혀지면서 민주당 내부 위기감도 동시에 감지된다. 박근혜 전 대통령이 23일 대구를 방문해 추경호 대구시장 후보 지지 유세에 합류하며 국민의힘은 보수 결집에 총력을 기울이고 있다. 종합특검의 김대기 전 비서실장 구속과 김건희 여사 항소심 중형 선고 등 법조 이슈도 막판 표심에 영향을 줄 변수로 거론된다. 청와대는 호르무즈 사태와 공급망 안정 등 외치 성과를 부각하며 지지율 방어에 집중하고 있다.`,
  keyTerms:[{term:`국정 안정론`,explanation:`선거에서 여당에 힘을 실어 정부가 국정을 안정적으로 이끌 수 있게 해야 한다는 여론을 가리킨다. 야당 견제론과 대비되는 개념으로, 정권 초·중반에 이 비율이 과반을 넘기면 여당에 유리한 선거 환경이 만들어진다는 분석이 일반적이다.`}],
  history:`이재명 정부는 2025년 6월 출범 이후 1년 가까이 50~60%대의 비교적 안정적 지지율을 유지해왔다. 출범 직후 추경 편성, AI·반도체 산업 지원, 노동 개혁 등이 지지율 방어 요인으로 꼽힌다. 6·3 지방선거는 정부 출범 후 첫 전국 단위 선거다.`,
  players:`민주당은 정부 1년 성과를 앞세워 안정론을 강조하고 있고, 국민의힘은 박근혜 전 대통령까지 등판시키며 보수 결집에 사활을 걸고 있다. 종합특검은 전 정부 인사들에 대한 수사를 확대 중이다. 김건희 여사 사건 재판부도 정치권 핵심 변수다.`,
  current:`막판 격전지 판세가 좁혀지는 상황에서 호르무즈 사태와 유가 급등이 민생 체감 경기를 흔들 가능성이 변수로 떠올랐다. 청년·중도층 표심이 결정적 캐스팅보트로 거론된다.`,
  outlook:`5월 31일 마지막 여론조사 공표일 직전까지 판세 변동이 이어질 전망이다. 6월 3일 지방선거 결과에 따라 이재명 정부의 후반기 국정 운영 동력이 크게 좌우된다.`,
  sources:[{title:`2026년 5월 23일 오늘의 주요 뉴스 - 오늘의 클릭`,url:`https://www.cliktoday.com/2026/05/20260523-today-news.html`},{title:`이재명 대통령, 국무회의 발언 - 네이트 뉴스`,url:`https://news.nate.com/view/20260512n09105`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미·이란 평화협상 결렬, 호르무즈 봉쇄 장기화…미 해군 이란 항만 봉쇄 유지`,
  metrics:[`국제유가 배럴당 104달러 돌파`,`세계 해상 원유 교역 약 27%가 호르무즈 통과`],
  summary:`미국과 이란의 평화협상이 끝내 결렬되면서 호르무즈 해협 봉쇄가 장기화 국면으로 접어들었다. 이란은 4월 18일 해협을 재차 봉쇄했고, 미 해군은 4월 13일부터 이란 항만에 대한 맞불 봉쇄, 이른바 이중 봉쇄를 유지하고 있다. IEA는 이번 사태를 역사상 최대의 글로벌 에너지 안보 위기로 규정했다. 국제유가는 배럴당 104달러를 돌파했고 글로벌 원유 비축량은 5월 말 76억 배럴로 2016년 이후 최저 수준으로 떨어졌다. 미 국무장관 마코 루비오는 23일 인도에 도착해 인·태 4개국(쿼드) 외교장관 회담을 통해 대중·대이란 공조 방안을 논의한다. 트럼프 대통령은 5월 15일 시진핑과의 정상회담에서 중국이 호르무즈 해협 재개통에 협조하기로 했다고 주장했으나 구체적 합의문은 공개되지 않았다.`,
  keyTerms:[{term:`이중 봉쇄`,explanation:`한쪽이 상대 해협을 막으면 다른 한쪽이 상대국의 항만을 함께 막아 압박을 가하는 양면 차단 전략이다. 미국이 이란의 호르무즈 봉쇄에 맞서 이란 항만을 동시에 봉쇄하면서 협상 자체가 해상 통제권 다툼으로 변질됐다.`}],
  history:`2026년 2월 미·이스라엘의 대이란 군사작전이 개시됐고 이란은 3월 4일 호르무즈 해협 봉쇄를 선언했다. 4월 8일 일시 휴전이 성사됐으나 톤당 100만 달러 통행료 부과 등을 둘러싼 갈등으로 협상이 깨졌고, 4월 18일 재봉쇄로 이어졌다.`,
  players:`미국·이스라엘·사우디아라비아·UAE가 한 축, 이란·예멘 후티 반군이 다른 축에서 충돌 중이다. 중국·인도는 이란산 원유 수입국으로서 사태 장기화 시 직접적 타격을 입는 입장이다. EU와 한국·일본은 호르무즈 통과 해상 교역 비중이 높아 다자 외교 중재에 매달리고 있다.`,
  current:`협상 채널이 막힌 가운데 양측 모두 군사적 압박 수위를 낮추지 않고 있어 유가·물가 부담이 전 세계로 확산되고 있다. 인도주의 위기 우려도 함께 커지고 있다.`,
  outlook:`5월 26일 쿼드 외교장관 회담, 6월 G7 정상회의, 6월 OPEC+ 회의가 분기점이다. 사우디·UAE 중재 가능성도 외교가의 주요 관전 포인트다.`,
  sources:[{title:`Iran War: What Happens to the Oil Price If Strait of Hormuz Did Not Reopen - Bloomberg`,url:`https://www.bloomberg.com/opinion/articles/2026-05-23/iran-war-what-happens-to-the-oil-price-if-strait-of-hormuz-did-not-reopen`},{title:`2026 Strait of Hormuz crisis - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_Strait_of_Hormuz_crisis`}]

  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`헝가리 오르반 16년 만에 패배, 페테르 마자르 티사당 총선 압승…유럽 정치 지형 격변`,
  metrics:[`티사당 의석 138석/199석 (득표율 53.6%)`,`투표율 77% 사상 최고`],
  summary:`헝가리 4월 12일 총선에서 페테르 마자르가 이끄는 중도우파 티사당이 압도적 승리를 거두며 16년간 집권한 빅토르 오르반의 시대가 막을 내렸다. 티사당은 199석 중 138석을 차지해 헌법 개정 가능 의석인 3분의 2를 확보했고, 오르반의 피데스당은 55석(37.8%)에 그쳤다. 마자르는 헝가리 정당 사상 최다인 330만 표를 얻었고 투표율은 탈공산 이후 최고치인 77%를 기록했다. 마자르 신임 총리는 EU와의 적대적 관계를 청산하고 우크라이나에 대한 900억 유로 대출 동결 해제, 친유럽 외교 노선 복원을 공언했다. 폰데어라이엔 EU 집행위원장은 헝가리가 유럽을 선택했다며 환영했다. 5월 23일 마자르 정부는 첫 EU 정상회의에서 우크라이나 패키지 안건을 통과시키며 EU 정치 지형이 빠르게 재편되고 있다.`,
  keyTerms:[{term:`헌법 개정 가능 의석`,explanation:`전체 의석의 3분의 2 이상을 확보해 단독으로 헌법까지 바꿀 수 있는 절대 다수를 가리킨다. 티사당이 199석 중 138석을 차지해 이 기준을 넘긴 만큼, 오르반 정권에서 만든 사법·언론 통제 관련 법령들을 큰 저항 없이 손볼 수 있는 권한을 갖게 됐다.`}],
  history:`오르반은 2010년 재집권 뒤 16년간 사법·언론·교육 분야를 자기 진영으로 채우며 비자유 민주주의 체제를 구축해 왔다. 친러시아 노선과 우크라이나 지원 거부로 EU 내부에서 고립을 자초했고, 2024년부터 마자르가 이끄는 티사당이 빠르게 부상해 정권교체 분위기가 무르익었다.`,
  players:`신임 마자르 총리는 오르반 정부에서 활동했던 변호사 출신 정치인으로 반부패 캠페인을 동력으로 삼아왔다. EU 집행위·독일·프랑스는 마자르 정부 출범을 환영하고 있다. 반면 러시아와 슬로바키아의 피초 총리는 곤혹스러운 입장이다.`,
  current:`16년 집권 종식 직후 신임 정부가 우크라이나 지원 패키지를 통과시키며 EU의 대러 단일대오가 회복되는 점이 가장 큰 변화다. 헝가리 내부 사법·언론 개혁 속도도 관전 포인트다.`,
  outlook:`6월 EU 정상회의에서 우크라이나 가입 협상 진전과 헝가리에 대한 EU 자금 동결 해제가 정식 논의된다. 마자르 정부의 첫 100일이 향후 노선의 시금석이다.`,
  sources:[{title:`Hungary election 2026 results: Petér Magyar wins, Trump ally Viktor Orbán concedes defeat - CNN`,url:`https://www.cnn.com/2026/04/12/world/live-news/hungary-election-orban-magyar`},{title:`Peter Magyar wins Hungary election, unseating Viktor Orban after 16 years - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/4/12/hungary-election-early-results-show-magyars-tisza-ahead-of-orbans-fidesz`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`구글 I/O 2026 제미나이 3.5 플래시 즉시 출시…에이전트형 AI 시대 본격 개막`,
  metrics:[`제미나이 3.5 플래시, 기존 프론티어 모델 대비 4배 빠른 속도`,`구글 AI 울트라 구독료 월 100달러 출시`],
  summary:`구글이 5월 19일 본사에서 개최한 I/O 2026 컨퍼런스에서 제미나이 3.5 플래시를 발표와 동시에 일반 사용자에게 제공한다고 밝혔다. 회사는 제미나이 3.5 플래시가 코딩·에이전트 벤치마크에서 기존 3.1 프로를 능가하면서도 동급 프론티어 모델 대비 약 4배 빠르다고 강조했다. 새 모델은 검색의 AI 모드, 제미나이 앱, 안드로이드 핵심 서비스에서 기본 모델로 전환된다. 함께 공개된 24시간 개인 비서 제미나이 스파크와 데스크톱 에이전트 개발 도구 안티그래비티 2.0은 에이전트형 AI 흐름을 대중화하려는 시도다. 월 100달러 구독제 구글 AI 울트라에는 20TB 클라우드와 신규 모델 우선 접근권이 포함된다. 5월 23일 기준 제미나이 3.5 프로는 6월 중 출시 예정으로 발표돼 OpenAI·앤스로픽과의 모델 경쟁이 한층 격화될 전망이다.`,
  keyTerms:[{term:`에이전트형 AI`,explanation:`사람이 일일이 지시하지 않아도 스스로 목표를 쪼개 도구를 골라 쓰고 여러 단계 작업을 자동으로 처리하는 AI를 말한다. 구글이 이번에 공개한 제미나이 스파크와 안티그래비티 2.0이 모두 이 방향을 겨냥하며, 비서·코딩·업무 자동화 시장이 가장 큰 영향권에 들어간다.`}],
  history:`구글은 2023년 제미나이 1.0 출시 이후 매년 I/O에서 차세대 모델을 공개해왔다. 2025년 제미나이 3.0 발표 뒤 OpenAI GPT-5, 앤스로픽 Claude 5와의 격차가 좁혀지자 모델 출시 주기를 6개월 단위로 단축했다. 2026년 들어서는 에이전트형 AI 경쟁이 산업 핵심 의제로 자리잡았다.`,
  players:`구글 딥마인드는 제미나이 3.5와 스파크 개발을 주도했고 알파벳 CEO 순다르 피차이가 발표 키노트를 직접 진행했다. 경쟁자인 OpenAI는 같은 주 IPO 신청서를 제출했고 앤스로픽은 900억 달러 규모 펀딩 라운드를 마감했다. 한국 네이버·카카오도 자체 LLM과의 격차를 좁히기 위해 분주하다.`,
  current:`에이전트형 AI 상용화 속도가 빨라지면서 광고·검색·생산성 SW 비즈니스 모델 전반이 재편 압력을 받고 있다. AI 안전 규제도 동시에 정치 의제로 떠올랐다.`,
  outlook:`6월 중 제미나이 3.5 프로 출시, 7월 OpenAI 차기 모델 공개, 8월 미국 AI 안전 행정명령 후속 입법이 주요 이정표다. 한국 정부의 AI 기본법 후속 시행령도 6월 중 발표될 예정이다.`,
  sources:[{title:`Google I/O 2026: Gemini 3.5 Flash, Spark and Agentic AI - Build Fast With AI`,url:`https://www.buildfastwithai.com/blogs/google-io-2026-gemini-3-5-flash-announcements`},{title:`Everything Google announced at I/O 2026: Gemini, Search, Android XR - 9to5Google`,url:`https://9to5google.com/2026/05/19/google-io-2026-news/`}]

  headline:`HMM 나무호 호르무즈 피격, 정부 미상비행체 타격 공식 발표…공격주체는 미확인`,
  metrics:[`선미 좌현 외판 직경 약 50cm 구멍`,`5월 4일 약 1분 간격 2차례 피격`],
  summary:`지난 5월 4일 호르무즈 해협 인근에서 발생한 한국 해운사 HMM의 나무호 피격 사건과 관련해 정부가 23일 미상의 비행체가 선미를 타격한 것으로 확인됐으나 기종과 공격주체는 미확인이라고 공식 발표했다. 외교부 합동조사단은 약 1분 간격으로 두 차례 타격이 있었고 2차 타격이 화재 확산을 일으켰다고 밝혔다. 선체 바깥쪽에는 직경 약 50cm의 반구형 관통 흔적과 선미 좌현 외판이 크게 찢긴 흔적이 확인됐다. 주한이란대사관은 이란군 개입을 부인했다. 정부는 미국·UAE 군 당국 및 보험사와 공동 조사를 진행 중이다. 한국 정부는 호르무즈 항행 한국 국적 선박에 대한 호위 강화와 우회항로 안내를 결정했으며, 산업통상자원부는 정유 4사와 협의해 비축유 활용 시나리오를 점검 중이다.`,
  keyTerms:[{term:`비축유`,explanation:`원유 공급에 차질이 생길 때 즉시 시장에 풀기 위해 정부와 정유사가 평소에 저장해두는 원유를 말한다. 호르무즈 사태로 유가가 급등하고 한국 선박이 직접 피격당한 만큼, 비축유 방출은 단기 가격 안정과 수급 차질 대응의 핵심 카드로 거론된다.`}],
  history:`호르무즈 해협은 한국이 도입하는 원유의 약 70%가 통과하는 핵심 길목이다. 2026년 3월 이란의 봉쇄 선언 이후 한국 선박은 우회항로와 호위 작전에 의존해 왔다. 5월 4일 HMM 나무호 피격은 한국 국적 상선이 직접 표적이 된 첫 사례로 기록된다.`,
  players:`외교부·국방부·산업통상자원부가 합동 대응을 맡고 있고, HMM과 정유 4사가 공급망 관리에 직접 참여한다. 미국 5함대와 UAE 해군이 호위 작전에 협력 중이다. 이란 정부는 군 개입 부인을 유지하고 있다.`,
  current:`공격주체 미확인 상태가 길어지면서 외교적 대응 카드가 제한적인 점이 가장 큰 부담이다. 정유사들은 원유 도입 단가 상승을 5월 이후 휘발유·경유 소비자가에 반영하기 시작했다.`,
  outlook:`5월 말 합동조사 중간보고, 6월 한·미·UAE 3자 협의, 7월 호르무즈 호위전대 추가 배치 여부가 변수다. 정부는 6월 중 비축유 방출 여부를 결정할 전망이다.`,
  sources:[{title:`정부 호르무즈 나무호 화재는 미상비행체 타격, 기종 미확인 - MBC뉴스`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6821325_37004.html`},{title:`HMM 나무호 피격 사건 - 나무위키`,url:`https://namu.wiki/w/HMM%20%EB%82%98%EB%AC%B4%ED%98%B8%20%ED%94%BC%EA%B2%A9%20%EC%82%AC%EA%B1%B4`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`김건희 여사 항소심 징역 4년…1심보다 무거운 형량 선고`,
  metrics:[`항소심 선고 징역 4년 + 벌금형`,`1심 대비 형량 가중`],
  summary:`김건희 여사의 도이치모터스 주가 조작 공모 혐의와 명품 가방 수수 혐의 항소심에서 1심보다 무거운 징역 4년과 벌금형이 선고됐다. 재판부는 법적 책임 회피 목적의 죄질이 나쁘다며 가중 사유를 명시했고, 사회적 영향을 고려해 엄정한 양형이 필요하다고 판시했다. 이번 선고는 종합특검의 김대기 전 비서실장·윤재순 전 총무비서관 구속과 맞물려 전 정부 인사들에 대한 사법 단죄 흐름을 보여준다는 평가가 나온다. 김 여사 측 변호인단은 즉각 상고 방침을 밝혔다. 이번 판결은 6·3 지방선거를 열흘 앞두고 나온 만큼 중도층 표심에 영향을 줄 변수로 거론된다. 시민사회는 검찰 개혁과 공직자 윤리 강화를 요구하는 목소리를 다시 키우고 있다.`,
  keyTerms:[{term:`상고`,explanation:`2심(고등법원) 판결에 불복해 대법원에 다시 판단을 요청하는 절차다. 김건희 여사 측이 상고하면 사건은 대법원으로 올라가며, 대법원은 사실관계를 새로 따지지 않고 법령 적용이 맞았는지만 따져 보통 수개월 안에 최종 확정 여부를 결정한다.`}],
  history:`도이치모터스 주가 조작 사건은 2010~2012년 발생한 시세조종 혐의로, 김 여사의 계좌가 동원됐다는 의혹이 2020년부터 본격 제기됐다. 윤석열 정부 임기 중 수사가 답보 상태에 머물렀다가 이재명 정부 출범 뒤 종합특검 출범으로 수사가 재가동됐다.`,
  players:`종합특검은 김대기·윤재순 등 전 정부 핵심 인사들에 대한 수사를 확장하고 있다. 김 여사 변호인단은 무죄·집행유예를 주장해 왔다. 시민단체와 야당은 사법부의 양형 기준 강화를 요구하고 있다.`,
  current:`1심에 비해 가중된 항소심 선고가 나오면서 사법부가 정치권 거물에 대한 엄정 양형 기조를 분명히 했다는 평가가 나온다. 6·3 지방선거 중도층 표심에 미칠 파급도 관전 포인트다.`,
  outlook:`변호인단의 상고 절차 진행, 대법원 심리 일정 확정, 종합특검의 추가 기소 여부가 향후 한 달의 핵심 이벤트다. 6월 지방선거 직후 추가 사법 절차가 본격화될 전망이다.`,
  sources:[{title:`김건희-명태균-건진법사 게이트 재판 - 나무위키`,url:`https://namu.wiki/w/%EA%B9%80%EA%B1%B4%ED%9D%AC-%EB%AA%85%ED%83%9C%EA%B7%A0-%EA%B1%B4%EC%A7%84%EB%B2%95%EC%82%AC%20%EA%B2%8C%EC%9D%B4%ED%8A%B8/%EC%9E%AC%ED%8C%90/%EA%B9%80%EA%B1%B4%ED%9D%AC`},{title:`2026년 5월 23일 오늘의 주요 뉴스 - 오늘의 클릭`,url:`https://www.cliktoday.com/2026/05/20260523-today-news.html`}]
}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미 연준 기준금리 동결, 워시 차기 의장 인준 초읽기`,
  metrics:[`연말 동결 확률 74.5%`,`정책 표결 8-4 분열`],
  summary:`미국 연방준비제도(Fed)가 5월 22일 정책결정회의에서 기준금리를 8-4 표결로 동결했다. 시장은 연말까지 기준금리 동결 가능성을 74.5%로 반영하고 있으며, 인하 확률은 10.6%에 그친다. 케빈 워시 차기 의장 인준이 임박했고, 제롬 파월 현 의장은 1948년 마리너 이클스 이후 처음으로 의장 퇴임 후 이사로 잔류하기로 확정됐다. 유럽중앙은행(ECB) 역시 정책금리를 동결하며 글로벌 통화정책은 관망 국면에 진입했다. 다만 인플레이션 기대치가 여전히 높고 중동 분쟁이 변동성을 키우고 있어 향후 코어 PCE 지표가 최대 변수로 부상했다. 워시 신임 의장은 취임과 동시에 끈질긴 가격 압력에 대응해야 하는 도전에 직면한다. 7월 NATO 정상회의와 이란 협상 등 외교 변수도 시장 불확실성을 가중시키는 형국이다.`,
  keyTerms:[{term:`기준금리`,explanation:`한 나라 중앙은행이 시중 은행에 돈을 빌려줄 때 적용하는 가장 기본이 되는 금리야. 이걸 올리거나 내리면 대출·예금 금리, 환율, 주가까지 줄줄이 영향을 받기 때문에 모든 통화정책의 출발점이라고 보면 돼.`}],
  history:`미 연준은 2020년 팬데믹 시기 초저금리와 양적완화로 자산시장을 부양했고, 2022년부터 40년 만의 최악 인플레이션에 맞서 1년 만에 5%포인트 넘게 급격히 금리를 올렸다. 2023년 하반기부터는 동결 기조로 전환했지만, 트럼프 행정부 재집권 이후 관세와 재정정책이 물가 압력을 다시 자극해왔다. 2026년 들어 연준 내부에서 매파와 비둘기파의 시각차가 커지며 표결 분열이 빈번해진 상태다.`,
  players:`케빈 워시 차기 의장과 제롬 파월 현 의장의 협력 체제가 핵심 변수다. 트럼프 대통령은 금리 인하 압박을 이어가고 있고, ECB의 라가르드 총재는 동결로 보조를 맞추고 있다. 시장에서는 골드만삭스·JP모건이 연말 동결을 우세 시나리오로 제시하고 있다.`,
  current:`표결이 8-4로 갈리며 인하 압박이 커지고 있고, 코어 PCE 지표 발표가 임박해 통화정책 방향성을 좌우할 분수령으로 평가된다. 워시 신임 의장의 첫 메시지가 시장 기대를 좌우할 전망이다.`,
  outlook:`다음 주 발표될 코어 PCE 인플레이션이 핵심 분기점이며, 7월 NATO 앙카라 정상회의와 이란 협상 진전 여부도 위험 요인으로 작용할 것이다.`,
  sources:[{title:`Americas FX news wrap 22 May: Markets eye Iran talks, Fed signals - investingLive`,url:`https://investinglive.com/news/investinglive-americas-fx-news-wrap-22-may-markets-eye-iran-talks-fed-signals-now-20260522/`},{title:`Global Markets Overview: May 2026 - WTW`,url:`https://www.wtwco.com/en-nl/insights/2026/05/global-markets-overview-may-2026`},{title:`Central bank depository May 2026 - SEI EMEA`,url:`https://www.seic.com/en-gb/about-sei/market-commentaries/central-bank-depository-may-2026`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`삼성전자 노사, 평균 임금 6.2% 인상·특별경영성과급 신설 합의`,
  metrics:[`평균 임금 6.2% 인상`,`주택자금 대출 최대 5억원`],
  summary:`삼성전자 노사가 2026년 임금협상에 잠정 합의하며 평균 임금 6.2% 인상에 도달했다. 반도체를 담당하는 디바이스솔루션(DS) 부문에는 사업성과의 10.5%를 재원으로 하는 특별경영성과급이 신설된다. 임직원 대상 최대 5억원의 주택자금 대출 제도도 도입되어 업계 최고 수준의 처우 패키지로 평가된다. 이는 SK하이닉스와의 HBM 패권 경쟁이 심화되는 가운데 핵심 인재 이탈을 방어하기 위한 조치로 해석된다. 노사 갈등 없이 협상이 마무리되며 반도체 생산 차질 우려가 해소된 점도 시장에서 긍정적으로 평가됐다. 22일 코스피는 이러한 호재에 힘입어 7873선 위로 상승 출발했고, 삼성전자 주가도 강세를 보였다. 인건비 부담 증가가 단기 수익성에 미치는 영향과 비조합원 처우 형평성 논란은 향후 과제로 남는다.`,
  keyTerms:[{term:`특별경영성과급`,explanation:`회사 전체 성과가 아닌 특정 사업부의 실적을 별도 재원으로 삼아 그 부서 직원에게만 지급하는 인센티브야. 잘 버는 부서일수록 더 많이 받기 때문에, 반도체처럼 호황·불황 차이가 큰 부문에서 핵심 인재를 붙들어 두는 수단으로 쓰여.`}],
  history:`삼성전자는 2018년 무노조 경영 폐기 선언 이후 복수의 노조가 출범했고, 2023~2024년 임금협상 과정에서 사상 첫 총파업 위기를 겪으며 노사 관계가 격변기에 들어섰다. 2025년부터는 HBM·AI 메모리 슈퍼사이클이 본격화되며 인재 유치 비용이 급증했고, SK하이닉스로의 핵심 엔지니어 이탈도 노골화됐다. 이런 흐름이 이번 협상의 파격적 처우 합의를 이끌었다.`,
  players:`삼성전자 노사협의회와 전국삼성전자노조가 사측과 마주 앉았고, DS 부문장과 인사팀이 협상 실무를 총괄했다. SK하이닉스가 가장 큰 외부 변수로, 반도체 인재 확보 경쟁에서 직접적인 경쟁자다.`,
  current:`잠정 합의안은 향후 조합원 찬반 투표를 거쳐 최종 확정된다. 협상 타결 자체가 반도체 생산 안정성과 직결되는 만큼 시장은 합의 내용을 즉시 호재로 받아들였다.`,
  outlook:`조합원 투표 결과와 6월 발표 예정인 2분기 실적, 그리고 HBM4 양산 진행 상황이 향후 주가 방향성을 좌우할 핵심 변수다.`,
  sources:[{title:`삼성전자 임금협상 타결 및 스타벅스 탱크데이 논란 - 오늘의 클릭`,url:`https://www.cliktoday.com/2026/05/20260522-today-news.html`},{title:`한국경제 - 삼성전자 노사 합의`,url:`https://www.hankyung.com/`},{title:`한국은행 - Bank of Korea`,url:`https://www.bok.or.kr/portal/main/main.do`}]

  headline:`TIGER 미국우주테크 ETF, 상장 24영업일 만에 순자산 1조원 돌파`,
  metrics:[`순자산 1조원 (24영업일)`,`코스피 종가 7847.71 (+0.41%)`],
  summary:`국내 자산운용업계에 새로운 기록이 작성됐다. TIGER 미국우주테크 ETF가 4월 14일 300억원 규모로 상장한 뒤 단 24영업일 만에 순자산 1조원을 돌파했다. 이는 국내 상장 패시브형 ETF 중 최단기간 1조원 돌파 기록이다. 미국 우주산업 밸류체인에 직접 베팅하려는 개인 투자자 자금이 집중적으로 유입된 결과로 분석된다. 같은 날 코스피 지수는 32.12포인트 오른 7847.71에 마감하며 강세장을 이어갔고, 개인은 1조5596억원, 기관은 9683억원어치를 순매수했다. 우주·AI·반도체 등 첨단 테마형 상품으로의 자금 쏠림 현상이 더욱 가속화되는 추세다. 시장은 이러한 패시브형 ETF 자금 흐름이 코스피 추가 상승의 동력이 될지, 아니면 테마 과열 신호인지 주목하고 있다.`,
  keyTerms:[{term:`패시브형 ETF`,explanation:`코스피200·S&P500처럼 미리 정해진 지수를 그대로 따라가도록 만든 펀드 상품이야. 사람이 종목을 골라 사고파는 액티브 펀드와 달리 운용 수수료가 싸고 거래소에서 주식처럼 사고팔 수 있어서 개인 투자자 사이에서 인기가 빠르게 커지고 있어.`}],
  history:`한국 ETF 시장은 2002년 첫 상장 이후 2020년대 들어 개인 투자자 직접 투자 붐을 타고 폭발적으로 성장했다. 특히 미국 빅테크·반도체·우주 등 해외 테마형 패시브 상품이 2024년부터 자금 유입을 주도해왔다. 2025년부터는 우주산업이 차세대 성장 테마로 부각되며 관련 ETF가 줄지어 출시됐다.`,
  players:`미래에셋자산운용·삼성자산운용·KB자산운용이 ETF 시장 빅3로 경쟁 중이며, 미국 ARK·블랙록·뱅가드가 글로벌 상품 공급원 역할을 한다. 우주 분야 대표 종목으로는 스페이스X 협력사와 로켓랩, 락히드마틴 등이 포함된다.`,
  current:`최단기간 1조원 돌파라는 상징적 사건은 개인 자금이 우주 테마에 얼마나 빠르게 쏠리고 있는지를 보여주는 지표다. 다만 상품 출시 직후의 마케팅 효과인지, 지속 가능한 추세인지 판단은 시기상조다.`,
  outlook:`6월 미국 우주 관련 기업 실적 발표와 NASA·SpaceX 발사 일정이 향후 자금 유입 지속 여부를 가를 분기점이다.`,
  sources:[{title:`TIGER 미국우주테크 ETF 1조원 돌파 - 한국경제`,url:`https://www.hankyung.com/`},{title:`주식시장 시세와 금융뉴스 - Investing.com`,url:`https://kr.investing.com/`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`루비오, 헬싱보리 NATO 회담서 동맹 압박… 7월 앙카라 정상회의 분수령`,
  metrics:[`폴란드 추가 파병 5,000명`,`7월 앙카라 NATO 정상회의 예정`],
  summary:`마르코 루비오 미 국무장관이 5월 22일 스웨덴 헬싱보리에서 열린 NATO 외교장관 회의에서 동맹국들의 미온적 태도를 강하게 질책했다. 미국이 주도한 이란 작전인 오퍼레이션 에픽 퓨리에 대해 스페인 등 일부 동맹국이 미군 기지 사용을 거부했고, 호르무즈 해협 보호 연합에도 동참을 꺼리는 상황이다. 트럼프 대통령은 이 같은 동맹의 반응에 깊은 실망감을 표시하며, 7월 튀르키예 앙카라에서 열릴 NATO 정상회의가 동맹 역사상 가장 결정적인 회의가 될 것이라고 밝혔다. 동시에 미국은 독일에서 철수한 병력 5,000명을 폴란드에 새로 배치한다고 발표하며 동유럽 전선을 강화했다. 이는 NATO의 임무 재정의를 둘러싼 갈등이 본격화되는 신호로 해석된다. 우크라이나·이란·인태 지역 등 다중 전선에서 동맹의 분담 비중이 핵심 쟁점으로 부상하고 있다. NATO의 응집력과 미국 리더십의 향방이 가늠될 분수령이다.`,
  keyTerms:[{term:`오퍼레이션 에픽 퓨리`,explanation:`2026년 미국이 이란을 상대로 진행 중인 군사작전의 작전명이야. 이란 핵시설 무력화와 호르무즈 해협 통제권 확보가 목표인데, 일부 NATO 동맹국이 미군 기지 사용을 거부하면서 동맹 간 균열의 핵심 원인이 되고 있어.`}],
  history:`NATO는 1949년 대서양 양안 집단방위를 위해 출범했지만, 트럼프 1기부터 미국의 방위비 부담 불만이 누적돼왔다. 2026년 들어 이란 전쟁이 격화되면서 NATO의 작전 범위가 유럽을 넘어 중동까지 확장될지가 동맹의 정체성을 가르는 핵심 질문으로 떠올랐다.`,
  players:`루비오 국무장관, 마르크 뤼터 NATO 사무총장, 그리고 미국 작전 협조를 거부한 스페인의 산체스 총리가 핵심 인물이다. 트럼프는 NATO 회의적 시각을 거듭 노출해왔고, 폴란드·발트3국은 미국 편에 가까이 서 있다.`,
  current:`이번 헬싱보리 회의는 7월 앙카라 정상회의 전 마지막 외교장관급 조율 자리다. 동맹의 균열이 표면화될지 봉합될지 가늠할 시험대로 평가된다.`,
  outlook:`7월 튀르키예 앙카라 NATO 정상회의에서 동맹의 임무 재정의 합의 여부가 결정되며, 그 직전 이란 협상 진전이 변수다.`,
  sources:[{title:`Rubio ratchets up pressure on NATO at key summit - Federal Times`,url:`https://www.federaltimes.com/news/pentagon-congress/2026/05/22/rubio-ratchets-up-pressure-on-nato-at-key-summit/`},{title:`At NATO meeting, Rubio embarks on another mission to ease tensions with allies - PBS News`,url:`https://www.pbs.org/newshour/world/at-nato-meeting-rubio-embarks-on-another-mission-to-ease-tensions-with-allies`},{title:`Rubio embarks on mission to ease tensions with allies during NATO meeting - Washington Post`,url:`https://www.washingtonpost.com/politics/2026/05/22/nato-rubio-trump-europe-troop-reductions/eda71124-5592-11f1-9c40-7a0a12d9e745_story.html`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`우크라이나, 러시아 최대 정유시설 드론 타격… 올해 590km² 수복`,
  metrics:[`올해 수복 영토 590km²`,`러시아 최대 정유시설 1곳 피격`],
  summary:`우크라이나가 5월 22일 러시아 최대 정유시설 중 하나를 드론으로 타격하며 후방 압박을 끌어올렸다. 젤렌스키 대통령은 우크라이나가 올해만 590km²의 영토를 수복했다며 이를 러시아를 외교 테이블로 강제하는 압박 외교의 결과로 자평했다. 같은 날 영국 키어 스타머 총리, 프랑스 마크롱 대통령, 독일 메르츠 총리와 4자 통화를 진행하며 유럽 전선의 결속을 재확인했다. 우크라이나 총참모부는 점령지 루한스크에서 민간인이 사망했다는 러시아 측 주장을 즉각 반박하고, 군사 인프라만 표적으로 했다고 밝혔다. 이번 작전은 정유시설을 직접 타격해 러시아 전쟁 수행 능력과 재정을 동시에 약화시키는 새로운 전략의 일환이다. 미국의 중재 의지가 약해진 가운데 유럽이 우크라이나 지원의 무게 중심으로 부상하는 상황이다. 7월 NATO 앙카라 정상회의가 우크라이나 평화협상 향방의 분기점이 될 전망이다.`,
  keyTerms:[{term:`압박 외교`,explanation:`협상 테이블에서 말로 설득하기 전에 군사·경제적 손실을 입혀 상대가 협상에 응할 수밖에 없게 만드는 방식이야. 우크라이나가 러시아 정유시설을 때리고 영토를 되찾는 건 곧 말을 듣지 않으면 더 잃는다는 신호를 주려는 전형적인 압박 외교 전술이지.`}],
  history:`2022년 2월 시작된 러시아의 우크라이나 침공은 4년 넘게 이어지고 있다. 2024~2025년 미국 대선과 트럼프 재집권으로 서방 지원 동력이 흔들렸고, 우크라이나는 자체 드론 산업을 키워 러시아 후방을 직접 타격하는 전략으로 전환했다. 2026년 들어 정유시설 타격이 일상화되며 러시아 휘발유 수출이 크게 위축됐다.`,
  players:`젤렌스키 대통령, 스타머·마크롱·메르츠 등 유럽 3국 정상이 동맹의 핵심이다. 푸틴 러시아 대통령은 우크라이나의 정유시설 공격을 민간인 피해로 규정하며 여론전을 펴고 있다. 미국 트럼프 행정부는 양측 모두에 압박을 가하면서도 적극적 중재는 거리를 두고 있다.`,
  current:`590km² 수복과 정유시설 타격은 군사적·심리적으로 모두 상징성이 크다. 동시에 유럽 4자 통화는 미국 부재 속 유럽 자체 지원 체계 구축의 신호로 읽힌다.`,
  outlook:`7월 NATO 앙카라 정상회의에서 우크라이나 지원 패키지가 갱신될지, 동시에 미·러·우크라이나 3자 협상 틀이 가동될지가 핵심 변수다.`,
  sources:[{title:`Ukraine drones hit one of Russia biggest oil refineries - Kyiv Independent`,url:`https://kyivindependent.com/`},{title:`Ukrainian National News Agency - Ukrinform`,url:`https://www.ukrinform.net/`},{title:`Ukraine News Today Live - NewsNow`,url:`https://www.newsnow.co.uk/h/World+News/Europe/Eastern+Europe/Ukraine`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`6·3 지방선거 D-12, 여당 광역단체장 9~13곳 우세 전망`,
  metrics:[`광역단체장 여당 우세 9~13곳`,`14개 선거구 재보궐 동시 실시`],
  summary:`6월 3일 치러질 제9회 전국동시지방선거가 12일 앞으로 다가오면서 판세 분석이 본격화되고 있다. 여론조사 전문기관들은 여당이 17개 광역단체장 중 9~13곳에서 우세를 점하고 있다고 분석한다. 이번 선거는 14개 선거구의 국회의원 재보궐선거가 동시에 치러져 미니 총선급으로 평가된다. 특히 보수 텃밭으로 꼽혀온 대구광역시장 선거에 출마한 김부겸 전 총리가 일부 여론조사에서 국민의힘 후보를 앞서며 이변을 예고하고 있다. 개혁신당의 울산 참전, 충청권 박빙 구도, 그리고 스타벅스 5·18 탱크데이 논란 등 사회적 이슈도 최종 결과를 흔들 변수로 꼽힌다. 정치권은 6월 3일을 향후 정국 운영의 분수령으로 보고 막판 표심 확보에 총력을 기울이고 있다. 사전투표는 5월 29~30일 이틀간 진행된다.`,
  keyTerms:[{term:`전국동시지방선거`,explanation:`광역·기초단체장과 광역·기초의원, 교육감을 한꺼번에 뽑는 4년 주기의 전국 단위 선거야. 단순한 지역 행정 책임자 선출을 넘어 현 정부에 대한 중간평가 성격을 갖기 때문에 정국 향방의 분수령으로 평가돼.`}],
  history:`전국동시지방선거는 1995년 6월 첫 도입 이후 4년 주기로 실시돼왔다. 2022년 제8회 선거에서는 보수 진영이 광역단체장 17곳 중 12곳을 차지하며 압승했지만, 이후 정권 교체와 부동산·민생 이슈를 거치며 판세가 크게 뒤집혔다. 이번 제9회 선거는 그 결과의 연장선상에서 정권 평가 의미가 강하다.`,
  players:`민주당·국민의힘·개혁신당·정의당 등 주요 정당이 각축전을 벌이고 있다. 김부겸 전 총리의 대구 출마, 개혁신당의 울산 도전, 충청권 박빙 후보들이 가장 주목받는 인물·구도다.`,
  current:`여당 우세 흐름은 유지되고 있지만 스타벅스 5·18 논란 등 돌발 이슈가 표심을 흔들 변수다. 사전투표 직전 1주일이 판세 굳히기의 핵심 구간이다.`,
  outlook:`5월 29~30일 사전투표 결과, 6월 3일 본투표 개표, 그리고 6월 중 정국 재편 및 개각 가능성이 핵심 일정이다.`,
  sources:[{title:`제9회 전국동시지방선거 - 다음 이슈`,url:`https://issue.daum.net/election/2026`},{title:`선거일정 - 중앙선거관리위원회`,url:`https://www.nec.go.kr/site/nec/ex/bbs/View.do?cbIdx=1104&bcIdx=289351`},{title:`6월 3일 지방선거 후보 조회 및 격전지 판세 - 모두의 소식`,url:`https://unips.co.kr/`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`OpenAI·엔비디아, 10GW 규모 AI 인프라 전략 파트너십… 최대 1,000억 달러 투자`,
  metrics:[`투자 규모 최대 1,000억 달러`,`배치 시스템 10기가와트(GW)`],
  summary:`엔비디아가 OpenAI에 단계적으로 최대 1,000억 달러를 투자하며 차세대 AI 인프라 구축을 위한 전략적 파트너십을 체결한다고 발표했다. 양사는 차세대 모델 훈련과 추론을 위해 최소 10기가와트(GW) 규모의 엔비디아 시스템을 배치할 계획이다. 첫 1GW 규모 시스템은 2026년 하반기 엔비디아 베라 루빈(Vera Rubin) 플랫폼을 기반으로 가동에 들어간다. 앤트로픽·메타·미스트랄·퍼플렉시티·xAI 등 주요 AI 랩들도 루빈 플랫폼을 차기 학습 인프라로 채택할 전망이다. 다만 엔비디아가 같은 주 발표한 가이던스에서 시장 예상치를 밑도는 수치를 제시해 AI 칩 경쟁 심화 우려가 동시에 부각됐다. 데이터센터 전력 수요 폭증과 전력망 부담도 글로벌 AI 인프라 업계의 새로운 과제로 부상했다. 향후 AI 인프라 투자가 빅테크 자본지출의 핵심 변수로 자리 잡을 전망이다.`,
  keyTerms:[{term:`AI 인프라`,explanation:`AI 모델을 학습시키고 서비스하기 위해 필요한 데이터센터·GPU 서버·전력·냉각 시스템 전체를 가리키는 말이야. 모델 성능은 곧 인프라 규모에 비례하기 때문에, 요즘 빅테크 사이에서는 얼마나 큰 인프라를 가졌느냐가 경쟁력의 핵심 척도로 자리 잡았어.`}],
  history:`엔비디아와 OpenAI는 2015년 OpenAI 창립 초기부터 협력해왔고, 2022년 ChatGPT 공개 이후 GPU 공급·자본 투자 관계가 빠르게 심화됐다. 2026년 들어 AI 모델 규모가 GW급 전력을 요구하는 단계로 진입하면서 양사는 단순 부품 공급을 넘어 전략적 합작 단계로 격상됐다.`,
  players:`젠슨 황 엔비디아 CEO와 샘 알트먼 OpenAI CEO가 양사 협력을 이끌고 있다. 마이크로소프트는 OpenAI 최대 투자자이자 클라우드 파트너로 이번 인프라 구상의 핵심 협력자다. 경쟁사로는 구글·AMD·아마존이 자체 AI 칩 개발에 속도를 내고 있다.`,
  current:`10GW는 원전 10기에 맞먹는 규모로, 발표만으로도 전 세계 전력 인프라 시장에 충격을 주는 수치다. 동시에 엔비디아 실적 부진 우려와 맞물려 AI 투자 사이클의 정점 논란도 일고 있다.`,
  outlook:`2026년 하반기 첫 1GW 시스템 가동 시점, 그리고 미국·유럽 데이터센터 전력 인허가 추이가 향후 AI 인프라 패권의 향방을 좌우할 변수다.`,
  sources:[{title:`OpenAI and NVIDIA Strategic Partnership 10GW - NVIDIA Newsroom`,url:`https://nvidianews.nvidia.com/news/openai-and-nvidia-announce-strategic-partnership-to-deploy-10gw-of-nvidia-systems`},{title:`NVIDIA Kicks Off Next Generation of AI With Rubin - NVIDIA Newsroom`,url:`https://nvidianews.nvidia.com/news/rubin-platform-ai-supercomputer`},{title:`Nvidia falls on disappointing forecast as AI chip competition mounts - Bloomberg`,url:`https://www.bloomberg.com/news/articles/2026-05-20/nvidia-gives-disappointing-forecast-as-chip-competition-mounts`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`스타벅스 5·18 탱크데이 논란 확산… 정용진 회장 대국민 사과·전 대표 해임`,
  metrics:[`손정현 전 대표 즉시 해임`,`5월 19일 정용진 회장 대국민 사과`],
  summary:`스타벅스코리아가 5·18 광주민주화운동 기념일을 앞두고 진행한 탱크데이 마케팅이 국민적 공분을 사고 있다. 5월 18일 날짜를 표시한 이미지에 탱크데이라는 표현과 책상에 탁이라는 문구를 함께 사용한 것이 광주민주화운동과 1987년 박종철 고문치사 사건을 동시에 모욕했다는 비판이 제기됐다. 신세계그룹은 손정현 전 대표와 행사 기획 담당 임원을 즉시 해임하고 관련 임직원 징계 절차에 착수했다. 정용진 신세계그룹 회장은 19일 대국민 사과문을 발표하고 부적절한 마케팅에 대한 모든 책임이 자신에게 있다고 밝혔다. 시민단체와 5·18 유족회는 추가 법적 대응까지 검토 중이며, 불매운동 움직임도 확산세다. 사태는 6·3 지방선거 표심에까지 영향을 미칠 변수로 꼽히며 정치권 공방으로도 비화되고 있다. 신세계그룹 주가와 브랜드 가치 회복 여부가 단기 과제로 부상했다.`,
  keyTerms:[{term:`5·18 광주민주화운동`,explanation:`1980년 5월 18일부터 27일까지 광주 시민들이 신군부 계엄군에 맞서 일어선 민주화 항쟁이야. 진압 과정에서 다수의 시민이 희생됐고, 이후 한국 민주주의의 상징적 사건으로 자리 잡았기 때문에 이를 가볍게 다루는 마케팅은 사회적 금기로 여겨져.`}],
  history:`신세계그룹은 2017년 미국 스타벅스 본사로부터 한국 사업권을 완전히 인수해 스타벅스코리아를 자회사로 두고 있다. 정용진 회장은 2024년 회장 승진 이후 SNS 행보와 정치색 짙은 발언으로 여러 차례 논란에 휘말려왔다. 이번 사건은 그 누적된 우려가 폭발한 사례로 평가된다.`,
  players:`정용진 신세계그룹 회장, 손정현 전 스타벅스코리아 대표, 그리고 5·18 유족회·시민단체가 핵심 행위자다. 정치권에서도 여야가 이번 논란을 각자의 프레임으로 활용하며 6·3 지방선거 쟁점으로 끌어올리고 있다.`,
  current:`전 대표 해임과 회장 사과가 단행됐지만 여론은 즉각 가라앉지 않고 있다. 광주·전남 지역에서는 매장 앞 항의 시위도 보고되고 있다.`,
  outlook:`5·18 유족회의 법적 대응 결정, 6월 3일 지방선거 광주·전남 결과, 그리고 신세계그룹 추가 후속 조치가 사태 수습 여부를 가를 변수다.`,
  sources:[{title:`정용진 신세계 회장이 5·18 탱크데이 논란 사과 서두른 이유 - ZDNet Korea`,url:`https://zdnet.co.kr/view/?no=20260519150809`},{title:`정용진 신세계 회장, 스타벅스 5·18 폄훼 직접 대국민 사과 - 전자신문`,url:`https://www.etnews.com/20260519000069`},{title:`정용진, 스타벅스 탱크데이 논란 대국민 사과 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202605190946590070`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`삼성전자 4나노 파운드리 완판… HBM4 베이스 다이 양산 가속`,
  metrics:[`4나노 파운드리 가동률 100%`,`HBM4 베이스 다이 양산 단계 진입`],
  summary:`삼성전자의 4나노 파운드리 라인이 내년치까지 완전 예약 마감 상태에 들어갔다. AI 가속기에 필수적인 HBM4 베이스 다이 생산이 본격화되며 4나노 라인 가동률이 100%에 근접한 것으로 파악된다. 추가 수주가 사실상 불가능해지면서 삼성전자는 추가 생산능력 확대를 검토 중이다. SK하이닉스와의 HBM 패권 경쟁 속에서 베이스 다이 양산 능력이 차세대 AI 가속기 시장 점유율을 좌우할 핵심 변수로 부상했다. 한편 삼성전자는 새로운 성장 동력 확보를 위해 실리콘카바이드(SiC) 파운드리 사업도 재개했다. 심텍·TLB·코리아써키트 등 중견 부품사 주가도 동반 강세를 보이며 AI 밸류체인 전반으로 매수세가 확산됐다. 다만 엔비디아의 가이던스 부진과 AI 칩 경쟁 심화는 향후 변수로 남는다.`,
  keyTerms:[{term:`HBM4`,explanation:`AI 가속기에 들어가는 초고속 메모리 반도체의 4세대 규격이야. 여러 개의 메모리 칩을 위로 쌓아 데이터 전송 속도를 극단적으로 끌어올린 구조인데, 엔비디아·AMD의 차세대 AI 칩이 모두 HBM4를 요구하기 때문에 삼성전자와 SK하이닉스가 사활을 걸고 양산 경쟁을 벌이고 있어.`}],
  history:`HBM은 2013년 SK하이닉스가 세계 최초로 양산한 이래 AI 시대를 맞아 폭발적으로 수요가 늘었다. 2024~2025년 HBM3·HBM3E 단계에서는 SK하이닉스가 엔비디아 공급 우위를 가져갔지만, 삼성전자가 HBM4 단계에서 베이스 다이 공정을 무기로 반격에 나서고 있다.`,
  players:`삼성전자 파운드리·메모리 사업부, SK하이닉스, 그리고 핵심 고객사인 엔비디아·AMD가 핵심 플레이어다. 후공정 및 부품 영역에서는 심텍·TLB·코리아써키트 같은 중견 부품사가 수혜주로 부상하고 있다.`,
  current:`4나노 풀가동은 단순한 가동률 지표를 넘어 삼성전자가 HBM4 시장에서 의미 있는 점유율을 확보하기 시작했음을 보여주는 신호로 해석된다. 동시에 추가 캐파 부족이 단기 병목 요인이 될 수 있다.`,
  outlook:`삼성전자의 2분기 실적 발표(7월), HBM4 엔비디아 공급 인증 결과, 그리고 SiC 사업 진행 상황이 향후 주가와 산업 판세를 좌우할 분기점이다.`,
  sources:[{title:`AI 수요 폭발에 반도체 산업 지형 변화 - ESG Korea News`,url:`https://esgkoreanews.com/news/view.php?no=18091`},{title:`K-반도체가 열어갈 AI 강국의 미래 - 대한민국 정책브리핑`,url:`https://www.korea.kr/briefing/pressReleaseView.do?newsId=156734391`},{title:`글로벌 반도체 산업 관련 주요 뉴스 - SPTA Times Korea`,url:`https://www.sptatimeskorea.com/`}]
}]

  tag:`2026-05-22`,
  label:`2026년 5월 22일 (금요일)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`삼성전자 노사, 총파업 90분 전 극적 타결…DS 부문 특별경영성과급 신설·재원 31.5조 원 공개`,
  metrics:[`DS 부문 특별경영성과급 재원 약 31조5000억 원 (사업성과의 10.5%)`,`DS 부문 직원 약 7만8000명에게 1인당 평균 약 1억6000만 원 배분`],
  summary:`삼성전자 노사가 5월 20일 총파업 돌입 1시간 30분 전 극적으로 임금·성과급 협상에 잠정 합의했다. 노사는 기존 OPI(초과이익성과급) 제도를 유지하면서 DS 반도체 부문에 한해 특별경영성과급 제도를 새로 도입하기로 했다. 특별경영성과급 재원은 노사 합의 사업성과의 10.5%로 정해졌으며 지급 상한은 두지 않았다. 재원 총규모 약 31조5000억 원 중 40%에 해당하는 약 12조6000억 원이 DS 부문 인력 약 7만8000명에게 공통 배분되어 1인당 약 1억6000만 원 수준의 성과급 재원이 돌아간다. 핵심 쟁점이었던 적자사업부 성과급 배분 방식에 대해 회사 측이 1년간 유예하기로 하면서 극적 타결이 이뤄졌다. 잠정 합의안은 5월 23일부터 28일까지 조합원 찬반투표에 부쳐질 예정이다. 반도체 업계에서는 이번 특별경영성과급 신설이 핵심 인재 유출을 막고 조직 사기를 높이는 전환점이 될 것으로 평가한다.`,
  keyTerms:[{term:`특별경영성과급`,explanation:`기업이 일반 성과급(OPI) 외에 특정 사업부문의 실적에 따라 별도로 지급하는 추가 보너스 제도다. 삼성전자 DS 부문은 반도체 수익성에 연동해 재원을 산정하며 이번 합의로 처음 도입됐다.`}],
  history:`삼성전자 노사 성과급 갈등은 2024년부터 본격화됐다. DS 부문 메모리 반도체 가격 급락으로 대규모 적자가 발생하자 기존 OPI 방식으로는 성과급이 거의 지급되지 않았고 이에 반발한 노조가 파업에 나섰다. 2025년에도 협상이 결렬되며 간헐적 파업이 이어졌고 2026년에는 대규모 총파업 위기로까지 번졌다.`,
  players:`전국삼성전자노동조합은 DS 부문 직원 약 7만8000명을 대표하며 성과급 제도 개혁을 요구해왔다. 회사 측은 적자 상황에서 무제한 성과급 지급은 재무 건전성을 해친다는 입장을 고수했다. AI 반도체 수요 급증으로 핵심 인력 이탈 우려가 커지면서 양측 모두 타협 필요성을 절감했다.`,
  current:`반도체 업황이 2025년 하반기부터 회복세를 보이고 HBM 공급 확대로 DS 부문 실적이 개선되면서 성과급 지급 여력이 생겼다. 이번 합의는 2026년 총파업이라는 최악의 사태를 막고 노사 관계를 정상화하는 분수령이 됐다.`,
  outlook:`5월 23일부터 28일까지 조합원 찬반투표가 진행되며 가결 시 협약이 공식 확정된다. 투표 결과에 따라 재협상 가능성도 열려 있어 귀추가 주목된다. 장기적으로 이번 제도가 한국 반도체 산업 성과급 모델의 선례가 될 가능성이 있다.`,
  sources:[{title:`총파업 90분 전 극적 합의 삼성전자 노사 성과급 배분 막판 타결 - 뉴스핌`,url:`https://www.newspim.com/news/view/20260520001194`},{title:`삼성전자 총파업 피했다 노사 성과급 절충안 잠정 합의 - 전자신문`,url:`https://www.etnews.com/20260520000533`},{title:`실로 어마어마한 성과급 규모 공개됐다 - 위키트리`,url:`https://www.wikitree.co.kr/articles/1137600`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`트럼프-시진핑 베이징 회담 무역 합의…중국, 보잉 200대·美 농산물 연 170억 달러 구매 약속`,
  metrics:[`중국, 미국 농산물 연간 170억 달러 이상 구매 약속 (2025년 84억 달러 대비 약 2배)`,`중국의 보잉 항공기 200대 구매 및 미중 무역위원회·투자위원회 2개 신규 협의체 설립`],
  summary:`미국 트럼프 대통령과 중국 시진핑 주석이 5월 14~15일 베이징 정상회담에서 무역·투자 분야의 포괄적 합의를 도출했다. 중국은 미국 농산물을 연간 170억 달러 이상 구매하기로 약속했는데 이는 2025년 실적인 84억 달러의 약 2배에 달한다. 항공 분야에서 중국은 보잉 항공기 200대 구매 계획을 공식화해 미국 제조업 고용에도 긍정적 효과가 기대된다. 양국은 비민감 품목 쌍방 무역을 관리할 미중 무역위원회와 정부 간 투자 협의 채널인 미중 투자위원회를 신설하기로 합의했다. 트럼프 대통령은 이번 합의를 역사적 무역 합의라고 자평했으나 양측 성명에 해석 차이가 있어 향후 이행 과정이 주목된다. 희토류 공급망과 첨단 기술 수출 통제 등 핵심 갈등 사안은 해결되지 않아 미중 전략 경쟁은 지속되고 있다. 9월 시진핑 주석의 미국 방문 시 후속 회담이 예정돼 추가 합의 가능성도 남아 있다.`,
  keyTerms:[{term:`미중 무역위원회`,explanation:`이번 베이징 정상회담에서 새로 만들기로 합의한 미국과 중국 간 공식 무역 협의 기구다. 비민감 분야 교역 문제를 정부 차원에서 관리하는 역할을 하며 무역 갈등의 완충 장치로 설계됐다.`}],
  history:`미중 무역 갈등은 2018년 트럼프 1기 행정부의 고율 관세 부과로 시작됐다. 바이든 행정부에서도 기술 수출 통제와 관세 기조가 유지됐으며 트럼프 2기 취임 후 갈등이 재격화됐다. 2025년 10월 대두 구매 약속 등 부분 합의가 이뤄지다 이번 정상회담이 포괄적 합의로 이어졌다.`,
  players:`트럼프 대통령은 무역 적자 해소와 제조업 일자리 창출을 최우선 목표로 삼고 있다. 시진핑 주석은 미국의 대중 기술 제재 완화와 관세 인하를 주요 요구 사항으로 내걸었다. 미국 농업계와 항공 산업계는 이번 합의를 환영하는 반면 안보 강경파는 양보 내용을 경계하고 있다.`,
  current:`양측 성명의 해석 차이가 향후 이행 과정에서 갈등 요인이 될 수 있다는 지적이 나온다. 미국 의회 강경파는 중국과의 무역 타협이 안보 위협을 키울 수 있다며 반발하고 있다.`,
  outlook:`9월 후속 정상회담에서 희토류 공급망과 반도체 수출 통제 협의가 추가될 가능성이 있다. 합의 이행 여부를 점검할 미중 무역위원회 첫 회의 일정이 관심사다. 한국은 미중 관계 개선이 대한 수출 환경 호전으로 이어질지 예의 주시하고 있다.`,
  sources:[{title:`From a board of trade to Boeing planes what did Xi and Trump actually agree to - CNN`,url:`https://www.cnn.com/2026/05/18/china/xi-trump-trade-agreements-china-visit-intl-hnk`},{title:`White House touts deals on soybeans and rare earths after Trump-Xi summit - CNBC`,url:`https://www.cnbc.com/2026/05/18/us-china-announce-deals-after-trump-xi-summit.html`},{title:`Trump-Xi summit The 3 big takeaways from historic meeting in Beijing - CNBC`,url:`https://www.cnbc.com/2026/05/15/trump-xi-summit-the-3-big-takeaways-from-historic-meeting-in-beijing.html`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`이란 봉쇄·중동 전쟁으로 국제유가 109달러 유지, 유럽 주요국 경기침체 전망 현실화`,
  metrics:[`브렌트유 현물가 배럴당 109달러 (4월 중순 89달러 대비 +22%)`,`IEA, 2026년 2분기 원유 공급 150만 배럴/일 감소 전망 (코로나19 이후 최대)`],
  summary:`이스라엘·미국과 이란 간 군사 충돌 및 미국의 이란 항구 해상 봉쇄 여파로 브렌트유 가격이 배럴당 109달러를 유지하며 4월 중순 대비 22% 급등한 상태가 이어지고 있다. 국제에너지기구(IEA)는 2026년 2분기 원유 공급이 약 150만 배럴/일 감소할 것으로 전망하며 이는 코로나19 팬데믹 이후 최대 공급 감소폭이다. 이란이 호르무즈 해협을 통한 원유 항행을 방해하겠다고 위협하고 있으며 이 해협은 전 세계 원유 공급의 약 20%가 통과하는 핵심 통로다. 루프트한자를 비롯한 유럽 항공사들은 중동 노선을 감편하기 시작했고 유럽 각국 정부는 연료 부족 비상계획을 수립 중이다. 에너지 가격 급등은 인플레이션 재확산을 야기해 독일·프랑스·이탈리아·영국 등 유럽 주요국이 2026년 소폭 마이너스 성장을 기록할 것이라는 전망이 나왔다. 미 연준의 금리 인하 시점은 2027년 중반 이후로 밀릴 가능성이 높아지고 있다. 에너지 수입 의존도가 높은 한국도 무역수지 악화와 물가 상승 압박을 동시에 받고 있다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`이란과 아라비아반도 사이의 좁은 해협으로 전 세계 원유 물동량의 약 20%가 이곳을 통과한다. 이란이 이 해협을 봉쇄하면 전 세계 에너지 공급에 즉각적인 혼란이 발생한다.`}],
  history:`2026년 초 이스라엘과 미국은 이란의 핵무기 개발 저지를 명분으로 군사 작전을 개시했다. 이란은 친이란 무장세력 동원과 함께 호르무즈 해협 봉쇄 카드를 꺼내 들었다. 미국은 이란의 석유 수출을 차단하기 위해 해상 봉쇄에 나섰고 이것이 글로벌 에너지 공급 충격으로 이어졌다.`,
  players:`미국과 이스라엘은 이란의 핵 프로그램 해체를 목표로 군사·경제적 압박을 가하고 있다. 사우디아라비아를 중심으로 한 OPEC+는 증산 여력을 일부 보유하고 있으나 시장 공백을 완전히 메우지 못하고 있다. 중국과 러시아는 이란 석유를 우회 수입하며 제재 효과를 희석시키고 있다.`,
  current:`미-이란 핵협상이 진행 중이나 합의까지는 시간이 필요하며 협상 기간 중에도 봉쇄와 위협이 지속되어 유가 변동성이 높은 상태다. 전 세계 물가 재상승 우려가 고조되면서 소비·투자 심리가 동시에 위축되고 있다.`,
  outlook:`미-이란 협상 타결 여부와 호르무즈 해협 상황이 유가를 결정할 핵심 변수다. OPEC+ 정기회의 결과와 사우디의 증산 결정도 단기 유가에 영향을 미칠 전망이다. 협상이 장기화될 경우 배럴당 120달러 이상으로 치솟을 수 있다는 경고가 나온다.`,
  sources:[{title:`Global Economic Outlook May 2026 Growth Holds Amid Inflation and Oil Risks - OTET Markets`,url:`https://otetmarkets.com/blog/otet-view/global-economic-outlook-may-2026-inflation/`},{title:`Global Economic Outlook May 2026 - S&P Global`,url:`https://www.spglobal.com/market-intelligence/en/news-insights/research/2026/05/global-economic-outlook-may-2026`},{title:`May 2026 Economic and Market Update New Highs and Old Risks - Crestwood Advisors`,url:`https://www.crestwoodadvisors.com/may-2026-economic-and-market-update/`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`트럼프, 이란 군사공격 보류…루비오 협상 진전 확인, 호르무즈 봉쇄 해제 조건 협상 가속`,
  metrics:[`루비오 국무장관, 5월 21일 협상 일부 진전 공식 확인`,`파키스탄 중재 하 미·이란 양측 수십 차례 메시지 교환 진행 중`],
  summary:`트럼프 미국 대통령이 이란에 대한 군사공격 계획을 일시 보류하고 협상을 통한 해결을 모색하고 있다고 밝혔다. 마르코 루비오 국무장관은 5월 21일 미-이란 협상에서 일부 진전이 있었다고 공식 확인하면서도 과도한 낙관론을 경계하는 발언을 했다. 파키스탄이 중재하는 가운데 양측은 수십 차례 메시지를 교환하며 협상 프레임워크를 논의하고 있다. 미국이 제시하는 핵심 조건은 이란의 핵농축 모라토리엄(일시 중단)과 호르무즈 해협 봉쇄 위협 철회이며 이란은 미국의 해상 봉쇄 해제와 동결 자산 수백억 달러 해제를 요구하고 있다. 이란 관영 ISNA 통신은 양측이 잠정 합의 틀에 매우 근접해 있다고 보도했다. 그러나 미국 내 강경파와 이스라엘의 반발 이란 내 협상 반대 세력 등 변수가 많아 최종 타결까지는 불확실성이 남아 있다. 협상 성패에 따라 중동 정세와 국제유가 방향이 크게 달라질 전망이다.`,
  keyTerms:[{term:`핵농축 모라토리엄`,explanation:`핵무기의 원료가 되는 고농도 우라늄 농축 작업을 한시적으로 중단하기로 약속하는 것이다. 이란이 이를 받아들이면 핵무기 개발 속도를 늦출 수 있어 미국이 협상에서 가장 중요하게 요구하는 조건이다.`}],
  history:`이란 핵 문제는 2000년대 초부터 국제사회의 최대 현안 중 하나였다. 2015년 오바마 행정부 때 포괄적 핵합의(JCPOA)가 체결됐으나 트럼프 1기 행정부가 2018년 일방 탈퇴했다. 2026년 초 이스라엘·미국의 군사작전으로 갈등이 전면전으로 확산됐다.`,
  players:`미국은 이란의 핵무장을 막기 위해 군사·경제적 압박을 동시에 사용하고 있다. 이란은 내부 강경파와 온건파 사이에서 협상 여부를 두고 분열된 모습을 보이고 있다. 파키스탄이 중립적 중재자 역할을 맡고 있으며 이스라엘은 어떠한 형태의 핵 합의도 불충분하다고 경고하고 있다.`,
  current:`2026년 초 군사 충돌 이후 이란 경제가 봉쇄로 심각한 타격을 받으면서 협상 압박이 높아졌다. 트럼프 대통령도 중동 전쟁 장기화가 미국 경제에 부담이 된다는 국내 여론을 의식하고 있다.`,
  outlook:`5월 중 협상이 타결될 경우 국제유가와 글로벌 금융시장이 즉각 안정될 전망이다. 타결에 실패할 경우 미국이 군사적 옵션으로 복귀할 가능성을 배제할 수 없다. 이스라엘의 동의 여부가 최종 합의의 관건이 될 것으로 분석된다.`,
  sources:[{title:`Live Hope flickers for Iran deal as US awaits Tehran response - Iran International`,url:`https://www.iranintl.com/en/liveblog/202605153417`},{title:`2025-2026 Iran-United States negotiations - Wikipedia`,url:`https://en.wikipedia.org/wiki/2025%E2%80%932026_Iran%E2%80%93United_States_negotiations`},{title:`US and Iran Offer Mixed Messages on Deal to End War - TIME`,url:`https://time.com/article/2026/05/07/us-iran-war-deal-mou-axios-report-negotiations-strait-nuclear/`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`한국 6·3 지방선거 공식 선거운동 개시…서울·부산 박빙 대결, 이재명 정부 중간평가`,
  metrics:[`부산시장 지지율: 전재수(민주당) 43% vs 박형준(국민의힘) 41% (오차범위 내 초박빙)`,`공식 선거운동 기간: 5월 21일~6월 2일 (13일간)`],
  summary:`2026년 제9회 전국동시지방선거의 공식 선거운동이 5월 21일 일제히 시작됐다. 더불어민주당과 국민의힘은 나란히 충북 청주에서 출정식을 열고 전국 선거전에 돌입했다. 서울시장 선거에서는 민주당의 정원오 후보와 국민의힘 경선 예정 후보들이 수도 서울을 두고 총력전을 벌이고 있다. 부산시장 선거에서는 전재수 민주당 후보 43%에 박형준 국민의힘 후보 41%로 초박빙 대결이 펼쳐지고 있다. 이번 선거는 이재명 정부 출범 1년을 앞두고 치러지는 만큼 사실상의 정부 중간평가 성격을 띠고 있다. 민주당은 경제 성과와 외교 실적을 내세우고 있고 국민의힘은 현 정부의 안보·경제 실정을 부각하는 전략을 구사하고 있다. 전문가들은 전국적으로 민주당 우위 구도가 예상되나 주요 광역단체장 선거는 초접전이 될 것이라고 전망한다.`,
  keyTerms:[{term:`전국동시지방선거`,explanation:`4년마다 전국에서 동시에 실시하는 선거로 광역·기초단체장과 지방의회 의원을 한꺼번에 뽑는다. 이번 선거는 현 정부에 대한 중간평가 역할도 하며 2028년 총선의 전초전 성격도 띤다.`}],
  history:`한국의 전국동시지방선거는 1995년 처음 실시됐으며 2026년이 아홉 번째다. 지난 2022년 제8회 지방선거에서는 국민의힘이 서울·부산을 비롯한 주요 광역단체장을 다수 차지했다. 2025년 대선에서 이재명 후보가 당선되면서 정치 지형이 크게 바뀐 뒤 처음 치르는 지방선거라는 점에서 의미가 크다.`,
  players:`더불어민주당은 집권 여당으로서 지방 권력 확장을 목표로 하고 있다. 국민의힘은 야당 입장에서 현 정부 심판론을 내세우며 지방 권력 수성에 집중하고 있다. 이재명 대통령의 직접 지지 유세가 민주당 후보들의 경쟁력에 미치는 영향이 관전 포인트다.`,
  current:`이재명 정부 출범 1년을 목전에 두고 국정 성과에 대한 평가가 엇갈리는 가운데 지방선거가 사실상의 중간평가로 자리 잡았다. 마크롱 프랑스 대통령의 다음달 방한이 예정돼 여당의 외교 성과 홍보에 활용될 전망이다.`,
  outlook:`6월 3일 투표 결과에 따라 이재명 정부의 후반기 국정 동력이 결정될 전망이다. 서울시장과 경기도지사 선거 결과가 전국 판세를 가늠하는 핵심 지표가 될 것이다. 선거 결과는 2028년 총선을 향한 양당의 전략 재편에도 직접적인 영향을 줄 것으로 보인다.`,
  sources:[{title:`제9회 전국동시지방선거 종합안내 - vote2026.kr`,url:`https://vote2026.kr/`},{title:`오늘의 정치일정 5월 22일(금) - 뉴스핌`,url:`https://www.newspim.com/news/view/20260521001551`},{title:`지방선거 2026 한국일보`,url:`https://www.hankookilbo.com/election/local2026`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`우크라이나, 5월 드론으로 러시아군 1만9000명 사상…모스크바 외곽 정유 시설 직격`,
  metrics:[`2026년 5월 1~19일 러시아군 드론 사상자 1만9203명 (우크라이나 무인시스템군 발표)`,`5월 17일 우크라이나 드론 81기 격추됐지만 모스크바 외곽 정유 시설 직격 성공`],
  summary:`우크라이나가 5월 들어 러시아군을 대상으로 대규모 드론 공세를 이어가며 전황의 흐름을 바꾸려는 시도를 강화하고 있다. 우크라이나 무인시스템군에 따르면 5월 1~19일 드론 공격으로 러시아군 1만9203명이 사상했으며 이는 전쟁 개시 이래 최대 수준의 단기 피해다. 5월 17일에는 모스크바 외곽의 정유 시설이 우크라이나 드론에 직격을 받았으며 러시아 방공망이 81기의 드론을 격추했음에도 핵심 시설 타격을 막지 못했다. 이번 공격은 러시아의 석유 수출 수익을 차단하고 전쟁 자금줄을 끊으려는 전략의 일환으로 평가된다. 러시아도 우크라이나를 향해 287기 드론을 동원한 대규모 보복 공격을 감행하며 맞불을 놓았다. 2022년 2월 개전 이후 4년 이상이 지난 현재 전선 변화 없는 소모전이 이어지는 가운데 드론이 전쟁의 핵심 무기로 자리 잡았다. 러시아 내부에서는 장기전에 대한 피로감이 축적되고 있다는 분석이 나오고 있다.`,
  keyTerms:[{term:`소모전`,explanation:`상대방의 전투력과 자원을 서서히 고갈시키는 방식으로 싸우는 전쟁 형태다. 양측 모두 빠른 승리 대신 상대를 지치게 만드는 데 집중하며 전선이 거의 움직이지 않는 장기화된 싸움이 특징이다.`}],
  history:`러시아는 2022년 2월 24일 우크라이나를 전면 침공했다. 초기 속전속결 전략이 실패하면서 전쟁은 장기 소모전으로 전환됐다. 나토와 서방 국가들의 지속적인 군사 지원으로 우크라이나는 방어선을 유지하면서 드론 기반 비대칭 전략을 강화해왔다.`,
  players:`우크라이나는 드론·포병 전력을 고도화하며 러시아 본토를 직접 타격하는 전략으로 전환했다. 러시아는 병력과 장비 손실이 누적되는 가운데 북한의 탄약과 이란의 드론 기술 지원에 의존하고 있다. 유럽 나토 회원국들은 독일을 중심으로 방위비를 대폭 늘리며 우크라이나 지원을 이어가고 있다.`,
  current:`미국 트럼프 행정부의 우크라이나 지원 수준 재조정이 유럽에 더 큰 역할을 요구하고 있다. 우크라이나의 드론 타격 능력 향상이 러시아의 에너지 수출과 군수 공급망에 실질적 타격을 주기 시작했다는 평가다.`,
  outlook:`2026년 하반기 협상 재개 가능성이 일부에서 거론되지만 영토 문제에서 양측 입장 차이가 커 타결은 쉽지 않다. 트럼프 행정부의 지원 수위 결정과 유럽의 단결이 전쟁 향방을 좌우할 핵심 변수다. 드론전 심화가 향후 군비 경쟁과 국제 무기 시장 재편으로 이어질 전망이다.`,
  sources:[{title:`Ukraine conducts large-scale drone strikes on Russia killing 4 and wounding 12 - NPR`,url:`https://www.npr.org/2026/05/17/nx-s1-5824987/ukrainian-drone-strikes-on-russia-kill-4-moscow`},{title:`Russia Loses Over 19000 Troops as Ukrainian Drone Units Strike in Record Battlefield Activity - UNITED24 Media`,url:`https://united24media.com/war-in-ukraine/russia-loses-over-19000-troops-as-ukrainian-drone-units-strike-in-record-battlefield-activity-in-early-may-2026-19039`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`OpenAI, ChatGPT 내 셀프서브 광고 플랫폼 출시…2026년 AI 광고 매출 목표 25억 달러`,
  metrics:[`OpenAI 2026년 광고 매출 목표 25억 달러 (약 3조4000억 원)`,`ChatGPT 월간 활성 사용자 4억 명 이상 보유, 제3의 광고 플랫폼 부상`],
  summary:`OpenAI가 광고주가 ChatGPT 내에서 직접 캠페인을 설계하고 집행할 수 있는 셀프서브 광고 플랫폼을 새롭게 출시했다. OpenAI는 이를 통해 2026년 광고 매출 목표를 25억 달러(약 3조4000억 원)로 설정하고 AI 수익화의 핵심 축으로 삼겠다는 구상을 밝혔다. 월간 활성 사용자 4억 명을 보유한 ChatGPT는 검색 엔진·소셜미디어에 이어 제3의 주요 광고 플랫폼으로 부상할 것이라는 기대를 받고 있다. 셀프서브 광고 방식은 광고주가 영업 담당자를 거치지 않고 플랫폼에 직접 접속해 광고를 만들고 운영하는 방식으로 구글·메타가 이 방식으로 광고 시장을 장악한 성공 공식을 따른 것이다. 대화형 AI 광고는 사용자의 질문 맥락에 맞춰 자연스럽게 노출돼 기존 배너 광고보다 높은 전환율을 기대할 수 있다는 분석이 나온다. 그러나 사용자 경험 훼손과 AI 응답 중립성 침해에 대한 우려가 커지고 있으며 프라이버시 단체들은 대화 데이터 기반 타기팅 문제를 강하게 제기하고 있다. 구글·메타 등 기존 광고 강자들도 AI 광고 경쟁에 가세하면서 빅테크 간 수익화 경쟁이 본격화되고 있다.`,
  keyTerms:[{term:`셀프서브 광고`,explanation:`광고주가 영업 담당자를 거치지 않고 플랫폼에 직접 접속해 광고를 만들고 집행하는 방식이다. 구글과 페이스북이 이 방식으로 폭발적으로 성장했으며 OpenAI도 같은 방식으로 AI 광고 시장에 진입하고 있다.`}],
  history:`OpenAI는 2022년 ChatGPT 출시 이후 구독료(ChatGPT Plus)와 API 사용료를 주요 수익원으로 삼아왔다. 급격한 서버 비용 증가와 연구 개발 투자 확대로 수익성 개선 압박이 커졌다. 광고 수익화 논의는 2025년부터 본격화됐으며 2026년 플랫폼 출시로 이어졌다.`,
  players:`OpenAI는 마이크로소프트의 투자를 기반으로 AI 시장을 선도하고 있다. 구글은 Gemini, 메타는 Llama 기반 AI 서비스에 광고를 연계하는 방안을 동시에 추진 중이다. 규제 당국은 AI 광고 플랫폼의 투명성과 데이터 보호 기준 마련에 나서고 있다.`,
  current:`AI 모델 성능 고도화로 맞춤형 AI 광고의 효과가 기존 디지털 광고를 뛰어넘을 수 있다는 평가가 나오고 있다. 광고 수익 확보는 OpenAI의 지속 가능한 사업 모델 수립에 필수 과제로 부상했다.`,
  outlook:`AI 광고 시장은 2028년까지 수백억 달러 규모로 성장할 것으로 전망된다. 사용자 신뢰 유지와 광고 수익화 사이의 균형이 OpenAI의 성패를 가를 핵심 과제다. EU AI법 시행과 함께 AI 광고 규제 프레임워크가 빠르게 정비될 전망이다.`,
  sources:[{title:`7 Explosive AI Updates in May 2026 That Every Founder Must Know - imfounder`,url:`https://imfounder.com/science-tech/ai/ai-updates-may-2026/`},{title:`Agentic AI News and AI Breakthroughs 2026 - crescendo.ai`,url:`https://www.crescendo.ai/news/latest-ai-news-and-updates`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`카이스트·베이징대 공동 연구, 기후 적응 정책이 저소득층 젠트리피케이션 심화 경고`,
  metrics:[`카이스트·베이징대·뉴욕상하이대 3개 기관 공동 연구, 국제학술지 게재 (2026년 5월)`,`기후 적응 녹지 조성 후 인근 집값 상승으로 저소득층 주거 이동 증가 사례 다수 확인`],
  summary:`카이스트 AI미래학과와 중국 베이징대, 뉴욕상하이대 공동 연구팀이 기후변화 적응 정책이 저소득층의 젠트리피케이션을 심화시킬 수 있다는 연구 결과를 발표했다. 연구팀은 도시공원 조성, 습지 복원 같이 녹지와 수공간을 활용하는 그린-블루 적응 방식이 주변 집값 상승을 유발해 기존 저소득층이 쫓겨나는 젠트리피케이션 현상을 초래한다고 분석했다. 기후 적응과 사회적 평등이라는 두 가지 정책 목표가 충돌할 수 있다는 점에서 이번 연구는 도시 정책 당국에 중요한 시사점을 제공한다. 전 세계 도시들이 폭염·홍수 대비 녹지 인프라를 확충하는 추세이지만 이 과정에서 취약계층의 주거 안정성이 위협받는 역설이 나타나고 있다. 연구팀은 기후 적응 사업 시행 전에 사회 취약계층 보호 장치를 함께 설계해야 한다고 권고했다. 한국에서는 서울을 비롯한 대도시에서 도시공원 개발과 하천 복원 사업이 활발히 진행 중이어서 이번 연구 결과가 정책에 미치는 영향이 클 것으로 보인다. 학계에서는 기후 정의 관점에서의 도시 개발 정책 재검토를 촉구하는 목소리가 높아지고 있다.`,
  keyTerms:[{term:`젠트리피케이션`,explanation:`낙후된 지역이 개발·환경 개선 등으로 가치가 올라가면서 기존 저소득층 주민이 높아진 임대료나 집값을 감당하지 못해 쫓겨나는 현상이다. 이번 연구에서는 기후 적응 정책이 이를 의도치 않게 유발할 수 있다고 경고한다.`}],
  history:`도시의 기후변화 적응을 위한 녹지 인프라 투자는 2010년대 중반 이후 전 세계 도시 정책의 주류가 됐다. 서울의 청계천 복원처럼 하천·공원 개발이 도심 재생의 핵심 수단으로 자리 잡았다. 하지만 재개발로 인한 원주민 이주 문제는 오래전부터 사회적 갈등을 야기해왔다.`,
  players:`카이스트 연구팀은 AI 기반 대규모 도시 데이터 분석으로 이 현상을 계량화했다. 서울시 등 지방자치단체는 기후 대응과 함께 임대주택 공급 확대 정책을 병행하고 있다. 주거 권리 단체들은 기후 적응 사업 시행 전 사회영향평가 의무화를 요구하고 있다.`,
  current:`한국에서는 5월 중순 낮 기온이 30도에 육박하는 이른 폭염이 이어지며 기후변화의 현실이 체감되고 있다. 도시 냉각을 위한 녹지화 필요성이 부각되는 동시에 이번 연구가 무분별한 개발이 취약계층을 더 큰 위험에 노출시킬 수 있다는 경고를 제기한다.`,
  outlook:`기후 정의를 담보하는 도시 개발 모델 구축이 주요 정책 과제로 부상할 전망이다. 6월 지방선거 이후 새로 구성될 지방자치단체들이 이 문제를 어떻게 다룰지 주목된다. 국제적으로는 COP 기후 회의에서 기후 취약계층 보호를 담은 도시 정책 지침이 강화될 것으로 보인다.`,
  sources:[{title:`기후변화 극복 노력이 저소득층 삶을 힘들게 만든다고 - 서울신문`,url:`https://www.seoul.co.kr/news/society/science-news/2026/05/18/20260518500034`},{title:`기후변화의 경제적 충격 공급망 붕괴에서 투자 위축까지 - 브랜드경제신문`,url:`https://www.benews.co.kr/news/501870`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`구글, 추론·에이전트 특화 오픈소스 AI 모델 Gemma 4 공개…미국 정부 AI 사전 테스트 제도 도입`,
  metrics:[`구글 Gemma 4, 파라미터 당 지능 수준 역대 최고치 달성 발표 (ICLR 2026)`,`미국 정부, MS·xAI·OpenAI 등 10여 개 주요 AI 기업과 출시 전 모델 사전 테스트 협약 완료`],
  summary:`구글이 고급 추론과 에이전트 워크플로에 특화된 오픈소스 AI 모델 Gemma 4를 공개했다. 구글은 Gemma 4가 파라미터 당 지능 수준에서 역대 최고치를 달성했다고 밝히며 이번 모델이 대규모 매개변수 경쟁에서 효율성 중심 AI 개발로의 패러다임 전환을 상징한다고 설명했다. 오픈소스 AI 모델 방식으로 공개해 개발자들이 자유롭게 활용하고 수정할 수 있어 AI 생태계 확산에 기여할 것으로 기대된다. 같은 시기 구글 연구팀은 ICLR 2026에서 TurboQuant 알고리즘도 공개했는데 이 기술은 AI 모델 실행 시 발생하는 KV 캐시 메모리 병목을 획기적으로 줄여 온디바이스 AI 확산을 앞당길 것으로 평가된다. 한편 미국 정부는 마이크로소프트·xAI·OpenAI 등 주요 AI 기업들과 모델 출시 전 정부가 사전에 접근해 테스트할 수 있는 협약을 체결했다. 이는 AI 모델의 안전성 검증과 잠재적 위협 대비를 위한 선제적 규제 시도로 AI 거버넌스의 새로운 기준이 될 것으로 평가된다. AI 기술 경쟁의 무게중심이 성능 향상에서 효율과 안전성으로 이동하고 있음을 보여주는 흐름이다.`,
  keyTerms:[{term:`오픈소스 AI 모델`,explanation:`소스코드와 학습된 모델 가중치를 누구나 무료로 내려받아 사용·수정할 수 있는 AI 모델이다. 기업이나 개인이 자체 서버에서 실행할 수 있어 비용 절감과 맞춤화가 가능하지만 악용 위험도 동시에 존재한다.`}],
  history:`구글은 2024년 초 Gemma 시리즈를 처음 출시하며 오픈소스 AI 시장에 진입했다. 메타의 Llama 시리즈와 경쟁하며 오픈소스 AI 생태계에서 영향력을 키워왔다. 2026년에는 Gemma 4로 세대를 교체하며 에이전트 중심의 AI 활용 패러다임을 앞당기고 있다.`,
  players:`구글은 DeepMind와의 통합을 통해 AI 연구 역량을 극대화하고 있다. 메타는 Llama 4로 맞불을 놓고 있으며 Anthropic과 OpenAI는 클로즈드 소스 전략을 유지하는 가운데 일부 경량 모델을 공개하고 있다. 미국 정부는 오픈소스 AI의 군사적 악용 가능성에 대한 규제 방안 마련에 나서고 있다.`,
  current:`AI 모델의 파라미터 수 경쟁이 한계에 달하면서 효율성과 실용성 중심으로 경쟁 구도가 재편되고 있다. 기업들은 클라우드 비용 절감과 개인정보 보호 강화를 위해 온디바이스 AI로의 전환을 서두르고 있다.`,
  outlook:`Gemma 4의 에이전트 기능 강화로 AI가 복잡한 다단계 작업을 자율 수행하는 에이전트 시대가 본격화될 전망이다. 미국의 AI 사전 테스트 제도가 국제 규범으로 확산될지 여부도 주목된다. 한국의 AI 스타트업과 대기업들도 Gemma 4 기반 서비스 개발을 서두를 것으로 예상된다.`,
  sources:[{title:`7 Explosive AI Updates in May 2026 That Every Founder Must Know - imfounder`,url:`https://imfounder.com/science-tech/ai/ai-updates-may-2026/`},{title:`2026 10 Things That Matter in AI Right Now - MIT Technology Review`,url:`https://www.technologyreview.com/2026/04/21/1135643/10-ai-artificial-intelligence-trends-technologies-research-2026/`},{title:`AI Advancements News May 2026 - blog.mean.ceo`,url:`https://blog.mean.ceo/ai-advancements-news-may-2026/`}]
}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`한국 5월 상반기 반도체 수출 150% 급증, AI 수요에 역대 최고치 경신`,
  metrics:[`5월 1~10일 반도체 수출 85.4억 달러(전년 동기 대비 +149.8%)`,`ICT 수출 총액 184억 달러(+43.7%), 5월 기준 역대 최고치`],
  summary:`한국의 5월 1~10일 수출 데이터에서 반도체가 전년 동기 대비 149.8% 급증한 85억 4000만 달러를 기록하며 5월 기준 사상 최고치를 돌파했다. AI 반도체 수요 폭발이 핵심 원인으로, 특히 고대역폭메모리(HBM)를 중심으로 글로벌 AI 데이터센터 투자가 가속화되면서 삼성전자·SK하이닉스의 수주가 폭증했다. ICT 전체 수출도 43.7% 늘어난 184억 달러를 기록했으며, 컴퓨터 주변기기는 382.8%라는 이례적 증가율을 보였다. 해당 기간 무역수지는 16억 980만 달러 흑자로 수출 호조가 전체 교역 건전성에도 기여했다. 한국개발연구원(KDI)은 견조한 반도체 수출을 반영해 2026년 성장률 전망치를 0.6%포인트 올린 2.5%로 상향 조정했다. 신용평가사 피치(Fitch)도 수출 회복력을 근거로 한국 국가신용등급 AA-(안정적)을 유지했다. 반면 반도체 제조장비 수입이 129.7% 증가해 설비투자 부담이 커지고 있으며, 삼성전자 노사 갈등에 따른 생산 차질 가능성은 리스크 요인으로 남아 있다. 향후 AI 반도체 공급의 주도권을 둘러싼 한미일 기술 경쟁이 수출 흐름에 영향을 미칠 핵심 변수가 될 전망이다.`,
  keyTerms:[{term:`AI 반도체`,explanation:`인공지능 연산에 특화된 반도체로 고대역폭메모리(HBM)와 AI 가속기 칩이 포함된다. AI 데이터센터 투자 열풍으로 수요가 폭발적으로 늘어 한국 수출을 이끌고 있다.`}],
  history:`한국은 삼성전자·SK하이닉스를 중심으로 1990년대부터 세계 메모리 반도체 시장을 주도해왔다. 2023년부터 생성형 AI 붐과 함께 HBM 등 AI용 반도체 수요가 폭증하며 수출 성장을 견인했다. 반도체는 한국 전체 수출의 약 20%를 차지하는 최대 품목이 됐다.`,
  players:`삼성전자와 SK하이닉스가 HBM 공급의 양대 축으로, 미국 엔비디아(NVIDIA)가 최대 수요처다. 미국 정부는 첨단 반도체 대중(對中) 수출 규제를 강화하며 공급망 재편을 주도하고 있다. 일본·대만과의 기술 경쟁도 격화되고 있다.`,
  current:`AI 인프라 투자가 2026년에도 수그러들지 않으며 HBM3E 이상 제품의 수요가 공급을 초과하는 상황이다. 5월 수출 초기 데이터는 연간 목표를 상회할 가능성을 시사한다.`,
  outlook:`5월 23~28일 삼성전자 노조 찬반투표 결과가 생산 안정성의 단기 변수다. 6월 이후 HBM4 양산 일정과 미국의 대중 반도체 규제 동향이 수출 흐름을 결정할 핵심 이벤트다.`,
  sources:[{title:`Semiconductor Boom Drives 43.7% Surge in Exports Through May 10 - The Asia Business Daily`,url:`https://www.asiae.co.kr/en/article/2026051109341609148`},{title:`South Korea's Export Growth Stays Strong on Semiconductor Demand - Bloomberg`,url:`https://www.bloomberg.com/news/articles/2026-05-01/south-korea-s-export-growth-stays-strong-on-semiconductor-demand`},{title:`South Korea's Semiconductor Exports Expected to Surge Through 2026 - GuruFocus`,url:`https://www.gurufocus.com/news/8571855/south-koreas-semiconductor-exports-expected-to-surge-through-2026`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`이란·미국 분쟁 격화로 브렌트유 109달러 돌파, 글로벌 에너지 시장 충격`,
  metrics:[`브렌트유 배럴당 109달러(4월 중순 89달러 대비 +22% 급등)`,`연준 기준금리 동결 확률 74.5%, 고금리 장기화 전망 굳혀져`],
  summary:`이란-미국 간 군사 분쟁과 호르무즈 해협 봉쇄 위협이 고조되면서 브렌트유 가격이 배럴당 109달러를 돌파했다. 4월 중순 89달러에서 불과 한 달 만에 22% 급등한 것으로, 글로벌 에너지 공급망 전반에 비상이 걸렸다. 호르무즈 해협은 전 세계 해상 원유 수송량의 약 20%가 지나는 전략 요충지로, 이란의 반복적인 봉쇄 위협이 시장 불안을 증폭시키고 있다. 이란의 에너지 봉쇄 여파는 쿠바에도 미쳐, 쿠바 정부는 섬나라가 석유를 사실상 소진했다고 공식 발표했다. 유가 급등은 인플레이션 재확산으로 이어지고 있으며, 미국 연방준비제도(Fed)는 올해 남은 기간 금리를 동결할 것으로 시장은 74.5% 확률로 예상해 고금리 장기화 전망이 굳어지고 있다. 에너지 수입 의존도가 높은 한국은 무역수지 악화와 물가 상승 압력 심화가 우려된다. S&P 글로벌은 인플레이션과 성장 사이의 균형이 한층 취약해졌다고 경고했다. 5월 21일 발표 예정인 글로벌 플래시 PMI 지표가 기준선인 50을 하회할 경우 경기침체 우려가 증폭되며 시장 변동성이 확대될 전망이다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`이란과 오만 사이의 좁은 해협으로 전 세계 해상 원유 수송의 약 20%가 통과하는 요충지다. 이란이 미국과의 분쟁 때마다 봉쇄 위협을 반복해 국제 유가를 좌우하는 지정학적 핵심 변수다.`}],
  history:`이란 핵개발을 둘러싼 미국과의 갈등은 2000년대부터 제재와 협상이 반복되어 왔다. 2018년 트럼프 1기 행정부의 JCPOA 탈퇴 이후 긴장이 지속 고조됐으며, 2026년 군사 충돌 국면으로 발전했다. 이란은 호르무즈 봉쇄를 대미 협상 카드로 일관되게 활용해왔다.`,
  players:`트럼프 미국 행정부는 이란 봉쇄 작전을 전개하며 최대 압박 정책을 유지 중이다. 이란은 호르무즈 봉쇄 위협으로 맞서고 있다. OPEC+ 산유국들은 증산 여부를 두고 셈법이 복잡하며, 중국은 이란산 원유의 최대 구매자로 사태를 주시하고 있다.`,
  current:`4월 임시 휴전 이후 협상이 지지부진한 가운데 이스라엘의 이란 핵시설 타격 준비 보도까지 더해져 불안 요인이 겹쳤다. 에너지 시장은 유가 급등과 인플레이션 우려를 동시에 소화하는 상황이다.`,
  outlook:`다음 OPEC+ 회의와 미국-이란 핵협상 재개 여부가 유가 단기 방향을 결정할 핵심 이벤트다. 이스라엘의 군사 행동이 현실화될 경우 브렌트유가 120달러선을 돌파할 가능성도 있다.`,
  sources:[{title:`Global Economic Outlook May 2026: Growth Holds Amid Inflation and Oil Risks - OTET Markets`,url:`https://otetmarkets.com/blog/otet-view/global-economic-outlook-may-2026-inflation/`},{title:`Iran says it will never bow as Trump rejects peace counteroffer - CNBC`,url:`https://www.cnbc.com/2026/05/11/iran-war-trump-negotiation-hormuz-nuclear-talks.html`},{title:`Global Economic Outlook: May 2026 - S&P Global`,url:`https://www.spglobal.com/market-intelligence/en/news-insights/research/2026/05/global-economic-outlook-may-2026`}]

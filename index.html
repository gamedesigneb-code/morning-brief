  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미국 Big Beautiful Bill로 국가부채 4.6조 달러 추가, 무디스 신용등급 강등 후 재정 우려 심화`,
  metrics:[`Big Beautiful Bill 시행 시 10년간 국가부채 4.6조 달러 추가 전망`,`미국 국가부채 GDP 대비 2035년 134% 예상(2024년 98%)`],
  summary:`미국 의회가 올해 초 통과시킨 트럼프 행정부의 감세 패키지 빅 뷰티풀 빌(Big Beautiful Bill) 시행으로 향후 10년간 국가부채가 4조 6000억 달러 추가될 것으로 예측됐다. 이 법안은 2017년 세금감면 및 고용법(TCJA)의 소득세 구간을 영구화하고, 팁·초과근무 소득 비과세 혜택을 2028년까지 부여하는 내용을 담고 있다. 재정 부담 확대가 현실화되는 가운데, 무디스(Moody's)는 2025년 5월 미국의 국가신용등급에 대해 신용등급 강등을 단행해 Aaa에서 Aa1으로 낮추며 3대 신용평가사 모두 미국을 최고 등급 아래로 평가하게 됐다. 무디스는 2035년 미국 국가부채가 GDP 대비 134%에 달할 것으로 전망하며 재정 지속 가능성에 경고를 보냈다. 시장에서는 미국 국채금리 상승 압박이 지속되고 있으며, 이는 글로벌 금융 비용을 끌어올려 신흥국의 달러 부채 상환 부담을 가중시키고 있다. 미국의 재정 건전성 악화는 달러 패권에 대한 장기적 신뢰에도 영향을 미칠 수 있다는 우려가 제기된다. 한국을 비롯한 미국 국채 보유국들은 금리 상승에 따른 채권 평가손에 노출될 수 있다. 재정 건전화를 위한 지출 삭감 논의가 미 의회에서 진행되고 있으나 정치적 합의에는 상당한 시간이 걸릴 전망이다.`,
  keyTerms:[{term:`신용등급 강등`,explanation:`국가나 기업이 돈을 갚을 능력에 대해 신용평가사가 매긴 등급을 낮추는 것이다. 미국은 2025년 5월 무디스의 강등으로 3대 평가사 모두에서 최고 등급을 잃었으며, 이는 국채 금리 상승과 재정 신뢰 저하로 이어진다.`}],
  history:`미국 국가부채는 2001년 이후 감세와 재정 지출 확대가 반복되며 급증했다. S&P는 2011년, 피치는 2023년에 미국 신용등급을 각각 강등했다. 무디스는 2025년 5월 마지막으로 Aaa 등급을 유지하다 강등을 단행해 역사적 전환점을 만들었다.`,
  players:`무디스·S&P·피치 3대 신용평가사는 미국 재정 지속 가능성을 모니터링한다. 공화당 주도 의회는 감세 정책을 고수하고 있으며, 연방준비제도는 인플레이션과 재정 간의 갈등 속에서 독립적 통화정책을 운영한다. 미국 국채 최대 보유국인 일본과 중국이 주요 이해관계자다.`,
  current:`Big Beautiful Bill 통과로 연간 재정 적자 확대가 기정사실화됐다. 국채금리 상승 압박이 지속되는 가운데 고금리 장기화 우려가 맞물려 재정 부담이 이중으로 작용하고 있다.`,
  outlook:`2026년 하반기 미 의회의 부채한도 협상이 다음 중요 이벤트다. 연준의 금리 인하 시점이 재정 압박 완화의 핵심 변수로 작용할 전망이다.`,
  sources:[{title:`Moody's Downgrade of U.S. Credit Rating Highlights Risks of Rising National Debt - PGPF`,url:`https://www.pgpf.org/article/moodys-downgraded-its-us-credit-rating-and-warns-that-recent-policy-decisions-will-worsen-fiscal-outlook/`},{title:`Big Beautiful Bill House GOP Tax Plan Analysis - Tax Foundation`,url:`https://taxfoundation.org/research/all/federal/big-beautiful-bill-house-gop-tax-plan/`},{title:`Congress passed Trump's sweeping tax bill - Chicago Sun-Times`,url:`https://chicago.suntimes.com/taxes/2026/02/22/congress-trump-obba-beautiful-bill-federal-irs-tax-returns`}]

  colorBg:`#fce8e6`,
  headline:`한국 6·3 지방선거 공식 선거운동 개막, GTX-A 철근 누락 여야 공방 격화`,
  metrics:[`선거벽보 전국 636곳 5월 21일부터 게시 시작`,`투표일 6월 3일 D-13, 사전투표 5월 29~30일 예정`],
  summary:`5월 21일 한국 제8회 전국동시지방선거(6·3 지방선거) 공식 선거운동이 개시되며 본격적인 선거전에 돌입했다. 울산시 선거관리위원회는 전국 636개 장소에 후보 선거벽보를 게시하기 시작했으며, 이날부터 합법적인 유세 활동이 전국적으로 시작된다. 이번 지방선거의 최대 격전지는 서울시장 선거로, GTX-A 노선 삼성역 구간 철근 누락 사태가 핵심 쟁점으로 부상했다. 여당과 야당은 철근 누락 책임 공방을 벌이며 상대방 후보에 대한 공세를 강화하고 있다. 이재명 대통령이 이스라엘 총리에 대한 국제형사재판소(ICC) 체포영장 관련 발언을 한 것도 외교 정책 논란으로 번지며 선거 이슈가 됐다. 국민의힘 등 야권은 이 발언이 동맹 외교에 부적절하다며 집중 비판했다. 경찰은 선거운동 개시에 맞춰 전국에 경계 강화 조치를 발령했다. 6·3 지방선거는 이재명 정부 출범 후 첫 전국 단위 선거로 민심을 가늠하는 중간평가 성격을 띠고 있다.`,
  keyTerms:[{term:`지방선거`,explanation:`광역·기초 단체장과 지방의원을 뽑는 전국 단위 선거로, 집권 여당에 대한 중간 민심 평가 기능을 한다. 이번 6·3 지방선거는 이재명 정부 출범 후 첫 전국 선거다.`}],
  history:`한국은 1995년부터 전국동시지방선거를 실시해왔으며, 4년마다 광역단체장·기초단체장·지방의원을 동시에 선출한다. 지방선거는 통상 집권 여당에 대한 중간 평가 성격을 띠며 정치 지형에 영향을 미친다. 직전 2022년 지방선거에서는 국민의힘이 서울시장 등 주요 광역단체장을 다수 석권했다.`,
  players:`현 집권 여당(더불어민주당)은 이재명 대통령 지지층을 결집하고, 국민의힘 야당은 정부 실책 공세에 집중하고 있다. 서울시장 후보들의 경쟁이 전국 판세에 상징적 영향을 미친다. 무당층 유권자의 향배가 결과를 좌우할 핵심 변수다.`,
  current:`GTX-A 철근 누락 사태가 서울시장 선거전의 중심 의제가 됐으며, 이재명 대통령의 외교 발언 논란이 여야 갈등을 더욱 심화시키고 있다.`,
  outlook:`6월 3일 투표일까지 서울시장 선거 여론조사 결과가 전국 판세를 가를 기준점이 될 것이다. 사전투표는 5월 29~30일 이틀간 진행된다.`,
  sources:[{title:`오늘의 주요 뉴스 2026년 5월 20일 - 오늘의 클릭`,url:`https://www.cliktoday.com/2026/05/20260520-today-news.html`},{title:`Korean Peninsula Update May 19 2026 - AEI`,url:`https://www.aei.org/articles/korean-peninsula-update-may-19-2026/`},{title:`From martial law to majoritarian rule: South Korea's defining political year - Korea Pro`,url:`https://koreapro.org/?p=2212385`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`트럼프, 이란 군사 타격 보류하며 핵협상 지속…이스라엘 타격 준비 보도로 긴장 고조`,
  metrics:[`트럼프, 우라늄 농축 20년 정지 조건 수용 의사 표명`,`미국-이란 2주 단위 임시 휴전 4월 8일부터 연장 중`],
  summary:`미국 트럼프 대통령은 이란에 대한 군사 타격을 보류하면서 진지한 협상이 진행 중이라고 5월 20일 밝혔다. 트럼프는 이란이 우라늄 농축을 20년간 중단하겠다는 보장을 제시할 경우 수용할 용의가 있다고 발언해 기존 완전한 핵 포기 요구에서 유연성을 보였다. 그러나 이란은 결코 굴복하지 않겠다며 협상 제안을 거부하고 있어 양측 간 이견이 좁혀지지 않고 있다. CNN은 5월 20일 이스라엘이 이란 핵시설에 대한 타격을 준비하고 있다고 보도해 긴장이 더욱 고조됐다. 파키스탄의 중재로 미국과 이란은 4월 8일부터 2주 단위 임시 휴전을 연장하며 협상을 이어가고 있으나, 호르무즈 자유 항행·핵·탄도미사일 프로그램·제재 해제 등 핵심 쟁점에서 근본적 입장 차가 여전하다. 이스라엘의 군사 행동이 현실화될 경우 트럼프의 외교적 노력과 충돌하는 새로운 국면이 형성될 수 있다. 러시아 푸틴 대통령은 베이징 방문 중 시진핑 주석과 회담을 갖고 미국의 이란 압박에 우려를 표명한 것으로 알려졌다. 중동 전쟁의 장기화는 유가 급등을 통해 글로벌 경제 전반에 충격을 주고 있다.`,
  keyTerms:[{term:`우라늄 농축`,explanation:`핵에너지나 핵무기의 원료인 우라늄235의 농도를 높이는 과정으로, 90% 이상 농축 시 핵무기 제조가 가능해진다. 이란의 우라늄 농축은 미국·이스라엘과의 핵협상의 핵심 쟁점이다.`}],
  history:`이란 핵 문제는 2003년 이란의 우라늄 농축 시설이 공개되면서 국제사회의 주요 현안이 됐다. 2015년 JCPOA 합의로 농축 제한과 제재 완화가 이루어졌으나, 2018년 트럼프 1기 탈퇴 후 이란은 농축을 재개했다. 2026년 미국-이란 군사 충돌이 발생하며 협상이 전쟁 국면 속에서 진행되는 이례적 상황이 됐다.`,
  players:`트럼프 행정부는 이란의 핵 포기를 최우선 조건으로 내세우고 있다. 이란 강경파는 협상 양보에 반대하며 최고지도자 하메네이의 결정을 기다린다. 이스라엘은 이란 핵 능력의 군사적 제거를 독자적으로 검토 중이며, 파키스탄이 중재자로 활동 중이다.`,
  current:`트럼프의 20년 농축 정지 제안은 완전한 핵 포기 요구에서 한 발 물러선 신호로 해석된다. 이스라엘의 독자 타격 준비 보도는 미국의 외교 노력에 새로운 변수로 작용하고 있다.`,
  outlook:`다음 2주 휴전 연장 여부 결정이 이번 주 최대 관건이다. 이스라엘의 군사 행동 결정 시점이 전체 협상 구도를 뒤흔들 수 있다.`,
  sources:[{title:`Trump says Iran talks may resume, holds off military strike - Washington Post`,url:`https://www.washingtonpost.com/national-security/2026/04/14/trump-iran-nuclear-demands/`},{title:`Iran says it will never bow as Trump rejects peace counteroffer - CNBC`,url:`https://www.cnbc.com/2026/05/11/iran-war-trump-negotiation-hormuz-nuclear-talks.html`},{title:`US-Iran ceasefire and nuclear talks in 2026 - House of Commons Library`,url:`https://commonslibrary.parliament.uk/research-briefings/cbp-10637/`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`러-우크라이나 3일 휴전 종료 후 전선 교착, 푸틴 직접 협상 의지 표명`,
  metrics:[`트럼프 중재 3일 휴전(5월 9~11일) 종료 후 교전 재개`,`개전 4년 3개월, 우크라이나 쿠르스크 거점 봄에 상실`],
  summary:`러-우크라이나 전쟁이 발발 4년 3개월을 넘기며 교착 국면이 지속되는 가운데, 러시아 푸틴 대통령이 젤렌스키 대통령과의 직접 협상 의사를 표명했다. 트럼프 대통령이 중재한 3일 휴전(5월 9~11일)은 쌍방 각 1000명씩 포로를 교환하는 성과를 거뒀으나, 광범위한 평화 협상으로 이어지지는 못했다. 우크라이나는 러시아 영토인 쿠르스크 지역의 거점을 봄에 상실해 전선이 더욱 불리해졌다. 러시아와 우크라이나는 5월 4일 서로 별도의 임시 휴전을 선언해 혼선이 빚어지기도 했다. 푸틴은 5월 9일 베이징 방문을 계기로 시진핑과 회담하고 중국과의 파트너십을 재확인했다. 영국·프랑스는 우크라이나에 군사 허브를 설치하는 평화안을 제안했으나 러시아는 수용 불가 입장이다. 트럼프 행정부는 전쟁 장기화에 따른 경제적 압박을 이유로 휴전 구도를 적극 추진하고 있다. 다음 협상 라운드가 성사될 경우 전쟁 이후 유럽 안보 질서 재편이 핵심 의제가 될 전망이다.`,
  keyTerms:[{term:`휴전`,explanation:`교전 당사자들이 합의하에 군사 행동을 일시 중단하는 것이다. 러-우크라이나의 경우 단기 인도주의 휴전이 반복되고 있으나, 영구적 평화 협정으로 이어지지는 못하고 있다.`}],
  history:`러시아는 2022년 2월 우크라이나를 전면 침공했다. 2022년 말 우크라이나의 반격으로 헤르손 등 일부 지역을 탈환했으나, 2023년부터 전선이 다시 교착됐다. 쿠르스크 지역 우크라이나의 기습 진입(2024년 8월)은 러시아 본토 최초 점령이었으나 2026년 봄에 상실됐다.`,
  players:`러시아 푸틴 대통령은 협상 여지를 내비치면서도 전선 유지를 포기하지 않고 있다. 우크라이나 젤렌스키 대통령은 영토 주권 복원을 협상의 전제로 요구한다. 미국 트럼프 행정부가 중재자를 자처하며 러시아에 우호적인 협상안을 추진 중이다.`,
  current:`3일 휴전 이후에도 교전이 재개돼 협상 분위기가 냉각됐다. 푸틴의 협상 의지 발언이 실질적 진전으로 이어질지 불투명하다.`,
  outlook:`러시아-우크라이나 직접 회담 성사 여부가 최대 관건이다. 여름 군사 작전 이전에 협상이 이루어지지 않으면 전쟁이 2027년까지 이어질 가능성이 있다.`,
  sources:[{title:`Trump says Russia and Ukraine agreed to 3-day ceasefire - NPR`,url:`https://www.npr.org/2026/05/09/nx-s1-5816478/trump-russia-ukraine-ceasefire`},{title:`Putin hints at ending Russia's war in Ukraine - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/5/10/putin-hints-at-ending-russias-war-in-ukraine-but-why-now`},{title:`Russia and Ukraine declare competing ceasefires - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/5/4/russia-and-ukraine-declare-competing-ceasefires`}]

  category:`기타 이슈`,

  colorBg:`#e6f4f1`,
  headline:`WHO, 콩고·우간다 에볼라 확산에 국제공중보건비상사태 선포`,
  metrics:[`의심 사례 500건 이상·130명 이상 사망(5월 19일 기준)`,`콩고·우간다 2개국 확산, 분디부교 변종 전용 백신·치료제 없음`],
  summary:`세계보건기구(WHO)는 5월 17일 콩고민주공화국과 우간다에서 확산 중인 에볼라 바이러스 감염증에 대해 국제공중보건비상사태(PHEIC)를 선포했다. 이번 유행은 분디부교 바이러스(Bundibugyo virus)가 원인으로, 현재 승인된 백신이나 치료제가 없어 방역이 매우 어렵다. 5월 19일 기준 콩고에서 500건 이상의 의심 사례와 130명 이상의 사망이 보고됐으며, 우간다 수도 캄팔라에서도 콩고 방문자로 추정되는 확진 사례가 24시간 이내 2건 잇따라 확인됐다. WHO 사무총장은 5월 20일 확산의 규모와 속도에 대한 심각한 우려를 표명했다. 발병 지역인 콩고 이투리 주는 기존 분쟁 지역으로 190만 명 이상의 피난민이 있어 접촉 추적과 격리가 극도로 어렵다. 미국 CDC는 콩고발 여행을 제한하는 조치를 발령했으며, 2026 FIFA 월드컵 개최국인 미국의 공중보건 당국도 비상이 걸렸다. 바이러스의 국경 이탈이 현실화되면서 국제사회의 신속한 의료 자원 지원이 시급해졌다. 국제공중보건비상사태 선포로 전 세계 방역 공조가 본격화되고 있다.`,
  keyTerms:[{term:`국제공중보건비상사태`,explanation:`WHO가 선포하는 최고 수준의 공중보건 경보로, 국제적으로 퍼질 우려가 있는 감염병이 발생했을 때 발령된다. 선포되면 국제사회가 공동 대응에 나서야 하며 여행·교역 제한 등 조치를 검토할 수 있다.`}],
  history:`에볼라 바이러스는 1976년 콩고(당시 자이르)에서 처음 발견됐으며, 2014~2016년 서아프리카 대유행으로 1만 1000명 이상이 사망했다. 분디부교 변종은 2007년 우간다에서 처음 발견됐으며 기존 에볼라보다 치명률이 낮지만 전파성이 높은 것으로 알려져 있다. 콩고 이투리 주는 기존에도 반복적인 에볼라 유행이 발생한 고위험 지역이다.`,
  players:`WHO가 국제 대응을 총괄하며, 콩고·우간다 보건 당국이 현지 방역을 담당한다. 미국 CDC와 국경없는의사회(MSF), 국제적십자사 등 국제 기구가 현장에 투입됐다. 이투리 주 무장 세력이 방역 활동을 방해하는 요인이다.`,
  current:`우간다로의 확산으로 바이러스 국경 이탈이 현실화됐으며, 국제공중보건비상사태 선포로 국제 방역 공조가 본격화됐다. 분디부교 변종에 대한 백신 부재가 대응의 최대 걸림돌이다.`,
  outlook:`향후 2주간 우간다에서의 추가 확산 여부가 최대 변수다. 긴급 백신 임상시험 및 승인 절차 가속화가 예상된다.`,
  sources:[{title:`WHO declares Ebola PHEIC in DRC and Uganda - WHO`,url:`https://www.who.int/news/item/17-05-2026-epidemic-of-ebola-disease-in-the-democratic-republic-of-the-congo-and-uganda-determined-a-public-health-emergency-of-international-concern`},{title:`What we know about the Ebola outbreak after WHO declares global health emergency - CNN`,url:`https://www.cnn.com/2026/05/17/africa/ebola-outbreak-congo-uganda-explainer-intl`},{title:`Ebola virus disease outbreak in DRC 19 May 2026 - ECDC`,url:`https://www.ecdc.europa.eu/en/ebola-virus-disease-outbreak-democratic-republic-congo-19-may-2026`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`AI 전환 가속화로 글로벌 기업 대규모 감원, 클라우드플레어 전 직원 20% 해고 발표`,
  metrics:[`Cloudflare 1,100명(전체 20%) 감원 발표`,`Cloudflare 사내 AI 활용량 3개월 만에 600% 급증`],
  summary:`2026년 5월 들어 AI 전환을 명목으로 한 글로벌 기업들의 대규모 구조조정이 빠르게 확산되고 있다. 클라우드플레어(Cloudflare)는 전체 인력의 20%에 해당하는 1100명을 해고한다고 발표했으며, 사내 AI 활용량이 불과 3개월 만에 600% 급증했다는 점을 직접적 이유로 들었다. 업워크(Upwork), 코인베이스(Coinbase) 등 다른 기업들도 AI 효율화를 명목으로 유사한 대규모 감원을 단행했다. 미국·영국 정부는 공개 전 AI 모델에 대한 사전 테스트를 의무화하는 규제를 추진하고 있으며, 마이크로소프트·xAI 등 주요 기업들이 규제 당국에 모델 사전 접근권을 제공하기로 합의했다. 마이크로소프트와 오픈AI는 기존 독점 협력 구조를 비독점 방식으로 전환해 클라우드 AI 시장의 경쟁이 전면 개방됐다. 앤트로픽(Anthropic)은 구글 클라우드와 협력해 클라우드 인프라·칩에 2000억 달러 이상을 투자하기로 한 것으로 알려졌다. 미국 영화예술과학아카데미는 AI가 생성한 연기와 AI가 작성한 각본은 오스카 수상 자격이 없다고 공식 발표했다. AI 전환 가속화는 고용 시장에 구조적 충격을 가하며 장기적인 노동 시장 재편을 예고하고 있다.`,
  keyTerms:[{term:`AI 전환`,explanation:`기업이 기존 인력 중심의 업무 방식에서 인공지능 기술을 핵심 생산 도구로 전환하는 과정이다. 이 과정에서 기존 업무를 AI가 대체하면서 대규모 인력 구조조정이 발생하고 있다.`}],
  history:`AI가 일자리를 대체할 것이라는 우려는 2023년 챗GPT 등장 이후 본격화됐다. 2024년부터 일부 IT 기업들이 AI 효율화를 명목으로 감원을 시작했으며, 2025~2026년에는 제조·금융·미디어 분야로 확산됐다. 이는 산업혁명 이래 가장 빠른 속도의 노동 시장 구조 변화로 평가된다.`,
  players:`마이크로소프트·구글·아마존 등 빅테크가 AI 인프라 투자를 주도하며 산업 재편을 이끌고 있다. 앤트로픽·오픈AI 등 AI 스타트업들이 기반 기술을 공급한다. 각국 정부와 노동조합은 규제와 재교육 정책으로 충격 완화를 시도하고 있다.`,
  current:`AI가 단순 작업을 넘어 전문직 업무까지 대체하기 시작하면서 감원의 범위와 속도가 예상을 크게 초과하고 있다. 기업들은 비용 절감과 생산성 향상을 동시에 달성하는 AI 전환을 최우선 전략으로 채택하고 있다.`,
  outlook:`하반기에도 AI를 이유로 한 추가 감원 발표가 이어질 전망이다. EU AI Act의 2026년 8월 시행 기한과 각국 정부의 AI 규제 강화가 기업 전략에 변수로 작용할 것이다.`,
  sources:[{title:`Layoffs Accelerate in May 2026 as Firms Restructure Around AI - Yahoo Finance`,url:`https://finance.yahoo.com/sectors/technology/articles/layoffs-accelerate-may-2026-firms-040430218.html`},{title:`TLT AI Brief: May 2026 - TLT LLP`,url:`https://www.tlt.com/insights-and-events/insight/ai-brief-may-2026/`},{title:`7 Explosive AI Updates in May 2026 - IMFounder`,url:`https://imfounder.com/science-tech/ai/ai-updates-may-2026/`}]

  colorBg:`#e6f4f1`,
  headline:`삼성전자 총파업 1시간 30분 전 극적 잠정합의, 5월 21일~6월 7일 파업 유보`,
  metrics:[`총파업 1시간 30분 전 노사 잠정합의 도출(5월 20일)`,`노조 요구 영업이익 15% 성과급(약 45조 원) 지급 쟁점`],
  summary:`삼성전자 노사가 5월 20일 총파업 돌입 1시간 30분을 앞두고 2026년 임금·성과급 협상에 잠정 합의를 이루며 극적으로 파업을 유보했다. 삼성전자 공동투쟁본부는 5월 21일부터 6월 7일까지 예고됐던 총파업 일정을 추후 지침 시까지 유보한다고 밝혔다. 노조는 초과이익성과급(OPI) 상한 폐지, 성과급 산정 기준 투명화, 영업이익 15%에 해당하는 약 45조 원 규모의 성과급 지급 등을 핵심 요구 사항으로 내세워왔다. 잠정 합의안은 5월 23일부터 28일까지 전 조합원 찬반투표에 부쳐지며, 가결될 경우 파업 사태는 일단락된다. 이번 총파업 위기는 삼성전자가 반도체 수출 역대 최고치를 기록하는 상황에서도 노동자들의 성과 배분에 대한 불만이 극에 달했음을 보여준다. 찬반투표에서 부결될 경우 파업이 재개될 수 있어 6월 초 삼성전자의 생산 안정성이 불투명하다. 삼성전자 파업은 글로벌 AI 반도체 공급망에도 영향을 미칠 수 있어 국제 시장의 관심이 집중됐다. 한국노총과 노동계는 이번 잠정합의를 노동자 권익 신장의 계기로 평가하면서도 찬반투표 결과를 주시하고 있다.`,
  keyTerms:[{term:`총파업`,explanation:`사업장의 모든 또는 다수 노동자가 동시에 업무를 중단하는 전면 파업이다. 삼성전자에서는 이례적인 일로, 반도체 핵심 생산라인이 멈출 경우 글로벌 AI 반도체 공급망에 영향을 미친다.`}],
  history:`삼성전자는 오랫동안 무노조 경영을 유지해왔으나, 2019년 이후 노동조합이 공식 출범하며 단체교섭이 시작됐다. 2024년에도 삼성전자 역사상 첫 파업이 발생해 수일간 지속된 바 있다. 성과급 배분 방식의 불투명성이 반복적인 갈등의 핵심 원인으로 지목돼왔다.`,
  players:`전국삼성전자노동조합이 이번 협상의 주요 주체다. 사측은 글로벌 반도체 경쟁 심화와 투자 부담을 이유로 성과급 축소를 주장했다. 한국노총과 정부 노동부가 중재 역할을 일부 맡았다.`,
  current:`잠정 합의로 파업 위기를 일단 넘겼으나, 전 조합원 찬반투표라는 관문이 남아 있다. 가결 시 노사 관계가 안정되며, 부결 시 파업이 재개돼 글로벌 공급망 우려가 현실화된다.`,
  outlook:`5월 23~28일 찬반투표 결과가 최우선 관전 포인트다. 부결될 경우 6월 초 추가 협상 또는 파업 재개 여부를 두고 긴장이 재고조될 수 있다.`,
  sources:[{title:`총파업 90분 전 극적 합의 삼성전자 노사 성과급 배분 막판 타결 - 뉴스핌`,url:`https://www.newspim.com/news/view/20260520001194`},{title:`2026년 삼성전자 노조 총파업 - 나무위키`,url:`https://namu.wiki/w/2026%EB%85%84%20%EC%82%BC%EC%84%B1%EC%A0%84%EC%9E%90%20%EB%85%B8%EC%A1%B0%20%EC%B4%9D%ED%8C%8C%EC%97%85`},{title:`총파업 D-2 막판 협상 - MBC 뉴스`,url:`https://imnews.imbc.com/replay/2026/nw1200/article/6823612_36967.html`}]
}]

  headline:`무디스, 미국 국가신용등급 108년 만에 Aaa에서 Aa1으로 강등`,
  metrics:[`미국 국가부채 GDP 대비 2035년 134%로 급증 전망`,`5월 19일 미국 30년 국채 수익률 5% 돌파`],
  summary:`무디스(Moody's)는 5월 16일(현지시각) 미국의 장기 국가신용등급을 최고 등급인 Aaa에서 Aa1으로 한 단계 내리며 1917년 이후 108년 만에 처음으로 신용등급 강등이 이루어졌다. 무디스는 미국 GDP 대비 국가부채 비율이 현재 약 98%에서 2035년 134%까지 치솟을 것으로 전망하며, 연간 재정적자도 GDP의 7%에서 2034년에는 9%까지 확대될 것이라고 지적했다. 이번 조치로 S&P(2011년)와 피치(2023년)에 이어 마지막까지 Aaa를 유지하던 무디스까지 미국 최고 신용등급을 철회하게 됐다. 5월 19일 뉴욕 증시는 장 초반 하락 후 소폭 상승 마감하며 충격은 제한됐으나, 미국 30년 국채 수익률이 5%를 넘어서는 등 장기금리 상승 압력이 확인됐다. 이미 강등 가능성이 어느 정도 선반영됐다는 분석이 있지만, 장기적으로는 모기지 금리 상승과 달러 자산 유출 압력으로 이어질 수 있다는 우려가 제기된다. 트럼프 행정부의 대규모 감세 연장 법안 추진이 재정 상황을 더욱 악화시킬 것이라는 점도 이번 신용등급 강등의 핵심 배경이다. 한국을 포함한 신흥국도 미국 장기금리 상승에 따른 자본유출 리스크를 예의주시하고 있다.`,
  keyTerms:[{term:`신용등급 강등`,explanation:`신용등급 강등은 국가나 기업의 빚 갚을 능력이 나빠졌다고 신용평가사가 판단해 등급을 낮추는 것이다. 등급이 내려가면 돈을 빌릴 때 더 높은 이자를 내야 해 재정 부담이 커지고, 글로벌 투자자들의 신뢰도 흔들린다.`}],
  history:`미국은 1917년부터 무디스로부터 최고 신용등급 Aaa를 유지해왔다. S&P는 2011년 오바마 행정부 시절 부채한도 협상 위기를 계기로 미국을 AA+로 강등했고, 피치도 2023년 같은 이유로 합류했다. 이후 무디스만이 유일하게 Aaa를 유지해왔으나, 반복되는 재정적자 확대와 트럼프 2기 감세 정책으로 압박이 가중됐다. 미국의 GDP 대비 국가부채 비율은 최근 123%를 기록하며 사상 최고치 경신 중이다.`,
  players:`무디스는 이번 강등과 함께 신용등급전망은 부정적에서 안정적으로 상향했으나, 재정경로 자체를 심각한 우려 사안으로 지목했다. 트럼프 행정부는 감세 연장 법안을 강행하겠다는 입장이며, 일부 공화당 의원들은 재정 건전성을 이유로 내부 반발 중이다. 일본·영국 등 주요 채권 보유국은 미국 국채 포트폴리오 조정 여부를 검토 중인 것으로 알려졌다. 한국 등 신흥국은 달러 강세 및 자본유출 리스크를 동시에 모니터링하고 있다.`,
  current:`이번 강등은 미국 재정에 대한 구조적 우려를 세 번째 주요 평가사가 공식 확인한 것이다. 5월 19일 장기금리 상승이 확인되면서 감세 법안 통과 후 재정 압박이 더 심화될 경우 시장 충격이 재차 발생할 가능성을 배제할 수 없다.`,
  outlook:`트럼프 행정부의 감세 연장 법안 처리 결과가 향후 미국 재정 신뢰도의 핵심 시험대가 된다. 6월 FOMC 회의에서 연준의 금리 판단에도 간접적 영향을 미칠 수 있어 주목된다. 장기적으로 미국 국채의 글로벌 안전자산 지위 유지 여부가 최대 관전 포인트다.`,
  sources:[{title:`Moody's Ratings downgrades United States long-term ratings to Aa1 - Moody's`,url:`https://ratings.moodys.com/ratings-news/443154`},{title:`Moody's 미국 신용등급 강등에 따른 시장영향 - KCIF 국제금융센터`,url:`https://www.kcif.or.kr/finance/financeView?rpt_no=35731&mn=002003`},{title:`무디스, 108년 만에 美 신용등급 내렸다 - 시사저널`,url:`https://www.sisajournal.com/news/articleView.html?idxno=333976`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`트럼프-시진핑 정상회담 후 미중, 농산물·보잉 항공기 구매 대규모 무역합의 발표`,
  metrics:[`중국, 2026~2028년 연간 미국 농산물 최소 170억 달러 구매 약속`,`중국, 보잉 여객기 200대 구매 합의`],
  summary:`미국과 중국은 5월 14~17일 중국에서 진행된 트럼프-시진핑 정상회담 후 대규모 무역합의 패키지를 발표했다. 중국은 2026~2028년 3년간 연간 최소 170억 달러 이상의 미국 농산물을 구매하기로 했으며, 미국 보잉 여객기 200대 구매 계획도 공식 확인됐다. 두 나라는 무역·투자 활성화를 위한 공동 위원회 설치에도 합의했으나, 관세 인하에 대한 구체적 수치는 양국 발표문에서 빠져 있어 핵심 쟁점은 여전히 미해결 상태다. 트럼프 대통령은 시 주석과 관세 문제를 별도로 논의하지 않았다고 밝혔으며, 미국 대법원의 일부 관세 조치 무효 판결로 새로운 관세 조사가 진행 중이다. 중국의 4월 산업생산과 소매판매는 시장 예상치를 하회하는 등 내수 회복세가 더딘 모습을 보였다. 희토류 공급과 미국 반도체 수출 규제 문제는 이번 회담에서 구체적 합의 없이 후속 협의로 넘어갔다. 시 주석은 대만 문제를 제대로 처리하지 않으면 양국 관계에 갈등이 생길 수 있다고 경고해 잠재적 긴장 요소가 여전히 남아있다.`,
  keyTerms:[{term:`무역합의`,explanation:`무역합의는 두 나라가 물건을 사고파는 조건에 대해 서로 동의한 약속이다. 이번 미중 무역합의는 농산물·항공기 등 구체적 품목 구매로 협력 신호를 보냈지만, 관세라는 핵심 문제는 아직 해결되지 않아 실질적 효과는 지켜봐야 한다.`}],
  history:`미중 무역 갈등은 트럼프 1기 행정부인 2018년 관세 전쟁으로 시작됐다. 2020년 1단계 무역합의가 이루어졌으나 코로나19 이후 정치 관계 악화로 이행이 불완전했다. 트럼프 2기 취임 이후 추가 관세 부과로 긴장이 다시 고조됐고, 2025년 반도체·희토류 수출입 제한 조치가 연이어 취해졌다. 이번 정상회담은 양국 관계 재조정을 위한 첫 고위급 접촉이다.`,
  players:`트럼프 대통령은 제조업 일자리 귀환과 무역적자 해소를 명분으로 대중국 압박을 이어왔다. 시진핑 주석은 경제 회복을 위한 수출 활로 확보와 대만 문제에서 미국 불개입 담보를 핵심 목표로 삼고 있다. 미국 농업 주들은 중국 구매 재개로 수혜가 예상되며, 보잉은 항공기 납품 일정을 조율 중이다. 한국을 포함한 제3국들은 미중 관세 구도 변화에 따른 공급망 재편 방향을 주시하고 있다.`,
  current:`구체적인 관세 인하 합의가 빠진 채 농산물·항공기 구매라는 가시적 성과만 나온 상황이어서, 무역합의 이행의 실질적 효과는 불확실하다. 다만 양국이 대화 채널을 복원했다는 점에서 긴장 완화의 의미가 있다.`,
  outlook:`미국의 중국산 제품에 대한 추가 관세 조사 결과가 6~7월 중 나올 예정이어서 이 결과가 실질적 무역 환경을 결정할 것이다. 희토류·반도체 분야 후속 협상과 대만 관련 미국 무기 판매 문제가 다음 갈등의 뇌관이 될 수 있다.`,
  sources:[{title:`White House touts deals on soybeans and rare earths after Trump-Xi summit - CNBC`,url:`https://www.cnbc.com/2026/05/18/us-china-announce-deals-after-trump-xi-summit.html`},{title:`What did Xi and Trump agree to in China? - CNN`,url:`https://www.cnn.com/2026/05/18/china/xi-trump-trade-agreements-china-visit-intl-hnk`},{title:`China's Xi warns Trump about conflicts if Taiwan not handled properly - CBS News`,url:`https://www.cbsnews.com/news/trump-xi-jinping-meeting-china-beijing-trade-tariffs-taiwan-iran/`}]

  category:`경제`,

  colorBg:`#e8f0fe`,
  headline:`한국 1분기 GDP 3.6% 성장에도 4월 소비자물가지수 2.6%로 반등, 금리 인하 속도 조절 압박`,
  metrics:[`2026년 1분기 실질 GDP 전년 동기 대비 3.6% 성장`,`4월 소비자물가지수 전년 동월 대비 2.6% 상승, 전월(2.2%) 대비 0.4%p 재반등`],
  summary:`한국은행이 발표한 2026년 1분기 실질 GDP는 전년 동기 대비 3.6% 성장하며 견조한 경기 회복 흐름을 보였고, 전기 대비로도 1.7% 성장해 분기 성장세가 양호한 수준을 유지했다. 그러나 4월 소비자물가지수는 전년 동월 대비 2.6%로 전월(2.2%)보다 0.4%포인트 상승하며 물가 압력이 재차 고개를 들었다. 중동발 에너지 가격 불안과 이란전쟁에 따른 글로벌 공급망 이슈가 물가 상방 압력으로 작용한 것으로 분석된다. 4월 말 기준 외환보유액은 4,278억8천만 달러로 전월 대비 42억2천만 달러 증가하며 외환 건전성은 양호한 상태를 유지했다. 신현송 한국은행 총재는 프랑스 파리에서 개최된 G7 재무장관·중앙은행총재 회의에 참석해 글로벌 금융 불안에 대응한 정책 공조 방안을 논의했다. 소비자물가지수 상승 재개로 한국은행의 추가 금리 인하 시점이 하반기로 더욱 늦춰질 수 있다는 전망이 금융계에서 나오고 있다. 수출 중심의 경기 회복과 물가 재상승이 동시에 진행되는 상황에서 한국은행의 통화 정책 결정이 갈수록 어려워지고 있다.`,
  keyTerms:[{term:`소비자물가지수`,explanation:`소비자물가지수는 일반 국민이 생활에서 사고 파는 물건과 서비스 가격이 얼마나 올랐는지 보여주는 지표다. 이 숫자가 오르면 물가가 올랐다는 뜻이고, 한국은행은 이를 보며 금리를 올릴지 내릴지 결정한다.`}],
  history:`한국 경제는 2024년 하반기부터 반도체·AI 서버용 메모리 수요 증가를 동력으로 수출 회복세가 살아나기 시작했다. 물가는 2024년 2%대 초반으로 안정세를 보이다 중동 에너지 위기 재부각과 함께 다시 상승 압력을 받고 있다. 한국은행은 2025년 하반기부터 기준금리 인하 사이클을 이어왔으나 물가 재상승으로 속도 조절에 나선 상황이다. 2026년 1분기 GDP 3.6% 성장은 한국 경제의 회복 탄력성을 보여주지만, 물가와의 동반 상승이 딜레마를 만들고 있다.`,
  players:`한국은행은 물가 안정과 경기 부양이라는 두 목표 사이에서 정책 방향을 결정해야 하는 상황이다. 기획재정부는 GDP 성장세를 유지하면서 민생 물가 안정을 위한 재정 지원 방안을 검토 중이다. 가계는 금리 인하 기대가 늦춰질 경우 대출 이자 부담이 지속되는 상황에 처한다. 수출 기업들은 원화 환율 움직임과 글로벌 수요 변화를 주의 깊게 살피고 있다.`,
  current:`1분기 GDP 호조에도 불구하고 4월 소비자물가지수 재상승은 통화 정책 정상화 시점을 늦출 수 있는 신호다. 미국 신용등급 강등 이후 글로벌 금융 불확실성이 커진 상황에서 한국 경제의 대외 리스크 관리도 중요해졌다.`,
  outlook:`5월 한국은행 금융통화위원회 결정과 6월 소비자물가 동향이 하반기 금리 경로를 가늠하는 핵심 지표가 된다. 미중 무역 합의에 따른 글로벌 교역량 변화도 수출 의존도가 높은 한국 경제에 직접적 영향을 미칠 수 있다.`,
  sources:[{title:`한국은행 경제통계 포털 - 한국은행`,url:`https://www.bok.or.kr/portal/main/main.do`},{title:`May 2026 Economic and Market Update - Crestwood Advisors`,url:`https://www.crestwoodadvisors.com/may-2026-economic-and-market-update/`},{title:`Global Economic Outlook May 2026 - Seeking Alpha`,url:`https://seekingalpha.com/article/4906058-global-economic-outlook-may-2026`}]

  category:`정치`,

  colorBg:`#fce8e6`,
  headline:`트럼프, 걸프국 요청으로 이란 공격 연기…합의 불발 시 전면 공습 재개 경고`,
  metrics:[`미국·이스라엘, 2026년 2월 말 이란 핵시설 선제 타격 개전 후 약 85일 경과`,`IEA, 이란전쟁 여파로 2026년 2분기 글로벌 원유 수요 전 분기 대비 약 150만 배럴/일 감소 전망`],
  summary:`도널드 트럼프 미국 대통령은 5월 18일(현지시각) 카타르·사우디아라비아·아랍에미리트(UAE) 지도자들의 요청으로 이란에 대한 군사 공격을 연기했다고 밝혔다. 트럼프 대통령은 이란과의 핵합의 협상이 현재 진행 중이라며, 합의에 이르지 못할 경우 즉각 전면 공습을 감행할 준비를 명령해두었다고 강조했다. 5월 19일에는 이란이 2~3일 이내에 합의에 나서지 않으면 다시 공격할 것이라고 위협 수위를 높이며 협상 기한을 사실상 5월 20~22일로 설정했다. 미국과 이스라엘은 지난 2월 말 이란 핵시설에 대한 선제타격을 감행하며 전쟁이 시작됐고, 이후 양측은 간헐적 교전을 이어왔다. 이란 지도부는 강경한 자세를 유지하면서도 협상 채널은 열어두고 있어 협상 결과의 불확실성이 크다. 이번 공격 연기 발표 후 단기적으로 국제 유가는 소폭 안정됐으나, 전쟁 재개 가능성이 남아있어 에너지 시장의 변동성은 이어지고 있다. 이란의 호르무즈 해협 봉쇄 위협은 글로벌 에너지 공급망에 중대한 리스크로 남아있다.`,
  keyTerms:[{term:`핵합의`,explanation:`핵합의란 이란이 핵무기 개발을 포기하거나 제한하는 대신 국제사회가 이란에 가한 경제 제재를 풀어주기로 한 협약이다. 이번 협상에서 미국은 이란의 핵 프로그램 완전 폐기를 요구하고 있으며, 이것이 전쟁 종전의 핵심 조건이다.`}],
  history:`이란 핵 문제는 2000년대 초부터 국제사회의 핵심 안보 의제로 부상했다. 2015년 오바마 행정부 시절 이란핵합의(JCPOA)가 타결됐으나, 트럼프 1기 행정부가 2018년 일방적으로 탈퇴했다. 이후 이란은 우라늄 농축을 재개했으며, 핵무기 개발 일보 직전 상태가 이스라엘의 군사 행동 명분이 됐다. 2026년 2월 말 미국-이스라엘 연합의 이란 핵시설 선제 타격으로 전면전이 시작됐다.`,
  players:`미국은 이란의 핵무기 보유를 막기 위한 군사·외교 이중 압박 전략을 구사하고 있다. 이스라엘은 이란의 핵 위협 제거를 최우선 국가 안보 목표로 삼고 공습의 핵심 파트너 역할을 하고 있다. 걸프 국가들(사우디, UAE, 카타르)은 지리적 인접성 때문에 전쟁 장기화를 우려하며 중재 역할을 맡았다. 이란 최고지도자 하메네이는 협상보다 강경 대응 기조를 유지하고 있어 실질적 합의까지 변수가 많다.`,
  current:`공격 연기 발표 후 협상 창은 불과 2~3일로 극도로 좁아진 상황이다. 이란이 핵 프로그램 동결 이상의 양보를 거부할 경우 전면 공습 재개는 불가피할 것으로 전망된다.`,
  outlook:`5월 20~22일이 사실상 협상 시한으로 작동하고 있어 이 기간이 전쟁의 분수령이 될 것이다. 핵합의 타결 시 이란 원유 생산 재개로 국제 유가가 급락할 수 있고, 결렬 시에는 호르무즈 봉쇄 리스크로 유가가 다시 상승할 수 있다.`,
  sources:[{title:`Iran war live: Attack on Iran in two or three days if no deal, says Trump - Al Jazeera`,url:`https://www.aljazeera.com/news/liveblog/2026/5/19/iran-war-live-trump-says-iran-attack-postponed-at-request-of-gulf-allies`},{title:`Trump: I called off attack on Iran planned for Tuesday - Euronews`,url:`https://www.euronews.com/2026/05/18/trump-i-called-off-attack-on-iran-planned-for-tuesday`},{title:`Trump calls off scheduled attack on Iran amid serious negotiations - CBS News`,url:`https://www.cbsnews.com/live-updates/iran-war-trump-warning-oil-stock-prices-futures-ceasefire-diplomacy/`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이재명-다카이치, 안동 고향 셔틀외교…LNG·원유 에너지 공동 대응 강화 합의`,
  metrics:[`5월 19일 안동 정상회담, 4개월 만에 세 번째 한일 양자 회동`,`이재명 대통령 국정수행 지지율 60.5% 기록`],
  summary:`이재명 대통령과 일본 다카이치 사나에 총리는 5월 19일 경북 안동에서 정상회담을 갖고 에너지 안보와 공급망 협력 강화 방안을 논의했다. 올해 1월 이 대통령이 다카이치 총리의 고향 나라현을 방문한 데 이어 이번엔 다카이치 총리가 이 대통령의 고향 안동을 답방하며, 양국 지도자가 서로의 고향을 방문하는 셔틀외교가 한일 관계 역사상 처음으로 실현됐다. 두 정상은 최근 중동 에너지 시장 불안과 이란전쟁으로 인한 공급망 리스크에 공동 대응하기 위해 LNG 및 원유 분야의 협력을 한층 강화하기로 했다. 지난 3월 체결한 한일 공급망 파트너십의 조속한 이행을 위한 실무 협의를 추진하기로 했으며, 한미일 3국 협력의 중요성도 재확인했다. 안동찜닭 만찬과 하회마을 줄불놀이 등 문화 행사를 곁들인 이번 방문은 양국 국민 감성을 겨냥한 공공 외교 효과도 거뒀다는 평가다. 한중일 3국이 공통의 이익을 위해 협력해야 한다는 점도 양국 지도자가 함께 강조했다. 이재명 대통령의 국정수행 지지율이 60.5%를 기록하는 상황에서 이번 외교 성과는 정치적 동력으로도 작용할 것으로 보인다.`,
  keyTerms:[{term:`셔틀외교`,explanation:`셔틀외교는 두 나라 지도자가 번갈아 가며 상대방 나라를 방문하는 방식의 외교를 말한다. 이번처럼 한국 대통령과 일본 총리가 서로의 고향까지 직접 방문한 것은 한일 관계 역사에서 전례 없는 일이다.`}],
  history:`한일 관계는 일제강점기 역사 문제로 오랫동안 갈등을 빚어왔다. 위안부·징용 배상 문제와 2019년 수출규제 등으로 관계가 최악까지 악화됐으나, 2023년 양국 정부가 강제징용 배상 해법에 합의하며 관계 회복의 물꼬를 텄다. 이후 셔틀외교가 재개됐고, 이재명 정부는 한일 관계 개선을 대외정책의 중심 기조로 삼고 있다. 다카이치 내각 역시 한국과의 협력을 중시하는 입장을 유지하고 있다.`,
  players:`이재명 대통령은 한일 관계 개선을 경제·안보 협력의 핵심 축으로 삼고 있으며, 외교 성과가 국내 정치 기반 강화에도 기여하고 있다. 다카이치 총리는 에너지 안보와 반도체 공급망에서 한국과의 협력이 필수적이라는 인식 하에 안동 방문을 택했다. 중국은 한미일 삼각 공조 강화를 예의주시하고 있다. 에너지 기업 및 반도체 관련 산업계는 공급망 파트너십의 실질적 이행을 기대하고 있다.`,
  current:`이란 전쟁으로 에너지 공급 불안이 가중된 시점에서 한일 LNG 공동 구매·비축 논의는 실질적 필요에서 나온 협력이다. 이번 정상회담은 양국 지도자 간 신뢰를 더욱 두텁게 하는 계기가 됐다는 평가가 지배적이다.`,
  outlook:`한일 공급망 파트너십 이행을 위한 실무 협의가 6월 중 열릴 예정이며, 에너지 협력의 구체적 결실이 나올지 주목된다. 이재명 대통령의 6·3 지방선거 이후 정치적 위상 변화도 대일 외교 행보에 영향을 줄 수 있다.`,
  sources:[{title:`고향 셔틀외교 성사, 한일 정상회담 - MBC 뉴스`,url:`https://imnews.imbc.com/replay/2026/nw1400/article/6823646_36974.html`},{title:`안동서 한일 정상회담 - YTN`,url:`https://www.ytn.co.kr/_cs/_ln_0101_202605191555548123_005.html`},{title:`한일 정상회담 및 주요 성과 - 외교부`,url:`https://www.mofa.go.kr/www/brd/m_29514/view.do?seq=15`}]

  headline:`6·3 지방선거 공식 선거운동 21일 개시…민주당 호남 민심 이탈 이변 가능성 부상`,
  metrics:[`6·3 지방선거 D-13, 공식 선거운동 5월 21일 개시~6월 1일 종료`,`광역단체장 17명·기초단체장 226명 등 전국 동시 선출 예정`],
  summary:`오는 6월 3일 실시되는 제9회 전국동시지방선거를 앞두고 공식 선거운동이 5월 21일부터 시작되며 선거 정국이 본격적으로 달아오른다. 더불어민주당은 최대 텃밭인 호남 지역에서 정당 지지율이 큰 폭으로 하락하는 여론조사 결과에 위기감을 느끼고 있으며, 전북도지사 공천 논란으로 김관영 전북지사가 무소속 출마를 결정했다. 서울과 수도권은 최대 격전지로 꼽히며, 경기도지사 선거는 차기 대선을 미리 보여주는 선거로 불리며 치열한 공방이 예상된다. 이번 지방선거에서는 한국 역사상 최초의 여성 광역단체장 탄생 가능성도 주목받고 있으며, 지방자치 30년 만에 첫 여성 도지사·시장이 나올지 관심이 집중된다. 6·3 지방선거와 함께 경기 평택을 재보궐선거가 치러지며 수도권 민심 흐름을 점치는 바로미터가 될 전망이다. 이재명 대통령의 60%대 지지율이 여당에 유리한 환경을 만들고 있으나, 호남·PK 지역 민심 이탈이 변수로 작용할 수 있다. 이번 선거 결과는 이재명 정부의 하반기 국정 운영 동력을 좌우하는 중요한 중간 평가가 될 것이다.`,
  keyTerms:[{term:`지방선거`,explanation:`지방선거는 각 지역의 시장·도지사·지방의원 등 지역 일꾼을 국민이 직접 뽑는 선거다. 전국 동시에 열리기 때문에 집권당의 중간 평가 성격을 띠며, 다음 대통령 선거의 판세를 미리 읽는 지표로도 활용된다.`}],
  history:`한국의 지방자치제는 1991년 지방의회 선거 부활로 시작됐으며, 1995년부터 전국동시지방선거가 실시됐다. 선거는 4년마다 열리며 집권 여당의 중간 평가 성격이 강하다. 2022년 제8회 지방선거에서는 국민의힘이 압승하며 윤석열 정부 출범 초기 정치 동력을 확보했다. 2026년 선거는 이재명 정부 출범 이후 처음 치러지는 전국 단위 선거로 관심이 집중된다.`,
  players:`더불어민주당은 여당으로서 압도적 다수 시·도를 지키는 게 목표이며, 이재명 대통령 지지율이 최대 무기다. 국민의힘은 야당으로서 수도권과 PK(부산·경남) 지역 탈환을 노리고 있다. 호남 지역에서는 민주당 공천 갈등으로 무소속 및 소수당 후보들이 이변을 노리고 있다. 선거관리위원회는 공정 선거 관리를 위해 감시를 강화하고 있다.`,
  current:`민주당의 호남 지지율 하락은 공천 갈등, 지역 이기주의 등 복합적 요인이 작용한 결과다. 전북도지사 무소속 후보 출마는 민주당 텃밭 균열의 상징적 사례로 주목받고 있다.`,
  outlook:`5월 21일 공식 선거운동 개시 후 6월 1일까지 12일간 치열한 유세가 펼쳐지며 여론이 최종 정착될 것이다. 6월 3일 개표 결과에 따라 여야의 하반기 국회 운영 전략이 크게 달라질 것이다.`,
  sources:[{title:`6·3 후보 등록 마감, 공식 선거운동 21일부터 - MBC 뉴스`,url:`https://imnews.imbc.com/replay/2026/nw930/article/6822668_36996.html`},{title:`다양한 지방선거 기사 모음 - 다음 이슈`,url:`https://issue.daum.net/election/2026`},{title:`수도권 출근 대전환 경기도지사 공약 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202605191826493978`}]

  headline:`글로벌 빅테크, SK하이닉스에 HBM 생산라인 투자 직접 지원 제안…AI 메모리 공급 절벽 심화`,
  metrics:[`SK하이닉스 선행 PER 6.79배, 삼성전자(6.77배)를 최초 추월해 코스피 밸류에이션 1위`,`글로벌 반도체 장비 시장 2026년 1,430억 달러 돌파, 전년 대비 12% 성장 전망`],
  summary:`글로벌 빅테크 기업들이 AI 메모리 반도체 확보를 위해 SK하이닉스에 생산 라인 증설 비용을 직접 부담하겠다는 이례적인 제안을 한 것으로 알려졌다. HBM(고대역폭메모리) 수요가 AI 서버 투자 급증으로 폭발적으로 늘어나면서 공급이 절대적으로 부족한 공급자 우위 시장이 형성됐기 때문이다. SK하이닉스의 2026년 선행 주가수익비율(PER)이 6.79배로 삼성전자(6.77배)를 처음으로 앞질렀으며, HBM 시장 선점에 이어 밸류에이션 프리미엄까지 이전했다는 분석이 증권가에서 나온다. 글로벌 반도체 장비 시장은 2026년 1,430억 달러를 돌파하며 전년 대비 12% 성장할 것으로 전망되며, 삼성전자와 SK하이닉스의 투자 확대가 핵심 동력으로 꼽힌다. 빅테크들이 고객의 지위를 유지하면서도 제조사의 설비투자 리스크를 직접 분담하는 이 구조는 반도체 산업 역사상 전례가 없는 방식으로 평가된다. 삼성전자와 SK하이닉스는 차세대 HBM4 양산 일정과 관련해 글로벌 AI 가속기 업체들과 긴밀한 협의를 진행 중이다. 마이크론 등 경쟁사 대비 한국 기업의 HBM 기술 우위가 이런 협상력의 근간이 되고 있다.`,
  keyTerms:[{term:`HBM`,explanation:`HBM(고대역폭메모리)은 AI 연산에 특화된 초고속 메모리 반도체로, 엔비디아 GPU 등 AI 가속기에 필수적으로 탑재된다. 기존 메모리보다 수십 배 빠른 데이터 처리 속도를 가지며, 생성형 AI 열풍으로 수요가 폭발적으로 증가하고 있다.`}],
  history:`HBM 기술은 SK하이닉스가 세계 최초로 상용화하며 2013년부터 개발을 주도했다. 초기에는 그래픽카드용으로만 쓰였으나 AI 붐이 일면서 데이터센터용 AI 가속기의 핵심 부품으로 부상했다. 2023~2024년 생성형 AI 경쟁이 본격화되면서 HBM 수요가 공급을 크게 초과하기 시작했다. 삼성전자는 HBM3E 품질 이슈로 엔비디아 납품이 늦어지면서 SK하이닉스에 시장 점유율을 내줬다.`,
  players:`SK하이닉스는 HBM 시장 점유율 1위로 엔비디아·구글·아마존 등으로부터 집중적인 구애를 받고 있다. 삼성전자는 HBM4 개발을 가속화해 시장 지위 회복에 나서고 있다. 엔비디아·구글·아마존 등 빅테크는 AI 인프라 확보를 위해 메모리 공급 보장에 막대한 자금을 투입할 의향을 보이고 있다. 미국 마이크론은 정부 보조금을 활용해 HBM 경쟁에 뛰어들었으나 기술 격차 극복이 과제다.`,
  current:`빅테크의 자발적 설비투자 분담 제안은 HBM 공급 부족이 AI 산업 전체의 병목이 됐음을 보여준다. 이 구조가 고착화된다면 한국 반도체 산업의 협상력이 역대 최고 수준으로 높아질 수 있다.`,
  outlook:`HBM4 양산이 시작되는 2026년 하반기가 시장 주도권 재편의 분수령이 될 것이다. 삼성전자의 HBM4 엔비디아 납품 성공 여부가 향후 한국 반도체 산업 내 주도권 구도를 결정짓는 핵심 변수다.`,
  sources:[{title:`돈은 우리가 낼게 라인만 깔아줘 빅테크의 SK 구애 - 글로벌이코노믹`,url:`https://www.g-enews.com/article/Global-Biz/2026/05/202605091845082270fbbec65dfb_1`},{title:`코스피 왕좌 흔들린다 SK하이닉스 삼성전자 밸류 첫 역전 - 네이트뉴스`,url:`https://news.nate.com/view/20260514n04256`},{title:`AI 반도체 장비 시장 1430억달러 돌파 12% 성장 - 카운터포인트리서치`,url:`https://korea.counterpointresearch.com/ai-driven-semiconductor-equipment-market-2026-outlook/`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`OpenAI, 기업가치 8,520억 달러에 1,220억 달러 투자 유치…연내 기업공개 준비 착수`,
  metrics:[`OpenAI 기업가치 8,520억 달러(약 1,140조 원), 민간 기업 사상 최대 수준`,`OpenAI 월간 수익 20억 달러, 연간 240억 달러 규모로 성장`],
  summary:`오픈AI(OpenAI)는 2026년 3월 아마존 500억 달러, 엔비디아 300억 달러, 소프트뱅크 300억 달러 등 총 1,220억 달러 규모의 사상 최대 투자 유치에 성공하며 기업가치가 8,520억 달러로 치솟았다. 기업공개(IPO) 준비도 본격화돼 월스트리트저널은 오픈AI가 2026년 4분기 중 상장을 목표로 내부 작업을 진행 중이라고 보도했다. 현재 오픈AI의 월간 수익은 20억 달러, 연간 기준으로는 240억 달러 수준까지 성장했으며, 수익 구조는 챗GPT 소비자 구독(45%), 기업 API 이용(35%), 플랫폼·마이크로소프트 라이선스(20%)로 구성된다. 앤트로픽의 클로드 마이토스(Claude Mythos) 모델이 수만 건의 소프트웨어 취약점을 발견해 미국 재무부가 주요 은행장들을 소집하는 긴급 회의를 여는 등 AI 보안 리스크 논의가 가열되고 있다. 미국 정부도 대형 AI 모델의 공개 전 규제기관 사전 접근 의무화를 추진하는 등 AI 규제 압력이 커지고 있으며, 마이크로소프트·엑스AI 등이 규제당국에 사전 모델 접근을 허용하기로 합의했다. 오픈AI의 IPO가 실현될 경우 역대 최대 규모의 미국 주식시장 공모가 될 것으로 예상된다. 소비자와 기업 모두에서 생성형 AI 도입이 빠르게 확산되면서 오픈AI의 가파른 성장세는 당분간 이어질 전망이다.`,
  keyTerms:[{term:`기업공개`,explanation:`기업공개(IPO)란 주식회사가 처음으로 일반 투자자에게 자사 주식을 사고팔 수 있도록 증권거래소에 상장하는 것이다. 오픈AI는 지금까지 소수 투자자로부터만 투자를 받았으나, 기업공개를 통해 전 세계 일반 투자자들도 주식을 살 수 있게 된다.`}],
  history:`오픈AI는 2015년 일론 머스크와 샘 알트만 등이 비영리 AI 안전 연구소로 설립했다. 2019년 마이크로소프트로부터 10억 달러 투자를 유치하며 영리 자회사 구조로 전환했다. 2022년 11월 챗GPT 공개 이후 폭발적인 성장을 거듭했으며, 2025~2026년 연간 수백억 달러 규모의 투자 유치가 이어졌다. 2026년 비영리 지배구조에서 완전 영리법인으로의 전환 작업을 완료하며 IPO 기반을 갖췄다.`,
  players:`샘 알트만 CEO는 IPO로 조달한 자금을 AGI(범용인공지능) 개발과 데이터센터 인프라 확충에 투입할 계획이다. 마이크로소프트는 최대 파트너이자 주요 주주로서 IPO 이후에도 협력 관계를 유지할 것으로 보인다. 아마존·소프트뱅크·엔비디아는 대규모 투자를 통해 IPO 전에 유리한 지분을 확보했다. 경쟁사인 구글(제미나이), 앤트로픽(클로드), 메타(라마) 등과의 AI 모델 경쟁이 오픈AI의 성장을 가속하는 압력으로 작용하고 있다.`,
  current:`기업가치 8,520억 달러는 삼성전자 시가총액을 넘어서는 수준으로, AI 산업에 대한 시장의 기대가 얼마나 큰지를 보여준다. IPO 준비가 가시화되면서 AI 투자 열기와 시장 밸류에이션 거품 논쟁도 동시에 부상하고 있다.`,
  outlook:`4분기 IPO가 예상대로 진행될 경우 역대 최대 규모 공모가 될 가능성이 높다. 미국 AI 규제 법안 통과 여부와 경쟁 모델의 추격이 IPO 투자 심리의 핵심 변수가 될 것이다.`,
  sources:[{title:`OpenAI raises \$122 billion to accelerate the next phase of AI - OpenAI`,url:`https://openai.com/index/accelerating-the-next-phase-ai/`},{title:`OpenAI preps for IPO in 2026, says ChatGPT must be productivity tool - CNBC`,url:`https://www.cnbc.com/2026/03/17/openai-preps-for-ipo-in-2026-says-chatgpt-must-be-productivity-tool.html`},{title:`OpenAI \$122B Raise at \$852B Valuation IPO Rehearsal - Tech Insider`,url:`https://tech-insider.org/openai-122-billion-funding-round-852-billion-valuation-2026/`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`콩고 근무 미국인 에볼라 양성 판정…CDC, 미국 내 추가 감염 위험 낮다고 밝혀`,
  metrics:[`에볼라 바이러스 치사율 최대 25~90%, 바이러스 유형별 차이`,`WHO 승인 에볼라 백신 2종·치료제 2종 보유, 격리 치료 중`],
  summary:`미국 질병통제예방센터(CDC)는 5월 19일 콩고민주공화국에서 근무하던 미국인 1명이 에볼라 바이러스 양성 반응을 보였다고 발표했다. 해당 미국인은 콩고에서 업무 중 에볼라에 노출된 것으로 추정되며, 주말 동안 증상이 발현된 후 검사 결과 양성 판정을 받았다. CDC는 현재 이 환자를 격리해 치료 중이며, 미국 내 일반 인구에 대한 추가 전파 위험은 낮다고 공식 발표했다. 에볼라는 혈액·체액과의 직접 접촉을 통해서만 전파되는 바이러스성 출혈열로 치사율이 최대 90%에 달하는 위험한 감염병이다. 콩고는 역사적으로 에볼라 바이러스의 주요 발생 지역으로, 현재도 간헐적 소규모 발생이 이어지고 있다. 이번 사례는 코로나19 팬데믹 이후 고위험 감염병의 국경 간 이동에 대한 경계를 다시 상기시키는 계기가 됐다. 세계보건기구(WHO)와 CDC는 콩고 현지의 접촉자 추적 및 대응 조치를 지원하고 있다.`,
  keyTerms:[{term:`에볼라`,explanation:`에볼라는 서아프리카와 중앙아프리카 지역에서 주로 발생하는 바이러스성 출혈열로, 감염되면 발열·출혈·장기 손상 등 심각한 증상이 나타난다. 공기로는 전파되지 않고 감염자의 혈액이나 체액과 직접 접촉할 때만 옮겨지지만, 치사율이 매우 높아 세계적으로 엄중히 감시하는 감염병이다.`}],
  history:`에볼라 바이러스는 1976년 콩고민주공화국(당시 자이르)의 에볼라 강 근처에서 처음 발견됐다. 2014~2016년 서아프리카 대규모 유행으로 1만 1천 명 이상이 사망하며 전 세계에 공포를 심어줬다. 2019년 콩고에서 또다시 대규모 발생이 있었으며, 이 시기 최초의 에볼라 백신이 긴급 승인됐다. 현재 WHO 승인 에볼라 백신 2종과 치료제 2종이 존재해 과거보다 대응 역량이 향상됐다.`,
  players:`CDC는 해외 고위험 감염병의 미국 내 유입을 감시·대응하는 핵심 기관이다. WHO는 콩고 및 주변국의 에볼라 발생 모니터링과 대응 조율을 담당한다. 콩고 보건부는 현지 접촉자 추적 작업을 진행 중이다. 아프리카 지역에서 활동하는 국제 NGO와 의료진이 최전선 대응을 맡고 있다.`,
  current:`이번 사례는 단일 감염 사례로 현재 격리 치료 중이며, 대규모 확산 가능성은 낮다는 것이 CDC의 공식 입장이다. 그러나 이란전쟁으로 국제 의료 자원이 분산된 상황에서 아프리카 감염병 대응 역량 약화에 대한 우려도 제기된다.`,
  outlook:`향후 수주간 접촉자 추적 결과와 추가 감염 여부가 최대 관건이다. 미국 내 격리 치료 결과와 콩고 현지 발생 동향이 WHO의 국제 공중보건 비상사태 선포 여부를 결정짓는 핵심 기준이 될 것이다.`,
  sources:[{title:`American working in Congo tests positive for Ebola, CDC says - NBC News`,url:`https://www.nbcnews.com/health/health-news/american-tests-positive-ebola-cdc-rcna345740`},{title:`CDC Ebola Virus Disease Information - CDC`,url:`https://www.cdc.gov/vhf/ebola/index.html`}]
}]

  headline:`코스피 지수 사상 첫 8000선 돌파, 반도체·AI 랠리로 한국 증시 세계 주목`,
  metrics:[`코스피 7000→8000 돌파 기간: 단 8거래일 (2026년 5월 6~15일)`,`코스피 연초 대비 약 90% 상승`],
  summary:`코스피 지수가 2026년 5월 15일 역사상 처음으로 8000선을 돌파하며 한국 증시의 새 역사를 썼다. 삼성전자와 SK하이닉스가 주도하는 HBM·DRAM 등 고성능 메모리 반도체 수요 급증이 핵심 상승 동력이었다. 코스피는 7000선 돌파(5월 6일) 후 불과 8거래일 만에 1000포인트를 추가로 올리는 유례없는 속도를 기록했다. 글로벌 빅테크 기업들의 AI 데이터센터 투자가 폭발적으로 늘면서 반도체 초호황 사이클이 지속되고 있다는 평가가 나온다. 이재명 정부의 자본시장 개혁 조치도 외국인 자금 유입을 활성화해 지수 상승에 기여했다. 한국 증시는 영국·캐나다·대만 증시와 시가총액 규모에서 비슷한 수준으로 올라섰다. 주요 증권사들은 2026년 말까지 코스피가 글로벌 상위 5대 증시 진입도 가능하다는 전망을 제시하고 있다. 다만 일부에서는 급격한 상승에 따른 조정 가능성도 경고하고 있다.`,
  keyTerms:[{term:`반도체 초호황 사이클`,explanation:`반도체 수요가 공급을 크게 웃돌아 기업들이 막대한 이익을 내는 시기를 말한다. AI 데이터센터 확장으로 메모리 반도체 수요가 폭발하면서 삼성전자·SK하이닉스가 사상 최대 실적을 기록하고 있다.`}],
  history:`코스피는 2022~2024년 금리 인상과 경기 둔화로 2000~3000선에서 장기 침체를 겪었다. 2025년 중반 반도체 경기가 반등하고 AI 투자 붐이 시작되면서 코스피는 빠르게 회복세를 탔다. 2026년 초 이후 삼성전자의 HBM 독점 공급 계약 체결과 SK하이닉스의 역대 최대 분기 영업이익 발표가 이어지며 급등세가 지속됐다. 코스피는 2026년 2월 6000선, 5월 6일 7000선을 차례로 돌파했다.`,
  players:`삼성전자와 SK하이닉스가 코스피 시가총액의 약 30%를 차지하며 지수 상승을 주도하고 있다. 외국인 투자자들이 반도체 랠리에 편승해 대규모 매수세를 이어가고 있다. 미국 엔비디아와의 AI 칩 공급망 연계가 두 기업의 주가 상승에 결정적인 역할을 했다. 이재명 정부의 자본시장 밸류업 정책도 국내외 투자 심리를 끌어올렸다.`,
  current:`2026년 5월 현재 코스피 8000 돌파는 한국 경제의 반도체 의존도가 사상 최고 수준임을 보여준다. AI 투자 붐이 지속되는 한 반도체 수요가 뒷받침될 것으로 전망되어 추가 상승 기대감이 있다.`,
  outlook:`6월 삼성전자와 SK하이닉스의 2분기 잠정 실적 발표가 코스피 방향을 결정할 주요 분수령이 될 전망이다. 미국 빅테크의 AI 설비 투자 계획 발표와 엔비디아 실적 가이던스도 주시해야 할 변수다.`,
  sources:[{title:`코스피 8000 돌파, 세계 증시 판도 흔든 한국 - 뉴스핌`,url:`https://www.newspim.com/news/view/20260515000195`},{title:`올해 90% 폭등해 8000 뚫은 코스피 - 머니투데이`,url:`https://www.mt.co.kr/stock/2026/05/15/2026051511060599435`},{title:`코스피 8000시대 개막, K증시 세계를 놀라게 하다 - 일간투데이`,url:`https://www.dtoday.co.kr/news/articleView.html?idxno=770445`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미 연준, 관세 인플레이션 속 기준금리 연속 동결…연내 인하 가능성 사실상 소멸`,
  metrics:[`2026년 미국 가구당 관세 추가 부담 연 약 1,500달러 추정`,`미국 소비자물가 상승률 4.4% (2026년 4월 기준)`],
  summary:`미국 연방준비제도(Fed)가 2026년 내내 기준금리를 동결하며 관망세를 이어가고 있다. 트럼프 행정부의 광범위한 관세 부과로 미국 가구당 연간 약 1,500달러의 추가 세 부담이 발생하고 있으며 인플레이션 압력이 좀처럼 꺾이지 않는 상황이다. 2026년 4월 기준 미국 소비자물가 상승률은 4.4%를 기록해 연준 목표치인 2%를 두 배 이상 웃돌고 있다. 관세 정책은 1993년 이래 가장 큰 규모의 세금 인상으로 글로벌 공급망에도 혼란을 주고 있다. JP모건 등 주요 투자은행들은 노동시장이 크게 악화되지 않는 한 연준이 2026년 중 금리를 내리지 않을 것으로 본다. 이란 호르무즈 해협 긴장에 따른 유가 상승이 추가적인 인플레이션 위험 요인으로 작용하고 있다. 글로벌 경제성장률 전망치는 3.1%로 하향 조정된 가운데 스태그플레이션 우려도 점차 높아지고 있다. 연준 의장은 관세 영향이 물가에 어떻게 나타나는지 확인하며 신중하게 대응하겠다는 입장이다.`,
  keyTerms:[{term:`스태그플레이션`,explanation:`경기침체(stagnation)와 인플레이션(inflation)이 동시에 발생하는 현상이다. 보통 경기가 나빠지면 물가도 내려가야 하지만, 관세 등 공급 충격으로 경기는 나쁜데 물가는 오르는 최악의 상황을 말한다.`}],
  history:`연준은 2022~2023년 고인플레이션 대응을 위해 기준금리를 5.25~5.5%까지 올렸다가 2024년 말부터 인하를 시작했다. 그러나 트럼프 2기 행정부가 2025년 초부터 대규모 관세를 부과하면서 인플레이션이 재점화됐다. 2026년 초에는 금리 인하 기대가 높았지만 관세 발 인플레이션이 예상보다 강하게 나타나면서 인하 기대가 꺾였다. 현재 적용 관세율은 1972년 이후 최고 수준이다.`,
  players:`연준 의장 제롬 파월은 물가 안정을 최우선 과제로 삼고 있으며 트럼프 대통령과의 갈등 속에서도 독립성을 유지하고 있다. 트럼프 행정부는 경기 부양을 위해 금리 인하를 압박하고 있지만 연준은 이에 응하지 않고 있다. 월가 주요 투자은행들은 연내 금리 동결을 기본 시나리오로 제시하고 있다.`,
  current:`관세 인플레이션이 소비자 구매력을 잠식하면서 미국 소비 둔화 우려가 커지고 있다. 연준은 물가 안정과 경기 지지 사이에서 딜레마에 빠진 상황으로 어느 한쪽을 선택하기 어려운 국면이다.`,
  outlook:`6~7월 예정된 연준 FOMC 회의에서 금리 동결 기조가 지속될 것으로 보인다. 노동시장 지표 악화나 에너지 가격 급등 시 조기 인하 가능성이 열릴 수 있어 이를 주시해야 한다.`,
  sources:[{title:`Tariff Tracker: 2026 Trump Tariffs & Trade War by the Numbers - Tax Foundation`,url:`https://taxfoundation.org/research/all/federal/trump-tariffs-trade-war/`},{title:`What Do the New Trump Tariffs Mean for Fed Interest-Rate Cuts? - Morningstar`,url:`https://www.morningstar.com/markets/what-do-new-trump-tariffs-mean-fed-interest-rate-cuts`},{title:`What's The Fed's Next Move? - J.P. Morgan Global Research`,url:`https://www.jpmorgan.com/insights/global-research/economy/fed-rate-cuts`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`이란 호르무즈 봉쇄 위협에 국제 유가 급등…IEA, 코로나 이후 최대 공급 충격 경고`,
  metrics:[`미국 평균 휘발유 가격 갤런당 4.50달러 돌파`,`IEA 전망: 2026년 2분기 원유 공급 하루 150만 배럴 감소`],
  summary:`이란이 호르무즈 해협을 통한 원유 수송을 위협하면서 국제 에너지 시장이 극심한 불안에 빠졌다. 미국이 이란 항구에 대한 해상 압박을 강화하는 가운데 이란은 전 세계 원유 수송량의 20%가 통과하는 호르무즈 해협 봉쇄로 맞대응하겠다고 위협하고 있다. 국제에너지기구(IEA)는 2026년 2분기 원유 공급이 하루 최대 150만 배럴 감소할 수 있다고 전망했는데 이는 코로나19 팬데믹 이후 최대 공급 충격 규모다. 미국 내 평균 휘발유 가격은 갤런당 4.50달러를 넘어섰으며 에너지 가격 상승이 이미 높은 인플레이션을 더욱 악화시키고 있다. 트럼프 대통령은 시진핑 중국 국가주석과 베이징 정상회담 후 귀국했지만 이란 핵 협상에서 별다른 성과를 거두지 못했다. 유가 상승은 세계 경제 성장을 압박하는 동시에 주요국 중앙은행의 금리 인하 여지를 더욱 좁히고 있다. 호르무즈 해협 통행 안전이 담보되지 않는 한 에너지 가격 변동성이 당분간 지속될 전망이다. 한국을 포함한 아시아 원유 수입국들도 대체 공급선 확보에 나서고 있다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`이란과 아라비아반도 사이의 좁은 해협으로 전 세계 원유 해상 운송량의 약 20%가 이곳을 통과한다. 이란이 이 해협을 봉쇄하면 전 세계 에너지 공급에 즉각적이고 심각한 충격이 발생한다.`}],
  history:`이란과 미국의 갈등은 2015년 핵합의 체결 이후에도 반복적으로 긴장과 완화를 거듭해왔다. 트럼프 1기에 핵합의에서 탈퇴한 후 제재가 재개됐고 2기 행정부 출범 이후 이란 제재가 더욱 강화됐다. 2025년 말부터 이란이 핵 농축을 강화하면서 양국 긴장이 고조됐고 중동 전쟁 확산 우려가 커졌다. 이란은 호르무즈 봉쇄를 서방 압박에 대한 최후 카드로 여러 차례 언급해왔다.`,
  players:`미국은 이란을 봉쇄하기 위해 해군 전력을 증강하며 해상 압박을 강화하고 있다. 이란은 핵 프로그램 포기 대신 제재 해제를 요구하며 버티고 있다. 사우디아라비아를 포함한 걸프 산유국들은 대체 공급 능력을 일부 확대했지만 완전한 대체는 불가능하다.`,
  current:`트럼프 대통령이 시진핑과의 정상회담에서 이란 문제 돌파구를 마련하지 못하면서 협상 전망이 불투명해졌다. 이란의 호르무즈 봉쇄 위협이 현실화될 경우 세계 경제에 미치는 충격은 코로나19 초기 수준을 넘어설 수 있다.`,
  outlook:`미국의 군사적 압박 수위와 이란의 대응 방식이 에너지 가격의 핵심 변수가 될 것이다. 향후 UN 안전보장이사회 긴급회의와 미국·이란 비공식 채널을 통한 협상 재개 여부를 주목해야 한다.`,
  sources:[{title:`Blockade diplomacy and other geopolitical updates - World Economic Forum`,url:`https://www.weforum.org/stories/2026/05/blockade-diplomacy-and-other-geopolitical-stories-to-know-this-month/`},{title:`Global Economic Outlook May 2026: Growth Holds Amid Inflation & Oil Risks - OTET Markets`,url:`https://otetmarkets.com/blog/otet-view/global-economic-outlook-may-2026-inflation/`},{title:`Trump returns from China with no Iran breakthrough - CNN Politics`,url:`https://www.cnn.com/2026/05/16/politics/iran-trump-china-military-strikes`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이재명 대통령, 중동 위기 속 에너지 안보 긴급 강조…원유 공급선 다변화 주문`,
  metrics:[`한국 원유 수입 중 중동 의존도 약 70%`,`이재명 대통령 2026년 5월 19일 수석보좌관 회의 에너지 안보 발언`],
  summary:`이재명 대통령은 2026년 5월 19일 수석보좌관 회의에서 최근 중동 상황 긴박화와 이란 호르무즈 봉쇄 위협을 언급하며 에너지 안보를 최우선 국정 과제로 강조했다. 이 대통령은 단 한 방울의 석유라도 더 확보하고 안정적인 공급선을 개척하는 노력이 어느 때보다 절실하다고 촉구했다. 한국은 원유 수입의 약 70%를 중동에 의존하고 있어 이란 사태가 직접적인 에너지 안보 위협이 되고 있다. 정부는 전략 비축유 방출 가능성을 검토하는 한편 비중동권 산유국과의 신규 공급 협약 체결에 속도를 내고 있다. 이 대통령은 원전과 재생에너지를 함께 확대하는 이중 에너지 전환 정책도 가속화하겠다고 밝혔다. 에너지 가격 상승은 한국 가계 물가에 직접 영향을 미쳐 이재명 정부의 민생 경제 정책에도 도전이 되고 있다. 정부는 취약계층을 위한 에너지 바우처 확대와 연료비 지원 방안도 검토 중이다. 에너지 자립도를 높이기 위한 중장기 정책 로드맵도 조만간 발표될 예정이다.`,
  keyTerms:[{term:`에너지 안보`,explanation:`국가가 필요한 에너지를 안정적이고 지속적으로 확보할 수 있는 능력을 말한다. 원유의 70%를 중동에서 들여오는 한국은 중동 분쟁이 발생할 때마다 에너지 공급이 끊길 위험에 노출된다.`}],
  history:`한국은 에너지 자원이 거의 없는 나라로 1970년대 오일쇼크 이후 에너지 수입 다변화를 추진해왔다. 그러나 중동산 원유 의존도는 수십 년이 지난 지금도 70% 안팎을 유지하고 있다. 이재명 정부는 대선 당시 기후위기 대응 및 탈탄소 전환을 핵심 공약으로 내세우며 에너지 정책 전환을 예고했다. 2026년 출범 이후 원자력과 재생에너지를 동시에 확대하는 이중 트랙 전략을 추진 중이다.`,
  players:`이재명 대통령과 산업통상자원부가 에너지 정책의 주축이며 한국석유공사가 해외 원유 확보 임무를 맡고 있다. 사우디아라비아·아랍에미리트 등 걸프 산유국과의 장기 공급 계약이 안정적인 수입 기반이 되고 있다. 미국 LNG와 호주 천연가스도 대체 에너지원으로 비중이 높아지고 있다.`,
  current:`이란의 호르무즈 봉쇄 위협이 현실화 조짐을 보이면서 한국 정부의 대응이 시급해진 상황이다. 국제 유가 상승이 국내 물가와 무역수지에 즉각적인 영향을 미치고 있어 정부의 선제 대응이 필요하다.`,
  outlook:`정부는 이달 중 에너지 안보 대책 패키지를 발표할 예정이며 비중동 원유 공급국과의 협약 체결 현황이 주목된다. 장기적으로는 원자력 발전 확대와 재생에너지 보급 가속화를 통해 화석연료 의존도를 낮추는 정책이 추진될 것이다.`,
  sources:[{title:`이재명 정부, 원전과 재생에너지 두 마리 토끼 잡을까 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202604241732041566`},{title:`Korea's Recovery in a Fractured Global Economy - AMRO ASIA`,url:`https://amro-asia.org/koreas-recovery-in-a-fractured-global-economy`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`러-우 3일 휴전 종료 후 평화협상 교착…도네츠크 영토 포기 놓고 양측 벽 높아`,
  metrics:[`러-우 포로 교환 규모: 양측 각 1,000명 (2026년 5월 9~11일 휴전 중)`,`러시아 점령 도네츠크 지역 면적: 전체의 약 75%`],
  summary:`트럼프 미국 대통령이 중재한 3일간의 러-우 임시 휴전이 2026년 5월 11일 종료된 뒤 평화협상이 다시 교착 상태에 빠졌다. 양측은 휴전 기간 동안 각 1,000명씩 포로를 교환했으며 트럼프 대통령은 휴전 연장을 희망했지만 러시아의 요구 조건을 놓고 이견이 좁혀지지 않았다. 러시아는 우크라이나가 현재 러시아가 점령 중인 도네츠크 지역에서 군을 철수할 것을 요구하고 있으나 우크라이나는 자국이 방어하고 있는 영토를 포기하지 않겠다는 입장이다. 푸틴 대통령은 젤렌스키 대통령과 모스크바 또는 중립국에서 직접 회담할 용의가 있다고 밝혔지만 서로의 전제 조건 차이가 커 실현 가능성은 불투명하다. 독일이 국방비를 대폭 늘리고 프랑스는 핵 억지력 공유 협상을 벌이는 등 유럽의 방위 역량 강화도 가속화되고 있다. 미국의 독일 내 주둔 병력 5,000명 감축 결정으로 나토 내부에서 미국 신뢰도를 둘러싼 갈등도 표면화됐다. 전쟁 4년이 지난 현재 우크라이나 재건 비용은 수천억 달러로 추산되며 국제사회의 지원이 지속되고 있다. 단기간 내 포괄적 평화합의 가능성은 낮고 제한적 충돌과 외교 협상이 병행되는 상황이 이어질 것으로 보인다.`,
  keyTerms:[{term:`도네츠크`,explanation:`우크라이나 동부에 있는 주로 러-우 전쟁의 핵심 분쟁 지역이다. 러시아는 도네츠크의 약 75%를 점령하고 있으며 우크라이나가 아직 방어 중인 나머지 지역 철수를 평화 협상의 전제 조건으로 내세우고 있다.`}],
  history:`러시아는 2022년 2월 우크라이나를 전면 침공하며 전쟁을 시작했다. 초기에는 키이우를 향해 진격했지만 우크라이나의 저항에 막혀 동부와 남부 점령으로 전략을 바꿨다. 2023~2024년에도 전선이 크게 변하지 않은 소모전이 이어졌고 트럼프 재집권 후 미국이 적극적인 중재자로 나서기 시작했다.`,
  players:`우크라이나 젤렌스키 대통령은 영토 주권 보전을 협상의 전제로 내세우고 있다. 러시아 푸틴 대통령은 점령 지역의 주권 인정을 요구하며 협상 레버리지로 활용 중이다. 미국 트럼프 대통령이 압박과 중재를 병행하며 종전 협상을 주도하려 하고 있다.`,
  current:`3일 휴전이 끝난 뒤 러시아와 우크라이나 양측이 다시 포격을 주고받고 있어 협상 동력이 약해진 상황이다. 영토 협상에서 어느 쪽도 양보하지 않으려 해 평화합의까지 갈 길이 멀다.`,
  outlook:`6월 중 예정된 G7 정상회의에서 우크라이나 지원과 대러 제재 연장 문제가 주요 의제로 오를 전망이다. 여름 전 포괄적 협상 재개 가능성은 낮고 미국이 대우크라이나 군사 지원을 조건으로 추가 협상을 요구할 수 있다.`,
  sources:[{title:`Trump announces three-day ceasefire in Russia-Ukraine war - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/5/8/trump-announces-three-day-ceasefire-in-russia-ukraine-war`},{title:`Russia, Ukraine agree to 3-day ceasefire and prisoner swap - CBC News`,url:`https://www.cbc.ca/news/world/russia-ukraine-ceasefire-9.7193061`},{title:`Putin hints at ending Russia's war in Ukraine, but why now? - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/5/10/putin-hints-at-ending-russias-war-in-ukraine-but-why-now`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`이스라엘, 가자지구 하마스 군사령관 사살…정전 협상 와해 위기`,
  metrics:[`가자 정전 발효 이후 팔레스타인인 사망자: 856명 이상 (7개월 누적)`,`이스라엘이 실효 통제하는 가자지구 면적: 50% 이상`],
  summary:`이스라엘이 2026년 5월 15일 가자시티 공습으로 하마스 가자지구 군사령관 이즈 알딘 알하다드를 사살했다고 발표했다. 알하다드는 2023년 10월 7일 이스라엘을 공격한 하마스 작전의 핵심 설계자 중 한 명으로 지목된 인물이다. 이번 사살로 2025년 10월 발효된 가자 정전 협상이 사실상 붕괴 위기에 처했으며 하마스는 이스라엘의 정전 협정 위반을 강력히 비난했다. UN 안전보장이사회는 가자지구가 영구 분단 상태로 굳어질 위험성을 경고하며 이스라엘에 정전 준수를 촉구하는 긴급 회의를 열었다. 이스라엘은 하마스 무장해제가 이뤄지지 않는 한 군사작전을 지속할 것이라고 밝히고 있으며 하마스는 이스라엘의 선제 공격을 이유로 무장해제 협상 자체를 거부하고 있다. 정전 발효 이후 7개월 동안 이스라엘군에 의해 팔레스타인인 856명 이상이 사망하고 이스라엘이 가자 영토의 절반 이상을 사실상 통제하고 있다. 가자지구가 이스라엘 점령 구역과 팔레스타인 자치 구역으로 영구 분단될 수 있다는 우려가 국제사회에서 나오고 있다. 미국은 이스라엘을 공개적으로 비판하지 않으면서도 외교 채널을 통해 긴장 완화를 촉구하는 이중적인 입장을 유지하고 있다.`,
  keyTerms:[{term:`하마스 무장해제`,explanation:`가자지구 정전 협상의 핵심 쟁점으로 이스라엘이 영구적인 적대 행위 중단의 전제 조건으로 요구하는 사항이다. 하마스는 무장해제가 곧 정치적 소멸을 의미한다고 보고 이를 거부하고 있어 협상이 교착 상태에 빠져 있다.`}],
  history:`2023년 10월 7일 하마스의 기습 공격으로 이스라엘인 약 1,200명이 사망하고 250명이 납치되면서 전쟁이 시작됐다. 이스라엘은 하마스 섬멸을 목표로 대규모 지상·공중 작전을 펼쳤으며 가자지구에서 수만 명의 팔레스타인인이 사망했다. 2025년 10월 미국 중재로 정전이 발효됐지만 이후에도 이스라엘의 군사 작전은 단속적으로 계속됐다.`,
  players:`이스라엘 네타냐후 정부는 하마스 지도부 제거와 완전한 무장해제를 정전의 전제 조건으로 내세우고 있다. 하마스는 무장해제 없이 지속적인 정전과 팔레스타인 국가 수립을 요구하고 있다. 카타르와 이집트가 중재자 역할을 하고 있으나 양측의 입장 차가 너무 커 협상 진전이 없다.`,
  current:`하마스 군사령관 사살이 협상 당사자를 제거하는 효과를 냈지만 동시에 협상 자체를 무력화시키는 결과를 낳고 있다. 가자지구 내 인도주의 위기가 심각한 수준으로 이어지고 있어 국제사회의 압박이 커지고 있다.`,
  outlook:`이스라엘이 추가 군사작전을 감행할 경우 정전 협상은 완전히 무너질 수 있다. 카타르와 이집트 주도의 중재 협상 재개 여부와 미국의 이스라엘 압박 수위가 향후 상황을 결정할 주요 변수다.`,
  sources:[{title:`Gaza risks becoming permanently divided, top official warns - CNN`,url:`https://www.cnn.com/2026/05/14/middleeast/gaza-israel-ceasefire-permanent-division-intl`},{title:`Israel threatens Gaza war resumption to force disarmament - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/5/3/israel-threatens-gaza-war-resumption-to-force-disarmament-as-truce-frays`},{title:`Consolidate Gaza Ceasefire - UN Security Council Press Release`,url:`https://press.un.org/en/2026/sc16284.doc.htm`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`삼성전자 노사, 중노위 최종 조정 막판 협상…파업 여부 이번 주 판가름`,
  metrics:[`삼성전자 노조 요구: 영업이익 15% 성과급 지급 및 OPI 상한 폐지`,`2025년 삼성전자 반도체 부문 영업이익 약 30조 원 규모`],
  summary:`삼성전자 노사가 2026년 5월 18~19일 중앙노동위원회 사후 조정에서 성과급 지급 기준을 놓고 최종 줄다리기를 벌이고 있다. 전국삼성전자노동조합은 영업이익의 15%를 성과급으로 지급하고 초과이익성과급(OPI) 상한을 폐지할 것을 요구하고 있으나 사측은 경영 부담과 공급망 안정을 이유로 신중한 입장을 고수하고 있다. 이재명 대통령은 수석보좌관 회의에서 AI 전환 시대에 노사 상생이 필요하다며 우회적으로 노조의 책임 의식도 강조했다. 한국 정부와 재계는 파업이 현실화할 경우 반도체 생산 차질로 수출과 경제에 타격이 불가피하다고 우려하고 있다. 삼성전자는 HBM·DRAM 납품 계약 이행을 위해 생산 안정성 유지가 절대적으로 필요한 상황이다. 노조 측은 사측이 역대 최대 실적을 올리면서도 노동자 몫을 제대로 돌려주지 않는다고 비판하고 있다. 최종 조정 결렬 시 노조는 전면 파업에 돌입할 예정이며 이 경우 삼성전자 주가와 코스피에도 즉각적인 충격이 예상된다. 2025년에 이어 2년 연속 파업 위기로 노사 갈등이 삼성전자의 구조적 문제로 자리잡는 양상이다.`,
  keyTerms:[{term:`초과이익성과급(OPI)`,explanation:`삼성전자가 당해 연도 이익이 목표치를 초과했을 때 직원들에게 지급하는 추가 성과급이다. 현재 OPI에는 지급 상한선이 있는데 노조는 이 상한을 없애고 실적에 비례해 더 받아야 한다고 요구하고 있다.`}],
  history:`삼성전자는 오랫동안 무노조 경영 원칙을 유지했지만 2020년 노조 결성이 허용된 이후 노사 갈등이 표면화됐다. 2024~2025년 반도체 초호황 속에서 노조는 실적에 걸맞은 성과 배분을 요구하며 수차례 파업을 예고했다. 2025년에는 단기 파업이 실제로 발생하며 노사 갈등이 본격화됐다.`,
  players:`전국삼성전자노동조합은 성과 공정 배분을 핵심 요구로 내세우며 강경 입장을 유지하고 있다. 삼성전자 사측은 글로벌 경쟁력 유지와 투자 재원 확보를 위해 성과급 상한 폐지는 불가하다고 맞서고 있다. 이재명 정부는 직접 개입보다 대화와 상생을 촉구하는 간접적 압박을 가하고 있다.`,
  current:`AI 반도체 초호황 시기에 삼성전자의 생산 차질은 글로벌 공급망에 직접적인 영향을 미칠 수 있어 사태의 파장이 크다. 중노위 조정이 실패하면 노조는 즉각 파업에 돌입할 수 있어 이번 주가 분수령이다.`,
  outlook:`5월 19일 중노위 조정 결과가 파업 여부를 결정할 것이며 결렬 시 이른 시일 내에 전면 파업 일정이 공표될 가능성이 높다. 파업이 현실화되면 삼성전자의 2분기 실적과 코스피 지수에도 즉각적인 영향이 예상된다.`,
  sources:[{title:`삼성전자 노사 마지막 기회, 성과급 상한 폐지 묘수 찾나 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202605190611373389`},{title:`이재명 대통령의 삼성 노조 향한 경고 - 이투데이`,url:`https://www.etoday.co.kr/news/view/2585423`},{title:`2026년 삼성전자 노조 총파업 - 나무위키`,url:`https://namu.wiki/w/2026%EB%85%84%20%EC%82%BC%EC%84%B1%EC%A0%84%EC%9E%90%20%EB%85%B8%EC%A1%B0%20%EC%B4%9D%ED%8C%8C%EC%97%85`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`글로벌 AI 에이전트 시대 본격화…빅테크 AI 인프라 투자 7500억 달러 돌파 전망`,
  metrics:[`2026년 글로벌 AI 관련 자본지출 7500억 달러 돌파 전망`,`OpenAI 연환산 매출 250억 달러 돌파, Anthropic 190억 달러 근접`],
  summary:`2026년은 AI가 단순 도구를 넘어 자율적으로 작업을 수행하는 AI 에이전트의 시대가 본격화되는 해로 평가받고 있다. OpenAI·Google·Anthropic 등 주요 AI 기업들이 자율 에이전트 개발에 속도를 내고 있으며 이와 함께 AI 인프라에 대한 투자도 폭발적으로 늘고 있다. 2026년 글로벌 AI 관련 자본지출은 7500억 달러를 넘어설 것으로 전망되며 Anthropic은 구글 클라우드와 협력해 2000억 달러 이상의 클라우드 인프라와 칩에 투자하기로 했다. JPMorgan Chase는 AI 투자를 실험적 R&D에서 핵심 인프라로 재분류하고 2026년 기술 예산으로 198억 달러를 배정했다. OpenAI의 연환산 매출은 250억 달러를 넘어섰고 Anthropic도 190억 달러에 근접하면서 AI 산업이 명실상부한 메가 산업으로 자리 잡았다. 미국 정부는 AI 모델을 공개하기 전 규제 당국에 사전 접근권을 제공하도록 요구하는 정책을 추진 중이며 주요 AI 기업들도 이에 동의했다. 골드만삭스는 AI 에이전트 확산의 병목으로 에너지 부족과 숙련 인력 부족을 지목했다. 데이터센터 전력 수요를 충족할 차세대 에너지원 확보가 AI 인프라 확장의 새로운 과제로 부각되고 있다.`,
  keyTerms:[{term:`AI 에이전트`,explanation:`사람의 지시 없이도 스스로 목표를 설정하고 복잡한 작업을 단계적으로 수행하는 인공지능 시스템이다. 단순히 질문에 답하는 것을 넘어 인터넷 검색·코딩·이메일 발송 등 여러 작업을 자율적으로 연결해 처리할 수 있다.`}],
  history:`2022년 ChatGPT 출시 이후 AI 챗봇이 빠르게 보급됐고 2024~2025년에는 기업용 AI 도구 시장이 폭발적으로 성장했다. 2025년부터 AI 에이전트 개념이 본격적으로 등장하며 자율 작업 수행이 가능한 AI 시스템 개발 경쟁이 시작됐다. 엔비디아 GPU 수요 폭증이 AI 인프라 투자 붐의 물리적 기반이 됐다.`,
  players:`OpenAI·Anthropic·Google DeepMind가 AI 에이전트 개발 경쟁의 선두 주자다. Microsoft·Amazon·Google이 클라우드 AI 인프라 투자를 주도하고 있다. 엔비디아는 AI 칩 공급망의 핵심으로 AI 인프라 투자 붐의 최대 수혜자 중 하나다.`,
  current:`AI 에이전트 상용화가 빠르게 진행되면서 반복 업무를 중심으로 인간 노동자 대체가 가속화되고 있다. 규제 당국과 빅테크 기업 간 AI 사전 검토 협약 체결은 AI 거버넌스의 새로운 이정표로 평가된다.`,
  outlook:`2026년 하반기 주요 AI 기업들의 차세대 에이전트 모델 출시가 예정되어 있어 AI 인프라 투자 경쟁은 더욱 치열해질 전망이다. AI 규제 법안 통과 여부가 산업 성장에 중요한 변수가 될 것이다.`,
  sources:[{title:`Goldman sees an AI bottleneck that can't be vibe-coded away - Fortune`,url:`https://fortune.com/2026/05/13/goldman-sachs-ai-agent-energy-bottleneck-labor-shortage/`},{title:`7 Explosive AI Updates in May 2026 That Every Founder Must Know - imfounder`,url:`https://imfounder.com/science-tech/ai/ai-updates-may-2026/`},{title:`Agentic AI News and AI Breakthroughs 2026 - Crescendo AI`,url:`https://www.crescendo.ai/news/latest-ai-news-and-updates`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`직접 공기 포집(DAC) 기술, 실험실 탈출…탄소 포집 비용 톤당 70달러로 급락`,
  metrics:[`DAC 탄소 포집 비용: 톤당 약 70달러 달성 (기존 수백 달러 대비 대폭 하락, 휴스턴대 연구)`,`페로브스카이트 태양전지 효율 25.4% 달성 (맨체스터대, 2026년 1월)`],
  summary:`대기 중에서 직접 이산화탄소를 흡수·제거하는 직접 공기 포집(DAC) 기술이 실용화 단계에 본격 진입하고 있다. 미국 휴스턴 대학교 연구팀이 전기화학 공정을 활용해 탄소 포집 비용을 톤당 약 70달러까지 낮추는 데 성공했으며 이는 기존 DAC 비용의 수분의 일 수준이다. MIT 테크놀로지 리뷰는 직접 공기 포집(DAC)을 2026년 10대 혁신 기술 중 하나로 선정하며 소듐이온 배터리·차세대 핵에너지와 함께 기후 기술의 3대 축으로 평가했다. 영국 맨체스터 대학교는 2026년 1월 효율 25.4%의 페로브스카이트 태양전지를 개발해 태양광 발전 효율 기록을 새로 썼다. 브라질 연구팀이 아마존 강 유역에서 탄소를 장기 저장하는 독특한 토양 구조인 테라 프레타를 재발견해 자연 기반 기후 해법 가능성도 주목받고 있다. 기후 기술 투자는 급격히 증가하고 있으며 여러 기술이 동시에 진전을 이루며 2030년 탄소 중립 목표 달성 가능성을 높이고 있다. DAC 기술을 대규모로 상용화하기 위해서는 에너지 공급과 자본 투자가 여전히 큰 과제로 남아 있다. 각국 정부와 기업이 기후 기술 투자를 늘리면서 실질적인 탄소 감축 성과가 조만간 가시화될 것이라는 기대가 높아지고 있다.`,
  keyTerms:[{term:`직접 공기 포집(DAC)`,explanation:`공장이나 발전소처럼 특정 배출원이 아닌 일반 대기 중에서 이산화탄소를 직접 빨아들여 포집하는 기술이다. 이미 배출된 탄소를 없앨 수 있어 탄소 중립을 넘어 탄소 네거티브 달성에 핵심적인 기술로 주목받고 있다.`}],
  history:`기후변화 대응을 위한 탄소 포집 기술은 수십 년 전부터 연구됐지만 비용이 너무 높아 상용화에 어려움이 있었다. 2015년 파리협정 이후 각국이 탄소 중립 목표를 선언하면서 DAC 기술 개발 투자가 급증했다. 아이슬란드 등 일부 국가에서는 소규모 DAC 플랜트가 이미 운영 중이다.`,
  players:`Climeworks·Carbon Engineering 등 스타트업이 DAC 상용화를 선도하고 있으며 마이크로소프트·구글 등 빅테크도 탄소 상쇄를 위해 DAC 기업과 계약을 맺고 있다. 미국 에너지부는 DAC 기술 개발에 수십억 달러를 지원하고 있다. 한국도 탄소 포집 기술 개발을 국가 기후 전략의 일환으로 추진 중이다.`,
  current:`톤당 70달러라는 비용 혁신은 DAC 기술의 경제성을 크게 개선해 본격적인 상용화의 문턱을 낮춘 것으로 평가된다. 페로브스카이트 태양전지 등 재생에너지 기술 발전도 DAC 운영에 필요한 에너지 비용을 줄이는 데 기여하고 있다.`,
  outlook:`2028년까지 여러 국가에서 대형 DAC 플랜트 건설이 완료될 예정이며 탄소 크레딧 시장과 연계해 경제성을 높이는 방안이 논의되고 있다. DAC와 재생에너지의 결합이 2030년대 기후 목표 달성의 핵심 기술 조합으로 부상할 것이다.`,
  sources:[{title:`Three climate technologies breaking through in 2026 - MIT Technology Review`,url:`https://www.technologyreview.com/2026/01/15/1131348/climate-technologies-2026/`},{title:`2026's Positive Environmental Breakthroughs and Eco-Innovations - Not For Sale`,url:`https://wearenotforsale.org/blog/positive-environmental-breakthroughs-2026/`},{title:`The Amazon Dark Earth Discovery - The Environmental Blog`,url:`https://www.theenvironmentalblog.org/2026/05/the-amazon-dark-earth-discovery-that-could-be-the-most-significant-climate-science-breakthrough-since-the-discovery-of-the-carbon-cycle/`}]
}]

  tag:`2026-05-18`,
  label:`2026년 5월 18일 (월요일)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`한국 1분기 GDP 3.6% 성장 호조, 한국은행 5월 금통위 기준금리 인상 시그널 부상`,
  metrics:[`1분기 실질 GDP 전년동기대비 +3.6%, 전기대비 +1.7% 성장`,`4월 소비자물가 전년동월대비 2.6% 상승 (전월比 0.4%p 확대)`],
  summary:`한국의 2026년 1분기 실질 국내총생산(GDP)이 전기대비 1.7%, 전년동기대비 3.6% 성장하며 양호한 흐름을 이어갔다. 4월 소비자물가도 전년동월대비 2.6%로 전월(2.2%)보다 0.4%p 높아지며 물가 압력이 재차 확대됐다. 이에 따라 한국은행이 5월 금융통화위원회에서 기준금리 인상 시그널을 내놓을 가능성이 높아졌다. 한국은행 부총재는 5월 금통위에서 기준금리 인상 가능성을 시사했으며, 시장에서는 2026년 말 기준금리가 2.75%까지 오를 것이라는 예상이 확산되고 있다. 기준금리 인상 기조가 현실화되면 주담대 등 가계부채 이자 부담이 늘어나고 부동산 시장에도 영향을 줄 수 있다. 수출 주도 경기 회복이 견조한 가운데 내수도 개선되는 모습이어서 한국은행의 정책 여력은 충분하다는 평가다. 그러나 미국 연준의 방향성이 불투명한 상황에서 한국이 먼저 인상에 나설 경우 환율과 자본 흐름에 변수가 생길 수 있다. 금융시장에서는 오는 5월 말 금통위 결과에 주목하고 있다.`,
  keyTerms:[{term:`기준금리 인상`,explanation:`중앙은행이 시중 금리의 기준이 되는 금리를 올리는 것이다. 금리가 오르면 대출 이자가 늘어나 소비와 투자가 줄어들고, 이를 통해 물가를 낮추는 효과가 있다. 이번 한국은행의 인상 시그널은 물가 상승 억제를 위한 선제적 조치로 해석된다.`}],
  history:`한국은행은 2021~2022년 가파른 물가 상승에 대응해 기준금리를 0.5%에서 3.5%까지 인상했다. 이후 경기 둔화 우려로 2024~2025년에는 인하 기조로 전환해 2.25% 수준까지 낮췄다. 그러나 2026년 들어 경기 회복세가 뚜렷해지고 물가가 재반등하면서 인상 논의가 다시 고개를 들고 있다. 이번 1분기 GDP 서프라이즈와 물가 재확대가 인상 명분을 강화하고 있다.`,
  players:`한국은행 금융통화위원회가 최종 결정 권한을 갖고 있으며, 총재와 부총재를 포함한 7인 위원회가 표결로 결정한다. 기획재정부는 경기 지원 입장에서 인상을 유보하기를 바라는 반면, 한국은행은 물가 안정 책무에 따라 독립적으로 판단한다. 시중 은행과 부동산 시장은 금리 결과에 민감하게 반응할 전망이다.`,
  current:`물가가 목표 수준(2%)을 다시 웃돌기 시작하고 GDP 성장률도 예상을 상회하면서 인상을 미룰 명분이 약해졌다. 5월 금통위가 사실상의 분수령이 될 전망이다.`,
  outlook:`5월 말 금통위 결과가 핵심 변수로, 인상 결정 시 연내 추가 인상 여부가 논의될 것으로 보인다. 미국 연준의 하반기 통화정책 방향과 원·달러 환율 흐름도 한국은행 결정에 영향을 미칠 것이다.`,
  sources:[{title:`한국은행 금통위 기준금리 인상 시그널 분석 - 대신증권`,url:`https://money2.daishin.com/PDF/Out/intranet_data/Product/ResearchCenter/Report/2026/05/57376_MMB_260506.pdf`},{title:`2026년 5월 한국 경제 동향 - 한국은행`,url:`https://www.bok.or.kr/portal/main/main.do`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미국 연준 8-4 분열 표결로 금리 동결, 연내 인하 기대 후퇴`,
  metrics:[`FOMC 금리 동결 표결 8 대 4 분열 (인하 지지 위원 4명)`,`S&P 500 연초 대비 +10.4%, 나스닥 +15.3% 상승 (2026년 4월 기준)`],
  summary:`미국 연방준비제도(Fed)가 연방공개시장위원회(FOMC) 회의에서 기준금리를 현행 수준으로 동결했으나, 8 대 4의 분열된 표결 결과가 나오며 향후 통화정책 불확실성이 고조됐다. 4명의 위원이 인하를 지지하며 이견을 공개적으로 드러낸 것은 이례적으로, 연준 내부에서 경기 하방 위험과 물가 상방 압력 사이의 견해 차이가 좁혀지지 않고 있음을 보여준다. 연방공개시장위원회(FOMC) 표결 분열은 시장의 금리 방향성 전망을 더욱 복잡하게 만들고 있다. 미국 국채 30년물 금리가 5%를 상회하며 재정 부담 우려를 키우는 한편, S&P 500과 나스닥은 연초 이후 두 자릿수 상승률을 기록하며 강세를 이어가고 있다. 메타 플랫폼스가 2026년 AI 자본지출 가이던스를 1,250억~1,450억 달러로 상향 조정하자 주가가 9% 급락하는 등 투자 심리는 복잡하게 흘러가고 있다. 연준의 연내 금리 인하 기대는 점차 하반기로 밀리고 있으며, 인플레이션이 목표치(2%)를 여전히 웃돌고 있어 조기 인하 가능성은 낮다는 분석이 우세하다. 재무부와 백악관이 금리 인하를 압박하고 있지만 파월 의장은 신중한 입장을 고수하고 있다. 시장은 다음 FOMC 성명과 하반기 물가 지표를 통해 전환 시점을 탐색하고 있다.`,
  keyTerms:[{term:`연방공개시장위원회(FOMC)`,explanation:`미국 연방준비제도(Fed)에서 금리를 결정하는 핵심 위원회다. 1년에 8번 회의를 열어 기준금리를 올릴지, 내릴지, 동결할지를 결정한다. 이번에는 8명이 동결, 4명이 인하 의견을 내며 위원들 사이의 견해 차이가 유독 크게 드러났다.`}],
  history:`연준은 2022~2023년 40년 만의 고물가에 맞서 기준금리를 0%에서 5.5%까지 끌어올렸다. 이후 2024년 하반기부터 인하 사이클에 진입해 2025년 초 일부 인하를 단행했으나, 재정 팽창과 관세 충격에 따른 물가 재상승 우려로 2026년 내내 동결 기조를 유지하고 있다. 인하 기대가 계속 뒤로 밀리며 시장 불확실성이 누적됐다.`,
  players:`제롬 파월 연준 의장이 위원회를 이끌며 중립적 신중론을 대변하고 있다. 인하를 지지한 4명의 위원들은 경기 둔화와 고용 약화를 근거로 전환을 주장하는 반면, 매파 위원들은 물가 불확실성을 이유로 동결 입장을 고수하고 있다. 재무부 및 백악관은 공개적으로 금리 인하를 압박하고 있다.`,
  current:`8 대 4 표결은 연준 내부 이견이 심화됐음을 보여주는 신호다. 물가가 완전히 잡히지 않은 상황에서 상당수 위원이 인하를 원하는 것은 금융 시장에 불안 요소가 되고 있다.`,
  outlook:`다음 FOMC 회의 결과와 6~7월 물가지표(CPI)가 관건이다. 물가가 2%를 향해 꺾인다면 9월 인하 가능성이 열리고, 반대로 물가가 다시 오르면 동결 기간이 더 길어질 수 있다.`,
  sources:[{title:`May 2026 Economic and Market Update - Crestwood Advisors`,url:`https://www.crestwoodadvisors.com/may-2026-economic-and-market-update/`},{title:`Global Economic Outlook May 2026 - Otet Markets`,url:`https://otetmarkets.com/blog/otet-view/global-economic-outlook-may-2026-inflation/`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`호주중앙은행, 기준금리 4.35%로 3연속 인상...글로벌 통화 긴축 기조 재확인`,
  metrics:[`호주중앙은행(RBA) 기준금리 0.25%p 인상, 4.35%로 결정 (2026년 세 번째 연속 인상)`,`8 대 1 압도적 표결 통과...통화 긴축 의지 재확인`],
  summary:`호주중앙은행(RBA)이 기준금리를 0.25%p 인상해 4.35%로 결정하며 2026년 들어 세 번째 연속 금리 인상을 단행했다. 8 대 1의 압도적 표결로 통과된 이번 결정은 호주의 물가 압력이 여전히 강하게 남아있음을 보여준다. 호주는 주택 가격 급등, 임금 상승, 서비스 물가 고착화 등 복합적인 인플레이션 요인에 직면해 있으며, 중앙은행은 강력한 통화 긴축 기조를 통해 이를 억제하겠다는 의지를 재확인했다. 미국 연준과 유럽중앙은행(ECB)이 동결 기조를 이어가는 상황에서 호주의 독자적 인상 행보는 글로벌 통화정책 분화를 보여주는 사례로 주목받고 있다. RBA의 연속 인상으로 호주 달러화 가치가 강세를 보이는 한편, 주택담보대출 금리 상승으로 소비자들의 이자 부담도 가중되고 있다. 호주 GDP 성장률은 다소 둔화될 것으로 예상되지만 중앙은행은 물가 안정을 최우선 과제로 삼고 있다. 선진국 전반적으로 통화 정책 결정이 엇갈리면서 국가별 물가 및 경기 상황에 따라 중앙은행들의 행보가 갈리는 양상이 뚜렷해지고 있다. 이는 글로벌 자본 이동과 환율 변동성을 높이는 요인으로 작용할 수 있다.`,
  keyTerms:[{term:`통화 긴축`,explanation:`중앙은행이 금리를 올려 시중에 돈이 덜 풀리게 하는 정책이다. 물가가 너무 오를 때 사용하며, 대출을 줄이고 소비를 억제해 경기를 식히는 효과가 있다. 호주는 2026년에만 세 번 금리를 올리며 강한 통화 긴축을 이어가고 있다.`}],
  history:`호주중앙은행은 코로나19 이후 경기 부양을 위해 금리를 거의 제로 수준까지 낮췄다. 이후 2022~2023년 전 세계적인 인플레이션 물결에 맞서 대규모 인상을 단행했다. 2025년 잠깐의 동결 기간을 거쳐 2026년 초 다시 인상 사이클에 재진입했다.`,
  players:`호주중앙은행 총재가 이끄는 통화정책위원회가 결정권을 갖는다. 호주 정부는 생계비 압박을 겪는 국민을 위해 금리 인상 속도 조절을 바라지만, 중앙은행은 독립성을 유지하고 있다. 해외 투자자와 외환 시장은 RBA의 행보에 민감하게 반응한다.`,
  current:`미국·유럽이 금리를 동결하는 가운데 호주가 홀로 인상을 지속하면서 글로벌 통화정책 분화가 가속화되고 있다. 이는 호주 달러 강세와 신흥국 자본 흐름에 영향을 미칠 수 있는 변수다.`,
  outlook:`RBA의 추가 인상 여부는 2분기 물가 지표와 임금 협상 결과에 달려 있다. 다음 금리 결정 회의에서 동결로 전환할 가능성도 열려 있지만, 물가가 다시 오른다면 4번째 인상도 배제할 수 없다.`,
  sources:[{title:`Global Economic Outlook May 2026: Growth Holds Amid Inflation and Oil Risks - Otet Markets`,url:`https://otetmarkets.com/blog/otet-view/global-economic-outlook-may-2026-inflation/`},{title:`May 2026 Economic and Market Update - Crestwood Advisors`,url:`https://www.crestwoodadvisors.com/may-2026-economic-and-market-update/`}]

  colorBg:`#fce8e6`,
  headline:`우크라이나, 556기 드론으로 러시아 역대 최대 공격...모스크바 인근 포함 최소 4명 사망`,
  metrics:[`러시아 방공망 격추 드론 수 556기 (역대 최대 규모 단일 공격)`,`모스크바 인근 3명 포함 최소 4명 사망, 12명 이상 부상`],
  summary:`우크라이나가 17일(현지 시각) 밤사이 러시아 전역을 향해 500기 이상의 무인기를 발사하는 대규모 드론 공격을 감행했다. 러시아 국방부는 자국 방공망이 556기의 드론을 격추했다고 밝혔으며, CNN은 이번 공격이 전쟁 발발 이후 단일 공격 기준 역대 최대 규모 중 하나라고 보도했다. 모스크바 인근에서 3명을 포함해 최소 4명이 숨지고 12명 이상이 부상을 입었으며, 여러 지역에서 화재와 폭발이 발생했다. 젤렌스키 우크라이나 대통령은 이번 드론 공격이 완전히 정당하다며 러시아의 민간인 공격에 대한 보복이라고 강조했다. 직전에는 러시아가 이틀간 1,560기 이상의 드론을 우크라이나에 발사하며 전쟁 발발 이후 최대 규모의 항공 공격을 가한 바 있다. 이번 공격으로 4년째 이어지는 러·우 전쟁이 또다시 극단적인 긴장 고조 국면에 접어들었다. 미국과 유럽은 우크라이나에 대한 지속적인 지원 의지를 밝히고 있지만 명확한 휴전 협상 진전은 없는 상황이다. 러시아는 추가 보복 공격을 예고하며 양측의 드론 전쟁이 더욱 격화될 것임을 시사했다.`,
  keyTerms:[{term:`드론 공격`,explanation:`폭탄을 탑재한 무인 비행체(드론)를 원격으로 조종해 적의 목표물을 타격하는 방식이다. 비용이 저렴하고 아군 인명 피해 없이 운용이 가능해 최근 전쟁에서 핵심 무기로 부상했다. 우크라이나와 러시아는 서로를 향해 드론 공격을 대규모로 주고받으며 전쟁의 양상을 바꾸고 있다.`}],
  history:`러시아는 2022년 2월 우크라이나를 전면 침공하며 4년 넘게 전쟁을 이어오고 있다. 초기에는 지상전이 중심이었으나 2023년부터 양측 모두 드론 생산과 활용을 급격히 늘리며 장거리 드론 공격이 전쟁의 새로운 양상이 됐다. 우크라이나는 러시아 후방 깊숙이 드론을 침투시키는 능력을 꾸준히 발전시켜 왔다.`,
  players:`우크라이나는 젤렌스키 대통령 지휘하에 서방의 지원을 받아 저항을 계속하고 있다. 러시아는 푸틴 대통령이 주도하며 우크라이나 인프라와 수도 키이우를 집중 공격하고 있다. 미국·유럽·NATO의 무기와 재정 지원이 우크라이나 전쟁 지속 능력의 핵심이다.`,
  current:`러시아의 역대 최대 항공 공격에 우크라이나가 역사상 최대 규모의 드론 반격으로 응수하는 극단적 보복 사이클이 형성되고 있다. 평화 협상 가능성은 사실상 멀어진 상황이다.`,
  outlook:`러시아의 추가 보복 공격이 예상되며, 우크라이나의 방공 역량 강화 여부가 관건이다. 미국과 유럽의 대우크라이나 무기 지원 결정이 전쟁의 향방을 좌우할 주요 변수로 남아있다.`,
  sources:[{title:`Ukraine conducts large-scale drone strikes on Russia, killing 4 - NPR`,url:`https://www.npr.org/2026/05/17/nx-s1-5824987/ukrainian-drone-strikes-on-russia-kill-4-moscow`},{title:`Ukraine attack largest in over a year on Moscow - CNN`,url:`https://www.cnn.com/2026/05/17/europe/russia-ukraine-moscow-attack-intl-hnk`},{title:`One of Ukraine's largest drone attacks kills 3 in Moscow area - Euronews`,url:`https://www.euronews.com/my-europe/2026/05/17/largest-ukrainian-drone-attack-since-invasion-kills-3-in-moscow-area-russia-says`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미국-이란 휴전 협상 교착...트럼프, 이란의 역제안 일축하며 전면전 재개 검토`,
  metrics:[`우라늄 농축 중단 기간: 미국 20년 요구 vs 이란 5년 제시 (합의 공백 15년)`,`4월 8일 체결 휴전 협정, 5월 4일 이후 간헐적 전투로 사실상 교착`],
  summary:`미국과 이란 간의 휴전 협상이 우라늄 농축 중단 기간이라는 핵심 쟁점에서 팽팽한 대립을 이어가며 교착 상태에 빠졌다. 미국은 최소 20년간의 농축 중단을 요구하는 반면 이란은 5년을 제안하고 있어 양측 간 합의 공백이 15년에 달한다. 트럼프 대통령은 이란의 역제안을 전적으로 수용 불가능하다고 일축했으며, 측근들은 그가 전면적인 군사 작전 재개를 그 어느 때보다 진지하게 검토 중이라고 전했다. 4월 8일 체결된 휴전 협정은 명목상 유지되고 있지만 5월 4일 이후 산발적인 충돌이 이어지며 협정의 실효성이 흔들리고 있다. 미국이 이란 항구에 대한 봉쇄를 강화하는 가운데 이란은 호르무즈 해협 봉쇄 위협으로 맞서고 있어 긴장이 고조되고 있다. 협상은 파키스탄의 중재로 이어지고 있으며, 핵·미사일 프로그램, 호르무즈 해협 항행 자유, 제재 완화, 재건 지원 등이 의제에 포함돼 있다. 중국 시진핑 주석이 트럼프와의 베이징 회담에서 이란 전쟁 종식 중재 의사를 밝힌 것이 새로운 외교 변수로 등장하고 있다. 협상 결렬 시 중동 전체가 또 다른 전면전에 휘말릴 위험이 현실적으로 제기되고 있다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`페르시아만과 오만만을 잇는 좁은 해협으로, 전 세계 석유 수출량의 약 20%가 이곳을 통과한다. 이란이 호르무즈 해협을 봉쇄한다고 위협하면 글로벌 석유 공급이 타격을 받아 유가가 급등할 수 있다. 이번 미-이란 협상에서도 항행 자유 문제가 핵심 의제 중 하나다.`}],
  history:`미국과 이스라엘은 2026년 초 이란의 핵 시설을 겨냥한 군사 작전을 개시했고, 이란은 보복 공격으로 맞섰다. 수십 년간 이어온 핵 갈등이 결국 실제 군사 충돌로 비화한 것이다. 4월 8일 임시 휴전이 성립됐지만 우라늄 농축 문제를 비롯한 근본적 쟁점은 미해결 상태로 남아있다.`,
  players:`미국 측에서는 스티브 위트코프와 재러드 쿠슈너가 협상을 주도하고 있다. 이란은 최고 지도자 하메네이의 지도하에 핵 주권을 포기하지 않겠다는 강경 입장을 견지하고 있다. 파키스탄이 중재자 역할을 하고 있으며, 중국도 중재 역할을 자처하고 나선 상황이다.`,
  current:`트럼프 대통령이 이란의 역제안을 일축하고 전면전 재개를 검토하기 시작하면서 협상이 벼랑 끝까지 몰렸다. 이란 측도 미국이 비합리적 요구를 하고 있다고 맞받아치며 협상은 최대 고비를 맞고 있다.`,
  outlook:`파키스탄과 중국의 중재 결과와 트럼프의 최종 결단이 핵심 변수다. 협상이 결렬될 경우 호르무즈 해협 봉쇄 여부가 글로벌 에너지 공급에 직격탄이 될 수 있다.`,
  sources:[{title:`US-Iran ceasefire and nuclear talks in 2026 - House of Commons Library`,url:`https://commonslibrary.parliament.uk/research-briefings/cbp-10637/`},{title:`Trump says ceasefire with Iran on massive life support - CNN`,url:`https://www.cnn.com/2026/05/11/world/live-news/iran-war-proposal-trump`}]

  category:`정치`,

  colorBg:`#fce8e6`,
  headline:`5·18 민주화운동 46주년 기념식, 여야 광주 집결...6·3 지방선거 D-17`,
  metrics:[`이재명 대통령 국정 지지율 61% (한국갤럽 최근 조사)`,`6·3 지방선거 D-17, 영남 격전지 여야 후보 오차범위 내 초접전`],
  summary:`18일 제46주년 5·18 민주화운동 기념식이 광주 5·18민주광장에서 열렸으며, 여야 지도부가 나란히 광주를 찾아 기념에 동참했다. 더불어민주당 정청래 대표와 국민의힘 장동혁 대표가 국립 5·18민주묘지를 참배하고 기념식에 참석하는 등 정치권 전체가 5·18 민주화운동을 기리는 행사에 나섰다. 이날 기념식은 6·3 지방선거를 17일 앞두고 열려 정치적 상징성이 더욱 부각됐다. 선거를 앞두고 민주당은 호남 지역 전통 지지 기반을 다지는 한편, 국민의힘은 역사적 화해를 내세우며 호남 민심에 다가서려는 행보를 보였다. 이재명 대통령의 국정 지지율은 한국갤럽 조사에서 61%를 기록하며 취임 후 안정적인 흐름을 이어가고 있다. 6·3 지방선거에서는 대구·경남 등 영남 지역에서도 여야 후보 간 오차범위 내 초접전이 펼쳐지고 있어 결과를 예측하기 어려운 상황이다. 이번 지방선거는 이재명 정부 출범 이후 첫 전국 단위 선거로 사실상 중간평가 성격을 갖는다. 양측 모두 5·18 기념식을 기점으로 선거 막바지 총력전에 돌입할 예정이다.`,
  keyTerms:[{term:`5·18 민주화운동`,explanation:`1980년 5월 18일부터 27일까지 광주에서 군사 독재에 맞서 시민들이 민주주의를 요구하며 일어난 항쟁이다. 계엄군의 강경 진압 과정에서 수백 명이 희생됐으며, 이후 한국 민주화의 상징이 됐다. 매년 5월 18일에는 국가 기념식이 열리며, 정치권에서도 중요한 의미를 지닌다.`}],
  history:`1980년 5월 18일, 전두환 신군부의 쿠데타에 맞서 광주 시민들이 민주화를 요구하며 봉기했다. 계엄군이 강경 진압에 나서며 수백 명이 희생됐고, 이 사건은 1997년 국가 기념일로 지정됐다. 이후 피해자 보상과 기념 사업이 이어졌으나 역사 인식을 둘러싼 논쟁은 지금도 계속되고 있다.`,
  players:`더불어민주당은 5·18 정신을 당의 핵심 가치로 강조하는 반면, 국민의힘은 역사적 화해와 국민 통합을 내세우고 있다. 이재명 대통령은 민주 열사들의 희생을 기리는 입장을 표명했다. 5·18 관련 단체들과 광주 시민들은 역사 왜곡 시도에 대해 강한 반발을 지속적으로 표명하고 있다.`,
  current:`6·3 지방선거를 17일 앞두고 열린 올해 기념식은 전국 단위 민심 가늠자로 작용하고 있다. 특히 영남 지역 격전지에서 여야의 판세가 좁혀지면서 선거 결과에 이목이 집중되고 있다.`,
  outlook:`6월 3일 지방선거 결과가 이재명 정부의 중간 성적표로 해석될 전망이다. 선거 결과에 따라 하반기 국정 운영 기조와 여야 정치 구도에도 상당한 영향이 있을 것으로 보인다.`,
  sources:[{title:`여도 야도 광주 집결...5·18 기념식 여야 나란히 참석 - 서울신문`,url:`https://www.seoul.co.kr/news/politics/local-election2026/2026/05/18/20260518008001`},{title:`제9회 전국동시지방선거 현황 - 나무위키`,url:`https://namu.wiki/w/%EC%A0%9C9%ED%9A%8C%20%EC%A0%84%EA%B5%AD%EB%8F%99%EC%8B%9C%EC%A7%80%EB%B0%A9%EC%84%A0%EA%B1%B0`},{title:`오늘의 정치일정 5월 18일 - 뉴스핌`,url:`https://www.newspim.com/news/view/20260517000231`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`Anthropic 연환산 매출 300억 달러로 OpenAI 첫 추월...AI 기업 권력 판도 급변`,
  metrics:[`Anthropic 연환산 매출(ARR) 300억 달러 달성 (OpenAI 240억 달러 첫 추월)`,`AI 기업 배포 격차 해소 목적 투자 55억 달러 이상 집중 유입`],
  summary:`AI 스타트업 Anthropic의 연환산 매출(ARR)이 300억 달러에 달하며 처음으로 OpenAI(240억 달러)를 추월하는 기록을 세웠다. 이는 생성 AI 시장에서 절대 강자로 군림하던 OpenAI의 지위를 Anthropic이 매출 기준으로 역전한 역사적인 이정표다. Anthropic의 고성능 AI 모델 클로드(Claude) 시리즈가 기업 고객들 사이에서 빠르게 채택되면서 B2B 매출이 급증한 것이 주요 원인이다. 기업들의 AI 배포 격차를 해소하는 데 총 55억 달러 이상의 투자가 집중되고 있으며, Anthropic이 이 흐름의 최대 수혜자가 되고 있다. Anthropic은 자율 AI 에이전트가 과거 행동을 검토하고 스스로 개선하는 드리밍(dreaming) 기술도 새롭게 공개해 에이전틱 AI 분야에서도 혁신을 이끌고 있다. 반면 OpenAI는 노보 노디스크 등 대형 파트너와의 전략적 제휴를 통해 기업 고객 확보에 총력을 기울이고 있다. Airbnb가 신규 코드의 60%를 AI로 작성한다고 밝히는 등 소프트웨어 개발 분야에서도 AI 도입이 빠르게 확산되고 있다. AI 생태계가 단일 강자 체제에서 치열한 경쟁 구도로 전환되면서 기업들의 AI 플랫폼 선택 전략도 복잡해지고 있다.`,
  keyTerms:[{term:`연환산 매출(ARR)`,explanation:`연간 반복 매출(Annual Recurring Revenue)의 약자로, 한 달 매출을 12배 곱해 1년 단위로 환산한 수치다. 구독이나 장기 계약 위주 기업에서 성장 속도를 가늠하는 핵심 지표로 활용된다. Anthropic의 연환산 매출(ARR) 300억 달러 달성은 AI 기업 중 유례없이 빠른 성장을 보여준다.`}],
  history:`Anthropic은 2021년 OpenAI 출신 연구자들이 안전한 AI 개발을 목표로 설립했다. GPT 시리즈로 시장을 선도해온 OpenAI에 비해 후발 주자였으나, 클로드 모델 시리즈의 연이은 성공과 아마존·구글의 대규모 투자를 바탕으로 빠르게 성장했다. 2025~2026년 클로드 시리즈의 성능이 크게 개선되며 기업 시장에서의 입지가 굳어졌다.`,
  players:`Anthropic의 CEO 다리오 아모데이가 안전성과 기업 AI 솔루션을 앞세워 시장을 공략하고 있다. OpenAI의 샘 알트만은 기업 파트너십 확대와 소비자 제품 강화로 맞서고 있다. 구글과 아마존은 Anthropic에, 마이크로소프트는 OpenAI에 각각 대규모 투자를 집행하며 빅테크 간 AI 생태계 전쟁이 벌어지고 있다.`,
  current:`ARR 역전은 단순 매출 역전을 넘어 기업 AI 시장에서 Anthropic의 입지가 확고해지고 있음을 의미한다. 이 흐름이 이어진다면 글로벌 AI 생태계의 주도권 구도에 지각변동이 예상된다.`,
  outlook:`하반기 새로운 AI 모델 출시와 기업 계약 확보 경쟁이 더욱 격화될 전망이다. OpenAI의 기업공개(IPO) 추진 여부와 Anthropic의 추가 투자 유치 규모도 업계 판도를 가를 핵심 변수다.`,
  sources:[{title:`7 Explosive AI Updates in May 2026 - imfounder`,url:`https://imfounder.com/science-tech/ai/ai-updates-may-2026/`},{title:`Agentic AI News and AI Breakthroughs 2026 - Crescendo AI`,url:`https://www.crescendo.ai/news/latest-ai-news-and-updates`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`삼성·SK하이닉스, HBM 주도권 강화...글로벌 반도체 시장 1조 달러 돌파 전망`,
  metrics:[`2026년 글로벌 반도체 장비 시장 1,430억 달러 (전년比 +12% 성장 전망)`,`2세대 MRDIMM 속도 최대 1만 2,800MT/s...전 세대比 약 45% 향상`],
  summary:`인공지능(AI) 수요 폭증에 힘입어 한국의 삼성전자와 SK하이닉스가 HBM(고대역폭 메모리) 시장에서 세계 주도권을 더욱 굳히고 있다. 카운터포인트 리서치에 따르면 2026년 글로벌 반도체 장비 시장은 전년 대비 12% 성장한 1,430억 달러에 달할 것으로 전망된다. 전체 반도체 시장 매출은 1조 달러를 돌파할 것으로 예상되며, AI 인프라 확대가 이른바 반도체 슈퍼사이클을 이끄는 핵심 동력이 되고 있다. HBM은 엔비디아·AMD 등 글로벌 AI 칩 기업들의 가속기에 필수로 탑재되는 고성능 메모리로, 삼성전자와 SK하이닉스가 글로벌 시장의 대부분을 점유하고 있다. 차세대 서버용 D램 모듈 규격인 2세대 MRDIMM의 JEDEC 표준 확정이 임박하면서 한국 기업들의 차세대 메모리 제품 출시도 가속화될 전망이다. 한국 정부도 AI 반도체를 국가 전략 산업으로 지정하고 실증·상용화 지원을 대폭 확대하는 방침을 추진 중이다. 미국과 중국 간 반도체 수출 규제 갈등이 공급망 불안 요소로 남아있지만, 한국 반도체 산업은 AI 시대의 최대 수혜 섹터로 자리매김하고 있다. 삼성전자 노사는 18일 중앙노동위원회 추가 조정을 앞두고 있어 협상 결과에도 관심이 쏠리고 있다.`,
  keyTerms:[{term:`HBM`,explanation:`고대역폭 메모리(High Bandwidth Memory)의 약자로, AI 연산에 특화된 고성능 반도체 메모리다. 일반 D램보다 훨씬 빠르게 대용량 데이터를 처리할 수 있어 엔비디아의 AI 가속기(GPU)에 필수로 탑재된다. 삼성전자와 SK하이닉스 등 한국 기업이 세계 HBM 생산의 대부분을 담당하고 있다.`}],
  history:`한국은 1990년대부터 D램과 낸드플래시 메모리 분야에서 세계 시장을 석권해왔다. AI 붐 이전에도 삼성전자와 SK하이닉스는 글로벌 메모리 반도체 시장 1·2위를 유지해왔다. 2023년부터 AI 가속기용 HBM 수요가 급증하면서 한국 반도체 기업들의 입지가 더욱 강화됐다.`,
  players:`삼성전자와 SK하이닉스가 HBM 시장의 핵심 공급자로, 엔비디아·AMD 등 AI 칩 기업들이 주요 고객이다. 미국 마이크론도 HBM 시장 진입에 나서고 있지만 아직 한국 기업들에 비해 점유율이 낮다. 한국 정부는 반도체 클러스터 조성과 세제 지원으로 이 흐름을 뒷받침하고 있다.`,
  current:`2026년은 AI 인프라 투자가 본격화되면서 HBM 수요가 폭발적으로 늘어나는 시점과 맞물려 있다. 한국 기업들의 HBM3E 등 차세대 제품 출시가 경쟁 우위를 더욱 공고히 하고 있다.`,
  outlook:`차세대 HBM4 규격 개발과 MRDIMM 2세대 표준화 완료가 다음 도약의 기폭제가 될 전망이다. 미국의 대중국 반도체 수출 규제 갈등이 공급망 불안 요소로 계속 작용할 것으로 보인다.`,
  sources:[{title:`AI 인프라 확대로 반도체 슈퍼사이클 지속 - 얼리어답터뉴스`,url:`https://eanews.kr/news/949690`},{title:`AI 붐이 만든 1조 달러 시대, 2026년 반도체 시장 폭발적 성장 - EPNC`,url:`https://www.epnc.co.kr/news/articleView.html?idxno=400056`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`IEA, 2026년 2분기 글로벌 석유 수요 150만 배럴 하향...코로나 이후 최대 감소 전망`,
  metrics:[`IEA 2026년 2분기 글로벌 석유 수요 전망 하루 약 150만 배럴 하향 조정`,`코로나19 팬데믹 이후 최대 단일 분기 수요 하향 폭 기록`],
  summary:`국제에너지기구(IEA)가 2026년 2분기 글로벌 석유 수요 전망을 하루 약 150만 배럴 하향 조정했으며, 이는 코로나19 팬데믹 이후 가장 큰 폭의 하향 수정이다. IEA는 글로벌 경기 성장 둔화, 전기차 보급 확대, 에너지 효율 개선 등이 석유 수요 증가를 억제하는 구조적 요인으로 자리 잡고 있다고 분석했다. 이번 석유 수요 전망 하향은 중동 긴장 고조와 호르무즈 해협 불안 속에서 나온 것이어서 에너지 시장에 혼재된 신호를 보내고 있다. 공급 측면에서는 OPEC+ 감산 기조가 유지되고 있지만, 수요 전망 하락이 유가 상단을 제한하는 요인으로 작용하고 있다. 전기차 판매 급증과 에너지 효율화 정책의 가속화가 선진국을 중심으로 석유 수요 정점(peak) 논의를 앞당기고 있다. 아시아·태평양 지역의 수요는 여전히 성장세를 보이고 있으나 증가 폭이 예상보다 둔화된 것도 하향 조정의 배경이 됐다. 이란-미국 전쟁 위협이 지속되는 상황에서 공급 차질 리스크와 수요 하락이 교차하며 국제 원유 시장의 불확실성이 커지고 있다. 에너지 전환 속도가 예상보다 빨라지면서 화석연료 의존도 감소가 장기 트렌드로 굳어지고 있다는 분석도 나온다.`,
  keyTerms:[{term:`석유 수요 전망 하향`,explanation:`국제에너지기구(IEA) 같은 기관이 앞으로 석유를 얼마나 쓸 것인지 예측치를 낮추는 것이다. 수요가 줄 것으로 보이면 석유 가격도 내려가는 경향이 있다. 이번 석유 수요 전망 하향 조정은 전기차 보급과 경기 둔화 등으로 석유 소비가 예상보다 빠르게 줄고 있음을 보여준다.`}],
  history:`코로나19 이후 석유 수요가 V자 반등하며 2022~2023년 수요 호황기가 이어졌다. 그러나 2024년부터 전기차 전환 가속화와 에너지 효율 개선이 수요 증가세를 꺾기 시작했다. IEA는 수년 전부터 글로벌 석유 수요가 2030년 이전에 정점을 찍을 가능성을 경고해왔다.`,
  players:`IEA는 선진국 에너지 협력 기구로 객관적 에너지 데이터와 전망을 제공하는 핵심 기관이다. OPEC+(사우디아라비아, 러시아 등 산유국 연합)는 IEA 전망과 달리 감산으로 유가를 지지하려 한다. 전기차 제조사들과 재생에너지 기업들은 화석연료 수요 감소의 직접 수혜자다.`,
  current:`이란-미국 긴장 고조와 글로벌 수요 감소라는 두 요인이 에너지 시장에 상충되는 신호를 보내고 있다. 공급 충격 리스크는 있지만 수요 감소 전망이 유가 급등을 억제하는 구조다.`,
  outlook:`하반기 IEA의 연간 전망 보고서에서 2030년 이전 수요 정점 시나리오가 어떻게 제시될지 주목된다. 이란과 미국의 협상 결과가 중동 원유 공급 안정성에도 큰 영향을 미칠 것이다.`,
  sources:[{title:`Global Economic Outlook May 2026: Growth Holds Amid Inflation and Oil Risks - Otet Markets`,url:`https://otetmarkets.com/blog/otet-view/global-economic-outlook-may-2026-inflation/`},{title:`Global Trade Update May 2026 - UNCTAD`,url:`https://unctad.org/publication/global-trade-update-may-2026-invisible-barriers-costs-non-tariff-measures`}]
}]

  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`원달러 환율, 미·이란 전쟁 장기화 여파로 4월 이후 재차 1500원대 돌파`,
  metrics:[`서울 외환시장 장중 1500원 20전 돌파, 4월 7일 이후 첫 재돌파`,`원화 최근 12개월간 6.79% 절하, 2009년 이후 최약세 수준`],
  summary:`17일 서울 외환시장에서 달러 대비 원화 환율이 장중 1500원 20전을 기록하며, 4월 7일 이후 처음으로 1500원 선을 다시 넘어섰다. 미·이란 전쟁 장기화에 따른 글로벌 인플레이션 우려와 미 연방준비제도의 금리 동결 기조가 달러 강세를 이끌고 있다. 이로 인해 수입 원자재와 에너지 가격이 오르고 국내 소비자 물가 상승 압력이 커지고 있다. 2025년부터 이어진 고환율 사태는 수출기업의 환차익을 늘렸지만 원자재 수입 비용과 가계 부담도 동시에 키우는 양면성을 보이고 있다. 정부는 고유가 피해지원금 2차 신청을 5월 18일부터 접수하며 민생 안정에 나서고 있다. 한국은행은 급격한 환율 변동에 대한 시장 개입 가능성을 열어두고 있으나 명확한 방어선은 제시하지 않고 있다. 전문가들은 이란 전쟁이 해결되지 않는 한 원화 약세 기조가 당분간 지속될 것이라고 전망한다.`,
  keyTerms:[{term:`고환율 사태`,explanation:`환율이 급격히 오르면서 원화 가치가 크게 떨어지는 상황을 말한다. 달러로 물건을 사야 하는 수입업체와 가계의 부담이 늘고, 국내 물가도 따라 오르는 부작용이 생긴다.`}],
  history:`2025~2026년 원화 약세는 2024년 하반기 국내 정치 불안과 미 연준의 고금리 기조가 겹치면서 시작됐다. 2026년 2월 미·이란 전쟁이 발발하면서 유가가 급등하자 원화 약세가 더욱 가팔라졌다. 3월에는 1530원을 기록하며 2009년 금융위기 이후 17년 만의 최고치를 찍었다. 4월 들어 일시 안정됐으나 5월 들어 재상승 압력이 다시 강해지고 있다.`,
  players:`한국은행은 외환시장 급변동을 억제하기 위해 스무딩 오퍼레이션을 간헐적으로 실시하고 있다. 기획재정부는 수입업체 지원 방안과 외환시장 모니터링을 강화했다. 미 연방준비제도는 기준금리 3.5~3.75% 동결을 유지하며 달러 강세를 지지하고 있다. 미·이란 전쟁의 교착이 글로벌 위험 회피 심리를 자극하며 원화 약세에 간접적으로 영향을 주고 있다.`,
  current:`5월 17일 환율이 재차 1500원을 넘어서면서 4월 이후 제한됐던 상승 압력이 다시 강화되고 있다. 미국의 4월 소비자물가가 예상보다 높게 나와 달러 강세와 원화 약세 흐름이 당분간 이어질 가능성이 높다.`,
  outlook:`호르무즈 해협 봉쇄 해소 여부와 이란 전쟁 협상 결과가 환율 향방을 가를 핵심 변수다. 6월 미 연방공개시장위원회 회의에서의 금리 신호가 원화 흐름에 영향을 줄 것이다.`,
  sources:[{title:`2025-2026년 원화 고환율 사태 - 나무위키`,url:`https://namu.wiki/w/2025-2026%EB%85%84%20%EC%9B%90%ED%99%94%20%EA%B3%A0%ED%99%98%EC%9C%A8%20%EC%82%AC%ED%83%9C`},{title:`대한민국 원 환율 현황 - TradingEconomics`,url:`https://ko.tradingeconomics.com/south-korea/currency`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미국 10년물 국채금리 4.6% 돌파, 인플레이션 재점화로 연준 금리 인하 기대 사실상 소멸`,
  metrics:[`미국 10년물 국채금리 4.595%, 30년물 5.121% 기록 (1년 만에 최고)`,`미국 4월 소비자물가지수 전년 대비 3.8% 상승, 2023년 5월 이후 최고치`],
  summary:`미국 재무부 10년물 국채금리가 4.595%까지 치솟으며 약 1년 만에 최고 수준을 기록했다. 30년물 금리도 5.121%에 달해 인플레이션 압력이 장기화되고 있음을 시장이 반영하고 있다. 4월 미국 소비자물가지수가 전년 대비 3.8%로 2023년 5월 이후 최고치를 기록하면서, 연방준비제도의 금리 인하 기대가 사실상 사라졌다. 트럼프 행정부의 고율 관세 정책과 미·이란 전쟁에 따른 에너지 가격 상승이 인플레이션을 자극하고 있다는 분석이다. CME 페드워치에 따르면 올해 국채금리 인하 가능성은 거의 0%에 가까워졌으며, 12월 금리 인상 가능성은 25%까지 상승했다. 국채금리 급등은 글로벌 증시와 귀금속 시장에도 충격을 줬는데, 금값이 2% 하락하고 은 가격은 6.5% 급락했다. 주식·채권·귀금속이 동반 하락하는 이례적 흐름은 시장의 인플레이션 공포를 여실히 보여준다.`,
  keyTerms:[{term:`국채금리`,explanation:`정부가 돈을 빌리면서 지급하는 이자율을 말한다. 국채금리가 오르면 기업과 가계의 대출 이자도 따라 오르고, 주식·부동산 등 위험 자산의 가치가 떨어지는 경향이 있다. 이번 급등은 인플레이션이 쉽게 잡히지 않을 것이라는 시장의 우려를 반영한다.`}],
  history:`미 연준은 2022~2023년 공격적 금리 인상으로 인플레이션을 어느 정도 잡았고, 2024년부터 점진적으로 금리를 내렸다. 그러나 트럼프 2기 출범 이후 대규모 관세 부과와 미·이란 전쟁 발발로 유가가 다시 급등하며 인플레이션이 재점화됐다. 2026년 초 취임한 새 연준 의장 케빈 워시는 신중한 통화정책 기조를 유지하고 있다.`,
  players:`미 연방준비제도는 기준금리를 3.5~3.75%로 유지 중이며 연내 인하 가능성이 사실상 사라졌다. 트럼프 행정부의 관세 정책과 이란 전쟁이 물가 상승의 이중 압력을 만들고 있다. 글로벌 채권 투자자들은 인플레이션 지속을 반영해 국채를 팔면서 금리가 오르는 악순환이 나타나고 있다.`,
  current:`5월 15일 예상보다 강한 인플레이션 지표가 발표되면서 국채금리가 가파르게 치솟았다. 주식·채권·귀금속 전 자산군의 동반 매도세는 시장 전반의 불안 심리가 극도로 높아졌음을 보여준다.`,
  outlook:`6월 FOMC 회의에서 연준의 추가 금리 방향에 대한 신호가 나올 예정이다. 이란 전쟁 종결 여부와 5월 이후 소비자물가 추이가 하반기 금리 경로를 결정할 핵심 변수가 될 것이다.`,
  sources:[{title:`Treasury yields surge as inflation data points to tricky rates path - CNBC`,url:`https://www.cnbc.com/2026/05/15/treasury-yields-surge-as-inflation-data-points-to-tricky-rates-path.html`},{title:`Bonds, stocks and precious metals slump as inflation fears mount - CNBC`,url:`https://www.cnbc.com/2026/05/15/global-markets-stocks-bonds-silver-gold-trump-inflation.html`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`트럼프·시진핑 베이징 정상회담, 미중 무역투자위원회 신설·보잉 200대 구매 합의`,
  metrics:[`미국의 대중국 평균 관세율 47.5%, 트럼프 1기 이전 3.1% 대비 급등`,`중국, 보잉 상업용 항공기 200대 구매 합의 (2017년 이후 첫 미국산 항공기 구매)`],
  summary:`5월 14~15일 베이징 인민대회당에서 열린 트럼프·시진핑 정상회담에서 미국과 중국은 무역투자위원회를 신설하고, 특정 품목에 대한 관세를 상호 인하하는 방안에 원칙적으로 합의했다. 중국은 2017년 이후 처음으로 미국산 보잉 항공기 200대 구매에 동의했으며, 미국산 농산물과 에너지 수입 확대도 약속했다. 양측은 향후 3년 이상 전략적으로 안정적인 미중 관계를 위한 공동 틀을 구축하겠다는 입장을 발표했다. 다만 중국 측 공식 성명에는 구체적인 무역 합의 내용이 빠져 있어 양측의 해석 차이가 드러났다. 미국의 대중국 평균 관세율은 현재 47.5%로, 트럼프 1기 이전 3.1%에서 크게 오른 수준이다. 대만 문제를 놓고 시진핑 주석은 잘못 처리하면 미중 관계가 큰 위기에 처할 것이라고 경고하며 긴장이 남아 있다. 전문가들은 이번 회담이 관계 안정화의 시작점이 될 수 있지만 구조적 경쟁 관계는 지속될 것이라고 분석한다.`,
  keyTerms:[{term:`무역투자위원회`,explanation:`미국과 중국이 이번 정상회담에서 설립에 합의한 양자 협의 기구다. 관세 인하 협상과 무역 분쟁 조율을 위한 공식 채널 역할을 하며, 두 나라가 무역 갈등을 대화로 풀어가기 위한 제도적 장치다.`}],
  history:`미중 무역갈등은 트럼프 1기인 2018년 상호 관세 전쟁으로 본격화됐다. 바이든 정부에서도 반도체 등 핵심 기술 분야의 대중국 수출 규제가 유지됐다. 트럼프 2기 출범 이후 관세율이 재차 대폭 인상됐고, 2026년 미·이란 전쟁이라는 지정학 변수가 미중 관계에 추가 압박을 가하고 있다.`,
  players:`트럼프 대통령은 중국과의 경제 실리를 강조하며 관계 안정화를 도모하고 있다. 시진핑 주석은 대만 문제와 핵심 이익 수호를 강조하면서도 경제 협력에는 유연한 자세를 보였다. 보잉은 이번 합의로 항공기 수출 회복의 발판을 마련했고, 중국의 희토류 수출 통제는 미국을 압박하는 카드로 계속 활용되고 있다.`,
  current:`5월 15일 정상회담 종료 이후 미중 관계가 단기 안정화 국면에 들어설 가능성이 높아졌다. 그러나 양측의 합의 해석 차이와 대만·희토류 등 미해결 현안이 남아 있어 실질적 성과는 무역투자위원회 출범 이후가 관건이다.`,
  outlook:`무역투자위원회의 첫 회의 일정과 구체적 관세 인하 품목 협상이 향후 관전 포인트다. 중국의 희토류 수출 제한 완화 여부도 미중 관계의 실질적 온도를 가늠하는 지표가 될 것이다.`,
  sources:[{title:`Trade wars to extended truce: Analysts expect stabilization in U.S.-China ties - CNBC`,url:`https://www.cnbc.com/2026/05/14/trump-xi-summit-us-china-trade-taiwan-iran-nvidia.html`},{title:`China and US agree to establish trade and investment councils - South China Morning Post`,url:`https://www.scmp.com/economy/global-economy/article/3353840/china-and-us-agree-establish-trade-and-investment-councils-after-xi-trump-summit`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`한국 헌법개정안, 국민의힘 필리버스터에 가로막혀 국회 표결 두 차례 연속 무산`,
  metrics:[`5월 7일 헌법개정안 표결, 재적의원 3분의 2 미충족으로 불성립`,`이재명 대통령 지지율 59.8%, 6월 3일 지방선거 앞두고 민주당 압도적 우세`],
  summary:`이재명 대통령이 핵심 과제로 추진한 헌법 개정안이 5월 7~8일 국회에서 연달아 무산됐다. 7일 표결은 재적의원 3분의 2 이상의 참여가 이루어지지 않아 불성립됐고, 국민의힘이 2차 표결에 대해 필리버스터를 예고하면서 우원식 국회의장이 8일 예정된 표결을 상정하지 않기로 결정했다. 필리버스터는 소수 정당이 다수당의 입법을 막기 위해 장시간 토론으로 의사를 진행시켜 표결을 사실상 무력화하는 합법적 방해 수단이다. 이번 개헌안에는 계엄 성립 요건 강화, 5·18 민주화운동 및 부마민주항쟁 정신의 헌법 전문 명시, 지방자치 강화 등이 담겼다. 국민의힘은 개헌안뿐 아니라 50개 비쟁점 민생법안에 대해서도 필리버스터를 신청하며 전면 저항에 나섰다. 이재명 대통령은 전면 개헌은 정치적 합의가 어려우므로 합의 가능한 부분부터 실용적으로 접근하자고 제안했다. 39년 만의 개헌 시도가 좌절되면서 6월 3일 지방선거를 앞두고 여야 간 정치적 긴장이 고조되고 있다.`,
  keyTerms:[{term:`필리버스터`,explanation:`국회에서 소수 정당이 특정 법안의 표결을 막기 위해 의원들이 돌아가며 장시간 발언을 이어가는 합법적 의사 방해 전술이다. 우리나라 국회법상 재적의원 5분의 3 이상이 동의해야 강제 종결이 가능해 소수 야당도 강력한 저지 수단으로 활용할 수 있다.`}],
  history:`현행 대한민국 헌법은 1987년 직선제 개헌 이후 39년간 한 번도 개정되지 않았다. 2016~2017년 박근혜 전 대통령 탄핵 이후 개헌 논의가 활발해졌으나 정치적 합의 실패로 이어지지 못했다. 이재명 대통령은 2025년 취임 이후 내란 재발 방지를 명분으로 계엄 요건 강화 등을 포함한 부분 개헌을 추진해왔다.`,
  players:`이재명 대통령과 더불어민주당은 민주적 가치를 헌법에 명시하고 계엄 통제를 강화하기 위해 개헌을 주도했다. 국민의힘은 개헌의 필요성 자체에 의문을 제기하며 필리버스터와 표결 불참으로 저항했다. 우원식 국회의장은 양당 갈등 속에서 2차 표결 상정을 포기하는 결정을 내렸다.`,
  current:`야당의 전면 저항으로 39년 만의 개헌 시도가 완전히 무산됐다. 6월 지방선거를 앞두고 개헌 실패가 여야 공방의 주요 쟁점이 되며 정치적 갈등이 심화되고 있다.`,
  outlook:`6월 3일 지방선거 결과에 따라 개헌 재추진 동력이 결정될 전망이다. 민주당이 지방선거에서 압승할 경우 개헌 논의가 재점화될 가능성이 있다.`,
  sources:[{title:`이 대통령, 합의 가능한 개헌부터 - 경기신문`,url:`https://www.kyeonggi.com/article/20260506580168`},{title:`South Korea's Ruling Party Has a Jung Chung-rae Risk - The Diplomat`,url:`https://thediplomat.com/2026/05/south-koreas-ruling-party-has-a-jung-chung-rae-risk/`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`러시아, 우크라이나 키이우에 전쟁 최대 규모 드론·미사일 복합 공습…최소 24명 사망`,
  metrics:[`드론 1,567대·미사일 56발 2일 연속 발사, 극초음속 미사일 요격률 단 7%`,`키이우 아파트 붕괴 포함 최소 24명 사망, 시장 역대 최대 공습 선언`],
  summary:`러시아가 5월 13~14일 이틀간 우크라이나 수도 키이우에 드론 1,567대와 미사일 56발을 발사하며 전쟁 발발 이후 최대 규모의 공중 공격을 감행했다. 이번 공격으로 아파트 건물이 붕괴되는 등 민간 피해가 잇달았으며, 최소 24명이 숨지고 수십 명이 부상했다. 러시아는 킨잘을 포함한 극초음속 미사일과 드론 등 다양한 무기를 동원했는데, 극초음속 미사일에 대한 우크라이나 방공망의 요격률은 단 7%에 불과했다. 드론의 경우 94%를 격추하는 데 성공했으나, 미사일 방어의 한계가 이번 공습에서 극명하게 드러났다. 젤렌스키 대통령은 러시아가 드론과 미사일을 장기간 비축해 방공망 포화를 노린 의도적 전략이라고 비판했다. 공습은 트럼프 대통령이 요청한 5월 9~11일 휴전이 사실상 무위에 그친 직후 발생해 국제사회의 분노를 샀다. 러시아의 잇단 대규모 공습은 휴전 협상 가능성을 더욱 멀어지게 하고 있다.`,
  keyTerms:[{term:`극초음속 미사일`,explanation:`음속의 5배 이상, 최대 10배 이상으로 비행할 수 있는 미사일로, 현재 대부분의 방공 시스템으로는 요격이 매우 어렵다. 러시아의 킨잘이 대표적이며, 이번 키이우 공습에서 7%만 요격되며 우크라이나 방어의 한계를 드러냈다.`}],
  history:`러시아의 우크라이나 전면 침공은 2022년 2월에 시작됐다. 2025년 이후 러시아는 키이우를 포함한 우크라이나 주요 도시에 대한 대규모 드론·미사일 공습 빈도를 높였다. 트럼프 행정부는 2025년 출범 이후 휴전 중재를 시도했으나 번번이 실패했다.`,
  players:`러시아는 장거리 정밀 타격 능력을 바탕으로 우크라이나 인프라와 민간 지역을 겨냥하고 있다. 우크라이나는 서방의 패트리어트 등 방공 시스템을 운용하고 있으나 극초음속 미사일 요격에 한계를 보이고 있다. 트럼프 행정부는 휴전 중재자 역할을 자처하고 있으나 러시아의 협조를 이끌어내지 못하고 있다.`,
  current:`5월 14일 공습 이후 젤렌스키 대통령은 군에 대응 준비를 지시하며 반격 가능성을 시사했다. 우크라이나 전쟁이 4년을 넘기며 양측 모두 전쟁 지속 능력이 시험대에 오르고 있다.`,
  outlook:`트럼프 행정부의 추가 중재 시도 여부와 우크라이나의 대러 반격 규모가 주목된다. 서방 국가들의 추가 방공 시스템 지원 여부가 향후 전황의 핵심 변수가 될 것이다.`,
  sources:[{title:`Russia hammers Ukraine in biggest prolonged drone attack since war began - CNN`,url:`https://www.cnn.com/2026/05/14/europe/ukraine-kyiv-apartment-building-russian-attacks-intl`},{title:`Russian attack on Kyiv kills at least 24, including child - Kyiv Independent`,url:`https://kyivindependent.com/explosions-rock-kyiv-as-russias-mass-daytime-drone-strike-becomes-large-scale-missile-attack/`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미·이란 전쟁 3개월째, 호르무즈 해협 봉쇄 교착…이란 평화안 거부로 협상 완전 표류`,
  metrics:[`미 해군, 호르무즈 통과 상선 78척 강제 우회·이란 유조선 4척 무력화`,`트럼프 이란 평화 역제안 거부, 5월 현재 협상 완전 교착 상태`],
  summary:`2026년 2월 말 시작된 미·이란 전쟁이 3개월째에 접어들면서 호르무즈 해협 봉쇄를 둘러싼 양측의 대치가 심화되고 있다. 미 해군은 프로젝트 프리덤 작전을 통해 이란 해역 진입을 시도하는 상선 78척을 강제 우회시켰으며, 이를 무시한 이란 유조선 4척을 무력화했다. 이란은 드론과 미사일로 UAE, 미군 기지 등을 잇달아 공격했으며, 5월 7일에는 USS 메이슨 등 미 군함 3척이 이란의 공격을 받았다. 트럼프 대통령은 이란의 평화 역제안을 터무니없다고 일축했고, 이란도 미국을 신뢰할 수 없다며 강경 입장을 고수하고 있다. 호르무즈 해협 봉쇄는 전 세계 원유 수송량의 약 20%가 통과하는 전략 요충지로, 봉쇄 장기화는 국제 에너지 가격과 공급망에 직접적 타격을 준다. 이스라엘도 이 기간 레바논에 대한 공습을 재개하며 중동 전선이 확대되는 양상이다. 이란은 굴복하지 않겠다는 강경 입장을 유지하며 협상 돌파구가 보이지 않는 상황이다.`,
  keyTerms:[{term:`호르무즈 해협 봉쇄`,explanation:`이란과 오만 사이에 위치한 호르무즈 해협은 전 세계 원유 수송의 약 20%가 통과하는 핵심 길목이다. 미군이 이 해협에서 이란 선박과 이란과 거래하는 상선의 진입을 막는 작전으로, 봉쇄가 지속되면 국제 에너지 가격이 급등한다.`}],
  history:`미·이란 갈등은 2018년 트럼프 1기의 이란 핵합의 탈퇴로 본격화됐다. 이후 이란의 핵 프로그램 재개와 미국의 제재 강화가 이어졌다. 2026년 2월 미국과 이스라엘이 이란에 합동 공습을 가하고 최고지도자 하메네이가 사망하면서 전면전이 시작됐다.`,
  players:`미국은 해군력을 앞세워 호르무즈 해협 통제를 유지하며 이란을 압박하고 있다. 이란은 대리 세력인 레바논 헤즈볼라, 예멘 후티 등과 직접 군사력을 동원해 저항하고 있다. 이스라엘은 미국과 공조하며 레바논과 이란 내 목표물을 타격하고 있다. UAE 등 걸프 국가들은 이란의 공격을 받으며 미국의 안보 우산에 더욱 의존하고 있다.`,
  current:`5월 중순 이란이 평화안을 거부하고 미국도 이란의 역제안을 거절하면서 협상이 완전히 교착됐다. 호르무즈 해협 봉쇄 장기화가 국제 에너지 시장의 최대 불확실성 요인으로 남아 있다.`,
  outlook:`이란 내부의 권력 공백과 새 지도부의 대미 협상 의지가 향후 전쟁 향방을 결정할 것이다. 국제원자력기구의 이란 핵시설 접근 여부도 협상 타결의 관건 중 하나다.`,
  sources:[{title:`Iran war live updates: Israel strikes Lebanon as Iran says it cannot trust the Americans - CBS News`,url:`https://www.cbsnews.com/live-updates/iran-war-trump-strait-of-hormuz-trust-americans-control/`},{title:`2026 Iran war - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_Iran_war`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`삼성전자 총파업 위기, 이재용 회장 대국민 사과로 노사 대화 재개…18일 중노위 조정 고비`,
  metrics:[`삼성전자 노조 총파업 예고 속 이재용 회장 공개 사과 발표`,`중앙노동위원회 추가 사후조정 5월 18일 예정`],
  summary:`삼성전자 노동조합의 총파업 위기가 고조되던 가운데, 이재용 회장이 대국민 사과를 발표하며 노사 대화 재개의 물꼬를 텄다. 노조는 임금 인상과 성과급 체계 개편 등을 요구하며 총파업을 예고했고, 협상이 결렬될 경우 삼성전자 핵심 생산라인의 전면 중단 우려가 제기됐다. 총파업은 전체 조합원이 일제히 업무를 중단하는 노동쟁의 행위로, 삼성전자처럼 글로벌 반도체 공급망의 핵심에 있는 기업에서 발생할 경우 국가 경제 전반에 큰 파급력을 가진다. 이재용 회장의 공개 사과는 노사갈등이 경영 전반으로 확산되는 것을 막기 위한 선제적 조치로 해석된다. 중앙노동위원회는 5월 18일 추가 사후조정을 통해 노사 갈등 해소를 중재할 예정이다. 삼성전자는 AI 반도체 경쟁에서 SK하이닉스에 뒤처지고 있다는 우려가 커지는 가운데 내부 노사갈등까지 겹쳐 이중 압박에 놓여 있다. 이번 사태는 삼성 창업 이후 유지해온 무노조 경영 문화가 완전히 변화했음을 보여주는 사례이기도 하다.`,
  keyTerms:[{term:`총파업`,explanation:`노동조합의 전체 조합원이 일정 기간 동시에 업무를 중단하는 가장 강력한 형태의 노동쟁의다. 삼성전자와 같은 반도체 기업에서 총파업이 발생하면 글로벌 공급망과 국내 경제에 직접적인 타격을 줄 수 있다.`}],
  history:`삼성전자는 오랫동안 무노조 경영 방침을 유지해왔으나, 2010년대 후반부터 노조 활동이 본격화됐다. 2024년에는 삼성전자 역사상 최초의 파업이 발생하며 노사관계가 크게 변화했다. 이재용 회장은 과거 준법경영 의지를 공개적으로 밝혔으나 노동 현안에서는 갈등이 반복되고 있다.`,
  players:`전국삼성전자노동조합 등 노조 측은 임금 인상과 성과급 체계 공정화를 요구하고 있다. 이재용 회장은 경영 총수로서 사과와 대화 재개를 통해 위기 수습에 나섰다. 중앙노동위원회가 노사 양측의 중립적 조정 기관으로 역할을 맡고 있다.`,
  current:`이재용 회장의 사과 이후 노사 간 대화가 재개됐지만 구체적 합의에는 이르지 못한 상태다. 5월 18일 중노위 조정이 파업 여부를 가를 최대 분기점이 될 전망이다.`,
  outlook:`18일 중노위 조정 결과에 따라 파업 강행 여부가 결정된다. 파업이 현실화될 경우 삼성전자의 2분기 반도체 생산과 글로벌 공급망에 영향을 줄 수 있어 주목된다.`,
  sources:[{title:`삼성전자 노사 관련 최신 뉴스 - 한국경제신문`,url:`https://www.hankyung.com/`},{title:`한국 주요 경제 뉴스 - 연합뉴스`,url:`https://www.yna.co.kr/`}]

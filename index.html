  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`러시아, 우크라이나 키이우에 전쟁 최대 규모 드론·미사일 복합 공습…최소 24명 사망`,
  metrics:[`드론 1,567대·미사일 56발 2일 연속 발사, 극초음속 미사일 요격률 단 7%`,`키이우 아파트 붕괴 포함 최소 24명 사망, 시장 역대 최대 공습 선언`],
  summary:`러시아가 5월 13~14일 이틀간 우크라이나 수도 키이우에 드론 1,567대와 미사일 56발을 발사하며 전쟁 발발 이후 최대 규모의 공중 공격을 감행했다. 이번 공격으로 아파트 건물이 붕괴되는 등 민간 피해가 잇달았으며, 최소 24명이 숨지고 수십 명이 부상했다. 러시아는 킨잘을 포함한 극초음속 미사일과 드론 등 다양한 무기를 동원했는데, 극초음속 미사일에 대한 우크라이나 방공망의 요격률은 단 7%에 불과했다. 드론의 경우 94%를 격추하는 데 성공했으나, 미사일 방어의 한계가 이번 공습에서 극명하게 드러났다. 젤렌스키 대통령은 러시아가 드론과 미사일을 장기간 비축해 방공망 포화를 노린 의도적 전략이라고 비판했다. 공습은 트럼프 대통령이 요청한 5월 9~11일 휴전이 사실상 무위에 그친 직후 발생해 국제사회의 분노를 샀다. 러시아의 잇단 대규모 공습은 휴전 협상 가능성을 더욱 멀어지게 하고 있다.`,
  keyTerms:[{term:`극초음속 미사일`,explanation:`음속의 5배 이상, 최대 10배 이상으로 비행할 수 있는 미사일로, 현재 대부분의 방공 시스템으로는 요격이 매우 어렵다. 러시아의 킨잘이 대표적이며, 이번 키이우 공습에서 7%만 요격되며 우크라이나 방어의 한계를 드러냈다.`}],
  history:`러시아의 우크라이나 전면 침공은 2022년 2월에 시작됐다. 2025년 이후 러시아는 키이우를 포함한 우크라이나 주요 도시에 대한 대규모 드론·미사일 공습 빈도를 높였다. 트럼프 행정부는 2025년 출범 이후 휴전 중재를 시도했으나 번번이 실패했다.`,
  players:`러시아는 장거리 정밀 타격 능력을 바탕으로 우크라이나 인프라와 민간 지역을 겨냥하고 있다. 우크라이나는 서방의 패트리어트 등 방공 시스템을 운용하고 있으나 극초음속 미사일 요격에 한계를 보이고 있다. 트럼프 행정부는 휴전 중재자 역할을 자처하고 있으나 러시아의 협조를 이끌어내지 못하고 있다.`,
  current:`5월 14일 공습 이후 젤렌스키 대통령은 군에 대응 준비를 지시하며 반격 가능성을 시사했다. 우크라이나 전쟁이 4년을 넘기며 양측 모두 전쟁 지속 능력이 시험대에 오르고 있다.`,
  outlook:`트럼프 행정부의 추가 중재 시도 여부와 우크라이나의 대러 반격 규모가 주목된다. 서방 국가들의 추가 방공 시스템 지원 여부가 향후 전황의 핵심 변수가 될 것이다.`,
  sources:[{title:`Russia hammers Ukraine in biggest prolonged drone attack since war began - CNN`,url:`https://www.cnn.com/2026/05/14/europe/ukraine-kyiv-apartment-building-russian-attacks-intl`},{title:`Russian attack on Kyiv kills at least 24, including child - Kyiv Independent`,url:`https://kyivindependent.com/explosions-rock-kyiv-as-russias-mass-daytime-drone-strike-becomes-large-scale-missile-attack/`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미·이란 전쟁 3개월째, 호르무즈 해협 봉쇄 교착…이란 평화안 거부로 협상 완전 표류`,
  metrics:[`미 해군, 호르무즈 통과 상선 78척 강제 우회·이란 유조선 4척 무력화`,`트럼프 이란 평화 역제안 거부, 5월 현재 협상 완전 교착 상태`],
  summary:`2026년 2월 말 시작된 미·이란 전쟁이 3개월째에 접어들면서 호르무즈 해협 봉쇄를 둘러싼 양측의 대치가 심화되고 있다. 미 해군은 프로젝트 프리덤 작전을 통해 이란 해역 진입을 시도하는 상선 78척을 강제 우회시켰으며, 이를 무시한 이란 유조선 4척을 무력화했다. 이란은 드론과 미사일로 UAE, 미군 기지 등을 잇달아 공격했으며, 5월 7일에는 USS 메이슨 등 미 군함 3척이 이란의 공격을 받았다. 트럼프 대통령은 이란의 평화 역제안을 터무니없다고 일축했고, 이란도 미국을 신뢰할 수 없다며 강경 입장을 고수하고 있다. 호르무즈 해협 봉쇄는 전 세계 원유 수송량의 약 20%가 통과하는 전략 요충지로, 봉쇄 장기화는 국제 에너지 가격과 공급망에 직접적 타격을 준다. 이스라엘도 이 기간 레바논에 대한 공습을 재개하며 중동 전선이 확대되는 양상이다. 이란은 굴복하지 않겠다는 강경 입장을 유지하며 협상 돌파구가 보이지 않는 상황이다.`,
  keyTerms:[{term:`호르무즈 해협 봉쇄`,explanation:`이란과 오만 사이에 위치한 호르무즈 해협은 전 세계 원유 수송의 약 20%가 통과하는 핵심 길목이다. 미군이 이 해협에서 이란 선박과 이란과 거래하는 상선의 진입을 막는 작전으로, 봉쇄가 지속되면 국제 에너지 가격이 급등한다.`}],
  history:`미·이란 갈등은 2018년 트럼프 1기의 이란 핵합의 탈퇴로 본격화됐다. 이후 이란의 핵 프로그램 재개와 미국의 제재 강화가 이어졌다. 2026년 2월 미국과 이스라엘이 이란에 합동 공습을 가하고 최고지도자 하메네이가 사망하면서 전면전이 시작됐다.`,
  players:`미국은 해군력을 앞세워 호르무즈 해협 통제를 유지하며 이란을 압박하고 있다. 이란은 대리 세력인 레바논 헤즈볼라, 예멘 후티 등과 직접 군사력을 동원해 저항하고 있다. 이스라엘은 미국과 공조하며 레바논과 이란 내 목표물을 타격하고 있다. UAE 등 걸프 국가들은 이란의 공격을 받으며 미국의 안보 우산에 더욱 의존하고 있다.`,
  current:`5월 중순 이란이 평화안을 거부하고 미국도 이란의 역제안을 거절하면서 협상이 완전히 교착됐다. 호르무즈 해협 봉쇄 장기화가 국제 에너지 시장의 최대 불확실성 요인으로 남아 있다.`,
  outlook:`이란 내부의 권력 공백과 새 지도부의 대미 협상 의지가 향후 전쟁 향방을 결정할 것이다. 국제원자력기구의 이란 핵시설 접근 여부도 협상 타결의 관건 중 하나다.`,
  sources:[{title:`Iran war live updates: Israel strikes Lebanon as Iran says it cannot trust the Americans - CBS News`,url:`https://www.cbsnews.com/live-updates/iran-war-trump-strait-of-hormuz-trust-americans-control/`},{title:`2026 Iran war - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_Iran_war`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`삼성전자 총파업 위기, 이재용 회장 대국민 사과로 노사 대화 재개…18일 중노위 조정 고비`,
  metrics:[`삼성전자 노조 총파업 예고 속 이재용 회장 공개 사과 발표`,`중앙노동위원회 추가 사후조정 5월 18일 예정`],
  summary:`삼성전자 노동조합의 총파업 위기가 고조되던 가운데, 이재용 회장이 대국민 사과를 발표하며 노사 대화 재개의 물꼬를 텄다. 노조는 임금 인상과 성과급 체계 개편 등을 요구하며 총파업을 예고했고, 협상이 결렬될 경우 삼성전자 핵심 생산라인의 전면 중단 우려가 제기됐다. 총파업은 전체 조합원이 일제히 업무를 중단하는 노동쟁의 행위로, 삼성전자처럼 글로벌 반도체 공급망의 핵심에 있는 기업에서 발생할 경우 국가 경제 전반에 큰 파급력을 가진다. 이재용 회장의 공개 사과는 노사갈등이 경영 전반으로 확산되는 것을 막기 위한 선제적 조치로 해석된다. 중앙노동위원회는 5월 18일 추가 사후조정을 통해 노사 갈등 해소를 중재할 예정이다. 삼성전자는 AI 반도체 경쟁에서 SK하이닉스에 뒤처지고 있다는 우려가 커지는 가운데 내부 노사갈등까지 겹쳐 이중 압박에 놓여 있다. 이번 사태는 삼성 창업 이후 유지해온 무노조 경영 문화가 완전히 변화했음을 보여주는 사례이기도 하다.`,
  keyTerms:[{term:`총파업`,explanation:`노동조합의 전체 조합원이 일정 기간 동시에 업무를 중단하는 가장 강력한 형태의 노동쟁의다. 삼성전자와 같은 반도체 기업에서 총파업이 발생하면 글로벌 공급망과 국내 경제에 직접적인 타격을 줄 수 있다.`}],
  history:`삼성전자는 오랫동안 무노조 경영 방침을 유지해왔으나, 2010년대 후반부터 노조 활동이 본격화됐다. 2024년에는 삼성전자 역사상 최초의 파업이 발생하며 노사관계가 크게 변화했다. 이재용 회장은 과거 준법경영 의지를 공개적으로 밝혔으나 노동 현안에서는 갈등이 반복되고 있다.`,
  players:`전국삼성전자노동조합 등 노조 측은 임금 인상과 성과급 체계 공정화를 요구하고 있다. 이재용 회장은 경영 총수로서 사과와 대화 재개를 통해 위기 수습에 나섰다. 중앙노동위원회가 노사 양측의 중립적 조정 기관으로 역할을 맡고 있다.`,
  current:`이재용 회장의 사과 이후 노사 간 대화가 재개됐지만 구체적 합의에는 이르지 못한 상태다. 5월 18일 중노위 조정이 파업 여부를 가를 최대 분기점이 될 전망이다.`,
  outlook:`18일 중노위 조정 결과에 따라 파업 강행 여부가 결정된다. 파업이 현실화될 경우 삼성전자의 2분기 반도체 생산과 글로벌 공급망에 영향을 줄 수 있어 주목된다.`,
  sources:[{title:`삼성전자 노사 관련 최신 뉴스 - 한국경제신문`,url:`https://www.hankyung.com/`},{title:`한국 주요 경제 뉴스 - 연합뉴스`,url:`https://www.yna.co.kr/`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`구글 Gemma 4 공개·美 AI 사전 규제 강화…에이전틱 AI 기업 도입 본격화`,
  metrics:[`JPMorgan Chase 2026년 AI 기술 예산 198억 달러, 전담 인력 2,000명 배치`,`영국 로이즈 뱅킹, FTSE 상장사 최초 이사회에 AI 의사결정 도구 도입`],
  summary:`구글이 고급 추론과 자율 업무 수행에 특화된 오픈 모델 Gemma 4를 공개하며 에이전틱 AI 시대로의 전환이 빨라지고 있다. 에이전틱 AI는 사람의 개입 없이 복잡한 작업을 스스로 계획하고 실행하는 차세대 AI로, 기업 운영과 의사결정 전 과정에서 디지털 직원 역할을 수행할 것으로 기대된다. 미국 정부는 마이크로소프트와 xAI 등 주요 AI 기업에 모델 공개 전 규제 당국에 사전 제공하는 AI 사전 테스팅 의무화 방안을 추진하고 있다. JPMorgan Chase는 AI를 실험적 연구개발에서 핵심 인프라로 공식 재분류하며 2026년 기술 예산 198억 달러와 전담 인력 2,000명을 배치했다. 영국에서는 로이즈 뱅킹 그룹이 FTSE 상장 대기업 최초로 이사회 회의에 에이전틱 AI 도구를 도입해 의사결정을 지원하도록 했다. 구글은 ICLR 2026에서 대형 AI 모델의 메모리 효율을 획기적으로 높이는 TurboQuant 알고리즘도 발표하며 효율화 경쟁을 선도하고 있다. AI 기술의 급격한 기업 침투 속에서 규제와 혁신 사이의 균형이 전 세계적 과제로 부상하고 있다.`,
  keyTerms:[{term:`에이전틱 AI`,explanation:`사람이 일일이 지시하지 않아도 목표만 주면 스스로 계획을 세우고 작업을 순서대로 실행하는 자율형 AI를 말한다. 단순 대화나 질의응답을 넘어 이메일 작성·코드 실행·데이터 분석 등 복잡한 업무를 연속적으로 처리할 수 있어 기업 현장에 빠르게 도입되고 있다.`}],
  history:`생성형 AI 열풍은 2022년 말 ChatGPT 출시로 시작됐다. 2024~2025년 구글·메타·마이크로소프트 등이 경쟁적으로 AI 모델을 고도화했고, 2025년부터 에이전틱 AI 개념이 부상하며 자율 업무 수행 AI로 기술 트렌드가 이동했다. 각국 정부도 AI 안전 규제 논의를 본격화하고 있다.`,
  players:`구글은 Gemma 4와 TurboQuant를 통해 오픈소스 AI 생태계를 선도하고 있다. 미국 정부는 AI 사전 규제 강화로 기술 통제 의지를 보이며, 마이크로소프트·xAI 등이 이에 동의했다. JPMorgan·로이즈 등 금융권이 AI를 핵심 인프라로 전환하며 기업 도입을 가속화하고 있다.`,
  current:`에이전틱 AI의 기업 내 도입이 빠르게 진행되며 AI가 단순 보조 도구를 넘어 조직 의사결정의 중심으로 진입하고 있다. 각국 정부의 규제 논의도 함께 속도를 내고 있다.`,
  outlook:`에이전틱 AI의 보안성과 책임 소재를 둘러싼 국제 논의가 확산될 것이다. 미국의 AI 사전 테스팅 법안 통과 여부가 전 세계 AI 규제의 기준점이 될 전망이다.`,
  sources:[{title:`7 Explosive AI Updates in May 2026 That Every Founder Must Know - imfounder.com`,url:`https://imfounder.com/science-tech/ai/ai-updates-may-2026/`},{title:`Emerging Technologies in 2026: Agentic AI, Digital Coworkers - Financial Executives International`,url:`https://www.financialexecutives.org/FEI-Daily/May-2026/agentic-ai-digital-coworkers-enterprise.aspx`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`인도·파키스탄 46도 폭염에 47명 사망…기후귀인분석으로 기후변화 책임 과학적 입증`,
  metrics:[`인도 37명·파키스탄 카라치 10명 폭염 사망, 최고기온 46도 초과`,`WMO, 올해 5~7월 엘니뇨 발달 및 슈퍼 엘니뇨로 강화 가능성 경고`],
  summary:`4월 말~5월 초 인도와 파키스탄 여러 도시에서 기온이 46도를 넘는 극단적 폭염이 발생해 인도 37명, 파키스탄 카라치 10명 등 최소 47명이 사망했다. 세계기상귀인(WWA) 연구팀이 실시한 기후귀인분석 결과, 이번 폭염의 강도와 빈도는 인간의 온실가스 배출로 인한 기후변화가 없었다면 발생하기 극히 어려운 수준이었던 것으로 밝혀졌다. 기후귀인분석은 특정 기상 이변이 기후변화로 인해 얼마나 더 강해지거나 자주 발생하게 됐는지를 과학적으로 규명하는 방법론이다. 인도 우타르프라데시주에서는 집중 호우와 낙뢰, 나무 쓰러짐, 벽체 붕괴로 추가 90명이 숨지며 기상 이변이 복합적으로 나타났다. 세계기상기구는 올해 5~7월 엘니뇨가 발달할 가능성이 높으며, 이후 슈퍼 엘니뇨로 강화될 수 있다고 경고했다. 미국에서는 기후변화로 인한 가뭄과 폭풍 강화로 물 관련 서비스 비용이 인플레이션의 두 배 속도로 상승하며 경제적 부담이 가시화되고 있다. 전문가들은 기후귀인분석이 과학적으로 확인해주듯 이런 극한 폭염이 앞으로 더 자주, 더 강하게 반복될 것이라고 경고한다.`,
  keyTerms:[{term:`기후귀인분석`,explanation:`특정 폭염·홍수·가뭄 같은 기상 이변이 기후변화 때문에 얼마나 더 자주, 더 심하게 일어나게 됐는지를 통계적·과학적으로 규명하는 방법이다. 이번 분석에서 남아시아 폭염의 강도 증가가 인간 활동에 의한 기후변화와 직결된다는 사실이 확인됐다.`}],
  history:`남아시아는 매년 봄철 4~6월 폭염 시즌을 겪지만, 최근 수년간 기온 기록이 잇달아 경신되고 있다. 2022년 파키스탄은 전례 없는 대홍수를 겪으며 기후변화 취약국으로서의 위기를 전 세계에 알렸다. 세계기상귀인(WWA) 연구 네트워크는 2010년대 중반부터 이상 기상과 기후변화의 연관성을 과학적으로 규명하는 기후귀인분석을 발전시켜왔다.`,
  players:`세계기상귀인(WWA) 연구팀이 이번 폭염과 기후변화의 연관성을 과학적으로 분석했다. 인도와 파키스탄 정부는 폭염 비상 대책을 가동해 피해 최소화에 나섰다. 세계기상기구는 엘니뇨 발달 가능성을 경고하며 각국에 적극적인 대비를 촉구했다.`,
  current:`5월 현재 남아시아 일부 지역에서 폭염이 이어지고 있으며, 몬순 강우 전까지 상황이 개선되기 어려울 전망이다. WMO의 엘니뇨 경보 속에 올 여름 극한 기상 이변 위험이 크게 높아진 상황이다.`,
  outlook:`5~7월 엘니뇨 발달 여부가 전 세계 기상 이변의 강도를 결정할 주요 변수다. 인도와 파키스탄의 2026년 몬순 강우 패턴이 농업 생산과 식량 안보에 직결되어 주목된다.`,
  sources:[{title:`This Week in Climate News May 2026 Week 2 - Earth.Org`,url:`https://earth.org/this-week-in-climate-news-may-2026-week-2/`},{title:`14th May 2026 Climate News Round-Up - Climate and Economy`,url:`https://climateandeconomy.com/2026/05/14/14th-may-2026-todays-round-up-of-climate-news/`}]
}]

  headline:`케빈 워시, 미국 연방준비제도 제17대 의장 공식 취임…인플레이션 속 금리 정책 불확실성 고조`,
  metrics:[`상원 54-45 찬성으로 인준 가결 (Fed 역사상 최다 당파적 표결)`,`파월 의장 임기 2026년 5월 15일 종료, 워시 공식 취임`],
  summary:`케빈 워시가 5월 13일 상원 54-45 표 찬성으로 미국 연방준비제도(Fed) 제17대 의장으로 인준됐으며, 5월 15일 제롬 파월의 임기 종료와 함께 공식 취임했다. 이번 표결은 연방준비제도 역사상 가장 당파적인 의장 인준으로 기록됐으며, 민주당 의원 중에서는 펜실베이니아주 존 페터먼 의원 한 명만 찬성표를 던졌다. 워시는 트럼프 대통령이 금리 인하를 유도하기 위해 지명한 인물로 알려져 있으나, 현재 인플레이션이 재차 상승하는 국면이어서 실제 금리 인하는 쉽지 않다는 분석이 지배적이다. 파월 전 의장은 2018년부터 임기를 수행하며 코로나19 위기, 급격한 인플레이션 대응 등 주요 고비를 이끌었다. 첫 FOMC 회의는 6월 16~17일로 예정되어 있어, 워시의 첫 정책 결정에 시장의 이목이 집중되고 있다. 워시 취임으로 Fed 독립성 논란이 재점화되며 금융시장 변동성이 확대될 가능성이 높아지고 있다.`,
  keyTerms:[{term:`연방준비제도`,explanation:`미국의 중앙은행 역할을 하는 기관으로, 기준금리를 결정해 미국 전체 경제와 세계 금융시장에 큰 영향을 미친다. 새 의장 취임으로 금리 정책 방향이 바뀔 수 있어 이 이야기의 핵심 개념이다.`}],
  history:`미국 연방준비제도는 1913년 설립된 중앙은행으로, 정치적 압력에서 독립적으로 통화정책을 결정하는 것이 원칙이다. 트럼프 대통령은 1기 재임 시절부터 파월 의장에게 금리 인하 압박을 가했으며, 2기 취임 후 금리 인하에 우호적인 것으로 알려진 워시를 지명했다. 워시는 2006~2011년 Fed 이사를 역임한 금융인 출신으로, 트럼프와 가까운 인물로 알려져 있다.`,
  players:`케빈 워시 신임 의장은 금리 인하에 우호적인 성향을 지닌 것으로 알려져 있으며, 트럼프의 경기 부양 의지와 보조를 맞출 것이라는 전망이 나온다. 반면 Fed 내부와 월가 일부에서는 현재 인플레이션 수준에서 금리 인하가 시기상조라는 견해가 강하다. 의회 민주당은 이번 인준이 Fed 독립성을 훼손한다고 강하게 비판했다.`,
  current:`인플레이션이 목표치인 2%를 여전히 웃도는 상황에서 워시의 취임은 Fed 독립성에 대한 의구심을 키우고 있다. 시장은 6월 FOMC 회의에서 워시가 금리를 어떻게 다룰지 주목하며 달러화 변동성이 높아지고 있다.`,
  outlook:`6월 16~17일 FOMC 회의가 워시 의장의 첫 통화정책 시험대가 될 것이다. 이 회의에서 금리 동결 또는 인하 여부에 따라 달러화 강세·약세, 글로벌 자산시장 방향이 결정될 가능성이 크다.`,
  sources:[{title:`Kevin Warsh confirmed as Fed chair, succeeding Jerome Powell - CNN Business`,url:`https://www.cnn.com/2026/05/13/economy/kevin-warsh-confirmation-trump-fed-chair`},{title:`Senate confirms Kevin Warsh as next chair of the Federal Reserve - NPR`,url:`https://www.npr.org/2026/05/13/nx-s1-5816235/kevin-warsh-federal-reserve-chair-jerome-powell`},{title:`Kevin Warsh wins Senate confirmation as the next Federal Reserve chair - CNBC`,url:`https://www.cnbc.com/2026/05/13/kevin-warsh-wins-senate-confirmation-as-the-next-federal-reserve-chair.html`}]

  category:`경제`,

  colorBg:`#e8f0fe`,
  headline:`한국 5월 초순 반도체 수출 149.8% 폭증…AI 슈퍼사이클에 역대 최대 실적 경신`,
  metrics:[`5월 1~10일 반도체 수출 85억 달러 (+149.8% YoY)`,`전체 수출 184억 달러, 5월 기준 역대 최대`],
  summary:`5월 1~10일 한국의 전체 수출액이 전년 동기 대비 43.7% 급증한 184억 달러를 기록하며 5월 기준 역대 최대 실적을 달성했다. 이 중 반도체 수출은 85억 달러로 무려 149.8% 급증했는데, 이는 AI 슈퍼사이클로 인한 고대역폭 메모리(HBM)와 낸드플래시 수요 폭증이 핵심 원인이다. DDR5 16Gb 가격은 1년 새 662%, 낸드 128Gb는 766% 올라 한국 수출 상승을 이끌고 있다. KDI는 이를 반영해 2026년 한국 경제성장률 전망을 기존보다 0.6%p 높인 2.5%로 상향 조정했다. 골드만삭스는 올해 한국 경상수지 흑자가 GDP 대비 10%를 넘어 중동 산유국 수준에 달할 것으로 전망한다. 5월 전체 반도체 수출액은 330억~340억 달러에 달할 것으로 예상되며, 이는 연속 3개월 300억 달러 돌파에 해당한다.`,
  keyTerms:[{term:`AI 슈퍼사이클`,explanation:`AI 기술의 폭발적 확산으로 반도체 수요가 한꺼번에 급증하는 현상을 말한다. 반도체 가격과 수출이 동시에 치솟아 한국 경제 전반에 큰 호황을 가져오고 있다.`}],
  history:`한국은 삼성전자와 SK하이닉스를 앞세워 세계 메모리 반도체 시장 1~2위를 차지하고 있다. 2024년 이후 생성형 AI 확산으로 데이터센터용 고성능 메모리 수요가 폭증했으며, 2025년 하반기부터 반도체 가격이 회복세로 돌아서며 슈퍼사이클 진입이 본격화됐다. HBM(고대역폭 메모리)은 AI 연산에 필수적인 부품으로, 한국 기업들이 세계 공급을 주도하고 있다.`,
  players:`삼성전자와 SK하이닉스가 HBM·DDR5 등 AI용 메모리 공급의 핵심 주체다. 수요 측에서는 엔비디아, 마이크로소프트, 구글 등 글로벌 빅테크가 AI 인프라 투자를 대폭 늘리며 한국산 메모리 주문을 쏟아내고 있다. 한국 정부는 수출 호조를 발판으로 내수 경기 부양책을 추가 검토 중이다.`,
  current:`5월 초순 수출 통계가 역대 최대를 기록하면서 하반기 경기 회복에 대한 기대감이 높아졌다. 그러나 삼성전자 노사 갈등과 원화 환율 불안정, 미·중 기술 경쟁 심화도 변수로 남아 있다.`,
  outlook:`5월 전체 수출 통계는 6월 초 발표될 예정이며, 330억 달러 이상이면 월 최대 반도체 수출 기록을 새로 쓸 수 있다. 하반기에는 삼성전자의 HBM4 양산 여부와 미국의 대중 반도체 수출 규제 추가 여부가 핵심 변수다.`,
  sources:[{title:`5월 초 반도체 수출 149.8% 폭증…역대 최대 실적 경신 - 테크월드`,url:`https://www.epnc.co.kr/news/articleView.html?idxno=401587`},{title:`[속보] 5월 초순 수출 184억 달러…반도체 수출 149.8%↑ - 머니투데이`,url:`https://www.mt.co.kr/economy/2026/05/11/2026051108000338601`},{title:`반도체 수출 3개월 연속 300억弗 가시권 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202605130603223288`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`IMF·세계은행, 중국 성장률 4.4%로 하향…글로벌 경제 스태그플레이션 우려 고조`,
  metrics:[`세계은행 중국 2026년 성장률 4.4% 전망 (전년 대비 하향)`,`IEA, 2분기 세계 원유 수요 150만 배럴/일 감소 예측 (코로나19 이후 최대)`],
  summary:`세계은행과 IMF가 5월 발표한 최신 전망에서 2026년 세계 경제 성장이 무역 불확실성과 에너지 가격 상승으로 예상보다 가파르게 둔화되고 있다고 경고했다. 세계은행은 중국의 2026년 성장률을 4.4%로 낮춰 전망했으며, 동아시아·태평양 지역 전체도 4.4%로 둔화될 것으로 예측했다. IEA는 2026년 2분기 세계 원유 수요가 150만 배럴/일 감소해 코로나19 팬데믹 이후 최대 낙폭을 기록할 것으로 내다봤다. 유럽에서는 유럽중앙은행(ECB)이 인플레이션 재가속과 경기 둔화가 동시에 진행되는 스태그플레이션 우려 속에서도 기준금리를 동결하며 정책 딜레마에 빠진 상태다. 중남미 성장률 전망도 2.3%에 그쳐 무역 긴장과 국내 수요 부진이 겹친 영향이 뚜렷하다. 미국 연준의 리더십 교체까지 겹치며 각국 중앙은행 간 정책 공조 불확실성도 확대되고 있다.`,
  keyTerms:[{term:`스태그플레이션`,explanation:`경기가 침체되는데도 물가가 동시에 오르는 현상이다. 경기가 나쁘면 금리를 내려 경기를 살려야 하는데, 물가도 높아 금리를 내리기도 어려운 딜레마 상황을 뜻한다.`}],
  history:`코로나19 이후 각국이 풀어놓은 유동성이 2022~2023년 인플레이션 급등을 불러왔고, 주요국 중앙은행들은 공격적 금리 인상으로 물가를 안정시켰다. 그러나 2025년 말부터 미국의 관세 정책 강화와 중동 분쟁이 재차 에너지·원자재 가격을 끌어올리면서 인플레이션이 재가속 조짐을 보이고 있다. 이에 각국 중앙은행은 경기 부양과 물가 억제 사이에서 정책 선택의 폭이 좁아지고 있다.`,
  players:`IMF와 세계은행이 세계 경제 진단의 주요 기관으로 각국 정부에 정책 권고를 내리고 있다. 중국은 내수 부진과 부동산 침체가 이어지며 성장률 하락을 감수해야 하는 상황이다. 미국과 EU는 자국 내 물가를 잡으면서도 경기 둔화를 막아야 하는 이중 과제를 안고 있다.`,
  current:`2분기 원유 수요 감소와 글로벌 무역 위축이 맞물리며 세계 경제의 단기 전망이 어두워지고 있다. 중동 분쟁발 에너지 충격이 아시아 수입국들의 인플레이션을 자극하고, 이것이 다시 소비 위축으로 이어지는 악순환 우려가 커지고 있다.`,
  outlook:`IMF는 6월 세계경제전망 업데이트를 발표할 예정으로, 중동 사태와 미·중 무역 협상 진전에 따라 성장률이 추가 하향될 가능성이 있다. 세계은행의 6월 글로벌 경제전망 보고서도 주요 체크포인트가 될 것이다.`,
  sources:[{title:`Global Economic Outlook May 2026: Growth Holds Amid Inflation & Oil Risks - OTET Markets`,url:`https://otetmarkets.com/blog/otet-view/global-economic-outlook-may-2026-inflation/`},{title:`Global Economic Prospects - World Bank`,url:`https://www.worldbank.org/en/publication/global-economic-prospects`},{title:`IMF April 2026 World Economic Outlook - IMF`,url:`https://www.imf.org/-/media/files/publications/weo/2026/april/english/ch1.pdf`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`트럼프-시진핑 베이징 정상회담 종료…보잉 200대·농산물 구매 합의, 대만 갈등은 미해결`,
  metrics:[`보잉 737 200대 구매 합의`,`미·중 양측 합의 내용 해석 불일치 확인`],
  summary:`도널드 트럼프 미국 대통령과 시진핑 중국 국가주석은 5월 14~15일 베이징에서 정상회담을 갖고 전략적 안정을 위한 양자 관계 발전에 합의했다고 밝혔다. 회담의 주요 무역 성과로는 중국이 보잉 737 200대를 구매하고, 대두·석유·LNG 등 미국산 에너지와 농산물을 추가 수입하기로 한 것이 꼽힌다. 트럼프는 이를 환상적인 무역 협약이라 자평했으나, 미국과 중국은 합의 내용에 대한 해석에서 엇갈렸다. 중국은 대만 문제에 대한 미국의 개입을 강력히 경고했고, 이란 핵 협상에 협조하겠다는 모호한 약속을 내놓았다. NBC 등 주요 외신은 이번 회담이 구체적 성과 없이 관계 안정화 자체에 의의가 있는 수준에 그쳤다고 평가했다. 미 재무장관 스콧 베센트와 중국 허리펑 부총리가 한국에서 예비 협상을 벌인 끝에 이번 정상회담으로 이어진 것으로 알려졌다.`,
  keyTerms:[{term:`전략적 안정`,explanation:`미국과 중국 같은 강대국이 서로 충돌 없이 경쟁을 관리하자는 외교적 개념이다. 구체적인 합의보다는 관계를 안정시키는 데 초점을 맞춘 표현으로, 이번 회담의 핵심 키워드로 등장했다.`}],
  history:`미·중 관계는 트럼프 1기부터 관세 전쟁과 기술 패권 경쟁으로 급격히 악화됐다. 바이든 행정부 때 일부 안정화를 도모했으나 칩 수출 규제, 남중국해 긴장, 대만 해협 갈등은 지속됐다. 트럼프 2기 출범 후 높은 관세와 첨예한 기술 전쟁이 재개되면서 양국 관계가 다시 경색됐다.`,
  players:`트럼프 대통령은 무역 적자 해소와 제조업 복귀를 최우선 목표로 대중 압박을 가하고 있다. 시진핑은 경제 성장 둔화 속에서도 핵심 이익인 대만·남중국해는 양보하지 않겠다는 입장을 고수한다. 미국 재무장관 베센트와 중국 허리펑 부총리가 실무 협상을 주도하고 있다.`,
  current:`베이징 정상회담 결과 전략적 안정 합의가 도출됐으나 대만·이란 등 핵심 사안에서 갈등의 씨앗이 남아 있다. 양측이 합의 내용 해석에서 엇갈리는 점은 향후 관계의 불확실성을 보여준다.`,
  outlook:`트럼프 귀국 후 의회 보고와 추가 대중 관세 조치 발표 여부가 단기 변수다. 중국의 대미 수입 이행 속도와 대만 해협 군사 동향이 향후 미·중 관계의 방향을 결정할 것이다.`,
  sources:[{title:`Five takeaways from the Trump-Xi summit in Beijing - CNBC`,url:`https://www.cnbc.com/2026/05/14/trump-xi-summit-beijing-takeaway-taiwan-trade-iran-war-strategic-relations-.html`},{title:`Trump-Xi summit: China, US disagree on what they agreed on - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/5/15/trump-xi-summit-china-us-disagree-on-what-they-agreed-on`},{title:`Key takeaways from Trump's China trip - NPR`,url:`https://www.npr.org/2026/05/15/nx-s1-5822512/trump-china-xi-summit-takeaways`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`미·이스라엘-이란 호르무즈 해협 봉쇄 격화…유조선 교전·이란 손실 48억 달러 육박`,
  metrics:[`이란 원유 수입 손실 누적 48억 달러 (4월 13일~5월 1일)`,`봉쇄 유조선 31척·이란산 원유 5,300만 배럴 묶여`],
  summary:`2026년 2월 미국·이스라엘의 이란 공습 및 최고지도자 하메네이 암살을 계기로 시작된 전쟁이 4월 이후 호르무즈 해협 봉쇄로 확전됐다. 미국은 4월 13일부터 이란 항구를 군사 봉쇄했으며, 5월 8일에는 미 해군이 봉쇄를 피해 도주하는 이란 유조선 2척에 발포하는 교전이 발생했다. 트럼프 대통령은 5월 4일 상선 보호 작전인 오퍼레이션 프로젝트 프리덤을 개시했으나, 협상 진전을 이유로 6일 일시 중단했다. 호르무즈 해협은 세계 해상 원유 거래량의 25%, LNG의 20%가 통과하는 핵심 에너지 통로로, 봉쇄 장기화로 국제 유가가 두 자릿수 급등하며 미국 내 휘발유 가격도 갤런당 50센트 이상 올랐다. 베이징 정상회담에서 시진핑이 이란 문제 해결 협조를 약속했으나, 그 내용이 모호해 실효성에 의구심이 남아 있다. 협상이 교착 상태에 빠지면 에너지 공급 충격이 인도·한국·일본 등 주요 수입국에 더 큰 타격을 줄 수 있다는 경고가 나오고 있다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`이란과 오만 사이에 있는 좁은 바닷길로, 세계 원유 해상 물동량의 약 4분의 1이 통과하는 에너지 요충지다. 이 해협이 막히면 국제 유가가 급등해 세계 경제 전반에 충격을 준다.`}],
  history:`미국과 이란 간 긴장은 2018년 트럼프 1기의 이란 핵협정(JCPOA) 탈퇴 이후 지속적으로 고조됐다. 2026년 2월 이스라엘의 이란 핵시설 공격에 미국이 합류해 최고지도자 하메네이 암살에 성공하면서 본격적인 군사 충돌로 발전했다. 이후 미국은 단계적으로 이란 해상 봉쇄를 강화해 왔다.`,
  players:`미국이 이란 봉쇄를 주도하며 이스라엘과 군사 협력 중이다. 이란은 호르무즈 해협 차단 위협과 혁명수비대(IRGC)를 통한 해상 저항으로 대응하고 있다. 인도·한국·일본 등 에너지 수입 의존도가 높은 아시아 국가들이 대체 공급선 확보에 나서고 있으며, 중국도 영향권에 있다.`,
  current:`5월 중순 현재 협상 진전과 교전이 반복되는 불안정한 상황이다. 미국이 주도하는 상선 보호 작전이 일시 중단된 상태이나, 이란 측이 협상에서 신뢰를 주지 못하고 있어 언제든 재개될 수 있다.`,
  outlook:`이란의 새 최고지도자 선출과 핵 협상 재개 여부가 에너지 위기 해소의 핵심 변수다. 6월 이전 협상 돌파구가 마련되지 않으면 여름철 에너지 수요 증가와 맞물려 유가가 더 오를 가능성이 크다.`,
  sources:[{title:`2026 United States naval blockade of Iran - Wikipedia`,url:`https://en.wikipedia.org/wiki/2026_United_States_naval_blockade_of_Iran`},{title:`The U.S. fires on Iranian tankers trying to evade its blockade - NPR`,url:`https://www.npr.org/2026/05/08/g-s1-121061/iran-war-updates`},{title:`How much will US Hormuz blockade hurt Iran - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/4/14/how-much-will-us-hormuz-blockade-hurt-iran-and-does-tehran-have-an-escape`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`한국 개헌안, 야당 보이콧으로 국회 의결 실패…계엄 재발 방지 조항 처리 무산`,
  metrics:[`가결 정족수 197표(국회의원 295명의 2/3) 미달`,`5월 8일 주요 야당, 개헌 표결 전면 불참 선언`],
  summary:`한국 국회에서 추진된 헌법 개정안이 5월 8일 주요 야당의 표결 보이콧으로 의결에 실패했다. 이번 개헌안은 2024년 12월 윤석열 전 대통령의 비상계엄 선포 사태를 계기로 마련된 것으로, 국회의 계엄 해제권 강화와 계엄 재발 방지 장치 마련이 핵심 내용이었다. 개헌 가결에는 국회 재적 의원 295명의 3분의 2인 197표가 필요하나, 야당 불참으로 정족수 확보 자체가 불가능해졌다. 이재명 대통령이 4월 6일 국무회의에서 개헌 공고안을 의결하고 추진했으나, 국민의힘이 6·3 지방선거를 앞두고 여당의 정치적 의도가 담긴 추진이라며 반발해 불참을 선언했다. 국회의장 우원식은 야당과의 교착 상태가 지속될 것을 우려해 헌법 개정안 절차 자체를 중단했다. 2024년 12·3 계엄 사태 이후 제도적 재발 방지책을 입법화하려는 여당의 시도가 무산되면서 개헌 논의가 장기 표류할 가능성이 높아졌다.`,
  keyTerms:[{term:`헌법 개정안`,explanation:`나라의 가장 기본이 되는 법인 헌법을 고치는 것이다. 한국에서는 국회 재적의원 3분의 2 이상이 찬성해야 통과되기 때문에, 여야 협력이 없으면 사실상 불가능하다.`}],
  history:`한국 헌법은 1987년 민주화 항쟁 이후 제6공화국 헌법이 제정된 이래 40년 가까이 개정되지 않았다. 2024년 12월 3일 윤석열 전 대통령이 일방적으로 비상계엄을 선포하면서 헌정 위기가 발생했고, 이재명 정부는 이를 계기로 계엄권 제한을 위한 개헌을 추진했다. 이번 개헌 추진은 1987년 이후 가장 구체화된 개헌 시도로 평가됐다.`,
  players:`이재명 대통령과 집권 민주당이 계엄 방지·헌법 개정을 강하게 추진하고 있다. 야당인 국민의힘은 개헌 내용보다는 추진 시기와 방식에 반발해 불참을 택했다. 국회의장 우원식이 중재자 역할을 맡고 있으나 여야 간 간극을 좁히지 못했다.`,
  current:`개헌안이 5월 국회에서 사실상 부결되면서 당분간 재추진 동력이 크게 꺾인 상태다. 6·3 지방선거를 앞두고 여야 모두 개헌보다 선거에 집중할 것으로 보인다.`,
  outlook:`6·3 지방선거 이후 정치 지형 변화에 따라 개헌 재추진 여부가 결정될 전망이다. 야당이 지방선거에서 의미 있는 성과를 거두면 협력 동력이 더 줄어들 수 있고, 반대로 여당 우세가 확인되면 개헌 논의가 다시 불붙을 가능성도 있다.`,
  sources:[{title:`Lawmakers propose constitutional change; opposition holds back - Korea Herald`,url:`https://www.koreaherald.com/article/10710200`},{title:`Cabinet approves motion to amend parts of the Constitution - Korea Times`,url:`https://www.koreatimes.co.kr/southkorea/politics/20260406/cabinet-approves-motion-to-amend-parts-of-the-constitution`},{title:`South Korea's Political Crisis - CSIS`,url:`https://www.csis.org/programs/korea-chair/projects/south-koreas-political-crisis`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`애플, iOS 27서 타사 AI 서비스 개방…구글·앤트로픽 연동으로 AI 플랫폼 경쟁 새 국면`,
  metrics:[`구글·앤트로픽 등 타사 AI를 애플 인텔리전스와 연동 가능 예정 (iOS 27·macOS 27)`,`세계 일하는 연령 인구의 AI 사용률 17.8% (2026년 1분기, 전분기 대비 +1.5%p)`],
  summary:`애플이 iOS 27, iPadOS 27, macOS 27에서 사용자가 구글이나 앤트로픽 등 타사 AI 서비스를 선택해 애플 인텔리전스 기능에 연동할 수 있도록 하는 플랫폼 대전환을 준비 중인 것으로 알려졌다. 현재까지 애플은 OpenAI의 ChatGPT와의 협력만 공개한 상태였으나, 이번 조치로 AI 생태계를 대폭 개방하게 된다. 사용자는 App Store에서 해당 AI 앱을 설치한 후 기본 AI 공급자로 선택할 수 있게 될 것으로 전해진다. 이는 구글이 제미나이(Gemini) 기반 AI 영상 생성 시스템을 Google I/O 2026에 앞서 공개하려는 움직임과 맞물려, 빅테크 간 AI 패권 경쟁이 새 국면을 맞이하고 있다. OpenAI도 기업 대상 AI 배포·컨설팅 사업체 DeployCo를 100억 달러 기업가치로 론칭해 AI의 기업 도입을 가속화하고 있다. 한편 세계 기업의 76%가 최고AI책임자(CAIO) 직위를 도입했으며, 세계 일하는 연령 인구 중 AI 사용률은 2026년 1분기에 17.8%로 높아졌다.`,
  keyTerms:[{term:`애플 인텔리전스`,explanation:`애플이 자사 기기에 탑재한 AI 기능 브랜드로, 문서 요약·이미지 생성·시리 강화 등을 제공한다. 이번 개방 조치로 OpenAI 외에도 구글·앤트로픽의 AI를 연동할 수 있게 된다.`}],
  history:`애플은 2024년 WWDC에서 애플 인텔리전스를 처음 공개하며 AI 시장에 본격 진입했다. 초기에는 OpenAI의 ChatGPT만 연동했으며, 경쟁사 AI와의 협력은 폐쇄적 생태계 정책에 반한다는 이유로 배제했다. 그러나 구글, 메타, 마이크로소프트 등이 AI 기능을 급격히 강화하면서 애플의 AI 경쟁력이 뒤처진다는 비판이 제기됐다.`,
  players:`애플이 AI 생태계를 개방하면, 구글의 제미나이와 앤트로픽의 클로드(Claude)가 애플 기기에서 OpenAI와 경쟁하게 된다. 소비자 입장에서는 선택권이 늘어나지만, 데이터 보안과 프라이버시 문제가 새로운 쟁점으로 떠오를 수 있다. 각국 규제기관은 AI 모델 공개 전 안전성 테스트 의무화를 추진하고 있다.`,
  current:`AI 플랫폼 시장의 주도권을 둘러싼 빅테크 간 경쟁이 하드웨어에서 소프트웨어·서비스로 무게중심이 이동하고 있다. 애플의 이번 개방 결정은 반독점 규제 압박도 일정 부분 반영된 것으로 보인다.`,
  outlook:`iOS 27 베타 발표가 예정된 WWDC 2026에서 구체적인 타사 AI 연동 방식과 조건이 공개될 것으로 예상된다. AI 서비스 제공 기업들의 애플 생태계 진입 여부와 조건이 향후 AI 산업 구도를 크게 좌우할 전망이다.`,
  sources:[{title:`AI Update, May 15, 2026: AI News and Views From the Past Week - MarketingProfs`,url:`https://www.marketingprofs.com/opinions/2026/54786/ai-update-may-15-2026-ai-news-and-views-from-the-past-week`},{title:`7 Explosive AI Updates in May 2026 That Every Founder Must Know - imFounder`,url:`https://imfounder.com/science-tech/ai/ai-updates-may-2026/`},{title:`Five Emerging AI Trends in May 2026 - Educational Technology and Change Journal`,url:`https://etcjournal.com/2026/05/11/five-emerging-ai-trends-in-may-2026-a-digital-twin-of-human-neural-activity/`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`과학자들, 2026년 7월 엘니뇨 발생 확률 61% 경고…폭염·가뭄·산불 극단화 우려`,
  metrics:[`2026년 7월 엘니뇨 발생 확률 61% (기후과학자 공동 전망)`,`2026년 상반기 지표면 온도·해수면 온도 등 복수 기후 지표 신기록 경신`],
  summary:`기후과학자들이 이미 기록적인 수치를 경신하고 있는 2026년에 엘니뇨까지 발생할 경우 극단적 기상 현상이 더욱 심화될 것이라고 경고했다. 과학자들은 2026년 7월 엘니뇨가 출현할 확률을 61%로 분석했으며, 이는 폭염, 산불, 가뭄, 집중호우 등 기상 극단 현상을 가속화하는 주요 원인이 될 수 있다. 그린란드 빙하는 1990년 이후 용해수 생산량이 급격히 증가하고 있으며, 극단적 용해 사건이 더욱 빈번하고 광범위해지고 있다. 또한 대서양의 주요 해양 순환 시스템(AMOC)이 약화되고 있다는 강력한 증거도 새롭게 발견됐다. 남극 해저 빙하도 예상보다 빠르게 녹아 해수면 상승 가속화 우려가 커지고 있으며, 호주와 남극 사이 맥쿼리 섬에서는 폭풍이 과거보다 훨씬 강한 강수를 쏟아내고 있다. 특히 산불 위험이 높은 북미와 호주, 가뭄에 취약한 아프리카 사헬 지역에 선제적 대비가 시급하다는 촉구가 이어지고 있다.`,
  keyTerms:[{term:`엘니뇨`,explanation:`태평양 적도 부근 해수면 온도가 평년보다 높아지는 현상으로, 전 세계 날씨에 연쇄 영향을 미친다. 엘니뇨가 발생하면 일부 지역은 폭염과 가뭄, 다른 지역은 폭우와 홍수가 심해지는 경향이 있다.`}],
  history:`엘니뇨는 수년 주기로 반복되는 자연 기후 현상으로, 1997~98년과 2015~16년에 특히 강한 엘니뇨가 발생해 전 세계적으로 극심한 가뭄과 홍수를 초래했다. 지구온난화로 평균 기온이 상승하면서 엘니뇨와 라니냐 등 기후 변동성이 증폭되는 추세다. 2023~24년에도 강력한 엘니뇨가 발생해 세계 곳곳에서 기록적인 폭염과 산불이 잇따랐다.`,
  players:`세계기상기구(WMO)와 미국 NOAA가 엘니뇨 감시와 전망을 담당하며, 이들의 경고에 각국 정부가 대응 계획을 수립한다. 기후 취약국인 소도서 국가들과 농업 의존도가 높은 개발도상국들이 가장 직접적인 피해를 입는다. 보험사와 식량 공급망 기업들도 엘니뇨 리스크를 선제적으로 관리하고 있다.`,
  current:`이미 여러 기후 지표가 신기록을 갈아치우고 있는 상황에서 엘니뇨까지 더해지면 2026년 하반기는 기후 재난이 한꺼번에 몰아칠 수 있다는 우려가 크다. AMOC 약화와 그린란드 빙하 용해 가속이라는 장기적 변화도 새롭게 과학적으로 확인되고 있어 우려가 더욱 깊어지고 있다.`,
  outlook:`7월 엘니뇨 발생 여부가 2026년 여름의 기상 패턴을 결정할 핵심 지표다. UN은 6월 예정된 기후 회의에서 각국에 적응 계획 강화를 촉구할 것으로 예상된다.`,
  sources:[{title:`Scientists warn El Nino could intensify climate extremes in 2026 - Climate Change News`,url:`https://www.climatechangenews.com/2026/05/12/scientists-warn-el-nino-could-intensify-climate-extremes-in-2026/`},{title:`2026 Has Already Broken Climate Records. El Nino Could Break More - Eos`,url:`https://eos.org/research-and-developments/2026-has-already-broken-climate-records-el-nino-could-break-more`},{title:`Climate change is accelerating but nature is slowing down - ScienceDaily`,url:`https://www.sciencedaily.com/releases/2026/02/260217005714.htm`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`삼성전자 노사 분규 격화…반도체 슈퍼사이클 속 파업 현실화 시 수출 타격 우려`,
  metrics:[`삼성전자 세계 메모리 반도체 시장 점유율 약 40%`,`5월 전체 반도체 수출 330억~340억 달러 목전, 파업 시 생산 차질 불가피`],
  summary:`삼성전자 노조와 회사 측 간 임금 협상이 교착 상태에 빠지면서 한국 경제·금융 당국이 5월 중 파업이 현실화되지 않도록 조기 해결을 강력히 촉구했다. 당국은 반도체 슈퍼사이클이 본격화된 시점에 파업이 발생하면 세계 메모리 공급에 차질이 생겨 국가 경제에 큰 타격을 줄 수 있다고 경고했다. 삼성전자는 세계 메모리 반도체 시장의 약 40%를 점유하고 있으며, AI 데이터센터 구축에 필수적인 HBM(고대역폭 메모리) 공급에도 영향을 줄 수 있다. 5월 초순 한국 반도체 수출이 149.8% 급증하는 호황 국면에서 파업 위기가 겹치며 업계의 긴장감이 고조되고 있다. 노조 측은 역대 최대 실적에 비해 임금 인상 폭이 턱없이 부족하다는 입장이며, 회사 측은 글로벌 경쟁력 유지를 위한 비용 관리가 필요하다고 맞서고 있다. 한국 정부는 파업이 현실화될 경우 법적 대응과 노사 중재를 병행할 방침이다.`,
  keyTerms:[{term:`파업`,explanation:`노동자들이 임금이나 처우 개선을 요구하며 집단적으로 일을 멈추는 행동이다. 삼성전자처럼 핵심 산업에서 파업이 일어나면 전 세계 공급망에 영향을 미쳐 국가 경제에도 타격을 줄 수 있다.`}],
  history:`삼성전자는 오랫동안 무노조 경영 방침을 고수해왔으나 2020년 노조가 설립되면서 노사 관계가 변화하고 있다. 2024년에도 단기 파업이 발생한 바 있으며, 그때마다 정부와 경영계가 조기 해결을 촉구했다. 반도체 산업은 생산 연속성이 핵심인 장치 산업으로, 짧은 파업도 수백억 원 이상의 손실로 이어질 수 있다.`,
  players:`삼성전자 노조(전국삼성전자노동조합)는 임금 인상과 성과급 체계 개선을 요구하고 있다. 회사 측은 경영 판단에 따른 임금 체계 유지가 필요하다는 입장이다. 정부는 반도체를 전략 산업으로 보호하는 차원에서 노사 중재에 적극 개입하겠다는 방침이다.`,
  current:`5월 반도체 수출이 사상 최대 실적을 앞두고 있는 시점에 파업 위기가 겹치면서 시장의 우려가 커지고 있다. 정부의 조기 해결 촉구에도 노사 협상 일정이 구체화되지 않아 긴장감이 지속되고 있다.`,
  outlook:`삼성전자 노조는 5월 말~6월 초 파업 찬반 투표를 진행할 가능성이 있다. 투표 결과와 회사 측의 추가 협상 제안 여부가 파업 현실화 여부를 결정할 핵심 변수다.`,
  sources:[{title:`Business | The Korea Herald`,url:`https://www.koreaherald.com/Business/Economy`},{title:`South Korea News - Trading Economics`,url:`https://tradingeconomics.com/south-korea/news`},{title:`KED Global - Korea Economic Daily`,url:`https://www.kedglobal.com/`}]
}]

  tag:`2026-05-15`,
  label:`2026년 5월 15일 (금)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`한국 반도체 수출 149.8% 폭증, KOSPI 7,498 사상 최고치 돌파`,
  metrics:[`5월 1~10일 수출 184억 달러, 전년比 43.7% 증가`,`반도체 수출 85억 달러, 전년比 149.8% 급증`],
  summary:`AI 수요 폭발로 한국 반도체 수출이 유례없는 호황을 맞이하고 있다. 5월 1일부터 10일까지 수출액은 전년 동기 대비 43.7% 증가한 184억 달러를 기록했으며, 이 중 반도체 수출만 85억 달러로 149.8%의 폭발적 성장을 보였다. 이러한 수출 호조는 AI 서버와 데이터센터 수요 급증에 따른 고대역폭 메모리(HBM) 및 낸드플래시 주문이 급증한 결과다. 주식시장에서도 반도체 종목이 투자심리를 견인하며 코스피 지수가 7,498포인트로 사상 최고치를 경신하고 4거래일 연속 상승세를 이어갔다. 한국개발연구원(KDI)은 이러한 반도체 슈퍼사이클 효과를 반영해 2026년 한국 경제 성장률 전망치를 2.5%로 0.6%포인트 상향 조정했다. 골드만삭스는 올해 한국 경상수지 흑자가 GDP 대비 10%를 넘어설 것으로 예상하며, 이는 중동 산유국과 비슷한 규모다. 다만 중동 전쟁 영향으로 유가가 상승하며 소비자물가 상승률이 2.7%까지 오를 것으로 전망돼, 에너지 비용 부담이 수출 호황의 그늘로 작용하고 있다.`,
  keyTerms:[{term:`반도체 슈퍼사이클`,explanation:`반도체 수요가 공급을 크게 초과하면서 수년간 가격과 실적이 동반 급등하는 현상이다. 현재는 AI 학습·추론용 특수 반도체 수요가 구조적으로 폭발하면서 이전 사이클보다 더 강하고 긴 호황이 이어지고 있다.`}],
  history:`한국은 2000년대부터 삼성전자·SK하이닉스를 중심으로 세계 메모리 반도체 시장을 선도해왔다. 2023~2024년 업황 침체를 겪은 뒤, AI 붐과 함께 2025년 하반기부터 급격한 회복세에 접어들었다. 현 호황은 단순 경기 회복이 아니라 AI 학습·추론용 반도체 수요가 구조적으로 확대되는 새로운 국면이라는 점에서 이전 사이클과 다르다.`,
  players:`삼성전자와 SK하이닉스는 HBM 공급의 대부분을 차지하며 엔비디아·AMD 등 AI 칩 설계사의 핵심 파트너로 부상했다. 미국의 AI 데이터센터 투자 러시가 주요 수요처이며, 중국계 기업은 대미 수출 제한으로 한국 제품의 반사이익을 높이고 있다. 정부는 반도체 연구개발 지원과 세제 혜택으로 업계를 측면 지원 중이다.`,
  current:`AI 모델 대형화 추세와 글로벌 데이터센터 증설이 맞물리면서 HBM 수요는 적어도 2027년까지 공급을 초과할 것으로 예측된다. 반도체 슈퍼사이클이 한국 경제 전체를 견인하는 핵심 동력으로 자리잡은 상황이다.`,
  outlook:`6월 삼성전자·SK하이닉스의 2분기 잠정실적 공시가 시장의 다음 분수령이 될 전망이다. 미중 갈등과 희토류 공급 불안이 반도체 공급망에 미치는 영향도 지속 모니터링이 필요하다.`,
  sources:[{title:`반도체 앞세운 5월 수출 호조…수입물가는 불안 - 비즈워치`,url:`https://news.bizwatch.co.kr/article/finance/2026/05/08/0038`},{title:`KDI, 한국 2026년 성장 전망 2.5%로 상향 - Korea Herald`,url:`https://www.koreaherald.com/article/10737210`},{title:`반도체 수출 3개월 연속 300억달러 가시권 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202605130603223288`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`케빈 워시, 미 연방준비제도 의장 취임…고인플레 속 기준금리 3.50~3.75% 동결 유지 전망`,
  metrics:[`상원 인준 찬성 54표 대 반대 45표 — 연준 역사상 가장 분열된 인준 표결`,`3월 미국 소비자물가지수(CPI) 전년比 3.3% 상승, 인플레 재가속 우려`],
  summary:`미국 연방준비제도(Fed)가 15일 제롬 파월 전 의장의 임기 만료와 함께 케빈 워시 신임 의장 체제로 전환됐다. 상원은 13일 54대 45의 표결로 워시를 인준했는데, 이는 연준 역사상 가장 분열된 인준으로 기록된다. 민주당에서는 존 페터먼 상원의원 한 명만 찬성표를 던졌다. 워시 신임 의장은 인플레이션 억제를 최우선 과제로 내세우며 기준금리 동결 기조를 유지할 것이라는 시장의 전망을 뒷받침했다. 시장 참가자의 97%는 6월 16~17일 워시 주재 첫 연방공개시장위원회(FOMC) 회의에서 금리가 현 3.50~3.75% 수준에서 기준금리 동결될 것으로 예상하고 있다. 3월 CPI가 전년 대비 3.3% 상승하면서 인플레이션 재가속 우려가 커진 만큼, 긴축 기조는 당분간 이어질 가능성이 높다. 트럼프 대통령은 금리 인하를 반복적으로 요구해왔지만, 워시는 백악관의 지시가 아닌 독자적 판단으로 통화정책을 운영하겠다고 밝혔다. 파월 시대의 소통 중심 스타일과 달리 워시는 발언을 줄이고 물가 안정에 집중하는 방식으로 연준을 이끌 것이라는 평가가 지배적이다.`,
  keyTerms:[{term:`기준금리 동결`,explanation:`중앙은행이 경제 상황을 지켜보면서 이자율을 올리거나 내리지 않고 현재 수준 그대로 유지하는 결정이다. 금리를 내리면 경기를 살릴 수 있지만 물가가 더 오를 수 있고, 올리면 물가는 잡히지만 경기가 식으므로, 인플레가 높은 현재는 동결로 관망하는 것이다.`}],
  history:`연방준비제도는 2022~2023년 금리를 급격히 인상해 4% 중반대까지 올린 뒤, 2024~2025년 인하 사이클로 전환해 3.50~3.75%까지 내렸다. 그러나 이란 전쟁으로 에너지 가격이 재차 급등하면서 인플레이션이 다시 고개를 들었고, 추가 인하는 사실상 멈춘 상태다.`,
  players:`케빈 워시는 2006~2011년 연준 이사를 역임한 통화정책 전문가로, 트럼프 대통령의 지명을 받았다. 민주당은 연준 독립성 침해를 우려하며 거의 전원 반대표를 던졌다. 월가는 워시가 인플레이션 파이터라는 점을 높이 평가하면서도 트럼프의 압력에 굴복할 가능성을 경계하고 있다.`,
  current:`중동 분쟁이 지속되며 에너지·물류 비용 상승이 이어지는 상황에서 워시는 취임 직후부터 고인플레이션과 경기 둔화가 동시에 나타나는 스태그플레이션 리스크라는 시험대에 직면했다.`,
  outlook:`6월 FOMC가 워시 의장의 첫 공개 행보이자 시장의 최대 관심 이벤트다. 금리 인하 신호를 내비치면 달러 약세와 미국 국채 금리 급락이 예상되고, 강경 동결 기조를 유지하면 신흥국 자금이탈 우려가 부각될 수 있다.`,
  sources:[{title:`Kevin Warsh 연준 의장 상원 인준 확정 - CNBC`,url:`https://www.cnbc.com/2026/05/13/kevin-warsh-wins-senate-confirmation-as-the-next-federal-reserve-chair.html`},{title:`인플레이션 고조 속 워시 취임 배경 - Yahoo Finance`,url:`https://finance.yahoo.com/economy/policy/article/kevin-warsh-confirmed-new-fed-chair-as-inflation-kicks-higher-complicating-the-central-banks-path-164303609.html`},{title:`케빈 워시, 논란 속 연준 의장 취임 - Al Jazeera`,url:`https://www.aljazeera.com/economy/2026/5/13/kevin-warsh-confirmed-as-new-us-federal-reserve-chair-amid-controversy`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`트럼프-시진핑 베이징 회담, 희토류 무역 휴전 연장 협상…반도체 공급망 촉각`,
  metrics:[`미중 희토류 무역 휴전 만료 시한: 2026년 가을`,`중국이 세계 희토류 정제·가공의 85% 이상 장악`],
  summary:`트럼프 미국 대통령과 시진핑 중국 주석이 13~14일 베이징 정상회담에서 논의한 핵심 경제 의제 중 하나는 희토류 무역 휴전 연장이었다. 지난해 가을 양국이 체결한 이 협정은 미국의 대중 관세 인하와 중국의 희토류 수출 제한 해제를 맞교환하는 방식으로 마련됐으나, 만료 시한이 올 가을로 다가온 상황이다. 미국 측 관리는 희토류 무역 휴전이 현재도 유효하다고 확인했으며, 양측은 이번 회담에서 연장 가능성을 논의한 것으로 알려졌다. 중국은 세계 희토류 생산의 약 60%, 정제 가공의 85% 이상을 장악하고 있어, 수출을 차단하면 미국의 반도체·항공·방위산업에 즉각적인 타격이 가해진다. 트럼프 대통령은 중국산 수입품에 세 자릿수 관세를 부과하는 강경 기조를 유지하면서도, 이번 회담에서 경제협력 확대 의지를 내비쳤다. 두 정상은 또한 호르무즈 해협이 개방 상태를 유지해야 한다는 데 합의하고, 중국의 미국산 석유 구매 확대도 논의했다. 희토류 무역 휴전이 연장되지 않을 경우 한국·일본·대만의 반도체 공급망도 타격을 받을 수 있어, 전 세계 관련 산업이 협상 결과에 촉각을 곤두세우고 있다.`,
  keyTerms:[{term:`희토류 무역 휴전`,explanation:`희토류는 전기차·반도체·군사 무기 등 첨단 산업 전반에 필수적인 광물이고, 중국이 세계 공급을 거의 독점한다. 희토류 무역 휴전이란 미국과 중국이 무역 전쟁을 일시 중단하면서 중국이 희토류 수출을 재개하고 미국은 관세를 낮추기로 한 임시 협정이다.`}],
  history:`미중 무역 전쟁은 2018년 트럼프 1기 시절 관세 폭탄으로 시작됐고, 바이든 행정부에서도 기술 제재 형태로 지속됐다. 트럼프 2기 들어 관세가 다시 급격히 인상됐고, 중국은 희토류 수출 제한을 보복 카드로 꺼내들었다. 지난해 한국에서 열린 트럼프-시 정상회담에서 1년간의 무역 휴전 협정이 체결됐다.`,
  players:`미국은 자국 방위·첨단기술 산업의 희토류 공급 안정이 시급하고, 중국은 관세 인하와 반도체 장비 규제 완화를 원한다. 엔비디아의 젠슨 황, 테슬라·스페이스X의 일론 머스크 등 미국 재계 거물들이 트럼프를 수행해 베이징을 방문했다.`,
  current:`희토류 무역 휴전 만료를 앞두고 양측 모두 연장에 관심이 있는 것으로 보이지만, 대만 문제와 이란 전쟁에서의 역할 갈등이 협상의 불확실성을 높이고 있다.`,
  outlook:`2026년 가을 이전에 연장 합의 여부가 판가름 날 전망이다. 협정 실패 시 희토류 가격 급등과 글로벌 공급망 교란이 우려된다. 베이징 회담 공동 선언문 채택 내용이 다음 핵심 신호가 된다.`,
  sources:[{title:`Trump-Xi 정상회담 희토류 분석 - Foreign Policy`,url:`https://foreignpolicy.com/2026/05/12/trump-xi-china-summit-rare-earth-trade-critical-minerals/`},{title:`미중 무역·희토류·대만·AI 회담 전반 - CNBC`,url:`https://www.cnbc.com/2026/05/14/trump-xi-beijing-summit-trade-taiwan-ai-iran-rare-earths-tariffs.html`},{title:`미중 희토류 협정 유지 확인 - US News`,url:`https://www.usnews.com/news/world/articles/2026-05-10/rare-earths-deal-between-us-and-china-is-still-in-effect-us-official-says`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`트럼프 '이란 휴전 생명 유지 장치 위에 있어'…전쟁 재개 가능성 최고조`,
  metrics:[`이란전쟁 75일째 지속, 컨테이너선사 하팍-로이드 주당 추가 비용 5,000~6,000만 달러`,`트럼프 보좌진, 대규모 군사작전 재개 카드 그 어느 때보다 심각하게 검토 중`],
  summary:`도널드 트럼프 미국 대통령이 14일 이란과의 휴전 협정이 사실상 사망 직전이라고 밝히면서 전쟁 재개 가능성이 급격히 고조됐다. 트럼프는 이란이 보내온 협상 역제안을 읽다가 중간에 멈출 만큼 형편없는 내용이라고 혹평했다. 이란 측은 모든 전선 전쟁 종식, 미국의 이란산 원유 판매 제재 해제, 호르무즈 해협 봉쇄 해제, 동결 자산 반환 등을 요구했다. 반면 미국은 이란의 핵 프로그램 즉각 포기를 선결 조건으로 내세웠으며, 양측 간 입장 차는 전혀 좁혀지지 않고 있다. 호르무즈 해협 봉쇄 장기화로 세계 최대 컨테이너 선사 중 하나인 하팍-로이드는 주당 5,000만~6,000만 달러의 추가 비용을 부담하고 있으며, 국제 원유·물류 시장에도 심각한 타격이 지속되고 있다. 이란 의회 의장은 이슬람공화국 군이 어떤 공격에도 대응 준비가 돼 있다고 경고했다. 트럼프 측 일부 보좌관은 대규모 군사작전 재개를 그 어느 때보다 심각하게 검토하고 있는 것으로 알려졌다. 트럼프 대통령은 베이징 방문을 마치고 귀국한 뒤 이란 문제에 대한 최종 결정을 내릴 것으로 전망된다.`,
  keyTerms:[{term:`호르무즈 해협 봉쇄`,explanation:`호르무즈 해협은 중동의 페르시아만과 인도양을 연결하는 좁은 바닷길로, 전 세계 석유 물동량의 약 20%가 이 곳을 통과한다. 이란이 이 해협을 막으면 원유 공급이 끊겨 국제 유가가 급등하고 한국처럼 중동 원유를 많이 수입하는 나라들이 즉각 타격을 받는다.`}],
  history:`2026년 초 미국과 이스라엘은 이란의 핵 시설 및 군사 거점에 대한 공동 작전을 개시했다. 75일 이상 지속된 이 전쟁은 이란의 호르무즈 해협 봉쇄, 미국의 이란 항구 봉쇄 등으로 세계 에너지 공급에 심각한 타격을 입혔다. 수주 전 양측은 잠정 휴전에 합의했지만, 핵 프로그램 협상에서 이견이 좁혀지지 않고 있다.`,
  players:`미국·이스라엘이 한편, 이란이 다른 편으로 대립하고 있다. 중국은 이란산 원유 주요 수입국으로 이란을 우회적으로 지지하는 한편, 호르무즈 개방에는 이해를 같이한다. 트럼프는 중동 분쟁 해결을 외교 치적으로 삼으려 하지만, 이란의 핵 포기 요구라는 높은 목표 설정이 협상을 더욱 어렵게 만들고 있다.`,
  current:`양측 모두 추가 양보 의향 없이 강경 입장을 고수하면서 협상이 완전히 교착 상태에 빠졌다. 트럼프가 중국 방문을 마치고 귀국한 뒤 최종 결정을 내릴 것으로 예상되며, 이 시점이 사실상 전쟁 재개 여부의 분수령이다.`,
  outlook:`트럼프 귀국 직후 이란에 대한 최후통첩 가능성이 있다. 휴전이 붕괴될 경우 국제 유가는 즉각 급등하고 글로벌 금융시장 변동성이 확대될 전망이다. 이란의 핵 협상 수용 여부가 최대 변수다.`,
  sources:[{title:`이란 휴전 교착 75일차 상황 - CNN`,url:`https://www.cnn.com/2026/05/13/world/live-news/trump-iran-war-news`},{title:`트럼프의 이란 대응 옵션 분석 - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/5/13/trump-faces-slew-of-bad-options-on-iran-as-diplomacy-falters`},{title:`이란 전쟁·중국 회담 병행 속 협상 교착 - CBS News`,url:`https://www.cbsnews.com/live-updates/iran-war-us-trump-china-xi-summit-ceasefire-peace-talks-stalled/`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`시진핑, 트럼프에 대만 문제 경고 '잘못 다루면 미중 충돌'…10년 만의 미 대통령 중국 방문`,
  metrics:[`10년 만의 미국 현직 대통령 중국 방문`,`시진핑 '대만 독립은 미중 관계에서 가장 중요한 문제'라고 명시`],
  summary:`도널드 트럼프 미국 대통령이 13일 베이징에 도착해 시진핑 중국 주석과 이틀간의 정상회담을 개시했다. 이번 방문은 약 10년 만의 미국 현직 대통령 중국 방문으로, 이란 전쟁·무역·대만·AI 등 미중 관계 전반이 논의됐다. 시진핑은 회담에서 가장 날카로운 발언을 대만 독립 문제에 집중했다. 그는 대만 독립 문제가 잘못 다뤄지면 미중 양국이 충돌과 갈등에 빠질 수 있다고 경고하며, 잘 처리하면 관계가 유지되고 잘못 처리하면 두 나라는 충돌 위험에 빠진다고 강조했다. 미국 측 회담 결과 발표문에는 대만 관련 내용이 빠졌고, 대신 경제협력 확대와 호르무즈 해협 개방 합의, 중국의 미국산 석유 구매 확대 논의 등이 포함됐다. 트럼프를 수행한 방중단에는 엔비디아의 젠슨 황과 테슬라·스페이스X의 일론 머스크 등 미국 빅테크·재계 거물들이 포함됐다. 회담은 이란 핵 협상 교착 상황 속에 진행돼 트럼프가 중국의 이란 영향력을 활용하려는 포석이 깔려 있다는 분석이 나온다.`,
  keyTerms:[{term:`대만 독립`,explanation:`대만은 1949년 이후 사실상 독립적으로 운영되는 섬이지만, 중국은 대만을 자국 영토로 간주하며 독립을 절대 용납하지 않겠다는 입장이다. 미국이 대만에 무기를 팔거나 독립을 지지하는 행동을 할 때마다 중국이 강하게 반발하는 이유가 여기에 있다.`}],
  history:`미중 관계는 트럼프 1기 무역 전쟁, 바이든 시대의 기술 패권 경쟁을 거치며 수십 년간 최악 수준으로 악화됐다. 지난해 한국에서 열린 트럼프-시 정상회담에서 무역 휴전이 합의됐고, 이번 베이징 회담은 그 후속이다. 대만은 1949년 이후 양측 간 최대 민감 현안으로, 미국의 무기 지원과 중국의 주권 주장이 수십 년간 충돌해왔다.`,
  players:`트럼프는 이란 전쟁 출구 전략과 대중 무역 균형을 모두 해결해야 하는 복잡한 방정식을 안고 있다. 시진핑은 대만 문제의 레드라인을 명확히 하면서 희토류와 무역을 협상 지렛대로 활용하고 있다. 젠슨 황·머스크 등 재계 인사들은 중국 시장과 공급망 안정이 자사 이익에 직결된다.`,
  current:`이번 회담은 미중 양국이 완전한 디커플링 대신 선택적 협력을 모색하는 분수령으로 평가된다. 대만 억제와 경제협력 유지라는 두 가지 목표가 공존하는 복잡한 협상 구도가 형성됐다.`,
  outlook:`회담 마무리 공동 성명의 대만 관련 표현이 핵심 변수다. 무역 휴전 연장 합의 여부와 이란 협상에서 중국이 어떤 역할을 맡을지가 다음 관심사다.`,
  sources:[{title:`시진핑 대만 경고 전문 - CNBC`,url:`https://www.cnbc.com/2026/05/14/trump-xi-beijing-summit-trade-taiwan-ai-iran-rare-earths-tariffs.html`},{title:`트럼프 베이징 도착, 정상회담 개막 - CNN`,url:`https://www.cnn.com/2026/05/13/politics/live-news/trump-china-visit-arrival-ceremony-hnk`},{title:`중국 대만 충돌 경고 - NPR`,url:`https://www.npr.org/2026/05/14/nx-s1-5822168/trump-xi-summit`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`트럼프, 한국 포함 5개국에 호르무즈 군함 파견 요구…한국 정부 '신중 검토' 답변`,
  metrics:[`한국 원유 수입의 70% 이상이 호르무즈 해협 통과`,`영국·독일·호주·중국 등 주요국은 이미 파병 거부 의사 표명`],
  summary:`트럼프 미국 대통령이 한국·중국·일본·프랑스·영국 등 5개국을 직접 거명하며 호르무즈 해협에 군함을 파견하라고 요구한 가운데, 한국 정부가 15일 신중한 검토 입장을 밝혔다. 청와대는 한미 간에 긴밀히 소통하며 신중히 검토해 나갈 것이라고 밝혔으나 구체적인 파병 여부에는 답하지 않았다. 영국·독일·호주 등 서방 동맹국들과 중국이 잇따라 파병 거부 의사를 밝힌 상황에서 한국이 어떤 결정을 내릴지 국제사회가 주목하고 있다. 한국은 원유 수입의 70% 이상이 호르무즈 해협을 통과하기 때문에 이란의 봉쇄로 에너지 안보에 즉각적인 타격을 받을 수 있는 처지다. 그러나 군함 파견은 이란과의 직접 교전 가능성을 내포하며, 국회의 집단자위권 행사 동의 절차가 필요하다. 집단자위권 행사 여부를 두고 여야 간 입장 차가 크고, 야당은 한국군이 전쟁에 끌려들어가는 것에 강력히 반대하고 있다. 한미 국방장관 회담에서도 전작권 전환과 핵잠수함 문제는 진전 없이 마무리됐으며, 호르무즈 파병이 최대 의제로 부상했다.`,
  keyTerms:[{term:`집단자위권`,explanation:`동맹국이 공격받을 때 자국이 직접 공격을 받지 않아도 함께 반격할 수 있는 권리다. 한국이 호르무즈 해협에 군함을 보내 미국의 이란 군사 작전을 지원하면 집단자위권을 행사하는 것이 되는데, 이는 헌법 해석과 국회 동의가 필요한 민감한 사안이다.`}],
  history:`한국은 2009년부터 아덴만 해적 퇴치를 위해 청해부대를 파병해왔으나, 이를 이란과 교전이 진행 중인 호르무즈 해협으로 전환 배치하는 것은 완전히 다른 문제다. 트럼프는 이란전쟁 개시 직후부터 동맹국들에 군사 분담 요구를 강화해왔고, 3월 15일 5개국 직접 거명으로 압박 수위를 최고조로 높였다.`,
  players:`이재명 정부는 한미동맹 유지와 국내 반전 여론 사이에서 딜레마에 처해 있다. 국민의힘은 동맹 의무 이행 측면에서 파병에 전향적인 입장이고, 더불어민주당은 반대 입장이다. 미국은 한국의 기여 수준에 따라 방위비 분담금 협상에 연계할 가능성을 시사했다.`,
  current:`6월 3일 지방선거를 앞둔 시점에서 호르무즈 파병 문제는 안보 현안을 넘어 국내 정치 변수로도 작동하고 있다. 주요 서방 동맹국들이 잇따라 거부하면서 한국에 대한 미국의 압박이 더욱 강해지고 있다.`,
  outlook:`이재명 대통령의 최종 결정이 가장 큰 변수다. 파병을 결정할 경우 국회 동의 절차와 이란의 반응이 뒤따를 수 있다. 한미 방위비 분담금 협상도 이 문제와 연동될 가능성이 크다.`,
  sources:[{title:`자국 선박 피격에도 군함 못 보내는 한국의 딜레마 - 뉴데일리`,url:`https://www.newdaily.co.kr/site/data/html/2026/05/14/2026051400217.html`},{title:`한미 국방장관 회담, 호르무즈 파병 중심 - 뉴스핌`,url:`https://www.newspim.com/news/view/20260512001137`},{title:`호르무즈 파병 논란, 청해부대와 차이점 분석 - 리포터아`,url:`https://www.reportera.co.kr/military/hormuz-strait-deployment-controversy-different-from-cheonghae/comment-page-1/`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`앤트로픽 미토스 AI, 수천 개 사이버 취약점 발견…보안 패러다임 대격변 경고`,
  metrics:[`맥OS 포함 수천 개 소프트웨어 취약점 발견`,`공식 접근 허용 기업 단 4곳 (애플·아마존·JP모건·팔로알토 네트웍스)`],
  summary:`앤트로픽이 개발한 초고성능 AI 모델 미토스(Mythos)가 인류의 소프트웨어 인프라 전반에 걸쳐 수천 개의 기존에 알려지지 않은 AI 사이버 취약점을 발견한 것으로 드러나 전 세계 사이버보안 전문가들에게 충격을 안겼다. 앤트로픽은 악의적 사용 위험을 줄이기 위해 미토스 접근권을 애플·아마존·JP모건체이스·팔로알토 네트웍스 등 4개사로 한정했다. 그러나 모델 발표 직후 소규모 불법 사용자 그룹이 사설 온라인 포럼을 통해 미토스에 무단 접근한 사실이 드러나 보안 우려를 증폭시켰다. 앤트로픽 CEO 다리오 아모데이는 사이버 위협의 순간적 전환점이 찾아왔다고 경고했다. 5월 14일에는 미토스가 새로운 맥OS 취약점을 노출했다는 보고도 나왔다. 전문가들은 AI 사이버 취약점 발견 능력이 기존 AI 모델로도 어느 정도 가능한 수준이라며 과도한 공황을 경계하면서도, 방어 측보다 공격 측이 먼저 이 기술을 활용할 수 있다는 구조적 위험은 분명히 존재한다고 지적한다. 이번 사태를 계기로 미국 정부는 구글·마이크로소프트·xAI와 AI 모델 사전 심사 협정을 체결하며 규제 체계 구축을 가속화하고 있다.`,
  keyTerms:[{term:`AI 사이버 취약점`,explanation:`소프트웨어에는 해커가 침투할 수 있는 보안상 허점(취약점)이 존재한다. AI 사이버 취약점이란 AI가 기존보다 훨씬 빠르고 광범위하게 이러한 허점을 찾아내는 능력을 말한다. 미토스처럼 강력한 AI가 이를 발견하면, 방어보다 공격에 먼저 활용될 경우 전 세계 디지털 인프라가 한꺼번에 위협받을 수 있다.`}],
  history:`앤트로픽의 미토스 모델은 2026년 초 데이터 유출로 존재가 외부에 알려졌고, 3월 포춘지 보도를 통해 능력의 일단이 공개됐다. AI를 활용한 사이버보안은 악성코드 탐지, 자동 패치 등에서 빠르게 확산됐으나 공격에의 악용 가능성이 항상 우려의 대상이었다.`,
  players:`앤트로픽은 안전 중심 AI 개발을 표방하며 제한적 배포 방식을 선택했다. 미국 정부 기관은 국가안보 차원에서 AI 사이버 위협을 예의주시하며 사전 심사 규제 논의 중이다. 글로벌 금융기관과 중앙은행들도 AI 사이버 위협 대비 방어 역량 강화를 서두르고 있다.`,
  current:`미토스 무단 접근 사건과 맥OS 취약점 노출 보고가 잇따르면서 AI 안전 거버넌스 부재에 대한 경고음이 커지고 있다. AI가 사이버 공격의 민주화를 이끌 수 있다는 우려가 정책 입안자들의 최우선 과제로 부상했다.`,
  outlook:`미국 정부의 AI 모델 사전 심사 행정명령 발동 여부가 다음 핵심 이벤트다. 유럽연합도 미토스 접근권 제공을 요구하고 있어 국제 AI 거버넌스 갈등이 새로운 국면에 접어들 수 있다.`,
  sources:[{title:`앤트로픽 미토스 사이버보안 충격 - CNBC`,url:`https://www.cnbc.com/2026/05/08/anthropic-mythos-ai-cybersecurity-banks.html`},{title:`앤트로픽 CEO 사이버 위험 경고 - CNBC`,url:`https://www.cnbc.com/2026/05/05/anthropic-ceo-cyber-moment-of-danger-mythos-vulnerabilities.html`},{title:`미토스 맥OS 취약점 노출 보고 - 9to5Mac`,url:`https://9to5mac.com/2026/05/14/new-macos-vulnerabilities-were-exposed-by-anthropics-mythos-report/`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`IEA 메탄 추적기 2026 발표: 화석연료 메탄 배출 역대 최고…기후 목표 달성 위협`,
  metrics:[`메탄은 CO2보다 단기 온난화 효과 80배 이상 강력`,`이란 전쟁에 따른 중동 유전·가스전 피해, 메탄 급증의 신규 변수로 지목`],
  summary:`국제에너지기구(IEA)가 2026년 5월 초 발표한 글로벌 메탄 추적기 2026 보고서는 전 세계 화석연료 메탄 배출량이 역대 최고 수준에 달했다고 경고하며 국제 기후 정책 논의에 파장을 일으켰다. 메탄은 이산화탄소(CO2)보다 단기 온난화 효과가 80배 이상 강하며, 누출 방지만으로도 단기 기후 위기 완화에 즉각적이고 강력한 효과를 낼 수 있다. 보고서에 따르면 이란 전쟁으로 인한 중동 유전·가스전 시설 피해와 글로벌 에너지 수요 급증이 화석연료 메탄 배출 급증의 주요 원인으로 지목됐다. 특히 호르무즈 해협 일대 석유·가스 생산 시설이 손상되면서 통제되지 않은 메탄 누출이 크게 증가한 것으로 분석됐다. 별도로 과학자들은 마이크로플라스틱이 대기 중에서 기후 시스템에 영향을 미칠 수 있다는 연구 결과를 발표해, 플라스틱 오염과 기후변화의 복합적 위기가 주목받고 있다. 전문가들은 이번 보고서가 2026년 최중요 기후 문서임에도 불구하고 미국 언론의 보도가 이란 전쟁과 AI 이슈에 밀려 극히 적었다고 지적했다. 2015년 파리협정의 1.5도 목표는 이미 달성 불가능에 가깝다는 분석이 더욱 힘을 얻고 있다.`,
  keyTerms:[{term:`화석연료 메탄 배출`,explanation:`석유·가스·석탄을 생산하고 운반하는 과정에서 메탄가스가 공기 중으로 새어나오는 것을 말한다. 메탄은 이산화탄소보다 훨씬 강력한 온실가스라서 화석연료 메탄 배출을 줄이는 것만으로도 단기간 내 온난화 속도를 확실히 낮출 수 있다.`}],
  history:`메탄 배출 감축은 2021년 COP26에서 전 세계 100여 개국이 서명한 글로벌 메탄 서약의 핵심 목표였다. IEA는 매년 메탄 추적기 보고서를 발간해 석유·가스·석탄 산업의 메탄 누출 현황을 추적해왔다. 그러나 지정학적 불안정으로 인한 화석연료 증산이 감축 노력을 반복적으로 상쇄해왔다.`,
  players:`IEA는 에너지 전환 가속화를 주도하며 화석연료 메탄 감축을 글로벌 의제로 올려놓고 있다. 주요 배출 주체는 사우디아라비아·UAE 등 중동 산유국과 미국 LNG 수출업체들이다. 유럽연합은 수입 LNG에 대한 메탄 배출 기준을 강화하는 규정을 시행 중이다.`,
  current:`이란 전쟁으로 인한 중동 에너지 시설 피해가 메탄 누출 급증의 새로운 변수로 추가되면서, 기존의 감축 경로 예측이 전면 재검토되고 있다. 이란 사태가 장기화될수록 글로벌 기후 목표와의 괴리가 커질 전망이다.`,
  outlook:`COP31(2026년 하반기)에서 메탄 감축 목표 이행 점검이 주요 의제가 될 전망이다. 트럼프 행정부의 기후 정책 기조 변화 여부가 국제 기후 협상의 또 다른 변수다.`,
  sources:[{title:`IEA 메탄 추적기 2026, 2026년 최중요 기후 문서 - The Environmental Blog`,url:`https://www.theenvironmentalblog.org/2026/05/the-iea-report-on-methane-emissions-is-the-most-important-climate-document-of-2026-almost-nobody-in-america-read-it/`},{title:`마이크로플라스틱의 기후변화 영향 - Washington Post`,url:`https://www.washingtonpost.com/climate-environment/2026/05/04/microplastics-global-warming-climate/`},{title:`IEA 글로벌 메탄 추적기 공식 발간 - IEA`,url:`https://www.iea.org/reports/global-methane-tracker-2026`}]
},{
  category:`기타 이슈`,

  colorBg:`#e6f4f1`,
  headline:`K-AI 반도체 양산 원년, 한국 팹리스 스타트업 기술 상용화 첫 관문 진입`,
  metrics:[`2026년 한국 AI 반도체 스타트업 복수 제품 동시 시장 출시 예정`,`AI 칩 부족으로 2026년 스마트폰 가격 6.9%, PC 가격 8% 인상 전망`],
  summary:`2026년은 한국 AI 반도체 스타트업 생태계가 기술 개발 단계를 넘어 실제 양산과 시장 판매라는 첫 관문에 진입하는 해로 기록될 전망이다. 삼성전자·SK하이닉스가 HBM 등 메모리 분야를 장악한 사이, 팹리스(반도체 설계 전문) 방식으로 성장한 한국 AI 스타트업들이 추론용 AI 칩과 신경망처리장치(NPU)를 잇따라 시장에 내놓고 있다. 그러나 엔비디아·AMD 등 글로벌 강자와의 경쟁, 생산을 위탁할 파운드리 확보, 고객사 레퍼런스 부재 등 상용화의 세 가지 장벽이 높다. 전 세계적인 AI 칩 공급 부족 현상은 팹리스 스타트업에게 기회이기도 하다. AI 칩 부족으로 2026년 스마트폰 가격은 6.9%, PC는 8% 인상될 것으로 전망돼 대안 칩 공급자에 대한 시장 수요가 실재함을 방증한다. 한국 정부도 AI 반도체 실증·상용화 지원 프로그램을 대폭 확대 시행 중이다. 삼성전자는 데이터센터 연결 구조를 혁신하는 이른바 우주 반도체 개념으로 AI 인프라 시장 선점을 노리고 있다. 전문가들은 이 양산 원년이 팹리스 기반 K-AI 반도체의 글로벌 경쟁력을 판가름할 결정적 시험대가 될 것이라고 평가한다.`,
  keyTerms:[{term:`팹리스`,explanation:`반도체를 직접 생산하는 공장(팹) 없이 설계만 전담하는 기업 형태다. 설계한 도면을 TSMC·삼성 파운드리 같은 위탁 생산업체에 맡겨 칩을 만든다. 공장 투자 비용 없이 설계 경쟁력만으로 시장에 진입할 수 있어 스타트업에게 유리한 모델이다.`}],
  history:`한국의 반도체 산업은 삼성전자·SK하이닉스 중심의 메모리 반도체로 세계 정상에 올랐으나, 시스템 반도체(비메모리) 분야에서는 미국·대만에 크게 뒤처졌다. 정부는 2021년 K-반도체 전략을 발표하고 팹리스 스타트업 육성에 나섰으며, 그 첫 번째 열매가 2026년 양산 원년이라는 형태로 가시화됐다.`,
  players:`리벨리온·퓨리오사AI·사피온 등 한국 AI 반도체 스타트업들이 주요 플레이어다. 이들은 TSMC·삼성 파운드리에 생산을 위탁하며 팹리스 모델로 운영된다. 고객사 확보를 위한 네이버·카카오 등 국내 빅테크와의 협력이 성공의 핵심 변수다.`,
  current:`엔비디아가 글로벌 AI 칩 시장의 80% 이상을 독점한 상황에서, 대안을 찾는 데이터센터 운영사와 기업들이 한국 스타트업 칩에 관심을 보이기 시작했다. 팹리스 모델의 성공 여부가 한국이 메모리 편중 산업 구조를 탈피할 수 있는지를 가늠하는 지표가 된다.`,
  outlook:`올 하반기 주요 스타트업들의 첫 양산 실적이 공개될 예정이다. 해외 고객사 수주 여부가 국제 경쟁력 검증의 첫 번째 신호가 되고, 팹리스 기업들의 투자 유치 성과도 업계의 주요 관심사다.`,
  sources:[{title:`K-AI 반도체 양산 원년, 기술 상용화 검증 시작 - 더에이아이`,url:`https://www.newstheai.com/news/articleView.html?idxno=20189`},{title:`AI 반도체 실증·상용화 지원 확대 - 대한민국 정책브리핑`,url:`https://m.korea.kr/news/pressReleaseView.do?newsId=156744252&pWise=mSub&pWiseSub=C6`},{title:`AI 칩 부족으로 스마트폰·PC 가격 급등 - 뉴스스페이스`,url:`https://www.newsspace.kr/news/article.html?no=11502`}]
}]
},{
  tag:`2026-05-14`,
  label:`2026년 5월 14일 (목)`,
  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`코스피, 반도체 랠리에 7,822선 사상 최고치 경신…외국인 순매수 폭발`,
  metrics:[`코스피 7,822.24 (역대 최고가)`,`반도체 4종목 코스피 시가총액 비중 49.49%`],
  summary:`코스피 지수가 5월 11일 4.32% 급등하며 7,822.24로 마감, 역대 최고치를 기록했다. 외국인 투자자의 삼성전자·SK하이닉스 등 반도체 대형주 집중 매수가 상승을 이끌었으며, 이 두 종목을 포함한 반도체 4종목의 코스피 시가총액 비중이 49.49%에 달했다. 글로벌 AI 수요 폭발로 고대역폭 메모리(HBM) 공급 부족 우려가 커지면서 관련 기업 주가에 강한 상방 압력이 작용하고 있다. 코스피가 7,000선을 처음 돌파한 것은 5월 6일이었으며, 불과 수거래일 만에 또 한 번 신고가를 경신했다. 미·중 무역 긴장 완화 기대도 외국인 투자 심리를 개선시켜 지수 상승에 힘을 보태고 있다. 전문가들은 AI 반도체 수요가 중장기적으로 지속될 것으로 보고 추가 상승 여력이 남아 있다고 분석한다. 다만 중동 지정학 리스크와 삼성전자 노사 갈등은 변수로 남아 있다. 외국인 순매수 흐름이 지속되느냐가 향후 코스피 방향성의 핵심 변수로 꼽힌다.`,
  keyTerms:[{term:`외국인 순매수`,explanation:`외국인 투자자가 국내 주식을 산 금액이 판 금액보다 많은 상태를 말한다. 외국인 순매수가 늘어나면 시장에 자금이 유입돼 주가가 오르는 경향이 있으며, 이번 코스피 급등의 핵심 동력이다.`}],
  history:`코스피는 2021년 6월 3,316선 고점을 기록한 뒤 글로벌 긴축과 반도체 불황으로 2022~2023년 2,000선 근방까지 하락했다. 2024년부터 AI 붐과 함께 반도체 업황이 살아나며 꾸준히 회복세를 탔고, 2026년 초 5,000선을 돌파했다. 이후 AI 반도체 수요 급증과 외국인 자금 유입이 맞물리며 5월 들어 7,000선을 넘어섰다.`,
  players:`삼성전자와 SK하이닉스는 글로벌 HBM 시장을 사실상 양분하는 핵심 기업으로, 이들의 주가가 지수 방향을 결정한다. 외국인 투자자는 최근 수주째 순매수 기조를 유지하며 지수 상승을 주도하고 있다. 한국은행과 금융당국은 증시 급등에 따른 과열 여부를 주시하고 있다.`,
  current:`AI 데이터센터 투자 확대로 HBM 수요가 2026년에도 폭발적으로 늘어나는 가운데, 공급 부족 우려가 주가 프리미엄을 키우는 상황이다. 미·중 무역 긴장 완화 기대도 외국인 투자 심리를 개선시켜 지수 상승에 힘을 보태고 있다.`,
  outlook:`2분기 삼성전자·SK하이닉스의 실적 발표가 6~7월로 예정돼 있어 어닝 시즌이 주요 분기점이 된다. 이란 사태 및 미중 관계 변동성에 따라 외국인 자금 흐름이 달라질 수 있다.`,
  sources:[{title:`코스피 7800선 사상 최고치 경신 - 오늘의 클릭`,url:`https://www.cliktoday.com/2026/05/20260511-today-news.html`},{title:`반도체 아직도 고점 안 갔다 - 서울신문`,url:`https://www.seoul.co.kr/news/economy/2026/05/10/20260510500065`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`미·중, 관세 전쟁 전격 완화…미국 145→30%, 중국 125→10%로 90일 무역 휴전 합의`,
  metrics:[`미국 대중 관세 145%→30%로 인하`,`중국 대미 관세 125%→10%로 인하`],
  summary:`미국과 중국이 5월 12일 상호 관세를 대폭 낮추는 90일 무역 휴전에 합의했다. 미국은 중국산 수입품에 부과하던 145% 관세를 30%로, 중국은 미국산에 부과하던 125%를 10%로 각각 인하했다. 이 합의는 트럼프 대통령의 베이징 방문 직전에 이루어지며 정상회담의 분위기를 크게 개선시켰다. 양측은 비민감 품목 300억달러 규모에 대해 추가 관세 인하도 논의 중이며, 에너지·농산물 거래 확대 방안도 테이블에 올라 있다. 무역 휴전은 글로벌 공급망 혼란과 인플레이션 우려를 일부 완화하는 데 기여할 것으로 평가받고 있다. 반도체·AI 관련 전략 기술 분야에서는 수출 통제가 여전히 유지될 전망이어서 완전한 무역 정상화와는 거리가 있다. 세계 주요 증시는 이 소식에 강하게 반응하며 동반 상승했다. 90일 무역 휴전 만료 전에 장기 협의가 타결될지 여부가 최대 관심사로 떠올랐다.`,
  keyTerms:[{term:`무역 휴전`,explanation:`관세 전쟁 중인 나라들이 일정 기간 동안 추가 관세 부과를 멈추고 기존 관세를 낮추기로 잠정 합의하는 것이다. 완전한 해결이 아닌 협상 시간을 버는 임시 조치로, 이번 미·중 합의는 90일이 기한이다.`}],
  history:`트럼프 행정부는 2025년 초 중국산 제품에 145%까지 관세를 끌어올렸고, 중국도 125% 보복 관세로 맞섰다. 이로 인해 양국 무역이 급감하고 글로벌 공급망이 혼란에 빠졌다. 2025년 10월 1차 무역 휴전이 이루어졌으나 완전한 타결에는 이르지 못했다.`,
  players:`미국 무역대표부 그리어 대표가 협상 실무를 주도했다. 중국 측에서는 허리펑 부총리가 협상 대표로 나섰다. 트럼프 대통령과 시진핑 주석이 최종 결단을 내렸다.`,
  current:`이란 전쟁으로 글로벌 경제 불확실성이 커진 상황에서 미·중 양측 모두 무역 갈등 지속의 여유가 줄었다. 이에 따라 협상 타결 속도가 당초 예상보다 빨라졌다.`,
  outlook:`90일 무역 휴전이 끝나는 8월 이전에 장기 합의 여부가 결정될 전망이다. 반도체·희토류 등 전략 분야 협상은 별도 채널에서 계속된다.`,
  sources:[{title:`Trump and Xi Dialed Down the Trade War - US News`,url:`https://www.usnews.com/news/business/articles/2026-05-11/trump-and-xi-dialed-down-the-trade-war-but-challenges-lurk-at-their-china-summit`},{title:`Trump, Xi to Weigh Tariff Cuts on \$30 Billion of Imports - US News`,url:`https://www.usnews.com/news/top-news/articles/2026-05-13/trump-xi-to-weigh-tariff-cuts-on-30-billion-of-imports-in-managed-trade-push`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`IEA, 호르무즈 봉쇄로 원유 공급 10억 배럴 이상 차질…에너지 시장 전례 없는 충격`,
  metrics:[`누적 원유 공급 손실 10억 배럴 이상`,`하루 1,400만 배럴 차단 (전 세계 수요의 약 13%)`],
  summary:`국제에너지기구(IEA)가 호르무즈 봉쇄로 전 세계 원유 누적 공급 손실이 10억 배럴을 넘어섰다고 밝혔다. 현재 하루 1,400만 배럴 이상의 원유 수출이 차단된 상태로, 이는 전례 없는 에너지 공급 충격으로 평가된다. IEA는 2026년 세계 원유 수요가 전년 대비 42만 배럴/일 줄어 1억400만 배럴에 그칠 것으로 전망했지만, 공급 차질이 수요 감소보다 훨씬 커 유가 상방 압력은 지속되고 있다. 걸프 산유국들의 생산 손실이 누적되면서 미국·캐나다 등 비OPEC 생산국의 시장 점유율이 확대되는 구도가 나타나고 있다. 한국을 포함한 원유 수입 의존국들은 비축유 방출과 대체 공급선 확보에 나섰으나 단기 대응에는 한계가 있다. 에너지 비용 상승은 글로벌 인플레이션을 자극해 각국 중앙은행의 금리 정책에도 영향을 미치고 있다. 호르무즈 봉쇄는 2026년 2월 미·이스라엘의 이란 공습 이후 이란이 취한 보복 조치로, 해제 여부는 미·이란 협상 결과에 달려 있다. 협상이 타결되지 않을 경우 여름철 수요 증가와 맞물려 유가가 추가 상승할 가능성이 있다.`,
  keyTerms:[{term:`호르무즈 봉쇄`,explanation:`이란과 아라비아반도 사이의 호르무즈 해협은 전 세계 원유 해상 물동량의 약 20%가 통과하는 핵심 길목이다. 이란이 이 해협에서 선박 통행을 막거나 위협하면 글로벌 에너지 공급이 큰 타격을 받는다.`}],
  history:`호르무즈 해협은 냉전 이래 지정학적 압박 도구로 활용돼 왔다. 2026년 2월 28일 미·이스라엘의 이란 공습 이후 이란은 해협 봉쇄로 맞대응했다. 이로 인해 글로벌 에너지 시장은 1970년대 오일쇼크 이후 최대 공급 위기에 직면했다.`,
  players:`이란은 호르무즈 봉쇄를 평화 협상의 레버리지로 사용하고 있다. 미국 해군이 해협 개방 유지를 위한 작전을 전개하고 있으나 완전한 봉쇄 해제에는 이르지 못하고 있다. OPEC+와 IEA 회원국들은 비축유를 방출해 가격 안정에 나서고 있다.`,
  current:`미·이란 평화 협상이 사실상 결렬 위기에 처하면서 봉쇄 해제 시점이 불투명해졌다. 아시아 에너지 수입국들이 대체 공급선 확보에 어려움을 겪으며 에너지 안보가 최우선 국가 과제로 부상했다.`,
  outlook:`미·이란 협상 재개 여부가 최대 변수다. 협상 타결이 늦어질수록 여름 성수기 수요 증가와 맞물려 유가가 추가 상승할 수 있으며, 한국 경제에도 물가 압력으로 이어질 수 있다.`,
  sources:[{title:`Oil Market Report - May 2026 - IEA`,url:`https://www.iea.org/reports/oil-market-report-may-2026`},{title:`Resilience amid ruins: Why markets are hitting record highs - Euronews`,url:`https://www.euronews.com/business/2026/05/06/resilience-amid-ruins-why-markets-are-hitting-record-highs-despite-iran-war-effects`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`6·3 지방선거 후보 등록 개시…서울 정원오 46% vs 오세훈 38%, 여야 격전`,
  metrics:[`서울시장 지지율 정원오 46%, 오세훈 38% (한국갤럽)`,`본투표일 2026년 6월 3일, 사전투표 5월 29~30일`],
  summary:`제9회 전국동시지방선거 및 국회의원 재·보궐선거 후보자 등록이 5월 14일 시작됐다. 광역단체장 선거가 이번 지방선거의 최대 관심사로, 서울시장 선거에서는 민주당 정원오 후보가 46%, 국민의힘 오세훈 후보가 38%로 8%포인트 차이를 보이고 있다. 부산·대구 등 전통 보수 강세 지역에서도 오차범위 내 접전이 이어지고 있어 양당 모두 긴장을 늦추지 못하고 있다. 이번 선거는 이재명 정부 출범 이후 첫 전국 단위 선거로 현 정권에 대한 중간 평가 성격을 띤다. 국민의힘은 정책 토론과 이슈 부각에 집중하며 중도·무당층 흡수를 위한 전략을 펼치고 있다. 이번 지방선거에는 광주·전남 행정 통합으로 새로 생긴 전남광주통합특별시장 선거가 처음으로 치러지는 점도 주목된다. 사전투표는 5월 29~30일, 본투표는 6월 3일이다. 후보 등록 마감 이후 본격 선거 운동이 시작되면 판세 변동이 커질 전망이다.`,
  keyTerms:[{term:`광역단체장`,explanation:`서울특별시장, 광역시장, 도지사처럼 광역지방자치단체의 수장을 가리키는 말이다. 지방선거의 핵심 승부처로, 선거 결과가 차기 대선 구도에도 영향을 미친다.`}],
  history:`지방선거는 4년마다 전국적으로 광역·기초단체장 및 의원을 동시에 선출하는 선거다. 2022년 제8회 지방선거에서는 국민의힘이 서울 등 주요 광역단체를 대거 석권했다. 2025년 대선에서 이재명 민주당 후보가 당선된 뒤 집권 민주당이 전국적으로 지지율 우위를 유지하고 있다.`,
  players:`더불어민주당은 집권당으로 정권 심판론 차단에 집중하고 있다. 국민의힘은 이재명 정부 견제 프레임을 앞세우며 지지층 결집에 나서고 있다. 조국혁신당 등 제3세력도 일부 지역에서 변수로 작용할 수 있다.`,
  current:`후보 등록 시작과 동시에 공식 선거 운동을 향한 카운트다운이 시작됐다. 민주당이 전국적으로 우위를 점하고 있으나 투표율이 최종 결과를 좌우하는 변수가 될 수 있다.`,
  outlook:`5월 29~30일 사전투표 결과가 본투표 흐름을 가늠하는 지표가 될 것이다. 6월 3일 개표 결과에 따라 여야의 차기 대선 전략도 크게 달라질 전망이다.`,
  sources:[{title:`서울 정원오 46%-오세훈 38% 한국갤럽 - 서울신문`,url:`https://seoul.co.kr/news/politics/local-election2026/local-election2026-poll/2026/05/13/20260513500079`},{title:`6·3 지선 후보등록 시작 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202605140500336078`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`트럼프 이란 휴전 생명유지장치 발언…협상 결렬·전쟁 재개 위기 고조`,
  metrics:[`미국 전쟁 비용 추산 290억달러`,`휴전 기간 중 추가 사망자 380명 이상`],
  summary:`트럼프 대통령이 이란과의 휴전 협정이 생명유지장치 상태라고 밝히며 협상 결렬 가능성을 강하게 시사했다. 이란은 미국의 14개 항 평화 제안을 전장에서 이루지 못한 것을 외교로 받아내려는 시도라고 일축하며, 제재 해제와 전쟁 피해 보상 등 5가지 선결 조건을 내세웠다. 미국은 이 조건들을 항복 요구로 규정하고 거부하면서 협상이 사실상 교착 상태에 빠졌다. 4월 8일 발효된 휴전 협정에도 불구하고 레바논 남부 등에서 교전이 완전히 멈추지 않아 380명 이상의 추가 사망자가 발생했다. 미국 국방부는 지금까지 전쟁 비용이 290억달러에 달한다고 의회에 보고했다. 트럼프 행정부 내 강경파는 대규모 전투 재개를 주장하고 있어 정책 혼선도 커지고 있다. 이란은 미국의 새 공격에 단호히 맞서겠다고 경고한 상태다. 트럼프가 베이징 방문 중에도 이란 협상 상황을 실시간으로 주시하고 있어 중동 정세가 미중 회담에도 영향을 미치고 있다.`,
  keyTerms:[{term:`휴전 협정`,explanation:`전쟁 중인 양측이 일시적으로 전투를 멈추기로 합의하는 것이다. 완전한 평화 조약이 아니어서 언제든 깨질 수 있으며, 이번 미·이란 휴전 협정은 협상 난항으로 붕괴 위기에 처해 있다.`}],
  history:`2026년 2월 28일 미국·이스라엘이 이란 핵 시설에 대한 공습을 개시하며 전쟁이 시작됐다. 이란은 호르무즈 해협 봉쇄와 미사일 공격으로 맞대응했다. 75일간의 전투 끝에 4월 8일 미국 주도의 휴전 협정이 발효됐다.`,
  players:`트럼프 대통령은 단기 전쟁 종결을 원하지만 이란의 협상 조건에 강한 이견을 보이고 있다. 이란 최고지도자 하메네이는 제재 해제와 피해 보상을 협상 전제로 요구하고 있다. 이스라엘도 이란의 핵 능력 완전 제거를 요구하며 협상 구조를 복잡하게 만들고 있다.`,
  current:`트럼프 대통령이 베이징 방문 중에도 이란 협상 상황을 실시간으로 주시하고 있어 중동 정세가 미중 회담에도 영향을 미치고 있다. 이란 내 강경파와 온건파 간 내부 갈등도 협상 속도를 늦추고 있다.`,
  outlook:`5월 중 추가 협상 라운드 재개 여부가 최대 변수다. 협상이 완전히 붕괴되면 미국의 군사 재개 가능성이 높아지며, 이는 중동 정세와 글로벌 에너지 시장에 즉각적인 충격을 줄 것이다.`,
  sources:[{title:`Trump faces slew of bad options on Iran as diplomacy falters - Al Jazeera`,url:`https://www.aljazeera.com/news/2026/5/13/trump-faces-slew-of-bad-options-on-iran-as-diplomacy-falters`},{title:`Trump says Iran ceasefire is on life support - NBC News`,url:`https://www.nbcnews.com/world/iran/iran-us-peace-talks-trump-rejects-totally-unacceptable-hormuz-rcna344501`}]
},{
  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`트럼프, 베이징 도착…미중 정상회담서 반도체 수출 통제·대만·AI 거버넌스 담판`,
  metrics:[`미중 협상 기술·무역 의제 규모 150억달러 이상`,`H200 GPU 수출 라이선스 체계 논의 대상`],
  summary:`트럼프 대통령이 5월 13일 베이징에 도착해 시진핑 주석과 이틀간 정상회담에 돌입했다. 이번 회담의 핵심 의제는 첨단 반도체 수출 통제 완화, 대만 무기 판매, AI 거버넌스 합의 등 기술·안보 이슈에 집중돼 있다. 트럼프 대통령은 엔비디아 H200 GPU에 대한 수출 라이선스 체계 마련을 협상 카드로 올릴 것으로 예상된다. 대만 문제와 관련해 트럼프가 무기 판매를 논의하겠다고 밝혀 시진핑의 강한 반발이 예상된다. 양측은 AI 군비 통제 원칙에 대한 비구속적 합의 도출도 시도하고 있는 것으로 전해졌다. 이란 전쟁과 중국의 이란 지원 의혹, 북한 문제도 회담 테이블에 오를 가능성이 높다. 전문가들은 이번 회담이 극적인 돌파구보다는 관계 안정화 수준에 그칠 것으로 전망한다. 반도체 수출 통제 완화 여부가 실질적 결과물로 가장 주목받고 있다.`,
  keyTerms:[{term:`반도체 수출 통제`,explanation:`미국이 첨단 반도체와 관련 장비를 중국에 수출하지 못하도록 제한하는 정책이다. AI 군사 활용을 막고 기술 패권을 유지하려는 목적이며, 이번 회담에서 일부 완화 여부가 핵심 쟁점이다.`}],
  history:`미국은 2022년부터 중국에 대한 첨단 반도체 수출 통제를 강화해 왔다. 엔비디아 A100·H100·H200 등 고성능 GPU가 중국 판매 금지 대상이 됐다. 중국은 대응 차원에서 희토류·갈륨·게르마늄 수출을 제한하는 보복 조치를 취했다.`,
  players:`트럼프 행정부는 동맹국과의 기술 협력을 유지하면서 중국의 AI 군사화를 막으려 한다. 시진핑 정부는 첨단 반도체 자급자족을 국가 목표로 설정했지만 단기 조달에 어려움을 겪고 있다. 엔비디아 등 미국 반도체 기업들은 중국 시장 재진입을 위해 수출 규제 완화를 강력히 요구하고 있다.`,
  current:`미·중 무역 휴전으로 분위기가 개선된 상황에서 반도체 분야 타협 가능성이 조심스럽게 제기되고 있다. 그러나 국가 안보와 직결된 사안인 만큼 합의 도출이 쉽지 않다.`,
  outlook:`이번 회담에서 합의가 이루어지지 않더라도 추가 협상 채널이 마련될 것으로 보인다. H200 수출 라이선스 결과는 한국 반도체 기업의 대중 수출에도 간접적인 영향을 미칠 수 있다.`,
  sources:[{title:`Trump-Xi Beijing Summit May 2026: H200 Deals, AI Governance - Abhishek Gautam`,url:`https://www.abhs.in/blog/trump-xi-beijing-summit-may-2026-semiconductor-h200-ai-governance-outcomes`},{title:`Trump heads to Beijing with tariff uncertainty and Strait of Hormuz in focus - Yahoo Finance`,url:`https://finance.yahoo.com/economy/policy/article/trump-heads-to-beijing-with-tariff-uncertainty-ai-communication-and-strait-of-hormuz-in-focus-125943647.html`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`구글, AI가 발견한 세계 첫 제로데이 해킹 차단…사이버 공격에 AI 본격 동원`,
  metrics:[`세계 최초 AI 기반 제로데이 취약점 발견·악용 공격 사례 포착`,`구글, 공격 탐지 후 수시간 내 대규모 피해 차단 완료`],
  summary:`구글 위협정보그룹(GTIG)이 공격자가 AI를 활용해 소프트웨어의 제로데이 취약점을 발견하고 대규모 해킹을 시도한 세계 첫 사례를 포착·차단했다. 기존에는 제로데이 취약점 발굴에 숙련된 해커 팀이 수주에서 수개월을 투자해야 했지만, AI 활용으로 이 과정이 대폭 단축됐음이 입증됐다. 구글은 공격을 사전 탐지해 대규모 피해를 막았으나, AI가 실제 사이버 공격 도구로 사용됐다는 사실 자체가 보안 업계에 큰 충격을 주고 있다. 이번 사례는 AI가 방어뿐 아니라 공격 수단으로도 전환될 수 있다는 위험성을 명확히 보여준다. 공격 주체는 국가 연계 가능성이 있는 고도화된 집단으로 추정된다. 대응 차원에서 오픈AI는 EU 사이버보안 팀에 GPT-5.5-Cyber를 제한적으로 제공하고 있다. 각국 정부와 기업들은 AI 보안 인프라 투자를 긴급히 확대해야 한다는 목소리가 커지고 있다. 미·중 정상회담에서도 AI 기반 사이버 공격 금지 합의가 의제로 오른 것으로 전해졌다.`,
  keyTerms:[{term:`제로데이 취약점`,explanation:`소프트웨어 개발사가 아직 발견하지 못했거나 패치하지 못한 보안 결함을 말한다. 공격자가 이를 먼저 발견해 악용하면 방어가 사실상 불가능해 가장 위험한 해킹 수단으로 꼽힌다.`}],
  history:`제로데이 취약점은 오랫동안 국가급 해킹 그룹이나 고도로 숙련된 사이버 범죄 조직의 전유물이었다. 최근 수년간 AI 코딩 도구가 발전하면서 취약점 탐색 능력이 비전문가에게도 확산되기 시작했다. 구글은 2023년 자체 AI로 제로데이 취약점을 발견한 바 있으나, 공격자의 AI 활용은 이번이 세계 첫 공식 사례다.`,
  players:`구글 GTIG가 이번 사건을 최초 포착·분석했다. 오픈AI·앤트로픽 등 주요 AI 기업들도 공격용 AI 악용 방지 안전장치 강화에 나서고 있다. 각국 정부의 사이버 보안 기관들도 AI 기반 공격 대응 체계를 재점검하고 있다.`,
  current:`이번 사건은 AI 기술이 사이버 안보 분야에 새로운 위협 차원을 열었음을 공식 확인한 첫 사례로, 각국의 AI 보안 규제 논의에 불을 붙이고 있다.`,
  outlook:`미·중 정상회담에서 AI 사이버 공격 금지 관련 합의 가능성이 거론되고 있다. EU와 미국의 AI 안전 규제 강화 속도도 빨라질 전망이다.`,
  sources:[{title:`Weaponizing AI to exploit zero-day vulnerabilities - Fortune`,url:`https://fortune.com/2026/05/12/google-hackers-using-ai-to-weaponize-zero-day-vulnerabilities/`},{title:`OpenAI to give EU access to new cyber model - CNBC`,url:`https://www.cnbc.com/2026/05/11/openai-eu-cyber-model-anthropic-mythos-gpt.html`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`앤트로픽, 자율 AI 에이전트·드리밍 기능 공개…Claude, 독립 실행 AI로 본격 진화`,
  metrics:[`SpaceX Colossus 1 엔비디아 GPU 22만개 이상 연산 계약 체결`,`구글 클라우드·칩에 2,000억달러 투자 계획 확정`],
  summary:`앤트로픽이 개발자 데이 행사에서 Claude AI의 자율 AI 에이전트 기능 확장과 신규 드리밍(Dreaming) 기능을 공개했다. 자율 AI 에이전트는 사용자의 별도 지시 없이 장시간 코딩·금융·법무 등 복잡한 작업을 독립적으로 처리하는 AI 시스템이다. 드리밍 기능은 AI가 세션과 세션 사이에 스스로 작업을 복기하고, 패턴을 파악하며, 사용자 맞춤 파일을 업데이트하는 혁신적 기능이다. 앤트로픽은 SpaceX의 Colossus 1 시설(테네시주 멤피스, 22만개 이상 GPU)의 연산 자원 사용 계약을 체결해 Claude에 300MW의 추가 연산 용량을 확보했다. 구글 클라우드와 칩에 2,000억달러를 투자하기로 한 계획도 함께 알려졌다. 이번 발표는 앤트로픽이 OpenAI·구글과의 AI 에이전트 시장 선점 경쟁에서 공격적 행보를 보여주고 있음을 상징한다. AI 모델 성능 평가에서 앤트로픽이 현재 1위를 차지하고 있어 시장에서의 영향력도 커지고 있다. 에이전트 AI 상용화는 기업 업무 자동화 방식을 근본적으로 바꿀 것으로 전망된다.`,
  keyTerms:[{term:`자율 AI 에이전트`,explanation:`사람의 개입 없이 스스로 목표를 설정하고, 정보를 검색하며, 코드를 짜거나 파일을 관리하는 등 복잡한 작업을 처리하는 AI 시스템이다. 단순 챗봇과 달리 장시간 자율적으로 작동한다는 점이 핵심 차이다.`}],
  history:`AI 에이전트 개념은 2024년부터 주목받기 시작했으며, OpenAI의 Operator, 구글의 Project Astra 등이 선도적으로 시장에 나왔다. 앤트로픽은 Claude 3 시리즈로 코딩 에이전트 분야에서 두각을 나타냈다. 2026년 들어 주요 AI 기업들이 에이전트 상용화 경쟁을 본격화하고 있다.`,
  players:`앤트로픽은 구글·아마존의 투자를 받으며 성장해 현재 AI 모델 성능 평가 1위를 차지하고 있다. OpenAI는 컨설팅 자회사 설립과 함께 에이전트 시장에 공격적으로 진출하고 있다. SpaceX와의 컴퓨팅 자원 계약은 AI 인프라 경쟁에서 새로운 파트너십 모델을 제시했다.`,
  current:`에이전트 AI는 사용자 지시에서 자율 실행으로 넘어가는 패러다임 전환을 의미한다. 2026년 1분기 현재 AI 사용 인구가 전 세계 근로 연령 인구의 17.8%에 달해 확산 속도도 빠르다.`,
  outlook:`6~7월 중 에이전트 기능 정식 출시와 기업용 요금제 발표가 예정돼 있다. 한국 기업들의 AI 에이전트 도입 여부도 산업 경쟁력의 핵심 변수가 될 것이다.`,
  sources:[{title:`SpaceX backs Anthropic with data centre deal - Al Jazeera`,url:`https://www.aljazeera.com/economy/2026/5/6/spacex-backs-anthropic-with-data-centre-deal-amidst-musks-openai-lawsuit`},{title:`Anthropic commits to spending \$200 billion on Google cloud - Yahoo Finance`,url:`https://ca.finance.yahoo.com/news/anthropic-commits-spending-200-billion-204952202.html`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`대한항공·아시아나, 오늘 합병 계약 체결…12월 통합 대한항공 공식 출범`,
  metrics:[`합병 계약 체결일 2026년 5월 14일`,`통합 대한항공 공식 출범 예정일 2026년 12월 17일`],
  summary:`대한항공과 아시아나항공이 5월 14일 공식 합병 계약을 체결하며 기업 결합의 마지막 관문을 통과했다. 양사는 오는 12월 17일 통합 대한항공 출범을 공식화해 수년간 이어진 기업 결합 절차가 사실상 마무리됐다. 통합 대한항공은 국제선 네트워크와 화물 운송 능력이 대폭 강화되어 아시아 최대 항공사 중 하나로 자리잡을 것으로 전망된다. 합병 과정에서 EU·미국·일본·호주 등 주요 항공 당국의 조건부 승인을 받았으며, 일부 노선 슬롯 양도 등 조건도 충족됐다. 두 회사의 기업 문화 통합, 인력 조정, 노선 구조 조정 등 후속 과제가 남아 있어 원활한 통합을 위한 준비 작업이 본격화된다. 항공업계에서는 통합 후 운임 인상 가능성과 경쟁 감소에 대한 소비자 우려도 제기되고 있다. 합병 완료 시 한국 항공 시장은 사실상 단일 메가 캐리어 중심으로 재편된다. 장기적으로는 일본항공·싱가포르항공 등과의 아시아 시장 경쟁이 본격화될 전망이다.`,
  keyTerms:[{term:`기업 결합`,explanation:`두 회사 이상이 하나로 합쳐지거나 한 회사가 다른 회사를 인수해 경영권을 갖게 되는 것이다. 대한항공과 아시아나의 기업 결합은 독과점 우려로 여러 나라 경쟁 당국의 심사를 거쳤다.`}],
  history:`대한항공은 2020년 11월 아시아나항공 인수를 공식 발표했으나, 각국 경쟁 당국 심사로 절차가 수년간 지연됐다. EU·미국·일본 등의 조건부 승인이 2024~2025년에 이루어졌다. 아시아나는 코로나19 이후 심각한 재무 위기를 겪으며 매각이 불가피해진 상황이었다.`,
  players:`대한항공의 모회사 한진그룹이 인수를 주도했으며, 산업은행이 재무 구조조정 과정에서 핵심 역할을 했다. 각국 항공 당국(DOT, EU, JFTC 등)이 노선 슬롯 양도 등 조건을 부과했다. 소비자단체들은 합병 후 독과점 운임 인상 가능성을 우려하며 모니터링하고 있다.`,
  current:`오늘 합병 계약 체결로 통합 법인 설립을 위한 실질적 작업이 시작됐다. 12월 출범을 목표로 IT 시스템 통합, 브랜드 전략, 인력 배치 등의 작업이 동시에 진행된다.`,
  outlook:`12월 17일 통합 대한항공 출범 후 국제선 좌석 공급과 운임 추이가 업계의 주요 관심사가 될 것이다. 장기적으로는 아시아 항공 시장에서 경쟁력 강화를 통해 일본항공·싱가포르항공과의 경쟁이 본격화될 전망이다.`,
  sources:[{title:`오늘의 주요일정 정치·정부 5월 14일 목 - 파이낸셜뉴스`,url:`https://www.fnnews.com/news/202605140502401457`},{title:`2026년 5월 13일 오늘의 주요 뉴스 - 오늘의 클릭`,url:`https://www.cliktoday.com/2026/05/20260513-today-news.html`}]
}]

  stories:[{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`AI·반도체 열풍에 코스피 7,822 돌파, 삼성·SK하이닉스 지수 비중 절반 육박`,
  metrics:[`코스피 지수 7,822.24포인트, 전일 대비 4.32% 상승`,`삼성전자·SK하이닉스 등 반도체 4종목 코스피 비중 49.49% (연초 38.83%에서 급증)`],
  summary:`2026년 5월 국내 증시가 인공지능(AI)과 반도체 산업의 열풍을 타고 급등하며 코스피 지수가 7,822.24포인트를 기록, 4.32% 상승을 보였다. 글로벌 AI 인프라 투자 확대와 엔비디아 수요 폭증이 삼성전자와 SK하이닉스의 고대역폭 메모리(HBM) 공급 확대로 이어지며 주가를 끌어올렸다. 삼성전자·SK하이닉스·삼성전자우·SK스퀘어 등 반도체 4종목의 코스피 비중은 연초 38.83%에서 49.49%로 급증해 지수 내 쏠림 현상이 두드러졌다. 2026년 삼성전자의 연간 영업이익 컨센서스는 332조 1,079억 원, SK하이닉스는 247조 3,398억 원에 달할 전망이다. 반도체·방산·에너지로의 자금 집중이 이어지는 가운데 내수 소비 회복은 여전히 더딘 편이다. 중동 리스크로 인한 유가 불안과 내수 침체가 잠재 하방 요인으로 작용하고 있다. 투자자 예탁금이 역대 최대를 기록하는 등 시장 열기는 뜨겁지만 일각에서는 밸류에이션 과열 우려도 제기된다.`,
  keyTerms:[{term:`고대역폭 메모리(HBM)`,explanation:`AI 반도체에 탑재되는 초고속 메모리로, 기존 메모리보다 데이터 처리 속도가 훨씬 빠르다. 삼성전자와 SK하이닉스가 세계 시장을 주도하며 엔비디아 등 AI 칩 수요 폭증의 최대 수혜 품목이 됐다.`}],
  history:`한국 반도체 산업은 D램·낸드플래시 중심으로 성장해왔으나, 2022년 챗GPT 등장 이후 AI 가속기용 HBM 수요가 폭발적으로 늘었다. 2024~2025년 엔비디아의 H100·H200 GPU 출하 급증이 HBM3E 수요를 견인했고 삼성전자와 SK하이닉스의 수주 경쟁이 격화됐다. 코스피는 2025년 하반기부터 AI 관련주 중심으로 상승세를 탔으며 2026년 들어 7,000선을 처음 돌파했다.`,
  players:`SK하이닉스는 HBM 시장에서 점유율 1위를 유지하며 엔비디아의 최우선 공급사 지위를 확보했고, 삼성전자는 HBM3E 양산을 확대해 추격 중이다. 정부는 반도체 클러스터 조성 등 산업 지원 정책을 강화하고 있으며 외국인 투자 자금도 꾸준히 유입되고 있다.`,
  current:`2026년 1분기 글로벌 AI 데이터센터 투자가 사상 최고치를 경신하면서 HBM 수요가 공급을 초과하는 상황이 지속되고 있다. 코스피 내 반도체 쏠림이 심화되며 지수 변동성도 높아지는 전환점에 있다.`,
  outlook:`6월 미 연준 FOMC 결과와 엔비디아의 2분기 실적 발표가 단기 방향성을 결정할 핵심 변수다. 삼성전자의 HBM4 양산 일정과 SK하이닉스의 공급 계획도 주목된다.`,
  sources:[{title:`코스피 7500 문턱…반도체 질주 속 트럼프 변수 주목 - 머니투데이`,url:`https://www.mt.co.kr/stock/2026/05/10/2026051014393729901`},{title:`꿈의 7천 포인트, 반도체가 이끌었다 - MBC뉴스`,url:`https://imnews.imbc.com/replay/2026/nwdesk/article/6820443_37004.html`},{title:`2026년 5월 12일 주요 뉴스(AI 반도체 증시 급등) - 오늘의 클릭`,url:`https://www.cliktoday.com/2026/05/20260512-today-news.html`}]

  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`이란 전쟁 11주째 국제 유가 60% 폭등, 미 연준 사상 최대 내분 끝에 금리 동결`,
  metrics:[`국제 유가 2026년 초 대비 약 60% 급등, WTI 배럴당 100달러 근접`,`미국 PCE 물가지수 3.5%(전년비), 연준 기준금리 3.50~3.75% 동결 (8대 4 표결)`],
  summary:`미국이 주도하는 이란 전쟁이 개전 11주를 넘기면서 국제 유가가 연초 대비 약 60% 폭등해 WTI 기준 배럴당 100달러에 근접했다. 이란의 호르무즈 해협 봉쇄가 지속되며 원유 공급에 차질이 생겼고, 미국 가정 평균 연료비 부담이 284달러 증가해 가계 인플레이션이 재점화됐다. 에너지 쇼크 여파로 미국 PCE 물가지수는 3.5%까지 상승했고, 핵심 PCE도 3.2%를 기록하며 연준의 2% 목표를 크게 상회한다. 연방준비제도(Fed)는 4월 29일 FOMC에서 기준금리를 3.50~3.75%로 동결했으나 8대 4 표결로 1992년 이후 최대 내부 이견을 드러냈다. 에너지 쇼크는 물가를 끌어올리는 동시에 성장을 둔화시켜 연준의 이중 목표를 동시에 위협하는 딜레마를 만들어냈다. 뱅크오브아메리카는 올해 금리 동결을 예상하며 첫 금리 인하 시점을 2027년 7월로 후퇴시켰다. 전문가들은 이란 협상이 조기에 타결되지 않으면 스태그플레이션 압력이 더욱 강해질 것이라고 경고한다.`,
  keyTerms:[{term:`에너지 쇼크`,explanation:`전쟁·공급 차질 등 외부 충격으로 에너지 가격이 갑자기 급등하는 현상이다. 물가를 올리는 동시에 경제 성장을 둔화시켜 중앙은행의 정책 판단을 극도로 어렵게 만든다.`}],
  history:`미국과 이스라엘은 2026년 2월 28일 이란의 핵 프로그램과 지역 내 대리 세력 지원을 이유로 군사 작전을 개시했다. 이란은 즉각 호르무즈 해협을 봉쇄해 글로벌 원유 공급망에 직격탄을 날렸고, 이후 유가는 가파른 상승세를 이어왔다. 2015년 이란 핵합의(JCPOA) 붕괴 이후 이란의 핵 농축 가속화가 이번 군사 충돌의 직접적 원인이 됐다.`,
  players:`미 연준은 물가 안정과 경기 침체 방지라는 상충하는 목표 사이에서 딜레마에 빠져 있다. OPEC+는 증산에 소극적이며, 중국·인도 등 주요 원유 수입국도 공급 불안을 우려하고 있다.`,
  current:`이란 측이 배상금·호르무즈 주권·제재 해제를 요구하며 협상이 교착 상태에 빠지자 트럼프가 군사 재개를 검토하는 등 불확실성이 최고조에 달하고 있다.`,
  outlook:`5월 14~15일 미중 정상회담에서 이란 문제가 핵심 의제로 다뤄질 예정이다. 이란과의 협상 타결 여부가 유가와 인플레이션 경로를 결정할 분수령이 될 것이다.`,
  sources:[{title:`Oil shock complicates central bank outlooks - Vanguard`,url:`https://corporate.vanguard.com/content/corporatesite/us/en/corp/vemo/oil-shock-complicates-central-bank-outlooks.html`},{title:`Iran says it will never bow as Trump rejects peace counteroffer - CNBC`,url:`https://www.cnbc.com/2026/05/11/iran-war-trump-negotiation-hormuz-nuclear-talks.html`},{title:`Fed's Daly says oil shock means getting inflation down takes longer - SF Fed`,url:`https://www.frbsf.org/news-and-media/news-articles/news-coverage/2026/04/reuters-exclusive-feds-daly-says-oil-shock-means-getting-inflation-down-takes-longer/`}]
},{
  category:`경제`,
  colorFg:`#1a6ef5`,
  colorBg:`#e8f0fe`,
  headline:`트럼프, 14일 베이징 방문 시진핑과 정상회담…무역·이란·대만 3대 의제 협상 돌입`,
  metrics:[`미중 정상회담 5월 14~15일 베이징 개최, 트럼프의 중국 방문은 2017년 이후 9년 만`,`팀 쿡(애플 CEO)·일론 머스크(테슬라 CEO) 등 빅테크 수장 동행`],
  summary:`도널드 트럼프 미국 대통령이 5월 14~15일 중국 베이징을 국빈 방문해 시진핑 주석과 정상회담을 갖는다. 이번 회담은 트럼프의 2017년 이후 9년 만의 중국 방문이며, 이란 전쟁 발발로 4월에서 연기됐다. 의제는 무역·기술·희토류 수출 통제·대만·이란 전쟁·인공지능 등 다방면에 걸쳐 있다. 미국은 이란 문제 해결을 위해 중국의 압박 역할을 기대하고, 중국은 대만 현상 유지와 자국 기업의 미국 시장 접근을 원한다. 양측은 미중 양자 무역 관리 위원회 설치와 투자 관련 정부 간 포럼 구성에 합의할 가능성이 있다. 팀 쿡, 일론 머스크 등 주요 빅테크 경영진이 동행해 항공우주·농업·에너지 분야 산업 협력도 논의될 예정이다. 전문가들은 이번 회담이 양국 관계 안정화의 계기는 될 수 있지만, 희토류 수출 통제와 이란 핵 문제라는 구조적 갈등을 단기간에 해소하기는 어렵다고 전망한다.`,
  keyTerms:[{term:`희토류 수출 통제`,explanation:`중국이 전기차·반도체·방산 등에 필수적인 희토류 광물의 수출을 제한하는 조치다. 미중 갈등이 고조될 때마다 중국이 경제적 압박 카드로 활용해온 수단으로, 이번 정상회담의 핵심 협상 의제 중 하나다.`}],
  history:`미중 무역 갈등은 트럼프 1기 집권기인 2018년 관세 전쟁으로 본격화됐다. 바이든 정부 시절 일부 갈등이 관리됐으나 트럼프 2기 들어 관세 인상·기술 수출 통제·희토류 수출 통제 등으로 다시 긴장이 고조됐다. 이란 전쟁은 두 강대국이 같은 문제를 두고 협력을 모색할 공통 이해를 만들어냈다.`,
  players:`트럼프 대통령은 무역 적자 해소와 이란 압박을 원하고, 시진핑 주석은 대만 현상 유지와 안정적인 경제 환경을 원한다. 팀 쿡, 일론 머스크 등 빅테크 CEO들도 중국 시장 접근을 위해 동행한다.`,
  current:`이란 전쟁이 글로벌 공급망과 에너지 시장을 교란하는 가운데, 미중 두 강대국이 협력 가능성을 모색하는 결정적 분기점에 놓여 있다.`,
  outlook:`5월 14~15일 회담 결과에 따라 희토류 수출 통제 완화, 무역 관리 기구 설치 여부가 결정될 전망이다. 이란 문제에서 중국의 역할 확대 여부도 주목된다.`,
  sources:[{title:`What's at stake for trade, Taiwan and Iran in Trump's high-risk summit - CNBC`,url:`https://www.cnbc.com/2026/05/12/trump-xi-china-trade-iran-taiwan.html`},{title:`Five things to watch in Asia as Trump prepares to meet China's Xi - CNBC`,url:`https://www.cnbc.com/2026/05/12/tump-xi-china-summit-taiwan-iran-trade.html`},{title:`Trump-Xi 2026 Summit - CSIS`,url:`https://www.csis.org/programs/trump-xi-2026-summit`}]

  category:`정치`,

  colorBg:`#fce8e6`,
  headline:`한국 39년 만의 개헌 시도, 국민의힘 필리버스터 예고에 국회의장 상정 전격 철회`,
  metrics:[`헌법 개정 통과 요건: 국회 재적의원 3분의 2(200석) 이상 찬성 필요`,`1987년 현행 헌법 제정 이후 39년 만의 개헌 시도`],
  summary:`한국 국회에서 1987년 이후 39년 만에 추진된 헌법 개정 시도가 최종 무산됐다. 집권 민주당은 계엄령 요건 강화(48시간 내 국회 미승인 시 즉시 무효화)와 1980년 광주민주화운동 헌법 전문 수록을 골자로 한 개헌안을 추진했으나, 제1야당 국민의힘이 모든 안건에 대해 필리버스터(무제한 토론)를 예고하며 강력히 반발했다. 우원식 국회의장은 5월 8일 전체회의를 소집했으나 개헌안 재상정을 포기하고 즉시 산회를 선언했다. 국민의힘은 개헌안이 6·3 지방선거와 동시에 실시될 국민투표를 겨냥한 정치적 행보라고 비판했다. 헌법 개정에는 재적 의원 3분의 2 이상의 찬성이 필요해 야당 협조 없이는 통과가 사실상 불가능하다. 개헌 무산으로 이재명 대통령의 국정 동력이 일부 약화될 수 있다는 분석이 나오지만, 이재명 대통령 지지율은 59.8%로 여전히 높은 상태다. 6·3 지방선거가 정국의 새로운 변수로 부상했다.`,
  keyTerms:[{term:`필리버스터`,explanation:`국회에서 법안 통과를 막기 위해 의원이 합법적으로 무제한 토론을 이어가는 전술이다. 별도의 강제 종료 절차 없이는 발언을 멈출 수 없어 사실상 의사 진행을 마비시키는 효과가 있다.`}],
  history:`현행 헌법은 1987년 6월 민주항쟁의 산물로, 직선제 대통령 선출과 기본권 강화 등이 담겼다. 이후 수십 차례 개헌 논의가 있었으나 여야 합의 실패로 번번이 무산됐다. 2024년 윤석열 전 대통령의 계엄령 선포 사태 이후 계엄 요건 강화를 위한 개헌 논의가 재점화됐다.`,
  players:`이재명 대통령과 민주당은 계엄 요건 강화·광주민주화운동 헌법 전문 수록을 핵심으로 한 개헌을 추진했다. 국민의힘은 개헌 내용보다 절차의 정치적 의도를 문제 삼아 전면 반대 입장을 취했다.`,
  current:`6·3 지방선거를 앞두고 개헌 국민투표를 동시에 실시하려던 계획이 무산되면서, 여야 모두 지방선거 승리에 집중하는 국면으로 전환됐다.`,
  outlook:`6·3 지방선거 결과에 따라 정치 지형이 변동될 전망이다. 이재명 대통령의 높은 지지율이 유지되는 한 개헌 논의는 추후 재개될 가능성이 있다.`,
  sources:[{title:`Korea's First Constitutional Amendment Bid in 39 Years Collapses - Seoul Economic Daily`,url:`https://en.sedaily.com/politics/2026/05/08/koreas-first-constitutional-amendment-bid-in-39-years`},{title:`People Power Party to Launch Filibuster Against Constitutional Amendment - Seoul Economic Daily`,url:`https://en.sedaily.com/finance/2026/05/07/people-power-party-to-launch-filibuster-against`},{title:`Abortive constitutional reform - The Korea Times`,url:`https://www.koreatimes.co.kr/amp/opinion/editorial/20260510/ed-abortive-constitutional-reform`}]

  category:`정치`,
  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`트럼프 미-이란 휴전 '생명 유지 장치' 경고, 이란의 호르무즈 주권 요구에 군사 재개 검토`,
  metrics:[`미-이란 전쟁 73일째 지속 (2026년 2월 28일 개전)`,`미국 가정당 추가 연료비 부담 284달러, 전체 피해 370억 달러 (브라운대 연구)`],
  summary:`미국과 이스라엘이 이란을 상대로 벌이는 전쟁이 73일째에 접어든 가운데, 도널드 트럼프 대통령은 휴전이 생명 유지 장치 상태에 있다고 경고했다. 이란은 미국의 평화 제안에 대한 역제안으로 전쟁 배상금 지급, 호르무즈 해협에 대한 완전한 주권 인정, 제재 해제, 동결 자산 반환을 요구했으나 트럼프는 이를 전면 거부했다. 트럼프 측근들은 그가 대규모 전투 재개를 이전보다 더 심각하게 검토하고 있다고 밝혔다. 이스라엘은 레바논 내 이란 연계 세력에 대한 공습을 지속했으며, 쿠웨이트도 이란의 공격을 받았다고 주장했다. 이란 혁명수비대(IRGC)는 완전히 전투 준비가 돼 있다고 경고하며 충돌 재개 가능성을 시사했다. 이란 지도부 내 강경파와 협상파 간 내부 분열로 일관된 협상 입장이 나오지 않는다는 분석도 있다. 전문가들은 이란이 호르무즈 해협 봉쇄를 계속 유지할 경우 글로벌 에너지 위기가 장기화될 것이라고 우려한다.`,
  keyTerms:[{term:`호르무즈 해협`,explanation:`이란과 오만 사이에 위치한 좁은 해협으로, 전 세계 원유 수출량의 약 20%가 이 통로를 거쳐 운반된다. 이란이 이 해협을 봉쇄하면 국제 원유 공급에 즉각적인 충격을 준다.`}],
  history:`이란의 핵 프로그램과 헤즈볼라·후티 반군 등 대리 세력 지원이 장기간 갈등의 핵심이었다. 2015년 핵합의(JCPOA)가 트럼프 1기 탈퇴로 붕괴된 후 이란은 핵 농축을 가속화했고, 2026년 2월 미국과 이스라엘이 군사 작전을 개시했다.`,
  players:`트럼프는 이란의 핵 포기와 대리 세력 해체를 요구한다. 이란 최고 지도자 하메네이와 혁명수비대는 강경파로 협상 가능한 범위가 좁다는 평가다. 이스라엘은 이란 핵 시설 완전 파괴를 목표로 하고 있다.`,
  current:`이란의 역제안이 협상 테이블에 올라온 이후 미국 내에서 군사 재개 여론이 높아지고 있으며, 쿠웨이트 공격 의혹 등 역내 긴장이 다시 고조되는 분기점에 있다.`,
  outlook:`5월 14~15일 트럼프-시진핑 정상회담에서 중국의 이란 압박 역할이 논의된다. 이란이 강경 입장을 유지할 경우 6월 이전 군사 행동 재개 가능성이 높아진다.`,
  sources:[{title:`Day 73: Trump says ceasefire on life support - CNN`,url:`https://www.cnn.com/2026/05/11/world/live-news/iran-war-proposal-trump`},{title:`Iran war updates: ceasefire on life support - Al Jazeera`,url:`https://www.aljazeera.com/news/liveblog/2026/5/11/iran-war-live-trump-slams-tehrans-reply-israel-kills-2-medics-in-lebanon`},{title:`Iran says it will never bow as Trump rejects peace counteroffer - CNBC`,url:`https://www.cnbc.com/2026/05/11/iran-war-trump-negotiation-hormuz-nuclear-talks.html`}]

  colorFg:`#d93025`,
  colorBg:`#fce8e6`,
  headline:`트럼프 중재 러-우 72시간 휴전 만료, 양측 상호 위반 비난으로 항구적 평화 불투명`,
  metrics:[`3일 휴전 기간: 2026년 5월 9~11일 (러시아 전승절 연계)`,`양측 각 1,000명씩 총 2,000명 포로 교환 합의`],
  summary:`도널드 트럼프 미국 대통령의 직접 중재로 러시아와 우크라이나가 2026년 5월 9일부터 11일까지 72시간 전면 전투 중단에 합의했으나, 휴전이 만료되면서 양측은 서로가 협정을 위반했다고 비난하며 충돌이 재개됐다. 트럼프가 러시아 전승절에 맞춰 양국 대통령에게 직접 휴전을 요청했고, 볼로디미르 젤렌스키 대통령과 러시아 측 모두 이를 수락했다. 양측은 각 1,000명씩 총 2,000명 규모의 포로 교환에도 합의했다. 그러나 72시간 휴전 기간 내에도 소규모 교전이 보고됐고, 만료 이후 러시아와 우크라이나 모두 상대방이 먼저 위반했다고 주장했다. 트럼프는 이번 휴전이 전쟁의 끝의 시작이길 바란다고 밝혔으나, 2022년 이후 4년째 이어진 전쟁의 항구적 종식에 대한 낙관론은 제한적이다. 국제사회는 이번 포로 교환을 긍정적 신호로 평가하면서도 추가 협상 재개 여부를 주목하고 있다.`,
  keyTerms:[{term:`포로 교환`,explanation:`전쟁 중 적군에 억류된 병사를 서로 맞바꾸는 행위다. 직접적인 교전 중단은 아니어도 외교적 신뢰를 쌓는 첫 단계로 평가되며, 이번 러-우 합의에서 전투 중단과 함께 이뤄졌다.`}],
  history:`2022년 2월 러시아의 우크라이나 전면 침공 이후 전쟁이 4년 이상 이어졌다. 여러 차례 비공식 협상이 시도됐으나 영토 반환 문제 등으로 번번이 무산됐다. 트럼프 2기 취임 이후 미국이 중재자로 나서면서 협상 동력이 생겼다.`,
  players:`트럼프는 빠른 전쟁 종식을 외교 성과로 삼으려 한다. 젤렌스키 대통령은 점령 영토 회복을 포기하지 않겠다는 입장이며, 푸틴은 점령 지역 유지와 우크라이나 NATO 가입 불허를 요구한다.`,
  current:`러시아 전승절에 맞춰 진행된 이번 휴전은 상징성은 크지만 실질적 전투 중단 효과는 제한적이었으며, 항구적 평화 협상으로 이어질 수 있는지가 핵심 관건으로 부상했다.`,
  outlook:`향후 수주 내 러시아와 우크라이나가 추가 협상 테이블에 앉을지 여부가 주목된다. 미중 정상회담에서 러시아에 대한 중국의 압박 역할 논의도 간접 변수가 될 수 있다.`,
  sources:[{title:`Trump says Russia and Ukraine agreed to 3-day ceasefire - NPR`,url:`https://www.npr.org/2026/05/09/nx-s1-5816478/trump-russia-ukraine-ceasefire`},{title:`Russia and Ukraine trade blame for continued fighting - Washington Post`,url:`https://www.washingtonpost.com/national/2026/05/11/russia-ukraine-ceasefire-trump-talks/da835058-4d22-11f1-97e7-22c6c29ff0d8_story.html`},{title:`Trump-Brokered Russia-Ukraine Ceasefire Strained by Ongoing Fighting - Newsweek`,url:`https://www.newsweek.com/trump-brokered-russia-ukraine-ceasefire-strained-fighting-11934008`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`OpenAI GPT-5.5 출시·MS-OpenAI 비독점 전환, 에이전틱 AI 시대 본격 개막`,
  metrics:[`GPT-5.5, 고위험 시나리오에서 환각 오류 50% 이상 감소`,`마이크로소프트, 일본에 4년간 100억 달러 AI 인프라 투자 발표`],
  summary:`2026년 5월 AI 산업이 단순 질의응답 모델에서 스스로 계획하고 실행하는 에이전틱 AI 체계로 본격 전환되는 전환점을 맞았다. 오픈AI는 GPT-5.5 인스턴트를 출시하며 고위험 시나리오에서 환각 오류를 50% 이상 줄이고, 과거 대화·파일·Gmail 등 외부 서비스 연동을 통한 개인화 기능을 강화했다. 마이크로소프트와 오픈AI는 기존 독점 파트너십에서 비독점 협력 체계로 전환해 클라우드 AI 시장 내 경쟁 구도를 재편했다. 마이크로소프트는 소프트뱅크·사쿠라 인터넷과 손잡고 일본에 4년간 100억 달러 규모의 AI 데이터센터 투자를 선언했다. 구글은 5월 4일 오픈소스 모델 젬마 4 패밀리를 출시해 오픈소스 진영 경쟁에 불을 붙였다. JP모건은 AI 투자를 실험적 R&D에서 핵심 인프라로 공식 재분류하며 2026년 AI 관련 연간 가치 창출을 25억 달러로 전망했다. 전문가들은 에이전틱 AI 전환이 기업 업무 자동화 속도를 대폭 높이는 한편, 데이터 보안과 AI 거버넌스를 새로운 과제로 부각시킬 것으로 분석한다.`,
  keyTerms:[{term:`에이전틱 AI`,explanation:`단순히 질문에 답하는 것을 넘어 스스로 목표를 설정하고 계획을 세워 작업을 자율적으로 실행하는 AI 시스템이다. 기업 업무 프로세스 내에서 여러 단계를 자동 처리하는 방향으로 빠르게 발전하고 있다.`}],
  history:`2022년 챗GPT 출시 이후 AI 산업이 폭발적으로 성장했다. 2024~2025년에는 GPT-4o, 클로드 3, 제미나이 등 거대 언어 모델 경쟁이 가속화됐다. 2026년 들어 단순 응답 모델을 넘어 스스로 작업을 수행하는 에이전틱 AI가 차세대 패러다임으로 자리 잡고 있다.`,
  players:`오픈AI는 GPT-5.5로 모델 정확도를 높이고, 마이크로소프트는 클라우드 인프라로 AI를 기업에 보급한다. 구글은 오픈소스 젬마 모델로 개발자 생태계를 넓히며 경쟁에 뛰어들었다.`,
  current:`마이크로소프트-오픈AI 비독점 전환으로 클라우드 AI 시장 구도가 달라지는 분수령이 됐고, 기업들의 대규모 AI 투자가 실험 단계에서 핵심 인프라 단계로 이행 중이다.`,
  outlook:`2026년 하반기에는 에이전틱 AI 기반 자율 업무 자동화 서비스 출시가 본격화될 전망이다. AI 거버넌스·규제 논의도 주요 선진국에서 병행 가속화될 것으로 보인다.`,
  sources:[{title:`AI Updates Today (May 2026) - LLM Stats`,url:`https://llm-stats.com/llm-updates`},{title:`AI News May 2026: Agentic Pivot & Infrastructure Wars - devFlokers`,url:`https://www.devflokers.com/blog/ai-news-roundup-may-6-2026`},{title:`The state of global AI diffusion in 2026 - Microsoft On the Issues`,url:`https://blogs.microsoft.com/on-the-issues/2026/05/07/the-state-of-global-ai-diffusion-in-2026/`}]

  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`서울 전세 매물 29% 급감·가격 역대 최고, 공급 절벽에 2021년 전세 대란 재현 우려`,
  metrics:[`서울 아파트 전세 매물 29% 급감 (2만 3,060건→1만 6,389건, 1~5월 초)`,`서울 아파트 전세 공급 지수 104.1로 2021년 9월 이후 최고치`],
  summary:`서울 아파트 전세 시장에 공급 절벽이 심화되며 2021년 전세 대란 재현 우려가 커지고 있다. 2026년 1월 이후 5월 초까지 서울 아파트 전세 매물은 29% 급감해 1만 6,389건에 불과하며, 전체 전월세 매물도 연초 대비 30.1% 줄었다. 정부의 토지거래허가구역 내 실거주 의무 강화가 집주인들을 임대 대신 직접 거주로 유도하면서 전세 매물 품귀 현상을 악화시켰다. 서울 아파트 전세 공급 지수는 104.1을 기록해 2021년 9월 이후 최고 수준이며, 전세가도 역대 최고치에 근접하고 있다. 2026년 서울 아파트 입주 물량은 1만 6,913가구로 전년 대비 절반 수준에 그쳐 공급 부족을 가중시킨다. 1분기 서울 아파트 신규 전세 계약은 전년 대비 17.2% 감소한 반면, 갱신 계약은 10.2% 증가해 세입자 2명 중 1명꼴로 이사를 포기하고 재계약을 선택하고 있다. 빌라 공급도 83% 급감한 상황에서 하반기까지 전세 부담이 계속 상승할 가능성이 높다고 전문가들은 경고한다.`,
  keyTerms:[{term:`토지거래허가구역`,explanation:`정부가 부동산 투기를 막기 위해 지정하는 구역으로, 이 안에서 일정 면적 이상의 주택을 거래하려면 구청의 사전 허가와 함께 실거주 의무를 이행해야 한다. 실거주 의무 강화로 집주인이 전세를 놓지 못하면서 전세 공급이 급감하는 부작용이 나타났다.`}],
  history:`전세는 집주인에게 목돈 보증금을 맡기고 월세 없이 거주하는 한국 고유의 임대 방식이다. 2020~2021년 임대차 3법 시행과 집값 급등으로 전세 대란이 발생했고, 이후 시장이 일시 안정됐다가 2026년 공급 절벽과 규제 강화로 다시 불안해지고 있다.`,
  players:`정부는 토지거래허가구역 실거주 유예 확대 등 단기 대책을 내놓았으나 공급 확대가 핵심이라는 시장 평가가 지배적이다. 세입자들은 높아진 전세가에 부담을 느끼며 재계약을 늘리고 있고, 집주인들은 전세 대신 월세 전환을 선호하는 추세다.`,
  current:`입주 물량 급감과 규제 강화가 동시에 작용하며 전세 공급이 수요를 크게 밑도는 구조적 불균형이 심화되는 전환점에 있다.`,
  outlook:`2026년 하반기 추가 입주 물량이 제한적인 상황에서 전세가 상승 압력은 지속될 전망이다. 6·3 지방선거 후 정부의 추가 공급 정책 발표 여부가 관건이다.`,
  sources:[{title:`2026년 5월 서울 전세값 역대 최고 수준 - 21세기 이슈`,url:`https://issue.cyberbabarian.com/seoul-jeonse-value-2026-highest/`},{title:`서울 아파트 전세 매물 4개월 만에 29% 급감 - econmingle`,url:`https://econmingle.com/realestate/seoul-apartment-jeonse-supply-drop-29-pe/`},{title:`서울 아파트 매물 7만건 붕괴, 전월세 시장도 흔들 - 머니투데이`,url:`https://www.mt.co.kr/estate/2026/05/09/2026050715272963543`}]
},{
  category:`기타 이슈`,
  colorFg:`#0d7a5f`,
  colorBg:`#e6f4f1`,
  headline:`러시아 화물선 지중해 침몰, 핵잠수함 원자로 북한 밀수 의혹 국제사회 충격`,
  metrics:[`침몰 위치: 스페인 해안 100km 해역, 수심 약 2,500m (2024년 12월 23~24일 침몰)`,`잠수함급 VM-4SG 핵원자로 2기 탑재 추정, 목적지는 북한 나선항`],
  summary:`러시아 화물선 우르사 마조르(Ursa Major)가 지중해에 침몰한 사건의 조사 결과가 5월 12일 CNN을 통해 공개되며 핵 비확산 우려가 국제사회로 확산됐다. 이 선박은 2024년 12월 23~24일 스페인 해안 100km 해역에서 선내 폭발로 침몰해 현재 수심 약 2,500m에 가라앉아 있다. 조사 결과 이 선박은 러시아의 그림자 함대 소속으로, 잠수함용 VM-4SG 핵원자로 2기를 탑재한 채 북한 나선항으로 향하던 중이었다는 의혹이 제기됐다. 스페인 당국의 조사에서는 바라쿠다 초공동화 어뢰에 의해 선체가 관통됐을 가능성이 제기됐으나, 어떤 정부도 공식적으로 침몰 책임을 인정하지 않았다. 핵원자로 부품이 북한에 전달됐다면 유엔 안보리 결의 위반에 해당하며 북한의 핵잠수함 능력 강화로 이어질 수 있다는 점에서 심각한 안보 위협으로 평가된다. 한국과 미국, 유럽 정보 당국이 이 사건을 집중 분석 중이며, 수중 핵원자로의 환경 오염 가능성도 우려된다. 국제원자력기구(IAEA)는 침몰 해역에 대한 방사능 오염 여부 조사를 촉구했다.`,
  keyTerms:[{term:`그림자 함대`,explanation:`러시아 등 제재 대상국이 서방의 수출 금지 조치를 피하기 위해 선박 정체를 숨기고 비공식 네트워크로 운영하는 비밀 상선 집단이다. 선명·국적·소유자를 위장하기 때문에 추적이 어렵다.`}],
  history:`러시아는 2022년 우크라이나 침공 이후 서방의 광범위한 제재를 받자 그림자 함대를 통해 원유·무기·첨단 기술 등을 거래해왔다. 북한과는 탄약·무기 거래 등 불법 협력을 지속해온 것으로 알려져 있다. 이번 사건은 러-북 간 핵 기술 이전 의혹을 처음으로 구체적으로 드러낸 사례로 평가된다.`,
  players:`러시아는 핵 기술 이전 의혹을 부인하고 있다. 북한은 핵잠수함 개발 의지를 공공연히 드러내왔다. 스페인 해군 및 정보 당국이 조사를 주도하고 있으며 미국·영국·NATO도 정보를 공유 중이다.`,
  current:`CNN의 단독 보도로 이 사건이 국제적 주목을 받게 됐으며, 핵 비확산 체계의 허점을 드러낸 사례로 외교적 파장이 커지고 있는 분기점이다.`,
  outlook:`유엔 안보리에서 러-북 핵 협력 제재 강화 논의가 재개될 가능성이 있다. IAEA의 환경 오염 조사 결과와 스페인 수사 결과가 사건의 전모를 밝힐 핵심이 될 것이다.`,
  sources:[{title:`A Russian ship sank in mysterious circumstances, may have been carrying nuclear reactors to North Korea - CNN`,url:`https://www.cnn.com/2026/05/12/world/a-russian-ship-sank-in-mysterious-circumstances-it-may-have-been-carrying-nuclear-reactors-to-north-korea`},{title:`Russian cargo ship Ursa Major sank carrying nuclear reactor to North Korea - Global Defense Corp`,url:`https://www.globaldefensecorp.com/2026/05/12/russian-cargo-ship-ursa-major-sank-in-the-mediterranean-sea-carrying-a-nuclear-reactor-to-north-korea/`},{title:`Russian Ship Carrying Nuclear Reactors Was Heading To North Korea - ArtVoice`,url:`https://artvoice.com/2026/05/12/russian-ship-carrying-nuclear-reactors-was-heading-to-north-korea-when-it-sank/`}]
}]
